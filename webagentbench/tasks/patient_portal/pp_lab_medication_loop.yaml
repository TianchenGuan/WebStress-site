task_id: pp_lab_medication_loop
env_id: patient_portal
title: Lab-Medication Feedback Loop
instruction_template: Your latest HbA1c lab result is critically high. Find the critical
  HbA1c result in your lab results, then schedule exactly one follow-up appointment
  with your endocrinologist, not your PCP, using the endocrinologist's next available
  slot. Use the appointment reason exactly "Critical HbA1c follow-up". Do not modify
  any medications and do not send any messages.
difficulty: expert
time_limit_seconds: 480
expected_steps: 28
primary_primitives:
- grounding
start_path: /labs
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - endocrinology
      - cardiology
      - billing
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
    outputs:
    - active_rx_ids
  - use: lab_results_panel
    params:
      resulted_count: 4
      abnormal_count: 1
      critical_count: 0
      trend_test: HbA1c
      trend_values:
      - '6.2'
      - '7.5'
      - '9.1'
      - '10.5'
    outputs:
    - critical_lab_id
    - trend_lab_ids
    - trend_test_name
  # PP-4: scheduling with the endocrinologist requires an approved
  # referral; without one the booking API rejects the create. Seed an
  # approved endocrinology referral upfront.
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 0
      must_have_specialties:
      - endocrinology
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    endo_provider_ids: '{output.providers_by_specialty.endocrinology}'
    critical_lab_id: '{output.critical_lab_id}'
    trend_lab_ids: '{output.trend_lab_ids}'
    active_rx_ids: '{output.active_rx_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one endocrinology follow-up at the next available endo slot for the critical HbA1c result"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Critical HbA1c follow-up"}
        provider_id:
          expr: "x in target['endo_provider_ids']"
        datetime:
          expr: >-
            x == min(
              s.datetime
              for p in initial.providers
              if p.id in target['endo_provider_ids']
              for s in p.available_slots
            )
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not send any messages"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not create or modify referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
secondary_primitives: []
