task_id: pp_lab_medication_loop
env_id: patient_portal
title: Lab-Medication Feedback Loop
instruction_template: >-
  Your latest HbA1c lab result is critically high. Find the critical HbA1c result
  in your lab results, then schedule exactly one follow-up appointment with your
  endocrinologist, not your PCP, using the endocrinologist's next available slot.
  Use the appointment reason exactly "Critical HbA1c follow-up". Do not modify
  any medications and do not send any messages.
difficulty: expert
time_limit_seconds: 480
expected_steps: 28
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
start_path: /labs

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Type 2 Diabetes", "Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "endocrinology", "cardiology", "billing"]
        must_include: ["pcp", "endocrinology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
      outputs: [active_rx_ids]
    - use: lab_results_panel
      params:
        resulted_count: 4
        abnormal_count: 1
        critical_count: 0
        trend_test: "HbA1c"
        trend_values: ["6.2", "7.5", "9.1", "10.5"]
      outputs: [critical_lab_id, trend_lab_ids, trend_test_name]
  targets:
    pcp_id: "{output.pcp_id}"
    endo_provider_ids: "{output.providers_by_specialty.endocrinology}"
    critical_lab_id: "{output.critical_lab_id}"
    trend_lab_ids: "{output.trend_lab_ids}"
    active_rx_ids: "{output.active_rx_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id in {target.endo_provider_ids}
          and a.reason == 'Critical HbA1c follow-up'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one endocrinology follow-up appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id in {target.endo_provider_ids}
          and a.reason == 'Critical HbA1c follow-up'
          and a.datetime == min(
            slot['datetime']
            for provider_id in {target.endo_provider_ids}
            for slot in state._initial_snapshot['providers'][provider_id]['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The endocrinology follow-up used the next available endocrinology slot
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: Agent did not modify any prescriptions directly
  negative_checks:
    - expr: >-
        not any(a.provider_id == '{target.pcp_id}'
                and a.id not in state._initial_snapshot.get('appointments', {})
                for a in state.appointments)
      desc: Agent did not schedule the PCP instead of endocrinology
      penalty: 0.25
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
