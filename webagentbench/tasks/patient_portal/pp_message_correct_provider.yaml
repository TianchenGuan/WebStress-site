task_id: pp_message_correct_provider
env_id: patient_portal
title: Message Correct Provider About Referral
instruction_template: >-
  You have a pending referral to orthopedics. Message the referring provider
  (your PCP who initiated the referral) to check on the referral status.
  Do not message the orthopedic specialist. Use the clinical message category.
difficulty: hard
time_limit_seconds: 240
expected_steps: 15
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Back Pain"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "orthopedics", "cardiology", "neurology", "billing", "admin"]
        must_include: ["pcp", "orthopedics"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
      outputs: [approved_ref_ids, pending_ref_ids]
    - use: message_threads
      params:
        thread_count: 3
        unread_count: 1
        categories: ["clinical", "scheduling"]
      outputs: [all_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    providers_by_specialty: "{output.providers_by_specialty}"
    pending_ref_ids: "{output.pending_ref_ids}"
    all_msg_ids: "{output.all_msg_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Agent messaged the PCP (referring provider)
    - expr: >-
        any(m.from_type == 'patient'
            and m.category == 'clinical'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Message was sent with clinical category
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.id not in {target.all_msg_ids}]) >= 1
      desc: At least one new message was sent
    - expr: >-
        all(r.status in ('requested', 'approved', 'denied')
            for r in state.referrals
            if r.id in {target.pending_ref_ids})
      desc: Pending referral status was not incorrectly modified
  negative_checks:
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id != '{target.pcp_id}'
                and m.category == 'clinical'
                and m.id not in {target.all_msg_ids}
                for m in state.messages)
      desc: Agent did not message the orthopedic specialist instead of PCP
      penalty: 0.25
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.id not in {target.all_msg_ids}]) <= 2
      desc: Agent did not send excessive messages to multiple providers
      penalty: 0.15
