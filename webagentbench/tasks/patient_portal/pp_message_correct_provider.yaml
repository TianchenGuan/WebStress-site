task_id: pp_message_correct_provider
env_id: patient_portal
title: Follow Up on Pending Referral With PCP
instruction_template: >-
  You have a pending referral to orthopedics. Schedule exactly one follow-up
  appointment with the referring provider, which is your PCP, using the next
  available PCP slot. Use the appointment reason exactly
  "Orthopedic referral status review". Do not schedule the orthopedic specialist
  and do not send any messages.
difficulty: hard
time_limit_seconds: 240
expected_steps: 15
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Back Pain"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "orthopedics", "cardiology", "neurology", "billing", "admin"]
        must_include: ["pcp", "orthopedics"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
      outputs: [approved_ref_ids, pending_ref_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    ortho_provider_ids: "{output.providers_by_specialty.orthopedics}"
    pending_ref_ids: "{output.pending_ref_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Orthopedic referral status review'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP referral-status review appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Orthopedic referral status review'
          and a.datetime == min(
            slot['datetime']
            for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The referral-status review used the next available PCP slot
    - expr: >-
        all(r.status in ('requested', 'approved', 'denied')
            for r in state.referrals
            if r.id in {target.pending_ref_ids})
      desc: Pending referral status was not incorrectly modified
  negative_checks:
    - expr: >-
        not any(a.provider_id in {target.ortho_provider_ids}
                and a.id not in state._initial_snapshot.get('appointments', {})
                for a in state.appointments)
      desc: Agent did not schedule the orthopedic specialist instead of the PCP
      penalty: 0.25
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
