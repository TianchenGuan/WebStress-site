task_id: pp_cross_reference_labs_meds
env_id: patient_portal
title: Cross-Reference Labs and Medications
instruction_template: Review your active medications and recent lab results. In this
  seed there is an interacting medication pair and an abnormal lab result, so schedule
  exactly one follow-up appointment with your PCP at the next available slot. Use
  the appointment reason exactly "Drug interaction and abnormal lab review". Do not
  send any messages and do not discontinue any medications.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /medications
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Atrial Fibrillation
      - Hyperlipidemia
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
      interaction_pair: true
    outputs:
    - active_rx_ids
    - interacting_rx_ids
    - interacting_medications
  - use: lab_results_panel
    params:
      resulted_count: 5
      pending_count: 1
      abnormal_count: 1
    outputs:
    - resulted_lab_ids
    - pending_lab_ids
    - abnormal_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    interacting_rx_ids: '{output.interacting_rx_ids}'
    interacting_medications: '{output.interacting_medications}'
    resulted_lab_ids: '{output.resulted_lab_ids}'
    pending_lab_ids: '{output.pending_lab_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one PCP appointment at the next available slot for interaction-plus-lab review"
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x == target['pcp_id']"
        reason: {eq: "Drug interaction and abnormal lab review"}
        datetime:
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id == target['pcp_id'] for s in p.available_slots)
  invariant:
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
  named_invariants:
    - name: "Agent did not discontinue or modify prescriptions"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not send any messages"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[4]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[5]
      severity: high
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[6]
      severity: high
secondary_primitives: []
