task_id: pp_cross_reference_labs_meds
env_id: patient_portal
title: Cross-Reference Labs and Medications
instruction_template: >-
  Review your active medications and recent lab results. If any active
  medication has listed drug interactions, message your PCP identifying the
  interacting medications and the relevant lab values for monitoring.
  Use the clinical message category.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
start_path: /medications

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Atrial Fibrillation", "Hyperlipidemia"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "dermatology", "billing", "admin"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
        interaction_pair: true
      outputs: [active_rx_ids, interacting_rx_ids, interacting_medications]
    - use: lab_results_panel
      params:
        resulted_count: 5
        pending_count: 1
        abnormal_count: 1
      outputs: [resulted_lab_ids, pending_lab_ids, abnormal_lab_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [all_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    active_rx_ids: "{output.active_rx_ids}"
    interacting_rx_ids: "{output.interacting_rx_ids}"
    interacting_medications: "{output.interacting_medications}"
    resulted_lab_ids: "{output.resulted_lab_ids}"
    pending_lab_ids: "{output.pending_lab_ids}"
    all_msg_ids: "{output.all_msg_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.category == 'clinical'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Agent sent a clinical message to PCP
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.id not in {target.all_msg_ids}]) >= 1
      desc: At least one new message was sent
    - expr: >-
        all(r.status == 'active'
            for r in state.prescriptions
            if r.id in {target.interacting_rx_ids})
      desc: Both interacting medications remain active
    - expr: >-
        len([r for r in state.prescriptions
             if r.id in {target.interacting_rx_ids}
             and len(r.interactions) > 0]) == 2
      desc: Both medications still show their interaction listings
  negative_checks:
    - expr: >-
        not any(r.status == 'discontinued'
                and r.id in {target.interacting_rx_ids}
                for r in state.prescriptions)
      desc: Agent did not discontinue interacting medications
      penalty: 0.30
    - expr: >-
        not any(m.from_type == 'patient'
                and m.category != 'clinical'
                and m.id not in {target.all_msg_ids}
                for m in state.messages)
      desc: Agent did not misroute the message to a non-clinical category
      penalty: 0.15
