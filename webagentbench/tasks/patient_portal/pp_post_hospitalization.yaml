task_id: pp_post_hospitalization
env_id: patient_portal
title: Post-Hospitalization Follow-Up
instruction_template: >-
  You were recently discharged from the hospital. Complete the following
  post-discharge tasks:
  1) Schedule exactly one PCP follow-up appointment using the next available PCP slot
  with reason "Post-discharge PCP follow-up",
  2) Read the discharge summary message in your inbox,
  3) Because the discharge summary in this seed mentions a specialist follow-up,
  schedule exactly one specialist appointment with reason
  "Post-discharge specialist follow-up".
  Do not send any messages and do not modify any prescriptions.
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - backtracking
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Type 2 Diabetes", "Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "orthopedics", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
      outputs: [active_rx_ids]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 3
      outputs: [upcoming_ids, completed_ids]
    - use: message_threads
      params:
        thread_count: 3
        unread_count: 2
        categories: ["clinical"]
        body_context:
          type: "discharge_summary"
          provider_selector: "most_recent_completed"
          include_referral_mention: true
      outputs: [thread_ids, unread_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    active_rx_ids: "{output.active_rx_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.provider_id == '{target.pcp_id}'
          and a.status == 'scheduled'
          and a.reason == 'Post-discharge PCP follow-up'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP follow-up appointment was scheduled
    - expr: >-
        any(
          m.from_type == 'provider'
          and m.subject == 'Discharge Summary'
          and m.id in state._initial_snapshot.get('messages', {})
          and state.get_message(m.id) is not None
          and state.get_message(m.id).is_read
          for m in state.messages
        )
      desc: The discharge summary message was read
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.reason == 'Post-discharge specialist follow-up'
          and a.id not in state._initial_snapshot.get('appointments', {})
          and state.get_provider(a.provider_id) is not None
          and any(
            specialty in next(
              msg.body.lower()
              for msg in state.messages
              if msg.from_type == 'provider'
              and msg.subject == 'Discharge Summary'
            )
            for specialty in ['cardiology', 'endocrinology', 'orthopedics', 'neurology']
            if state.get_provider(a.provider_id).specialty == specialty
          )
        ]) == 1
      desc: Exactly one specialist follow-up was scheduled for the specialty mentioned in the discharge summary
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: Active prescriptions were not modified
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
