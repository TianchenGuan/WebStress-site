task_id: pp_pre_surgery_clearance
env_id: patient_portal
title: Pre-Surgery Clearance Workflow
instruction_template: >-
  Complete pre-surgery clearance for your upcoming orthopedic procedure using
  appointments only:
  1) Schedule exactly one pre-operative lab appointment with reason
  "Pre-operative lab work",
  2) Schedule exactly one PCP appointment with reason
  "Surgical clearance visit",
  3) Verify the surgery referral's pre-authorization status is approved,
  4) Schedule exactly one orthopedic procedure appointment only after the lab
  appointment and at least 7 days later. Use the appointment reason exactly
  "Orthopedic procedure clearance".
  Do not send any messages.
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Knee Osteoarthritis"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "orthopedics", "radiology", "billing"]
        must_include: ["pcp", "orthopedics"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
        with_prior_auth: true
        must_have_specialties: ["orthopedics"]
      outputs: [approved_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 2
      outputs: [upcoming_ids, completed_ids]
    - use: lab_results_panel
      params:
        resulted_count: 2
        pending_count: 0
      outputs: [resulted_lab_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    ortho_provider_ids: "{output.providers_by_specialty.orthopedics}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    approved_ref_ids: "{output.approved_ref_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.reason == 'Pre-operative lab work'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one pre-operative lab appointment was scheduled
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Surgical clearance visit'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP surgical-clearance appointment was scheduled
    - expr: >-
        (state.get_referral('{target.prior_auth_ref_id}') is not None
         and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status == 'approved')
      desc: Surgery referral pre-authorization status is approved
    - expr: >-
        len([
          a for a in state.appointments
          if a.provider_id in {target.ortho_provider_ids}
          and a.status == 'scheduled'
          and a.reason == 'Orthopedic procedure clearance'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one orthopedic procedure appointment was scheduled
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in state._initial_snapshot.get('appointments', {})]) == 3
      desc: Exactly three new appointments were created
    - expr: >-
        (
          next(
            a for a in state.appointments
            if a.status == 'scheduled'
            and a.reason == 'Orthopedic procedure clearance'
            and a.id not in state._initial_snapshot.get('appointments', {})
          ).datetime
          - next(
            a for a in state.appointments
            if a.status == 'scheduled'
            and a.reason == 'Pre-operative lab work'
            and a.id not in state._initial_snapshot.get('appointments', {})
          ).datetime
        ).days >= 7
      desc: The orthopedic procedure was scheduled at least 7 days after the lab appointment
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        not any(a.provider_id in {target.ortho_provider_ids}
                and a.status == 'scheduled'
                and a.id not in state._initial_snapshot.get('appointments', {})
                and a.pre_auth_status not in ('approved', 'not_required')
                for a in state.appointments)
      desc: Surgery was not scheduled without approved pre-authorization
      penalty: 0.3
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
