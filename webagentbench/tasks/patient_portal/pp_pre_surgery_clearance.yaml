task_id: pp_pre_surgery_clearance
env_id: patient_portal
title: Pre-Surgery Clearance Workflow
instruction_template: >-
  Complete pre-surgery clearance for your upcoming orthopedic procedure:
  1) Schedule pre-operative lab work (blood work) with any available provider,
  2) Send a message to your PCP requesting a surgical clearance letter,
  3) Verify the surgery referral's pre-authorization status is approved,
  4) Schedule the surgery appointment with the orthopedic specialist only after
  all three steps are complete. The surgery must be at least 7 days after the labs.
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Knee Osteoarthritis"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "orthopedics", "radiology", "billing"]
        must_include: ["pcp", "orthopedics"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 2
      outputs: [upcoming_ids, completed_ids]
    - use: lab_results_panel
      params:
        resulted_count: 2
        pending_count: 0
      outputs: [resulted_lab_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    ortho_provider_ids: "{output.providers_by_specialty.orthopedics}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    approved_ref_ids: "{output.approved_ref_ids}"
    upcoming_ids: "{output.upcoming_ids}"
    initial_apt_count: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.reason.lower().find('lab') >= 0 or a.reason.lower().find('pre-op') >= 0
            or a.reason.lower().find('blood') >= 0
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Pre-operative lab appointment was scheduled
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('clearance' in m.body.lower() or 'surgery' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent messaged PCP requesting surgical clearance letter
    - expr: >-
        (state.get_referral('{target.prior_auth_ref_id}') is not None
         and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status == 'approved')
      desc: Surgery referral pre-authorization status is approved
    - expr: >-
        any(a.provider_id in {target.ortho_provider_ids}
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Surgery appointment was scheduled with orthopedic specialist
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 2
      desc: At least two new appointments were created (labs + surgery)
  negative_checks:
    - expr: >-
        not any(a.provider_id in {target.ortho_provider_ids}
                and a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                and a.pre_auth_status != 'approved'
                for a in state.appointments)
      desc: Surgery was not scheduled without approved pre-authorization
      penalty: 0.3
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
