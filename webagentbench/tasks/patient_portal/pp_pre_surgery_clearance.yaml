task_id: pp_pre_surgery_clearance
env_id: patient_portal
title: Pre-Surgery Clearance Workflow
instruction_template: 'Complete pre-surgery clearance for your upcoming orthopedic
  procedure using appointments only: 1) Schedule exactly one pre-operative lab appointment
  with reason "Pre-operative lab work", 2) Schedule exactly one PCP appointment with
  reason "Surgical clearance visit", 3) Verify the surgery referral''s pre-authorization
  status is approved, 4) Schedule exactly one orthopedic procedure appointment only
  after the lab appointment and at least 7 days later. Use the appointment reason
  exactly "Orthopedic procedure clearance". Do not send any messages.'
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
- planning
start_path: /
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Knee Osteoarthritis
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - orthopedics
      - radiology
      - billing
      must_include:
      - pcp
      - orthopedics
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 1
      with_prior_auth: true
      must_have_specialties:
      - orthopedics
    outputs:
    - approved_ref_ids
    - prior_auth_ref_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 2
    outputs:
    - upcoming_ids
    - completed_ids
  - use: lab_results_panel
    params:
      resulted_count: 2
      pending_count: 0
    outputs:
    - resulted_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    pcp_name: '{output.pcp_name}'
    ortho_provider_ids: '{output.providers_by_specialty.orthopedics}'
    prior_auth_ref_id: '{output.prior_auth_ref_id}'
    approved_ref_ids: '{output.approved_ref_ids}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one pre-operative lab appointment"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Pre-operative lab work"}
        provider_id: {any: true}
        datetime: {any: true}
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
    - entity: Appointment
      desc: "Schedule one PCP surgical-clearance appointment"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Surgical clearance visit"}
        provider_id:
          expr: "x == target['pcp_id']"
        datetime: {any: true}
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
    - entity: Appointment
      desc: "Schedule one orthopedic procedure appointment, at least 7 days after pre-op lab"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Orthopedic procedure clearance"}
        provider_id:
          expr: "x in target['ortho_provider_ids']"
        datetime:
          # Spacing predicate (was a high-severity constraint): orthopedic
          # procedure must be >= 7 days after the most recent newly-scheduled lab.
          expr: >-
            any(
              (x - lab.datetime).days >= 7
              for lab in state.appointments
              if lab.status == 'scheduled'
              and lab.reason == 'Pre-operative lab work'
              and lab.id not in {y.id for y in initial.appointments}
            )
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
    - collection: state.providers
      preserve: ALL
    - collection: state.patient
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, modify, or approve any referral (read-only verification)"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not send any messages"
      ref: invariant[3]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.reason == 'Pre-operative lab work'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one pre-operative lab appointment was scheduled
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'Surgical clearance\
      \ visit'\n  and a.id not in state._initial_snapshot.get('appointments', {})\n\
      ]) == 1"
    desc: Exactly one PCP surgical-clearance appointment was scheduled
  - expr: "(state.get_referral('{target.prior_auth_ref_id}') is not None\n and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status\
      \ == 'approved')"
    desc: Surgery referral pre-authorization status is approved
  - expr: "len([\n  a for a in state.appointments\n  if a.provider_id in {target.ortho_provider_ids}\n\
      \  and a.status == 'scheduled'\n  and a.reason == 'Orthopedic procedure clearance'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n]) == 1"
    desc: Exactly one orthopedic procedure appointment was scheduled
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in state._initial_snapshot.get('appointments', {})]) == 3"
    desc: Exactly three new appointments were created
  - expr: "(\n  next(\n    a for a in state.appointments\n    if a.status == 'scheduled'\n\
      \    and a.reason == 'Orthopedic procedure clearance'\n    and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n  ).datetime\n  - next(\n    a for a in state.appointments\n    if a.status\
      \ == 'scheduled'\n    and a.reason == 'Pre-operative lab work'\n    and a.id\
      \ not in state._initial_snapshot.get('appointments', {})\n  ).datetime\n).days\
      \ >= 7"
    desc: The orthopedic procedure was scheduled at least 7 days after the lab appointment
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
  - expr: "not any(a.provider_id in {target.ortho_provider_ids}\n        and a.status\
      \ == 'scheduled'\n        and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n        and a.pre_auth_status not in ('approved', 'not_required')\n \
      \       for a in state.appointments)"
    desc: Surgery was not scheduled without approved pre-authorization
    penalty: 0.3
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
secondary_primitives: []
