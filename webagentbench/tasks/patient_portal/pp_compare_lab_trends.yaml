task_id: pp_compare_lab_trends
env_id: patient_portal
title: Compare Lab Results Over Time
instruction_template: >-
  Compare your last two HbA1c results and determine if your levels are improving
  or worsening. Send a message to your PCP summarizing the trend.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
  - grounding
  - planning
start_path: /labs

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Type 2 Diabetes"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "endocrinology", "cardiology", "billing", "admin"]
        must_include: ["pcp", "endocrinology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: lab_results_panel
      params:
        resulted_count: 4
        pending_count: 1
        abnormal_count: 0
        trend_test: "HbA1c"
        trend_values: ["7.8", "7.4", "7.1"]
      outputs: [resulted_lab_ids, pending_lab_ids, trend_lab_ids, trend_test_name]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [all_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    trend_lab_ids: "{output.trend_lab_ids}"
    trend_test_name: "{output.trend_test_name}"
    all_msg_ids: "{output.all_msg_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Agent sent a message to the PCP
    - expr: >-
        any(m.from_type == 'patient'
            and 'HbA1c' in m.body
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Message mentions HbA1c test name
    - expr: >-
        any(m.from_type == 'patient'
            and m.category == 'clinical'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Message was sent with clinical category
  negative_checks:
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id != '{target.pcp_id}'
                and m.id not in {target.all_msg_ids}
                for m in state.messages)
      desc: Agent did not message a provider other than PCP
      penalty: 0.15
