task_id: pp_file_claim_appeal
env_id: patient_portal
title: File Claim Appeal with Evidence
instruction_template: File an appeal for the denied insurance claim whose appeal
  deadline is approaching soonest (and which has an available EOB). If multiple denied
  claims qualify, pick the one with the earliest appeal deadline.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - orthopedics
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
      - billing
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 3
    outputs:
    - completed_ids
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
    outputs:
    - approved_ref_ids
    - pending_ref_ids
  - use: insurance_claims
    params:
      approved_count: 1
      denied_count: 2
      processing_count: 1
      with_eob: true
      near_appeal_deadline: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
    - appealable_claim_id
  targets:
    pcp_id: '{output.pcp_id}'
    approved_claim_ids: '{output.approved_claim_ids}'
    denied_claim_ids: '{output.denied_claim_ids}'
    appealable_claim_id: '{output.appealable_claim_id}'
    approved_ref_ids: '{output.approved_ref_ids}'
    completed_ids: '{output.completed_ids}'
canonical_diff:
  update:
    - entity: InsuranceClaim
      desc: "File an appeal on the specific appealable denied claim (status → appealed)"
      where:
        id:
          expr: "x == target['appealable_claim_id']"
      changes:
        status: {eq: appealed}
  invariant:
    - collection: state.claims
      filter: "a.id != target['appealable_claim_id']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify, pay, or appeal any other claim"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
secondary_primitives: []
