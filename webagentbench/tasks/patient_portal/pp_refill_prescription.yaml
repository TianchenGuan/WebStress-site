task_id: pp_refill_prescription
env_id: patient_portal
title: Refill a Specific Prescription
instruction_template: Request a refill for your {target.medication_name} prescription.
difficulty: easy
time_limit_seconds: 120
expected_steps: 4
primary_primitives:
- backtracking
start_path: /medications
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - High Cholesterol
      insurance_tier: standard
    outputs:
    - pcp_id
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - cardiology
      must_include:
      - pcp
    outputs:
    - provider_ids
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 3
      zero_refill_count: 1
      target_medication_name: Lisinopril
    outputs:
    - active_rx_ids
    - zero_refill_rx_id
  targets:
    target_rx_id: '{output.active_rx_ids.0}'
    medication_name: Lisinopril
canonical_diff:
  update:
    - entity: Prescription
      desc: "Refill the target prescription (decrement refills_remaining, update last_filled)"
      where:
        id: {expr: "x == target['target_rx_id']"}
      changes:
        refills_remaining:
          expr: "x == initial.get_prescription(target['target_rx_id']).refills_remaining - 1"
        last_filled:
          expr: "x is not None and x > initial.get_prescription(target['target_rx_id']).last_filled"
  invariant:
    - collection: state.prescriptions
      filter: "a.id != target['target_rx_id']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not refill, renew, or modify other prescriptions"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: state.get_prescription('{target.target_rx_id}') is not None and state.get_prescription('{target.target_rx_id}').refills_remaining
      < state._initial_snapshot['prescriptions']['{target.target_rx_id}']['refills_remaining']
    desc: Refill count decremented for the target prescription
  - expr: state.get_prescription('{target.target_rx_id}') is not None and state.get_prescription('{target.target_rx_id}').last_filled
      != state._initial_snapshot['prescriptions']['{target.target_rx_id}'].get('last_filled')
    desc: last_filled timestamp updated for the target prescription
  negative_checks:
  - expr: "not any(\n  r.id != '{target.target_rx_id}'\n  and r.id in state._initial_snapshot.get('prescriptions',\
      \ {})\n  and r.refills_remaining < state._initial_snapshot['prescriptions'][r.id]['refills_remaining']\n\
      \  for r in state.prescriptions\n)"
    desc: Agent did not refill other prescriptions
    penalty: 0.2
secondary_primitives: []
