task_id: pp_treatment_cost_comparison
env_id: patient_portal
title: Treatment Cost Comparison
instruction_template: >-
  Compare two treatment options for your condition:
  1) Check the insurance coverage for each option by reviewing your claims
  history and formulary information — look at approved claims to understand
  typical coverage rates,
  2) Review your deductible status (how much of your {target.insurance_plan_name}
  deductible has been met vs. the total),
  3) For Option A (ongoing prescription), check your active prescriptions for
  the medication cost pattern including refill frequency and pharmacy,
  4) For Option B (specialist procedure), verify the referral is approved and
  check pre-authorization status,
  5) Calculate estimated out-of-pocket costs for each option considering your
  deductible status and coverage rates,
  6) Message your PCP ({target.pcp_name}) with a cost comparison summary that
  includes your deductible status, estimated out-of-pocket for each option,
  and your preferred choice.
  Do not schedule any appointments or modify prescriptions — this is an
  analysis-only task.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 45
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
  - exploration
start_path: /messages

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Chronic Back Pain", "Hypertension"]
        allergies: ["Ibuprofen"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, insurance_plan_name, member_id]
    - use: provider_directory
      params:
        count: 7
        specialties: ["pcp", "orthopedics", "radiology", "neurology", "cardiology", "billing"]
        must_include: ["pcp", "orthopedics", "billing"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
        include_mail_order: true
      outputs: [pharmacy_ids, default_pharmacy_id, mail_order_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
      outputs: [active_rx_ids]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, pending_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 3
      outputs: [upcoming_ids, completed_ids]
    - use: insurance_claims
      params:
        approved_count: 3
        denied_count: 1
        processing_count: 1
        with_eob: true
      outputs: [approved_claim_ids, denied_claim_ids, total_patient_responsibility]
    - use: message_threads
      params:
        thread_count: 4
        unread_count: 2
        categories: ["clinical"]
        include_billing: true
      outputs: [thread_ids, unread_msg_ids, billing_thread_id]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    insurance_plan_name: "{output.insurance_plan_name}"
    member_id: "{output.member_id}"
    active_rx_ids: "{output.active_rx_ids}"
    approved_ref_ids: "{output.approved_ref_ids}"
    pending_ref_ids: "{output.pending_ref_ids}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    approved_claim_ids: "{output.approved_claim_ids}"
    denied_claim_ids: "{output.denied_claim_ids}"
    total_patient_responsibility: "{output.total_patient_responsibility}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    # Sub-goal 6: cost comparison message sent to PCP
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent sent a cost comparison message to the PCP
    - expr: >-
        any(m.from_type == 'patient'
            and ('cost' in m.body.lower() or 'comparison' in m.body.lower()
                 or 'out-of-pocket' in m.body.lower() or 'out of pocket' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message includes cost comparison language
    - expr: >-
        any(m.from_type == 'patient'
            and ('deductible' in m.body.lower() or 'coverage' in m.body.lower()
                 or 'copay' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message references deductible or coverage status
    - expr: >-
        any(m.from_type == 'patient'
            and ('option' in m.body.lower() or 'prefer' in m.body.lower()
                 or 'recommend' in m.body.lower() or 'choose' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message states a preferred treatment option
    # Sub-goal 4: referral and pre-auth verification
    - expr: >-
        (state.get_referral('{target.prior_auth_ref_id}') is not None
         and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status == 'approved')
      desc: Pre-authorization for the procedure referral is verified
    # Preservation: no state mutations
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: Active prescriptions were not modified
    - expr: >-
        all(c.status == state._initial_snapshot['claims'][c.id]['status']
            for c in state.claims
            if c.id in state._initial_snapshot.get('claims', {}))
      desc: Insurance claim statuses were not changed
  negative_checks:
    - expr: >-
        not any(a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                for a in state.appointments)
      desc: No new appointments were scheduled (task is analysis-only)
      penalty: 0.2
    - expr: >-
        not any(rx.status == 'discontinued'
                for rx in state.prescriptions
                if rx.id in {target.active_rx_ids})
      desc: No active prescriptions were discontinued
      penalty: 0.3
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id != '{target.pcp_id}'
                and ('cost' in m.body.lower() or 'comparison' in m.body.lower()
                     or 'prefer' in m.body.lower())
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Cost comparison was not sent to non-PCP providers
      penalty: 0.2
    - expr: >-
        all(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == state._initial_snapshot['referrals'][rid]['status']
          for rid in {target.approved_ref_ids}
          if rid in state._initial_snapshot.get('referrals', {})
        )
      desc: Approved referral statuses were not changed
      penalty: 0.2
