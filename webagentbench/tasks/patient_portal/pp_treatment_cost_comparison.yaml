task_id: pp_treatment_cost_comparison
env_id: patient_portal
title: Treatment Cost Comparison
instruction_template: Review your deductible progress, your existing approved claim
  balances, and the approved pre-authorized procedure referral. After reviewing those
  costs, schedule exactly one PCP appointment in the next available slot with the
  reason exactly "Treatment cost comparison review". Do not send any messages, do
  not schedule any other appointments, and do not modify prescriptions, claims, or
  referrals.
difficulty: hard
time_limit_seconds: 420
expected_steps: 10
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Chronic Back Pain
      - Hypertension
      allergies:
      - Ibuprofen
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
    - insurance_plan_name
    - member_id
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - orthopedics
      - radiology
      - neurology
      - cardiology
      - billing
      must_include:
      - pcp
      - orthopedics
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
    outputs:
    - active_rx_ids
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
      with_prior_auth: true
    outputs:
    - approved_ref_ids
    - pending_ref_ids
    - prior_auth_ref_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 3
    outputs:
    - upcoming_ids
  - use: insurance_claims
    params:
      approved_count: 3
      denied_count: 1
      processing_count: 1
      with_eob: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
    - total_patient_responsibility
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    approved_ref_ids: '{output.approved_ref_ids}'
    pending_ref_ids: '{output.pending_ref_ids}'
    prior_auth_ref_id: '{output.prior_auth_ref_id}'
    approved_claim_ids: '{output.approved_claim_ids}'
    denied_claim_ids: '{output.denied_claim_ids}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one PCP appointment at the next available slot for treatment cost comparison review"
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x == target['pcp_id']"
        reason: {eq: "Treatment cost comparison review"}
        datetime:
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id == target['pcp_id'] for s in p.available_slots)
  invariant:
    - collection: state.appointments
      filter: "a.id in target['upcoming_ids']"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
    - collection: state.providers
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not modify insurance claims (statuses or balances)"
      ref: invariant[2]
      severity: critical
    - name: "Agent did not modify referrals (including the prior-auth referral)"
      ref: invariant[3]
      severity: critical
    - name: "Agent did not send any messages"
      ref: invariant[4]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not modify providers"
      ref: invariant[8]
      severity: medium
    - name: "Agent did not schedule more than one new PCP appointment"
      ref: create[0]
      severity: medium
secondary_primitives: []
