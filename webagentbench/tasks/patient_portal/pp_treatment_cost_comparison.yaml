task_id: pp_treatment_cost_comparison
env_id: patient_portal
title: Treatment Cost Comparison
instruction_template: >-
  Review your deductible progress, your existing approved claim balances, and
  the approved pre-authorized procedure referral. After reviewing those costs,
  schedule exactly one PCP appointment in the next available slot with the
  reason exactly "Treatment cost comparison review". Do not send any messages,
  do not schedule any other appointments, and do not modify prescriptions,
  claims, or referrals.
difficulty: hard
time_limit_seconds: 420
expected_steps: 24
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /billing

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Chronic Back Pain", "Hypertension"]
        allergies: ["Ibuprofen"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, insurance_plan_name, member_id]
    - use: provider_directory
      params:
        count: 7
        specialties: ["pcp", "orthopedics", "radiology", "neurology", "cardiology", "billing"]
        must_include: ["pcp", "orthopedics", "billing"]
      outputs: [provider_ids, providers_by_specialty]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
      outputs: [active_rx_ids]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, pending_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 3
      outputs: [upcoming_ids]
    - use: insurance_claims
      params:
        approved_count: 3
        denied_count: 1
        processing_count: 1
        with_eob: true
      outputs: [approved_claim_ids, denied_claim_ids, total_patient_responsibility]
  targets:
    pcp_id: "{output.pcp_id}"
    active_rx_ids: "{output.active_rx_ids}"
    approved_ref_ids: "{output.approved_ref_ids}"
    pending_ref_ids: "{output.pending_ref_ids}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    approved_claim_ids: "{output.approved_claim_ids}"
    denied_claim_ids: "{output.denied_claim_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
        ]) == 1
      desc: Exactly one new appointment was scheduled
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Treatment cost comparison review'
        ]) == 1
      desc: Exactly one PCP treatment-cost review appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Treatment cost comparison review'
          and a.datetime.isoformat() <= min(
            slot.datetime.isoformat()
            for slot in state.get_provider(a.provider_id).available_slots
          )
          for a in state.appointments
        )
      desc: The PCP cost-review appointment used the next available PCP slot
    - expr: >-
        state.get_referral('{target.prior_auth_ref_id}') is not None
        and state.get_referral('{target.prior_auth_ref_id}').status == 'approved'
        and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status == 'approved'
      desc: The procedure referral remained approved with approved prior authorization
    - expr: >-
        all(
          c.status == state._initial_snapshot['claims'][c.id]['status']
          and c.patient_responsibility == state._initial_snapshot['claims'][c.id]['patient_responsibility']
          for c in state.claims
          if c.id in state._initial_snapshot.get('claims', {})
        )
      desc: Claim statuses and balances were not modified
    - expr: >-
        all(
          rx.status == state._initial_snapshot['prescriptions'][rx.id]['status']
          for rx in state.prescriptions
          if rx.id in state._initial_snapshot.get('prescriptions', {})
          and rx.id in {target.active_rx_ids}
        )
      desc: Active prescriptions were not modified
  negative_checks:
    - expr: >-
        not any(
          a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and (
            a.provider_id != '{target.pcp_id}'
            or a.reason != 'Treatment cost comparison review'
          )
          for a in state.appointments
        )
      desc: No extra appointments were scheduled beyond the PCP cost-review visit
      penalty: 0.2
    - expr: >-
        not any(
          m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
          for m in state.messages
        )
      desc: No new patient messages were sent
      penalty: 0.2
    - expr: >-
        all(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == state._initial_snapshot['referrals'][rid]['status']
          and state.get_referral(rid).prior_auth_status == state._initial_snapshot['referrals'][rid]['prior_auth_status']
          for rid in {target.approved_ref_ids}
          if rid in state._initial_snapshot.get('referrals', {})
        )
      desc: Approved referrals were not modified
      penalty: 0.2
