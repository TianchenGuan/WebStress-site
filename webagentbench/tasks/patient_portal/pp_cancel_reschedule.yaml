task_id: pp_cancel_reschedule
env_id: patient_portal
title: Reschedule Avoiding Conflict
instruction_template: Cancel your dermatology appointment and reschedule it to a date
  that does not conflict with any of your other existing appointments.
difficulty: medium
time_limit_seconds: 240
expected_steps: 10
primary_primitives:
- backtracking
start_path: /appointments
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Eczema
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - dermatology
      - orthopedics
      - billing
      must_include:
      - pcp
      - dermatology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 3
      completed_count: 2
      include_specialist: true
      conflict_pair: false
    outputs:
    - upcoming_ids
    - specialist_apt_id
  # Without an approved dermatology referral, the booking API rejects the
  # reschedule with "No approved referral exists for dermatology." The
  # instruction forbids messaging the PCP (the only path to a new
  # referral), so the task is unsolvable without seeding one upfront.
  # See audit_reports/w05.md pp_cancel_reschedule.
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 0
      must_have_specialties:
      - dermatology
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
    specialist_apt_id: '{output.specialist_apt_id}'
canonical_diff:
  update:
    - entity: Appointment
      desc: "Cancel the target dermatology appointment"
      where:
        id: {expr: "x == target['specialist_apt_id']"}
      changes:
        status: {eq: "cancelled"}
  create:
    - entity: Appointment
      desc: "Schedule a replacement appointment at a time that does not conflict with other upcoming appointments"
      properties:
        status: {eq: "scheduled"}
        datetime:
          expr: >
            not any(
              a.datetime == x
              and a.status == 'scheduled'
              and a.id in target['upcoming_ids']
              and a.id != target['specialist_apt_id']
              for a in initial.appointments
            )
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments} and a.id != target['specialist_apt_id']"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    # PP-1: whitelist cancelled appointments from the unaccounted-create
    # sweep. Booking flows can leave cancelled tentatives. Appended at
    # end so existing named_invariant index references stay aligned.
    - collection: state.appointments
      filter: "a.status != 'cancelled'"
      preserve: ALL
      comprehensive: true
  named_invariants:
    - name: "Agent did not cancel or modify other upcoming appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: high
    - name: "Agent did not send any messages"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: state.get_appointment('{target.specialist_apt_id}') is not None and state.get_appointment('{target.specialist_apt_id}').status
      == 'cancelled'
    desc: The original dermatology appointment was cancelled
  - expr: "any(a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n\
      \    for a in state.appointments)"
    desc: A new appointment was scheduled as a replacement
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in {target.upcoming_ids}]) >= 1"
    desc: At least one new scheduled appointment exists
  negative_checks:
  - expr: "not any(a.status == 'cancelled'\n        and a.id != '{target.specialist_apt_id}'\n\
      \        and a.id in {target.upcoming_ids}\n        for a in state.appointments)"
    desc: Agent did not cancel a non-dermatology upcoming appointment
    penalty: 0.25
  - expr: "not any(\n  a.status == 'cancelled'\n  and a.id not in {target.upcoming_ids}\n\
      \  and state._initial_snapshot.get('appointments', {}).get(a.id, {}).get('status')\
      \ != 'cancelled'\n  for a in state.appointments\n)"
    desc: Agent did not cancel any newly created appointments
    penalty: 0.15
secondary_primitives: []
