task_id: pp_resolve_schedule_conflicts
env_id: patient_portal
title: Review and Cancel Conflicting Appointments
instruction_template: >-
  You have two overlapping appointments scheduled at the same time. Cancel
  the one that was booked more recently (later booked_at time) and keep the
  earlier-booked appointment.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
start_path: /appointments

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "dermatology", "orthopedics", "neurology", "billing"]
        must_include: ["pcp", "cardiology", "dermatology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 3
        completed_count: 2
        conflict_pair: true
      outputs: [upcoming_ids, conflict_apt_ids, completed_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    upcoming_ids: "{output.upcoming_ids}"
    conflict_apt_ids: "{output.conflict_apt_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'cancelled']) == 1
      desc: Exactly one conflicting appointment was cancelled
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'scheduled']) == 1
      desc: Exactly one conflicting appointment remains scheduled
    - expr: >-
        all(a.status in ('scheduled', 'completed', 'cancelled')
            for a in state.appointments
            if a.id in {target.upcoming_ids}
            and a.id not in {target.conflict_apt_ids})
      desc: Non-conflicting upcoming appointments were not modified
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}]) == 2
      desc: Both conflict appointments still exist in state
  negative_checks:
    - expr: >-
        not any(a.status == 'cancelled'
                and a.id in {target.upcoming_ids}
                and a.id not in {target.conflict_apt_ids}
                for a in state.appointments)
      desc: Agent did not cancel any non-conflicting appointments
      penalty: 0.25
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'cancelled'
             and a.id in {target.conflict_apt_ids}]) <= 1
      desc: Agent did not cancel both conflicting appointments
      penalty: 0.30
