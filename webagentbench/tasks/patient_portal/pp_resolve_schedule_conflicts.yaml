task_id: pp_resolve_schedule_conflicts
env_id: patient_portal
title: Review and Cancel Conflicting Appointments
instruction_template: You have two overlapping appointments scheduled at the same
  time. Cancel the one that was booked more recently (later booked_at time) and keep
  the earlier-booked appointment.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- backtracking
start_path: /appointments
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - dermatology
      - orthopedics
      - neurology
      - billing
      must_include:
      - pcp
      - cardiology
      - dermatology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 3
      completed_count: 2
      conflict_pair: true
    outputs:
    - upcoming_ids
    - conflict_apt_ids
    - completed_ids
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
    conflict_apt_ids: '{output.conflict_apt_ids}'
    later_booked_apt_id: '{output.conflict_apt_ids.1}'

canonical_diff:
  update:
    - entity: Appointment
      desc: "Cancel the later-booked of the two conflicting appointments"
      where:
        id:
          expr: >-
            x == max(
              target['conflict_apt_ids'],
              key=lambda aid: (initial.get_appointment(aid).booked_at, aid),
            )
      changes:
        status: {eq: cancelled}
  invariant:
    - collection: state.appointments
      filter: "a.id != target['later_booked_apt_id']"
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    # PP-1: whitelist cancelled appointments from the unaccounted-create
    # sweep. Booking flows can leave cancelled tentatives. Appended at
    # end so existing named_invariant index references stay aligned.
    - collection: state.appointments
      filter: "a.status != 'cancelled'"
      preserve: ALL
      comprehensive: true
  named_invariants:
    - name: "Agent did not modify the earlier-booked conflict appointment or any other appointment"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[1]
      severity: medium
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high

secondary_primitives: []
