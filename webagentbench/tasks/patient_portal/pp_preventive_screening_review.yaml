task_id: pp_preventive_screening_review
env_id: patient_portal
title: Identify Overdue Screenings
instruction_template: >-
  Review your applicable screenings list in your profile. For every screening
  where the next due date has already passed, schedule exactly one appointment.
  Use the screening name itself as the appointment reason exactly as shown in the
  profile. Do not send any messages.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
start_path: /profile

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Type 2 Diabetes"]
        insurance_tier: standard
        overdue_screening_count: 2
      outputs: [pcp_id, pcp_name, applicable_screening_names]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "billing", "admin"]
        must_include: ["pcp"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
  targets:
    pcp_id: "{output.pcp_id}"
    applicable_screening_names: "{output.applicable_screening_names}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == len([
          screening for screening in state.patient.applicable_screenings
          if screening.next_due is not None
          and screening.next_due < state.created_at.date()
        ])
      desc: Exactly one appointment was scheduled for each overdue screening
    - expr: >-
        sorted(
          a.reason
          for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ) == sorted(
          screening.screening_name
          for screening in state.patient.applicable_screenings
          if screening.next_due is not None
          and screening.next_due < state.created_at.date()
        )
      desc: Every new appointment uses the exact overdue screening name as its reason
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        not any(
          m.from_type == 'patient'
          and any(
            screening.screening_name.lower() in m.body.lower()
            for screening in state.patient.applicable_screenings
            if screening.next_due is not None
            and screening.next_due < state.created_at.date()
          )
          and m.id not in state._initial_snapshot.get('messages', {})
          for m in state.messages
        )
      desc: Agent did not message about overdue screenings instead of scheduling them
      penalty: 0.1
    - expr: >-
        not any(
          a.status == 'scheduled'
          and a.id not in state._initial_snapshot.get('appointments', {})
          and a.reason not in [
            screening.screening_name
            for screening in state.patient.applicable_screenings
            if screening.next_due is not None
            and screening.next_due < state.created_at.date()
          ]
          for a in state.appointments
        )
      desc: Agent did not schedule appointments for screenings that were not overdue
      penalty: 0.15
