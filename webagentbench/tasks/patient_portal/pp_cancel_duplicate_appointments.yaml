task_id: pp_cancel_duplicate_appointments
env_id: patient_portal
title: Cancel Duplicate Appointment
instruction_template: >-
  You have two appointments scheduled on the same day with the same provider.
  Cancel the one that was booked later and keep the earlier-booked one.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
  - grounding
  - planning
start_path: /appointments

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 4
        specialties: ["pcp", "cardiology", "dermatology", "billing"]
        must_include: ["pcp"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 3
        completed_count: 1
        conflict_pair: true
      outputs: [upcoming_ids, conflict_apt_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    upcoming_ids: "{output.upcoming_ids}"
    conflict_apt_ids: "{output.conflict_apt_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'cancelled']) == 1
      desc: Exactly one of the conflicting appointments was cancelled
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'scheduled']) == 1
      desc: Exactly one of the conflicting appointments remains scheduled
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}]) == 2
      desc: Both original conflict appointments still exist in state
  negative_checks:
    - expr: >-
        not any(a.status == 'cancelled'
                and a.id not in {target.conflict_apt_ids}
                and a.id in {target.upcoming_ids}
                for a in state.appointments)
      desc: Agent did not cancel any non-conflicting appointments
      penalty: 0.25
