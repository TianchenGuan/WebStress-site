task_id: pp_complex_claim_dispute
env_id: patient_portal
title: Multi-Claim Dispute Resolution
instruction_template: Review your insurance claims and appeal every denied claim
  that has an available EOB, using the claim appeal action.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 60
primary_primitives:
- backtracking
start_path: /billing
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Back Pain
      - Hypertension
      - Knee Osteoarthritis
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
    - conditions_list
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - orthopedics
      - cardiology
      - radiology
      - neurology
      - billing
      must_include:
      - pcp
      - orthopedics
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 5
    outputs:
    - upcoming_ids
    - completed_ids
  - use: referral_chain
    params:
      approved_count: 3
      pending_count: 0
    outputs:
    - approved_ref_ids
  - use: lab_results_panel
    params:
      resulted_count: 3
      abnormal_count: 1
    outputs:
    - resulted_lab_ids
  - use: insurance_claims
    params:
      approved_count: 2
      denied_count: 3
      with_eob: true
      near_appeal_deadline: true
    outputs:
    - denied_claim_ids
    - appealable_claim_id
    - approved_claim_ids
  targets:
    pcp_id: '{output.pcp_id}'
    denied_claim_ids: '{output.denied_claim_ids}'
    approved_claim_ids: '{output.approved_claim_ids}'
canonical_diff:
  update:
    - entity: InsuranceClaim
      desc: "Appeal each of the three denied claims (status -> appealed)"
      bijection:
        over: "target['denied_claim_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        status: {eq: "appealed"}
  invariant:
    # Every claim NOT in the denied-claims set must be preserved (approved,
    # processing, and any distractor claims). Filter scope exposes `a` + `target`
    # only, so we use the scalar seed list `denied_claim_ids` directly.
    - collection: state.claims
      filter: "a.id not in target['denied_claim_ids']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
    - collection: state.providers
      preserve: ALL
  named_invariants:
    - name: "Agent did not appeal, modify, or pay any claim outside the three denied claims"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not modify providers"
      ref: invariant[8]
      severity: medium
    - name: "Agent appealed exactly the three denied claims (no more, no fewer)"
      ref: update[0]
      severity: high
secondary_primitives: []
