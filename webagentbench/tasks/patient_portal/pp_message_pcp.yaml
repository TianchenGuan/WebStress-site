task_id: pp_message_pcp
env_id: patient_portal
title: Schedule PCP Medication Review
instruction_template: Review your medication list, then schedule exactly one follow-up appointment with your primary care
  physician using the next available PCP slot. Use the appointment reason exactly "Medication side effect review". Do not
  send any messages.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
- backtracking
start_path: /medications
seed:
  distractors: 13
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 8
      specialties:
      - pcp
      - cardiology
      - dermatology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 3
    outputs:
    - active_rx_ids
  targets:
    pcp_id: '{output.pcp_id}'
    pcp_name: '{output.pcp_name}'
    active_rx_ids: '{output.active_rx_ids}'
canonical_diff:
  create:
  - entity: Appointment
    desc: Schedule one PCP appointment at the next available slot for medication side effect review
    properties:
      status:
        eq: scheduled
      provider_id:
        expr: x == target['pcp_id']
      reason:
        eq: Medication side effect review
      datetime:
        expr: "x == min(s.datetime for p in initial.providers\n         if p.id == target['pcp_id'] for s in p.available_slots)\n"
  invariant:
  - collection: state.messages
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.appointments
    filter: a.id in {x.id for x in initial.appointments}
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  named_invariants:
  - name: Agent did not send any messages
    ref: invariant[0]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[1]
    severity: high
  - name: Agent did not modify immunization records
    ref: invariant[2]
    severity: medium
  - name: Agent did not create or modify lab results
    ref: invariant[3]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[4]
    severity: critical
  - name: Agent did not touch referrals
    ref: invariant[5]
    severity: high
  - name: Agent did not cancel or modify pre-existing appointments
    ref: invariant[6]
    severity: high
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'Medication side effect review'\n  and a.id not in state._initial_snapshot.get('appointments', {})\n\
      ]) == 1"
    desc: Exactly one PCP medication-review appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'Medication side effect\
      \ review'\n  and a.datetime == min(\n    slot['datetime']\n    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for a in state.appointments\n)"
    desc: The medication-review appointment used the next available PCP slot
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and m.id not in state._initial_snapshot.get('messages',\
      \ {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
