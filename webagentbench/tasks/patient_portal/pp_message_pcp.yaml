task_id: pp_message_pcp
env_id: patient_portal
title: Send Message to PCP
instruction_template: "Send a message to your primary care physician asking about potential side effects of your current medications."
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
  - grounding
start_path: /messages

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "dermatology", "billing"]
        must_include: ["pcp"]
      outputs: [provider_ids]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: message_threads
      params:
        unread_count: 2
        read_count: 1
        categories: ["clinical", "billing"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.category == 'clinical'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: A new patient message to the PCP exists with clinical category
    - expr: >-
        any(m.from_type == 'patient'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: At least one new patient message was sent
  negative_checks:
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id != '{target.pcp_id}'
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Agent did not send messages to non-PCP providers
      penalty: 0.25
