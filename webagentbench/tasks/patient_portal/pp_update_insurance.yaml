task_id: pp_update_insurance
env_id: patient_portal
title: Update Insurance Information
instruction_template: Your insurance plan has changed. Update your plan name to "Aetna
  PPO Silver", member ID to "AET-5529103", and group number to "GRP-77412".
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- verification
start_path: /profile
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
    - insurance_plan_name
    - member_id
  - use: provider_directory
    params:
      count: 3
      specialties:
      - pcp
      - cardiology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  targets:
    pcp_id: '{output.pcp_id}'
    old_plan_name: '{output.insurance_plan_name}'
    old_member_id: '{output.member_id}'
canonical_diff:
  # `state.patient` is now diffed (opt-in singleton with id field). Inner
  # `insurance_plan` dict change surfaces as a single field_change on the
  # top-level `insurance_plan` key; use `fields:` to validate inner keys.
  # Also assert other patient fields stay equal to the initial snapshot
  # to catch profile-form mis-clicks (the singleton invariant alone cannot
  # do field-level guarding when an Update covers the same row).
  update:
    - entity: patient
      desc: Insurance plan fields updated to the target values
      where: { id: { any: true } }
      changes:
        insurance_plan:
          fields:
            plan_name: { eq: "Aetna PPO Silver" }
            member_id: { eq: "AET-5529103" }
            group_number: { eq: "GRP-77412" }
        phone:
          expr: "x == initial.patient.phone"
        email:
          expr: "x == initial.patient.email"
        name:
          expr: "x == initial.patient.name"
  invariant:
  - collection: state.appointments
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.messages
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  named_invariants:
  - name: Agent did not create, cancel, or modify appointments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[1]
    severity: high
  - name: Agent did not send unsolicited messages
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify immunization records
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify lab results
    ref: invariant[4]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[5]
    severity: critical
  - name: Agent did not touch referrals
    ref: invariant[6]
    severity: high
  - name: Agent did not modify pharmacies
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify providers
    ref: invariant[8]
    severity: medium
secondary_primitives: []
