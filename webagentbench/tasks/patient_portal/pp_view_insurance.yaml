task_id: pp_view_insurance
env_id: patient_portal
title: View Insurance Card Details
instruction_template: >-
  Open your profile and schedule exactly one Patient Services appointment using
  the next available admin slot. Use the appointment reason exactly
  "Insurance card verification". Do not send any messages.
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
  - grounding
start_path: /profile

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, member_id, group_number]
    - use: provider_directory
      params:
        count: 3
        specialties: ["pcp", "admin"]
        must_include: ["pcp", "admin"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
  targets:
    admin_provider_ids: "{output.providers_by_specialty.admin}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id in {target.admin_provider_ids}
          and a.reason == 'Insurance card verification'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one Patient Services verification appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id in {target.admin_provider_ids}
          and a.reason == 'Insurance card verification'
          and a.datetime == min(
            slot['datetime']
            for provider_id in {target.admin_provider_ids}
            for slot in state._initial_snapshot['providers'][provider_id]['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The verification appointment used the next available admin slot
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.15
