task_id: pp_view_insurance
env_id: patient_portal
title: Schedule Insurance Verification Appointment
instruction_template: "Open your profile, then schedule exactly one Administration appointment (the provider will be listed\
  \ under the \"Administration\" department \u2014 names include \"Front Desk\", \"Patient Services\", or \"Medical Records\"\
  ) using that provider's next available slot. Use the appointment reason exactly \"Insurance card verification\". Do not\
  \ send any messages."
difficulty: easy
time_limit_seconds: 90
expected_steps: 5
primary_primitives:
- backtracking
start_path: /profile
seed:
  distractors: 15
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - member_id
    - group_number
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - admin
      - billing
      must_include:
      - pcp
      - admin
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  targets:
    admin_provider_ids: '{output.providers_by_specialty.admin}'
canonical_diff:
  create:
  - entity: Appointment
    desc: Schedule one Patient Services appointment at the next available admin slot for insurance card verification
    properties:
      status:
        eq: scheduled
      reason:
        eq: Insurance card verification
      provider_id:
        expr: x in target['admin_provider_ids']
      datetime:
        expr: "x == min(s.datetime for p in initial.providers\n         if p.id in target['admin_provider_ids']\n        \
          \ for s in p.available_slots)\n"
  invariant:
  - collection: state.appointments
    filter: a.id in {x.id for x in initial.appointments}
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.messages
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  named_invariants:
  - name: Agent did not cancel or modify pre-existing appointments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[1]
    severity: high
  - name: Agent did not send any messages
    ref: invariant[2]
    severity: high
  - name: Agent did not modify immunization records
    ref: invariant[3]
    severity: medium
  - name: Agent did not create or modify lab results
    ref: invariant[4]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[5]
    severity: critical
  - name: Agent did not touch referrals
    ref: invariant[6]
    severity: high
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n  and a.provider_id in {target.admin_provider_ids}\n\
      \  and a.reason == 'Insurance card verification'\n  and a.id not in state._initial_snapshot.get('appointments', {})\n\
      ]) == 1"
    desc: Exactly one Patient Services verification appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id in {target.admin_provider_ids}\n  and a.reason == 'Insurance\
      \ card verification'\n  and a.datetime == min(\n    slot['datetime']\n    for provider_id in {target.admin_provider_ids}\n\
      \    for slot in state._initial_snapshot['providers'][provider_id]['available_slots']\n  )\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n  for a in state.appointments\n)"
    desc: The verification appointment used the next available admin slot
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and m.id not in state._initial_snapshot.get('messages',\
      \ {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.15
secondary_primitives: []
