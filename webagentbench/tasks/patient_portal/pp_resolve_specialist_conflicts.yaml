task_id: pp_resolve_specialist_conflicts
env_id: patient_portal
title: Resolve Specialist Appointment Conflicts
instruction_template: You have two specialist appointments scheduled at overlapping
  times. Identify which appointment was booked more recently and reschedule that one
  to the next available slot with the same provider. Keep the earlier-booked appointment
  unchanged.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- backtracking
start_path: /appointments
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Eczema
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - dermatology
      - orthopedics
      - neurology
      - billing
      must_include:
      - pcp
      - cardiology
      - dermatology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 3
      completed_count: 2
      conflict_pair: true
    outputs:
    - upcoming_ids
    - conflict_apt_ids
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 0
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
    conflict_apt_ids: '{output.conflict_apt_ids}'
    later_booked_apt_id: '{output.conflict_apt_ids.1}'

canonical_diff:
  update:
    - entity: Appointment
      desc: "Cancel the later-booked of the two conflicting specialist appointments"
      where:
        id:
          expr: >-
            x == max(
              target['conflict_apt_ids'],
              key=lambda aid: (initial.get_appointment(aid).booked_at, aid),
            )
      changes:
        status: {eq: cancelled}
  create:
    - entity: Appointment
      desc: "Schedule a replacement with the same provider at the earliest available slot"
      properties:
        status: {eq: scheduled}
        provider_id:
          expr: >-
            x == initial.get_appointment(
              max(
                target['conflict_apt_ids'],
                key=lambda aid: (initial.get_appointment(aid).booked_at, aid),
              )
            ).provider_id
        datetime:
          expr: >-
            x == min(
              s.datetime
              for p in initial.providers
              if p.id == initial.get_appointment(
                  max(
                    target['conflict_apt_ids'],
                    key=lambda aid: (initial.get_appointment(aid).booked_at, aid),
                  )
                ).provider_id
              for s in p.available_slots
            )
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments} and a.id != target['later_booked_apt_id']"
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify the earlier-booked conflict appointment or other upcoming appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[1]
      severity: medium
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high

secondary_primitives: []
