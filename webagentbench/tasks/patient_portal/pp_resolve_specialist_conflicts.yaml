task_id: pp_resolve_specialist_conflicts
env_id: patient_portal
title: Resolve Specialist Appointment Conflicts
instruction_template: >-
  You have two specialist appointments scheduled at overlapping times. Identify
  which appointment was booked more recently and reschedule that one to the
  next available slot with the same provider. Keep the earlier-booked
  appointment unchanged.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
start_path: /appointments

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Eczema"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "dermatology", "orthopedics", "neurology", "billing"]
        must_include: ["pcp", "cardiology", "dermatology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 3
        completed_count: 2
        conflict_pair: true
      outputs: [upcoming_ids, conflict_apt_ids]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 0
      outputs: [approved_ref_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    upcoming_ids: "{output.upcoming_ids}"
    conflict_apt_ids: "{output.conflict_apt_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'scheduled']) >= 1
      desc: At least one conflicting appointment remains scheduled
    - expr: >-
        any(a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
        or any(a.id in {target.conflict_apt_ids}
               and a.status == 'scheduled'
               for a in state.appointments)
      desc: A rescheduled appointment or the kept appointment exists
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id in {target.upcoming_ids}
             and a.id not in {target.conflict_apt_ids}]) >= 1
      desc: Non-conflicting appointments remain unchanged
    - expr: >-
        len(state.appointments) >= len({target.upcoming_ids})
      desc: No appointments were deleted from state
  negative_checks:
    - expr: >-
        not any(a.status == 'cancelled'
                and a.id in {target.upcoming_ids}
                and a.id not in {target.conflict_apt_ids}
                for a in state.appointments)
      desc: Agent did not cancel non-conflicting appointments
      penalty: 0.25
    - expr: >-
        len([a for a in state.appointments
             if a.id in {target.conflict_apt_ids}
             and a.status == 'cancelled']) <= 1
      desc: Agent did not cancel both conflicting appointments
      penalty: 0.30
