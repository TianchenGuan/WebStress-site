task_id: pp_mark_all_read
env_id: patient_portal
title: Mark All Unread Messages as Read
instruction_template: Open each unread message thread in your patient portal so that
  every message is marked as read.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
- verification
start_path: /messages
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - cardiology
      must_include:
      - pcp
    outputs:
    - provider_ids
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: message_threads
    params:
      unread_count: 4
      read_count: 2
      categories:
      - clinical
      - billing
      - scheduling
    outputs:
    - unread_msg_ids
    - thread_ids
  targets:
    unread_count: '4'
    unread_msg_ids: '{output.unread_msg_ids}'
canonical_diff:
  update:
    - entity: ClinicalMessage
      desc: "Mark each unread message as read"
      bijection:
        over: "target['unread_msg_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        is_read: {eq: true}
  invariant:
    - collection: state.messages
      filter: "a.id not in target['unread_msg_ids']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify read messages or send new ones"
      ref: invariant[0]
      severity: medium
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not modify prescriptions"
      ref: invariant[3]
      severity: high
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: len(state.unread_messages()) == 0
    desc: All messages are marked as read
  negative_checks:
  - expr: "not any(m.from_type == 'patient'\n        and m.id not in state._initial_snapshot.get('messages',\
      \ {})\n        for m in state.messages)"
    desc: No new messages were sent when none required
    penalty: 0.15
secondary_primitives: []
