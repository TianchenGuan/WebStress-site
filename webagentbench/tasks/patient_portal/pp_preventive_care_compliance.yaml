task_id: pp_preventive_care_compliance
env_id: patient_portal
title: Preventive Care Compliance Plan
instruction_template: 'Review your applicable screenings list and complete all that
  are overdue (next_due date has passed). For each overdue screening: 1) Check if
  a referral is needed (specialist screenings require referrals), 2) Verify pre-authorization
  is in place if required, 3) Schedule pre-screening labs if the screening requires
  them, 4) Schedule the screening appointment. Group same-provider visits on the same
  day when possible to minimize visits. Do not schedule screenings that are not yet
  due.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 55
primary_primitives:
- planning
start_path: /
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - High Cholesterol
      insurance_tier: standard
      overdue_screening_count: 2
    outputs:
    - pcp_id
    - pcp_name
    - applicable_screening_names
    - overdue_screening_names
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - cardiology
      - radiology
      - dermatology
      - endocrinology
      - billing
      must_include:
      - pcp
      - cardiology
      - radiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
      with_prior_auth: true
    outputs:
    - approved_ref_ids
    - pending_ref_ids
    - prior_auth_ref_id
  - use: lab_results_panel
    params:
      resulted_count: 3
      pending_count: 1
    outputs:
    - resulted_lab_ids
    - pending_lab_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  - use: message_threads
    params:
      thread_count: 2
      unread_count: 1
      categories:
      - clinical
    outputs:
    - thread_ids
  targets:
    pcp_id: '{output.pcp_id}'
    pcp_name: '{output.pcp_name}'
    applicable_screening_names: '{output.applicable_screening_names}'
    overdue_screening_names: '{output.overdue_screening_names}'
    approved_ref_ids: '{output.approved_ref_ids}'
    prior_auth_ref_id: '{output.prior_auth_ref_id}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  # The instruction's 1-3 items (check referral, verify pre-auth, schedule
  # pre-screening labs) are read-only verifications — the env backend gates
  # specialist scheduling on referral+pre-auth (hazard Class 3), and "schedule
  # pre-screening labs" is covered implicitly by the scheduling action for
  # screenings that require them. The only state-changing axis is the
  # screening appointment per overdue item.
  create:
    - entity: Appointment
      desc: >-
        Schedule one screening appointment per overdue screening; the
        appointment's reason must contain the screening's name (bijection
        identity test). Not-yet-due screenings must not be scheduled —
        excess candidates are surfaced by the bounded-creation invariant.
      bijection:
        over: "target['overdue_screening_names']"
        variable: v
      properties:
        status: {eq: "scheduled"}
        reason:
          expr: "v.lower() in (x or '').lower()"
        provider_id: {any: true}
        datetime: {any: true}
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    # Pre-existing appointments must not be cancelled or modified.
    - collection: state.appointments
      filter: "a.id in target['upcoming_ids']"
      preserve: ALL
    # Referrals are read-only — the instruction says "check if a referral is
    # needed" and "verify pre-authorization". The agent must not create or
    # mutate referrals (e.g., flipping a denied one to approved).
    - collection: state.referrals
      preserve: ALL
    # Pre-existing messages must not be modified. No messaging axis in this
    # task, so any pre-existing message id must remain.
    - collection: state.messages
      filter: "a.id in {x.id for x in initial.messages}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, modify, or approve any referral (read-only verification)"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not modify or delete pre-existing messages"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not modify prescriptions"
      ref: invariant[3]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not schedule more screening appointments than overdue screenings"
      ref: create[0]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in {target.upcoming_ids}]) >= 1"
    desc: At least one screening appointment was scheduled
  - expr: "any(a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n\
      \    for a in state.appointments)"
    desc: New appointments were created
  - expr: "(any(a.provider_id == '{target.pcp_id}'\n    and a.status == 'scheduled'\n\
      \    and a.id not in {target.upcoming_ids}\n    for a in state.appointments)\n\
      or any(a.status == 'scheduled'\n       and a.id not in {target.upcoming_ids}\n\
      \       for a in state.appointments))"
    desc: Screening appointments were scheduled with relevant providers
  negative_checks:
  - expr: "not any(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ == 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
  - expr: "not any(\n  state.get_referral(rid) is not None\n  and state.get_referral(rid).status\
      \ == 'denied'\n  for rid in {target.approved_ref_ids}\n)"
    desc: Approved referrals were not changed to denied
    penalty: 0.25
  - expr: "not any(a.status == 'scheduled'\n        and a.id not in {target.upcoming_ids}\n\
      \        and a.pre_auth_status == 'pending'\n        for a in state.appointments)"
    desc: No appointments were scheduled with pending pre-authorization
    penalty: 0.3
secondary_primitives: []
