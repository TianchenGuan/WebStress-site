task_id: pp_emergency_prep
env_id: patient_portal
title: Emergency Action Plan Review
instruction_template: 'Review your profile data for completeness, then schedule exactly
  one PCP follow-up appointment using the next available PCP slot with the appointment
  reason exactly "Medication wallet card review". In the appointment notes, list every
  allergy currently on your profile, comma-separated, so the PCP can cross-check against
  your wallet card. Do not modify your emergency contact, allergies, or insurance, and
  do not send any messages.'
difficulty: frontier
time_limit_seconds: 540
expected_steps: 40
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Asthma
      - Type 2 Diabetes
      - Hypertension
      allergies:
      - Penicillin
      - Sulfa
      - Shellfish
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
    - conditions_list
    - allergies_list
    - insurance_plan_name
    - member_id
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - billing
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 5
      expired_count: 2
    outputs:
    - active_rx_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
    - completed_ids
  - use: lab_results_panel
    params:
      resulted_count: 2
      abnormal_count: 0
    outputs:
    - resulted_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one PCP appointment for medication wallet card review at the PCP's next available slot; notes must list every allergy on the patient profile"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Medication wallet card review"}
        provider_id:
          expr: "x == target['pcp_id']"
        datetime:
          expr: >-
            x == min(
              s.datetime
              for p in initial.providers
              if p.id == target['pcp_id']
              for s in p.available_slots
            )
        notes:
          expr: >-
            x is not None
            and all(
              allergy.lower() in x.lower()
              for allergy in initial.patient.allergies
            )
        type: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  constraints:
    - desc: "Emergency contact on profile remains populated (read-only verification)"
      expr: >
        state.patient.emergency_contact is not None
        and state.patient.emergency_contact.name != ''
        and state.patient.emergency_contact.phone != ''
      severity: high
    - desc: "Allergy list retains every originally-seeded entry (read-only verification)"
      expr: >
        all(a in state.patient.allergies for a in initial.patient.allergies)
      severity: high
    - desc: "Insurance plan details remain intact (read-only verification)"
      expr: >
        state.patient.insurance_plan is not None
        and state.patient.insurance_plan.plan_name == initial.patient.insurance_plan.plan_name
        and state.patient.insurance_plan.member_id == initial.patient.insurance_plan.member_id
      severity: critical
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not send any messages"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not create or modify referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not schedule more than one PCP medication-wallet-card appointment"
      ref: create[0]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'Medication wallet\
      \ card review'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one PCP medication-wallet-card review appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'Medication wallet card review'\n  and a.datetime == min(\n\
      \    slot['datetime']\n    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The medication-wallet-card review used the next available PCP slot
  - expr: state.patient.emergency_contact is not None and state.patient.emergency_contact.name
      != ''
    desc: Emergency contact information is present on profile
  - expr: len(state.patient.allergies) >= 3
    desc: Allergy list has at least 3 entries
  - expr: "any(\n  a.status == 'scheduled'\n  and a.reason == 'Medication wallet card\
      \ review'\n  and a.notes is not None\n  and all(allergy.lower() in a.notes.lower()\
      \ for allergy in state.patient.allergies)\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n  for a in state.appointments\n)"
    desc: Appointment notes list every allergy on the patient profile (forces profile
      read)
  - expr: "all(rx.status == 'active'\n    for rx in state.prescriptions\n    if rx.id\
      \ in {target.active_rx_ids})"
    desc: All active prescriptions remain active and unmodified
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
  - expr: state.patient.emergency_contact is not None and state.patient.emergency_contact.name
      != '' and state.patient.emergency_contact.phone != ''
    desc: Emergency contact was not blanked
    penalty: 0.25
  - expr: "not any(a for a in ['Penicillin', 'Sulfa', 'Shellfish']\n        if a not\
      \ in state.patient.allergies)"
    desc: No original allergy entries were removed
    penalty: 0.25
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.15
secondary_primitives: []
