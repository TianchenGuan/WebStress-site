task_id: pp_emergency_prep
env_id: patient_portal
title: Emergency Action Plan Review
instruction_template: >-
  Review your emergency action plan and ensure everything is current:
  1) Verify your emergency contacts are on file,
  2) Confirm your allergy list in the profile is complete,
  3) Verify your insurance card details are accessible in your profile,
  4) Schedule exactly one PCP follow-up appointment using the next available PCP
  slot with the appointment reason exactly "Medication wallet card review".
  Do not modify your emergency contact, allergies, or insurance, and do not send
  any messages.
difficulty: frontier
time_limit_seconds: 540
expected_steps: 40
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
  - exploration
start_path: /

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Asthma", "Type 2 Diabetes", "Hypertension"]
        allergies: ["Penicillin", "Sulfa", "Shellfish"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, conditions_list, allergies_list, insurance_plan_name, member_id]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "dermatology", "billing"]
        must_include: ["pcp", "endocrinology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [pharmacy_ids, default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 5
        expired_count: 2
      outputs: [active_rx_ids]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 2
      outputs: [upcoming_ids, completed_ids]
    - use: lab_results_panel
      params:
        resulted_count: 2
        abnormal_count: 0
      outputs: [resulted_lab_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    active_rx_ids: "{output.active_rx_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Medication wallet card review'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP medication-wallet-card review appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Medication wallet card review'
          and a.datetime == min(
            slot['datetime']
            for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The medication-wallet-card review used the next available PCP slot
    - expr: >-
        state.patient.emergency_contact is not None
        and state.patient.emergency_contact.name != ''
      desc: Emergency contact information is present on profile
    - expr: >-
        len(state.patient.allergies) >= 3
      desc: Allergy list has at least 3 entries
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: All active prescriptions remain active and unmodified
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        state.patient.emergency_contact is not None
        and state.patient.emergency_contact.name != ''
        and state.patient.emergency_contact.phone != ''
      desc: Emergency contact was not blanked
      penalty: 0.25
    - expr: >-
        not any(a for a in ['Penicillin', 'Sulfa', 'Shellfish']
                if a not in state.patient.allergies)
      desc: No original allergy entries were removed
      penalty: 0.25
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.15
