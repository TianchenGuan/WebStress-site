task_id: pp_multi_referral_chain
env_id: patient_portal
title: Multi-Referral Chain Management
instruction_template: 'Manage a referral chain: your PCP referred you to a cardiologist,
  and the cardiologist will then refer you to a cardiac surgeon. Complete the following
  in order: 1) Verify the cardiology referral is approved and pre-authorization is
  in place, 2) Schedule the cardiologist appointment, 3) After the cardiologist visit
  is scheduled, verify the cardiac surgery referral and pre-authorization, 4) Schedule
  the cardiac surgeon appointment after the cardiologist appointment date.'
difficulty: expert
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
- planning
start_path: /
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Coronary Artery Disease
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - cardiology
      - orthopedics
      - neurology
      - billing
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
      with_prior_auth: true
      must_have_specialties:
      - cardiology
    outputs:
    - approved_ref_ids
    - pending_ref_ids
    - prior_auth_ref_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 2
    outputs:
    - upcoming_ids
  - use: message_threads
    params:
      thread_count: 2
      unread_count: 1
      categories:
      - clinical
    outputs:
    - thread_ids
  targets:
    pcp_id: '{output.pcp_id}'
    cardio_provider_ids: '{output.providers_by_specialty.cardiology}'
    approved_ref_ids: '{output.approved_ref_ids}'
    prior_auth_ref_id: '{output.prior_auth_ref_id}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule the cardiologist appointment linked to the approved cardiology referral (prior-auth approved)."
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x in target['cardio_provider_ids']"
        linked_referral_id:
          expr: "x is not None and x in target['approved_ref_ids'] and any(r.id == x and r.to_specialty == 'cardiology' and r.status == 'approved' and (not r.prior_auth_required or r.prior_auth_status == 'approved') for r in initial.referrals)"
        datetime: {any: true}
        type: {any: true}
        reason: {any: true}
        notes: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
    - entity: Appointment
      desc: "Schedule a second downstream appointment for the cardiac-surgery follow-up. The seed does not contain a cardiac-surgeon provider or a cardiac-surgery referral (that referral would come from the cardiologist after the visit), so this second appointment is only required to be a new scheduled appointment distinct from the cardiology booking. Any new scheduled appointment (PCP follow-up, or a second cardiology slot if approved) satisfies the instruction's 'schedule the cardiac surgeon appointment' step within the seed-permissible world."
      properties:
        status: {eq: "scheduled"}
        provider_id: {any: true}
        linked_referral_id: {any: true}
        datetime: {any: true}
        type: {any: true}
        reason: {any: true}
        notes: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    - collection: state.appointments
      filter: "a.id in target['upcoming_ids']"
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing upcoming appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, modify, or approve any referral (read-only verification)"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
eval:
  source: server_state
  checks:
  - expr: "any(a.provider_id in {target.cardio_provider_ids}\n    and a.status ==\
      \ 'scheduled'\n    and a.id not in {target.upcoming_ids}\n    for a in state.appointments)"
    desc: Cardiologist appointment was scheduled
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in {target.upcoming_ids}]) >= 2"
    desc: At least two new appointments were scheduled
  negative_checks:
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
  - expr: "not any(\n  state.get_referral(rid) is not None\n  and state.get_referral(rid).status\
      \ == 'denied'\n  for rid in {target.approved_ref_ids}\n)"
    desc: No approved referrals were changed to denied
    penalty: 0.3
secondary_primitives: []
