task_id: pp_request_renewal
env_id: patient_portal
title: Request Prescription Renewal
instruction_template: Your {target.zero_refill_medication} has 0 refills remaining.
  Request a renewal so you can continue your medication.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- backtracking
start_path: /medications
seed:
  distractors: 6
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hyperlipidemia
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 3
      zero_refill_count: 1
      expired_count: 1
    outputs:
    - active_rx_ids
    - zero_refill_rx_id
    - zero_refill_medication
  targets:
    pcp_id: '{output.pcp_id}'
    zero_refill_rx_id: '{output.zero_refill_rx_id}'
    active_rx_ids: '{output.active_rx_ids}'
    zero_refill_medication: '{output.zero_refill_medication}'
canonical_diff:
  update:
    - entity: Prescription
      desc: "Move the zero-refill prescription to pending_renewal status"
      where:
        id: {expr: "x == target['zero_refill_rx_id']"}
      changes:
        status: {eq: "pending_renewal"}
  create:
    - entity: ClinicalMessage
      desc: "Submit a structured renewal request routed to the RX system (category=rx_renewal, linked to the zero-refill prescription)"
      properties:
        from_type: {eq: "patient"}
        category: {eq: "rx_renewal"}
        linked_entity_id:
          expr: "x == target['zero_refill_rx_id']"
        linked_entity_type: {eq: "prescription"}
        is_read: {eq: true}
        provider_id:
          expr: >-
            x in [r.provider_id for r in initial.prescriptions
                  if r.id == target['zero_refill_rx_id']]
        subject: {any: true}
        body: {any: true}
        thread_id: {any: true}
        is_urgent: {any: true}
  invariant:
    - collection: state.prescriptions
      filter: "a.id != target['zero_refill_rx_id']"
      preserve: ALL
    - collection: state.messages
      filter: "a.id in {x.id for x in initial.messages}"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not renew, refill, or modify other prescriptions"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify, delete, or alter pre-existing messages"
      ref: invariant[1]
      severity: medium
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not create or modify referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not submit more than one renewal request message"
      ref: create[0]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "any(r.id == '{target.zero_refill_rx_id}'\n    and r.status == 'pending_renewal'\n\
      \    for r in state.prescriptions)"
    desc: The zero-refill prescription status changed to pending_renewal
  - expr: "any(m.from_type == 'patient'\n    and m.category == 'rx_renewal'\n    and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n    for m in state.messages)"
    desc: A renewal request message was sent with rx_renewal category
  - expr: "len([r for r in state.prescriptions\n     if r.id == '{target.zero_refill_rx_id}'\n\
      \     and r.status == 'pending_renewal']) == 1"
    desc: Exactly one prescription was moved to pending_renewal
  negative_checks:
  - expr: "not any(r.id != '{target.zero_refill_rx_id}'\n        and r.status == 'pending_renewal'\n\
      \        and r.id in {target.active_rx_ids}\n        for r in state.prescriptions)"
    desc: Agent did not request renewal for prescriptions with remaining refills
    penalty: 0.2
  - expr: "len([m for m in state.messages\n     if m.from_type == 'patient'\n    \
      \ and m.id not in state._initial_snapshot.get('messages', {})]) <= 1"
    desc: Agent did not send excessive messages beyond the renewal request
    penalty: 0.15
secondary_primitives: []
