task_id: pp_insurance_formulary
env_id: patient_portal
title: Insurance Formulary Check
instruction_template: Your specialist recommended a new medication. Read the formulary
  message from that provider, then schedule exactly one follow-up appointment with
  the specialist using the next available endocrinology slot. Use the appointment
  reason exactly "Formulary medication decision". Do not send any messages and do
  not modify any prescriptions.
difficulty: expert
time_limit_seconds: 480
expected_steps: 28
primary_primitives:
- grounding
start_path: /messages
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - High Cholesterol
      - Type 2 Diabetes
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
    - insurance_plan_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 3
      expired_count: 1
    outputs:
    - active_rx_ids
  - use: message_threads
    params:
      thread_count: 4
      unread_count: 2
      categories:
      - clinical
      - rx_renewal
      include_rx_renewal: true
      body_context:
        type: formulary_info
        provider_specialty: endocrinology
        new_medication_name: Semaglutide 0.25mg weekly
        alternative_name: Metformin ER 500mg
        coverage_status: not covered
    outputs:
    - thread_ids
    - unread_msg_ids
    - all_msg_ids
    - context_msg_ids
  # PP-4: scheduling with a specialist requires an approved referral; the
  # backend booking API rejects the create with "No approved referral
  # exists for endocrinology." Seed one upfront so the task is solvable
  # without going through the messaging path that the instruction forbids.
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 0
      must_have_specialties:
      - endocrinology
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    endo_provider_ids: '{output.providers_by_specialty.endocrinology}'
    active_rx_ids: '{output.active_rx_ids}'
    all_msg_ids: '{output.all_msg_ids}'
    formulary_msg_id: '{output.context_msg_ids.formulary_info}'
canonical_diff:
  # Positive signals:
  #   (a) mark the endocrinologist's "Formulary Coverage Update" message
  #       (identified by seed output target.formulary_msg_id) as read;
  #   (b) create a new endocrinology follow-up appointment at the earliest
  #       available endo slot with the exact required reason.
  update:
    - entity: ClinicalMessage
      desc: "Mark the endocrinologist's Formulary Coverage Update message as read"
      where:
        # `where` only sees id + fields whose value changed, so match by id
        # against the deterministic target emitted by the message_threads
        # seed (the first provider message of the formulary_info thread).
        # Identity (from_type / provider_id / subject) is enforced at seed
        # time and asserted by the end-to-end tests.
        id:
          expr: "x == target['formulary_msg_id']"
      changes:
        is_read: {eq: true}
  create:
    - entity: Appointment
      desc: "Schedule one endocrinology follow-up at the next available endo slot"
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x in target['endo_provider_ids']"
        reason: {eq: "Formulary medication decision"}
        datetime:
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id in target['endo_provider_ids']
                     for s in p.available_slots)
  invariant:
    - collection: state.messages
      preserve: ALL
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify unrelated messages or send new ones"
      ref: invariant[0]
      severity: medium
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: "any(\n  m.from_type == 'provider'\n  and m.provider_id in {target.endo_provider_ids}\n\
      \  and m.subject == 'Formulary Coverage Update'\n  and m.id in state._initial_snapshot.get('messages',\
      \ {})\n  and state.get_message(m.id) is not None\n  and state.get_message(m.id).is_read\n\
      \  for m in state.messages\n)"
    desc: The endocrinology formulary message was read
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id in {target.endo_provider_ids}\n  and a.reason == 'Formulary\
      \ medication decision'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one endocrinology formulary-decision appointment was scheduled
  - expr: "all(rx.status == state._initial_snapshot['prescriptions'][rx.id]['status']\n\
      \    for rx in state.prescriptions\n    if rx.id in state._initial_snapshot.get('prescriptions',\
      \ {}))"
    desc: No existing prescriptions were modified
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
