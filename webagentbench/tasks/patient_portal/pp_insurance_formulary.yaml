task_id: pp_insurance_formulary
env_id: patient_portal
title: Insurance Formulary Check
instruction_template: >-
  Your specialist recommended a new medication. Check your messages for formulary
  information from the provider. If the recommended medication is not covered under
  your insurance plan, find the covered alternative mentioned in the provider's message
  and request that alternative instead by messaging the specialist. If it is covered,
  message the specialist confirming you would like to proceed.
difficulty: expert
time_limit_seconds: 480
expected_steps: 28
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
start_path: /messages

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["High Cholesterol", "Type 2 Diabetes"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, insurance_plan_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "billing"]
        must_include: ["pcp", "endocrinology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 3
        expired_count: 1
      outputs: [active_rx_ids]
    - use: message_threads
      params:
        thread_count: 4
        unread_count: 2
        categories: ["clinical", "rx_renewal"]
        include_rx_renewal: true
      outputs: [thread_ids, unread_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    endo_provider_ids: "{output.providers_by_specialty.endocrinology}"
    insurance_plan_name: "{output.insurance_plan_name}"
    active_rx_ids: "{output.active_rx_ids}"
    unread_msg_ids: "{output.unread_msg_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent sent at least one message
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id in {target.endo_provider_ids}
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent messaged the specialist who recommended the medication
    - expr: >-
        any(m.from_type == 'patient'
            and ('formulary' in m.body.lower()
                 or 'covered' in m.body.lower()
                 or 'alternative' in m.body.lower()
                 or 'proceed' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message references formulary status or coverage decision
    - expr: >-
        any(m.from_type == 'patient'
            and m.category == 'clinical'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message was sent with clinical category
    - expr: >-
        all(rx.status == state._initial_snapshot['prescriptions'][rx.id]['status']
            for rx in state.prescriptions
            if rx.id in state._initial_snapshot.get('prescriptions', {}))
      desc: No existing prescriptions were modified without authorization
  negative_checks:
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id not in {target.endo_provider_ids}
                and m.provider_id != '{target.pcp_id}'
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Agent did not message unrelated providers about formulary
      penalty: 0.2
    - expr: >-
        not any(m.from_type == 'patient'
                and m.category == 'billing'
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Agent did not send formulary request through billing channel
      penalty: 0.15
