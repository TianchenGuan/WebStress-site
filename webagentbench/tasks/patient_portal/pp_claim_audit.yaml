task_id: pp_claim_audit
env_id: patient_portal
title: Insurance Claim Audit
instruction_template: Review all your insurance claims. Identify all denied claims
  that are still eligible for appeal (appeal deadline has not passed and an EOB is
  available). From those eligible claims, select the top 3 by patient responsibility
  amount (highest first; if two claims tie, break the tie by claim ID). Appeal exactly
  those 3 claims using the claim appeal action. Do not appeal any other claim and
  do not send any messages.
difficulty: expert
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Back Pain
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - orthopedics
      - cardiology
      - radiology
      - billing
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 4
    outputs:
    - upcoming_ids
    - completed_ids
  - use: insurance_claims
    params:
      approved_count: 2
      denied_count: 5
      with_eob: true
      near_appeal_deadline: true
    outputs:
    - denied_claim_ids
    - appealable_claim_id
    - approved_claim_ids
    - top_3_appealable_claim_ids
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 0
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    denied_claim_ids: '{output.denied_claim_ids}'
    appealable_claim_id: '{output.appealable_claim_id}'
    approved_claim_ids: '{output.approved_claim_ids}'
    top_3_appealable_claim_ids: '{output.top_3_appealable_claim_ids}'
canonical_diff:
  update:
    - entity: InsuranceClaim
      desc: "Appeal the top 3 eligible denied claims (by patient responsibility, tiebreaker=cid)"
      bijection:
        over: "target['top_3_appealable_claim_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        status: {eq: "appealed"}
  invariant:
    # Every claim NOT in the top-3-appealable set must be preserved.
    # Filter scope exposes `a` + `target` only — no `initial`, no lambdas —
    # so the "eligible top 3" set must already be a scalar seed list.
    - collection: state.claims
      filter: "a.id not in target['top_3_appealable_claim_ids']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
    - collection: state.providers
      preserve: ALL
  named_invariants:
    - name: "Agent did not appeal, modify, or pay any claim outside the top-3 appealable set"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent did not modify providers"
      ref: invariant[8]
      severity: medium
    - name: "Agent did not appeal more or fewer than the top 3 eligible claims"
      ref: update[0]
      severity: high
eval:
  source: server_state
  checks:
  - expr: len([c for c in state.claims if c.status == 'appealed']) == 3
    desc: Exactly three claims were appealed
  - expr: "all(\n  state.get_claim(cid) is not None\n  and state.get_claim(cid).status\
      \ == 'appealed'\n  for cid in sorted(\n    [\n      cid for cid in {target.denied_claim_ids}\n\
      \      if state.get_claim(cid).eob_available\n      and state.get_claim(cid).appeal_deadline\
      \ >= state.created_at\n    ],\n    key=lambda cid: (\n      -float(state._initial_snapshot['claims'][cid]['patient_responsibility']),\n\
      \      cid,\n    ),\n  )[:3]\n)"
    desc: The top 3 eligible denied claims by patient responsibility were appealed
  - expr: "all(\n  state.get_claim(cid) is not None\n  and state.get_claim(cid).status\
      \ == 'denied'\n  for cid in [\n    cid for cid in {target.denied_claim_ids}\n\
      \    if cid not in sorted(\n      [\n        inner_cid for inner_cid in {target.denied_claim_ids}\n\
      \        if state.get_claim(inner_cid).eob_available\n        and state.get_claim(inner_cid).appeal_deadline\
      \ >= state.created_at\n      ],\n      key=lambda inner_cid: (\n        -float(state._initial_snapshot['claims'][inner_cid]['patient_responsibility']),\n\
      \        inner_cid,\n      ),\n    )[:3]\n  ]\n)"
    desc: No denied claim outside the exact top 3 eligible set was appealed
  - expr: "all(c.status == 'approved'\n    for c in state.claims\n    if c.id in {target.approved_claim_ids})"
    desc: Approved claims were not modified
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
