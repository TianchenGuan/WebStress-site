task_id: pp_claim_audit
env_id: patient_portal
title: Insurance Claim Audit
instruction_template: >-
  Review all your insurance claims. Identify all denied claims that are still eligible
  for appeal (appeal deadline has not passed and an EOB is available). From those
  eligible claims, select the top 3 by patient responsibility amount (highest first;
  if two claims tie, break the tie by claim ID). Send exactly one billing message for
  each of those 3 claims to the billing department, and include the claim ID and the
  linked appointment ID in each message. Do not message any other claims.
difficulty: expert
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /billing

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Back Pain"]
        insurance_tier: basic
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "orthopedics", "cardiology", "radiology", "billing"]
        must_include: ["pcp", "billing"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 4
      outputs: [upcoming_ids, completed_ids]
    - use: insurance_claims
      params:
        approved_count: 2
        denied_count: 5
        with_eob: true
        near_appeal_deadline: true
      outputs: [denied_claim_ids, appealable_claim_id, approved_claim_ids]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 0
      outputs: [approved_ref_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["billing"]
        include_billing: true
      outputs: [thread_ids, billing_thread_id]
  targets:
    pcp_id: "{output.pcp_id}"
    billing_provider_ids: "{output.providers_by_specialty.billing}"
    denied_claim_ids: "{output.denied_claim_ids}"
    appealable_claim_id: "{output.appealable_claim_id}"
    approved_claim_ids: "{output.approved_claim_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.category == 'billing'
          and m.provider_id in {target.billing_provider_ids}
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 3
      desc: Exactly three billing appeal messages were sent
    - expr: >-
        [
          m.linked_entity_id
          for m in sorted(
            [
              m for m in state.messages
              if m.from_type == 'patient'
              and m.category == 'billing'
              and m.provider_id in {target.billing_provider_ids}
              and m.id not in state._initial_snapshot.get('messages', {})
            ],
            key=lambda m: m.timestamp,
          )
        ] == sorted(
          [
            cid for cid in {target.denied_claim_ids}
            if state._initial_snapshot['claims'][cid]['eob_available']
            and state._initial_snapshot['claims'][cid]['appeal_deadline'] >= state.created_at
          ],
          key=lambda cid: (
            -float(state._initial_snapshot['claims'][cid]['patient_responsibility']),
            cid,
          ),
        )[:3]
      desc: The billing appeals target the top 3 eligible denied claims in the required order
    - expr: >-
        all(
          m.linked_entity_type == 'claim'
          and m.linked_entity_id in {target.denied_claim_ids}
          and m.linked_entity_id is not None
          and m.linked_entity_id in [
            cid for cid in sorted(
              [
                cid for cid in {target.denied_claim_ids}
                if state._initial_snapshot['claims'][cid]['eob_available']
                and state._initial_snapshot['claims'][cid]['appeal_deadline'] >= state.created_at
              ],
              key=lambda cid: (
                -float(state._initial_snapshot['claims'][cid]['patient_responsibility']),
                cid,
              ),
            )[:3]
          ]
          and m.linked_entity_id in m.body
          and state._initial_snapshot['claims'][m.linked_entity_id]['appointment_id'] in m.body
          for m in state.messages
          if m.from_type == 'patient'
          and m.category == 'billing'
          and m.provider_id in {target.billing_provider_ids}
          and m.id not in state._initial_snapshot.get('messages', {})
        )
      desc: Each appeal message names the claim and its linked appointment
    - expr: >-
        all(c.status != 'approved'
            for c in state.claims
            if c.id in {target.denied_claim_ids})
      desc: Denied claims were not incorrectly changed to approved
    - expr: >-
        all(c.status == 'approved'
            for c in state.claims
            if c.id in {target.approved_claim_ids})
      desc: Approved claims were not modified
  negative_checks:
    - expr: >-
        not any(
          m.from_type == 'patient'
          and m.category == 'billing'
          and m.provider_id in {target.billing_provider_ids}
          and m.id not in state._initial_snapshot.get('messages', {})
          and m.linked_entity_id not in [
            cid for cid in sorted(
              [
                cid for cid in {target.denied_claim_ids}
                if state._initial_snapshot['claims'][cid]['eob_available']
                and state._initial_snapshot['claims'][cid]['appeal_deadline'] >= state.created_at
              ],
              key=lambda cid: (
                -float(state._initial_snapshot['claims'][cid]['patient_responsibility']),
                cid,
              ),
            )[:3]
          ]
          for m in state.messages
        )
      desc: No billing appeal was sent for a claim outside the exact top 3
      penalty: 0.2
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 3
      desc: No extra patient messages were sent beyond the three appeals
      penalty: 0.2
    - expr: >-
        not any(
          m.from_type == 'patient'
          and m.category != 'billing'
          and m.id not in state._initial_snapshot.get('messages', {})
          for m in state.messages
        )
      desc: Appeals were not routed through a non-billing channel
      penalty: 0.15
