task_id: pp_medication_conflict
env_id: patient_portal
title: Medication Conflict Resolution
instruction_template: >-
  A new prescription has been added to your medication list. Check your active
  prescriptions for any listed drug interactions. Identify the conflicting pair,
  then schedule exactly one follow-up appointment with the prescribing provider
  of the newer medication using that provider's next available slot. Use the
  appointment reason exactly "Interaction review". Do not discontinue any
  medication and do not send any messages.
difficulty: expert
time_limit_seconds: 480
expected_steps: 30
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Atrial Fibrillation"]
        allergies: ["Penicillin"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        interaction_pair: true
      outputs: [active_rx_ids, interacting_rx_ids, interacting_medications]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 2
      outputs: [upcoming_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    interacting_rx_ids: "{output.interacting_rx_ids}"
    interacting_medications: "{output.interacting_medications}"
    active_rx_ids: "{output.active_rx_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == state.get_prescription(
            max({target.interacting_rx_ids},
                key=lambda rid: state.get_prescription(rid).last_filled)
          ).provider_id
          and a.reason == 'Interaction review'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one interaction-review appointment was scheduled with the prescriber of the newer conflicting medication
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id == state.get_prescription(
            max({target.interacting_rx_ids},
                key=lambda rid: state.get_prescription(rid).last_filled)
          ).provider_id
          and a.reason == 'Interaction review'
          and a.datetime == min(
            slot['datetime']
            for slot in state._initial_snapshot['providers'][
              state.get_prescription(
                max({target.interacting_rx_ids},
                    key=lambda rid: state.get_prescription(rid).last_filled)
              ).provider_id
            ]['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The interaction-review appointment used that provider's next available slot
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.interacting_rx_ids})
      desc: Neither interacting medication was discontinued by the agent
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: Agent did not discontinue any prescriptions
      penalty: 0.3
