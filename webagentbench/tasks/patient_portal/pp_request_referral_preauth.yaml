task_id: pp_request_referral_preauth
env_id: patient_portal
title: Complete Referral-to-Schedule Chain
instruction_template: 'Schedule a dermatology appointment, linking it to an approved
  referral whose pre-authorization (when required) is also approved. Choose the next
  available slot with an accepting dermatologist. Do not request new referrals, do
  not send any messages, and do not modify existing appointments.'
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 12
  steps:
  - use: patient_profile
    params:
      conditions:
      - Eczema
      - Psoriasis
      insurance_tier: premium
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - cardiology
      - dermatology
      - orthopedics
      - neurology
      - billing
      - admin
      must_include:
      - pcp
      - dermatology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
      denied_count: 1
      with_prior_auth: true
      must_have_specialties:
      - dermatology
    outputs:
    - approved_ref_ids
    - pending_ref_ids
    - denied_ref_ids
    - prior_auth_ref_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  targets:
    pcp_id: '{output.pcp_id}'
    approved_ref_ids: '{output.approved_ref_ids}'
    pending_ref_ids: '{output.pending_ref_ids}'
    denied_ref_ids: '{output.denied_ref_ids}'
    prior_auth_ref_id: '{output.prior_auth_ref_id}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one dermatology appointment. The 'verify referral' and 'confirm pre-auth' parts of the instruction are read-only; the backend already gates non-approved/non-preauthorized scheduling, so this create fires only after those prerequisites are satisfied."
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "state.get_provider(x) is not None and state.get_provider(x).specialty == 'dermatology'"
        linked_referral_id:
          expr: "x is not None and x in target['approved_ref_ids'] and any(r.id == x and r.to_specialty == 'dermatology' and r.status == 'approved' and (not r.prior_auth_required or r.prior_auth_status == 'approved') for r in initial.referrals)"
        datetime: {any: true}
        type: {any: true}
        reason: {any: true}
        notes: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, modify, or approve any referral (read-only verification)"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not send any messages"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
eval:
  source: server_state
  checks:
  - expr: "any(a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n\
      \    and state.get_provider(a.provider_id) is not None\n    and state.get_provider(a.provider_id).specialty\
      \ == 'dermatology'\n    for a in state.appointments)"
    desc: A new dermatology appointment was scheduled
  - expr: "any(r.status == 'approved'\n    and r.to_specialty == 'dermatology'\n \
      \   for r in state.referrals)"
    desc: An approved dermatology referral exists
  - expr: "(any(r.id == '{target.prior_auth_ref_id}'\n    and r.prior_auth_status\
      \ == 'approved'\n    for r in state.referrals)\nor not any(r.prior_auth_required\n\
      \           and r.to_specialty == 'dermatology'\n           for r in state.referrals))"
    desc: Pre-authorization is approved or was not required
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in {target.upcoming_ids}]) >= 1"
    desc: At least one new appointment was created
  negative_checks:
  - expr: "not any(a.status == 'scheduled'\n        and a.id not in {target.upcoming_ids}\n\
      \        and state.get_provider(a.provider_id) is not None\n        and state.get_provider(a.provider_id).specialty\
      \ not in ('dermatology',)\n        for a in state.appointments)"
    desc: Agent did not schedule with a provider of the wrong specialty
    penalty: 0.25
  - expr: "all(r.status != 'approved'\n    for r in state.referrals\n    if r.id in\
      \ {target.denied_ref_ids})"
    desc: Agent did not attempt to use a denied referral
    penalty: 0.2
secondary_primitives: []
