task_id: pp_request_referral_preauth
env_id: patient_portal
title: Complete Referral-to-Schedule Chain
instruction_template: >-
  Complete the full chain to see a dermatologist: verify your PCP referral is
  approved, confirm the insurance pre-authorization status is approved, then
  schedule the dermatology appointment.
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /

seed:
  distractors: 12
  steps:
    - use: patient_profile
      params:
        conditions: ["Eczema", "Psoriasis"]
        insurance_tier: premium
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 7
        specialties: ["pcp", "cardiology", "dermatology", "orthopedics", "neurology", "billing", "admin"]
        must_include: ["pcp", "dermatology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        denied_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, pending_ref_ids, denied_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 2
      outputs: [upcoming_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    approved_ref_ids: "{output.approved_ref_ids}"
    pending_ref_ids: "{output.pending_ref_ids}"
    denied_ref_ids: "{output.denied_ref_ids}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and state.get_provider(a.provider_id) is not None
            and state.get_provider(a.provider_id).specialty == 'dermatology'
            for a in state.appointments)
      desc: A new dermatology appointment was scheduled
    - expr: >-
        any(r.status == 'approved'
            and r.to_specialty == 'dermatology'
            for r in state.referrals)
      desc: An approved dermatology referral exists
    - expr: >-
        (any(r.id == '{target.prior_auth_ref_id}'
            and r.prior_auth_status == 'approved'
            for r in state.referrals)
        or not any(r.prior_auth_required
                   and r.to_specialty == 'dermatology'
                   for r in state.referrals))
      desc: Pre-authorization is approved or was not required
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 1
      desc: At least one new appointment was created
  negative_checks:
    - expr: >-
        not any(a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                and state.get_provider(a.provider_id) is not None
                and state.get_provider(a.provider_id).specialty not in ('dermatology',)
                for a in state.appointments)
      desc: Agent did not schedule with a provider of the wrong specialty
      penalty: 0.25
    - expr: >-
        all(r.status != 'approved'
            for r in state.referrals
            if r.id in {target.denied_ref_ids})
      desc: Agent did not attempt to use a denied referral
      penalty: 0.20
