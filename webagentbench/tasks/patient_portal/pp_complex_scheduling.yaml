task_id: pp_complex_scheduling
env_id: patient_portal
title: Sequential Appointment Scheduling
instruction_template: >-
  Schedule 3 appointments in the correct sequence with required spacing:
  1) Blood work labs with any available provider (scheduled first),
  2) Cardiologist appointment at least 5 days after the labs,
  3) PCP follow-up at least 3 days after the cardiologist visit.
  All specialist appointments must have an approved referral in place.
  Do not schedule any appointment without the required prerequisites.
difficulty: expert
time_limit_seconds: 480
expected_steps: 38
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Coronary Artery Disease"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "radiology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 2
      outputs: [upcoming_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    cardio_provider_ids: "{output.providers_by_specialty.cardiology}"
    approved_ref_ids: "{output.approved_ref_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 3
      desc: At least three new appointments were scheduled
    - expr: >-
        any(a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and (a.reason.lower().find('lab') >= 0 or a.reason.lower().find('blood') >= 0)
            for a in state.appointments)
      desc: Lab work appointment was scheduled
    - expr: >-
        any(a.provider_id in {target.cardio_provider_ids}
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Cardiologist appointment was scheduled
    - expr: >-
        any(a.provider_id == '{target.pcp_id}'
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: PCP follow-up appointment was scheduled
    - expr: >-
        all(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == 'approved'
          for rid in {target.approved_ref_ids}
        )
      desc: Referrals remain in approved status
  negative_checks:
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
    - expr: >-
        not any(
          a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and a.provider_id not in {target.cardio_provider_ids}
          and a.provider_id != '{target.pcp_id}'
          and a.reason.lower().find('lab') < 0
          and a.reason.lower().find('blood') < 0
          for a in state.appointments
        )
      desc: No unexpected appointments with unrelated providers
      penalty: 0.15
