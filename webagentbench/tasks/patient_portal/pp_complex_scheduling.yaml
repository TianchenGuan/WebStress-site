task_id: pp_complex_scheduling
env_id: patient_portal
title: Sequential Appointment Scheduling
instruction_template: >-
  Schedule 3 appointments in the correct sequence with required spacing:
  1) Blood work labs with any available provider (scheduled first),
  2) Cardiologist appointment at least 5 days after the labs,
  3) PCP follow-up at least 3 days after the cardiologist visit.
  All specialist appointments must have an approved referral in place.
  Do not schedule any appointment without the required prerequisites.
difficulty: expert
time_limit_seconds: 480
expected_steps: 38
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Coronary Artery Disease"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "radiology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 2
      outputs: [upcoming_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    cardio_provider_ids: "{output.providers_by_specialty.cardiology}"
    approved_ref_ids: "{output.approved_ref_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
        ]) == 3
      desc: Exactly three new appointments were scheduled
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and any(word in a.reason.lower() for word in ('lab', 'blood'))
        ]) == 1
      desc: Exactly one new lab appointment was scheduled
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and state.get_provider(a.provider_id) is not None
          and a.provider_id in {target.cardio_provider_ids}
          and not any(word in a.reason.lower() for word in ('lab', 'blood'))
        ]) == 1
      desc: Exactly one new cardiology appointment was scheduled
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and a.provider_id == '{target.pcp_id}'
          and not any(word in a.reason.lower() for word in ('lab', 'blood'))
        ]) == 1
      desc: Exactly one PCP follow-up appointment was scheduled
    - expr: >-
        (
          lambda lab_id=next(
            (a.id for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ),
          cardio_id=next(
            (a.id for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and state.get_provider(a.provider_id) is not None
            and a.provider_id in {target.cardio_provider_ids}
            and not any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ),
          pcp_id=next(
            (a.id for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and a.provider_id == '{target.pcp_id}'
            and not any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ):
          lab_id is not None and cardio_id is not None and pcp_id is not None
          and [
            a.id
            for a in sorted(
              [a for a in state.appointments
               if a.status == 'scheduled' and a.id not in {target.upcoming_ids}],
              key=lambda a: a.booked_at,
            )
          ] == [lab_id, cardio_id, pcp_id]
        )()
      desc: The appointments were created in the required booking order
    - expr: >-
        (
          lambda lab_dt=next(
            (a.datetime for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ),
          cardio_dt=next(
            (a.datetime for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and state.get_provider(a.provider_id) is not None
            and a.provider_id in {target.cardio_provider_ids}
            and not any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ):
          lab_dt is not None and cardio_dt is not None
          and (cardio_dt - lab_dt).days >= 5
        )()
      desc: The cardiology visit was at least 5 days after the labs
    - expr: >-
        (
          lambda pcp_dt=next(
            (a.datetime for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and a.provider_id == '{target.pcp_id}'
            and not any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ),
          cardio_dt=next(
            (a.datetime for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            and state.get_provider(a.provider_id) is not None
            and a.provider_id in {target.cardio_provider_ids}
            and not any(word in a.reason.lower() for word in ('lab', 'blood'))),
            None,
          ):
          pcp_dt is not None and cardio_dt is not None
          and (pcp_dt - cardio_dt).days >= 3
        )()
      desc: The PCP follow-up was at least 3 days after the cardiology visit
    - expr: >-
        all(
          state.get_referral(a.linked_referral_id) is not None
          and state.get_referral(a.linked_referral_id).status == 'approved'
          and state.get_referral(a.linked_referral_id).to_specialty == state.get_provider(a.provider_id).specialty
          for a in state.appointments
          if a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and state.get_provider(a.provider_id) is not None
          and state.get_provider(a.provider_id).specialty not in ('pcp', 'billing', 'admin')
        )
      desc: Every specialist appointment had an approved referral in place
  negative_checks:
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
    - expr: >-
        not any(
          a.status == 'scheduled'
          and a.id not in {target.upcoming_ids}
          and state.get_provider(a.provider_id) is not None
          and state.get_provider(a.provider_id).specialty not in ('pcp', 'billing', 'admin')
          and (
            a.linked_referral_id is None
            or state.get_referral(a.linked_referral_id) is None
            or state.get_referral(a.linked_referral_id).status != 'approved'
            or state.get_provider(a.provider_id).specialty != state.get_referral(a.linked_referral_id).to_specialty
          )
          for a in state.appointments
        )
      desc: No specialist appointment was scheduled without an approved referral
      penalty: 0.15
