task_id: pp_pay_claim
env_id: patient_portal
title: Pay Outstanding Balance
instruction_template: Pay the outstanding balance on your most recent approved insurance
  claim.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- verification
start_path: /billing
seed:
  distractors: 6
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 3
    outputs:
    - completed_ids
  - use: insurance_claims
    params:
      approved_count: 2
      denied_count: 1
      processing_count: 1
      with_eob: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
    - total_patient_responsibility
  targets:
    pcp_id: '{output.pcp_id}'
    approved_claim_ids: '{output.approved_claim_ids}'
    denied_claim_ids: '{output.denied_claim_ids}'
    total_patient_responsibility: '{output.total_patient_responsibility}'
canonical_diff:
  update:
    - entity: InsuranceClaim
      desc: "Pay the most recent approved claim (zero out patient_responsibility)"
      where:
        id:
          expr: >-
            x == max(
              target['approved_claim_ids'],
              key=lambda cid: (initial.get_claim(cid).service_date, cid),
            )
      changes:
        patient_responsibility: {eq: 0}
  invariant:
    - collection: state.claims
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not pay, appeal, or modify other insurance claims"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: "any(\n  c.id == max(\n    {target.approved_claim_ids},\n    key=lambda\
      \ cid: (\n      state._initial_snapshot['claims'][cid]['service_date'],\n  \
      \    cid,\n    ),\n  )\n  and c.status == 'approved'\n  and c.patient_responsibility\
      \ == 0\n  for c in state.claims\n)"
    desc: The most recent approved claim was paid in full
  - expr: "len([c for c in state.claims\n     if c.id in {target.approved_claim_ids}\n\
      \     and c.patient_responsibility == 0]) == 1"
    desc: Exactly one approved claim was paid
  - expr: "all(\n  c.patient_responsibility > 0\n  for c in state.claims\n  if c.id\
      \ in {target.approved_claim_ids}\n  and c.id != max(\n    {target.approved_claim_ids},\n\
      \    key=lambda cid: (\n      state._initial_snapshot['claims'][cid]['service_date'],\n\
      \      cid,\n    ),\n  )\n)"
    desc: Older approved claims were not paid instead
  negative_checks:
  - expr: "not any(c.id in {target.approved_claim_ids}\n        and c.id != max(\n\
      \          {target.approved_claim_ids},\n          key=lambda cid: (\n     \
      \       state._initial_snapshot['claims'][cid]['service_date'],\n          \
      \  cid,\n          ),\n        )\n        and c.patient_responsibility == 0\n\
      \        for c in state.claims)"
    desc: Agent did not pay a non-target approved claim
    penalty: 0.2
  - expr: "not any(c.id in {target.denied_claim_ids}\n        and c.patient_responsibility\
      \ == 0\n        for c in state.claims)"
    desc: Agent did not pay a denied claim instead of the target approved claim
    penalty: 0.2
  - expr: "not any(c.status == 'appealed'\n        and c.id in {target.denied_claim_ids}\n\
      \        for c in state.claims)"
    desc: Agent did not appeal a denied claim instead of paying
    penalty: 0.2
secondary_primitives: []
