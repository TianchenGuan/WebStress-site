task_id: pp_specialist_roundrobin
env_id: patient_portal
title: Specialist Round-Robin
instruction_template: >-
  Your cardiologist ordered an echocardiogram. The results are in your lab records
  and show an abnormal finding. Complete the following reactive chain:
  1) Find the abnormal echocardiogram result in your lab results,
  2) Message your cardiologist about the finding, citing the specific test value,
  3) The cardiologist's reply (in your messages) refers you to a cardiac surgeon
  — read that message,
  4) Verify the cardiac surgery referral is in place and pre-authorization is approved,
  5) Schedule a surgical consultation appointment.
  Do not schedule without the referral and pre-auth being confirmed.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
  - patience
  - exploration
start_path: /labs

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Coronary Artery Disease", "Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 7
        specialties: ["pcp", "cardiology", "orthopedics", "neurology", "radiology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 3
      outputs: [active_rx_ids]
    - use: lab_results_panel
      params:
        resulted_count: 4
        abnormal_count: 2
        critical_count: 0
      outputs: [resulted_lab_ids, abnormal_lab_ids]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, prior_auth_ref_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 2
      outputs: [upcoming_ids]
    - use: message_threads
      params:
        thread_count: 3
        unread_count: 2
        categories: ["clinical"]
      outputs: [thread_ids, unread_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    cardio_provider_ids: "{output.providers_by_specialty.cardiology}"
    abnormal_lab_ids: "{output.abnormal_lab_ids}"
    approved_ref_ids: "{output.approved_ref_ids}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    upcoming_ids: "{output.upcoming_ids}"
    active_rx_ids: "{output.active_rx_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id in {target.cardio_provider_ids}
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent messaged the cardiologist about the finding
    - expr: >-
        any(m.from_type == 'patient'
            and ('abnormal' in m.body.lower() or 'finding' in m.body.lower()
                 or 'result' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message references the abnormal finding
    - expr: >-
        (state.get_referral('{target.prior_auth_ref_id}') is not None
         and state.get_referral('{target.prior_auth_ref_id}').prior_auth_status == 'approved')
      desc: Cardiac surgery pre-authorization is verified as approved
    - expr: >-
        any(a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Surgical consultation appointment was scheduled
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: Existing prescriptions were not modified
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.id not in state._initial_snapshot.get('messages', {})]) >= 1
      desc: Agent sent at least one message
  negative_checks:
    - expr: >-
        not any(a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                and a.pre_auth_status != 'approved'
                and a.pre_auth_status != 'not_required'
                for a in state.appointments)
      desc: No appointments were scheduled without approved pre-authorization
      penalty: 0.3
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id == '{target.pcp_id}'
                and ('surgery' in m.body.lower() or 'surgeon' in m.body.lower())
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Agent did not route surgical consultation request to PCP instead of specialist
      penalty: 0.2
