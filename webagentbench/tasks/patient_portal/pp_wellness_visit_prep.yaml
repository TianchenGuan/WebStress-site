task_id: pp_wellness_visit_prep
env_id: patient_portal
title: Annual Wellness Visit Preparation
instruction_template: >-
  Prepare for your annual wellness visit by reviewing your health records and compiling
  a summary for your PCP. Identify: 1) any immunizations that are due or overdue,
  2) any applicable screenings that are overdue (next_due has passed),
  3) any prescriptions expiring within 30 days, and 4) any open referral questions.
  Compile all findings into a single message to your PCP ({target.pcp_name}).
  Do not send separate messages for each item.
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - patience
start_path: /

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Type 2 Diabetes"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, applicable_screening_names]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "billing"]
        must_include: ["pcp"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 3
        expiring_soon_count: 2
      outputs: [active_rx_ids, expiring_rx_ids]
    - use: immunization_record
      params:
        completed_count: 3
        due_count: 2
      outputs: [due_imm_ids, due_vaccine_names]
    - use: referral_chain
      params:
        approved_count: 1
        pending_count: 1
      outputs: [pending_ref_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    due_vaccine_names: "{output.due_vaccine_names}"
    expiring_rx_ids: "{output.expiring_rx_ids}"
    pending_ref_ids: "{output.pending_ref_ids}"
    applicable_screening_names: "{output.applicable_screening_names}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent sent a message to PCP
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('immuniz' in m.body.lower() or 'vaccin' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message mentions immunizations
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('screening' in m.body.lower() or 'overdue' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message mentions overdue screenings
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('prescription' in m.body.lower() or 'expir' in m.body.lower()
                 or 'refill' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message mentions expiring prescriptions
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('referral' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Message mentions open referral questions
  negative_checks:
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.provider_id == '{target.pcp_id}'
             and m.id not in state._initial_snapshot.get('messages', {})]) <= 1
      desc: Agent sent a single consolidated message, not multiple separate messages
      penalty: 0.2
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id != '{target.pcp_id}'
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Agent did not message non-PCP providers for wellness prep
      penalty: 0.15
