task_id: pp_read_lab_result
env_id: patient_portal
title: Check Lab Result and Schedule PCP Follow-Up
instruction_template: >-
  Review your most recent LDL Cholesterol result. In this seed it is above
  130 mg/dL, so schedule exactly one follow-up appointment with your PCP at the
  next available slot. Use the appointment reason exactly "LDL result follow-up".
  Do not send any messages.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
  - verification
start_path: /labs

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["High Cholesterol"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 4
        specialties: ["pcp", "cardiology"]
        must_include: ["pcp"]
      outputs: [provider_ids]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: lab_results_panel
      params:
        resulted_count: 3
        abnormal_count: 1
        trend_test: "LDL Cholesterol"
        trend_values: ["158"]
      outputs: [resulted_lab_ids, abnormal_lab_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'LDL result follow-up'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP follow-up appointment was scheduled with the required reason
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'LDL result follow-up'
          and a.datetime == min(
            slot['datetime']
            for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The follow-up used the next available PCP slot
    - expr: >-
        len([
          a for a in state.appointments
          if a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Agent created exactly one new appointment
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
