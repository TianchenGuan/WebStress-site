task_id: pp_coordinate_rx_transfer
env_id: patient_portal
title: Coordinate Pharmacy Transfer
instruction_template: >-
  Your default pharmacy is closing. Transfer all of your active prescriptions
  to another retail pharmacy in your pharmacy list, then update that pharmacy
  as your new default.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /medications

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Type 2 Diabetes"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "billing", "admin"]
        must_include: ["pcp"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 3
        include_mail_order: true
      outputs: [pharmacy_ids, default_pharmacy_id, mail_order_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 2
        zero_refill_count: 0
      outputs: [active_rx_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    active_rx_ids: "{output.active_rx_ids}"
    pharmacy_ids: "{output.pharmacy_ids}"
    default_pharmacy_id: "{output.default_pharmacy_id}"
    mail_order_pharmacy_id: "{output.mail_order_pharmacy_id}"

eval:
  source: server_state
  checks:
    - expr: >-
        state.default_pharmacy() is not None
        and state.default_pharmacy().id != '{target.default_pharmacy_id}'
      desc: Default pharmacy was changed to a different pharmacy
  negative_checks:
    - expr: >-
        state.default_pharmacy() is None
        or state.default_pharmacy().id != '{target.mail_order_pharmacy_id}'
      desc: Agent did not set mail-order pharmacy as new default
      penalty: 0.20
    - expr: >-
        all(r.status in ('active', 'expired', 'discontinued')
            for r in state.prescriptions
            if r.id in {target.active_rx_ids})
      desc: Agent did not inadvertently change prescription status
      penalty: 0.15
