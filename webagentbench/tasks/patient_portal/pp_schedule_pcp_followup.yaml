task_id: pp_schedule_pcp_followup
env_id: patient_portal
title: Schedule PCP Follow-Up
instruction_template: Schedule a follow-up appointment with your primary care physician
  for the next available in-person slot.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - dermatology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 1
    outputs:
    - upcoming_ids
  targets:
    pcp_id: '{output.pcp_id}'
    pcp_name: '{output.pcp_name}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one in-person PCP follow-up at the next available slot"
      properties:
        status: {eq: "scheduled"}
        type: {eq: "in-person"}
        provider_id:
          expr: "x == target['pcp_id']"
        datetime:
          # PP-3: filter slots to in-person only — the instruction asks for
          # the next in-person slot, but provider available_slots may
          # include both modalities and the bare min() could return a
          # telehealth slot the agent can't legally book.
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id == target['pcp_id']
                     for s in p.available_slots
                     if s.type == 'in-person')
  invariant:
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: "any(a.provider_id == '{target.pcp_id}' and a.status == 'scheduled'\n  \
      \  and a.type == 'in-person'\n    and a.id not in {target.upcoming_ids}\n  \
      \  for a in state.appointments)"
    desc: A new in-person appointment with the PCP exists
  - expr: "any(a.provider_id == '{target.pcp_id}' and a.status == 'scheduled'\n  \
      \  and a.id not in {target.upcoming_ids}\n    and a.datetime is not None\n \
      \   for a in state.appointments)"
    desc: The new PCP appointment has a scheduled time
  negative_checks:
  - expr: "not any(a.provider_id != '{target.pcp_id}' and a.status == 'scheduled'\n\
      \        and a.id not in {target.upcoming_ids}\n        for a in state.appointments)"
    desc: Agent did not schedule with a non-PCP provider
    penalty: 0.25
secondary_primitives: []
