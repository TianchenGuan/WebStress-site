task_id: pp_message_billing
env_id: patient_portal
title: Billing Follow-Up on Recent Approved Claim
instruction_template: Review your most recent approved claim, then schedule exactly one follow-up appointment with the billing
  department using the next available billing slot. Use the appointment reason exactly "Incorrect charge review". Do not send
  any messages.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 12
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - orthopedics
      - billing
      - admin
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 2
    outputs:
    - completed_ids
  - use: insurance_claims
    params:
      approved_count: 3
      denied_count: 2
      processing_count: 1
      with_eob: true
    outputs:
    - approved_claim_ids
  targets:
    approved_claim_ids: '{output.approved_claim_ids}'
    billing_provider_ids: '{output.providers_by_specialty.billing}'
canonical_diff:
  create:
  - entity: Appointment
    desc: Schedule one billing follow-up appointment at the next available billing slot for incorrect charge review
    properties:
      status:
        eq: scheduled
      reason:
        eq: Incorrect charge review
      provider_id:
        expr: x in target['billing_provider_ids']
      datetime:
        expr: "x == min(s.datetime for p in initial.providers\n         if p.id in target['billing_provider_ids']\n      \
          \   for s in p.available_slots)\n"
  invariant:
  - collection: state.appointments
    filter: a.id in {x.id for x in initial.appointments}
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.messages
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  named_invariants:
  - name: Agent did not cancel or modify pre-existing appointments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[1]
    severity: high
  - name: Agent did not send any messages
    ref: invariant[2]
    severity: high
  - name: Agent did not modify immunization records
    ref: invariant[3]
    severity: medium
  - name: Agent did not create or modify lab results
    ref: invariant[4]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[5]
    severity: critical
  - name: Agent did not touch referrals
    ref: invariant[6]
    severity: high
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n  and a.provider_id in {target.billing_provider_ids}\n\
      \  and a.reason == 'Incorrect charge review'\n  and a.id not in state._initial_snapshot.get('appointments', {})\n])\
      \ == 1"
    desc: Exactly one billing follow-up appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id in {target.billing_provider_ids}\n  and a.reason == 'Incorrect\
      \ charge review'\n  and a.datetime == min(\n    slot['datetime']\n    for provider_id in {target.billing_provider_ids}\n\
      \    for slot in state._initial_snapshot['providers'][provider_id]['available_slots']\n  )\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n  for a in state.appointments\n)"
    desc: The billing follow-up used the next available billing slot
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and m.id not in state._initial_snapshot.get('messages',\
      \ {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
