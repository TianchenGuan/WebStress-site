task_id: pp_cancel_appointment
env_id: patient_portal
title: Cancel an Upcoming Appointment
instruction_template: "Cancel your upcoming appointment with {target.provider_name} on {target.apt_date}."
difficulty: easy
time_limit_seconds: 120
expected_steps: 4
primary_primitives:
  - grounding
start_path: /

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id]
    - use: provider_directory
      params:
        count: 4
        specialties: ["pcp", "cardiology", "dermatology"]
        must_include: ["pcp"]
      outputs: [provider_ids]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 1
      outputs: [upcoming_ids, pcp_apt_id, pcp_apt_date]
  targets:
    target_apt_id: "{output.upcoming_ids.0}"
    provider_name: "{output.pcp_name}"
    apt_date: "{output.pcp_apt_date}"

canonical_diff:
  update:
    - entity: Appointment
      desc: "Cancel the specified appointment"
      where:
        id:
          expr: "x == target['target_apt_id']"
      changes:
        status: {eq: cancelled}
  invariant:
    - collection: state.appointments
      filter: "a.id != target['target_apt_id']"
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify other appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[1]
      severity: medium
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_appointment('{target.target_apt_id}') is not None
        and state.get_appointment('{target.target_apt_id}').status == 'cancelled'
      desc: Target appointment is cancelled
    - expr: >-
        (sum(1 for a in state.appointments if a.status == 'cancelled')
        > sum(1 for aid, snap in state._initial_snapshot.get('appointments', {}).items()
              if snap.get('status') == 'cancelled'))
      desc: More appointments are cancelled now than at session start
  negative_checks:
    - expr: >-
        all(
          a.status == state._initial_snapshot['appointments'][a.id]['status']
          for a in state.appointments
          if a.id != '{target.target_apt_id}'
          and a.id in state._initial_snapshot.get('appointments', {})
        )
      desc: Non-target appointments were not modified
      penalty: 0.25
