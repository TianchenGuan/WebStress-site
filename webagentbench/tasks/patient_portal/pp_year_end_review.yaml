task_id: pp_year_end_review
env_id: patient_portal
title: Year-End Health Maintenance Review
instruction_template: 'Conduct a comprehensive year-end health review using direct
  actions only: 1) For every due or overdue immunization, schedule exactly one appointment
  and use the vaccine name itself as the appointment reason, 2) For every overdue
  screening, schedule exactly one appointment and use the screening name itself as
  the appointment reason, 3) Use the expiring approved referral to schedule exactly
  one specialist follow-up appointment with reason "Expiring referral follow-up",
  4) Appeal every denied insurance claim that has an available EOB. Do not send any
  messages and do not discontinue any prescriptions.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 55
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      - Hypertension
      - High Cholesterol
      insurance_tier: standard
      overdue_screening_count: 2
    outputs:
    - pcp_id
    - pcp_name
    - applicable_screening_names
    - overdue_screening_names
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expiring_soon_count: 2
      expired_count: 1
    outputs:
    - active_rx_ids
    - expiring_rx_ids
  - use: immunization_record
    params:
      completed_count: 3
      due_count: 2
      series_incomplete: true
    outputs:
    - due_imm_ids
    - due_vaccine_names
    - incomplete_series_imm_id
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 1
      expiring_soon: true
    outputs:
    - approved_ref_ids
    - expiring_ref_id
    - pending_ref_ids
  - use: insurance_claims
    params:
      approved_count: 2
      denied_count: 3
      with_eob: true
      near_appeal_deadline: true
    outputs:
    - denied_claim_ids
    - appealable_claim_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 3
    outputs:
    - upcoming_ids
  targets:
    due_vaccine_names: '{output.due_vaccine_names}'
    expiring_ref_id: '{output.expiring_ref_id}'
    denied_claim_ids: '{output.denied_claim_ids}'
    applicable_screening_names: '{output.applicable_screening_names}'
    overdue_screening_names: '{output.overdue_screening_names}'
    expiring_rx_ids: '{output.expiring_rx_ids}'
canonical_diff:
  # Shape: multiple bijection creates on Appointment (due vaccines +
  # overdue screenings) + one non-bijection create for the expiring
  # referral follow-up + one bijection update on InsuranceClaim for the
  # appeals. Predicates use `reason` equality to keep the three appointment
  # bijections disjoint (hazard: multi-create-same-entity leak —
  # predicates must make candidate pools non-overlapping).
  create:
    - entity: Appointment
      desc: "Schedule one appointment per due/overdue immunization; reason = vaccine name"
      bijection:
        over: "target['due_vaccine_names']"
        variable: v
      properties:
        status: {eq: "scheduled"}
        reason:
          expr: "x == v"
    - entity: Appointment
      desc: "Schedule one appointment per overdue screening; reason = screening name"
      bijection:
        over: "target['overdue_screening_names']"
        variable: v
      properties:
        status: {eq: "scheduled"}
        reason:
          expr: "x == v"
    - entity: Appointment
      desc: "Schedule exactly one specialist follow-up using the expiring approved referral; reason must be 'Expiring referral follow-up'"
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: >-
            any(
              p.id == x
              and p.specialty == r.to_specialty
              for p in initial.providers
              for r in initial.referrals
              if r.id == target['expiring_ref_id']
            )
        reason: {eq: "Expiring referral follow-up"}
        linked_referral_id:
          expr: "x == target['expiring_ref_id']"
  update:
    - entity: InsuranceClaim
      desc: "Appeal every denied claim that has an available EOB (status -> appealed)"
      bijection:
        over: "target['denied_claim_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        status: {eq: "appealed"}
  invariant:
    # Pre-existing appointments must remain unchanged; the three creates
    # above are the only permitted appointment mutations.
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    # Claims not in the denied set must be preserved (approved / processing
    # / distractor). Filter scope exposes `a` + `target` only (hazard), so
    # we use the scalar seed list directly.
    - collection: state.claims
      filter: "a.id not in target['denied_claim_ids']"
      preserve: ALL
    # Prescriptions untouched — "do not discontinue any prescriptions".
    - collection: state.prescriptions
      preserve: ALL
    # No patient messages — "do not send any messages".
    - collection: state.messages
      preserve: ALL
    # Referrals remain as seeded (the agent links the existing expiring
    # approved referral to the new appointment but does not mutate it).
    - collection: state.referrals
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
    # PP-1: whitelist cancelled appointments from the unaccounted-create
    # sweep. Booking flows can leave cancelled tentatives. Appended at
    # end so existing named_invariant index references stay aligned.
    - collection: state.appointments
      filter: "a.status != 'cancelled'"
      preserve: ALL
      comprehensive: true
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify claims outside the denied set"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not discontinue or modify prescriptions"
      ref: invariant[2]
      severity: critical
    - name: "Agent did not send any patient messages"
      ref: invariant[3]
      severity: high
    - name: "Agent did not create or modify referrals"
      ref: invariant[4]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent scheduled exactly one expiring-referral follow-up appointment"
      ref: create[2]
      severity: high
    - name: "Agent appealed exactly the denied claims with an available EOB"
      ref: update[0]
      severity: high
secondary_primitives: []
