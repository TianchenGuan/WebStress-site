task_id: pp_update_default_pharmacy
env_id: patient_portal
title: Update Default Pharmacy
instruction_template: "Change your default pharmacy to {target.pharmacy_name}."
difficulty: easy
time_limit_seconds: 120
expected_steps: 4
primary_primitives:
  - grounding
start_path: /profile

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id]
    - use: provider_directory
      params:
        count: 3
        specialties: ["pcp", "cardiology"]
        must_include: ["pcp"]
      outputs: [provider_ids]
    - use: pharmacy_list
      params:
        count: 3
        must_include_name: ["Walgreens"]
        target_pharmacy_name: "Walgreens"
      outputs: [pharmacy_ids, default_pharmacy_id, target_pharmacy_id]
  targets:
    target_pharmacy_id: "{output.target_pharmacy_id}"
    pharmacy_name: "Walgreens #09832"
    original_default_id: "{output.default_pharmacy_id}"

canonical_diff:
  update:
    - entity: Pharmacy
      desc: "Set the target pharmacy as the new default"
      where:
        id: {expr: "x == target['target_pharmacy_id']"}
      changes:
        is_default: {eq: true}
    - entity: Pharmacy
      desc: "Remove default flag from the previous default pharmacy"
      where:
        id: {expr: "x == target['original_default_id']"}
      changes:
        is_default: {eq: false}
  invariant:
    - collection: state.pharmacies
      filter: "a.id != target['target_pharmacy_id'] and a.id != target['original_default_id']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not change default flag on other pharmacies"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[7]
      severity: high

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_pharmacy('{target.target_pharmacy_id}') is not None
        and state.get_pharmacy('{target.target_pharmacy_id}').is_default
      desc: Target pharmacy is now the default
    - expr: >-
        state.get_pharmacy('{target.original_default_id}') is None
        or not state.get_pharmacy('{target.original_default_id}').is_default
      desc: Previous default pharmacy is no longer default
  negative_checks:
    - expr: >-
        sum(1 for p in state.pharmacies if p.is_default) == 1
      desc: Exactly one pharmacy is set as default
      penalty: 0.3
