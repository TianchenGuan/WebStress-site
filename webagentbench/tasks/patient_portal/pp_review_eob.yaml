task_id: pp_review_eob
env_id: patient_portal
title: Review EOB and Pay Most Recent Claim
instruction_template: Review the Explanation of Benefits for your most recent approved
  claim and pay the patient responsibility on that claim in full. Do not pay or appeal
  any other claim, and do not send any messages.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - orthopedics
      - billing
      - admin
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 3
    outputs:
    - completed_ids
  - use: insurance_claims
    params:
      approved_count: 2
      denied_count: 1
      processing_count: 1
      with_eob: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
    - total_patient_responsibility
  targets:
    approved_claim_ids: '{output.approved_claim_ids}'
canonical_diff:
  # Previously used `oneof` with a constraint-only "do nothing" branch
  # (high-responsibility case). That branch passed vacuously because its
  # only constraint was an applicability gate on `initial.*` — the agent
  # scored 1.0 without any observable action (see audit_reports/w09.md
  # and eval-hardening-playbook §2.6). The task now always requires
  # payment of the most-recent approved claim.
  update:
    - entity: InsuranceClaim
      desc: "Pay the most recent approved claim in full (zero out patient_responsibility)"
      where:
        id:
          expr: >-
            x == max(
              target['approved_claim_ids'],
              key=lambda cid: (initial.get_claim(cid).service_date, cid),
            )
      changes:
        patient_responsibility: {eq: 0}
  invariant:
    - collection: state.claims
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not pay, appeal, or modify other insurance claims"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send any patient messages"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
secondary_primitives: []
