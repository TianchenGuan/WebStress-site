task_id: pp_complete_account_audit
env_id: patient_portal
title: Complete Account Audit
instruction_template: Audit your entire patient portal account for completeness and
  accuracy, then schedule exactly one follow-up appointment with an Administration
  department provider using the next available admin slot. Use the appointment reason
  exactly "Account audit review". Do not send any messages, do not cancel any existing
  appointments, and do not modify prescriptions or referral statuses.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 60
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Type 2 Diabetes
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
    - insurance_plan_name
    - member_id
    - group_number
  - use: provider_directory
    params:
      count: 7
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - admin
      - billing
      must_include:
      - pcp
      - admin
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 3
      include_mail_order: true
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
    - mail_order_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 2
    outputs:
    - active_rx_ids
  - use: immunization_record
    params:
      completed_count: 4
      due_count: 1
    outputs:
    - due_imm_ids
    - due_vaccine_names
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
    outputs:
    - approved_ref_ids
    - pending_ref_ids
  - use: insurance_claims
    params:
      approved_count: 3
      denied_count: 1
      with_eob: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 3
    outputs:
    - upcoming_ids
    - completed_ids
  targets:
    admin_provider_ids: '{output.providers_by_specialty.admin}'
    active_rx_ids: '{output.active_rx_ids}'
    approved_ref_ids: '{output.approved_ref_ids}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  # Single-appointment audit task:
  #   - Create exactly one new Appointment with an Administration-department (admin)
  #     provider, reason "Account audit review", datetime == the earliest slot
  #     across ALL admin providers' initial available_slots.
  #   - All other collections (prescriptions, referrals, messages, labs,
  #     claims, immunizations, pharmacies, non-new appointments) preserved.
  create:
    - entity: Appointment
      desc: >-
        Schedule exactly one appointment with an Administration-department admin
        provider at the earliest available admin slot; reason must be "Account audit review".
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Account audit review"}
        provider_id:
          expr: "x in target['admin_provider_ids']"
        datetime:
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id in target['admin_provider_ids']
                     for s in p.available_slots)
        type: {any: true}
        notes: {any: true}
        linked_referral_id: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    # Pre-existing appointments must remain untouched; create[0] above is
    # the only permitted appointment mutation.
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    # Audit says: do not modify prescriptions, do not change referral statuses,
    # do not send any messages. All other env collections are not mentioned
    # by the instruction so they get broad preserve-ALL invariants.
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: high
    - name: "Agent did not change referral statuses"
      ref: invariant[2]
      severity: high
    - name: "Agent did not send any patient messages"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
    - name: "Agent scheduled exactly one Administration audit appointment"
      ref: create[0]
      severity: high
secondary_primitives: []
