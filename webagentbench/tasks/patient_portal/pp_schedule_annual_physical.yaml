task_id: pp_schedule_annual_physical
env_id: patient_portal
title: Schedule Labs Before Physical
instruction_template: >-
  Schedule your annual physical with your PCP. Before the physical, schedule
  pre-visit lab work at least 3 days prior. Both appointments must be
  in-person visits.
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - verification
start_path: /appointments

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension", "Hyperlipidemia"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 6
        specialties: ["pcp", "cardiology", "endocrinology", "dermatology", "billing", "admin"]
        must_include: ["pcp"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 2
      outputs: [upcoming_ids]
    - use: lab_results_panel
      params:
        resulted_count: 3
        pending_count: 0
        abnormal_count: 0
      outputs: [resulted_lab_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 2
      desc: At least two new appointments were scheduled
    - expr: >-
        any(a.status == 'scheduled'
            and a.provider_id == '{target.pcp_id}'
            and a.type == 'in-person'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: A new in-person PCP appointment (physical) was scheduled
    - expr: >-
        any(a.status == 'scheduled'
            and a.type == 'in-person'
            and a.id not in {target.upcoming_ids}
            and 'lab' in a.reason.lower()
            for a in state.appointments)
        or len([a for a in state.appointments
                if a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}]) >= 2
      desc: A lab work appointment was scheduled
    - expr: >-
        all(a.type == 'in-person'
            for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids})
      desc: All new appointments are in-person
  negative_checks:
    - expr: >-
        not any(a.type == 'telehealth'
                and a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                for a in state.appointments)
      desc: Agent did not schedule telehealth visits instead of in-person
      penalty: 0.20
    - expr: >-
        not any(a.status == 'cancelled'
                and a.id in {target.upcoming_ids}
                for a in state.appointments)
      desc: Agent did not cancel existing appointments
      penalty: 0.15
