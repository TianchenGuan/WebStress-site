task_id: pp_schedule_annual_physical
env_id: patient_portal
title: Schedule Labs Before Physical
instruction_template: Schedule your annual physical with your PCP. Before the physical,
  schedule pre-visit lab work at least 3 days prior. Both appointments must be in-person
  visits.
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- planning
start_path: /appointments
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Hyperlipidemia
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  - use: lab_results_panel
    params:
      resulted_count: 3
      pending_count: 0
      abnormal_count: 0
    outputs:
    - resulted_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule an in-person annual physical with the PCP"
      properties:
        status: {eq: "scheduled"}
        type: {eq: "in-person"}
        provider_id:
          expr: "x == target['pcp_id']"
        reason:
          expr: "'physical' in x.lower() or 'annual' in x.lower()"
    - entity: Appointment
      desc: "Schedule an in-person pre-visit lab work appointment"
      properties:
        status: {eq: "scheduled"}
        type: {eq: "in-person"}
        reason:
          expr: "any(w in x.lower() for w in ['lab', 'blood', 'pre-visit', 'bloodwork'])"
  constraints:
    - desc: "Lab work is scheduled at least 3 days before the physical"
      expr: >
        all(
          (pcp.datetime - lab.datetime).days >= 3
          for pcp in state.appointments
          if pcp.status == 'scheduled'
          and pcp.provider_id == target['pcp_id']
          and ('physical' in pcp.reason.lower() or 'annual' in pcp.reason.lower())
          and pcp.id not in {x.id for x in initial.appointments}
          for lab in state.appointments
          if lab.status == 'scheduled'
          and any(w in lab.reason.lower() for w in ['lab', 'blood', 'pre-visit', 'bloodwork'])
          and lab.id not in {x.id for x in initial.appointments}
        )
        and any(
          pcp.status == 'scheduled'
          and pcp.provider_id == target['pcp_id']
          and ('physical' in pcp.reason.lower() or 'annual' in pcp.reason.lower())
          and pcp.id not in {x.id for x in initial.appointments}
          for pcp in state.appointments
        )
        and any(
          lab.status == 'scheduled'
          and any(w in lab.reason.lower() for w in ['lab', 'blood', 'pre-visit', 'bloodwork'])
          and lab.id not in {x.id for x in initial.appointments}
          for lab in state.appointments
        )
      severity: high
  invariant:
    - collection: state.appointments
      filter: "a.id in target['upcoming_ids']"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify pre-existing upcoming appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[1]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
secondary_primitives: []
