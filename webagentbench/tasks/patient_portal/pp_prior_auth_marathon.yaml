task_id: pp_prior_auth_marathon
env_id: patient_portal
title: Prior Authorization Marathon
instruction_template: >-
  You need three procedures that each require insurance pre-authorization:
  1) MRI (radiology department),
  2) Nerve conduction study (neurology department),
  3) Cortisone injection (orthopedics department).
  For each procedure:
  a) Verify the referral for that specialty exists and check its pre-auth status,
  b) If pre-auth is approved, schedule the appointment with that specialist,
  c) If pre-auth is still pending, message your PCP ({target.pcp_name}) about it.
  Route each scheduling request to the correct department. Do not schedule any
  procedure that does not have an approved pre-authorization.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
  - patience
  - exploration
start_path: /

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Herniated Disc", "Carpal Tunnel", "Shoulder Bursitis"]
        insurance_tier: basic
      outputs: [pcp_id, pcp_name, conditions_list]
    - use: provider_directory
      params:
        count: 8
        specialties: ["pcp", "radiology", "neurology", "orthopedics", "cardiology", "billing"]
        must_include: ["pcp", "radiology", "neurology", "orthopedics"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, pending_ref_ids, prior_auth_ref_id]
    - use: lab_results_panel
      params:
        resulted_count: 4
        abnormal_count: 1
      outputs: [resulted_lab_ids, abnormal_lab_ids]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 4
      outputs: [upcoming_ids, completed_ids]
    - use: message_threads
      params:
        thread_count: 3
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    radiology_provider_ids: "{output.providers_by_specialty.radiology}"
    neurology_provider_ids: "{output.providers_by_specialty.neurology}"
    ortho_provider_ids: "{output.providers_by_specialty.orthopedics}"
    approved_ref_ids: "{output.approved_ref_ids}"
    pending_ref_ids: "{output.pending_ref_ids}"
    prior_auth_ref_id: "{output.prior_auth_ref_id}"
    resulted_lab_ids: "{output.resulted_lab_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    # Sub-goal: schedule approved procedures
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 1
      desc: At least one new appointment was scheduled for an approved procedure
    - expr: >-
        all(a.pre_auth_status in ('approved', 'not_required')
            for a in state.appointments
            if a.status == 'scheduled'
            and a.id not in {target.upcoming_ids})
      desc: All newly scheduled appointments have approved pre-authorization
    # Sub-goal: message PCP about pending pre-auths
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('pending' in m.body.lower() or 'authorization' in m.body.lower()
                 or 'pre-auth' in m.body.lower() or 'waiting' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: PCP was messaged about pending pre-authorization
    # Sub-goal: referral verification
    - expr: >-
        all(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == 'approved'
          for rid in {target.approved_ref_ids}
        )
      desc: Approved referrals remain in approved status
    # Multi-chain evidence: messages or scheduling across specialties
    - expr: >-
        len([m for m in state.messages
             if m.from_type == 'patient'
             and m.id not in state._initial_snapshot.get('messages', {})]) >= 1
      desc: Agent sent at least one message
    - expr: >-
        any(m.from_type == 'patient'
            and ('referral' in m.body.lower() or 'procedure' in m.body.lower()
                 or 'MRI' in m.body or 'nerve' in m.body.lower()
                 or 'cortisone' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Messages reference specific procedures or referrals
  negative_checks:
    - expr: >-
        not any(a.status == 'scheduled'
                and a.id not in {target.upcoming_ids}
                and a.pre_auth_status not in ('approved', 'not_required')
                for a in state.appointments)
      desc: No appointments were scheduled without approved pre-authorization
      penalty: 0.3
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id in {target.radiology_provider_ids}
                and ('nerve' in m.body.lower() or 'cortisone' in m.body.lower())
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Wrong procedure details were not sent to radiology
      penalty: 0.2
    - expr: >-
        not any(m.from_type == 'patient'
                and m.provider_id in {target.neurology_provider_ids}
                and ('MRI' in m.body or 'cortisone' in m.body.lower())
                and m.id not in state._initial_snapshot.get('messages', {})
                for m in state.messages)
      desc: Wrong procedure details were not sent to neurology
      penalty: 0.2
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.15
