task_id: pp_dispute_claim
env_id: patient_portal
title: Dispute Denied Insurance Claim
instruction_template: Your most recent denied insurance claim has an available EOB. Review the EOB, then file an appeal for
  that claim before the appeal deadline passes.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- state_tracking
start_path: /billing
seed:
  distractors: 14
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - orthopedics
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 4
    outputs:
    - completed_ids
  - use: insurance_claims
    params:
      approved_count: 4
      denied_count: 4
      processing_count: 1
      with_eob: true
      near_appeal_deadline: true
    outputs:
    - approved_claim_ids
    - denied_claim_ids
    - appealable_claim_id
    - most_recent_denied_claim_id
    - total_patient_responsibility
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 0
    outputs:
    - approved_ref_ids
  targets:
    pcp_id: '{output.pcp_id}'
    approved_claim_ids: '{output.approved_claim_ids}'
    denied_claim_ids: '{output.denied_claim_ids}'
    appealable_claim_id: '{output.appealable_claim_id}'
    most_recent_denied_claim_id: '{output.most_recent_denied_claim_id}'
    approved_ref_ids: '{output.approved_ref_ids}'
canonical_diff:
  update:
  - entity: InsuranceClaim
    desc: File appeal on the most-recent denied claim (status -> appealed)
    where:
      id:
        expr: "x == max(\n  target['denied_claim_ids'],\n  key=lambda cid: (initial.get_claim(cid).service_date, cid),\n)"
    changes:
      status:
        eq: appealed
  invariant:
  - collection: state.claims
    filter: a.id != target['most_recent_denied_claim_id']
    preserve: ALL
  - collection: state.appointments
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.messages
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  named_invariants:
  - name: Agent did not appeal, modify, or pay any other insurance claim
    ref: invariant[0]
    severity: critical
  - name: Agent did not create, cancel, or modify appointments
    ref: invariant[1]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[2]
    severity: high
  - name: Agent did not modify immunization records
    ref: invariant[3]
    severity: medium
  - name: Agent did not create or modify lab results
    ref: invariant[4]
    severity: high
  - name: Agent did not send unsolicited messages
    ref: invariant[5]
    severity: medium
  - name: Agent did not touch referrals
    ref: invariant[6]
    severity: high
  - name: Agent did not modify pharmacies
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify providers
    ref: invariant[8]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "any(\n  c.id == max(\n    {target.denied_claim_ids},\n    key=lambda cid: (\n      state._initial_snapshot['claims'][cid]['service_date'],\n\
      \      cid,\n    ),\n  )\n  and c.status == 'appealed'\n  for c in state.claims\n)"
    desc: The most recent denied claim was appealed
  - expr: "all(\n  c.status == state._initial_snapshot['claims'][c.id]['status']\n  for c in state.claims\n  if c.id in {target.denied_claim_ids}\n\
      \  and c.id != max(\n    {target.denied_claim_ids},\n    key=lambda cid: (\n      state._initial_snapshot['claims'][cid]['service_date'],\n\
      \      cid,\n    ),\n  )\n)"
    desc: Older denied claims were not appealed instead
  negative_checks:
  - expr: "not any(\n  c.id in {target.approved_claim_ids}\n  and c.status != state._initial_snapshot['claims'][c.id]['status']\n\
      \  for c in state.claims\n)"
    desc: Agent did not modify any approved claim
    penalty: 0.25
secondary_primitives: []
