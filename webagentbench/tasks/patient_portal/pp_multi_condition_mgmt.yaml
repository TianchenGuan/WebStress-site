task_id: pp_multi_condition_mgmt
env_id: patient_portal
title: Multi-Condition Coordination
instruction_template: >-
  Manage your three chronic conditions (diabetes, hypertension, cardiac monitoring):
  1) Schedule quarterly lab work for each condition (HbA1c for diabetes, kidney
  function for hypertension, lipid panel for cardiac),
  2) Verify all three condition-related medications are current and active,
  3) Ensure specialist visits are scheduled for both cardiology and endocrinology
  (with approved referrals),
  4) Check that no medication interactions exist across your prescriptions.
  If interactions are found, message your PCP with the details.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 55
primary_primitives:
  - grounding
  - planning
  - state_tracking
  - verification
  - backtracking
  - patience
  - exploration
start_path: /

seed:
  distractors: 10
  steps:
    - use: patient_profile
      params:
        conditions: ["Type 2 Diabetes", "Hypertension", "Coronary Artery Disease"]
        allergies: ["Sulfa"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name, conditions_list]
    - use: provider_directory
      params:
        count: 7
        specialties: ["pcp", "cardiology", "endocrinology", "neurology", "radiology", "billing"]
        must_include: ["pcp", "cardiology", "endocrinology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 5
        interaction_pair: true
      outputs: [active_rx_ids, interacting_rx_ids, interacting_medications]
    - use: referral_chain
      params:
        approved_count: 2
        pending_count: 1
        with_prior_auth: true
      outputs: [approved_ref_ids, pending_ref_ids, prior_auth_ref_id]
    - use: lab_results_panel
      params:
        resulted_count: 4
        abnormal_count: 1
        trend_test: "HbA1c"
        trend_values: ["6.5", "7.2", "7.8"]
      outputs: [resulted_lab_ids, trend_lab_ids]
    - use: appointment_history
      params:
        upcoming_count: 2
        completed_count: 3
      outputs: [upcoming_ids, completed_ids]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [thread_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    pcp_name: "{output.pcp_name}"
    conditions_list: "{output.conditions_list}"
    cardio_provider_ids: "{output.providers_by_specialty.cardiology}"
    endo_provider_ids: "{output.providers_by_specialty.endocrinology}"
    active_rx_ids: "{output.active_rx_ids}"
    interacting_rx_ids: "{output.interacting_rx_ids}"
    interacting_medications: "{output.interacting_medications}"
    approved_ref_ids: "{output.approved_ref_ids}"
    upcoming_ids: "{output.upcoming_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.appointments
             if a.status == 'scheduled'
             and a.id not in {target.upcoming_ids}]) >= 2
      desc: At least two new appointments were scheduled
    - expr: >-
        any(a.provider_id in {target.cardio_provider_ids}
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Cardiology appointment was scheduled
    - expr: >-
        any(a.provider_id in {target.endo_provider_ids}
            and a.status == 'scheduled'
            and a.id not in {target.upcoming_ids}
            for a in state.appointments)
      desc: Endocrinology appointment was scheduled
    - expr: >-
        all(rx.status == 'active'
            for rx in state.prescriptions
            if rx.id in {target.active_rx_ids})
      desc: All condition-related medications remain active
    - expr: >-
        (any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and ('interaction' in m.body.lower() or 'conflict' in m.body.lower())
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
        or len({target.interacting_rx_ids}) == 0)
      desc: PCP was notified about interactions or no interactions exist
    - expr: >-
        all(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == 'approved'
          for rid in {target.approved_ref_ids}
        )
      desc: Specialist referrals remain approved
  negative_checks:
    - expr: >-
        all(
          state.get_appointment(aid) is not None
          and state.get_appointment(aid).status != 'cancelled'
          for aid in {target.upcoming_ids}
        )
      desc: Existing appointments were not cancelled
      penalty: 0.2
    - expr: >-
        not any(rx.status == 'discontinued'
                for rx in state.prescriptions
                if rx.id in {target.active_rx_ids})
      desc: No medications were discontinued without authorization
      penalty: 0.3
    - expr: >-
        not any(
          state.get_referral(rid) is not None
          and state.get_referral(rid).status == 'denied'
          for rid in {target.approved_ref_ids}
        )
      desc: Approved referrals were not changed to denied
      penalty: 0.25
