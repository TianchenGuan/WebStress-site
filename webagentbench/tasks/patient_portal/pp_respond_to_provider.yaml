task_id: pp_respond_to_provider
env_id: patient_portal
title: Review Provider Message and Schedule Follow-Up
instruction_template: Your PCP sent you a message about adjusting your blood pressure
  medication. Read the message, then schedule exactly one PCP follow-up appointment
  using the next available PCP slot. Use the appointment reason exactly "Blood pressure
  medication adjustment follow-up". Do not reply and do not send any messages.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- grounding
start_path: /messages
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: message_threads
    params:
      thread_count: 4
      unread_count: 2
      categories:
      - clinical
      - scheduling
      include_billing: true
      body_context:
        type: bp_medication_adjustment
    outputs:
    - thread_ids
    - unread_msg_ids
    - all_msg_ids
    - context_msg_ids
  targets:
    pcp_id: '{output.pcp_id}'
    all_msg_ids: '{output.all_msg_ids}'
    thread_ids: '{output.thread_ids}'
    bp_msg_id: '{output.context_msg_ids.bp_medication_adjustment}'
canonical_diff:
  # Positive signals:
  #   (a) mark the PCP's "Blood Pressure Medication Adjustment" message
  #       (identified by seed output target.bp_msg_id) as read;
  #   (b) create a new PCP follow-up appointment at the earliest available PCP
  #       slot with the exact required reason.
  update:
    - entity: ClinicalMessage
      desc: "Mark the PCP's Blood Pressure Medication Adjustment message as read"
      where:
        # `where` only sees id + fields whose value changed, so match by id
        # against the deterministic target emitted by the message_threads
        # seed (the first provider message of the bp_medication_adjustment
        # thread). Identity (from_type / provider_id / subject) is enforced
        # at seed time and asserted by the end-to-end tests.
        id:
          expr: "x == target['bp_msg_id']"
      changes:
        is_read: {eq: true}
  create:
    - entity: Appointment
      desc: "Schedule one PCP follow-up at the next available PCP slot"
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x == target['pcp_id']"
        reason: {eq: "Blood pressure medication adjustment follow-up"}
        datetime:
          expr: >
            x == min(s.datetime for p in initial.providers
                     if p.id == target['pcp_id'] for s in p.available_slots)
  invariant:
    - collection: state.messages
      preserve: ALL
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify unrelated messages or send new ones"
      ref: invariant[0]
      severity: medium
    - name: "Agent did not cancel or modify pre-existing appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify prescriptions"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
secondary_primitives: []
