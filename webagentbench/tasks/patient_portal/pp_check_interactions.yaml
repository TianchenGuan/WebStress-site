task_id: pp_check_interactions
env_id: patient_portal
title: Check Medication Interactions
instruction_template: >-
  Check if any of your active prescriptions have listed drug interactions with
  each other. If interactions exist, message your PCP listing the interacting
  medications.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
  - grounding
  - planning
start_path: /medications

seed:
  distractors: 6
  steps:
    - use: patient_profile
      params:
        conditions: ["Atrial Fibrillation", "Hyperlipidemia"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "dermatology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
        interaction_pair: true
      outputs: [active_rx_ids, interacting_rx_ids, interacting_medications]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [all_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    interacting_rx_ids: "{output.interacting_rx_ids}"
    interacting_medications: "{output.interacting_medications}"
    all_msg_ids: "{output.all_msg_ids}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and m.provider_id == '{target.pcp_id}'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Agent sent a message to the PCP about interactions
    - expr: >-
        any(m.from_type == 'patient'
            and m.category == 'clinical'
            and m.id not in {target.all_msg_ids}
            for m in state.messages)
      desc: Message was sent with clinical category
    - expr: >-
        len([r for r in state.prescriptions
             if r.id in {target.interacting_rx_ids}
             and r.status == 'active']) == 2
      desc: Both interacting prescriptions remain active (agent did not discontinue)
  negative_checks:
    - expr: >-
        not any(r.status == 'discontinued'
                and r.id in {target.interacting_rx_ids}
                for r in state.prescriptions)
      desc: Agent did not discontinue either interacting medication
      penalty: 0.25
