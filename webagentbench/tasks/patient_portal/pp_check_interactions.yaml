task_id: pp_check_interactions
env_id: patient_portal
title: Check Medication Interactions
instruction_template: >-
  Check if any of your active prescriptions have listed drug interactions with
  each other. In this seed there is an interacting pair, so schedule exactly one
  follow-up appointment with your PCP at the next available slot. Use the appointment
  reason exactly "Drug interaction review". Do not send any messages and do not
  discontinue any medications.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
  - grounding
  - planning
start_path: /medications

seed:
  distractors: 6
  steps:
    - use: patient_profile
      params:
        conditions: ["Atrial Fibrillation", "Hyperlipidemia"]
        insurance_tier: standard
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "endocrinology", "dermatology", "billing"]
        must_include: ["pcp", "cardiology"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: prescription_cabinet
      params:
        active_count: 4
        expired_count: 1
        interaction_pair: true
      outputs: [active_rx_ids, interacting_rx_ids, interacting_medications]
  targets:
    pcp_id: "{output.pcp_id}"
    interacting_rx_ids: "{output.interacting_rx_ids}"
    interacting_medications: "{output.interacting_medications}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([
          a for a in state.appointments
          if a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Drug interaction review'
          and a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Exactly one PCP interaction-review appointment was scheduled
    - expr: >-
        any(
          a.status == 'scheduled'
          and a.provider_id == '{target.pcp_id}'
          and a.reason == 'Drug interaction review'
          and a.datetime == min(
            slot['datetime']
            for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']
          )
          and a.id not in state._initial_snapshot.get('appointments', {})
          for a in state.appointments
        )
      desc: The interaction-review appointment used the next available PCP slot
    - expr: >-
        len([r for r in state.prescriptions
             if r.id in {target.interacting_rx_ids}
             and r.status == 'active']) == 2
      desc: Both interacting prescriptions remain active
  negative_checks:
    - expr: >-
        len([
          m for m in state.messages
          if m.from_type == 'patient'
          and m.id not in state._initial_snapshot.get('messages', {})
        ]) == 0
      desc: Agent did not send any patient messages
      penalty: 0.2
    - expr: >-
        len([
          a for a in state.appointments
          if a.id not in state._initial_snapshot.get('appointments', {})
        ]) == 1
      desc: Agent created exactly one new appointment
      penalty: 0.15
