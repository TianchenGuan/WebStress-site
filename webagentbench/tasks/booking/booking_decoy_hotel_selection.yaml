task_id: booking_decoy_hotel_selection
env_id: booking
title: Identify Correct Hotel Among Decoys and Book It
instruction_template: 'Search for hotels in Paris named "Le Marais". You will find
  three similarly-named properties. The correct one to book is the "Le Marais" hotel
  that has BOTH of these characteristics: a review score of exactly {target.target_review_score}
  AND has "Rooftop Bar" in its amenities. Book the "Deluxe Room" at that specific
  property for 2 guests checking in on 2026-05-20 and checking out on 2026-05-24 (4
  nights). Use the default Visa payment method (ending in 4242) and enter your name
  and email from your profile.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 10
  actors: {}
  steps:
  - use: decoy_property
    params:
      name: Le Marais Boutique Hotel
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.3
      review_count: 1567
      price: 220.0
      neighborhood: Le Marais
      amenities:
      - Free WiFi
      - Rooftop Bar
      - Air conditioning
      - Restaurant
      distance_km: 0.5
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Le Marais Palace
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.9
      review_count: 2345
      price: 280.0
      neighborhood: Le Marais
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Fitness center
      - Restaurant
      distance_km: 0.3
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  - use: featured_property
    params:
      name: Le Marais Grand Hotel
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.9
      review_count: 1890
      price: 250.0
      neighborhood: Le Marais
      address: 12 Rue des Archives, 75004 Paris
      distance_km: 0.4
      amenities:
      - Free WiFi
      - Rooftop Bar
      - Spa
      - Fitness center
      - Restaurant
      - Bar
      - Room service
      - Air conditioning
      - Concierge
      popular_facilities:
      - Rooftop Bar
      - Spa
      - Free WiFi
      - Restaurant
      rooms:
      - name: Standard Room
        price: 250.0
        bed_type: double
        max_occupancy: 2
        meals_included: none
        cancel_type: free_cancellation
      - name: Deluxe Room
        price: 310.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 30.0
      - name: Junior Suite
        price: 420.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    target_review_score: '8.9'
canonical_diff:
  create:
    - entity: Reservation
      desc: Book Deluxe Room at the correct Le Marais property (score 8.9 with Rooftop Bar)
      properties:
        property_id: {expr: "x == target['property_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Deluxe Room"}
        check_in: {eq: "2026-05-20"}
        check_out: {eq: "2026-05-24"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {expr: "x.full_name == initial.owner_name and x.email == initial.owner_email"}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['property_id'] or a.check_in != '2026-05-20'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the correct Le Marais property (not a decoy)
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
