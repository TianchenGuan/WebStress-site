task_id: booking_decoy_hotel_selection
env_id: booking
title: Identify Correct Hotel Among Decoys and Book It
instruction_template: 'Search for hotels in Paris named "Le Marais". You will find three similarly-named
  properties. The correct one to book is the "Le Marais" hotel that has BOTH of these characteristics:
  a review score of exactly {target.target_review_score} AND has "Rooftop Bar" in its amenities. Book
  the "Deluxe Room" at that specific property for 2 guests checking in on 2026-05-20 and checking out
  on 2026-05-24 (4 nights). Use the default Visa payment method (ending in 4242) and enter your name and
  email from your profile.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
- planning
secondary_primitives:
- state_tracking
start_path: /home
seed:
  distractors: 10
  actors: {}
  steps:
  - use: decoy_property
    params:
      name: Le Marais Boutique Hotel
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.3
      review_count: 1567
      price: 220.0
      neighborhood: Le Marais
      amenities:
      - Free WiFi
      - Rooftop Bar
      - Air conditioning
      - Restaurant
      distance_km: 0.5
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Le Marais Palace
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.9
      review_count: 2345
      price: 280.0
      neighborhood: Le Marais
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Fitness center
      - Restaurant
      distance_km: 0.3
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  - use: featured_property
    params:
      name: Le Marais Grand Hotel
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.9
      review_count: 1890
      price: 250.0
      neighborhood: Le Marais
      address: 12 Rue des Archives, 75004 Paris
      distance_km: 0.4
      amenities:
      - Free WiFi
      - Rooftop Bar
      - Spa
      - Fitness center
      - Restaurant
      - Bar
      - Room service
      - Air conditioning
      - Concierge
      popular_facilities:
      - Rooftop Bar
      - Spa
      - Free WiFi
      - Restaurant
      rooms:
      - name: Standard Room
        price: 250.0
        bed_type: double
        max_occupancy: 2
        meals_included: none
        cancel_type: free_cancellation
      - name: Deluxe Room
        price: 310.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 30.0
      - name: Junior Suite
        price: 420.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    target_review_score: '8.9'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.status == 'confirmed'\n  for r in\
      \ state.reservations\n)\n"
    desc: Reservation created at the correct Le Marais property
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.room_type_name == 'Deluxe Room'\n\
      \  for r in state.reservations\n)\n"
    desc: Booked the Deluxe Room specifically
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.check_in == '2026-05-20' and\n  r.check_out\
      \ == '2026-05-24'\n  for r in state.reservations\n)\n"
    desc: Correct check-in and check-out dates
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.guests == 2 and r.nights == 4\n  for\
      \ r in state.reservations\n)\n"
    desc: Correct guest count and number of nights
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and e.payload.get('property_id') != '{target.property_id}'\n\
      \  for e in state.audit_log\n)\n"
    desc: No reservation made at a decoy property
    penalty: 0.5
  - expr: 'sum(1 for r in state.reservations if not r.id.startswith(''res_initial_'')) <= 1

      '
    desc: Only one new reservation was created
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.property_id}' and\n  r.room_type_name == 'Standard Room'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book the Standard Room instead of Deluxe
    penalty: 0.2
  - expr: not any(e.action == 'message.send' for e in state.audit_log)
    desc: No off-task hotel messages were sent
    penalty: 0.1
  - expr: not any(e.action.startswith('saved_list.') for e in state.audit_log)
    desc: No off-task saved-list mutations were made
    penalty: 0.1
