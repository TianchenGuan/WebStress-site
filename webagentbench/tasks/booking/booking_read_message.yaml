task_id: booking_read_message
env_id: booking
title: "Read an Unread Message from a Hotel"
instruction_template: >
  Go to your messages and open the unread message with the subject
  "{target.message_subject}" from {target.property_name}.
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
  - grounding
start_path: /messages
seed:
  distractors: 4
  actors: {}
  steps:
    - use: featured_property
      params:
        name: "Alpine Lodge Retreat"
        city: "Zurich"
        country: "Switzerland"
        star_rating: 4
        review_score: 8.9
        price: 220.00
      outputs:
        - property_id
        - property_name
        - cheapest_room_id
        - cheapest_room_name
    - use: send_message
      params:
        property_id: "{output.property_id}"
        subject: "Your upcoming stay - important information"
        body: "Dear guest, we would like to inform you that complimentary airport shuttle is available. Please reply with your flight details."
        sender: "Alpine Lodge Retreat"
        read: false
      outputs:
        - message_id
  targets:
    message_id: "{output.message_id}"
    message_subject: "Your upcoming stay - important information"
    property_name: "{output.property_name}"
eval:
  source: server_state
  checks:
    - expr: >
        any(
          m.id == '{target.message_id}' and m.read == True
          for m in state.messages
        )
      desc: "The target message has been marked as read"
  negative_checks:
    - expr: >
        not any(
          e.action == 'message.send'
          for e in state.audit_log
        )
      desc: "No unintended message was sent as a reply"
      penalty: 0.1
