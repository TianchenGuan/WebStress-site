task_id: booking_frontier_loyalty_maximizer
env_id: booking
title: 'Frontier: Maximize Genius Loyalty - Book 3 Discounted Properties Across Cities'
instruction_template: "Maximize your Genius Level 2 benefits:\n1. Search London and find \"{target.london_name}\"\
  \ (a Genius property).\n   Book its \"Genius Deluxe Room\" for 2 guests,\n   checking in 2026-10-01,\
  \ checking out 2026-10-04 (3 nights),\n   using default Visa (ending 4242).\n2. Search Paris and find\
  \ \"{target.paris_name}\" (a Genius property).\n   Book its \"Genius Suite\" for 2 guests,\n   checking\
  \ in 2026-10-05, checking out 2026-10-08 (3 nights),\n   using Mastercard ending in 8888.\n3. Search\
  \ Tokyo and find \"{target.tokyo_name}\" (a Genius property).\n   Book its \"Genius Premium Room\" for\
  \ 2 guests,\n   checking in 2026-10-10, checking out 2026-10-13 (3 nights),\n   using Amex ending in\
  \ 1234.\n4. Save all three Genius properties to a new list called\n   \"Genius October Tour\".\n5. Update\
  \ travel preferences: set preferred currency to \"GBP\".\n6. Send a message to \"{target.london_name}\"\
  \ with subject\n   \"Genius benefits\" and body \"As a Genius Level 2 member,\n   are there any additional\
  \ complimentary upgrades available?\"\n7. Write a review for your completed stay at \"{target.review_name}\"\
  :\n   score 9.5, title \"Genius perks made the difference\",\n   positive \"The Genius discount was\
  \ excellent and the free\n   room upgrade was a wonderful surprise\", no negative,\n   leisure, couple.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- planning
secondary_primitives:
- state_tracking
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Genius Club London
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.8
      review_count: 3200
      price: 280.0
      neighborhood: Covent Garden
      address: 10 Great Queen Street, London WC2B
      genius_discount_pct: 15
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      rooms:
      - name: Standard Room
        price: 280.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Genius Deluxe Room
        price: 350.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        original_price: 412.0
    outputs:
    - london_id
    - london_name
    - london_room_id
    - london_room_name
  - use: featured_property
    params:
      name: Genius Paris Boutique
      city: Paris
      country: France
      star_rating: 4
      review_score: 9.0
      review_count: 2800
      price: 320.0
      neighborhood: Saint-Germain
      address: 25 Rue de Seine, 75006 Paris
      genius_discount_pct: 10
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Garden
      - Concierge
      rooms:
      - name: Classic Room
        price: 320.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Genius Suite
        price: 480.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
        original_price: 533.0
        room_size_sqm: 50.0
    outputs:
    - paris_id
    - paris_name
    - paris_room_id
    - paris_room_name
  - use: featured_property
    params:
      name: Genius Tokyo Tower Hotel
      city: Tokyo
      country: Japan
      star_rating: 4
      review_score: 8.6
      review_count: 4100
      price: 240.0
      neighborhood: Minato
      address: 3-1-5 Shibakoen, Minato-ku, Tokyo
      genius_discount_pct: 10
      amenities:
      - Free WiFi
      - Restaurant
      - Fitness center
      - Concierge
      - Onsen
      rooms:
      - name: Standard Twin
        price: 240.0
        bed_type: twin
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Genius Premium Room
        price: 320.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        original_price: 356.0
    outputs:
    - tokyo_id
    - tokyo_name
    - tokyo_room_id
    - tokyo_room_name
  - use: featured_property
    params:
      name: The Genius Collection Zurich
      city: Zurich
      country: Switzerland
      star_rating: 5
      review_score: 9.2
      review_count: 2100
      price: 450.0
      genius_discount_pct: 15
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Fitness center
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-01-15'
      check_out: '2026-01-19'
      price_per_night: 450.0
      status: completed
      guests: 2
      booked_days_ago: 85
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  - use: set_preferences
    params:
      preferred_currency: USD
    outputs:
    - prefs_updated
  targets:
    london_id: '{output.london_id}'
    london_name: '{output.london_name}'
    paris_id: '{output.paris_id}'
    paris_name: '{output.paris_name}'
    tokyo_id: '{output.tokyo_id}'
    tokyo_name: '{output.tokyo_name}'
    review_prop_id: '{output.review_prop_id}'
    review_name: '{output.review_prop_name}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.london_id}' and\n  r.status == 'confirmed' and\n  r.room_type_name\
      \ == 'Genius Deluxe Room' and\n  r.check_in == '2026-10-01' and r.check_out == '2026-10-04'\n  for\
      \ r in state.reservations\n)\n"
    desc: London Genius hotel booked with correct room and dates
  - expr: "any(\n  r.property_id == '{target.paris_id}' and\n  r.status == 'confirmed' and\n  r.room_type_name\
      \ == 'Genius Suite' and\n  r.check_in == '2026-10-05' and r.check_out == '2026-10-08'\n  for r in\
      \ state.reservations\n)\n"
    desc: Paris Genius hotel booked with correct room and dates
  - expr: "any(\n  r.property_id == '{target.tokyo_id}' and\n  r.status == 'confirmed' and\n  r.room_type_name\
      \ == 'Genius Premium Room' and\n  r.check_in == '2026-10-10' and r.check_out == '2026-10-13'\n \
      \ for r in state.reservations\n)\n"
    desc: Tokyo Genius hotel booked with correct room and dates
  - expr: "any(sl.name == 'Genius October Tour' and\n  '{target.london_id}' in sl.property_ids and\n \
      \ '{target.paris_id}' in sl.property_ids and\n  '{target.tokyo_id}' in sl.property_ids\n  for sl\
      \ in state.saved_lists)\n"
    desc: All three Genius properties in Genius October Tour list
  - expr: state.travel_preferences.preferred_currency == 'GBP'
    desc: Preferred currency updated to GBP
  - expr: "any(m.property_id == '{target.london_id}' and m.sender == 'guest'\n  and 'genius' in m.body.lower()\
      \ and 'upgrade' in m.body.lower()\n  for m in state.messages)\n"
    desc: Message sent to London hotel about Genius upgrades
  - expr: "any(rv.property_id == '{target.review_prop_id}' and\n  rv.overall_score == 9.5 and rv.title\
      \ == 'Genius perks made the difference'\n  for rv in state.reviews)\n"
    desc: Review written with correct score and title
  - expr: "any(rv.property_id == '{target.review_prop_id}' and\n  'room upgrade' in rv.positive.lower()\n\
      \  for rv in state.reviews)\n"
    desc: Review positive mentions room upgrade
  negative_checks:
  - expr: "sum(1 for r in state.reservations\n  if not r.id.startswith('res_initial_') and r.status ==\
      \ 'confirmed') <= 3\n"
    desc: Exactly three new reservations created
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.london_id}' and\n  r.room_type_name == 'Standard Room'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book Standard Room at London hotel
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.paris_id}' and\n  r.room_type_name == 'Classic Room'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book Classic Room at Paris hotel
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.tokyo_id}' and\n  r.room_type_name == 'Standard Twin'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book Standard Twin at Tokyo hotel
    penalty: 0.2
  - expr: 'sum(1 for sl in state.saved_lists if sl.name == ''Genius October Tour'') <= 1

      '
    desc: Only one Genius October Tour list created
    penalty: 0.1
