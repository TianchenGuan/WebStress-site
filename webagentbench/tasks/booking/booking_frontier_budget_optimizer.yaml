        view_type: avenue
    outputs:
    - paris_trap_prop_id
    - paris_trap_prop_name
    - paris_trap_room_id
    - paris_trap_room_name
  targets:
    name_1: '{output.prop_name_1}'
    name_2: '{output.prop_name_2}'
    name_3: '{output.prop_name_3}'
    name_4: '{output.prop_name_4}'
    prop_id_1: '{output.prop_id_1}'
    prop_id_2: '{output.prop_id_2}'
    prop_id_3: '{output.prop_id_3}'
    prop_id_4: '{output.prop_id_4}'
    winner_id: '{output.prop_id_2}'
    winner_name: '{output.prop_name_2}'
    winner_score: '9.1'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
    review_res_id: '{output.review_res_id}'
    venice_prop_id: '{output.venice_prop_id}'
    venice_prop_name: '{output.venice_prop_name}'
    venice_room_id: '{output.venice_room_id}'
    venice_trap_prop_id: '{output.venice_trap_prop_id}'
    venice_trap_prop_name: '{output.venice_trap_prop_name}'
    paris_prop_id: '{output.paris_prop_id}'
    paris_prop_name: '{output.paris_prop_name}'
    paris_room_id: '{output.paris_room_id}'
    paris_trap_prop_id: '{output.paris_trap_prop_id}'
    paris_trap_prop_name: '{output.paris_trap_prop_name}'
    combined_budget: 2100.0
canonical_diff:
  update:
  - entity: travel_preferences
    desc: Preferred currency updated to EUR
    where: {id: {eq: "__singleton_travel_preferences__"}}
    changes:
      preferred_currency: {eq: EUR}
  - entity: Reservation
    desc: Review submission flips rating_submitted on the reviewed reservation
    where:
      id:
        expr: x == target['review_res_id']
    changes:
      rating_submitted:
        any: true
  create:
  - entity: Reservation
    desc: Book the best budget hotel (Alfama Heritage) cheapest room for 5 nights
    properties:
      property_id:
        expr: x == target['winner_id']
      property_name:
        any: true
      room_type_id:
        any: true
      room_type_name:
        any: true
      check_in:
        eq: '2026-09-15'
      check_out:
        eq: '2026-09-20'
      nights:
        eq: 5
      guests:
        eq: 2
      rooms:
        any: true
      price_per_night:
        expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['winner_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"
      total_price:
        any: true
      taxes_and_fees:
        any: true
      currency:
        any: true
      status:
        eq: confirmed
      booked_at:
        any: true
      guest_info:
        any: true
      payment_method_id:
        expr: >-
          x == initial.settings.default_payment_id and
          any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
      cancellation_policy:
        any: true
      confirmation_number:
        any: true
      is_genius_deal:
        any: true
      genius_discount:
        any: true
      meals_included:
        any: true
      rating_submitted:
        any: true
  - entity: Reservation
    desc: Book the cheapest-all-in Venice hotel (Venetian Canal Inn) for 2 nights
    properties:
      property_id:
        expr: x == target['venice_prop_id']
      property_name:
        any: true
      room_type_id:
        any: true
      room_type_name:
        any: true
      check_in:
        eq: '2026-09-09'
      check_out:
        eq: '2026-09-11'
      nights:
        eq: 2
      guests:
        eq: 2
      rooms:
        any: true
      price_per_night:
        expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['venice_prop_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"
      total_price:
        any: true
      taxes_and_fees:
        any: true
      currency:
        any: true
      status:
        eq: confirmed
      booked_at:
        any: true
      guest_info:
        any: true
      payment_method_id:
        expr: >-
          x == initial.settings.default_payment_id and
          any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
      cancellation_policy:
        any: true
      confirmation_number:
        any: true
      is_genius_deal:
        any: true
      genius_discount:
        any: true
      meals_included:
        any: true
      rating_submitted:
        any: true
  - entity: Reservation
    desc: Book the cheapest-all-in Paris hotel (Left Bank Parisian) for 2 nights
    properties:
      property_id:
        expr: x == target['paris_prop_id']
      property_name:
        any: true
      room_type_id:
        any: true
      room_type_name:
        any: true
      check_in:
        eq: '2026-09-22'
      check_out:
        eq: '2026-09-24'
      nights:
        eq: 2
      guests:
        eq: 2
      rooms:
        any: true
      price_per_night:
        expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['paris_prop_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"
      total_price:
        any: true
      taxes_and_fees:
        any: true
      currency:
        any: true
      status:
        eq: confirmed
      booked_at:
        any: true
      guest_info:
        any: true
      payment_method_id:
        expr: >-
          x == initial.settings.default_payment_id and
          any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
      cancellation_policy:
        any: true
      confirmation_number:
        any: true
      is_genius_deal:
        any: true
      genius_discount:
        any: true
      meals_included:
        any: true
      rating_submitted:
        any: true
  - entity: SavedList
    desc: Save three alternative properties to Lisbon Alternatives
    properties:
      name:
        eq: Lisbon Alternatives
      property_ids:
        expr: target['prop_id_1'] in x and target['prop_id_3'] in x and target['prop_id_4']
          in x
      created_at:
        any: true
      updated_at:
        any: true
  - entity: Message
    desc: Send special request message to booked property
    properties:
      property_id:
        expr: x == target['winner_id']
      property_name:
        any: true
      reservation_id:
        any: true
      subject:
        expr: '''special'' in x.lower() or ''request'' in x.lower()'
      body:
        expr: '''quiet'' in x.lower()'
      sender:
        eq: guest
      read:
        any: true
      created_at:
        any: true
  - entity: Review
    desc: Write review for completed Lisbon Riverside stay
    properties:
      property_id:
        expr: x == target['review_prop_id']
      reservation_id:
        any: true
      author_name:
        any: true
      author_country:
        any: true
      overall_score:
        eq: 8.0
      scores:
        any: true
      title:
        eq: Charming Lisbon gem
      positive:
        expr: '''pasteis de nata'' in x.lower()'
      negative:
        expr: '''elevator'' in x.lower()'
      room_type:
        any: true
      travel_purpose:
        eq: leisure
      traveled_with:
        eq: couple
      stay_date:
        any: true
      created_at:
        any: true
      helpful_count:
        any: true
      property_response:
        any: true
  invariant:
  - collection: state.reservations
    filter: a.property_id != target['winner_id'] and a.property_id != target['venice_prop_id']
      and a.property_id != target['paris_prop_id'] and a.id != target['review_res_id']
    preserve: ALL
  - collection: state.properties
    filter: "a.id not in (target['review_prop_id'],)"
    comprehensive: true
    preserve: ALL
  - collection: state.reviews
    filter: a.property_id != target['review_prop_id']
    preserve: ALL
  - collection: state.saved_lists
    filter: a.name != 'Lisbon Alternatives'
    preserve: ALL
  - collection: state.messages
    filter: a.sender == 'property' or a.property_id != target['winner_id']
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  - collection: state.travel_preferences
    filter: 'False'
    preserve: ALL
    comprehensive: true
  constraints:
  - desc: Combined all-in total for the three new bookings is at most 2100
    expr: >-
      sum(
        r.total_price for r in state.reservations
        if r.property_id in (target['winner_id'], target['venice_prop_id'], target['paris_prop_id'])
      ) <= target['combined_budget']
    severity: critical
  named_invariants:
  - name: Preferred currency updated to EUR
    ref: update[0]
    severity: medium
  - name: Agent booked the best budget Lisbon hotel with correct dates
    ref: create[0]
    severity: critical
  - name: Agent booked the cheapest-all-in Venice hotel with correct dates
    ref: create[1]
    severity: critical
  - name: Agent booked the cheapest-all-in Paris hotel with correct dates
    ref: create[2]
    severity: critical
  - name: Agent saved three alternatives to Lisbon Alternatives list
    ref: create[3]
    severity: high
  - name: Agent sent special request message to booked Lisbon hotel
    ref: create[4]
    severity: medium
  - name: Agent wrote review for completed Lisbon stay
    ref: create[5]
    severity: high
  - name: Agent did not modify other reservations
    ref: invariant[0]
    severity: high
  - name: Agent did not modify properties
    ref: invariant[1]
    severity: medium
  - name: Agent did not write reviews for other properties
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify other saved lists
    ref: invariant[3]
    severity: medium
  - name: Agent only messaged the booked property
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[5]
    severity: high
  - name: Agent did not create spurious notifications
    ref: invariant[6]
    severity: low
