task_id: booking_frontier_budget_optimizer
env_id: booking
title: 'Frontier: Budget-Constrained Hotel Selection with Comparison and Lists'
instruction_template: "Plan a three-city trip and stay within a COMBINED all-in budget\
  \ of $2100 across all three hotel bookings. The all-in total for each booking includes\
  \ base + taxes + city fee + cleaning fee + any resort fee. Use the booking page's\
  \ fee breakdown before you confirm each booking\n1. Lisbon (checking in 2026-09-15,\
  \ checking out 2026-09-20 - 5 nights).\n   Compare these four Lisbon properties:\
  \ \"{target.name_1}\", \"{target.name_2}\", \"{target.name_3}\", \"{target.name_4}\"\
  . Among those whose cheapest room is under $200/night, find the one with the HIGHEST\
  \ review score and book its cheapest room for 2 guests using the default Visa (ending\
  \ 4242).\n\
  2. Venice (checking in 2026-09-09, checking out 2026-09-11 - 2 nights).\n   Book\
  \ the cheapest-all-in hotel in Venice for 2 guests. One Venice\n   option is a beach\
  \ resort with a lower nightly rate but a $25/night\n   resort fee - the non-resort\
  \ option wins on all-in price.\n3. Paris (checking in 2026-09-22, checking out 2026-09-24\
  \ - 2 nights).\n   Book the cheapest-all-in hotel in Paris for 2 guests (same resort\n\
  \   trap applies - read the fee breakdown).\nThe SUM of the three all-in total_prices\
  \ must be at most $2100.\n4. Save the three Lisbon alternatives (all Lisbon properties\
  \ except the\n   booked one) to a new list called \"Lisbon Alternatives\".\n5. Send\
  \ a message to the booked Lisbon property with subject\n   \"Special requests\"\
  \ and body \"I would like a quiet room on a\n   higher floor if possible.\"\n6.\
  \ Write a review for your completed stay at \"{target.review_prop_name}\" in Lisbon:\n\
  \   score 8.0, title \"Charming Lisbon gem\", positive \"Beautiful tile\n   work\
  \ and wonderful breakfast with pasteis de nata\", negative\n   \"Elevator was out\
  \ of service for one day\", leisure, couple.\n7. Update travel preferences: set\
  \ preferred currency to \"EUR\".\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 42
primary_primitives:
- planning
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: Lisbon
      country: Portugal
      properties:
