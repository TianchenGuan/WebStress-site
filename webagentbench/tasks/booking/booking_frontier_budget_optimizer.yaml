    - venice_room_id
    - venice_room_name
  - use: featured_property
    params:
      name: Lido Beach Venezia Resort
      city: Venice
      country: Italy
      property_type: resort
      star_rating: 4
      review_score: 8.8
      review_count: 2010
      price: 160.0
      neighborhood: Lido
      address: 8 Lungomare Marconi, 30126 Venice Lido
      amenities:
      - Free WiFi
      - Beach access
      - Pool
      - Spa
      - Restaurant
      distance_km: 6.0
      rooms:
      - name: Beachside Room
        price: 160.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
      - name: Lagoon Suite
        price: 260.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
    outputs:
    - venice_trap_prop_id
    - venice_trap_prop_name
    - venice_trap_room_id
    - venice_trap_room_name
  - use: featured_property
    params:
      name: Left Bank Parisian Hotel
      city: Paris
      country: France
      property_type: hotel
      star_rating: 3
      review_score: 8.5
      review_count: 1650
      price: 170.0
      neighborhood: Saint-Germain
      address: 25 Rue Jacob, 75006 Paris
      amenities:
      - Free WiFi
      - Bar
      - Restaurant
      - Air conditioning
      distance_km: 1.5
      rooms:
      - name: Classic Parisian Room
        price: 170.0
        bed_type: double
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
      - name: Deluxe Parisian Suite
        price: 260.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: courtyard
    outputs:
    - paris_prop_id
    - paris_prop_name
    - paris_room_id
    - paris_room_name
  - use: featured_property
    params:
      name: Champs-Elysees Grand Resort
      city: Paris
      country: France
      property_type: resort
      star_rating: 4
      review_score: 8.9
      review_count: 3120
      price: 170.0
      neighborhood: Champs-Elysees
      address: 10 Avenue Hoche, 75008 Paris
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
      - Fitness center
