    - prop_id_4
    - prop_name_4
  - use: featured_property
    params:
      name: Lisbon Riverside Retreat
      city: Lisbon
      country: Portugal
      star_rating: 3
      review_score: 8.2
      review_count: 900
      price: 110.0
      neighborhood: Santos
      amenities:
      - Free WiFi
      - Bar
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-02-05'
      check_out: '2026-02-09'
      price_per_night: 110.0
      status: completed
      guests: 2
      booked_days_ago: 65
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  - use: set_preferences
    params:
      preferred_currency: USD
    outputs:
    - prefs_updated
  - use: featured_property
    params:
      name: Venetian Canal Inn
      city: Venice
      country: Italy
      property_type: hotel
      star_rating: 3
      review_score: 8.6
      review_count: 1420
      price: 160.0
      neighborhood: Cannaregio
