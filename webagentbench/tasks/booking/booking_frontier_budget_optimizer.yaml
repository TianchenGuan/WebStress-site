task_id: booking_frontier_budget_optimizer
env_id: booking
title: 'Frontier: Budget-Constrained Hotel Selection with Comparison and Lists'
instruction_template: "Plan a three-city trip and stay within a COMBINED all-in\
  \ budget of $2100 across all three hotel bookings. The all-in total for\
  \ each booking includes base + taxes + city fee + cleaning fee + any resort\
  \ fee. Use the booking page's fee breakdown before you confirm each booking\n\
  1. Lisbon (checking in 2026-09-15, checking out 2026-09-20 - 5 nights).\n\
  \   Compare these four Lisbon properties: \"{target.name_1}\",\n   \"{target.name_2}\"\
  , \"{target.name_3}\", \"{target.name_4}\". Among those with\n\
  \   cheapest room under $200/night, find the one with the HIGHEST\n\
  \   review score. That is \"{target.winner_name}\" (score\n\
  \   {target.winner_score}). Book its cheapest room for 2 guests using\n\
  \   the default Visa (ending 4242).\n\
  2. Venice (checking in 2026-09-09, checking out 2026-09-11 - 2 nights).\n\
  \   Book the cheapest-all-in hotel in Venice for 2 guests. One Venice\n\
  \   option is a beach resort with a lower nightly rate but a $25/night\n\
  \   resort fee - the non-resort option wins on all-in price.\n\
  3. Paris (checking in 2026-09-22, checking out 2026-09-24 - 2 nights).\n\
  \   Book the cheapest-all-in hotel in Paris for 2 guests (same resort\n\
  \   trap applies - read the fee breakdown).\n\
  The SUM of the three all-in total_prices must be at most $2100.\n\
  4. Save the three Lisbon alternatives (all Lisbon properties except the\n\
  \   booked one) to a new list called \"Lisbon Alternatives\".\n\
  5. Send a message to the booked Lisbon property with subject\n\
  \   \"Special requests\" and body \"I would like a quiet room on a\n\
  \   higher floor if possible.\"\n\
  6. Write a review for your completed stay at \"{target.review_prop_name}\"\
  \ in Lisbon:\n\
  \   score 8.0, title \"Charming Lisbon gem\", positive \"Beautiful tile\n\
  \   work and wonderful breakfast with pasteis de nata\", negative\n\
  \   \"Elevator was out of service for one day\", leisure, couple.\n\
  7. Update travel preferences: set preferred currency to \"EUR\".\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 42
primary_primitives:
- planning
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: Lisbon
      country: Portugal
      properties:
      - name: Lisbon Boutique Suites
        star_rating: 4
        review_score: 8.9
        review_count: 2100
        price: 175.0
        neighborhood: Chiado
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Rooftop terrace
        - Concierge
        rooms:
        - name: Classic Room
          price: 175.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Deluxe Suite
          price: 280.0
          bed_type: king
          max_occupancy: 3
          cancel_type: free_cancellation
      - name: Alfama Heritage Hotel
        star_rating: 4
        review_score: 9.1
        review_count: 1800
        price: 190.0
        neighborhood: Alfama
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Garden
        - Historic building
        rooms:
        - name: Heritage Room
          price: 190.0
          bed_type: queen
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Premium Suite
          price: 310.0
          bed_type: king
          max_occupancy: 3
          cancel_type: free_cancellation
      - name: Belem Tower Grand Hotel
        star_rating: 5
        review_score: 9.3
        review_count: 3500
        price: 350.0
        neighborhood: Belem
        amenities:
        - Free WiFi
        - Pool
        - Spa
        - Restaurant
        - Bar
        rooms:
        - name: Standard Room
          price: 350.0
          bed_type: king
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Presidential Suite
          price: 600.0
          bed_type: king
          max_occupancy: 4
          cancel_type: free_cancellation
      - name: Baixa Central Inn
        star_rating: 3
        review_score: 7.8
        review_count: 1200
        price: 95.0
        neighborhood: Baixa
        amenities:
        - Free WiFi
        - Bar
        - 24-hour front desk
        rooms:
        - name: Economy Room
          price: 95.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
    outputs:
    - prop_id_1
    - prop_name_1
    - prop_id_2
    - prop_name_2
    - prop_id_3
    - prop_name_3
    - prop_id_4
    - prop_name_4
  - use: featured_property
    params:
      name: Lisbon Riverside Retreat
      city: Lisbon
      country: Portugal
      star_rating: 3
      review_score: 8.2
      review_count: 900
      price: 110.0
      neighborhood: Santos
      amenities:
      - Free WiFi
      - Bar
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-02-05'
      check_out: '2026-02-09'
      price_per_night: 110.0
      status: completed
      guests: 2
      booked_days_ago: 65
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  - use: set_preferences
    params:
      preferred_currency: USD
    outputs:
    - prefs_updated
  # Venice leg: the target is a plain hotel; the fee-trap alternative is a
  # beach resort with the same nightly rate but an added $25/night resort
  # fee that pushes the all-in combined budget over $2100.
  - use: featured_property
    params:
      name: Venetian Canal Inn
      city: Venice
      country: Italy
      property_type: hotel
      star_rating: 3
      review_score: 8.6
      review_count: 1420
      price: 160.0
      neighborhood: Cannaregio
      address: 42 Fondamenta della Misericordia, 30121 Venice
      amenities:
      - Free WiFi
      - Canal view
      - Restaurant
      - Air conditioning
      distance_km: 1.0
      rooms:
      - name: Canal Double Room
        price: 160.0
        bed_type: double
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: canal
      - name: Canal Suite
        price: 240.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: canal
    outputs:
    - venice_prop_id
    - venice_prop_name
    - venice_room_id
    - venice_room_name
  - use: featured_property
    params:
      name: Lido Beach Venezia Resort
      city: Venice
      country: Italy
      property_type: resort
      star_rating: 4
      review_score: 8.8
      review_count: 2010
      price: 160.0
      neighborhood: Lido
      address: 8 Lungomare Marconi, 30126 Venice Lido
      amenities:
      - Free WiFi
      - Beach access
      - Pool
      - Spa
      - Restaurant
      distance_km: 6.0
      rooms:
      - name: Beachside Room
        price: 160.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
      - name: Lagoon Suite
        price: 260.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
    outputs:
    - venice_trap_prop_id
    - venice_trap_prop_name
    - venice_trap_room_id
    - venice_trap_room_name
  # Paris leg: same pattern - plain hotel target vs resort fee-trap.
  - use: featured_property
    params:
      name: Left Bank Parisian Hotel
      city: Paris
      country: France
      property_type: hotel
      star_rating: 3
      review_score: 8.5
      review_count: 1650
      price: 170.0
      neighborhood: Saint-Germain
      address: 25 Rue Jacob, 75006 Paris
      amenities:
      - Free WiFi
      - Bar
      - Restaurant
      - Air conditioning
      distance_km: 1.5
      rooms:
      - name: Classic Parisian Room
        price: 170.0
        bed_type: double
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
      - name: Deluxe Parisian Suite
        price: 260.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: courtyard
    outputs:
    - paris_prop_id
    - paris_prop_name
    - paris_room_id
    - paris_room_name
  - use: featured_property
    params:
      name: Champs-Elysees Grand Resort
      city: Paris
      country: France
      property_type: resort
      star_rating: 4
      review_score: 8.9
      review_count: 3120
      price: 170.0
      neighborhood: Champs-Elysees
      address: 10 Avenue Hoche, 75008 Paris
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
      - Fitness center
      distance_km: 0.8
      rooms:
      - name: Parisian Resort Room
        price: 170.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: avenue
      - name: Grand Suite
        price: 290.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: avenue
    outputs:
    - paris_trap_prop_id
    - paris_trap_prop_name
    - paris_trap_room_id
    - paris_trap_room_name
  targets:
    name_1: '{output.prop_name_1}'
    name_2: '{output.prop_name_2}'
    name_3: '{output.prop_name_3}'
    name_4: '{output.prop_name_4}'
    prop_id_1: '{output.prop_id_1}'
    prop_id_2: '{output.prop_id_2}'
    prop_id_3: '{output.prop_id_3}'
    prop_id_4: '{output.prop_id_4}'
    winner_id: '{output.prop_id_2}'
    winner_name: '{output.prop_name_2}'
    winner_score: '9.1'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
    review_res_id: '{output.review_res_id}'
    venice_prop_id: '{output.venice_prop_id}'
    venice_prop_name: '{output.venice_prop_name}'
    venice_room_id: '{output.venice_room_id}'
    venice_trap_prop_id: '{output.venice_trap_prop_id}'
    venice_trap_prop_name: '{output.venice_trap_prop_name}'
    paris_prop_id: '{output.paris_prop_id}'
    paris_prop_name: '{output.paris_prop_name}'
    paris_room_id: '{output.paris_room_id}'
    paris_trap_prop_id: '{output.paris_trap_prop_id}'
    paris_trap_prop_name: '{output.paris_trap_prop_name}'
    # Combined 3-city all-in budget. Correct trio:
    #   Lisbon (Alfama Heritage, $190/n * 5 nights, Lisbon tax 23%, city $2/n):
    #     950 + 218.50 + 10 + 40 = $1218.50
    #   Venice (Venetian Canal Inn, $160/n * 2 nights, Venice tax 10%, city $5/n):
    #     320 +  32.00 + 10 + 40 = $402.00
    #   Paris  (Left Bank Parisian Hotel, $170/n * 2 nights, Paris tax 20%, city $3/n):
    #     340 +  68.00 +  6 + 40 = $454.00
    #   Combined: 1218.50 + 402.00 + 454.00 = $2074.50 <= $2100.
    # Swapping any single leg to its resort fee-trap adds >= $50 and
    # breaks the combined budget (e.g. 2124.50 or 2125.00 or 2174.50).
    combined_budget: 2100.0
canonical_diff:
  constraints:
    - desc: Preferred currency updated to EUR
      expr: "state.travel_preferences.preferred_currency == 'EUR'"
      severity: medium
    - desc: Combined all-in total across the 3 new city bookings stays within $2100 budget
      expr: >-
        sum(
          r.total_price
          for r in state.reservations
          if r.property_id in (target['winner_id'], target['venice_prop_id'], target['paris_prop_id'])
          and r.status == 'confirmed'
        ) <= target['combined_budget']
      severity: critical
    - desc: Agent did not book any resort fee-trap that would break the combined budget
      expr: >-
        not any(
          r.property_id in (target['venice_trap_prop_id'], target['paris_trap_prop_id'])
          and r.status == 'confirmed'
          for r in state.reservations
        )
      severity: high
  update:
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed reservation
      where:
        id: {expr: "x == target['review_res_id']"}
      changes:
        rating_submitted: {any: true}
  create:
    - entity: Reservation
      desc: Book the best budget hotel (Alfama Heritage) cheapest room for 5 nights
      properties:
        property_id: {expr: "x == target['winner_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-15"}
        check_out: {eq: "2026-09-20"}
        nights: {eq: 5}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Reservation
      desc: Book the cheapest-all-in Venice hotel (Venetian Canal Inn) for 2 nights
      properties:
        property_id: {expr: "x == target['venice_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-09"}
        check_out: {eq: "2026-09-11"}
        nights: {eq: 2}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Reservation
      desc: Book the cheapest-all-in Paris hotel (Left Bank Parisian) for 2 nights
      properties:
        property_id: {expr: "x == target['paris_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-22"}
        check_out: {eq: "2026-09-24"}
        nights: {eq: 2}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: SavedList
      desc: Save three alternative properties to Lisbon Alternatives
      properties:
        name: {eq: "Lisbon Alternatives"}
        property_ids:
          expr: >-
            target['prop_id_1'] in x and
            target['prop_id_3'] in x and
            target['prop_id_4'] in x
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Message
      desc: Send special request message to booked property
      properties:
        property_id: {expr: "x == target['winner_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'special' in x.lower() or 'request' in x.lower()"
        body:
          expr: "'quiet' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Review
      desc: Write review for completed Lisbon Riverside stay
      properties:
        property_id: {expr: "x == target['review_prop_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 8.0}
        scores: {any: true}
        title: {eq: "Charming Lisbon gem"}
        positive:
          expr: "'pasteis de nata' in x.lower()"
        negative:
          expr: "'elevator' in x.lower()"
        room_type: {any: true}
        travel_purpose: {eq: leisure}
        traveled_with: {eq: couple}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
  invariant:
    - collection: state.reservations
      filter: >-
        a.property_id != target['winner_id']
        and a.property_id != target['venice_prop_id']
        and a.property_id != target['paris_prop_id']
        and a.id != target['review_res_id']
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      filter: "a.property_id != target['review_prop_id']"
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != 'Lisbon Alternatives'"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id != target['winner_id']
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the best budget Lisbon hotel with correct dates
      ref: create[0]
      severity: critical
    - name: Agent booked the cheapest-all-in Venice hotel with correct dates
      ref: create[1]
      severity: critical
    - name: Agent booked the cheapest-all-in Paris hotel with correct dates
      ref: create[2]
      severity: critical
    - name: Agent saved three alternatives to Lisbon Alternatives list
      ref: create[3]
      severity: high
    - name: Agent sent special request message to booked Lisbon hotel
      ref: create[4]
      severity: medium
    - name: Agent wrote review for completed Lisbon stay
      ref: create[5]
      severity: high
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not write reviews for other properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify other saved lists
      ref: invariant[3]
      severity: medium
    - name: Agent only messaged the booked property
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
