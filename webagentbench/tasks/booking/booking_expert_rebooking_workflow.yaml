task_id: booking_expert_rebooking_workflow
env_id: booking
title: Cancel and Rebook with Better Hotel in Same City
instruction_template: "You are unhappy with your current reservation and want to find\
  \ a better alternative:\n\
  1. Find your confirmed reservation at \"{target.original_name}\" in\
  \ {target.city} (checking in {target.check_in}, checking out {target.check_out},\
  \ {target.guests} guests). Cancel it.\n\
  2. Search for hotels in {target.city} and find a replacement with a\
  \ better review score than {target.original_score}. You should find\
  \ \"{target.replacement_name}\" which has a higher review score.\n\
  3. Book \"{target.replacement_name}\" for the same dates ({target.check_in}\
  \ to {target.check_out}) and same number of guests ({target.guests}). Book\
  \ its cheapest room. Use the Mastercard ending in 8888.\n\
  4. Send a message to the original hotel \"{target.original_name}\" with\
  \ subject \"Feedback on Cancellation\" and body \"I found a hotel with\
  \ better reviews for my dates. I may consider rebooking in the future\
  \ if improvements are made.\"\n\
  5. Update your travel preferences: set smoking to \"non-smoking\" and\
  \ preferred bed type to \"queen\".\n\
  6. Save \"{target.replacement_name}\" to a new list called \"Upgraded\
  \ Picks\".\n"
difficulty: expert
time_limit_seconds: 440
expected_steps: 32
primary_primitives:
- backtracking
- verification
- state_tracking
secondary_primitives:
- exploration
- grounding
- planning
start_path: /trips
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Ibis Milan Centre
      city: Milan
      country: Italy
      star_rating: 3
      review_score: 7.2
      review_count: 5670
      price: 120.0
      neighborhood: Centrale
      address: Via Finocchiaro Aprile 2, 20124 Milan
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - 24-hour front desk
      rooms:
      - name: Standard Room
        price: 120.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
    outputs:
    - original_id
    - original_name
    - original_room_id
    - original_room_name
  - use: create_reservation
    params:
      property_id: '{output.original_id}'
      check_in: '2026-06-15'
      check_out: '2026-06-20'
      price_per_night: 120.0
      status: confirmed
      guests: 2
      booked_days_ago: 20
    outputs:
    - original_res_id
    - original_conf
    - original_res_prop
  - use: featured_property
    params:
      name: Palazzo Parigi Milan
      city: Milan
      country: Italy
      star_rating: 5
      review_score: 9.4
      review_count: 2340
      price: 480.0
      neighborhood: Brera
      address: Corso di Porta Nuova 1, 20121 Milan
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Garden
      - Concierge
      popular_facilities:
      - Spa
      - Restaurant
      - Garden
      rooms:
      - name: Deluxe Room
        price: 480.0
        bed_type: king
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Grand Suite
        price: 850.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - replacement_id
    - replacement_name
    - replacement_room_id
    - replacement_room_name
  - use: decoy_property
    params:
      name: Milan Central B&B
      city: Milan
      country: Italy
      star_rating: 2
      review_score: 6.8
      review_count: 890
      price: 85.0
      amenities:
      - Free WiFi
    outputs:
    - decoy_property_id
    - decoy_property_name
  - use: decoy_property
    params:
      name: Armani Hotel Milano
      city: Milan
      country: Italy
      star_rating: 5
      review_score: 9.2
      review_count: 3120
      price: 620.0
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Fitness center
    outputs:
    - decoy_property_id_2
    - decoy_property_name_2
  - use: set_preferences
    params:
      smoking: false
      preferred_bed_type: king
    outputs:
    - updated
  targets:
    original_id: '{output.original_id}'
    original_name: '{output.original_name}'
    original_res_id: '{output.original_res_id}'
    original_score: '7.2'
    replacement_id: '{output.replacement_id}'
    replacement_name: '{output.replacement_name}'
    city: Milan
    check_in: '2026-06-15'
    check_out: '2026-06-20'
    guests: '2'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.id == '{target.original_res_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: Original reservation at Ibis Milan cancelled
  - expr: "any(\n  r.property_id == '{target.replacement_id}' and\n  r.status == 'confirmed'\
      \ and\n  r.check_in == '2026-06-15' and\n  r.check_out == '2026-06-20'\n  for\
      \ r in state.reservations\n)\n"
    desc: Replacement booked at Palazzo Parigi with same dates
  - expr: "any(\n  r.property_id == '{target.replacement_id}' and\n  r.payment_method_id\
      \ == 'pm_2'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Used Mastercard ending in 8888
  - expr: "any(\n  m.property_id == '{target.original_id}' and\n  m.sender == 'user'\
      \ and\n  'better reviews' in m.body.lower()\n  for m in state.messages\n)\n"
    desc: Feedback message sent to original hotel
  - expr: state.travel_preferences.smoking == 'non-smoking'
    desc: Smoking preference updated to non-smoking
  - expr: state.travel_preferences.preferred_bed_type == 'queen'
    desc: Preferred bed type updated to queen
  - expr: "any(\n  sl.name == 'Upgraded Picks' and\n  '{target.replacement_id}' in sl.property_ids\n\
      \  for sl in state.saved_lists\n)\n"
    desc: Replacement hotel saved to 'Upgraded Picks' list
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id')\
      \ == '{target.original_id}'\n  for e in state.audit_log\n)\n"
    desc: Did not rebook at the same original hotel
    penalty: 0.3
  - expr: "any(\n  r.property_id == '{target.replacement_id}' and\n  r.room_type_name\
      \ == 'Deluxe Room'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Booked the cheapest room at replacement hotel
    penalty: 0.2
  - expr: 'sum(1 for r in state.reservations if not r.id.startswith(''res_initial_''))
      <= 1

      '
    desc: Only one new reservation was created
    penalty: 0.15
