task_id: booking_expert_cancel_chain
env_id: booking
title: Cancel Three Reservations with Personalized Messages and Saved List
instruction_template: "Cancel three specific reservations and document them:\n\
  1. Find and cancel your reservation at \"{target.cancel_name_1}\".\n\
  \   Send a message to the property with subject \"Cancellation - Medical\
  \ Emergency\" and body \"I must cancel due to a family medical emergency.\
  \ I hope to visit in the future.\"\n\
  2. Find and cancel your reservation at \"{target.cancel_name_2}\".\n\
  \   Send a message to the property with subject \"Cancellation - Work\
  \ Conflict\" and body \"A mandatory work conference has been scheduled\
  \ during my trip dates. Apologies for the inconvenience.\"\n\
  3. Find and cancel your reservation at \"{target.cancel_name_3}\".\n\
  \   Send a message to the property with subject \"Cancellation - Travel\
  \ Restrictions\" and body \"Travel restrictions have been imposed for\
  \ the region. I will rebook once they are lifted.\"\n\
  4. Create a saved list called \"Cancelled Trips\" and add all three\
  \ properties to it for future rebooking reference.\n\
  5. Add a notification reminder by updating your preferences: set\
  \ preferred_language to \"English\" (confirm it).\n"
difficulty: expert
time_limit_seconds: 450
expected_steps: 35
primary_primitives:
- backtracking
- state_tracking
- planning
secondary_primitives:
- grounding
- patience
start_path: /trips
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Excelsior Venice
      city: Venice
      country: Italy
      star_rating: 5
      review_score: 9.1
      review_count: 3450
      price: 480.0
      neighborhood: Lido
      address: Lungomare Guglielmo Marconi 41, 30126 Venice
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Beach access
      - Room service
    outputs:
    - cancel_id_1
    - cancel_name_1
    - cancel_room_id_1
    - cancel_room_name_1
  - use: create_reservation
    params:
      property_id: '{output.cancel_id_1}'
      check_in: '2026-07-15'
      check_out: '2026-07-20'
      price_per_night: 480.0
      status: confirmed
      guests: 2
      booked_days_ago: 30
    outputs:
    - cancel_res_id_1
    - cancel_conf_1
    - cancel_res_prop_1
  - use: featured_property
    params:
      name: Raffles Istanbul
      city: Istanbul
      country: Turkey
      star_rating: 5
      review_score: 9.3
      review_count: 2780
      price: 420.0
      neighborhood: Besiktas
      address: Zorlu Center, 34340 Istanbul
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
    outputs:
    - cancel_id_2
    - cancel_name_2
    - cancel_room_id_2
    - cancel_room_name_2
  - use: create_reservation
    params:
      property_id: '{output.cancel_id_2}'
      check_in: '2026-08-05'
      check_out: '2026-08-09'
      price_per_night: 420.0
      status: confirmed
      guests: 2
      booked_days_ago: 21
    outputs:
    - cancel_res_id_2
    - cancel_conf_2
    - cancel_res_prop_2
  - use: featured_property
    params:
      name: Belmond Reid's Palace Madeira
      city: Funchal
      country: Portugal
      star_rating: 5
      review_score: 9.0
      review_count: 1890
      price: 390.0
      neighborhood: Funchal
      address: Estrada Monumental 139, 9000-098 Funchal
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Garden
      - Tennis court
    outputs:
    - cancel_id_3
    - cancel_name_3
    - cancel_room_id_3
    - cancel_room_name_3
  - use: create_reservation
    params:
      property_id: '{output.cancel_id_3}'
      check_in: '2026-09-10'
      check_out: '2026-09-15'
      price_per_night: 390.0
      status: confirmed
      guests: 2
      booked_days_ago: 14
    outputs:
    - cancel_res_id_3
    - cancel_conf_3
    - cancel_res_prop_3
  - use: featured_property
    params:
      name: Park Plaza Westminster London
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.2
      review_count: 6780
      price: 220.0
    outputs:
    - keep_id
    - keep_name
    - keep_room_id
    - keep_room_name
  - use: create_reservation
    params:
      property_id: '{output.keep_id}'
      check_in: '2026-12-01'
      check_out: '2026-12-04'
      price_per_night: 220.0
      status: confirmed
      guests: 2
      booked_days_ago: 5
    outputs:
    - keep_res_id
    - keep_conf
    - keep_res_prop
  targets:
    cancel_id_1: '{output.cancel_id_1}'
    cancel_name_1: '{output.cancel_name_1}'
    cancel_res_id_1: '{output.cancel_res_id_1}'
    cancel_id_2: '{output.cancel_id_2}'
    cancel_name_2: '{output.cancel_name_2}'
    cancel_res_id_2: '{output.cancel_res_id_2}'
    cancel_id_3: '{output.cancel_id_3}'
    cancel_name_3: '{output.cancel_name_3}'
    cancel_res_id_3: '{output.cancel_res_id_3}'
    keep_res_id: '{output.keep_res_id}'
eval:
  source: server_state
  checks:
  - expr: "any(r.id == '{target.cancel_res_id_1}' and r.status == 'cancelled'\n  for\
      \ r in state.reservations)\n"
    desc: Venice reservation cancelled
  - expr: "any(r.id == '{target.cancel_res_id_2}' and r.status == 'cancelled'\n  for\
      \ r in state.reservations)\n"
    desc: Istanbul reservation cancelled
  - expr: "any(r.id == '{target.cancel_res_id_3}' and r.status == 'cancelled'\n  for\
      \ r in state.reservations)\n"
    desc: Madeira reservation cancelled
  - expr: "any(\n  m.property_id == '{target.cancel_id_1}' and m.sender == 'user' and\n\
      \  'medical emergency' in m.body.lower()\n  for m in state.messages\n)\n"
    desc: Medical emergency message sent to Venice property
  - expr: "any(\n  m.property_id == '{target.cancel_id_2}' and m.sender == 'user' and\n\
      \  'work conference' in m.body.lower()\n  for m in state.messages\n)\n"
    desc: Work conflict message sent to Istanbul property
  - expr: "any(\n  m.property_id == '{target.cancel_id_3}' and m.sender == 'user' and\n\
      \  'travel restrictions' in m.body.lower()\n  for m in state.messages\n)\n"
    desc: Travel restrictions message sent to Madeira property
  - expr: "any(\n  sl.name == 'Cancelled Trips' and\n  '{target.cancel_id_1}' in sl.property_ids\
      \ and\n  '{target.cancel_id_2}' in sl.property_ids and\n  '{target.cancel_id_3}'\
      \ in sl.property_ids\n  for sl in state.saved_lists\n)\n"
    desc: All three properties saved to 'Cancelled Trips' list
  negative_checks:
  - expr: "not any(\n  r.id == '{target.keep_res_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: London reservation was not accidentally cancelled
    penalty: 0.4
  - expr: "sum(1 for e in state.audit_log\n  if e.action == 'reservation.cancel') ==\
      \ 3\n"
    desc: Exactly 3 reservations were cancelled (not more, not fewer)
    penalty: 0.2
  - expr: 'sum(1 for sl in state.saved_lists if sl.name == ''Cancelled Trips'') <=
      1

      '
    desc: Only one 'Cancelled Trips' list was created
    penalty: 0.1
