task_id: booking_frontier_complete_journey
env_id: booking
title: 'Frontier: Complete Customer Journey - Search, Compare, Save, Book, Modify,
  Message, Review, Settings'
instruction_template: "Complete the full customer journey:\n1. Search Barcelona hotels\
  \ and compare these four:\n   \"{target.name_1}\", \"{target.name_2}\",\n   \"{target.name_3}\"\
  , \"{target.name_4}\".\n2. Save the two highest-rated properties (\"{target.name_1}\"\
  \ and\n   \"{target.name_3}\") to a new list called \"Barcelona Shortlist\".\n3.\
  \ Book the highest-rated one overall: \"{target.winner_name}\".\n   Book its \"\
  Deluxe Room\" for 2 guests, checking in 2026-09-10,\n   checking out 2026-09-15,\
  \ using default Visa (ending 4242).\n4. Modify your existing reservation at \"{target.modify_name}\"\
  \n   (confirmation {target.modify_conf}): change check-in to\n   2026-10-05 and\
  \ check-out to 2026-10-09.\n5. Add special request to the modified reservation:\n\
  \   \"Extra pillows and hypoallergenic bedding please.\"\n6. Send a message to \"\
  {target.modify_name}\" with subject\n   \"Updated reservation\" and body \"I have\
  \ changed my dates.\n   Please confirm room availability for the new dates.\"\n\
  7. Write a review for your completed stay at\n   \"{target.review_prop_name}\":\
  \ score 8.5,\n   title \"Memorable Barcelona trip\",\n   positive \"Incredible rooftop\
  \ views and walking distance\n   to La Sagrada Familia\", negative \"Breakfast selection\n\
  \   could be more varied\", leisure, family.\n8. Update settings: change currency\
  \ to \"EUR\" and enable\n   newsletter.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: Barcelona
      country: Spain
      properties:
      - name: Casa Batllo Suites Barcelona
        star_rating: 5
        review_score: 9.2
        review_count: 2800
        price: 420.0
        neighborhood: Eixample
        amenities:
        - Free WiFi
        - Spa
        - Restaurant
        - Bar
        - Rooftop pool
        rooms:
        - name: Standard Room
          price: 420.0
          bed_type: queen
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Deluxe Room
          price: 560.0
          bed_type: king
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
          view_type: city
      - name: Gothic Quarter Budget Inn
        star_rating: 3
        review_score: 7.5
        review_count: 1200
        price: 95.0
        neighborhood: Gothic Quarter
        amenities:
        - Free WiFi
        - Bar
        rooms:
        - name: Standard Room
          price: 95.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Deluxe Room
          price: 140.0
          bed_type: queen
          max_occupancy: 2
          cancel_type: free_cancellation
      - name: Hotel Sagrada Familia Grand
        star_rating: 4
        review_score: 8.9
        review_count: 3500
        price: 310.0
        neighborhood: Sagrada Familia
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Rooftop terrace
        - Fitness center
        rooms:
        - name: Classic Room
          price: 310.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Deluxe Room
          price: 420.0
          bed_type: king
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
      - name: Barceloneta Beachfront Hotel
        star_rating: 4
        review_score: 8.3
        review_count: 2100
        price: 260.0
        neighborhood: Barceloneta
        amenities:
        - Free WiFi
        - Pool
        - Restaurant
        - Beach access
        rooms:
        - name: Sea View Room
          price: 260.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Deluxe Room
          price: 380.0
          bed_type: king
          max_occupancy: 2
          cancel_type: free_cancellation
    outputs:
    - prop_id_1
    - prop_name_1
    - prop_id_2
    - prop_name_2
    - prop_id_3
    - prop_name_3
    - prop_id_4
    - prop_name_4
  - use: featured_property
    params:
      name: Grand Hotel Princesa Sofia
      city: Barcelona
      country: Spain
      star_rating: 4
      review_score: 8.4
      review_count: 2900
      price: 230.0
      neighborhood: Les Corts
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Fitness center
    outputs:
    - modify_prop_id
    - modify_prop_name
    - modify_room_id
    - modify_room_name
  - use: modify_reservation
    params:
      property_id: '{output.modify_prop_id}'
      check_in: '2026-10-01'
      check_out: '2026-10-05'
      guests: 2
      booked_days_ago: 14
    outputs:
    - modify_res_id
    - modify_conf
    - modify_res_prop
    - modify_orig_in
    - modify_orig_out
  - use: featured_property
    params:
      name: Hotel Passeig de Gracia
      city: Barcelona
      country: Spain
      star_rating: 4
      review_score: 8.6
      review_count: 1800
      price: 280.0
      neighborhood: Eixample
      amenities:
      - Free WiFi
      - Restaurant
      - Rooftop terrace
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-01-20'
      check_out: '2026-01-25'
      price_per_night: 280.0
      status: completed
      guests: 4
      booked_days_ago: 80
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  - use: set_settings
    params:
      currency: USD
      newsletter: false
    outputs:
    - settings_updated
  targets:
    name_1: '{output.prop_name_1}'
    name_2: '{output.prop_name_2}'
    name_3: '{output.prop_name_3}'
    name_4: '{output.prop_name_4}'
    prop_id_1: '{output.prop_id_1}'
    prop_id_3: '{output.prop_id_3}'
    winner_id: '{output.prop_id_1}'
    winner_name: '{output.prop_name_1}'
    modify_prop_id: '{output.modify_prop_id}'
    modify_name: '{output.modify_prop_name}'
    modify_res_id: '{output.modify_res_id}'
    modify_conf: '{output.modify_conf}'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
    review_res_id: '{output.review_res_id}'
canonical_diff:
  update:
    - entity: settings
      desc: Currency changed to EUR and newsletter enabled
      where: {id: {any: true}}
      changes:
        currency: {eq: EUR}
        newsletter: {eq: true}
    - entity: Reservation
      desc: Modify reservation at Grand Hotel Princesa Sofia to new dates
      where:
        id: {expr: "x == target['modify_res_id']"}
      changes:
        check_in: {eq: "2026-10-05"}
        check_out: {eq: "2026-10-09"}
        guest_info:
          expr: "'extra pillows' in x.special_requests.lower()"
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed reservation
      where:
        id: {expr: "x == target['review_res_id']"}
      changes:
        rating_submitted: {any: true}
  create:
    - entity: SavedList
      desc: Create Barcelona Shortlist with two highest-rated hotels
      properties:
        name: {eq: "Barcelona Shortlist"}
        property_ids:
          expr: >-
            target['prop_id_1'] in x and
            target['prop_id_3'] in x
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Reservation
      desc: Book highest-rated hotel Casa Batllo Suites Deluxe Room
      properties:
        property_id: {expr: "x == target['winner_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Deluxe Room"}
        check_in: {eq: "2026-09-10"}
        check_out: {eq: "2026-09-15"}
        nights: {eq: 5}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Message
      desc: Send updated dates message to modified property
      properties:
        property_id: {expr: "x == target['modify_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'updated' in x.lower() or 'reservation' in x.lower()"
        body:
          expr: "'dates' in x.lower() or 'changed' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Review
      desc: Write review for completed Barcelona stay at Hotel Passeig de Gracia
      properties:
        property_id: {expr: "x == target['review_prop_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 8.5}
        scores: {any: true}
        title: {eq: "Memorable Barcelona trip"}
        positive:
          expr: "'sagrada familia' in x.lower()"
        negative:
          expr: "'breakfast' in x.lower()"
        room_type: {any: true}
        travel_purpose: {eq: leisure}
        traveled_with: {eq: family}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
  invariant:
    - collection: state.reservations
      filter: >-
        a.id not in (target['modify_res_id'], target['review_res_id']) and
        a.property_id != target['winner_id']
      preserve: ALL
    - collection: state.properties
      filter: "a.id not in (target['review_prop_id'],)"
      comprehensive: true
      preserve: ALL
    - collection: state.reviews
      filter: "a.property_id != target['review_prop_id']"
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != 'Barcelona Shortlist'"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id != target['modify_prop_id']
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Settings updated (EUR, newsletter)
      ref: update[0]
      severity: high
    - name: Agent modified reservation dates and added special request
      ref: update[1]
      severity: high
    - name: Agent created Barcelona Shortlist with top 2 hotels
      ref: create[0]
      severity: high
    - name: Agent booked highest-rated hotel Deluxe Room
      ref: create[1]
      severity: critical
    - name: Agent sent date change message to modified property
      ref: create[2]
      severity: medium
    - name: Agent wrote review for completed Barcelona stay
      ref: create[3]
      severity: high
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not write reviews for other properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify other saved lists
      ref: invariant[3]
      severity: medium
    - name: Agent only messaged the modified property
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
