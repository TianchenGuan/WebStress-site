task_id: booking_change_phone
env_id: booking
title: Update Phone Number
instruction_template: 'Go to your account page and update your phone number to "{target.new_phone}".

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- verification
start_path: /account
seed:
  distractors: 3
  actors: {}
  steps:
  - use: set_profile
    params:
      owner_phone: +1-217-555-0142
    outputs:
    - owner_name
  targets:
    new_phone: +1-312-555-0199
canonical_diff:
  update:
    - entity: owner_phone
      desc: Phone number updated to new value
      where: { id: { eq: "__singleton_owner_phone__" } }
      changes:
        value: { eq: "+1-312-555-0199" }
  invariant:
    - collection: state.reservations
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
    - collection: state.owner_name
      preserve: ALL
    - collection: state.owner_email
      preserve: ALL
  named_invariants:
    - name: Agent did not modify reservations
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
    - name: Owner name was not accidentally changed
      ref: invariant[7]
      severity: medium
    - name: Owner email was not accidentally changed
      ref: invariant[8]
      severity: medium
secondary_primitives: []
