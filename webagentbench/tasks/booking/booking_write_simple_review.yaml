task_id: booking_write_simple_review
env_id: booking
title: Write a Review for a Recent Stay
instruction_template: 'Go to your reviews page and write a review for your completed
  stay at "{target.property_name}". Give it an overall score of 9, title it "Wonderful
  experience", and write a positive comment saying "The staff was incredibly friendly
  and the room was spotless."

  '
difficulty: easy
time_limit_seconds: 150
expected_steps: 8
primary_primitives:
- verification
start_path: /reviews
seed:
  distractors: 4
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Lakeside Boutique Hotel
      city: Geneva
      country: Switzerland
      star_rating: 4
      review_score: 8.6
      price: 280.0
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.property_id}'
      check_in: '2026-03-01'
      check_out: '2026-03-04'
      status: completed
      booked_days_ago: 40
    outputs:
    - reservation_id
    - confirmation_number
    - property_id
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    reservation_id: '{output.reservation_id}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.property_id}' and r.overall_score ==\
      \ 9\n  for r in state.reviews\n)\n"
    desc: A review with score 9 exists for the target property
  - expr: "any(\n  r.property_id == '{target.property_id}' and 'Wonderful experience'\
      \ in r.title\n  for r in state.reviews\n)\n"
    desc: The review has the correct title
  - expr: "any(\n  r.property_id == '{target.property_id}' and len(r.positive) > 10\n\
      \  for r in state.reviews\n)\n"
    desc: The review has a positive comment
  negative_checks:
  - expr: 'sum(1 for e in state.audit_log if e.action == ''review.submit''
      and e.payload.get(''property_id'') == ''{target.property_id}'') <= 1

      '
    desc: Only one review was written for this property
    penalty: 0.2
secondary_primitives: []
