task_id: booking_write_simple_review
env_id: booking
title: Write a Review for a Recent Stay
instruction_template: 'Go to your reviews page and write a review for your completed
  stay at "{target.property_name}". Give it an overall score of 9, title it "Wonderful
  experience", and write a positive comment saying "The staff was incredibly friendly
  and the room was spotless."

  '
difficulty: easy
time_limit_seconds: 150
expected_steps: 8
primary_primitives:
- verification
start_path: /reviews
seed:
  distractors: 4
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Lakeside Boutique Hotel
      city: Geneva
      country: Switzerland
      star_rating: 4
      review_score: 8.6
      price: 280.0
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.property_id}'
      check_in: '2026-03-01'
      check_out: '2026-03-04'
      status: completed
      booked_days_ago: 40
    outputs:
    - reservation_id
    - confirmation_number
    - property_id
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    reservation_id: '{output.reservation_id}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed reservation
      where:
        id: {expr: "x == target['reservation_id']"}
      changes:
        rating_submitted: {any: true}
  create:
    - entity: Review
      desc: Write a review for the completed stay with the required score, title, and positive comment
      properties:
        property_id: {expr: "x == target['property_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 9}
        scores: {any: true}
        title: {expr: "'Wonderful experience' in x"}
        positive: {expr: "'staff' in x.lower() and 'spotless' in x.lower()"}
        negative: {any: true}
        room_type: {any: true}
        travel_purpose: {any: true}
        traveled_with: {any: true}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
  invariant:
    - collection: state.reviews
      filter: "a.property_id != target['property_id']"
      preserve: ALL
    - collection: state.reservations
      filter: "a.id != target['reservation_id']"
      preserve: ALL
    - collection: state.properties
      filter: "a.id not in (target['property_id'],)"
      comprehensive: true
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent wrote the review with correct score, title, and positive comment
      ref: create[0]
      severity: critical
    - name: Agent did not modify or delete reviews for other properties
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify reservations
      ref: invariant[1]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
secondary_primitives: []
