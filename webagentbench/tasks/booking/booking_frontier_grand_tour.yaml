task_id: booking_frontier_grand_tour
env_id: booking
title: 'Frontier: Plan a 3-City Grand Tour Across NYC, Paris, and Tokyo'
instruction_template: "Plan a grand tour across three cities with these exact steps:\n1. Search for hotels\
  \ in New York City and find \"{target.nyc_name}\".\n   Save it to a new list called \"Grand Tour 2026\"\
  .\n2. Search for hotels in Paris and find \"{target.paris_name}\".\n   Save it to the same \"Grand Tour\
  \ 2026\" list.\n3. Search for hotels in Tokyo and find \"{target.tokyo_name}\".\n   Save it to the same\
  \ \"Grand Tour 2026\" list.\n4. Book {target.nyc_name}: \"Deluxe King Room\" for 2 guests,\n   checking\
  \ in 2026-09-01, checking out 2026-09-04 (3 nights),\n   using the default Visa (ending 4242).\n5. Book\
  \ {target.paris_name}: \"Superior Suite\" for 2 guests,\n   checking in 2026-09-05, checking out 2026-09-09\
  \ (4 nights),\n   using the Mastercard ending in 8888.\n6. Book {target.tokyo_name}: \"Premium Room\"\
  \ for 2 guests,\n   checking in 2026-09-10, checking out 2026-09-13 (3 nights),\n   using the Amex ending\
  \ in 1234.\n7. You have a completed stay at \"{target.review_prop_name}\" in London.\n   Write a review:\
  \ overall score 9.0, title \"Wonderful London stay\",\n   positive \"Stunning views of the Thames and\
  \ impeccable service\",\n   no negative, travel purpose leisure, traveled with couple.\n8. Update your\
  \ travel preferences: set preferred currency to \"EUR\"\n   and preferred bed type to \"king\".\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- planning
secondary_primitives:
- state_tracking
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: featured_property
    params:
      name: The Langham New York
      city: New York
      country: United States
      star_rating: 5
      review_score: 9.1
      review_count: 4200
      price: 450.0
      neighborhood: Midtown
      address: 400 Fifth Avenue, New York, NY 10018
      distance_km: 0.3
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
      rooms:
      - name: Classic Room
        price: 450.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Deluxe King Room
        price: 580.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
      - name: Grand Suite
        price: 1200.0
        bed_type: king
        max_occupancy: 4
        cancel_type: free_cancellation
    outputs:
    - nyc_prop_id
    - nyc_prop_name
    - nyc_cheap_room_id
    - nyc_cheap_room_name
  - use: featured_property
    params:
      name: Hotel Le Marais Paris
      city: Paris
      country: France
      star_rating: 5
      review_score: 9.3
      review_count: 3800
      price: 520.0
      neighborhood: Le Marais
      address: 15 Rue de Rivoli, 75004 Paris
      distance_km: 0.5
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Room service
      - Concierge
      - Garden
      rooms:
      - name: Elegant Double Room
        price: 520.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Superior Suite
        price: 780.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
        room_size_sqm: 55.0
      - name: Presidential Suite
        price: 1800.0
        bed_type: king
        max_occupancy: 4
        cancel_type: free_cancellation
    outputs:
    - paris_prop_id
    - paris_prop_name
    - paris_cheap_room_id
    - paris_cheap_room_name
  - use: featured_property
    params:
      name: Shinjuku Grandbell Hotel
      city: Tokyo
      country: Japan
      star_rating: 4
      review_score: 8.8
      review_count: 5600
      price: 280.0
      neighborhood: Shinjuku
      address: 2-14-5 Kabukicho, Shinjuku-ku, Tokyo
      distance_km: 0.4
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Concierge
      - Laundry
      rooms:
      - name: Standard Twin Room
        price: 280.0
        bed_type: twin
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Premium Room
        price: 380.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
      - name: Executive Suite
        price: 620.0
        bed_type: king
        max_occupancy: 3
        cancel_type: free_cancellation
    outputs:
    - tokyo_prop_id
    - tokyo_prop_name
    - tokyo_cheap_room_id
    - tokyo_cheap_room_name
  - use: featured_property
    params:
      name: The Thames Riverside Hotel
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.5
      review_count: 2100
      price: 240.0
      neighborhood: South Bank
      address: 1 Westminster Bridge Road, London SE1
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
    outputs:
    - review_prop_id
    - review_prop_name
    - review_cheap_room_id
    - review_cheap_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-01-10'
      check_out: '2026-01-14'
      price_per_night: 240.0
      status: completed
      guests: 2
      booked_days_ago: 90
    outputs:
    - review_res_id
    - review_conf_num
    - review_res_prop_id
  - use: set_preferences
    params:
      preferred_currency: USD
      preferred_bed_type: double
    outputs:
    - pref_updated
  targets:
    nyc_prop_id: '{output.nyc_prop_id}'
    nyc_name: '{output.nyc_prop_name}'
    paris_prop_id: '{output.paris_prop_id}'
    paris_name: '{output.paris_prop_name}'
    tokyo_prop_id: '{output.tokyo_prop_id}'
    tokyo_name: '{output.tokyo_prop_name}'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  sl.name == 'Grand Tour 2026' and\n  '{target.nyc_prop_id}' in sl.property_ids and\n\
      \  '{target.paris_prop_id}' in sl.property_ids and\n  '{target.tokyo_prop_id}' in sl.property_ids\n\
      \  for sl in state.saved_lists\n)\n"
    desc: All three properties saved to 'Grand Tour 2026' list
  - expr: "any(\n  r.property_id == '{target.nyc_prop_id}' and\n  r.status == 'confirmed' and\n  r.check_in\
      \ == '2026-09-01' and r.check_out == '2026-09-04' and\n  r.room_type_name == 'Deluxe King Room'\n\
      \  for r in state.reservations\n)\n"
    desc: NYC hotel booked with correct room and dates
  - expr: "any(\n  r.property_id == '{target.paris_prop_id}' and\n  r.status == 'confirmed' and\n  r.check_in\
      \ == '2026-09-05' and r.check_out == '2026-09-09' and\n  r.room_type_name == 'Superior Suite'\n\
      \  for r in state.reservations\n)\n"
    desc: Paris hotel booked with correct room and dates
  - expr: "any(\n  r.property_id == '{target.tokyo_prop_id}' and\n  r.status == 'confirmed' and\n  r.check_in\
      \ == '2026-09-10' and r.check_out == '2026-09-13' and\n  r.room_type_name == 'Premium Room'\n  for\
      \ r in state.reservations\n)\n"
    desc: Tokyo hotel booked with correct room and dates
  - expr: "any(\n  r.property_id == '{target.paris_prop_id}' and\n  r.payment_method_id in\n  [pm.id for\
      \ pm in state.payment_methods if pm.last_four == '8888']\n  for r in state.reservations\n  if not\
      \ r.id.startswith('res_initial_')\n)\n"
    desc: Paris booking used Mastercard ending 8888
  - expr: "any(\n  rv.property_id == '{target.review_prop_id}' and\n  rv.overall_score == 9.0 and\n  rv.title\
      \ == 'Wonderful London stay'\n  for rv in state.reviews\n)\n"
    desc: Review written for London stay with score 9.0 and correct title
  - expr: "any(\n  rv.property_id == '{target.review_prop_id}' and\n  'thames' in rv.positive.lower()\n\
      \  for rv in state.reviews\n)\n"
    desc: Review positive comment mentions the Thames
  - expr: state.travel_preferences.preferred_currency == 'EUR'
    desc: Preferred currency updated to EUR
  - expr: state.travel_preferences.preferred_bed_type == 'king'
    desc: Preferred bed type updated to king
  negative_checks:
  - expr: "sum(1 for r in state.reservations\n  if not r.id.startswith('res_initial_') and r.status ==\
      \ 'confirmed') <= 3\n"
    desc: Exactly three new reservations were created (no extras)
    penalty: 0.2
  - expr: "not any(\n  rv.property_id in ('{target.nyc_prop_id}', '{target.paris_prop_id}', '{target.tokyo_prop_id}')\n\
      \  for rv in state.reviews\n  if rv.author_name == 'Jordan Parker'\n)\n"
    desc: No reviews written for hotels being booked (only completed stays)
    penalty: 0.15
  - expr: 'sum(1 for sl in state.saved_lists if sl.name == ''Grand Tour 2026'') <= 1

      '
    desc: Only one Grand Tour 2026 list was created
    penalty: 0.1
  - expr: "not any(\n  r.property_id == '{target.nyc_prop_id}' and\n  r.room_type_name != 'Deluxe King\
      \ Room'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book the wrong room at NYC hotel
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.tokyo_prop_id}' and\n  r.room_type_name != 'Premium Room'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book the wrong room at Tokyo hotel
    penalty: 0.2
