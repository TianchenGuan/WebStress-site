task_id: booking_frontier_family_planner
env_id: booking
title: "Frontier: Family Trip Planner - Compare, Book, Preference, and List"
instruction_template: "Plan a family trip across two cities:\n\
  1. Search for family hotels in Barcelona. Compare\n\
  \   \"{target.bcn_name_1}\" and \"{target.bcn_name_2}\".\n\
  \   Book the one with BOTH pool AND kids club amenities:\n\
  \   \"{target.bcn_winner_name}\" - \"Family Suite\" for 4 guests,\n\
  \   checking in 2026-07-20, checking out 2026-07-25 (5 nights),\n\
  \   using default Visa (ending 4242).\n\
  2. Search for family hotels in Rome. Compare\n\
  \   \"{target.rome_name_1}\" and \"{target.rome_name_2}\".\n\
  \   Book the one with BOTH pool AND family rooms amenities:\n\
  \   \"{target.rome_winner_name}\" - \"Family Room\" for 4 guests,\n\
  \   checking in 2026-07-26, checking out 2026-07-30 (4 nights),\n\
  \   using the Mastercard ending in 8888.\n\
  3. Update travel preferences: set preferred bed type to \"twin\",\n\
  \   preferred room type to \"family\",\n\
  \   and add \"nut-free\" to dietary restrictions.\n\
  4. Create a saved list called \"Family Favorites\" and add both\n\
  \   booked properties to it.\n\
  5. Send a message to \"{target.bcn_winner_name}\" with subject\n\
  \   \"Family amenities question\" and body \"We are traveling with\n\
  \   two children aged 5 and 8. Are there kids activities available?\"\n\
  6. Write a review for your completed stay at\n\
  \   \"{target.review_prop_name}\": score 9.0, title \"Perfect for\n\
  \   families\", positive \"Amazing kids club and wonderful pool area\",\n\
  \   no negative, leisure, family.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- planning
- state_tracking
- verification
- patience
secondary_primitives:
- exploration
- grounding
- backtracking
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: Barcelona
      country: Spain
      properties:
      - name: Barcelona Family Resort
        star_rating: 4
        review_score: 8.7
        review_count: 3200
        price: 280.0
        amenities:
        - Free WiFi
        - Pool
        - Kids club
        - Restaurant
        - Playground
        - Family rooms
        rooms:
        - name: Standard Double
          price: 280.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Family Suite
          price: 420.0
          bed_type: twin
          max_occupancy: 4
          cancel_type: free_cancellation
          room_size_sqm: 50.0
      - name: Barcelona Beach Hotel
        star_rating: 4
        review_score: 8.5
        review_count: 2800
        price: 250.0
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Beach access
        - Fitness center
        rooms:
        - name: Standard Room
          price: 250.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Family Suite
          price: 380.0
          bed_type: twin
          max_occupancy: 4
          cancel_type: free_cancellation
    outputs:
    - bcn_id_1
    - bcn_name_1
    - bcn_id_2
    - bcn_name_2
  - use: compare_properties
    params:
      city: Rome
      country: Italy
      properties:
      - name: Rome Villa Family Hotel
        star_rating: 4
        review_score: 8.9
        review_count: 2500
        price: 310.0
        amenities:
        - Free WiFi
        - Pool
        - Restaurant
        - Garden
        - Family rooms
        - Playground
        rooms:
        - name: Classic Room
          price: 310.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Family Room
          price: 420.0
          bed_type: twin
          max_occupancy: 4
          cancel_type: free_cancellation
          room_size_sqm: 45.0
      - name: Rome Centro Apartment
        star_rating: 3
        review_score: 8.0
        review_count: 1500
        price: 180.0
        amenities:
        - Free WiFi
        - Kitchen
        - Laundry
        rooms:
        - name: Studio
          price: 180.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Family Room
          price: 260.0
          bed_type: twin
          max_occupancy: 4
          cancel_type: free_cancellation
    outputs:
    - rome_id_1
    - rome_name_1
    - rome_id_2
    - rome_name_2
  - use: featured_property
    params:
      name: Disneyland Paris Family Hotel
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.6
      review_count: 5200
      price: 250.0
      neighborhood: Marne-la-Vallee
      amenities:
      - Free WiFi
      - Pool
      - Kids club
      - Restaurant
      - Playground
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2025-12-22'
      check_out: '2025-12-28'
      price_per_night: 250.0
      status: completed
      guests: 4
      booked_days_ago: 110
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  - use: set_preferences
    params:
      preferred_bed_type: double
      preferred_room_type: standard
      dietary_restrictions:
      - vegetarian
    outputs:
    - prefs_updated
  targets:
    bcn_id_1: '{output.bcn_id_1}'
    bcn_name_1: '{output.bcn_name_1}'
    bcn_id_2: '{output.bcn_id_2}'
    bcn_name_2: '{output.bcn_name_2}'
    bcn_winner_id: '{output.bcn_id_1}'
    bcn_winner_name: '{output.bcn_name_1}'
    rome_id_1: '{output.rome_id_1}'
    rome_name_1: '{output.rome_name_1}'
    rome_id_2: '{output.rome_id_2}'
    rome_name_2: '{output.rome_name_2}'
    rome_winner_id: '{output.rome_id_1}'
    rome_winner_name: '{output.rome_name_1}'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.bcn_winner_id}' and\n\
      \  r.status == 'confirmed' and\n\
      \  r.room_type_name == 'Family Suite' and\n\
      \  r.check_in == '2026-07-20' and r.check_out == '2026-07-25' and\n\
      \  r.guests == 4\n\
      \  for r in state.reservations\n)\n"
    desc: Barcelona family hotel booked with Family Suite and correct dates
  - expr: "any(\n  r.property_id == '{target.rome_winner_id}' and\n\
      \  r.status == 'confirmed' and\n\
      \  r.room_type_name == 'Family Room' and\n\
      \  r.check_in == '2026-07-26' and r.check_out == '2026-07-30' and\n\
      \  r.guests == 4\n\
      \  for r in state.reservations\n)\n"
    desc: Rome family hotel booked with Family Room and correct dates
  - expr: "any(\n  r.property_id == '{target.rome_winner_id}' and\n\
      \  r.payment_method_id in [pm.id for pm in state.payment_methods if pm.last_four == '8888']\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Rome booking used Mastercard ending 8888
  - expr: "state.travel_preferences.preferred_bed_type == 'twin' and state.travel_preferences.preferred_room_type == 'family'"
    desc: Bed type and room type preferences updated
  - expr: "'nut-free' in state.travel_preferences.dietary_restrictions"
    desc: Nut-free added to dietary restrictions
  - expr: "any(sl.name == 'Family Favorites' and\n\
      \  '{target.bcn_winner_id}' in sl.property_ids and\n\
      \  '{target.rome_winner_id}' in sl.property_ids\n\
      \  for sl in state.saved_lists)\n"
    desc: Family Favorites list has both booked properties
  - expr: "any(m.property_id == '{target.bcn_winner_id}' and m.sender == 'guest'\n\
      \  and 'kids' in m.body.lower()\n\
      \  for m in state.messages)\n"
    desc: Message sent to Barcelona hotel about kids activities
  - expr: "any(rv.property_id == '{target.review_prop_id}' and\n\
      \  rv.overall_score == 9.0 and rv.title == 'Perfect for families' and\n\
      \  rv.traveled_with == 'family'\n\
      \  for rv in state.reviews)\n"
    desc: Review written with correct score, title, and traveled with family
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and\n\
      \  e.payload.get('property_id') == '{target.bcn_id_2}'\n\
      \  for e in state.audit_log\n)\n"
    desc: Did not book the Barcelona Beach Hotel (no pool+kids club)
    penalty: 0.4
  - expr: "not any(\n  e.action == 'reservation.create' and\n\
      \  e.payload.get('property_id') == '{target.rome_id_2}'\n\
      \  for e in state.audit_log\n)\n"
    desc: Did not book Rome Centro Apartment (no pool+family rooms)
    penalty: 0.4
  - expr: "sum(1 for r in state.reservations\n\
      \  if not r.id.startswith('res_initial_') and r.status == 'confirmed') <= 2\n"
    desc: Only two new reservations created
    penalty: 0.2
  - expr: "sum(1 for sl in state.saved_lists if sl.name == 'Family Favorites') <= 1\n"
    desc: Only one Family Favorites list created
    penalty: 0.1
