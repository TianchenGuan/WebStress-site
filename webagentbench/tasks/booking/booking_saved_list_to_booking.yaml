task_id: booking_saved_list_to_booking
env_id: booking
title: Book a Genius-Discounted Hotel from Saved List
instruction_template: 'Go to your saved lists and open the list named "{target.list_name}".
  Browse the properties in that list and identify which one offers a Genius discount.
  Book that Genius-discounted property''s cheapest available room for 2 guests checking
  in on 2026-08-01 and checking out on 2026-08-05 (4 nights). Use the default Visa
  payment method (ending in 4242) and enter your name and email from your profile.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
- backtracking
secondary_primitives: []
start_path: /home
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Harbour Bridge Hotel
      city: Sydney
      country: Australia
      star_rating: 4
      review_score: 8.6
      review_count: 2340
      price: 275.0
      neighborhood: The Rocks
      address: 88 Cumberland Street, Sydney
      genius_discount_pct: 0
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Bar
    outputs:
    - fp1_id
    - fp1_name
    - fp1_room
    - fp1_rname
  - use: featured_property
    params:
      name: Darling Harbour Suites
      city: Sydney
      country: Australia
      star_rating: 4
      review_score: 8.9
      review_count: 1876
      price: 310.0
      neighborhood: Darling Harbour
      address: 25 Wheat Road, Sydney
      genius_discount_pct: 15
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Fitness center
      - Restaurant
      - Bar
      - Room service
      rooms:
      - name: City View Room
        price: 310.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
        view_type: city
      - name: Harbour Suite
        price: 450.0
        bed_type: king
        max_occupancy: 3
        cancel_type: free_cancellation
        view_type: sea
    outputs:
    - fp2_id
    - fp2_name
    - fp2_room
    - fp2_rname
  - use: featured_property
    params:
      name: Bondi Beach Resort
      city: Sydney
      country: Australia
      star_rating: 3
      review_score: 8.1
      review_count: 3210
      price: 185.0
      neighborhood: Bondi
      address: 12 Campbell Parade, Sydney
      genius_discount_pct: 0
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
    outputs:
    - fp3_id
    - fp3_name
    - fp3_room
    - fp3_rname
  - use: create_saved_list
    params:
      name: Sydney Summer Trip
      property_ids:
      - '{output.fp1_id}'
      - '{output.fp2_id}'
      - '{output.fp3_id}'
    outputs:
    - list_id
    - list_name
  targets:
    list_id: '{output.list_id}'
    list_name: '{output.list_name}'
    genius_prop_id: '{output.fp2_id}'
    genius_prop_name: '{output.fp2_name}'
canonical_diff:
  create:
    - entity: Reservation
      desc: Book the cheapest room at the Genius-discounted property from the saved list
      properties:
        property_id: {expr: "x == target['genius_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-08-01"}
        check_out: {eq: "2026-08-05"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['genius_prop_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {expr: "x.full_name == initial.owner_name and x.email == initial.owner_email"}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {eq: true}
        genius_discount: {expr: "x > 0"}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "not (a.property_id == target['genius_prop_id'] and a.check_in == '2026-08-01')"
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the Genius-discounted property with correct dates and 2 guests
      ref: create[0]
      severity: critical
    - name: Agent did not modify existing reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify saved lists
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
