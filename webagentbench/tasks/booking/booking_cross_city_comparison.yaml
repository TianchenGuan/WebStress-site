task_id: booking_cross_city_comparison
env_id: booking
title: Compare Best Hotels in Paris vs Barcelona and Book Winner
instruction_template: 'Compare the best-rated hotel in Paris against the best-rated hotel in Barcelona.
  The Paris candidate is "{target.paris_name}" and the Barcelona candidate is "{target.barcelona_name}".
  Check both properties'' review scores and book the one with the overall higher review score. Book its
  best room (the most expensive room type available) for 2 guests checking in on 2026-08-15 and checking
  out on 2026-08-20 (5 nights). Use the default Visa payment method (ending in 4242) and enter your name
  and email from your profile.

  '
difficulty: hard
time_limit_seconds: 420
expected_steps: 25
primary_primitives:
- planning
secondary_primitives:
- state_tracking
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Le Bristol Paris
      city: Paris
      country: France
      star_rating: 5
      review_score: 9.2
      review_count: 4567
      price: 680.0
      neighborhood: 8th Arrondissement
      address: 112 Rue du Faubourg Saint-Honore, 75008 Paris
      distance_km: 0.6
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
      - Garden
      rooms:
      - name: Superior Room
        price: 680.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
      - name: Deluxe Suite
        price: 1100.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 65.0
      - name: Royal Suite
        price: 2200.0
        bed_type: king
        max_occupancy: 4
        meals_included: full_board
        cancel_type: free_cancellation
        view_type: garden
        room_size_sqm: 120.0
    outputs:
    - paris_prop_id
    - paris_prop_name
    - first_cheapest_room_id
    - first_cheapest_room_name
  - use: featured_property
    params:
      name: Hotel Arts Barcelona
      city: Barcelona
      country: Spain
      star_rating: 5
      review_score: 9.4
      review_count: 5123
      price: 520.0
      neighborhood: Port Olympic
      address: Marina 19-21, 08005 Barcelona
      distance_km: 1.2
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Beach access
      - Concierge
      rooms:
      - name: Deluxe Room
        price: 520.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
      - name: Premium Suite
        price: 890.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
        room_size_sqm: 75.0
      - name: Penthouse Suite
        price: 1800.0
        bed_type: king
        max_occupancy: 4
        meals_included: full_board
        cancel_type: free_cancellation
        view_type: sea
        room_size_sqm: 150.0
    outputs:
    - barcelona_prop_id
    - barcelona_prop_name
    - second_cheapest_room_id
    - second_cheapest_room_name
  - use: decoy_property
    params:
      name: Paris Eiffel Budget Hotel
      city: Paris
      country: France
      star_rating: 3
      review_score: 7.5
      review_count: 2100
      price: 120.0
      neighborhood: 7th Arrondissement
      amenities:
      - Free WiFi
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Barcelona Gothic Quarter Inn
      city: Barcelona
      country: Spain
      star_rating: 3
      review_score: 7.8
      review_count: 1800
      price: 95.0
      neighborhood: Gothic Quarter
      amenities:
      - Free WiFi
      - Bar
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  targets:
    paris_prop_id: '{output.paris_prop_id}'
    paris_name: '{output.paris_prop_name}'
    barcelona_prop_id: '{output.barcelona_prop_id}'
    barcelona_name: '{output.barcelona_prop_name}'
    winner_prop_id: '{output.barcelona_prop_id}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.winner_prop_id}' and\n  r.status == 'confirmed'\n  for r\
      \ in state.reservations\n)\n"
    desc: Reservation created at Barcelona hotel (higher rated)
  - expr: "any(\n  r.property_id == '{target.winner_prop_id}' and\n  r.room_type_name == 'Penthouse Suite'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Booked the best (most expensive) room - Penthouse Suite
  - expr: "any(\n  r.property_id == '{target.winner_prop_id}' and\n  r.check_in == '2026-08-15' and\n\
      \  r.check_out == '2026-08-20'\n  for r in state.reservations\n)\n"
    desc: Reservation has correct dates
  - expr: "any(\n  r.property_id == '{target.winner_prop_id}' and\n  r.guests == 2 and r.nights == 5\n\
      \  for r in state.reservations\n)\n"
    desc: Correct guest count and number of nights
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id') == '{target.paris_prop_id}'\n\
      \  for e in state.audit_log\n)\n"
    desc: Did not book the Paris hotel (lower rated)
    penalty: 0.4
  - expr: 'sum(1 for r in state.reservations if not r.id.startswith(''res_initial_'')) <= 1

      '
    desc: Only one new reservation was created
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.winner_prop_id}' and\n  r.room_type_name in ('Deluxe\
      \ Room', 'Premium Suite')\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Did not book a cheaper room instead of the best room
    penalty: 0.3
  - expr: not any(e.action == 'message.send' for e in state.audit_log)
    desc: No off-task hotel messages were sent
    penalty: 0.1
  - expr: not any(e.action.startswith('saved_list.') for e in state.audit_log)
    desc: No off-task saved-list mutations were made
    penalty: 0.1
