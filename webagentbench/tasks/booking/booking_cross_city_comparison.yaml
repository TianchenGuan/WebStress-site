task_id: booking_cross_city_comparison
env_id: booking
title: Compare Best Hotels in Paris vs Barcelona and Book Winner
instruction_template: 'Compare the best-rated hotel in Paris against the best-rated
  hotel in Barcelona. The Paris candidate is "{target.paris_name}" and the Barcelona
  candidate is "{target.barcelona_name}". Check both properties'' review scores and
  book the one with the overall higher review score. Book its best room (the most
  expensive room type available) for 2 guests checking in on 2026-08-15 and checking
  out on 2026-08-20 (5 nights). Use the default Visa payment method (ending in 4242)
  and enter your name and email from your profile.

  '
difficulty: hard
time_limit_seconds: 420
expected_steps: 25
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Le Bristol Paris
      city: Paris
      country: France
      star_rating: 5
      review_score: 9.2
      review_count: 4567
      price: 680.0
      neighborhood: 8th Arrondissement
      address: 112 Rue du Faubourg Saint-Honore, 75008 Paris
      distance_km: 0.6
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
      - Garden
      rooms:
      - name: Superior Room
        price: 680.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
      - name: Deluxe Suite
        price: 1100.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 65.0
      - name: Royal Suite
        price: 2200.0
        bed_type: king
        max_occupancy: 4
        meals_included: full_board
        cancel_type: free_cancellation
        view_type: garden
        room_size_sqm: 120.0
    outputs:
    - paris_prop_id
    - paris_prop_name
    - first_cheapest_room_id
    - first_cheapest_room_name
  - use: featured_property
    params:
      name: Hotel Arts Barcelona
      city: Barcelona
      country: Spain
      star_rating: 5
      review_score: 9.4
      review_count: 5123
      price: 520.0
      neighborhood: Port Olympic
      address: Marina 19-21, 08005 Barcelona
      distance_km: 1.2
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Beach access
      - Concierge
      rooms:
      - name: Deluxe Room
        price: 520.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
      - name: Premium Suite
        price: 890.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
        room_size_sqm: 75.0
      - name: Penthouse Suite
        price: 1800.0
        bed_type: king
        max_occupancy: 4
        meals_included: full_board
        cancel_type: free_cancellation
        view_type: sea
        room_size_sqm: 150.0
    outputs:
    - barcelona_prop_id
    - barcelona_prop_name
    - second_cheapest_room_id
    - second_cheapest_room_name
  - use: decoy_property
    params:
      name: Paris Eiffel Budget Hotel
      city: Paris
      country: France
      star_rating: 3
      review_score: 7.5
      review_count: 2100
      price: 120.0
      neighborhood: 7th Arrondissement
      amenities:
      - Free WiFi
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Barcelona Gothic Quarter Inn
      city: Barcelona
      country: Spain
      star_rating: 3
      review_score: 7.8
      review_count: 1800
      price: 95.0
      neighborhood: Gothic Quarter
      amenities:
      - Free WiFi
      - Bar
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  targets:
    paris_prop_id: '{output.paris_prop_id}'
    paris_name: '{output.paris_prop_name}'
    barcelona_prop_id: '{output.barcelona_prop_id}'
    barcelona_name: '{output.barcelona_prop_name}'
    winner_prop_id: '{output.barcelona_prop_id}'
canonical_diff:
  create:
    - entity: Reservation
      desc: Book the Penthouse Suite at Hotel Arts Barcelona (higher-rated)
      properties:
        property_id: {expr: "x == target['winner_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Penthouse Suite"}
        check_in: {eq: "2026-08-15"}
        check_out: {eq: "2026-08-20"}
        nights: {eq: 5}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {expr: "x.full_name == initial.owner_name and x.email == initial.owner_email"}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['winner_prop_id'] or a.check_in != '2026-08-15'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the Penthouse Suite at the higher-rated Barcelona hotel
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
