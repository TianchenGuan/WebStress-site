task_id: booking_review_completed_stay
env_id: booking
title: Write a Review for a Completed Stay
instruction_template: 'Go to your trips and find your completed stay at "{target.property_name}"
  (confirmation number {target.confirmation_number}). Navigate to write a review for
  this stay. Give an overall score of 8.5, with a title "Wonderful experience" and
  a positive comment saying "The staff was incredibly friendly and the location was
  perfect for sightseeing." Include a negative comment saying "The room could have
  been a bit larger." Set the travel purpose to "leisure" and traveled with to "couple".

  '
difficulty: medium
time_limit_seconds: 240
expected_steps: 14
primary_primitives:
- planning
- grounding
start_path: /home
seed:
  distractors: 6
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Prague Old Town Residence
      city: Prague
      country: Czech Republic
      star_rating: 4
      review_score: 8.7
      review_count: 1580
      price: 180.0
      property_type: Hotel
      neighborhood: Old Town
      address: 5 Staromestske namesti, 110 00 Prague
      amenities:
      - Free WiFi
      - Air conditioning
      - Bar
      - Tour desk
      popular_facilities:
      - Free WiFi
      - Bar
      - Tour desk
      distance_km: 0.1
      rooms:
      - name: Classic Double
        price: 180.0
        bed_type: double
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        original_price: null
        view_type: square
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.property_id}'
      room_type_id: '{output.cheapest_room_id}'
      room_type_name: Classic Double
      check_in: '2026-03-01'
      check_out: '2026-03-05'
      price_per_night: 180.0
      status: completed
      guests: 2
      booked_days_ago: 45
    outputs:
    - reservation_id
    - confirmation_number
    - property_id
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    reservation_id: '{output.reservation_id}'
    confirmation_number: '{output.confirmation_number}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.overall_score\
      \ == 8.5\n  for r in state.reviews\n  if not r.id.startswith('review_initial_')\n\
      )\n"
    desc: A review with score 8.5 was submitted for the property
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  'Wonderful experience'\
      \ in r.title\n  for r in state.reviews\n  if not r.id.startswith('review_initial_')\n\
      )\n"
    desc: Review has the title 'Wonderful experience'
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  len(r.positive)\
      \ > 20 and\n  'staff' in r.positive.lower()\n  for r in state.reviews\n  if\
      \ not r.id.startswith('review_initial_')\n)\n"
    desc: Review has a positive comment mentioning staff
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  len(r.negative)\
      \ > 10 and\n  'room' in r.negative.lower()\n  for r in state.reviews\n  if not\
      \ r.id.startswith('review_initial_')\n)\n"
    desc: Review has a negative comment mentioning room size
  negative_checks:
  - expr: 'sum(1 for r in state.reviews if not r.id.startswith(''review_initial_'')
      and r.property_id == ''{target.property_id}'') <= 1

      '
    desc: Only one review was submitted for this property
    penalty: 0.2
  - expr: "not any(\n  r.property_id != '{target.property_id}'\n  for r in state.reviews\n\
      \  if not r.id.startswith('review_initial_')\n)\n"
    desc: No review was submitted for a different property
    penalty: 0.3
