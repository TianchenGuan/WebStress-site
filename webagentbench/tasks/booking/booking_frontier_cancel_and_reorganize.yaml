task_id: booking_frontier_cancel_and_reorganize
env_id: booking
title: 'Frontier: Cancel 3 Reservations, Rebook 2 Cheaper, Message, and Update List'
instruction_template: "Reorganize your upcoming trips. Accept whatever cancellation\
  \ fees apply to each reservation \u2014 policies differ by hotel.\n1. Cancel your reservation\
  \ at \"{target.cancel1_name}\"\n   (confirmation {target.cancel1_conf}) in {target.cancel1_city}.\n\
  2. Cancel your reservation at \"{target.cancel2_name}\"\n   (confirmation {target.cancel2_conf})\
  \ in {target.cancel2_city}.\n3. Cancel your reservation at \"{target.cancel3_name}\"\
  \n   (confirmation {target.cancel3_conf}) in {target.cancel3_city}.\n4. For the\
  \ two cancelled reservations that still need replacement stays\n   ({target.cancel1_city}\
  \ and {target.cancel2_city}), open the \"Rebooking Options\"\n   page the system\
  \ generated for each cancelled reservation and compare the\n   itemized fees of\
  \ the 3 suggested candidates. Pick the cheapest candidate\n   whose all-in total\
  \ (base + taxes + city fee + cleaning fee) is within a\n   combined budget of $\
  {target.rebook_combined_budget} across BOTH rebookings.\n5. Rebook in {target.cancel1_city}\
  \ by booking the chosen candidate for 2 guests,\n   same dates as the cancelled\
  \ booking (2026-08-05 to 2026-08-09),\n   using default Visa (ending 4242).\n6.\
  \ Rebook in {target.cancel2_city} by booking the chosen candidate for 2 guests,\n\
  \   same dates as the cancelled booking (2026-08-15 to 2026-08-19),\n   using Mastercard\
  \ ending in 8888.\n7. The {target.cancel3_city} booking is non-refundable \u2014 do not rebook anything\
  \ there.\n8. Send a message to each of the 3 cancelled properties:\n   - \"{target.cancel1_name}\"\
  : subject \"Cancellation\", body\n     \"I had to cancel due to budget constraints.\
  \ Thank you.\"\n   - \"{target.cancel2_name}\": subject \"Cancellation\", body\n\
  \     \"Plans changed, hope to visit another time.\"\n   - \"{target.cancel3_name}\"\
  : subject \"Cancellation\", body\n     \"Sorry for the cancellation. Will rebook\
  \ when possible.\"\n9. Go to your saved list \"{target.list_name}\" and add both\n\
  \   new rebooked properties to it. Also remove the property\n   \"{target.remove_from_list_name}\"\
  \ from the list.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- patience
secondary_primitives: []
start_path: /trips
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Ritz-Carlton Milan
      city: Milan
      country: Italy
      star_rating: 5
      review_score: 9.1
      review_count: 3200
      price: 480.0
      neighborhood: Centro Storico
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Room service
    outputs:
    - cancel1_prop_id
    - cancel1_prop_name
    - cancel1_room_id
    - cancel1_room_name
  - use: create_reservation
    params:
      property_id: '{output.cancel1_prop_id}'
      check_in: '2026-08-05'
      check_out: '2026-08-09'
      price_per_night: 480.0
      status: confirmed
      guests: 2
      booked_days_ago: 20
      cancellation_policy:
        type: free_cancellation
        free_cancel_before_days: 7
        penalty_percentage: 100
        description: "Free cancellation until 7 days before check-in"
    outputs:
    - cancel1_res_id
    - cancel1_conf
    - cancel1_res_prop
  - use: featured_property
    params:
      name: InterContinental Vienna
      city: Vienna
      country: Austria
      star_rating: 5
      review_score: 9.0
      review_count: 4100
      price: 390.0
      neighborhood: Ringstrasse
      amenities:
      - Free WiFi
