  targets:
    cancel1_prop_id: '{output.cancel1_prop_id}'
    cancel1_name: '{output.cancel1_prop_name}'
    cancel1_city: Milan
    cancel1_res_id: '{output.cancel1_res_id}'
    cancel1_conf: '{output.cancel1_conf}'
    cancel2_prop_id: '{output.cancel2_prop_id}'
    cancel2_name: '{output.cancel2_prop_name}'
    cancel2_city: Vienna
    cancel2_res_id: '{output.cancel2_res_id}'
    cancel2_conf: '{output.cancel2_conf}'
    cancel3_prop_id: '{output.cancel3_prop_id}'
    cancel3_name: '{output.cancel3_prop_name}'
    cancel3_city: Prague
    cancel3_res_id: '{output.cancel3_res_id}'
    cancel3_conf: '{output.cancel3_conf}'
    rebook1_prop_id: '{output.rebook1_prop_id}'
    rebook1_name: '{output.rebook1_prop_name}'
    rebook2_prop_id: '{output.rebook2_prop_id}'
    rebook2_name: '{output.rebook2_prop_name}'
    milan_res_id: '{output.cancel1_res_id}'
    vienna_res_id: '{output.cancel2_res_id}'
    milan_rebook_prop_id: '{output.rebook1_prop_id}'
    vienna_rebook_prop_id: '{output.rebook2_prop_id}'
    rebook_combined_budget: 1200
    list_id: '{output.list_id}'
    list_name: '{output.list_name}'
    remove_from_list_id: '{output.cancel3_prop_id}'
    remove_from_list_name: '{output.cancel3_prop_name}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Cancel first reservation (Ritz-Carlton Milan)
      where:
        id: {expr: "x == target['cancel1_res_id']"}
      changes:
        status: {eq: cancelled}
    - entity: Reservation
      desc: Cancel second reservation (InterContinental Vienna)
      where:
        id: {expr: "x == target['cancel2_res_id']"}
      changes:
        status: {eq: cancelled}
    - entity: Reservation
      desc: Cancel third reservation (Four Seasons Prague)
      where:
        id: {expr: "x == target['cancel3_res_id']"}
      changes:
        status: {eq: cancelled}
    - entity: SavedList
      desc: Update Summer 2026 Ideas list - add rebooked, remove cancelled
      where:
        id: {expr: "x == target['list_id']"}
      changes:
        property_ids:
          expr: >-
            target['rebook1_prop_id'] in x and
            target['rebook2_prop_id'] in x and
            target['remove_from_list_id'] not in x
  create:
    - entity: Reservation
      desc: Rebook Milan cheapest hotel for same dates
      properties:
        property_id: {expr: "x == target['rebook1_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-08-05"}
        check_out: {eq: "2026-08-09"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Reservation
      desc: Rebook Vienna cheaper hotel for same dates
      properties:
        property_id: {expr: "x == target['rebook2_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-08-15"}
        check_out: {eq: "2026-08-19"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        # Prompt requires Mastercard ending in 8888 for the Vienna rebooking.
        payment_method_id:
          expr: >-
            any(pm.id == x and pm.card_type == 'Mastercard' and pm.last_four == '8888' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Message
      desc: Send cancellation message to Ritz-Carlton Milan
      properties:
        property_id: {expr: "x == target['cancel1_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'cancellation' in x.lower()"
        body:
          expr: "'budget' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send cancellation message to InterContinental Vienna
      properties:
        property_id: {expr: "x == target['cancel2_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'cancellation' in x.lower()"
        body:
          expr: "'plans' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send cancellation message to Four Seasons Prague
      properties:
        property_id: {expr: "x == target['cancel3_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'cancellation' in x.lower()"
        body:
          expr: "'cancel' in x.lower() or 'rebook' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
  invariant:
    - collection: state.reservations
      filter: >-
        a.id not in (target['cancel1_res_id'], target['cancel2_res_id'], target['cancel3_res_id']) and
        a.property_id not in (target['rebook1_prop_id'], target['rebook2_prop_id'])
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.id != target['list_id']"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id not in (target['cancel1_prop_id'], target['cancel2_prop_id'], target['cancel3_prop_id'])
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
    # Cancelling a reservation auto-generates a rebooking_suggestion
    # (models/booking.py:752). System-only side effect; whitelisted.
    - collection: state.rebooking_suggestions
      filter: "False"
      preserve: ALL
      comprehensive: true
  named_invariants:
    - name: Agent cancelled first reservation
      ref: update[0]
      severity: critical
    - name: Agent cancelled second reservation
      ref: update[1]
      severity: critical
    - name: Agent cancelled third reservation
      ref: update[2]
      severity: critical
    - name: Agent updated saved list with rebooked properties
      ref: update[3]
      severity: high
    - name: Agent rebooked in Milan
      ref: create[0]
      severity: high
    - name: Agent rebooked in Vienna
      ref: create[1]
      severity: high
    - name: Agent sent cancellation message to Milan hotel
      ref: create[2]
      severity: medium
    - name: Agent sent cancellation message to Vienna hotel
      ref: create[3]
      severity: medium
    - name: Agent sent cancellation message to Prague hotel
      ref: create[4]
      severity: medium
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify other saved lists
      ref: invariant[3]
      severity: medium
    - name: Agent only messaged the three cancelled hotels
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
