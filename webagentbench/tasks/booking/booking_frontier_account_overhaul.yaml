task_id: booking_frontier_account_overhaul
env_id: booking
title: 'Frontier: Complete Account Overhaul with Profile, Settings, Payments, and
  Booking'
instruction_template: "Perform a complete account overhaul with these exact steps:\n\
  1. Update your profile: change display name to \"Jordan A. Parker\",\n   phone to\
  \ \"+1-312-555-0198\", and nationality to \"GB\".\n2. Update all account settings:\
  \ change currency to \"EUR\",\n   language to \"French\", enable two-factor authentication,\n\
  \   disable deal alerts, enable newsletter, and enable SMS notifications.\n3. Update\
  \ travel preferences: set preferred bed type to \"queen\",\n   floor preference\
  \ to \"high\", smoking to false,\n   and add \"halal\" to dietary restrictions.\n\
  4. Add two new payment methods:\n   - A Visa ending in 3333, expiry 06/30, holder\
  \ \"Jordan A. Parker\"\n   - A Mastercard ending in 7777, expiry 09/29, holder \"\
  Jordan A. Parker\"\n5. Remove the Mastercard ending in {target.remove_last_four}\n\
  \   (held by \"{target.remove_holder}\").\n6. Set the new Visa (ending 3333) as\
  \ your default payment method.\n7. Search for \"{target.property_name}\" in {target.city}\
  \ and book its\n   \"Deluxe Room\" for 2 guests, checking in 2026-08-01,\n   checking\
  \ out 2026-08-05, using your new default (Visa 3333).\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- verification
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: The Connaught London
      city: London
      country: United Kingdom
      star_rating: 5
      review_score: 9.4
      review_count: 3200
      price: 650.0
      neighborhood: Mayfair
      address: Carlos Place, London W1K 2AL
      distance_km: 0.4
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
      - Butler service
      rooms:
      - name: Classic Room
        price: 650.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Deluxe Room
        price: 850.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
        room_size_sqm: 40.0
      - name: Apartment Suite
        price: 1500.0
        bed_type: king
        max_occupancy: 4
        cancel_type: free_cancellation
    outputs:
    - prop_id
    - prop_name
    - cheap_room_id
    - cheap_room_name
  - use: add_payment_method
    params:
      card_type: Mastercard
      last_four: '5555'
      expiry: 03/27
      holder_name: Alex Parker
      is_default: false
    outputs:
    - remove_pm_id
    - remove_last_four
  - use: set_profile
    params:
      owner_name: Jordan Parker
      owner_phone: +1-217-555-0142
      owner_nationality: US
    outputs:
    - original_name
  - use: set_settings
    params:
      currency: USD
      language: English
      two_factor_enabled: false
      deal_alerts: true
      newsletter: false
      sms_notifications: false
    outputs:
    - settings_updated
  - use: set_preferences
    params:
      preferred_bed_type: double
      floor_preference: low
      smoking: true
      dietary_restrictions:
      - vegetarian
    outputs:
    - prefs_updated
  targets:
    prop_id: '{output.prop_id}'
    property_name: '{output.prop_name}'
    city: London
    remove_pm_id: '{output.remove_pm_id}'
    remove_last_four: '5555'
    remove_holder: Alex Parker
canonical_diff:
  constraints:
    - desc: Display name updated to Jordan A. Parker
      expr: "state.owner_name == 'Jordan A. Parker'"
      severity: high
    - desc: Phone updated to +1-312-555-0198
      expr: "state.owner_phone == '+1-312-555-0198'"
      severity: medium
    - desc: Nationality updated to GB
      expr: "state.owner_nationality == 'GB'"
      severity: medium
    - desc: Currency set to EUR
      expr: "state.settings.currency == 'EUR'"
      severity: high
    - desc: Language set to French
      expr: "state.settings.language == 'French'"
      severity: medium
    - desc: Two-factor authentication enabled
      expr: "state.settings.two_factor_enabled == True"
      severity: critical
    - desc: Deal alerts disabled
      expr: "state.settings.deal_alerts == False"
      severity: medium
    - desc: Newsletter enabled
      expr: "state.settings.newsletter == True"
      severity: medium
    - desc: SMS notifications enabled
      expr: "state.settings.sms_notifications == True"
      severity: medium
    - desc: Preferred bed type set to queen
      expr: "state.travel_preferences.preferred_bed_type == 'queen'"
      severity: medium
    - desc: Floor preference set to high
      expr: "state.travel_preferences.floor_preference == 'high'"
      severity: medium
    - desc: Smoking set to false
      expr: "state.travel_preferences.smoking == False"
      severity: medium
    - desc: Halal added to dietary restrictions
      expr: "'halal' in state.travel_preferences.dietary_restrictions"
      severity: high
  delete:
    - entity: PaymentMethod
      desc: Remove Mastercard 5555
      where:
        id: {expr: "x == target['remove_pm_id']"}
  create:
    - entity: PaymentMethod
      desc: Add new Visa ending 3333 as default
      properties:
        card_type: {eq: "Visa"}
        last_four: {eq: "3333"}
        is_default: {eq: true}
        holder_name: {any: true}
        expiry: {any: true}
    - entity: PaymentMethod
      desc: Add new Mastercard ending 7777
      properties:
        card_type: {eq: "Mastercard"}
        last_four: {eq: "7777"}
        holder_name: {any: true}
        expiry: {any: true}
    - entity: Reservation
      desc: Book the London Connaught Deluxe Room for 2 guests
      properties:
        property_id: {expr: "x == target['prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Deluxe Room"}
        check_in: {eq: "2026-08-01"}
        check_out: {eq: "2026-08-05"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['prop_id']"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      filter: "a.id != target['remove_pm_id'] and a.last_four not in ('3333', '7777')"
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent removed old Mastercard 5555
      ref: delete[0]
      severity: high
    - name: Agent added new Visa 3333 as default
      ref: create[0]
      severity: high
    - name: Agent added new Mastercard 7777
      ref: create[1]
      severity: medium
    - name: Agent booked the London hotel Deluxe Room with correct dates
      ref: create[2]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send unsolicited messages
      ref: invariant[4]
      severity: low
    - name: Agent did not tamper with other payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: state.owner_name == 'Jordan A. Parker'
    desc: Display name updated to Jordan A. Parker
  - expr: state.owner_phone == '+1-312-555-0198'
    desc: Phone updated
  - expr: state.owner_nationality == 'GB'
    desc: Nationality updated to GB
  - expr: state.settings.currency == 'EUR' and state.settings.language == 'French'
    desc: Currency and language updated
  - expr: state.settings.two_factor_enabled == True and state.settings.deal_alerts
      == False
    desc: 2FA enabled and deal alerts disabled
  - expr: state.travel_preferences.preferred_bed_type == 'queen' and state.travel_preferences.floor_preference
      == 'high'
    desc: Bed type and floor preference updated
  - expr: '''halal'' in state.travel_preferences.dietary_restrictions'
    desc: Halal added to dietary restrictions
  - expr: "any(pm.card_type == 'Visa' and pm.last_four == '3333' and pm.is_default\n\
      \  for pm in state.payment_methods)\n"
    desc: New Visa 3333 added and set as default
  - expr: "not any(pm.card_type == 'Mastercard' and pm.last_four == '5555'\n  for\
      \ pm in state.payment_methods)\n"
    desc: Mastercard 5555 was removed
  - expr: "any(\n  r.property_id == '{target.prop_id}' and\n  r.status == 'confirmed'\
      \ and\n  r.check_in == '2026-08-01' and r.check_out == '2026-08-05' and\n  r.room_type_name\
      \ == 'Deluxe Room'\n  for r in state.reservations\n)\n"
    desc: Hotel booked with correct room and dates
  negative_checks:
  - expr: "any(pm.card_type == 'Visa' and pm.last_four == '4242'\n  for pm in state.payment_methods)\n"
    desc: Original Visa 4242 was not removed
    penalty: 0.3
  - expr: state.settings.newsletter == True
    desc: Newsletter was enabled as requested
    penalty: 0.15
  - expr: state.settings.sms_notifications == True
    desc: SMS notifications were enabled as requested
    penalty: 0.15
  - expr: state.owner_email == 'jordan.parker@email.com'
    desc: Email was not accidentally changed
    penalty: 0.3
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id')\
      \ != '{target.prop_id}'\n  for e in state.audit_log\n)\n"
    desc: No reservation at wrong property
    penalty: 0.2
