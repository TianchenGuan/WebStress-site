task_id: booking_expert_family_vacation
env_id: booking
title: Family Vacation Planner with Specific Room Requirements and Saved List
instruction_template: "Plan a family vacation in Barcelona:\n1. Search for family-friendly\
  \ hotels in Barcelona with a pool. Find \"{target.property_name}\".\n2. Verify it\
  \ has the following:\n   - A \"Family Room\" that accommodates at least 4 guests\n\
  \   - Kids' club or kids activities among its amenities\n   - A pool in its facilities\n\
  3. Book the \"Family Room\" with breakfast for 4 guests checking in 2026-08-01 and\
  \ checking out 2026-08-08 (7 nights). Use the default Visa payment (ending in 4242).\n\
  4. Create a new saved list called \"Family Trips\" and add \"{target.property_name}\"\
  \ to it.\n5. Also save the alternative family hotel \"{target.alt_name}\" to the\
  \ same \"Family Trips\" list for future reference.\n6. Send a message to \"{target.property_name}\"\
  \ with subject \"Family requirements\" and body \"We are traveling with two children\
  \ ages 5 and 8. Could you please arrange a crib and provide information about your\
  \ kids club schedule?\"\n7. Update your travel preferences: set preferred room type\
  \ to \"family\" and add \"highchair\" to accessibility needs.\n"
difficulty: expert
time_limit_seconds: 460
expected_steps: 35
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel del Mar Barcelona
      city: Barcelona
      country: Spain
      star_rating: 4
      review_score: 8.7
      review_count: 4560
      price: 210.0
      neighborhood: Barceloneta
      address: Passeig Maritim de la Barceloneta 19, 08003 Barcelona
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Kids club
      - Room service
      - Beach access
      - Playground
      popular_facilities:
      - Pool
      - Kids club
      - Beach access
      - Restaurant
      rooms:
      - name: Standard Double Room
        price: 210.0
        bed_type: double
        max_occupancy: 2
        meals_included: none
        cancel_type: free_cancellation
      - name: Family Room
        price: 295.0
        bed_type: twin
        max_occupancy: 4
        meals_included: breakfast
        cancel_type: free_cancellation
        room_size_sqm: 42.0
      - name: Junior Suite
        price: 380.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
    outputs:
    - prop_id
    - prop_name
    - cheapest_room_id
    - cheapest_room_name
  - use: featured_property
    params:
      name: Catalonia Park Guell
      city: Barcelona
      country: Spain
      star_rating: 4
      review_score: 8.4
      review_count: 2890
      price: 175.0
      neighborhood: Gracia
      address: Carrer de Marti 5, 08024 Barcelona
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Kids activities
      - Fitness center
      rooms:
      - name: Standard Room
        price: 175.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Family Room
        price: 245.0
        bed_type: twin
        max_occupancy: 4
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - alt_id
    - alt_name
    - alt_room_id
    - alt_room_name
  - use: decoy_property
    params:
      name: Hotel Ohla Barcelona
      city: Barcelona
      country: Spain
      star_rating: 5
      review_score: 9.1
      review_count: 3120
      price: 380.0
      neighborhood: Gothic Quarter
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
    outputs:
    - decoy_property_id
    - decoy_property_name
  - use: set_preferences
    params:
      preferred_room_type: standard
      accessibility_needs: false
    outputs:
    - updated
  targets:
    prop_id: '{output.prop_id}'
    property_name: '{output.prop_name}'
    alt_id: '{output.alt_id}'
    alt_name: '{output.alt_name}'
canonical_diff:
  create:
  - entity: Reservation
    desc: Book Family Room at Hotel del Mar Barcelona for 4 guests, 7 nights
    properties:
      property_id:
        expr: x == target['prop_id']
      property_name:
        any: true
      room_type_id:
        any: true
      room_type_name:
        eq: Family Room
      check_in:
        eq: '2026-08-01'
      check_out:
        eq: '2026-08-08'
      nights:
        eq: 7
      guests:
        eq: 4
      rooms:
        any: true
      price_per_night:
        any: true
      total_price:
        any: true
      taxes_and_fees:
        any: true
      currency:
        any: true
      status:
        eq: confirmed
      booked_at:
        any: true
      guest_info:
        any: true
      payment_method_id:
        expr: >-
          x == initial.settings.default_payment_id and
          any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
      cancellation_policy:
        any: true
      confirmation_number:
        any: true
      is_genius_deal:
        any: true
      genius_discount:
        any: true
      meals_included:
        eq: breakfast
      rating_submitted:
        any: true
  - entity: SavedList
    desc: Create Family Trips saved list with both the main and alternative hotels
    properties:
      name:
        eq: Family Trips
      property_ids:
        expr: target['prop_id'] in x and target['alt_id'] in x
      created_at:
        any: true
      updated_at:
        any: true
  - entity: Message
    desc: Send family requirements message to Hotel del Mar Barcelona
    properties:
      property_id:
        expr: x == target['prop_id']
      property_name:
        any: true
      reservation_id:
        any: true
      subject:
        expr: '''family requirements'' in x.lower() or ''family'' in x.lower()'
      body:
        expr: '''children ages 5 and 8'' in x.lower() or ''children'' in x.lower()'
      sender:
        eq: guest
      read:
        eq: false
      created_at:
        any: true
  update:
  - entity: travel_preferences
    desc: Preferred room type set to family and accessibility needs enabled
    where: {id: {eq: "__singleton_travel_preferences__"}}
    changes:
      preferred_room_type: {eq: family}
      accessibility_needs: {eq: true}
  invariant:
  - collection: state.reservations
    filter: a.property_id != target['prop_id'] or a.check_in != '2026-08-01'
    preserve: ALL
  - collection: state.saved_lists
    filter: a.name != 'Family Trips'
    preserve: ALL
  - collection: state.messages
    filter: a.property_id != target['prop_id']
    preserve: ALL
  - collection: state.properties
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  named_invariants:
  - name: Agent booked Family Room at Hotel del Mar for 4 guests
    ref: create[0]
    severity: critical
  - name: Agent created Family Trips list with both hotels
    ref: create[1]
    severity: high
  - name: Agent sent family requirements message to the hotel
    ref: create[2]
    severity: high
  - name: Travel preferences updated (family room, accessibility)
    ref: update[0]
    severity: medium
  - name: Agent did not modify other reservations
    ref: invariant[0]
    severity: high
  - name: Agent did not modify other saved lists
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify existing messages
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify properties
    ref: invariant[3]
    severity: low
  - name: Agent did not create or modify reviews
    ref: invariant[4]
    severity: low
  - name: Agent did not modify payment methods
    ref: invariant[5]
    severity: high
  - name: Agent did not create notifications
    ref: invariant[6]
    severity: low
