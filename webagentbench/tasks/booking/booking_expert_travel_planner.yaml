task_id: booking_expert_travel_planner
env_id: booking
title: Multi-City Travel Planner with Saved List, Booking, and Review
instruction_template: 'Plan a world tour across three cities by completing the following
  workflow:

  1. Search for hotels in Paris and find "{target.paris_name}". Note its cheapest
  room price.

  2. Search for hotels in Tokyo and find "{target.tokyo_name}". Note its cheapest
  room price.

  3. Search for hotels in New York and find "{target.nyc_name}". Note its cheapest
  room price.

  4. Create a new saved list called "World Tour" and add all three hotels to it.

  5. Among the three hotels, book the one with the cheapest room price. Book its cheapest
  room for 2 guests checking in 2026-10-01 and checking out 2026-10-05 (4 nights),
  using the default Visa payment (ending in 4242).

  6. You also have a completed stay at "{target.review_prop_name}" in Paris. Write
  a review for it: overall score 8.5, title "Charming Parisian experience", positive
  comment "Wonderful location near the Eiffel Tower with excellent croissants at breakfast",
  negative comment "Elevator was quite slow during peak hours", travel purpose leisure,
  traveled with couple.

  '
difficulty: expert
time_limit_seconds: 480
expected_steps: 38
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Le Marais Paris
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.7
      review_count: 3450
      price: 280.0
      neighborhood: Le Marais
      address: 15 Rue de Rivoli, 75004 Paris
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Room service
      - Concierge
      - Air conditioning
      popular_facilities:
      - Free WiFi
      - Restaurant
      - Concierge
      rooms:
      - name: Classic Room
        price: 280.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
      - name: Deluxe Suite
        price: 450.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
    outputs:
    - paris_id
    - paris_name
    - paris_room_id
    - paris_room_name
  - use: featured_property
    params:
      name: Shinjuku Granbell Hotel
      city: Tokyo
      country: Japan
      star_rating: 4
      review_score: 8.9
      review_count: 5670
      price: 195.0
      neighborhood: Shinjuku
      address: 2-14-4 Kabukicho, Shinjuku-ku, Tokyo
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Concierge
      popular_facilities:
      - Free WiFi
      - Restaurant
      rooms:
      - name: Standard Double Room
        price: 195.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Premium King Room
        price: 310.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
    outputs:
    - tokyo_id
    - tokyo_name
    - tokyo_room_id
    - tokyo_room_name
  - use: featured_property
    params:
      name: The Knickerbocker New York
      city: New York
      country: United States
      star_rating: 5
      review_score: 9.0
      review_count: 4120
      price: 350.0
      neighborhood: Times Square
      address: 6 Times Square, New York, NY 10036
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
      - Spa
      popular_facilities:
      - Free WiFi
      - Restaurant
      - Spa
      rooms:
      - name: Grand Room
        price: 350.0
        bed_type: king
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Empire Suite
        price: 680.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
    outputs:
    - nyc_id
    - nyc_name
    - nyc_room_id
    - nyc_room_name
  - use: featured_property
    params:
      name: Hotel Lumiere Paris
      city: Paris
      country: France
      star_rating: 3
      review_score: 8.2
      review_count: 1890
      price: 165.0
      neighborhood: Eiffel Tower
      address: 4 Rue Cler, 75007 Paris
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-01-10'
      check_out: '2026-01-14'
      price_per_night: 165.0
      status: completed
      guests: 2
      booked_days_ago: 90
    outputs:
    - review_res_id
    - review_conf_num
    - review_res_prop_id
  - use: decoy_property
    params:
      name: Budget Inn Tokyo
      city: Tokyo
      country: Japan
      star_rating: 2
      review_score: 6.5
      review_count: 340
      price: 85.0
      amenities:
      - Free WiFi
    outputs:
    - decoy_property_id
    - decoy_property_name
  targets:
    paris_id: '{output.paris_id}'
    paris_name: '{output.paris_name}'
    tokyo_id: '{output.tokyo_id}'
    tokyo_name: '{output.tokyo_name}'
    nyc_id: '{output.nyc_id}'
    nyc_name: '{output.nyc_name}'
    cheapest_id: '{output.tokyo_id}'
    cheapest_name: '{output.tokyo_name}'
    review_prop_id: '{output.review_prop_id}'
    review_prop_name: '{output.review_prop_name}'
    review_res_id: '{output.review_res_id}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed Paris reservation
      where:
        id: {expr: "x == target['review_res_id']"}
      changes:
        rating_submitted: {any: true}
  create:
    - entity: SavedList
      desc: Create World Tour list with all three hotels
      properties:
        name: {eq: "World Tour"}
        property_ids:
          expr: >-
            target['paris_id'] in x and
            target['tokyo_id'] in x and
            target['nyc_id'] in x
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Reservation
      desc: Book cheapest hotel (Tokyo) for 2026-10-01 to 2026-10-05
      properties:
        property_id: {expr: "x == target['cheapest_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-10-01"}
        check_out: {eq: "2026-10-05"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['cheapest_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Review
      desc: Write review for completed Paris stay
      properties:
        property_id: {expr: "x == target['review_prop_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 8.5}
        scores: {any: true}
        title: {eq: "Charming Parisian experience"}
        positive:
          expr: "'eiffel tower' in x.lower()"
        negative:
          expr: "'elevator' in x.lower()"
        room_type: {any: true}
        travel_purpose: {eq: leisure}
        traveled_with: {eq: couple}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
  invariant:
    - collection: state.saved_lists
      filter: "a.name != 'World Tour'"
      preserve: ALL
    - collection: state.reservations
      filter: "a.property_id != target['cheapest_id'] and a.id != target['review_res_id']"
      preserve: ALL
    - collection: state.reviews
      filter: "a.property_id != target['review_prop_id']"
      preserve: ALL
    - collection: state.properties
      filter: "a.id not in (target['review_prop_id'],)"
      comprehensive: true
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent created World Tour list with all three hotels
      ref: create[0]
      severity: high
    - name: Agent booked cheapest hotel with correct dates
      ref: create[1]
      severity: critical
    - name: Agent wrote review for completed Paris stay
      ref: create[2]
      severity: high
    - name: Agent did not modify other saved lists
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify other reservations
      ref: invariant[1]
      severity: high
    - name: Agent did not write reviews for other properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[3]
      severity: medium
    - name: Agent did not send unsolicited messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
