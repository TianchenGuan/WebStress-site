task_id: booking_notification_chain
env_id: booking
title: Read Notification, Cancel Reservation, and Save Property
instruction_template: "Complete this multi-step workflow: 1. Go to your notifications\
  \ and find the booking confirmation notification\n   titled \"{target.notif_title}\"\
  . Read it to learn which reservation it\n   refers to.\n2. Find that reservation\
  \ (at \"{target.property_name}\") in your trips and\n   cancel it.\n3. Create a\
  \ new saved list named \"Revisit Later\" and save the property\n   \"{target.property_name}\"\
  \ to that list for future reference.\n"
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- state_tracking
secondary_primitives: []
start_path: /home
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: The Savoy London
      city: London
      country: United Kingdom
      star_rating: 5
      review_score: 9.3
      review_count: 5678
      price: 520.0
      neighborhood: Strand
      address: Strand, London WC2R 0EZ
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
    outputs:
    - target_prop_id
    - target_prop_name
    - target_cheapest_room_id
    - target_cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.target_prop_id}'
      check_in: '2026-09-15'
      check_out: '2026-09-19'
      price_per_night: 520.0
      status: confirmed
      guests: 2
      booked_days_ago: 3
    outputs:
    - target_res_id
    - target_conf_num
    - target_res_property_id
  - use: add_notification
    params:
      type: booking_confirmed
      title: Booking Confirmed - The Savoy London
      message: 'Your reservation at The Savoy London has been confirmed. Confirmation
        number: {output.target_conf_num}. Check-in: 2026-09-15, Check-out: 2026-09-19.'
      read: false
      related_id: '{output.target_res_id}'
    outputs:
    - target_notif_id
  - use: featured_property
    params:
      name: Edinburgh Castle Hotel
      city: Edinburgh
      country: United Kingdom
      star_rating: 4
      review_score: 8.5
      price: 195.0
    outputs:
    - distractor_prop_id
    - distractor_prop_name
    - distractor_cheapest_room_id
    - distractor_cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.distractor_prop_id}'
      check_in: '2026-10-01'
      check_out: '2026-10-04'
      status: confirmed
      booked_days_ago: 7
    outputs:
    - distractor_res_id
    - distractor_conf_num
    - distractor_res_property_id
  - use: add_notification
    params:
      type: deal_alert
      title: Flash Sale - 30% off Edinburgh hotels
      message: Limited time offer on Edinburgh properties. Book now!
      read: false
    outputs:
    - distractor_notif_id
  targets:
    property_id: '{output.target_prop_id}'
    property_name: '{output.target_prop_name}'
    reservation_id: '{output.target_res_id}'
    confirmation_number: '{output.target_conf_num}'
    notification_id: '{output.target_notif_id}'
    notif_title: Booking Confirmed - The Savoy London
    distractor_res_id: '{output.distractor_res_id}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Cancel the target reservation found via the booking confirmation notification
      where:
        id: {expr: "x == target['reservation_id']"}
      changes:
        status: {eq: cancelled}
    - entity: Notification
      desc: Mark the booking confirmation notification as read
      where:
        id: {expr: "x == target['notification_id']"}
      changes:
        read: {eq: true}
  create:
    - entity: SavedList
      desc: Create a new saved list named Revisit Later and add the cancelled property to it
      properties:
        name: {eq: "Revisit Later"}
        property_ids:
          expr: "target['property_id'] in x"
        created_at: {any: true}
        updated_at: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.id != target['reservation_id']"
      preserve: ALL
    - collection: state.notifications
      filter: "a.id != target['notification_id']"
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != 'Revisit Later'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
  named_invariants:
    - name: Agent cancelled the target reservation found via notification
      ref: update[0]
      severity: critical
    - name: Agent marked the booking confirmation notification as read
      ref: update[1]
      severity: high
    - name: Agent created Revisit Later list with target property
      ref: create[0]
      severity: critical
    - name: Agent did not cancel or modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify other notifications
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify other saved lists
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[3]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[4]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[5]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[6]
      severity: high
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.id == '{target.reservation_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: The target reservation was cancelled
  - expr: "any(\n  sl.name == 'Revisit Later'\n  for sl in state.saved_lists\n)\n"
    desc: A saved list named 'Revisit Later' was created
  - expr: "any(\n  sl.name == 'Revisit Later' and '{target.property_id}' in sl.property_ids\n\
      \  for sl in state.saved_lists\n)\n"
    desc: The property was added to the 'Revisit Later' list
  - expr: "any(\n  n.id == '{target.notification_id}' and n.read == True\n  for n\
      \ in state.notifications\n)\n"
    desc: The booking confirmation notification was read
  negative_checks:
  - expr: "not any(\n  r.id == '{target.distractor_res_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: The distractor reservation was not cancelled
    penalty: 0.4
  - expr: "not any(\n  e.action == 'reservation.cancel' and\n  e.payload.get('reservation_id')\
      \ != '{target.reservation_id}'\n  for e in state.audit_log\n)\n"
    desc: No other reservation was cancelled
    penalty: 0.3
  - expr: 'sum(1 for sl in state.saved_lists if sl.name == ''Revisit Later'') <= 1

      '
    desc: Only one 'Revisit Later' list was created
    penalty: 0.1
  - expr: not any(e.action == 'message.send' for e in state.audit_log)
    desc: No off-task hotel messages were sent
    penalty: 0.1
  - expr: not any(e.action == 'review.add' for e in state.audit_log)
    desc: No off-task reviews were submitted
    penalty: 0.1
