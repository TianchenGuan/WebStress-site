task_id: booking_clear_search_history
env_id: booking
title: Clear All Search History
instruction_template: 'Go to the home page and clear all of your search history.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- backtracking
start_path: /home
seed:
  distractors: 3
  actors: {}
  steps: []
  targets: {}
canonical_diff:
  constraints:
    - desc: All search history has been cleared
      expr: "len(state.search_history) == 0"
      severity: critical
  invariant:
    - collection: state.reservations
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent did not modify reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: 'len(state.search_history) == 0

      '
    desc: All search history has been cleared
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.cancel'\n  for e in state.audit_log\n\
      )\n"
    desc: No reservation was accidentally cancelled
    penalty: 0.3
secondary_primitives: []
