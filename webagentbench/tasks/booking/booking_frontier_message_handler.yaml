task_id: booking_frontier_message_handler
env_id: booking
title: 'Frontier: Read, Reply, Send Messages and Book Property'
instruction_template: "Handle all messages and complete a booking:\n1. Read the unread\
  \ message from \"{target.msg1_prop_name}\" about\n   \"{target.msg1_subject}\".\
  \ Reply with subject \"Re: {target.msg1_subject}\"\n   and body \"Thank you for\
  \ the information. I will arrive around 3pm.\"\n2. Read the unread message from\
  \ \"{target.msg2_prop_name}\" about\n   \"{target.msg2_subject}\". Reply with subject\
  \ \"Re: {target.msg2_subject}\"\n   and body \"Noted, thanks. Please also confirm\
  \ late checkout availability.\"\n3. Read the unread message from \"{target.msg3_prop_name}\"\
  \ about\n   \"{target.msg3_subject}\". Reply with subject \"Re: {target.msg3_subject}\"\
  \n   and body \"I appreciate the offer. I will consider upgrading.\"\n4. Send a\
  \ NEW message to \"{target.book_prop_name}\" with subject\n   \"Early check-in request\"\
  \ and body \"I have a flight arriving\n   at 8am. Is early check-in at 10am possible?\"\
  \n5. Book \"{target.book_prop_name}\" - \"Deluxe Room\" for 2 guests,\n   checking\
  \ in 2026-11-10, checking out 2026-11-14, using\n   the default Visa (ending 4242).\n\
  6. After booking, send another message to \"{target.book_prop_name}\"\n   with subject\
  \ \"Booking confirmed\" and body \"Just booked my stay.\n   Looking forward to it!\"\
  \n7. Create a saved list \"Messaged Hotels\" and add all four hotel\n   properties\
  \ to it.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 45
primary_primitives:
- grounding
secondary_primitives: []
start_path: /messages
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Ritz Madrid
      city: Madrid
      country: Spain
      star_rating: 5
      review_score: 9.3
      review_count: 4200
      price: 520.0
      neighborhood: Paseo del Prado
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Fitness center
      - Room service
    outputs:
    - msg1_prop_id
    - msg1_prop_name
    - msg1_room_id
    - msg1_room_name
  - use: send_message
    params:
      property_id: '{output.msg1_prop_id}'
      property_name: Hotel Ritz Madrid
      subject: Check-in details
      body: Welcome! Your check-in time is from 3pm. We have prepared a welcome package
        for you.
      sender: property
      read: false
    outputs:
    - msg1_id
  - use: featured_property
    params:
      name: Florence Palazzo Hotel
      city: Florence
      country: Italy
      star_rating: 4
      review_score: 8.8
      review_count: 2800
      price: 310.0
      neighborhood: Santa Croce
      amenities:
      - Free WiFi
      - Restaurant
      - Rooftop terrace
      - Concierge
    outputs:
    - msg2_prop_id
    - msg2_prop_name
    - msg2_room_id
    - msg2_room_name
  - use: send_message
    params:
      property_id: '{output.msg2_prop_id}'
      property_name: Florence Palazzo Hotel
      subject: Room confirmation
      body: Your Deluxe Room with view of the Duomo is ready. Breakfast is served
        7-10am.
      sender: property
      read: false
    outputs:
    - msg2_id
  - use: featured_property
    params:
      name: Bangkok Riverside Hotel
      city: Bangkok
      country: Thailand
      star_rating: 5
      review_score: 8.9
      review_count: 3500
      price: 180.0
      neighborhood: Riverside
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
      - Bar
    outputs:
    - msg3_prop_id
    - msg3_prop_name
    - msg3_room_id
    - msg3_room_name
  - use: send_message
    params:
      property_id: '{output.msg3_prop_id}'
      property_name: Bangkok Riverside Hotel
      subject: Upgrade offer
      body: We have a special upgrade offer for your stay - upgrade to our River View
        Suite for only $50 more per night.
      sender: property
      read: false
    outputs:
    - msg3_id
  - use: featured_property
    params:
      name: Dubai Marina Luxury Hotel
      city: Dubai
      country: United Arab Emirates
      star_rating: 5
      review_score: 9.1
      review_count: 4800
      price: 380.0
      neighborhood: Dubai Marina
      address: Marina Walk, Dubai Marina
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
      - Bar
      - Beach access
      - Fitness center
      rooms:
      - name: Standard Room
        price: 380.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Deluxe Room
        price: 520.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: sea
      - name: Royal Suite
        price: 950.0
        bed_type: king
        max_occupancy: 4
        cancel_type: free_cancellation
    outputs:
    - book_prop_id
    - book_prop_name
    - book_room_id
    - book_room_name
  targets:
    msg1_prop_id: '{output.msg1_prop_id}'
    msg1_prop_name: Hotel Ritz Madrid
    msg1_subject: Check-in details
    msg2_prop_id: '{output.msg2_prop_id}'
    msg2_prop_name: Florence Palazzo Hotel
    msg2_subject: Room confirmation
    msg3_prop_id: '{output.msg3_prop_id}'
    msg3_prop_name: Bangkok Riverside Hotel
    msg3_subject: Upgrade offer
    book_prop_id: '{output.book_prop_id}'
    book_prop_name: '{output.book_prop_name}'
    msg1_id: '{output.msg1_id}'
    msg2_id: '{output.msg2_id}'
    msg3_id: '{output.msg3_id}'
canonical_diff:
  update:
    - entity: Message
      desc: Mark the three target property messages as read
      bijection:
        over: "[target['msg1_id'], target['msg2_id'], target['msg3_id']]"
        variable: msg_id
      where:
        id: {expr: "x == v"}
      changes:
        read: {eq: true}
  create:
    - entity: Message
      desc: Reply to Madrid hotel about arrival time
      properties:
        property_id: {expr: "x == target['msg1_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'check-in' in x.lower() or 're:' in x.lower()"
        body:
          expr: "'3pm' in x.lower() or 'arrive' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Reply to Florence hotel about late checkout
      properties:
        property_id: {expr: "x == target['msg2_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'room confirmation' in x.lower() or 're:' in x.lower()"
        body:
          expr: "'late checkout' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Reply to Bangkok hotel about upgrade consideration
      properties:
        property_id: {expr: "x == target['msg3_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'upgrade' in x.lower() or 're:' in x.lower()"
        body:
          expr: "'upgrading' in x.lower() or 'consider' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send early check-in request to Dubai hotel
      properties:
        property_id: {expr: "x == target['book_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'early check-in' in x.lower()"
        body:
          expr: "'10am' in x.lower() or 'early' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send booking confirmation message to Dubai hotel
      properties:
        property_id: {expr: "x == target['book_prop_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'booking' in x.lower() and 'confirm' in x.lower()"
        body:
          expr: "'booked' in x.lower() or 'looking forward' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Reservation
      desc: Book Dubai Marina Luxury Hotel Deluxe Room for 4 nights
      properties:
        property_id: {expr: "x == target['book_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Deluxe Room"}
        check_in: {eq: "2026-11-10"}
        check_out: {eq: "2026-11-14"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: SavedList
      desc: Create Messaged Hotels list with all four properties
      properties:
        name: {eq: "Messaged Hotels"}
        property_ids:
          expr: >-
            target['msg1_prop_id'] in x and
            target['msg2_prop_id'] in x and
            target['msg3_prop_id'] in x and
            target['book_prop_id'] in x
        created_at: {any: true}
        updated_at: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['book_prop_id']"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != 'Messaged Hotels'"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id not in (target['msg1_prop_id'], target['msg2_prop_id'], target['msg3_prop_id'], target['book_prop_id'])
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent read all three target property messages
      ref: update[0]
      severity: high
    - name: Agent replied to Madrid hotel
      ref: create[0]
      severity: high
    - name: Agent replied to Florence hotel about late checkout
      ref: create[1]
      severity: high
    - name: Agent replied to Bangkok hotel about upgrade
      ref: create[2]
      severity: high
    - name: Agent sent early check-in request to Dubai hotel
      ref: create[3]
      severity: medium
    - name: Agent sent booking confirmation to Dubai hotel
      ref: create[4]
      severity: low
    - name: Agent booked Dubai hotel Deluxe Room with correct dates
      ref: create[5]
      severity: critical
    - name: Agent created Messaged Hotels list with all four properties
      ref: create[6]
      severity: high
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify other saved lists
      ref: invariant[3]
      severity: medium
    - name: Agent only messaged the four target properties
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
