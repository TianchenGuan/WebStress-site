task_id: booking_book_family_room
env_id: booking
title: Book a Family Room in London with Breakfast
instruction_template: 'Search for hotels in "London" and find the property "{target.property_name}".
  Book the "{target.room_name}" room, which accommodates up to 4 guests. The stay
  is for 5 nights checking in on 2026-08-01 and checking out on 2026-08-06 for 4 guests.
  Make sure breakfast is included with the booking. Use the default Visa payment method
  (ending in 4242). Enter your name and email from your account profile.

  '
difficulty: medium
time_limit_seconds: 220
expected_steps: 14
primary_primitives:
- patience
start_path: /home
seed:
  distractors: 7
  actors: {}
  steps:
  - use: featured_property
    params:
      name: The Kensington Family Hotel
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.6
      review_count: 2780
      price: 199.0
      property_type: Hotel
      neighborhood: Kensington
      address: 24 Cromwell Road, London SW7 2ED
      amenities:
      - Free WiFi
      - Family rooms
      - Restaurant
      - Kids club
      - Laundry service
      - Babysitting
      popular_facilities:
      - Free WiFi
      - Family rooms
      - Restaurant
      - Kids club
      distance_km: 2.3
      rooms:
      - name: Family Room
        price: 199.0
        bed_type: twin_and_double
        max_occupancy: 4
        meals_included: breakfast
        cancel_type: free_cancellation
        original_price: null
        view_type: garden
      - name: Standard Double
        price: 229.0
        bed_type: double
        max_occupancy: 2
        meals_included: none
        cancel_type: free_cancellation
        original_price: null
        view_type: garden
      - name: Junior Suite
        price: 415.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: non-refundable
        original_price: null
        view_type: city
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: decoy_property
    params:
      name: Budget Inn Westminster
      city: London
      country: United Kingdom
      star_rating: 2
      review_score: 6.9
      review_count: 450
      price: 120.0
      property_type: Hotel
      neighborhood: Westminster
      genius_discount_pct: 0
      amenities:
      - Free WiFi
      distance_km: 1.0
    outputs:
    - decoy_budget_id
    - decoy_budget_name
  - use: decoy_property
    params:
      name: Soho Boutique Apartments
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.2
      review_count: 920
      price: 275.0
      property_type: Apartment
      neighborhood: Soho
      genius_discount_pct: 10
      amenities:
      - Free WiFi
      - Kitchen
      - Washer
      distance_km: 1.5
    outputs:
    - decoy_soho_id
    - decoy_soho_name
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    room_id: '{output.cheapest_room_id}'
    room_name: Family Room
canonical_diff:
  create:
    - entity: Reservation
      desc: Book the Family Room at the Kensington Family Hotel
      properties:
        property_id: {expr: "x == target['property_id']"}
        property_name: {any: true}
        room_type_id: {expr: "x == target['room_id']"}
        room_type_name: {eq: "Family Room"}
        check_in: {eq: "2026-08-01"}
        check_out: {eq: "2026-08-06"}
        nights: {eq: 5}
        guests: {eq: 4}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {eq: breakfast}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['property_id'] or a.check_in != '2026-08-01'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the Family Room at the correct hotel with correct details
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.check_in == '2026-08-01'\
      \ and\n  r.check_out == '2026-08-06' and\n  r.status == 'confirmed'\n  for r\
      \ in state.reservations\n)\n"
    desc: Reservation was created for the correct property and dates (5 nights)
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.room_type_id ==\
      \ '{target.room_id}' and\n  r.guests == 4\n  for r in state.reservations\n \
      \ if not r.id.startswith('res_initial_')\n)\n"
    desc: Reservation is for the Family Room with 4 guests
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.meals_included\
      \ == 'breakfast'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Breakfast is included in the reservation
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and e.payload.get('property_id')\
      \ != '{target.property_id}'\n  for e in state.audit_log\n)\n"
    desc: No reservation made for wrong property
    penalty: 0.3
  - expr: "not any(\n  r.property_id == '{target.property_id}' and r.guests < 4\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Reservation was not booked with fewer than 4 guests
    penalty: 0.2
secondary_primitives: []
