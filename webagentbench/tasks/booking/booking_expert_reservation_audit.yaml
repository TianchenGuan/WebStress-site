task_id: booking_expert_reservation_audit
env_id: booking
title: Audit Reservations with Cancellations, Modification, and Messages
instruction_template: "Perform a full audit of your current reservations:\n\
  1. Review all your confirmed upcoming reservations and identify their total\
  \ prices.\n\
  2. Cancel the 2 most expensive reservations:\n\
  \   - \"{target.expensive_name_1}\" (the most expensive)\n\
  \   - \"{target.expensive_name_2}\" (the second most expensive)\n\
  3. Find your cheapest confirmed reservation at \"{target.cheap_name}\".\n\
  \   Modify it to extend by 2 extra nights: change check-out from\
  \ {target.original_checkout} to {target.new_checkout}.\n\
  4. Send a message to \"{target.expensive_name_1}\" with subject\
  \ \"Cancellation - Schedule Change\" and body \"I regret to inform you that\
  \ I must cancel my reservation due to a work schedule change. I hope to\
  \ rebook in the future.\"\n\
  5. Send a message to \"{target.expensive_name_2}\" with subject\
  \ \"Cancellation - Trip Replanning\" and body \"I am cancelling this\
  \ reservation as I am replanning my trip itinerary. Thank you for\
  \ your understanding.\"\n"
difficulty: expert
time_limit_seconds: 460
expected_steps: 35
primary_primitives:
- state_tracking
- planning
- backtracking
secondary_primitives:
- grounding
- patience
- verification
start_path: /trips
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: The Ritz London
      city: London
      country: United Kingdom
      star_rating: 5
      review_score: 9.4
      review_count: 6780
      price: 650.0
      neighborhood: Piccadilly
      address: 150 Piccadilly, London W1J 9BR
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Bar
      - Room service
      - Fitness center
      - Concierge
      rooms:
      - name: Superior Room
        price: 650.0
        bed_type: king
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Executive Suite
        price: 1100.0
        bed_type: king
        max_occupancy: 3
        cancel_type: free_cancellation
    outputs:
    - exp1_prop_id
    - exp1_prop_name
    - exp1_room_id
    - exp1_room_name
  - use: create_reservation
    params:
      property_id: '{output.exp1_prop_id}'
      check_in: '2026-09-01'
      check_out: '2026-09-05'
      price_per_night: 650.0
      status: confirmed
      guests: 2
      booked_days_ago: 20
    outputs:
    - exp1_res_id
    - exp1_conf_num
    - exp1_res_prop_id
  - use: featured_property
    params:
      name: Park Hyatt Sydney
      city: Sydney
      country: Australia
      star_rating: 5
      review_score: 9.2
      review_count: 4560
      price: 520.0
      neighborhood: The Rocks
      address: 7 Hickson Road, Sydney NSW 2000
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      rooms:
      - name: Park Room
        price: 520.0
        bed_type: king
        max_occupancy: 2
        cancel_type: free_cancellation
    outputs:
    - exp2_prop_id
    - exp2_prop_name
    - exp2_room_id
    - exp2_room_name
  - use: create_reservation
    params:
      property_id: '{output.exp2_prop_id}'
      check_in: '2026-10-10'
      check_out: '2026-10-14'
      price_per_night: 520.0
      status: confirmed
      guests: 2
      booked_days_ago: 15
    outputs:
    - exp2_res_id
    - exp2_conf_num
    - exp2_res_prop_id
  - use: featured_property
    params:
      name: Ibis Styles Berlin Mitte
      city: Berlin
      country: Germany
      star_rating: 3
      review_score: 7.8
      review_count: 2340
      price: 95.0
      neighborhood: Mitte
      address: Brunnenstrasse 1, 10119 Berlin
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - 24-hour front desk
      rooms:
      - name: Standard Twin Room
        price: 95.0
        bed_type: twin
        max_occupancy: 2
        cancel_type: free_cancellation
    outputs:
    - cheap_prop_id
    - cheap_prop_name
    - cheap_room_id
    - cheap_room_name
  - use: modify_reservation
    params:
      property_id: '{output.cheap_prop_id}'
      check_in: '2026-08-20'
      check_out: '2026-08-23'
      price_per_night: 95.0
      guests: 2
      booked_days_ago: 25
    outputs:
    - cheap_res_id
    - cheap_conf_num
    - cheap_res_prop_id
    - cheap_check_in
    - cheap_check_out
  - use: featured_property
    params:
      name: Hotel Amigo Brussels
      city: Brussels
      country: Belgium
      star_rating: 4
      review_score: 8.6
      review_count: 1870
      price: 240.0
      neighborhood: Grand Place
      rooms:
      - name: Classic Room
        price: 240.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
    outputs:
    - mid_prop_id
    - mid_prop_name
    - mid_room_id
    - mid_room_name
  - use: create_reservation
    params:
      property_id: '{output.mid_prop_id}'
      check_in: '2026-11-05'
      check_out: '2026-11-08'
      price_per_night: 240.0
      status: confirmed
      guests: 2
      booked_days_ago: 10
    outputs:
    - mid_res_id
    - mid_conf_num
    - mid_res_prop_id
  targets:
    exp1_res_id: '{output.exp1_res_id}'
    exp1_prop_id: '{output.exp1_prop_id}'
    expensive_name_1: '{output.exp1_prop_name}'
    exp2_res_id: '{output.exp2_res_id}'
    exp2_prop_id: '{output.exp2_prop_id}'
    expensive_name_2: '{output.exp2_prop_name}'
    cheap_res_id: '{output.cheap_res_id}'
    cheap_prop_id: '{output.cheap_prop_id}'
    cheap_name: '{output.cheap_prop_name}'
    original_checkout: '2026-08-23'
    new_checkout: '2026-08-25'
    mid_res_id: '{output.mid_res_id}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.id == '{target.exp1_res_id}' and r.status == 'cancelled'\n  for\
      \ r in state.reservations\n)\n"
    desc: Most expensive reservation (The Ritz London) was cancelled
  - expr: "any(\n  r.id == '{target.exp2_res_id}' and r.status == 'cancelled'\n  for\
      \ r in state.reservations\n)\n"
    desc: Second most expensive reservation (Park Hyatt Sydney) was cancelled
  - expr: "any(\n  r.id == '{target.cheap_res_id}' and\n  r.check_out == '2026-08-25'\n\
      \  for r in state.reservations\n)\n"
    desc: Cheapest reservation extended to new check-out date
  - expr: "any(\n  m.property_id == '{target.exp1_prop_id}' and\n  'cancellation' in\
      \ m.subject.lower() and\n  'schedule change' in m.body.lower()\n  for m in state.messages\n\
      \  if m.sender == 'user'\n)\n"
    desc: Message sent to first cancelled property about schedule change
  - expr: "any(\n  m.property_id == '{target.exp2_prop_id}' and\n  'cancellation' in\
      \ m.subject.lower() and\n  'replanning' in m.body.lower()\n  for m in state.messages\n\
      \  if m.sender == 'user'\n)\n"
    desc: Message sent to second cancelled property about trip replanning
  negative_checks:
  - expr: "not any(\n  r.id == '{target.mid_res_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: Mid-priced reservation was not cancelled
    penalty: 0.3
  - expr: "not any(\n  r.id == '{target.cheap_res_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: Cheapest reservation was not cancelled (should be modified)
    penalty: 0.3
  - expr: "any(\n  r.id == '{target.cheap_res_id}' and\n  r.check_in == '2026-08-20'\n\
      \  for r in state.reservations\n)\n"
    desc: Check-in date was not accidentally changed
    penalty: 0.2
