task_id: booking_expert_review_marathon
env_id: booking
title: Review Marathon for Three Completed Stays with Varied Feedback
instruction_template: 'You have three completed stays that need reviews. Write a unique review for each
  with the specific details below:


  1. "{target.prop_name_1}" in Rome - Overall score: 9.5, title: "Absolutely magnificent", positive: "Stunning
  rooftop terrace with views of the Colosseum and impeccable room service", negative: (none), travel purpose:
  leisure, traveled with: couple.


  2. "{target.prop_name_2}" in Berlin - Overall score: 7.0, title: "Decent but disappointing", positive:
  "Convenient location near public transport and helpful concierge", negative: "Bathroom was outdated
  and breakfast buffet had limited options", travel purpose: business, traveled with: solo.


  3. "{target.prop_name_3}" in Barcelona - Overall score: 8.0, title: "Solid choice for families", positive:
  "Kids loved the pool area and the staff were very accommodating with children", negative: "Restaurant
  was overpriced for the quality offered", travel purpose: leisure, traveled with: family.

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
- patience
secondary_primitives:
- state_tracking
start_path: /trips
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Palazzo Dama Rome
      city: Rome
      country: Italy
      star_rating: 5
      review_score: 9.3
      review_count: 2890
      price: 420.0
      neighborhood: Piazza del Popolo
      address: Lungotevere Arnaldo da Brescia 2, 00196 Rome
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Room service
      - Garden
    outputs:
    - prop_id_1
    - prop_name_1
    - room_id_1
    - room_name_1
  - use: create_reservation
    params:
      property_id: '{output.prop_id_1}'
      check_in: '2026-01-05'
      check_out: '2026-01-09'
      price_per_night: 420.0
      status: completed
      guests: 2
      booked_days_ago: 95
    outputs:
    - res_id_1
    - conf_num_1
    - res_prop_id_1
  - use: featured_property
    params:
      name: NH Collection Berlin Friedrichstrasse
      city: Berlin
      country: Germany
      star_rating: 4
      review_score: 8.1
      review_count: 3450
      price: 185.0
      neighborhood: Mitte
      address: Friedrichstrasse 96, 10117 Berlin
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Business center
      - 24-hour front desk
    outputs:
    - prop_id_2
    - prop_name_2
    - room_id_2
    - room_name_2
  - use: create_reservation
    params:
      property_id: '{output.prop_id_2}'
      check_in: '2026-02-10'
      check_out: '2026-02-13'
      price_per_night: 185.0
      status: completed
      guests: 1
      booked_days_ago: 60
    outputs:
    - res_id_2
    - conf_num_2
    - res_prop_id_2
  - use: featured_property
    params:
      name: Hotel Arts Barcelona
      city: Barcelona
      country: Spain
      star_rating: 5
      review_score: 9.0
      review_count: 7890
      price: 380.0
      neighborhood: Port Olimpic
      address: Carrer de la Marina 19-21, 08005 Barcelona
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Beach access
      - Fitness center
      - Kids club
    outputs:
    - prop_id_3
    - prop_name_3
    - room_id_3
    - room_name_3
  - use: create_reservation
    params:
      property_id: '{output.prop_id_3}'
      check_in: '2025-12-20'
      check_out: '2025-12-26'
      price_per_night: 380.0
      status: completed
      guests: 4
      booked_days_ago: 110
    outputs:
    - res_id_3
    - conf_num_3
    - res_prop_id_3
  - use: featured_property
    params:
      name: Mercure Rome Colosseum Centre
      city: Rome
      country: Italy
      star_rating: 3
      review_score: 7.5
      review_count: 1200
      price: 130.0
    outputs:
    - distractor_prop_id
    - distractor_prop_name
    - distractor_room_id
    - distractor_room_name
  - use: create_reservation
    params:
      property_id: '{output.distractor_prop_id}'
      check_in: '2026-03-01'
      check_out: '2026-03-04'
      price_per_night: 130.0
      status: completed
      guests: 1
      booked_days_ago: 40
    outputs:
    - distractor_res_id
    - distractor_conf_num
    - distractor_res_prop_id
  - use: add_review
    params:
      property_id: '{output.distractor_prop_id}'
      overall_score: 7.0
      title: It was fine
      positive: Central location
      author_name: Jordan Parker
    outputs:
    - existing_review_id
  targets:
    prop_id_1: '{output.prop_id_1}'
    prop_name_1: '{output.prop_name_1}'
    prop_id_2: '{output.prop_id_2}'
    prop_name_2: '{output.prop_name_2}'
    prop_id_3: '{output.prop_id_3}'
    prop_name_3: '{output.prop_name_3}'
    distractor_prop_id: '{output.distractor_prop_id}'
    existing_review_id: '{output.existing_review_id}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  rv.property_id == '{target.prop_id_1}' and\n  rv.overall_score == 9.5 and\n  rv.title\
      \ == 'Absolutely magnificent'\n  for rv in state.reviews\n)\n"
    desc: Rome review written with score 9.5 and correct title
  - expr: "any(\n  rv.property_id == '{target.prop_id_1}' and\n  'rooftop terrace' in rv.positive.lower()\n\
      \  for rv in state.reviews\n)\n"
    desc: Rome review positive mentions rooftop terrace
  - expr: "any(\n  rv.property_id == '{target.prop_id_2}' and\n  rv.overall_score == 7.0 and\n  rv.title\
      \ == 'Decent but disappointing'\n  for rv in state.reviews\n)\n"
    desc: Berlin review written with score 7.0 and correct title
  - expr: "any(\n  rv.property_id == '{target.prop_id_2}' and\n  'bathroom was outdated' in rv.negative.lower()\n\
      \  for rv in state.reviews\n)\n"
    desc: Berlin review negative comment mentions outdated bathroom
  - expr: "any(\n  rv.property_id == '{target.prop_id_3}' and\n  rv.overall_score == 8.0 and\n  rv.title\
      \ == 'Solid choice for families'\n  for rv in state.reviews\n)\n"
    desc: Barcelona review written with score 8.0 and correct title
  - expr: "any(\n  rv.property_id == '{target.prop_id_3}' and\n  'pool area' in rv.positive.lower()\n\
      \  for rv in state.reviews\n)\n"
    desc: Barcelona review positive mentions pool area
  - expr: "any(\n  rv.property_id == '{target.prop_id_3}' and\n  'overpriced' in rv.negative.lower()\n\
      \  for rv in state.reviews\n)\n"
    desc: Barcelona review negative mentions overpriced restaurant
  negative_checks:
  - expr: "sum(1 for rv in state.reviews\n  if rv.property_id == '{target.distractor_prop_id}'\n  and\
      \ rv.id != '{target.existing_review_id}') == 0\n"
    desc: No duplicate review written for the already-reviewed property
    penalty: 0.2
  - expr: "not any(\n  rv.property_id == '{target.prop_id_1}' and\n  rv.overall_score != 9.5\n  for rv\
      \ in state.reviews\n  if rv.author_name == 'Jordan Parker'\n)\n"
    desc: Rome review has exactly score 9.5 (not a different score)
    penalty: 0.15
  - expr: "not any(\n  rv.property_id == '{target.prop_id_2}' and\n  rv.overall_score != 7.0\n  for rv\
      \ in state.reviews\n  if rv.author_name == 'Jordan Parker'\n)\n"
    desc: Berlin review has exactly score 7.0 (not a different score)
    penalty: 0.15
  - expr: "sum(1 for rv in state.reviews\n  if rv.author_name == 'Jordan Parker'\n  and rv.id != '{target.existing_review_id}'\n\
      \  and rv.property_id not in ('{target.prop_id_1}', '{target.prop_id_2}', '{target.prop_id_3}'))\
      \ == 0\n"
    desc: No reviews written for unrelated properties
    penalty: 0.15
