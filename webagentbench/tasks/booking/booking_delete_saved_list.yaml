task_id: booking_delete_saved_list
env_id: booking
title: Delete a Saved List
instruction_template: 'Go to your saved lists and delete the list named "{target.list_name}".

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- grounding
start_path: /saved
seed:
  distractors: 4
  actors: {}
  steps:
  - use: create_saved_list
    params:
      name: Weekend Getaways
    outputs:
    - target_list_id
    - target_list_name
  - use: create_saved_list
    params:
      name: Summer Vacation Ideas
    outputs:
    - other_list_1_id
    - other_list_1_name
  - use: create_saved_list
    params:
      name: Business Trip Hotels
    outputs:
    - other_list_2_id
    - other_list_2_name
  targets:
    list_id: '{output.target_list_id}'
    list_name: Weekend Getaways
canonical_diff:
  delete:
    - entity: SavedList
      desc: Delete the Weekend Getaways saved list
      where:
        id: {expr: "x == target['list_id']"}
  invariant:
    - collection: state.saved_lists
      filter: "a.id != target['list_id']"
      preserve: ALL
    - collection: state.reservations
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent deleted the target saved list
      ref: delete[0]
      severity: critical
    - name: Agent did not delete or modify other saved lists
      ref: invariant[0]
      severity: high
    - name: Agent did not modify reservations
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: "not any(\n  sl.id == '{target.list_id}'\n  for sl in state.saved_lists\n\
      )\n"
    desc: The target saved list has been deleted
  negative_checks:
  - expr: "any(\n  sl.name == 'Summer Vacation Ideas'\n  for sl in state.saved_lists\n\
      )\n"
    desc: Other saved lists were not deleted
    penalty: 0.3
  - expr: "any(\n  sl.name == 'Business Trip Hotels'\n  for sl in state.saved_lists\n\
      )\n"
    desc: The Business Trip Hotels list was not deleted
    penalty: 0.3
