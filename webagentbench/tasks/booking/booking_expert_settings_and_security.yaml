task_id: booking_expert_settings_and_security
env_id: booking
title: Comprehensive Security and Settings Overhaul
instruction_template: 'Perform a complete security and settings overhaul:

  1. Enable two-factor authentication.

  2. Change your password (update the security settings).

  3. Set your preferred currency to GBP.

  4. Set your language to English (confirm or set it).

  5. Disable SMS notifications.

  6. Enable the newsletter.

  7. Disable deal alerts.

  8. Update your dietary restrictions to ["gluten-free", "vegetarian"].

  9. Set your preferred bed type to "king".

  10. Set floor preference to "high".

  11. Update your phone number to "+44-20-7946-0958".

  12. After completing all settings changes, book "{target.property_name}" in London to confirm your updated
  settings work: book the "Standard Room" for 2 guests checking in 2026-11-01 and checking out 2026-11-04.
  Use the default Visa (ending in 4242).

  '
difficulty: expert
time_limit_seconds: 460
expected_steps: 35
primary_primitives:
- patience
secondary_primitives:
- state_tracking
start_path: /settings
seed:
  distractors: 10
  actors: {}
  steps:
  - use: set_settings
    params:
      two_factor_enabled: false
      sms_notifications: true
      newsletter: false
      deal_alerts: true
      currency: USD
      language: English
    outputs:
    - updated
  - use: set_preferences
    params:
      preferred_bed_type: queen
      floor_preference: low
      dietary_restrictions:
      - dairy-free
    outputs:
    - updated
  - use: set_profile
    params:
      owner_phone: +1-217-555-0142
    outputs:
    - owner_name
  - use: featured_property
    params:
      name: The Hoxton Holborn London
      city: London
      country: United Kingdom
      star_rating: 4
      review_score: 8.5
      review_count: 5670
      price: 195.0
      neighborhood: Holborn
      address: 199-206 High Holborn, London WC1V 7BD
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - 24-hour front desk
      popular_facilities:
      - Free WiFi
      - Restaurant
      - Bar
      rooms:
      - name: Standard Room
        price: 195.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Roomy Room
        price: 265.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - prop_id
    - prop_name
    - room_id
    - room_name
  targets:
    prop_id: '{output.prop_id}'
    property_name: '{output.prop_name}'
eval:
  source: server_state
  checks:
  - expr: state.settings.two_factor_enabled == True
    desc: Two-factor authentication is enabled
  - expr: state.settings.currency == 'GBP'
    desc: Currency changed to GBP
  - expr: state.settings.sms_notifications == False
    desc: SMS notifications disabled
  - expr: state.settings.newsletter == True
    desc: Newsletter enabled
  - expr: state.settings.deal_alerts == False
    desc: Deal alerts disabled
  - expr: '''gluten-free'' in state.travel_preferences.dietary_restrictions and ''vegetarian'' in state.travel_preferences.dietary_restrictions'
    desc: Dietary restrictions updated to gluten-free and vegetarian
  - expr: state.travel_preferences.preferred_bed_type == 'king'
    desc: Preferred bed type set to king
  - expr: state.travel_preferences.floor_preference == 'high'
    desc: Floor preference set to high
  - expr: "any(\n  r.property_id == '{target.prop_id}' and\n  r.status == 'confirmed' and\n  r.check_in\
      \ == '2026-11-01' and\n  r.check_out == '2026-11-04'\n  for r in state.reservations\n)\n"
    desc: Hotel booked with correct dates
  negative_checks:
  - expr: state.settings.email_notifications == True
    desc: Email notifications were not accidentally disabled
    penalty: 0.2
  - expr: state.owner_phone == '+44-20-7946-0958'
    desc: Phone number was updated correctly
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.prop_id}' and\n  r.room_type_name != 'Standard Room'\n\
      \  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Booked the correct room type (Standard Room)
    penalty: 0.2
  - expr: '''dairy-free'' not in state.travel_preferences.dietary_restrictions'
    desc: Old dietary restriction (dairy-free) was replaced, not kept
    penalty: 0.15
