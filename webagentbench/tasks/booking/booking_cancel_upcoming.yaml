task_id: booking_cancel_upcoming
env_id: booking
title: Cancel an Upcoming Reservation
instruction_template: 'Go to your trips and cancel the upcoming reservation at "{target.property_name}"
  with confirmation number {target.confirmation_number}.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- grounding
start_path: /trips
seed:
  distractors: 4
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Harbor View Inn
      city: San Francisco
      country: United States
      star_rating: 3
      review_score: 7.8
      price: 165.0
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.property_id}'
      check_in: '2026-06-01'
      check_out: '2026-06-04'
      status: confirmed
      booked_days_ago: 3
    outputs:
    - reservation_id
    - confirmation_number
    - property_id
  targets:
    property_name: '{output.property_name}'
    reservation_id: '{output.reservation_id}'
    confirmation_number: '{output.confirmation_number}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.id == '{target.reservation_id}' and r.status == 'cancelled'\n\
      \  for r in state.reservations\n)\n"
    desc: The target reservation was cancelled
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.cancel' and e.payload.get('reservation_id')\
      \ != '{target.reservation_id}'\n  for e in state.audit_log\n)\n"
    desc: No other reservation was cancelled by the agent
    penalty: 0.3
