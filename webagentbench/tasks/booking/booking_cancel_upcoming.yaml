task_id: booking_cancel_upcoming
env_id: booking
title: Cancel an Upcoming Reservation
instruction_template: 'Go to your trips and cancel the upcoming reservation at "{target.property_name}"
  with confirmation number {target.confirmation_number}. Accept whatever cancellation
  fee is shown and confirm the cancellation.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- backtracking
start_path: /trips
seed:
  distractors: 4
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Harbor View Inn
      city: San Francisco
      country: United States
      star_rating: 3
      review_score: 7.8
      price: 165.0
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: create_reservation
    params:
      property_id: '{output.property_id}'
      check_in: '2026-06-01'
      check_out: '2026-06-04'
      status: confirmed
      booked_days_ago: 3
      cancellation_policy:
        type: partial_refund
        penalty_percentage: 50
        description: "50% cancellation fee applies"
    outputs:
    - reservation_id
    - confirmation_number
    - property_id
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    reservation_id: '{output.reservation_id}'
    confirmation_number: '{output.confirmation_number}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Cancel the target reservation
      where:
        id: {expr: "x == target['reservation_id']"}
      changes:
        status: {eq: cancelled}
  invariant:
    - collection: state.reservations
      filter: "a.id != target['reservation_id']"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
    # Cancelling a reservation auto-generates a rebooking_suggestion
    # (models/booking.py:752). These are system-only side effects —
    # the agent has no UI to create them directly.
    - collection: state.rebooking_suggestions
      filter: "False"
      preserve: ALL
      comprehensive: true
  constraints:
    - desc: Agent acknowledged the cancellation fee
      expr: "any(e.action == 'reservation.cancel' and e.payload.get('fee_accepted') is not None for e in state.audit_log)"
      severity: high
  named_invariants:
    - name: Agent cancelled the target reservation
      ref: update[0]
      severity: critical
    - name: Agent did not cancel or modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify property data
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
    - name: Rebooking suggestions are system-generated side effects
      ref: invariant[7]
      severity: low
secondary_primitives: []
