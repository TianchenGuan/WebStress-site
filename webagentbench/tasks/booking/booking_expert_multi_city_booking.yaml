task_id: booking_expert_multi_city_booking
env_id: booking
title: Multi-City Trip Booking with Different Payment Methods
instruction_template: "Book a multi-leg international trip across 3 cities:\n1. Book\
  \ \"{target.paris_name}\" in Paris:\n   - Cheapest room, 2 guests, check-in 2026-09-01,\
  \ check-out 2026-09-04 (3 nights)\n   - Use Visa ending in 4242 (default)\n2. Book\
  \ \"{target.tokyo_name}\" in Tokyo:\n   - Cheapest room, 2 guests, check-in 2026-09-06,\
  \ check-out 2026-09-10 (4 nights)\n   - Use Mastercard ending in 8888\n3. Book \"\
  {target.london_name}\" in London:\n   - Cheapest room, 2 guests, check-in 2026-09-12,\
  \ check-out 2026-09-15 (3 nights)\n   - Use Amex ending in 1234\n4. Create a saved\
  \ list called \"Europe-Asia Trip Sep 2026\" and add all three hotels to it.\n5.\
  \ Send a message to each hotel with subject \"Arrival Information\":\n   - To Paris\
  \ hotel: body \"Arriving from New York on a morning flight. Expected arrival at\
  \ hotel around 2pm.\"\n   - To Tokyo hotel: body \"Arriving from Paris on an evening\
  \ flight. Expected arrival at hotel around 10pm. Please arrange late check-in.\"\
  \n   - To London hotel: body \"Arriving from Tokyo on an afternoon flight. Expected\
  \ arrival at hotel around 6pm.\"\n"
difficulty: expert
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Hotel Brighton Paris
      city: Paris
      country: France
      star_rating: 4
      review_score: 8.6
      review_count: 3890
      price: 240.0
      neighborhood: Tuileries
      address: 218 Rue de Rivoli, 75001 Paris
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Room service
      - Concierge
      popular_facilities:
      - Free WiFi
      - Restaurant
      rooms:
      - name: Classic Double Room
        price: 240.0
        bed_type: double
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Deluxe Room Tuileries View
        price: 350.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
    outputs:
    - paris_id
    - paris_name
    - paris_room_id
    - paris_room_name
  - use: featured_property
    params:
      name: Park Hotel Tokyo
      city: Tokyo
      country: Japan
      star_rating: 4
      review_score: 8.8
      review_count: 4560
      price: 210.0
      neighborhood: Shiodome
      address: 1-7-1 Higashi Shimbashi, Minato-ku, Tokyo
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Spa
      - Fitness center
      - 24-hour front desk
      popular_facilities:
      - Free WiFi
      - Spa
      - Restaurant
      rooms:
      - name: Artist Room
        price: 210.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Gallery Room
        price: 290.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
    outputs:
    - tokyo_id
    - tokyo_name
    - tokyo_room_id
    - tokyo_room_name
  - use: featured_property
    params:
      name: The Ned London
      city: London
      country: United Kingdom
      star_rating: 5
      review_score: 9.0
      review_count: 3210
      price: 320.0
      neighborhood: City of London
      address: 27 Poultry, London EC2R 8AJ
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      popular_facilities:
      - Spa
      - Pool
      - Restaurant
      rooms:
      - name: Cosy Room
        price: 320.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Lutyens Suite
        price: 580.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - london_id
    - london_name
    - london_room_id
    - london_room_name
  - use: decoy_property
    params:
      name: Mercure Paris Centre Eiffel
      city: Paris
      country: France
      star_rating: 3
      review_score: 7.5
      review_count: 4560
      price: 155.0
    outputs:
    - decoy_property_id
    - decoy_property_name
  targets:
    paris_id: '{output.paris_id}'
    paris_name: '{output.paris_name}'
    tokyo_id: '{output.tokyo_id}'
    tokyo_name: '{output.tokyo_name}'
    london_id: '{output.london_id}'
    london_name: '{output.london_name}'
canonical_diff:
  create:
    - entity: Reservation
      desc: Book Paris hotel with Visa, 2026-09-01 to 2026-09-04
      properties:
        property_id: {expr: "x == target['paris_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-01"}
        check_out: {eq: "2026-09-04"}
        nights: {eq: 3}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['paris_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Reservation
      desc: Book Tokyo hotel with Mastercard, 2026-09-06 to 2026-09-10
      properties:
        property_id: {expr: "x == target['tokyo_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-06"}
        check_out: {eq: "2026-09-10"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['tokyo_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            any(pm.id == x and pm.card_type == 'Mastercard' and pm.last_four == '8888' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Reservation
      desc: Book London hotel with Amex, 2026-09-12 to 2026-09-15
      properties:
        property_id: {expr: "x == target['london_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-12"}
        check_out: {eq: "2026-09-15"}
        nights: {eq: 3}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == min(rt.price_per_night for p in initial.properties if p.id == target['london_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            any(pm.id == x and pm.card_type == 'Amex' and pm.last_four == '1234' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: SavedList
      desc: Create Europe-Asia Trip Sep 2026 list with all three hotels
      properties:
        name: {eq: "Europe-Asia Trip Sep 2026"}
        property_ids:
          expr: >-
            target['paris_id'] in x and
            target['tokyo_id'] in x and
            target['london_id'] in x
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Message
      desc: Send arrival info to Paris hotel
      properties:
        property_id: {expr: "x == target['paris_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject: {eq: "Arrival Information"}
        body:
          expr: "'new york' in x.lower() or 'morning flight' in x.lower() or '2pm' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send arrival info to Tokyo hotel mentioning late check-in
      properties:
        property_id: {expr: "x == target['tokyo_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject: {eq: "Arrival Information"}
        body:
          expr: "'late check-in' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Message
      desc: Send arrival info to London hotel
      properties:
        property_id: {expr: "x == target['london_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject: {eq: "Arrival Information"}
        body:
          expr: "'tokyo' in x.lower() or 'afternoon flight' in x.lower() or '6pm' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
  invariant:
    - collection: state.reservations
      filter: >-
        a.property_id not in (target['paris_id'], target['tokyo_id'], target['london_id'])
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != 'Europe-Asia Trip Sep 2026'"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id not in (target['paris_id'], target['tokyo_id'], target['london_id'])
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked Paris hotel with correct dates
      ref: create[0]
      severity: critical
    - name: Agent booked Tokyo hotel with correct dates
      ref: create[1]
      severity: critical
    - name: Agent booked London hotel with correct dates
      ref: create[2]
      severity: critical
    - name: Agent created Europe-Asia trip list with all three hotels
      ref: create[3]
      severity: high
    - name: Agent sent arrival message to Paris hotel
      ref: create[4]
      severity: medium
    - name: Agent sent late check-in message to Tokyo hotel
      ref: create[5]
      severity: medium
    - name: Agent sent arrival message to London hotel
      ref: create[6]
      severity: medium
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify other saved lists
      ref: invariant[1]
      severity: medium
    - name: Agent did not send messages to unrelated properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[3]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
