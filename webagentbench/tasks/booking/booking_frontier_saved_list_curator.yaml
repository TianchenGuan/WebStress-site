task_id: booking_frontier_saved_list_curator
env_id: booking
title: 'Frontier: Create 3 Themed Saved Lists, Populate, and Book Cheapest'
instruction_template: "Create and curate three themed saved lists, then book:\n1.\
  \ Create a list called \"Beach Getaways\" and add\n   \"{target.beach1_name}\" and\
  \ \"{target.beach2_name}\" to it.\n2. Create a list called \"City Breaks\" and add\n\
  \   \"{target.city1_name}\", \"{target.city2_name}\", and\n   \"{target.city3_name}\"\
  \ to it.\n3. Create a list called \"Mountain Retreats\" and add\n   \"{target.mtn1_name}\"\
  \ and \"{target.mtn2_name}\" to it.\n4. Across ALL three lists, find the property\
  \ with the lowest\n   cheapest-room price. (Hint: it is \"{target.cheapest_name}\"\
  \n   at ${target.cheapest_price}/night.) Book its cheapest room\n   for 2 guests,\
  \ checking in 2026-10-15, checking out 2026-10-19,\n   using the default Visa (ending\
  \ 4242).\n5. Send a message to the booked property with subject\n   \"Upcoming reservation\"\
  \ and body \"Looking forward to my stay.\n   Can you arrange airport pickup?\"\n\
  6. Write a review for your completed stay at \"{target.review_name}\":\n   score\
  \ 8.5, title \"Great mountain escape\",\n   positive \"Breathtaking views and cozy\
  \ fireplace\",\n   no negative, leisure, couple.\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- backtracking
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Maldives Paradise Resort
      city: Male
      country: Maldives
      star_rating: 5
      review_score: 9.5
      review_count: 3200
      price: 680.0
      neighborhood: North Male Atoll
      amenities:
      - Free WiFi
      - Pool
      - Spa
      - Restaurant
      - Beach access
      - Diving
    outputs:
    - beach1_id
    - beach1_name
    - beach1_room_id
    - beach1_room_name
  - use: featured_property
    params:
      name: Bali Sunset Beach Hotel
      city: Bali
      country: Indonesia
      star_rating: 4
      review_score: 8.6
      review_count: 2800
      price: 195.0
      neighborhood: Seminyak
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Beach access
      - Spa
    outputs:
    - beach2_id
    - beach2_name
    - beach2_room_id
    - beach2_room_name
  - use: featured_property
    params:
      name: Amsterdam Canal Boutique
      city: Amsterdam
      country: Netherlands
      star_rating: 4
      review_score: 8.4
      review_count: 1900
      price: 220.0
      neighborhood: Jordaan
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Bicycle rental
    outputs:
    - city1_id
    - city1_name
    - city1_room_id
    - city1_room_name
  - use: featured_property
    params:
      name: Prague Old Town Hotel
      city: Prague
      country: Czech Republic
      star_rating: 4
      review_score: 8.8
      review_count: 2400
      price: 155.0
      neighborhood: Old Town
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Spa
    outputs:
    - city2_id
    - city2_name
    - city2_room_id
    - city2_room_name
  - use: featured_property
    params:
      name: Istanbul Grand Bazaar Hotel
      city: Istanbul
      country: Turkey
      star_rating: 4
      review_score: 8.2
      review_count: 1700
      price: 110.0
      neighborhood: Sultanahmet
      amenities:
      - Free WiFi
      - Restaurant
      - Rooftop terrace
      - Turkish bath
    outputs:
    - city3_id
    - city3_name
    - city3_room_id
    - city3_room_name
  - use: featured_property
    params:
      name: Swiss Alps Lodge
      city: Zermatt
      country: Switzerland
      star_rating: 5
      review_score: 9.1
      review_count: 1600
      price: 450.0
      neighborhood: Village Center
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Ski storage
      - Fireplace
    outputs:
    - mtn1_id
    - mtn1_name
    - mtn1_room_id
    - mtn1_room_name
  - use: featured_property
    params:
      name: Banff Mountain Lodge
      city: Banff
      country: Canada
      star_rating: 4
      review_score: 8.7
      review_count: 2100
      price: 280.0
      neighborhood: Banff Centre
      amenities:
      - Free WiFi
      - Restaurant
      - Hot tub
      - Fireplace
      - Hiking
    outputs:
    - mtn2_id
    - mtn2_name
    - mtn2_room_id
    - mtn2_room_name
  - use: create_reservation
    params:
      property_id: '{output.mtn1_id}'
      check_in: '2025-12-20'
      check_out: '2025-12-26'
      price_per_night: 450.0
      status: completed
      guests: 2
      booked_days_ago: 110
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  targets:
    beach1_id: '{output.beach1_id}'
    beach1_name: '{output.beach1_name}'
    beach2_id: '{output.beach2_id}'
    beach2_name: '{output.beach2_name}'
    city1_id: '{output.city1_id}'
    city1_name: '{output.city1_name}'
    city2_id: '{output.city2_id}'
    city2_name: '{output.city2_name}'
    city3_id: '{output.city3_id}'
    city3_name: '{output.city3_name}'
    mtn1_id: '{output.mtn1_id}'
    mtn1_name: '{output.mtn1_name}'
    mtn2_id: '{output.mtn2_id}'
    mtn2_name: '{output.mtn2_name}'
    cheapest_id: '{output.city3_id}'
    cheapest_name: '{output.city3_name}'
    cheapest_price: '110'
    review_id: '{output.mtn1_id}'
    review_name: '{output.mtn1_name}'
    review_res_id: '{output.review_res_id}'
canonical_diff:
  update:
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed reservation
      where:
        id: {expr: "x == target['review_res_id']"}
      changes:
        rating_submitted: {any: true}
  create:
    - entity: SavedList
      desc: Create Beach Getaways list with both beach properties
      properties:
        name: {eq: "Beach Getaways"}
        property_ids:
          expr: "target['beach1_id'] in x and target['beach2_id'] in x"
        created_at: {any: true}
        updated_at: {any: true}
    - entity: SavedList
      desc: Create City Breaks list with all three city properties
      properties:
        name: {eq: "City Breaks"}
        property_ids:
          expr: "target['city1_id'] in x and target['city2_id'] in x and target['city3_id'] in x"
        created_at: {any: true}
        updated_at: {any: true}
    - entity: SavedList
      desc: Create Mountain Retreats list with both mountain properties
      properties:
        name: {eq: "Mountain Retreats"}
        property_ids:
          expr: "target['mtn1_id'] in x and target['mtn2_id'] in x"
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Reservation
      desc: Book the cheapest property for 4 nights
      properties:
        property_id: {expr: "x == target['cheapest_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-10-15"}
        check_out: {eq: "2026-10-19"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "x == float(target['cheapest_price'])"}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Message
      desc: Send message to booked property about airport pickup
      properties:
        property_id: {expr: "x == target['cheapest_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject: {expr: "'upcoming' in x.lower() or 'reservation' in x.lower()"}
        body: {expr: "'airport' in x.lower()"}
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
    - entity: Review
      desc: Write review for completed mountain stay with score 8.5 and correct title/positive
      properties:
        property_id: {expr: "x == target['review_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 8.5}
        scores: {any: true}
        title: {expr: "'Great mountain escape' in x"}
        positive: {expr: "'fireplace' in x.lower() or 'views' in x.lower()"}
        negative: {eq: ""}
        room_type: {any: true}
        travel_purpose: {eq: leisure}
        traveled_with: {eq: couple}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
  invariant:
    - collection: state.saved_lists
      filter: "a.name not in ('Beach Getaways', 'City Breaks', 'Mountain Retreats')"
      preserve: ALL
    - collection: state.reservations
      filter: "not (a.property_id == target['cheapest_id'] and a.check_in == '2026-10-15') and a.id != target['review_res_id']"
      preserve: ALL
    - collection: state.messages
      filter: "not (a.sender == 'guest' and a.property_id == target['cheapest_id'])"
      preserve: ALL
    - collection: state.reviews
      filter: "a.property_id != target['review_id']"
      preserve: ALL
    - collection: state.properties
      filter: "a.id not in (target['review_id'],)"
      comprehensive: true
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent created Beach Getaways list with correct properties
      ref: create[0]
      severity: critical
    - name: Agent created City Breaks list with correct properties
      ref: create[1]
      severity: critical
    - name: Agent created Mountain Retreats list with correct properties
      ref: create[2]
      severity: critical
    - name: Agent booked the cheapest property with correct dates
      ref: create[3]
      severity: critical
    - name: Agent sent airport pickup message to booked property
      ref: create[4]
      severity: high
    - name: Agent wrote mountain escape review correctly
      ref: create[5]
      severity: critical
    - name: Agent did not modify other saved lists
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify other reservations
      ref: invariant[1]
      severity: high
    - name: Agent did not modify other messages
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify reviews for other properties
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
