task_id: booking_frontier_social_reviewer
env_id: booking
title: "Frontier: Write Detailed Reviews for Four Completed Stays"
instruction_template: "Write reviews for all four of your completed stays:\n\
  1. \"{target.prop_name_1}\" - Score 9.5, title \"Outstanding in every way\",\n\
  \   positive \"The staff went above and beyond, the spa was world-class,\n\
  \   and the breakfast buffet was extraordinary\",\n\
  \   no negative, travel purpose leisure, traveled with family.\n\
  2. \"{target.prop_name_2}\" - Score 8.0, title \"Solid business choice\",\n\
  \   positive \"Excellent conference facilities and fast WiFi\",\n\
  \   negative \"Restaurant closed too early and limited room service\n\
  \   menu after 10pm\", travel purpose business, traveled with solo.\n\
  3. \"{target.prop_name_3}\" - Score 6.5, title \"Below expectations\",\n\
  \   positive \"Central location within walking distance of main sights\",\n\
  \   negative \"Room was not clean on arrival, noisy air conditioning,\n\
  \   and the bathroom needed renovation\",\n\
  \   travel purpose leisure, traveled with couple.\n\
  4. \"{target.prop_name_4}\" - Score 7.5, title \"Good value for money\",\n\
  \   positive \"Affordable price with a surprisingly comfortable bed\",\n\
  \   negative \"Small room and thin walls could hear neighbors\",\n\
  \   travel purpose leisure, traveled with friends.\n\
  5. After writing all reviews, create a saved list called\n\
  \   \"Top Stays\" and add the two highest-scored properties\n\
  \   (\"{target.prop_name_1}\" and \"{target.prop_name_2}\") to it.\n\
  6. Update your travel preferences: set preferred room type to \"suite\".\n"
difficulty: frontier
time_limit_seconds: 540
expected_steps: 40
primary_primitives:
- planning
- state_tracking
- verification
- patience
secondary_primitives:
- grounding
- exploration
start_path: /trips
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Mandarin Oriental Tokyo
      city: Tokyo
      country: Japan
      star_rating: 5
      review_score: 9.4
      review_count: 4500
      price: 550.0
      neighborhood: Nihonbashi
      address: 2-1-1 Nihonbashi Muromachi, Chuo-ku, Tokyo
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Room service
    outputs:
    - prop_id_1
    - prop_name_1
    - room_id_1
    - room_name_1
  - use: create_reservation
    params:
      property_id: '{output.prop_id_1}'
      check_in: '2025-12-20'
      check_out: '2025-12-27'
      price_per_night: 550.0
      status: completed
      guests: 4
      booked_days_ago: 120
    outputs:
    - res_id_1
    - conf_1
    - res_prop_1
  - use: featured_property
    params:
      name: Hilton Frankfurt City Centre
      city: Frankfurt
      country: Germany
      star_rating: 4
      review_score: 8.1
      review_count: 3100
      price: 185.0
      neighborhood: Innenstadt
      address: Hochstrasse 4, 60313 Frankfurt
      amenities:
      - Free WiFi
      - Restaurant
      - Business center
      - Fitness center
      - Bar
      - Conference rooms
    outputs:
    - prop_id_2
    - prop_name_2
    - room_id_2
    - room_name_2
  - use: create_reservation
    params:
      property_id: '{output.prop_id_2}'
      check_in: '2026-01-15'
      check_out: '2026-01-18'
      price_per_night: 185.0
      status: completed
      guests: 1
      booked_days_ago: 90
    outputs:
    - res_id_2
    - conf_2
    - res_prop_2
  - use: featured_property
    params:
      name: Hotel Roma Centro
      city: Rome
      country: Italy
      star_rating: 3
      review_score: 6.8
      review_count: 900
      price: 120.0
      neighborhood: Termini
      address: Via Nazionale 22, 00184 Rome
      amenities:
      - Free WiFi
      - Bar
    outputs:
    - prop_id_3
    - prop_name_3
    - room_id_3
    - room_name_3
  - use: create_reservation
    params:
      property_id: '{output.prop_id_3}'
      check_in: '2026-02-01'
      check_out: '2026-02-04'
      price_per_night: 120.0
      status: completed
      guests: 2
      booked_days_ago: 70
    outputs:
    - res_id_3
    - conf_3
    - res_prop_3
  - use: featured_property
    params:
      name: Lisbon Budget Inn
      city: Lisbon
      country: Portugal
      star_rating: 3
      review_score: 7.6
      review_count: 1200
      price: 85.0
      neighborhood: Baixa
      address: Rua Augusta 45, 1100-048 Lisbon
      amenities:
      - Free WiFi
      - Bar
      - 24-hour front desk
    outputs:
    - prop_id_4
    - prop_name_4
    - room_id_4
    - room_name_4
  - use: create_reservation
    params:
      property_id: '{output.prop_id_4}'
      check_in: '2026-03-10'
      check_out: '2026-03-13'
      price_per_night: 85.0
      status: completed
      guests: 3
      booked_days_ago: 30
    outputs:
    - res_id_4
    - conf_4
    - res_prop_4
  - use: set_preferences
    params:
      preferred_room_type: standard
    outputs:
    - prefs_updated
  targets:
    prop_id_1: '{output.prop_id_1}'
    prop_name_1: '{output.prop_name_1}'
    prop_id_2: '{output.prop_id_2}'
    prop_name_2: '{output.prop_name_2}'
    prop_id_3: '{output.prop_id_3}'
    prop_name_3: '{output.prop_name_3}'
    prop_id_4: '{output.prop_id_4}'
    prop_name_4: '{output.prop_name_4}'
eval:
  source: server_state
  checks:
  - expr: "any(rv.property_id == '{target.prop_id_1}' and\n\
      \  rv.overall_score == 9.5 and rv.title == 'Outstanding in every way' and\n\
      \  rv.traveled_with == 'family'\n\
      \  for rv in state.reviews)\n"
    desc: Tokyo review with score 9.5, correct title, traveled with family
  - expr: "any(rv.property_id == '{target.prop_id_2}' and\n\
      \  rv.overall_score == 8.0 and rv.title == 'Solid business choice' and\n\
      \  rv.travel_purpose == 'business'\n\
      \  for rv in state.reviews)\n"
    desc: Frankfurt review with score 8.0, correct title, business purpose
  - expr: "any(rv.property_id == '{target.prop_id_3}' and\n\
      \  rv.overall_score == 6.5 and\n\
      \  'not clean' in rv.negative.lower()\n\
      \  for rv in state.reviews)\n"
    desc: Rome review with score 6.5 and cleanliness complaint in negative
  - expr: "any(rv.property_id == '{target.prop_id_4}' and\n\
      \  rv.overall_score == 7.5 and\n\
      \  'comfortable bed' in rv.positive.lower()\n\
      \  for rv in state.reviews)\n"
    desc: Lisbon review with score 7.5 and comfort mentioned in positive
  - expr: "any(rv.property_id == '{target.prop_id_4}' and\n\
      \  'thin walls' in rv.negative.lower()\n\
      \  for rv in state.reviews)\n"
    desc: Lisbon review mentions thin walls in negative
  - expr: "any(rv.property_id == '{target.prop_id_2}' and\n\
      \  'restaurant' in rv.negative.lower()\n\
      \  for rv in state.reviews)\n"
    desc: Frankfurt review mentions restaurant in negative
  - expr: "any(\n  sl.name == 'Top Stays' and\n\
      \  '{target.prop_id_1}' in sl.property_ids and\n\
      \  '{target.prop_id_2}' in sl.property_ids\n\
      \  for sl in state.saved_lists\n)\n"
    desc: Top Stays list has the two highest-scored properties
  - expr: state.travel_preferences.preferred_room_type == 'suite'
    desc: Preferred room type updated to suite
  - expr: "sum(1 for rv in state.reviews\n\
      \  if rv.property_id in ('{target.prop_id_1}', '{target.prop_id_2}', '{target.prop_id_3}', '{target.prop_id_4}')\n\
      \  and rv.author_name == 'Jordan Parker') >= 4\n"
    desc: All four reviews were submitted
  negative_checks:
  - expr: "not any(rv.property_id == '{target.prop_id_1}' and rv.overall_score != 9.5\n\
      \  for rv in state.reviews if rv.author_name == 'Jordan Parker')\n"
    desc: Tokyo review score is exactly 9.5
    penalty: 0.15
  - expr: "not any(rv.property_id == '{target.prop_id_3}' and rv.overall_score != 6.5\n\
      \  for rv in state.reviews if rv.author_name == 'Jordan Parker')\n"
    desc: Rome review score is exactly 6.5
    penalty: 0.15
  - expr: "not any(\n  sl.name == 'Top Stays' and\n\
      \  ('{target.prop_id_3}' in sl.property_ids or '{target.prop_id_4}' in sl.property_ids)\n\
      \  for sl in state.saved_lists\n)\n"
    desc: Lower-scored properties not in Top Stays list
    penalty: 0.2
  - expr: "sum(1 for sl in state.saved_lists if sl.name == 'Top Stays') <= 1\n"
    desc: Only one Top Stays list created
    penalty: 0.1
  - expr: "not any(rv.property_id == '{target.prop_id_1}' and rv.negative != ''\n\
      \  for rv in state.reviews if rv.author_name == 'Jordan Parker')\n"
    desc: Tokyo review has no negative comment as instructed
    penalty: 0.1
