task_id: booking_budget_comparison
env_id: booking
title: Compare Rome Hotels by Budget and Book Best Rated
instruction_template: 'Compare hotels in Rome within the $150-$250 per night budget
  range. Among those properties, find the one that has the best review score AND also
  offers free cancellation on at least one room AND whose ALL-IN total price (base
  + taxes + city fee + cleaning fee + resort fee if applicable) is at most $1200 for
  the full stay. Use the booking-page fee breakdown to compute the all-in total before
  you confirm. Book that hotel''s cheapest room with free cancellation for 2 guests
  checking in on 2026-06-20 and checking out on 2026-06-24 (4 nights). Use the default
  Visa payment method (ending in 4242) and enter your name and email from your profile.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 22
primary_primitives:
- grounding
secondary_primitives: []
start_path: /home
seed:
  distractors: 10
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: Rome
      country: Italy
      properties:
      - name: Hotel Palazzo Manfredi
        star_rating: 4
        review_score: 9.0
        review_count: 2567
        price: 230.0
        neighborhood: Colosseum
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Room service
        - Concierge
        - Air conditioning
        rooms:
        - name: Classic Room
          price: 230.0
          bed_type: queen
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
          view_type: city
        - name: Deluxe Room
          price: 310.0
          bed_type: king
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
          view_type: monument
      - name: Residenza Ruspoli Bonaparte
        star_rating: 4
        review_score: 9.2
        review_count: 1890
        price: 210.0
        neighborhood: Trevi
        amenities:
        - Free WiFi
        - Room service
        - Air conditioning
        - Concierge
        rooms:
        - name: Superior Room
          price: 210.0
          bed_type: queen
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: non_refundable
      - name: Hotel Forum Roma
        star_rating: 3
        review_score: 8.2
        review_count: 3456
        price: 165.0
        neighborhood: Monti
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - Air conditioning
        rooms:
        - name: Standard Room
          price: 165.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
    outputs:
    - property_id_1
    - property_name_1
    - property_id_2
    - property_name_2
    - property_id_3
    - property_name_3
  - use: decoy_property
    params:
      name: Hotel de Russie
      city: Rome
      country: Italy
      star_rating: 5
      review_score: 9.5
      review_count: 4200
      price: 480.0
      neighborhood: Piazza del Popolo
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
    outputs:
    - decoy_property_id
    - decoy_property_name
  # Fee-trap distractor: a top-rated, free-cancellation resort priced inside
  # the $150-$250/night range but whose $25/night resort_fee + Rome 22% tax
  # pushes its all-in total over the $1200 budget. Designed to lure agents
  # who compare only nightly rate + review score without reading the fee
  # breakdown.
  - use: featured_property
    params:
      name: Villa Borghese Resort
      city: Rome
      country: Italy
      property_type: resort
      star_rating: 5
      review_score: 9.3
      review_count: 2890
      price: 230.0
      neighborhood: Villa Borghese
      address: 10 Via Aldrovandi, 00197 Rome
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Air conditioning
      rooms:
      - name: Garden Room
        price: 230.0
        bed_type: queen
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
      - name: Pool Suite
        price: 330.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: pool
    outputs:
    - fee_trap_prop_id
    - fee_trap_prop_name
    - fee_trap_room_id
    - fee_trap_room_name
  targets:
    target_prop_id: '{output.property_id_1}'
    target_prop_name: '{output.property_name_1}'
    no_cancel_prop_id: '{output.property_id_2}'
    low_score_prop_id: '{output.property_id_3}'
    fee_trap_prop_id: '{output.fee_trap_prop_id}'
    fee_trap_prop_name: '{output.fee_trap_prop_name}'
    # All-in budget cap. Target (Hotel Palazzo Manfredi, Rome, $230/n * 4
    # nights) all-in = 920 base + 202.40 tax (Rome 22%) + 28 city fee
    # (Rome $7/night * 4) + 40 cleaning = $1190.40, fits under 1200.
    # Villa Borghese Resort (same nightly, but +$100 resort fee) totals
    # $1290.40 and is rejected.
    budget: 1200.0
canonical_diff:
  create:
    - entity: Reservation
      desc: Book the best-rated hotel with free cancellation in Rome, cheapest room, correct dates
      properties:
        property_id: {expr: "x == target['target_prop_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-06-20"}
        check_out: {eq: "2026-06-24"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {expr: "150.0 <= x <= 250.0 and x == min(rt.price_per_night for p in initial.properties if p.id == target['target_prop_id'] for rt in p.room_types if rt.is_available and rt.max_occupancy >= 2)"}
        total_price: {expr: "x <= target['budget']"}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {expr: "x.full_name == initial.owner_name and x.email == initial.owner_email"}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {expr: "x.type == 'free_cancellation'"}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['target_prop_id'] or a.check_in != '2026-06-20'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the best-rated property with free cancellation in budget
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
