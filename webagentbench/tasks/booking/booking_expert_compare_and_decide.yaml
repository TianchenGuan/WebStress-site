task_id: booking_expert_compare_and_decide
env_id: booking
title: Compare Four London Hotels and Book the One Meeting All Criteria
instruction_template: "Compare four hotels in London and make a decision:\n\
  1. Search London hotels and find these four properties:\n\
  \   - \"{target.prop_name_1}\" ({target.stars_1}-star, ${target.price_1}/night)\n\
  \   - \"{target.prop_name_2}\" ({target.stars_2}-star, ${target.price_2}/night)\n\
  \   - \"{target.prop_name_3}\" ({target.stars_3}-star, ${target.price_3}/night)\n\
  \   - \"{target.prop_name_4}\" ({target.stars_4}-star, ${target.price_4}/night)\n\
  2. Compare all four in detail. Find the one hotel that has ALL of these:\n\
  \   - Spa AND pool AND restaurant among its amenities\n\
  \   - At least one room with free cancellation\n\
  \   - A room priced under $400 per night\n\
  3. Book that hotel's best room (the one under $400 with free cancellation)\n\
  \   for 2 guests checking in 2026-10-15 and checking out 2026-10-19\
  \ (4 nights). Use Visa ending in 9876.\n\
  4. Save all four compared hotels to a new list called \"London Shortlist\".\n\
  5. Write a review for your completed stay at \"{target.completed_name}\"\
  \ in London: score 8.5, title \"Pleasant London stay\", positive\
  \ \"Excellent afternoon tea service and prime West End location\",\
  \ no negative, leisure, couple.\n"
difficulty: expert
time_limit_seconds: 480
expected_steps: 38
primary_primitives:
- verification
- planning
- exploration
secondary_primitives:
- grounding
- state_tracking
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: compare_properties
    params:
      city: London
      country: United Kingdom
      properties:
      - name: The Corinthia London
        star_rating: 5
        review_score: 9.4
        review_count: 5670
        price: 580.0
        neighborhood: Westminster
        amenities:
        - Free WiFi
        - Spa
        - Pool
        - Restaurant
        - Bar
        - Fitness center
        - Room service
        - Concierge
        rooms:
        - name: Superior Room
          price: 580.0
          bed_type: king
          max_occupancy: 2
          cancel_type: non_refundable
        - name: Executive Room
          price: 720.0
          bed_type: king
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
      - name: Rosewood London
        star_rating: 5
        review_score: 9.3
        review_count: 4230
        price: 520.0
        neighborhood: Holborn
        amenities:
        - Free WiFi
        - Spa
        - Pool
        - Restaurant
        - Bar
        - Fitness center
        - Room service
        rooms:
        - name: Deluxe Room
          price: 380.0
          bed_type: king
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Premier Suite
          price: 650.0
          bed_type: king
          max_occupancy: 3
          meals_included: breakfast
          cancel_type: free_cancellation
      - name: Premier Inn London City
        star_rating: 3
        review_score: 7.8
        review_count: 8900
        price: 145.0
        neighborhood: Tower Hill
        amenities:
        - Free WiFi
        - Restaurant
        - Bar
        - 24-hour front desk
        rooms:
        - name: Standard Room
          price: 145.0
          bed_type: double
          max_occupancy: 2
          cancel_type: free_cancellation
      - name: The Langham London
        star_rating: 5
        review_score: 9.1
        review_count: 3890
        price: 450.0
        neighborhood: Marylebone
        amenities:
        - Free WiFi
        - Spa
        - Restaurant
        - Bar
        - Fitness center
        - Room service
        rooms:
        - name: Superior Room
          price: 450.0
          bed_type: king
          max_occupancy: 2
          cancel_type: free_cancellation
        - name: Grand Room
          price: 560.0
          bed_type: king
          max_occupancy: 2
          meals_included: breakfast
          cancel_type: free_cancellation
    outputs:
    - property_id_1
    - property_name_1
    - property_id_2
    - property_name_2
    - property_id_3
    - property_name_3
    - property_id_4
    - property_name_4
  - use: featured_property
    params:
      name: The Savoy London
      city: London
      country: United Kingdom
      star_rating: 5
      review_score: 9.2
      review_count: 5890
      price: 500.0
      neighborhood: Strand
      address: Strand, London WC2R 0EZ
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Restaurant
      - Bar
    outputs:
    - completed_prop_id
    - completed_prop_name
    - completed_room_id
    - completed_room_name
  - use: create_reservation
    params:
      property_id: '{output.completed_prop_id}'
      check_in: '2026-02-01'
      check_out: '2026-02-05'
      price_per_night: 500.0
      status: completed
      guests: 2
      booked_days_ago: 70
    outputs:
    - completed_res_id
    - completed_conf_num
    - completed_res_prop_id
  targets:
    prop_name_1: '{output.property_name_1}'
    prop_name_2: '{output.property_name_2}'
    prop_name_3: '{output.property_name_3}'
    prop_name_4: '{output.property_name_4}'
    prop_id_1: '{output.property_id_1}'
    prop_id_2: '{output.property_id_2}'
    prop_id_3: '{output.property_id_3}'
    prop_id_4: '{output.property_id_4}'
    target_id: '{output.property_id_2}'
    target_name: '{output.property_name_2}'
    stars_1: '5'
    stars_2: '5'
    stars_3: '3'
    stars_4: '5'
    price_1: '580'
    price_2: '380'
    price_3: '145'
    price_4: '450'
    completed_id: '{output.completed_prop_id}'
    completed_name: '{output.completed_prop_name}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.target_id}' and\n  r.status == 'confirmed'\
      \ and\n  r.check_in == '2026-10-15' and\n  r.check_out == '2026-10-19'\n  for\
      \ r in state.reservations\n)\n"
    desc: Rosewood London booked (spa+pool+restaurant+free cancel under $400)
  - expr: "any(\n  r.property_id == '{target.target_id}' and\n  r.room_type_name ==\
      \ 'Deluxe Room' and\n  r.price_per_night < 400.0\n  for r in state.reservations\n\
      \  if not r.id.startswith('res_initial_')\n)\n"
    desc: Booked the correct room under $400 with free cancellation
  - expr: "any(\n  r.property_id == '{target.target_id}' and\n  r.payment_method_id\
      \ == 'pm_4'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Used Visa ending in 9876 for payment
  - expr: "any(\n  sl.name == 'London Shortlist' and\n  '{target.prop_id_1}' in sl.property_ids\
      \ and\n  '{target.prop_id_2}' in sl.property_ids and\n  '{target.prop_id_3}'\
      \ in sl.property_ids and\n  '{target.prop_id_4}' in sl.property_ids\n  for sl\
      \ in state.saved_lists\n)\n"
    desc: All four hotels saved to 'London Shortlist'
  - expr: "any(\n  rv.property_id == '{target.completed_id}' and\n  rv.overall_score\
      \ == 8.5 and\n  rv.title == 'Pleasant London stay'\n  for rv in state.reviews\n\
      )\n"
    desc: Review written for completed stay with correct score and title
  - expr: "any(\n  rv.property_id == '{target.completed_id}' and\n  'afternoon tea'\
      \ in rv.positive.lower()\n  for rv in state.reviews\n)\n"
    desc: Review positive comment mentions afternoon tea
  negative_checks:
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id')\
      \ == '{target.prop_id_1}'\n  for e in state.audit_log\n)\n"
    desc: Did not book Corinthia (no free cancel room under $400)
    penalty: 0.3
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id')\
      \ == '{target.prop_id_3}'\n  for e in state.audit_log\n)\n"
    desc: Did not book Premier Inn (no spa/pool)
    penalty: 0.25
  - expr: "not any(\n  e.action == 'reservation.create' and\n  e.payload.get('property_id')\
      \ == '{target.prop_id_4}'\n  for e in state.audit_log\n)\n"
    desc: Did not book Langham (no pool)
    penalty: 0.2
  - expr: 'sum(1 for r in state.reservations if not r.id.startswith(''res_initial_''))
      <= 1

      '
    desc: Only one new reservation was created
    penalty: 0.15
