task_id: booking_frontier_everything
env_id: booking
title: 'Ultimate Task: Profile, Settings, Payments, Search, Book, Cancel, Modify,
  Review, Lists, Messages'
instruction_template: "Complete this comprehensive session that touches every part\
  \ of the platform: 1. Update your phone number to \"+1-415-555-0200\" and your address\
  \ to\n   \"200 Market St, San Francisco, CA 94105\".\n2. In settings, change currency\
  \ to EUR and enable two-factor authentication. 3. In travel preferences, set preferred\
  \ bed type to \"king\" and add \"gluten-free\"\n   to dietary restrictions.\n4.\
  \ Add a new Visa card ending in 7777, expiry 05/30, holder name \"Jordan Parker\"\
  ,\n   and set it as your default payment.\n5. Search for hotels in \"Barcelona\"\
  \ and book \"{target.book_name}\" — the\n   standard room for 3 nights (2026-09-01\
  \ to 2026-09-04, 2 guests) using\n   your new default Visa card ending in 7777.\n\
  6. Go to your trips and cancel the reservation at \"{target.cancel_name}\"\n   (confirmation\
  \ {target.cancel_conf}).\n7. Find your reservation at \"{target.modify_name}\" and\
  \ modify it: change\n   the check-in to 2026-07-20 and check-out to 2026-07-25 and\
  \ add special\n   request \"Late checkout at 13:00 please\".\n8. Go to reviews and\
  \ write a review for your completed stay at\n   \"{target.review_prop_name}\": overall\
  \ score 8.5, title \"Great location\",\n   positive \"Walking distance to everything,\
  \ excellent breakfast\", negative\n   \"Room was a bit noisy at night\".\n9. Create\
  \ a new saved list called \"2026 Favorites\" and add \"{target.book_name}\"\n  \
  \ to it.\n10. Send a message to \"{target.book_name}\" with subject \"Early check-in\
  \ request\"\n    and body \"Could we check in at 12:00 instead of 14:00? Thank you!\"\
  .\n"
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- grounding
start_path: /account
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Barcelona Beachfront Palace
      city: Barcelona
      country: Spain
      star_rating: 5
      review_score: 9.2
      price: 310.0
      neighborhood: Barceloneta
      genius_discount_pct: 10
    outputs:
    - book_id
    - book_name
    - book_room
    - book_rname
  - use: featured_property
    params:
      name: Hotel Provenza Eixample
      city: Barcelona
      country: Spain
      star_rating: 4
      review_score: 8.5
      price: 195.0
    outputs:
    - cancel_prop_id
    - cancel_prop_name
    - cancel_room
    - cancel_rname
  - use: create_reservation
    params:
      property_id: '{output.cancel_prop_id}'
      check_in: '2026-08-15'
      check_out: '2026-08-18'
      status: confirmed
      guests: 2
      booked_days_ago: 14
    outputs:
    - cancel_res_id
    - cancel_conf
    - cancel_res_prop
  - use: featured_property
    params:
      name: Madrid Royal Suites
      city: Madrid
      country: Spain
      star_rating: 4
      review_score: 8.7
      price: 225.0
    outputs:
    - modify_prop_id
    - modify_prop_name
    - modify_room
    - modify_rname
  - use: modify_reservation
    params:
      property_id: '{output.modify_prop_id}'
      check_in: '2026-07-15'
      check_out: '2026-07-20'
      guests: 2
      booked_days_ago: 20
    outputs:
    - modify_res_id
    - modify_conf
    - modify_res_prop
    - modify_ci
    - modify_co
  - use: featured_property
    params:
      name: Lisbon Harbor View Hotel
      city: Lisbon
      country: Portugal
      star_rating: 4
      review_score: 8.8
      price: 175.0
    outputs:
    - review_prop_id
    - review_prop_name
    - review_room
    - review_rname
  - use: create_reservation
    params:
      property_id: '{output.review_prop_id}'
      check_in: '2026-01-10'
      check_out: '2026-01-14'
      status: completed
      guests: 2
      booked_days_ago: 180
    outputs:
    - review_res_id
    - review_res_conf
    - review_res_prop
  targets:
    book_id: '{output.book_id}'
    book_name: '{output.book_name}'
    cancel_name: '{output.cancel_prop_name}'
    cancel_conf: '{output.cancel_conf}'
    cancel_res_id: '{output.cancel_res_id}'
    modify_name: '{output.modify_prop_name}'
    modify_res_id: '{output.modify_res_id}'
    review_prop_name: '{output.review_prop_name}'
    review_prop_id: '{output.review_prop_id}'
    review_res_id: '{output.review_res_id}'
    prev_default_pm_id: 'pm_1'
canonical_diff:
  constraints:
    - desc: Phone number updated to +1-415-555-0200
      expr: "state.owner_phone == '+1-415-555-0200'"
      severity: medium
    - desc: Address updated to 200 Market St
      expr: "'200 Market St' in state.owner_address"
      severity: medium
    - desc: Currency changed to EUR
      expr: "state.settings.currency == 'EUR'"
      severity: high
    - desc: Two-factor authentication enabled
      expr: "state.settings.two_factor_enabled == True"
      severity: critical
    - desc: Preferred bed type set to king
      expr: "state.travel_preferences.preferred_bed_type == 'king'"
      severity: medium
    - desc: Gluten-free added to dietary restrictions
      expr: "'gluten-free' in state.travel_preferences.dietary_restrictions"
      severity: medium
  update:
    - entity: Reservation
      desc: Cancel Hotel Provenza Eixample reservation
      where:
        id: {expr: "x == target['cancel_res_id']"}
      changes:
        status: {eq: cancelled}
    - entity: Reservation
      desc: Modify Madrid Royal Suites reservation to new dates and add special request
      where:
        id: {expr: "x == target['modify_res_id']"}
      changes:
        check_in: {eq: "2026-07-20"}
        check_out: {eq: "2026-07-25"}
        guest_info:
          expr: "'late checkout' in x.special_requests.lower()"
    - entity: Reservation
      desc: Review submission flips rating_submitted on the reviewed reservation
      where:
        id: {expr: "x == target['review_res_id']"}
      changes:
        rating_submitted: {any: true}
    - entity: PaymentMethod
      desc: Previously-default card demoted when new Visa 7777 is set as default
      where:
        id: {expr: "x == target['prev_default_pm_id']"}
      changes:
        is_default: {eq: false}
  create:
    - entity: PaymentMethod
      desc: Add new Visa 7777 as default
      properties:
        card_type: {eq: "Visa"}
        last_four: {eq: "7777"}
        is_default: {eq: true}
        holder_name: {any: true}
        expiry: {any: true}
    - entity: Reservation
      desc: Book Barcelona Beachfront Palace standard room for 3 nights
      properties:
        property_id: {expr: "x == target['book_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {any: true}
        check_in: {eq: "2026-09-01"}
        check_out: {eq: "2026-09-04"}
        nights: {eq: 3}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {any: true}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
    - entity: Review
      desc: Write review for completed Lisbon Harbor View stay
      properties:
        property_id: {expr: "x == target['review_prop_id']"}
        reservation_id: {any: true}
        author_name: {any: true}
        author_country: {any: true}
        overall_score: {eq: 8.5}
        scores: {any: true}
        title: {eq: "Great location"}
        positive:
          expr: "'breakfast' in x.lower()"
        negative:
          expr: "'noisy' in x.lower()"
        room_type: {any: true}
        travel_purpose: {any: true}
        traveled_with: {any: true}
        stay_date: {any: true}
        created_at: {any: true}
        helpful_count: {any: true}
        property_response: {any: true}
    - entity: SavedList
      desc: Create 2026 Favorites list with the booked property
      properties:
        name: {eq: "2026 Favorites"}
        property_ids:
          expr: "target['book_id'] in x"
        created_at: {any: true}
        updated_at: {any: true}
    - entity: Message
      desc: Send early check-in request to booked property
      properties:
        property_id: {expr: "x == target['book_id']"}
        property_name: {any: true}
        reservation_id: {any: true}
        subject:
          expr: "'early check-in' in x.lower()"
        body:
          expr: "'12:00' in x or '10' in x or 'early' in x.lower()"
        sender: {eq: guest}
        read: {any: true}
        created_at: {any: true}
  invariant:
    - collection: state.reservations
      filter: >-
        a.id not in (target['cancel_res_id'], target['modify_res_id'], target['review_res_id']) and
        a.property_id != target['book_id']
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      filter: "a.property_id != target['review_prop_id']"
      preserve: ALL
    - collection: state.saved_lists
      filter: "a.name != '2026 Favorites'"
      preserve: ALL
    - collection: state.messages
      filter: >-
        a.sender == 'property' or
        a.property_id != target['book_id']
      preserve: ALL
    - collection: state.payment_methods
      filter: "a.last_four != '7777' and a.id != target['prev_default_pm_id']"
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
    # Cancelling a reservation auto-generates a rebooking_suggestion
    # (models/booking.py:752). These are system-only side effects —
    # the agent has no UI to create them directly.
    - collection: state.rebooking_suggestions
      filter: "False"
      preserve: ALL
      comprehensive: true
  named_invariants:
    - name: Agent cancelled Hotel Provenza reservation
      ref: update[0]
      severity: critical
    - name: Agent modified Madrid reservation with new dates and special request
      ref: update[1]
      severity: high
    - name: Agent added new Visa 7777 as default
      ref: create[0]
      severity: high
    - name: Agent booked Barcelona hotel for correct dates
      ref: create[1]
      severity: critical
    - name: Agent wrote review for Lisbon stay
      ref: create[2]
      severity: high
    - name: Agent created 2026 Favorites list with booked hotel
      ref: create[3]
      severity: high
    - name: Agent sent early check-in message to booked hotel
      ref: create[4]
      severity: medium
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not write reviews for other properties
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify other saved lists
      ref: invariant[3]
      severity: medium
    - name: Agent only messaged the booked property
      ref: invariant[4]
      severity: medium
    - name: Agent did not tamper with existing payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
    - name: Rebooking suggestions are system-generated side effects
      ref: invariant[7]
      severity: low
secondary_primitives: []
