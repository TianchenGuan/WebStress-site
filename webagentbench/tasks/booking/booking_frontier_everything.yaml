task_id: booking_frontier_everything
env_id: booking
title: "Ultimate Task: Profile, Settings, Payments, Search, Book, Cancel, Modify, Review, Lists, Messages"
instruction_template: >
  Complete this comprehensive session that touches every part of the platform:
  1. Update your phone number to "+1-415-555-0200" and your address to
     "200 Market St, San Francisco, CA 94105".
  2. In settings, change currency to EUR and enable two-factor authentication.
  3. In travel preferences, set preferred bed type to "king" and add "gluten-free"
     to dietary restrictions.
  4. Add a new Visa card ending in 7777, expiry 05/30, holder name "Jordan Parker",
     and set it as your default payment.
  5. Search for hotels in "Barcelona" and book "{target.book_name}" — the
     standard room for 3 nights (2026-09-01 to 2026-09-04, 2 guests) using
     your new default Visa card ending in 7777.
  6. Go to your trips and cancel the reservation at "{target.cancel_name}"
     (confirmation {target.cancel_conf}).
  7. Find your reservation at "{target.modify_name}" and modify it: change
     the check-in to 2026-07-20 and check-out to 2026-07-25 and add special
     request "Late checkout at 13:00 please".
  8. Go to reviews and write a review for your completed stay at
     "{target.review_prop_name}": overall score 8.5, title "Great location",
     positive "Walking distance to everything, excellent breakfast", negative
     "Room was a bit noisy at night".
  9. Create a new saved list called "2026 Favorites" and add "{target.book_name}"
     to it.
  10. Send a message to "{target.book_name}" with subject "Early check-in request"
      and body "Could we check in at 12:00 instead of 14:00? Thank you!".
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
  - planning
  - state_tracking
  - patience
  - verification
  - exploration
  - grounding
start_path: /account
seed:
  distractors: 10
  actors: {}
  steps:
    - use: featured_property
      params:
        name: "Barcelona Beachfront Palace"
        city: "Barcelona"
        country: "Spain"
        star_rating: 5
        review_score: 9.2
        price: 310.00
        neighborhood: "Barceloneta"
        genius_discount_pct: 10
      outputs:
        - book_id
        - book_name
        - book_room
        - book_rname
    - use: featured_property
      params:
        name: "Hotel Provenza Eixample"
        city: "Barcelona"
        country: "Spain"
        star_rating: 4
        review_score: 8.5
        price: 195.00
      outputs:
        - cancel_prop_id
        - cancel_prop_name
        - cancel_room
        - cancel_rname
    - use: create_reservation
      params:
        property_id: "{output.cancel_prop_id}"
        check_in: "2026-08-15"
        check_out: "2026-08-18"
        status: confirmed
        guests: 2
        booked_days_ago: 14
      outputs:
        - cancel_res_id
        - cancel_conf
        - cancel_res_prop
    - use: featured_property
      params:
        name: "Madrid Royal Suites"
        city: "Madrid"
        country: "Spain"
        star_rating: 4
        review_score: 8.7
        price: 225.00
      outputs:
        - modify_prop_id
        - modify_prop_name
        - modify_room
        - modify_rname
    - use: modify_reservation
      params:
        property_id: "{output.modify_prop_id}"
        check_in: "2026-07-15"
        check_out: "2026-07-20"
        guests: 2
        booked_days_ago: 20
      outputs:
        - modify_res_id
        - modify_conf
        - modify_res_prop
        - modify_ci
        - modify_co
    - use: featured_property
      params:
        name: "Lisbon Harbor View Hotel"
        city: "Lisbon"
        country: "Portugal"
        star_rating: 4
        review_score: 8.8
        price: 175.00
      outputs:
        - review_prop_id
        - review_prop_name
        - review_room
        - review_rname
    - use: create_reservation
      params:
        property_id: "{output.review_prop_id}"
        check_in: "2026-01-10"
        check_out: "2026-01-14"
        status: completed
        guests: 2
        booked_days_ago: 180
      outputs:
        - review_res_id
        - review_res_conf
        - review_res_prop
  targets:
    book_id: "{output.book_id}"
    book_name: "{output.book_name}"
    cancel_name: "{output.cancel_prop_name}"
    cancel_conf: "{output.cancel_conf}"
    cancel_res_id: "{output.cancel_res_id}"
    modify_name: "{output.modify_prop_name}"
    modify_res_id: "{output.modify_res_id}"
    review_prop_name: "{output.review_prop_name}"
    review_prop_id: "{output.review_prop_id}"
    review_res_id: "{output.review_res_id}"
eval:
  source: server_state
  checks:
    - expr: state.owner_phone == '+1-415-555-0200'
      desc: "Phone number updated"
    - expr: "'200 Market St' in state.owner_address"
      desc: "Address updated"
    - expr: state.settings.currency == 'EUR'
      desc: "Currency changed to EUR"
    - expr: state.settings.two_factor_enabled == True
      desc: "2FA enabled"
    - expr: state.travel_preferences.preferred_bed_type == 'king'
      desc: "Bed preference set to king"
    - expr: "'gluten-free' in state.travel_preferences.dietary_restrictions"
      desc: "Gluten-free dietary restriction added"
    - expr: >
        any(pm.last_four == '7777' and pm.is_default for pm in state.payment_methods)
      desc: "New Visa 7777 added and set as default"
    - expr: >
        any(r.property_id == '{target.book_id}' and r.check_in == '2026-09-01'
        and r.status == 'confirmed' for r in state.reservations)
      desc: "Barcelona hotel booked for correct dates"
    - expr: >
        any(r.id == '{target.cancel_res_id}' and r.status == 'cancelled'
        for r in state.reservations)
      desc: "Provenza hotel reservation cancelled"
    - expr: >
        any(r.id == '{target.modify_res_id}' and r.check_in == '2026-07-20'
        and r.check_out == '2026-07-25' for r in state.reservations)
      desc: "Madrid reservation dates modified"
    - expr: >
        any(r.id == '{target.modify_res_id}'
        and 'late checkout' in r.guest_info.special_requests.lower()
        for r in state.reservations)
      desc: "Late checkout special request added"
    - expr: >
        any(rv.property_id == '{target.review_prop_id}' and rv.overall_score == 8.5
        and rv.title == 'Great location' for rv in state.reviews)
      desc: "Review written for Lisbon hotel"
    - expr: >
        any(sl.name == '2026 Favorites' and '{target.book_id}' in sl.property_ids
        for sl in state.saved_lists)
      desc: "Saved list created with booked property"
    - expr: >
        any(m.property_id == '{target.book_id}' and 'Early check-in' in m.subject
        and m.sender == 'guest' for m in state.messages)
      desc: "Message sent to booked property"
  negative_checks:
    - expr: >
        not any(e.action == 'reservation.cancel' and e.payload.get('reservation_id') != '{target.cancel_res_id}'
        for e in state.audit_log)
      desc: "No other reservation was cancelled"
      penalty: 0.2
    - expr: >
        sum(1 for e in state.audit_log if e.action == 'reservation.create') <= 1
      desc: "Only one new reservation created"
      penalty: 0.15
    - expr: >
        not any(r.id == '{target.modify_res_id}' and r.status == 'cancelled'
        for r in state.reservations)
      desc: "Modified reservation was not accidentally cancelled"
      penalty: 0.25
    - expr: >
        any(pm.last_four == '4242' for pm in state.payment_methods)
      desc: "Original Visa card was not removed"
      penalty: 0.1
