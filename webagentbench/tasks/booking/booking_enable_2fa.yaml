task_id: booking_enable_2fa
env_id: booking
title: Enable Two-Factor Authentication
instruction_template: 'Go to settings and enable two-factor authentication for your
  account.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- verification
start_path: /settings
seed:
  distractors: 3
  actors: {}
  steps:
  - use: set_settings
    params:
      two_factor_enabled: false
    outputs:
    - updated
  targets: {}
canonical_diff:
  update:
    - entity: settings
      desc: Two-factor authentication enabled
      where: { id: { any: true } }
      changes:
        two_factor_enabled: { eq: true }
        email_notifications: { expr: "x == initial.settings.email_notifications" }
  invariant:
    - collection: state.reservations
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent did not modify reservations
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
secondary_primitives: []
