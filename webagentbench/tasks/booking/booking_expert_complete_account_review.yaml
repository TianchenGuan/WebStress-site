task_id: booking_expert_complete_account_review
env_id: booking
title: Complete Account Review with Profile, Settings, Payment, Booking, and Review
instruction_template: "Perform a comprehensive account review and updates:\n1. Update your profile:\n\
  \   - Phone number to \"+1-415-555-0234\"\n   - Address to \"500 Market Street, {target.city}, CA 94105\"\
  \n   - Nationality to \"US\" (confirm)\n2. Update your account settings:\n   - Currency to \"EUR\"\n\
  \   - Enable newsletter\n   - Disable deal alerts\n3. Update travel preferences:\n   - Preferred bed\
  \ type to \"queen\"\n   - Floor preference to \"high\"\n   - Add \"vegan\" to dietary restrictions\n\
  4. Add a new payment method: Mastercard ending in 2222, expiry 05/30, holder \"Jordan Parker\".\n5.\
  \ Search for \"{target.property_name}\" in {target.city} and book its \"Deluxe Room\" for 2 guests checking\
  \ in 2026-10-20 and checking out 2026-10-24 (4 nights). Use the new Mastercard (ending in 2222).\n6.\
  \ You have a completed stay at \"{target.review_name}\" in {target.review_city}. Write a review: score\
  \ 9.0, title \"Outstanding hospitality\", positive \"The staff went above and beyond with personalized\
  \ service and the rooftop bar had stunning city views\", negative \"Parking was limited and expensive\"\
  , leisure, couple.\n"
difficulty: expert
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
- planning
secondary_primitives:
- patience
start_path: /home
seed:
  distractors: 15
  actors: {}
  steps:
  - use: set_profile
    params:
      owner_phone: +1-217-555-0142
      owner_address: 456 Oak Avenue, Springfield, IL 62704
      owner_nationality: US
    outputs:
    - owner_name
  - use: set_settings
    params:
      currency: USD
      newsletter: false
      deal_alerts: true
    outputs:
    - updated
  - use: set_preferences
    params:
      preferred_bed_type: king
      floor_preference: low
      dietary_restrictions:
      - vegetarian
    outputs:
    - updated
  - use: featured_property
    params:
      name: Hotel Nikko San Francisco
      city: San Francisco
      country: United States
      star_rating: 4
      review_score: 8.7
      review_count: 5670
      price: 265.0
      neighborhood: Union Square
      address: 222 Mason Street, San Francisco, CA 94102
      amenities:
      - Free WiFi
      - Pool
      - Restaurant
      - Bar
      - Fitness center
      - Spa
      - Room service
      popular_facilities:
      - Pool
      - Spa
      - Restaurant
      rooms:
      - name: Classic Room
        price: 265.0
        bed_type: queen
        max_occupancy: 2
        cancel_type: free_cancellation
      - name: Deluxe Room
        price: 340.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
      - name: Imperial Suite
        price: 580.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
    outputs:
    - prop_id
    - prop_name
    - cheapest_room_id
    - cheapest_room_name
  - use: featured_property
    params:
      name: The Fairmont Chicago
      city: Chicago
      country: United States
      star_rating: 4
      review_score: 8.9
      review_count: 4320
      price: 280.0
      neighborhood: Millennium Park
      address: 200 N Columbus Dr, Chicago, IL 60601
      amenities:
      - Free WiFi
      - Restaurant
      - Bar
      - Fitness center
      - Room service
      - Concierge
    outputs:
    - review_id
    - review_name
    - review_room_id
    - review_room_name
  - use: create_reservation
    params:
      property_id: '{output.review_id}'
      check_in: '2026-01-15'
      check_out: '2026-01-19'
      price_per_night: 280.0
      status: completed
      guests: 2
      booked_days_ago: 85
    outputs:
    - review_res_id
    - review_conf
    - review_res_prop
  targets:
    prop_id: '{output.prop_id}'
    property_name: '{output.prop_name}'
    city: San Francisco
    review_id: '{output.review_id}'
    review_name: '{output.review_name}'
    review_city: Chicago
eval:
  source: server_state
  checks:
  - expr: state.owner_phone == '+1-415-555-0234'
    desc: Phone updated
  - expr: '''500 Market Street'' in state.owner_address'
    desc: Address updated to Market Street
  - expr: state.settings.currency == 'EUR'
    desc: Currency set to EUR
  - expr: state.settings.newsletter == True
    desc: Newsletter enabled
  - expr: state.settings.deal_alerts == False
    desc: Deal alerts disabled
  - expr: state.travel_preferences.preferred_bed_type == 'queen'
    desc: Bed type set to queen
  - expr: state.travel_preferences.floor_preference == 'high'
    desc: Floor preference set to high
  - expr: '''vegan'' in state.travel_preferences.dietary_restrictions'
    desc: Vegan added to dietary restrictions
  - expr: "any(pm.card_type == 'Mastercard' and pm.last_four == '2222'\n  for pm in state.payment_methods)\n"
    desc: New Mastercard ending in 2222 added
  - expr: "any(\n  r.property_id == '{target.prop_id}' and\n  r.status == 'confirmed' and\n  r.check_in\
      \ == '2026-10-20' and\n  r.check_out == '2026-10-24'\n  for r in state.reservations\n)\n"
    desc: Hotel booked with correct dates
  - expr: "any(\n  r.property_id == '{target.prop_id}' and\n  r.room_type_name == 'Deluxe Room'\n  for\
      \ r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Deluxe Room specifically booked
  - expr: "any(\n  rv.property_id == '{target.review_id}' and\n  rv.overall_score == 9.0 and\n  rv.title\
      \ == 'Outstanding hospitality'\n  for rv in state.reviews\n)\n"
    desc: Review written with correct score and title
  negative_checks:
  - expr: state.owner_email == 'jordan.parker@email.com'
    desc: Email was not changed
    penalty: 0.25
  - expr: "not any(\n  e.action == 'payment_method.delete'\n  for e in state.audit_log\n)\n"
    desc: No existing payment methods were deleted
    penalty: 0.2
  - expr: "not any(\n  r.property_id == '{target.prop_id}' and\n  r.room_type_name in ('Classic Room',\
      \ 'Imperial Suite')\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n)\n"
    desc: Did not book the wrong room type
    penalty: 0.2
  - expr: '''vegetarian'' not in state.travel_preferences.dietary_restrictions'
    desc: Old dietary preference replaced, not kept alongside new one
    penalty: 0.1
