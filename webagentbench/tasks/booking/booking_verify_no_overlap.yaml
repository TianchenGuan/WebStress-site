task_id: booking_verify_no_overlap
env_id: booking
title: Verify No Overlapping Reservations (No-Op)
instruction_template: >-
  Review all your upcoming reservations. If any have overlapping dates, cancel
  the one booked more recently. If no overlaps exist, no action is needed.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
  - verification
  - state_tracking
secondary_primitives: []
start_path: /trips
seed:
  distractors: 5
  actors: {}
  steps:
    - use: featured_property
      params:
        name: The Ritz London
        city: London
        country: United Kingdom
        star_rating: 5
        review_score: 9.3
        review_count: 5100
        price: 680.0
        neighborhood: Piccadilly
        address: 150 Piccadilly, London W1J 9BR
        amenities:
          - Free WiFi
          - Spa
          - Restaurant
          - Bar
          - Room service
          - Fitness center
      outputs:
        - prop_id_1
        - prop_name_1
        - room_id_1
        - room_name_1
    - use: create_reservation
      params:
        property_id: '{output.prop_id_1}'
        check_in: '2026-06-01'
        check_out: '2026-06-05'
        price_per_night: 680.0
        status: confirmed
        guests: 2
        booked_days_ago: 14
      outputs:
        - res_id_1
        - conf_num_1
        - res_prop_id_1
    - use: featured_property
      params:
        name: Hotel Amigo Brussels
        city: Brussels
        country: Belgium
        star_rating: 5
        review_score: 9.0
        review_count: 2870
        price: 390.0
        neighborhood: Grand Place
        address: Rue de l'Amigo 1-3, 1000 Brussels
        amenities:
          - Free WiFi
          - Restaurant
          - Bar
          - Fitness center
          - Concierge
      outputs:
        - prop_id_2
        - prop_name_2
        - room_id_2
        - room_name_2
    - use: create_reservation
      params:
        property_id: '{output.prop_id_2}'
        check_in: '2026-06-10'
        check_out: '2026-06-14'
        price_per_night: 390.0
        status: confirmed
        guests: 2
        booked_days_ago: 10
      outputs:
        - res_id_2
        - conf_num_2
        - res_prop_id_2
    - use: featured_property
      params:
        name: Hotel d'Angleterre Copenhagen
        city: Copenhagen
        country: Denmark
        star_rating: 5
        review_score: 9.1
        review_count: 1980
        price: 450.0
        neighborhood: Kongens Nytorv
        address: Kongens Nytorv 34, 1050 Copenhagen
        amenities:
          - Free WiFi
          - Spa
          - Restaurant
          - Bar
          - Room service
      outputs:
        - prop_id_3
        - prop_name_3
        - room_id_3
        - room_name_3
    - use: create_reservation
      params:
        property_id: '{output.prop_id_3}'
        check_in: '2026-06-20'
        check_out: '2026-06-24'
        price_per_night: 450.0
        status: confirmed
        guests: 2
        booked_days_ago: 7
      outputs:
        - res_id_3
        - conf_num_3
        - res_prop_id_3
  targets:
    res_id_1: '{output.res_id_1}'
    res_id_2: '{output.res_id_2}'
    res_id_3: '{output.res_id_3}'
eval:
  source: server_state
  checks:
    - expr: >-
        all(
          r.status == 'confirmed'
          for r in state.reservations
          if r.id in ('{target.res_id_1}', '{target.res_id_2}', '{target.res_id_3}')
        )
      desc: All three reservations remain confirmed and unchanged
  negative_checks:
    - expr: >-
        not any(
          r.status == 'cancelled'
          for r in state.reservations
          if r.id in ('{target.res_id_1}', '{target.res_id_2}', '{target.res_id_3}')
        )
      desc: No reservation was incorrectly cancelled
      penalty: 0.5
    - expr: >-
        not any(
          r.status == 'modified'
          for r in state.reservations
          if r.id in ('{target.res_id_1}', '{target.res_id_2}', '{target.res_id_3}')
        )
      desc: No reservation was unnecessarily modified
      penalty: 0.3
