task_id: booking_book_with_specific_payment
env_id: booking
title: Book a Hotel Using a Specific Non-Default Payment Method
instruction_template: 'Search for hotels in "Milan" and find the property "{target.property_name}".
  Book the "{target.room_name}" room for 2 nights checking in on 2026-07-10 and checking
  out on 2026-07-12 for 2 guests. Important: Do NOT use the default Visa card. Instead,
  use the Mastercard ending in 8888 as your payment method. Enter your name and email
  from your account profile.

  '
difficulty: medium
time_limit_seconds: 240
expected_steps: 15
primary_primitives:
- backtracking
start_path: /home
seed:
  distractors: 7
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Milano Duomo Grand
      city: Milan
      country: Italy
      star_rating: 4
      review_score: 8.8
      review_count: 2100
      price: 255.0
      property_type: Hotel
      neighborhood: Centro Storico
      address: 3 Piazza del Duomo, 20122 Milan
      amenities:
      - Free WiFi
      - Spa
      - Restaurant
      - Room service
      - Air conditioning
      popular_facilities:
      - Free WiFi
      - Spa
      - Restaurant
      distance_km: 0.1
      rooms:
      - name: Superior Double
        price: 255.0
        bed_type: double
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        original_price: null
        view_type: city
      - name: Deluxe Suite
        price: 420.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        original_price: null
        view_type: cathedral
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: decoy_property
    params:
      name: Budget Milan Central
      city: Milan
      country: Italy
      star_rating: 2
      review_score: 7.0
      review_count: 540
      price: 95.0
      property_type: Hotel
      neighborhood: Stazione Centrale
      genius_discount_pct: 0
      amenities:
      - Free WiFi
      distance_km: 2.5
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Navigli Boutique Residence
      city: Milan
      country: Italy
      star_rating: 4
      review_score: 8.3
      review_count: 890
      price: 210.0
      property_type: Apartment
      neighborhood: Navigli
      genius_discount_pct: 5
      amenities:
      - Free WiFi
      - Kitchen
      - Terrace
      distance_km: 3.0
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
    room_id: '{output.cheapest_room_id}'
    room_name: Superior Double
canonical_diff:
  create:
    - entity: Reservation
      desc: Book Superior Double at Milano Duomo Grand using Mastercard ending 8888
      properties:
        property_id: {expr: "x == target['property_id']"}
        property_name: {any: true}
        room_type_id: {expr: "x == target['room_id']"}
        room_type_name: {eq: "Superior Double"}
        check_in: {eq: "2026-07-10"}
        check_out: {eq: "2026-07-12"}
        nights: {eq: 2}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {any: true}
        payment_method_id: {eq: "pm_2"}
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['property_id'] or a.check_in != '2026-07-10'"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked using the Mastercard ending in 8888 (not the default Visa)
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.check_in == '2026-07-10'\
      \ and\n  r.check_out == '2026-07-12' and\n  r.status == 'confirmed'\n  for r\
      \ in state.reservations\n)\n"
    desc: Reservation was created for the correct property and dates
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.room_type_id ==\
      \ '{target.room_id}' and\n  r.guests == 2\n  for r in state.reservations\n \
      \ if not r.id.startswith('res_initial_')\n)\n"
    desc: Reservation is for the Superior Double room with 2 guests
  - expr: "any(\n  r.property_id == '{target.property_id}' and\n  r.payment_method_id\
      \ == 'pm_2'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: Reservation uses the Mastercard ending in 8888 (pm_2)
  negative_checks:
  - expr: "not any(\n  r.property_id == '{target.property_id}' and\n  r.payment_method_id\
      \ == 'pm_1'\n  for r in state.reservations\n  if not r.id.startswith('res_initial_')\n\
      )\n"
    desc: The default Visa card was not used for this reservation
    penalty: 0.4
  - expr: "not any(\n  e.action == 'reservation.create' and e.payload.get('property_id')\
      \ != '{target.property_id}'\n  for e in state.audit_log\n)\n"
    desc: No reservation made for wrong property
    penalty: 0.3
secondary_primitives: []
