task_id: booking_mark_notifications_read
env_id: booking
title: Mark All Notifications as Read
instruction_template: 'Go to your notifications page and mark all notifications as
  read.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- grounding
start_path: /notifications
seed:
  distractors: 3
  actors: {}
  steps:
  - use: add_notification
    params:
      type: deal_alert
      title: Flash Sale in Paris
      message: 50% off select hotels in Paris this weekend!
      read: false
    outputs:
    - notif_a
  - use: add_notification
    params:
      type: check_in_reminder
      title: Check-in Tomorrow
      message: Your stay at Grand Hotel starts tomorrow. Don't forget to check in!
      read: false
    outputs:
    - notif_b
  - use: add_notification
    params:
      type: review_reminder
      title: Share Your Experience
      message: How was your recent stay? Leave a review to help other travelers.
      read: false
    outputs:
    - notif_c
  targets: {}
eval:
  source: server_state
  checks:
  - expr: 'all(n.read for n in state.notifications)

      '
    desc: All notifications are marked as read
  negative_checks:
  - expr: 'len(state.notifications) >= 3

      '
    desc: No notifications were deleted instead of marked as read
    penalty: 0.3
