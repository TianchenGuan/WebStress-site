task_id: booking_five_star_verification
env_id: booking
title: Verify 5-Star Tokyo Hotel and Book Executive Suite
instruction_template: 'Search for 5-star hotels in Tokyo. Find a hotel that has BOTH
  a spa AND a pool in its amenities, and verify that its review score is above 9.0.
  Once you find such a hotel, book its "Executive Suite" (not any other room type)
  for 2 guests checking in on 2026-09-01 and checking out on 2026-09-05 (4 nights).
  Use the default Visa payment method (ending in 4242) and enter your name and email
  from your profile.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 22
primary_primitives:
- verification
secondary_primitives: []
start_path: /home
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_property
    params:
      name: Aman Tokyo
      city: Tokyo
      country: Japan
      star_rating: 5
      review_score: 9.4
      review_count: 2890
      price: 650.0
      neighborhood: Otemachi
      address: The Otemachi Tower, 1-5-6 Otemachi, Tokyo
      distance_km: 0.8
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Fitness center
      - Restaurant
      - Bar
      - Room service
      - Concierge
      - Garden
      - Sauna
      popular_facilities:
      - Spa
      - Pool
      - Restaurant
      - Free WiFi
      rooms:
      - name: Deluxe Room
        price: 650.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 71.0
      - name: Premier Room
        price: 850.0
        bed_type: king
        max_occupancy: 2
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: garden
        room_size_sqm: 80.0
      - name: Executive Suite
        price: 1200.0
        bed_type: king
        max_occupancy: 3
        meals_included: breakfast
        cancel_type: free_cancellation
        view_type: city
        room_size_sqm: 120.0
    outputs:
    - property_id
    - property_name
    - cheapest_room_id
    - cheapest_room_name
  - use: decoy_property
    params:
      name: The Peninsula Tokyo
      city: Tokyo
      country: Japan
      star_rating: 5
      review_score: 9.2
      review_count: 3456
      price: 580.0
      neighborhood: Marunouchi
      amenities:
      - Free WiFi
      - Spa
      - Fitness center
      - Restaurant
      - Bar
      - Room service
      - Concierge
      distance_km: 0.5
    outputs:
    - decoy_property_1_id
    - decoy_property_1_name
  - use: decoy_property
    params:
      name: Tokyo Bay Grand Hotel
      city: Tokyo
      country: Japan
      star_rating: 5
      review_score: 8.7
      review_count: 1890
      price: 420.0
      neighborhood: Odaiba
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Fitness center
      - Restaurant
      distance_km: 4.5
    outputs:
    - decoy_property_2_id
    - decoy_property_2_name
  - use: decoy_property
    params:
      name: Shinjuku Garden Hotel
      city: Tokyo
      country: Japan
      star_rating: 4
      review_score: 9.1
      review_count: 4200
      price: 280.0
      neighborhood: Shinjuku
      amenities:
      - Free WiFi
      - Spa
      - Pool
      - Fitness center
      distance_km: 1.2
    outputs:
    - decoy_property_3_id
    - decoy_property_3_name
  targets:
    property_id: '{output.property_id}'
    property_name: '{output.property_name}'
canonical_diff:
  create:
    - entity: Reservation
      desc: Book the verified 5-star Tokyo hotel Executive Suite for 4 nights
      properties:
        property_id: {expr: "x == target['property_id']"}
        property_name: {any: true}
        room_type_id: {any: true}
        room_type_name: {eq: "Executive Suite"}
        check_in: {eq: "2026-09-01"}
        check_out: {eq: "2026-09-05"}
        nights: {eq: 4}
        guests: {eq: 2}
        rooms: {any: true}
        price_per_night: {any: true}
        total_price: {any: true}
        taxes_and_fees: {any: true}
        currency: {any: true}
        status: {eq: confirmed}
        booked_at: {any: true}
        guest_info: {expr: "x.full_name == initial.owner_name and x.email == initial.owner_email"}
        payment_method_id:
          expr: >-
            x == initial.settings.default_payment_id and
            any(pm.id == x and pm.card_type == 'Visa' and pm.last_four == '4242' for pm in initial.payment_methods)
        cancellation_policy: {any: true}
        confirmation_number: {any: true}
        is_genius_deal: {any: true}
        genius_discount: {any: true}
        meals_included: {any: true}
        rating_submitted: {any: true}
  invariant:
    - collection: state.reservations
      filter: "a.property_id != target['property_id']"
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent booked the correct 5-star hotel Executive Suite with correct dates
      ref: create[0]
      severity: critical
    - name: Agent did not modify other reservations
      ref: invariant[0]
      severity: high
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send unsolicited messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create spurious notifications
      ref: invariant[6]
      severity: low
