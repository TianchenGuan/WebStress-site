task_id: gmail_delegation_routing
env_id: gmail
title: Delegation Routing
instruction_template: Route three project emails to the correct team leads. Read each
  email to figure out who should handle it based on the content. For the customer
  complaint, BCC {target.manager_email} so they are aware without the customer seeing.
  Star the customer complaint as the most urgent. Create a 'Delegated' label and apply
  it to all three forwarded emails.
difficulty: medium
time_limit_seconds: 360
expected_steps: 38
primary_primitives:
- grounding
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: delegation_routing
    params: {}
    outputs:
    - budget_id
    - tech_id
    - complaint_id
    - decoy_id
    - cfo_email
    - cto_email
    - support_lead_email
    - manager_email
    - all_ids
  targets:
    budget_id: '{output.budget_id}'
    tech_id: '{output.tech_id}'
    complaint_id: '{output.complaint_id}'
    decoy_id: '{output.decoy_id}'
    cfo_email: '{output.cfo_email}'
    cto_email: '{output.cto_email}'
    support_lead_email: '{output.support_lead_email}'
    manager_email: '{output.manager_email}'
    all_ids: '{output.all_ids}'
canonical_diff:
  create:
    - entity: sent
      desc: Forward budget email to CFO
      count: 1
      properties:
        forwarded_from_id:
          expr: "x == target['budget_id']"
        to:
          expr: "target['cfo_email'] in x"
    - entity: sent
      desc: Forward tech email to CTO
      count: 1
      properties:
        forwarded_from_id:
          expr: "x == target['tech_id']"
        to:
          expr: "target['cto_email'] in x"
    - entity: sent
      desc: Forward complaint email to support lead with manager BCC
      count: 1
      properties:
        forwarded_from_id:
          expr: "x == target['complaint_id']"
        to:
          expr: "target['support_lead_email'] in x"
        bcc:
          expr: "target['manager_email'] in x"
    - entity: labels
      desc: Create the Delegated label
      count: 1
      properties:
        name:
          eq: Delegated
  update:
    - entity: emails
      desc: Apply Delegated label to budget email
      where:
        id:
          expr: "x == target['budget_id']"
      changes:
        labels:
          superset:
            - Delegated
    - entity: emails
      desc: Apply Delegated label to tech email
      where:
        id:
          expr: "x == target['tech_id']"
      changes:
        labels:
          superset:
            - Delegated
    - entity: emails
      desc: Star complaint and apply Delegated label
      where:
        id:
          expr: "x == target['complaint_id']"
      changes:
        is_starred:
          eq: true
        labels:
          superset:
            - Delegated
  invariant:
    - collection: state.emails
      filter: "a.id not in target['all_ids']"
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      filter: "True"
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.labels
      filter: "a.name != 'Delegated'"
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  named_invariants:
    - name: Agent forwarded budget email to CFO
      ref: create[0]
      severity: high
    - name: Agent forwarded tech email to CTO
      ref: create[1]
      severity: high
    - name: Agent forwarded complaint to support lead with manager BCC
      ref: create[2]
      severity: high
    - name: Agent created the Delegated label
      ref: create[3]
      severity: high
    - name: Agent starred complaint and labeled it Delegated
      ref: update[2]
      severity: high
    - name: Agent did not modify unrelated inbox emails
      ref: invariant[0]
      severity: high
