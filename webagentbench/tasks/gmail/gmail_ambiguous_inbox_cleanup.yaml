task_id: gmail_ambiguous_inbox_cleanup
env_id: gmail
title: Ambiguous Inbox Cleanup
instruction_template: 'Your inbox is cluttered. Clean it up:

  (1) Archive all newsletters and promotional emails.

  (2) Create a label "Project/{target.project_name}" and apply it to all emails related
  to the {target.project_name} project.

  (3) Star any emails from your manager ({target.manager_name}) that mention deadlines
  or due dates.

  Do NOT delete any emails.'
difficulty: expert
time_limit_seconds: 420
expected_steps: 35
primary_primitives:
- verification
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 10
  actors: {}
  steps:
  - use: ambiguous_inbox_cleanup
    params: {}
    outputs:
    - project_name
    - manager_email
    - manager_name
    - newsletter_count
    - newsletter_ids
    - project_email_ids
    - deadline_email_ids
    - non_deadline_email_ids
    - filler_email_ids
  targets:
    project_name: '{output.project_name}'
    manager_email: '{output.manager_email}'
    manager_name: '{output.manager_name}'
    newsletter_count: '{output.newsletter_count}'
    newsletter_ids: '{output.newsletter_ids}'
    project_email_ids: '{output.project_email_ids}'
    deadline_email_ids: '{output.deadline_email_ids}'
    non_deadline_email_ids: '{output.non_deadline_email_ids}'
    filler_email_ids: '{output.filler_email_ids}'
canonical_diff:
  create:
    - entity: labels
      desc: Create the Project/<project_name> label
      count: 1
      properties:
        name:
          expr: "x == f\"Project/{target['project_name']}\""
        system:
          eq: false
  update:
    - entity: emails
      desc: Apply project label to all project emails
      bijection:
        over: "target['project_email_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        labels:
          expr: "f\"Project/{target['project_name']}\" in x"
    - entity: emails
      desc: Star deadline emails from manager
      bijection:
        over: "target['deadline_email_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        is_starred:
          eq: true
    - entity: emails
      desc: Archive all newsletters
      bijection:
        over: "target['newsletter_ids']"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        archived:
          eq: true
  invariant:
    - collection: state.emails
      filter: "a.id not in target['project_email_ids'] and a.id not in target['deadline_email_ids'] and a.id not in target['newsletter_ids']"
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  named_invariants:
    - name: Agent created the project label
      ref: create[0]
      severity: high
    - name: Agent applied the project label to project emails
      ref: update[0]
      severity: high
    - name: Agent starred deadline emails from manager
      ref: update[1]
      severity: high
    - name: Agent archived all newsletters
      ref: update[2]
      severity: high
    - name: Agent did not delete any emails
      ref: invariant[3]
      severity: high
