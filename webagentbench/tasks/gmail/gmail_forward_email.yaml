task_id: gmail_forward_email
env_id: gmail
title: Forward an Invoice Email
instruction_template: 'Find the email from Carol Wang with subject "Invoice #1234
  — March Services" and forward it to dave@thornton.com with the note "Please review
  this invoice."'
difficulty: easy
time_limit_seconds: 150
expected_steps: 10
primary_primitives:
- backtracking
start_path: /inbox
seed:
  distractors: 10
  steps:
  - use: forward_email
    params: {}
    outputs:
    - target_email_id
  targets:
    target_email_id: '{output.target_email_id}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email was sent
  - expr: any(m.forwarded_from_id == '{target.target_email_id}' and m.to == ['dave@thornton.com']
      and m.cc == [] and m.bcc == [] for m in state.sent)
    desc: Forward of the correct source email is addressed solely to dave@thornton.com
      (no extra CC/BCC)
  - expr: any(m.forwarded_from_id == '{target.target_email_id}' and 'Please review
      this invoice' in m.body for m in state.sent)
    desc: Forward includes the required note 'Please review this invoice'
  - expr: not any(m.in_reply_to is not None for m in state.sent)
    desc: No replies were sent (forward expected, not reply)
  negative_checks:
  - expr: len(state.sent) == 1
    desc: Must send exactly one email (zero or extras are penalised)
    penalty: 0.2
  - expr: all(m.forwarded_from_id is None or m.forwarded_from_id == '{target.target_email_id}'
      for m in state.sent)
    desc: Must not forward any other email than the target invoice
    penalty: 0.25
secondary_primitives: []
