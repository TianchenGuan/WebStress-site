task_id: gmail_quarterly_closeout
env_id: gmail
title: Quarterly Closeout
instruction_template: 'End-of-quarter cleanup. In your Primary tab: star the two most
  important emails (the ones mentioning ''{target.star_keyword_a}'' and ''{target.star_keyword_b}''),
  and archive the three old FYI emails from {target.fyi_sender_name}. In your Promotions
  tab: archive the three newsletters and delete the spam email about ''{target.spam_subject}''.
  In your Updates tab: forward the two update emails about ''{target.update_topic}''
  to {target.team_digest_email}. Create two labels: ''Q1 Active'' and ''Q1 Archive''.
  Apply ''Q1 Active'' to the two starred emails. Go to Contacts, delete the two contacts
  that have not been in touch for more than 30 days. Update the note for {target.update_contact_name}
  to ''{target.new_note}''. Go to Settings > Filters and create a filter that archives
  emails from {target.vendor_domain} and labels them ''{target.vendor_label}''. Change
  the maximum page size to 25.'
difficulty: expert
time_limit_seconds: 600
expected_steps: 65
primary_primitives:
- planning
- state_tracking
- grounding
- verification
- exploration
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: quarterly_closeout
    params:
      star_keyword_a: board presentation
      star_keyword_b: renewal deadline
      update_topic: infrastructure migration
      team_digest_email: team-digest@thornton.com
      vendor_domain: brightleaf.io
      vendor_label: Vendor Invoices
      new_note: Key contact for Q2 planning.
    outputs:
    - star_a_id
    - star_b_id
    - star_keyword_a
    - star_keyword_b
    - fyi_ids
    - fyi_sender_name
    - promo_ids
    - spam_id
    - spam_subject
    - update_ids
    - update_topic
    - team_digest_email
    - stale_a_id
    - stale_b_id
    - update_contact_name
    - update_contact_email
    - new_note
    - vendor_domain
    - vendor_label
    - active_contact_id
  targets:
    star_a_id: '{output.star_a_id}'
    star_b_id: '{output.star_b_id}'
    star_keyword_a: '{output.star_keyword_a}'
    star_keyword_b: '{output.star_keyword_b}'
    fyi_ids: '{output.fyi_ids}'
    fyi_sender_name: '{output.fyi_sender_name}'
    promo_ids: '{output.promo_ids}'
    spam_id: '{output.spam_id}'
    spam_subject: '{output.spam_subject}'
    update_ids: '{output.update_ids}'
    update_topic: '{output.update_topic}'
    team_digest_email: '{output.team_digest_email}'
    stale_a_id: '{output.stale_a_id}'
    stale_b_id: '{output.stale_b_id}'
    update_contact_name: '{output.update_contact_name}'
    update_contact_email: '{output.update_contact_email}'
    new_note: '{output.new_note}'
    vendor_domain: '{output.vendor_domain}'
    vendor_label: '{output.vendor_label}'
    active_contact_id: '{output.active_contact_id}'
eval:
  source: server_state
  checks:
  - expr: state.get_email('{target.star_a_id}').is_starred
    desc: Star A
  - expr: state.get_email('{target.star_b_id}').is_starred
    desc: Star B
  - expr: all('inbox' not in state.get_email(eid).labels for eid in {target.fyi_ids})
    desc: FYI archived
  - expr: all('inbox' not in state.get_email(eid).labels for eid in {target.promo_ids})
    desc: Promos archived
  - expr: state.get_email('{target.spam_id}') is not None and state.get_email('{target.spam_id}').deleted
    desc: Spam deleted
  - expr: all(any(m.forwarded_from_id == eid and '{target.team_digest_email}' in m.to
      for m in state.sent) for eid in {target.update_ids})
    desc: Updates forwarded
  - expr: any(l.name == 'Q1 Active' for l in state.labels)
    desc: Q1 Active label created
  - expr: any(l.name == 'Q1 Archive' for l in state.labels)
    desc: Q1 Archive label created
  - expr: all('Q1 Active' in state.get_email(eid).labels for eid in ['{target.star_a_id}',
      '{target.star_b_id}'])
    desc: Q1 Active applied
  - expr: all(c.id != '{target.stale_a_id}' for c in state.contacts)
    desc: Stale contact A deleted
  - expr: all(c.id != '{target.stale_b_id}' for c in state.contacts)
    desc: Stale contact B deleted
  - expr: any(c.email == '{target.update_contact_email}' and '{target.new_note}' in
      (c.note or '') for c in state.contacts)
    desc: Contact note updated
  - expr: any(r.archive and '*@{target.vendor_domain}' in r.from_addresses and '{target.vendor_label}'
      in r.add_labels for r in state.filters)
    desc: Vendor filter created
  - expr: state.settings.max_page_size == 25
    desc: Page size changed
  negative_checks:
  - expr: any(c.id == '{target.active_contact_id}' for c in state.contacts)
    desc: Active contact preserved
    penalty: 0.15
  - expr: not any(m.forwarded_from_id == '{target.spam_id}' for m in state.sent)
    desc: Spam not forwarded
    penalty: 0.2
