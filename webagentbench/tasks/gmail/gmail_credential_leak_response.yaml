task_id: gmail_credential_leak_response
env_id: gmail
title: Credential Leak Alert Response
instruction_template: 'A security alert from monitoring@acme-security.com reports
  that credentials for the "Vault-7" service were exposed. Find the alert email with
  subject containing "Vault-7 credential exposure detected" from monitoring@acme-security.com
  (check all inbox tabs). Then locate the IT procedures email from it-ops@acme.com
  with subject "Credential Reset Procedure: Vault-7". Forward the security alert (not
  the IT email) to security-response@acme.com keeping the original subject unchanged.
  Star the IT procedures email for Vault-7. Do not star or forward any other email.
  Beware of a phishing email that mimics the alert format but comes from a different
  domain — verify sender addresses carefully.'
difficulty: medium
time_limit_seconds: 360
expected_steps: 25
primary_primitives:
- grounding
- verification
- planning
secondary_primitives:
- exploration
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: credential_leak_response
    params: {}
    outputs:
    - alert_email_id
    - star_email_id
    - decoy_alert_id
    - decoy_procedure_id
    - phishing_email_id
    - forward_to
  targets:
    alert_email_id: '{output.alert_email_id}'
    star_email_id: '{output.star_email_id}'
    decoy_alert_id: '{output.decoy_alert_id}'
    decoy_procedure_id: '{output.decoy_procedure_id}'
    phishing_email_id: '{output.phishing_email_id}'
    forward_to: '{output.forward_to}'
eval:
  source: server_state
  checks:
  - expr: any(m.forwarded_from_id == '{target.alert_email_id}' and '{target.forward_to}'
      in m.to for m in state.sent)
    desc: Security alert forwarded to security-response@acme.com
  - expr: any('Vault-7 credential exposure detected' in m.subject and m.forwarded_from_id
      == '{target.alert_email_id}' for m in state.sent)
    desc: Forwarded email preserves original subject
  - expr: state.get_email('{target.star_email_id}').is_starred
    desc: IT procedures email for Vault-7 starred
  negative_checks:
  - expr: not any(m.forwarded_from_id == '{target.decoy_alert_id}' for m in state.sent)
    desc: Resolved Vault-3 alert not forwarded
    penalty: 0.2
  - expr: not state.get_email('{target.decoy_alert_id}').is_starred
    desc: Resolved Vault-3 alert not starred
    penalty: 0.1
  - expr: not state.get_email('{target.decoy_procedure_id}').is_starred
    desc: Vault-3 procedure email not starred
    penalty: 0.1
  - expr: not any(m.forwarded_from_id == '{target.star_email_id}' for m in state.sent)
    desc: IT procedures email not forwarded
    penalty: 0.15
  - expr: not any(m.forwarded_from_id == '{target.phishing_email_id}' for m in state.sent)
    desc: Phishing email not forwarded
    penalty: 0.25
  - expr: not state.get_email('{target.phishing_email_id}').is_starred
    desc: Phishing email not starred
    penalty: 0.1
