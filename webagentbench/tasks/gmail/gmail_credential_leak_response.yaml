task_id: gmail_credential_leak_response
env_id: gmail
title: Credential Leak Alert Response
instruction_template: 'A security alert from monitoring@acme-security.com reports
  that credentials for the "Vault-7" service were exposed. Find the alert email with
  subject containing "Vault-7 credential exposure detected" from monitoring@acme-security.com
  (check all inbox tabs). Then locate the IT procedures email from it-ops@acme.com
  with subject "Credential Reset Procedure: Vault-7". Forward the security alert (not
  the IT email) to security-response@acme.com keeping the original subject unchanged.
  Star the IT procedures email for Vault-7. Do not star or forward any other email.
  Beware of a phishing email that mimics the alert format but comes from a different
  domain — verify sender addresses carefully.'
difficulty: medium
time_limit_seconds: 360
expected_steps: 25
primary_primitives:
- exploration
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: credential_leak_response
    params: {}
    outputs:
    - alert_email_id
    - star_email_id
    - decoy_alert_id
    - decoy_procedure_id
    - phishing_email_id
    - forward_to
  targets:
    alert_email_id: '{output.alert_email_id}'
    star_email_id: '{output.star_email_id}'
    decoy_alert_id: '{output.decoy_alert_id}'
    decoy_procedure_id: '{output.decoy_procedure_id}'
    phishing_email_id: '{output.phishing_email_id}'
    forward_to: '{output.forward_to}'
canonical_diff:
  create:
    - entity: sent
      desc: Forward the Vault-7 security alert to security-response@acme.com
      count: 1
      properties:
        forwarded_from_id:
          expr: "x == target['alert_email_id']"
        to:
          expr: "target['forward_to'] in x"
        subject:
          substring_all:
            - Vault-7 credential exposure detected
  update:
    - entity: emails
      desc: Star the IT procedures email for Vault-7
      where:
        id:
          expr: "x == target['star_email_id']"
      changes:
        is_starred:
          eq: true
  invariant:
    - collection: state.emails
      filter: "a.id != target['star_email_id']"
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      filter: "True"
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.labels
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  named_invariants:
    - name: Agent forwarded the Vault-7 alert to security-response
      ref: create[0]
      severity: high
    - name: Agent starred the IT procedures email
      ref: update[0]
      severity: high
    - name: Agent did not modify other inbox emails
      ref: invariant[0]
      severity: high
    - name: Agent did not send extra emails
      ref: create[0]
      severity: medium
