task_id: gmail_recover_deleted_draft
env_id: gmail
title: Recover Deleted Draft
instruction_template: 'You were composing an important email to {target.recipient_name}
  ({target.recipient_email}) about "{target.draft_subject}" but it was accidentally
  deleted. Check your trash, find the draft content, then compose and send a new email
  to the same recipient with the same subject. Make sure to include the key information:
  {target.key_point_1}, {target.key_point_2}, and {target.key_point_3}.'
difficulty: hard
time_limit_seconds: 300
expected_steps: 20
primary_primitives:
- grounding
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 15
  actors: {}
  steps:
  - use: recover_deleted_draft
    params: {}
    outputs:
    - recipient_email
    - recipient_name
    - draft_subject
    - draft_email_id
    - key_point_1
    - key_point_2
    - key_point_3
    - trash_noise_ids
  targets:
    recipient_email: '{output.recipient_email}'
    recipient_name: '{output.recipient_name}'
    draft_subject: '{output.draft_subject}'
    draft_email_id: '{output.draft_email_id}'
    key_point_1: '{output.key_point_1}'
    key_point_2: '{output.key_point_2}'
    key_point_3: '{output.key_point_3}'
    trash_noise_ids: '{output.trash_noise_ids}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email was sent
  - expr: any(m.to == ['{target.recipient_email}'] and m.cc == [] and m.bcc == []
      and m.in_reply_to is None and m.forwarded_from_id is None for m in state.sent)
    desc: Fresh compose (not reply/forward) addressed solely to the correct recipient
  - expr: any(m.subject == '{target.draft_subject}' for m in state.sent)
    desc: Email subject is exactly the original draft subject
  - expr: any('{target.key_point_1}' in m.body and '{target.key_point_2}' in m.body
      and '{target.key_point_3}' in m.body for m in state.sent)
    desc: A single outbound email contains all three key points
  negative_checks:
  - expr: len(state.sent) == 1
    desc: Must send exactly one email (zero or extras are penalised)
    penalty: 0.25
  - expr: all('{target.recipient_email}' in m.to for m in state.sent)
    desc: Every outbound email must go to the intended recipient
    penalty: 0.4
  - expr: all(len(m.body) <= 2500 for m in state.sent if m.to == ['{target.recipient_email}'])
    desc: Body must stay under 2500 chars for the recovered draft (stuffing guard)
    penalty: 0.15
