task_id: gmail_contact_enrichment
env_id: gmail
title: Enrich contacts from email signatures and star VIPs
instruction_template: |-
  You have 6 contacts that are missing company and role information: Omar Farouk, Ling Zhou, Beatrice Muller, Sam Okoye, Hannah Kessler, and Davi Costa. For each contact, search the inbox for their most recent email thread. If a thread from that contact exists, read the email signature to find their company and role, then update the contact's note to "[Role] at [Company]". If no email thread from that contact exists, do not modify that contact at all.
  Your manager Grace Lin sent an email with subject "Priority Contacts" listing Omar Farouk, Ling Zhou, and Sam Okoye as VIP contacts. Star the contacts for those 3 people.
  Do not fabricate any data. Do not modify contacts for which you found no email thread.
difficulty: expert
time_limit_seconds: 600
expected_steps: 48
primary_primitives:
- patience
- exploration
- memory
- verification
- attention
secondary_primitives:
- adversarial_robustness
- constraint_satisfaction
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: contact_enrichment
    params: {}
    outputs:
    - omar_id
    - ling_id
    - beatrice_id
    - sam_id
    - hannah_id
    - davi_id
  targets:
    omar_id: "{output.omar_id}"
    ling_id: "{output.ling_id}"
    beatrice_id: "{output.beatrice_id}"
    sam_id: "{output.sam_id}"
    hannah_id: "{output.hannah_id}"
    davi_id: "{output.davi_id}"
eval:
  source: server_state
  checks:
  - expr: any(c.id == '{target.omar_id}' and c.note == 'Operations Director at Crescent Logistics' for c in state.contacts)
    desc: Omar Farouk note enriched correctly
  - expr: any(c.id == '{target.ling_id}' and c.note == 'Lead Data Scientist at Apex Data' for c in state.contacts)
    desc: Ling Zhou note enriched correctly
  - expr: any(c.id == '{target.beatrice_id}' and c.note == 'VP of Partnerships at RheinTech' for c in state.contacts)
    desc: Beatrice Muller note enriched correctly
  - expr: any(c.id == '{target.sam_id}' and c.note == 'Co-founder at BrightHorizon' for c in state.contacts)
    desc: Sam Okoye note enriched correctly
  - expr: any(c.id == '{target.omar_id}' and c.is_starred for c in state.contacts)
    desc: Omar Farouk starred as VIP
  - expr: any(c.id == '{target.ling_id}' and c.is_starred for c in state.contacts)
    desc: Ling Zhou starred as VIP
  - expr: any(c.id == '{target.sam_id}' and c.is_starred for c in state.contacts)
    desc: Sam Okoye starred as VIP
  negative_checks:
  - expr: any(c.id == '{target.hannah_id}' and c.note is None for c in state.contacts)
    desc: Hannah Kessler contact not modified (no email thread)
    penalty: 0.15
  - expr: any(c.id == '{target.davi_id}' and c.note is None for c in state.contacts)
    desc: Davi Costa contact not modified (no email thread)
    penalty: 0.15
  - expr: any(c.id == '{target.beatrice_id}' and not c.is_starred for c in state.contacts)
    desc: Beatrice Muller not incorrectly starred
    penalty: 0.1
  - expr: not any(c.id == '{target.omar_id}' and c.note == 'Logistics Coordinator at Crescent Logistics' for c in state.contacts)
    desc: Omar not enriched with forwarded colleague role
    penalty: 0.15
  - expr: not any(c.id == '{target.beatrice_id}' and c.note == 'Director of Sales at RheinTech' for c in state.contacts)
    desc: Beatrice not enriched with outdated role
    penalty: 0.15
  - expr: not any(c.id == '{target.sam_id}' and c.note == 'Program Director at BrightHorizon Education' for c in state.contacts)
    desc: Sam not confused with Sam Okafor decoy
    penalty: 0.15
