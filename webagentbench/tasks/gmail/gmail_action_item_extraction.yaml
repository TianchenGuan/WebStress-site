task_id: gmail_action_item_extraction
env_id: gmail
title: Action Item Extraction
instruction_template: 'Four attendees — {target.attendee_a}, {target.attendee_b},
  {target.attendee_c}, and {target.attendee_d} — each sent a follow-up email after
  the leadership offsite with action items. Find all four emails (search for "leadership
  offsite follow-up" in the subject). Read each one and extract only the action items
  assigned to you ({target.user_name}). Ignore action items assigned to other people.
  Compose a new email to {target.manager_email} with subject "Offsite Action Items
  — {target.user_name}" listing each action item assigned to you on its own line.
  Note: one action item was reassigned — if a later message in any thread reassigns
  an item away from you, do not include it.'
difficulty: hard
time_limit_seconds: 480
expected_steps: 45
primary_primitives:
- verification
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: action_item_extraction
    params: {}
    outputs:
    - attendee_a
    - attendee_b
    - attendee_c
    - attendee_d
    - user_name
    - manager_email
    - correct_action_items
    - reassigned_item
    - adversarial_wrong_item
    - decoy_dinner_id
    - decoy_old_offsite_id
  targets:
    attendee_a: '{output.attendee_a}'
    attendee_b: '{output.attendee_b}'
    attendee_c: '{output.attendee_c}'
    attendee_d: '{output.attendee_d}'
    user_name: '{output.user_name}'
    manager_email: '{output.manager_email}'
    correct_action_items: '{output.correct_action_items}'
    reassigned_item: '{output.reassigned_item}'
    adversarial_wrong_item: '{output.adversarial_wrong_item}'
    decoy_dinner_id: '{output.decoy_dinner_id}'
    decoy_old_offsite_id: '{output.decoy_old_offsite_id}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email was sent
  - expr: "any(\n  m.to == ['{target.manager_email}']\n  and 'Offsite Action Items'\
      \ in m.subject\n  and '{target.user_name}' in m.subject\n  and m.in_reply_to\
      \ is None\n  and m.forwarded_from_id is None\n  for m in state.sent\n)"
    desc: Fresh compose (not reply/forward) to manager with the exact subject prefix
      and user name
  - expr: any(all(item in m.body for item in {target.correct_action_items}) for m
      in state.sent if m.to == ['{target.manager_email}'])
    desc: All correct action items appear verbatim in sent email body
  negative_checks:
  - expr: len(state.sent) == 1
    desc: Must send exactly one email (zero or extras are penalised)
    penalty: 0.2
  - expr: not any('{target.reassigned_item}' in m.body for m in state.sent if m.to
      == ['{target.manager_email}'])
    desc: Reassigned item must not appear in the summary
    penalty: 0.25
  - expr: not any('{target.adversarial_wrong_item}' in m.body for m in state.sent
      if m.to == ['{target.manager_email}'])
    desc: Action item from another attendee must not appear in the summary
    penalty: 0.2
  - expr: all(len(m.body) <= 4000 for m in state.sent if m.to == ['{target.manager_email}'])
    desc: Summary body must stay under 4000 chars (stuffing guard)
    penalty: 0.15
