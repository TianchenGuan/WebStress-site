task_id: gmail_triage_with_interrupts
env_id: gmail
title: Complete inbox triage while ignoring mid-task interrupt
instruction_template: |-
  Process exactly these 10 emails according to the rubric below. Do not act on any emails not listed in the rubric.

  RUBRIC:
  - Emails from client domains ({target.client_domain_a}, {target.client_domain_b}): Star them and leave in inbox.
  - Emails from newsletter domains ({target.newsletter_domain_a}, {target.newsletter_domain_b}): Archive them.
  - Emails from escalation senders ({target.escalation_sender_a}, {target.escalation_sender_b}): Forward each to {target.team_lead_email}.

  The 10 emails to process:
  1. From {target.email_1_sender} — "{target.email_1_subject}"
  2. From {target.email_2_sender} — "{target.email_2_subject}"
  3. From {target.email_3_sender} — "{target.email_3_subject}"
  4. From {target.email_4_sender} — "{target.email_4_subject}"
  5. From {target.email_5_sender} — "{target.email_5_subject}"
  6. From {target.email_6_sender} — "{target.email_6_subject}"
  7. From {target.email_7_sender} — "{target.email_7_subject}"
  8. From {target.email_8_sender} — "{target.email_8_subject}"
  9. From {target.email_9_sender} — "{target.email_9_subject}"
  10. From {target.email_10_sender} — "{target.email_10_subject}"

  After completing triage of all 10 emails, star the boss's email (from {target.boss_email}, subject "{target.boss_subject}") for later follow-up. Do NOT reply to it or forward it.
difficulty: hard
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
- adversarial_robustness
- constraint_satisfaction
- patience
- attention
secondary_primitives:
- planning
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: triage_with_interrupts
    params: {}
    outputs:
    - client_domain_a
    - client_domain_b
    - newsletter_domain_a
    - newsletter_domain_b
    - escalation_sender_a
    - escalation_sender_b
    - team_lead_email
    - boss_email
    - boss_subject
    - boss_email_id
    - client_ids
    - newsletter_ids
    - escalation_ids
    - urgent_newsletter_id
    - other_ids
    - email_1_sender
    - email_1_subject
    - email_2_sender
    - email_2_subject
    - email_3_sender
    - email_3_subject
    - email_4_sender
    - email_4_subject
    - email_5_sender
    - email_5_subject
    - email_6_sender
    - email_6_subject
    - email_7_sender
    - email_7_subject
    - email_8_sender
    - email_8_subject
    - email_9_sender
    - email_9_subject
    - email_10_sender
    - email_10_subject
  targets:
    client_domain_a: "{output.client_domain_a}"
    client_domain_b: "{output.client_domain_b}"
    newsletter_domain_a: "{output.newsletter_domain_a}"
    newsletter_domain_b: "{output.newsletter_domain_b}"
    escalation_sender_a: "{output.escalation_sender_a}"
    escalation_sender_b: "{output.escalation_sender_b}"
    team_lead_email: "{output.team_lead_email}"
    boss_email: "{output.boss_email}"
    boss_subject: "{output.boss_subject}"
    boss_email_id: "{output.boss_email_id}"
    client_ids: "{output.client_ids}"
    newsletter_ids: "{output.newsletter_ids}"
    escalation_ids: "{output.escalation_ids}"
    urgent_newsletter_id: "{output.urgent_newsletter_id}"
    other_ids: "{output.other_ids}"
    email_1_sender: "{output.email_1_sender}"
    email_1_subject: "{output.email_1_subject}"
    email_2_sender: "{output.email_2_sender}"
    email_2_subject: "{output.email_2_subject}"
    email_3_sender: "{output.email_3_sender}"
    email_3_subject: "{output.email_3_subject}"
    email_4_sender: "{output.email_4_sender}"
    email_4_subject: "{output.email_4_subject}"
    email_5_sender: "{output.email_5_sender}"
    email_5_subject: "{output.email_5_subject}"
    email_6_sender: "{output.email_6_sender}"
    email_6_subject: "{output.email_6_subject}"
    email_7_sender: "{output.email_7_sender}"
    email_7_subject: "{output.email_7_subject}"
    email_8_sender: "{output.email_8_sender}"
    email_8_subject: "{output.email_8_subject}"
    email_9_sender: "{output.email_9_sender}"
    email_9_subject: "{output.email_9_subject}"
    email_10_sender: "{output.email_10_sender}"
    email_10_subject: "{output.email_10_subject}"
eval:
  source: server_state
  checks:
  - expr: all(state.get_email(eid).is_starred for eid in {target.client_ids})
    desc: All 4 client emails starred
  - expr: all('inbox' in state.get_email(eid).labels for eid in {target.client_ids})
    desc: All client emails still in inbox
  - expr: all('inbox' not in state.get_email(eid).labels for eid in {target.newsletter_ids})
    desc: All 3 newsletter emails archived
  - expr: all(not state.get_email(eid).deleted for eid in {target.newsletter_ids})
    desc: Newsletter emails not deleted
  - expr: all(any(m.forwarded_from_id == eid and '{target.team_lead_email}' in m.to for m in state.sent) for eid in {target.escalation_ids})
    desc: All 3 escalation emails forwarded to team lead
  - expr: state.get_email('{target.boss_email_id}').is_starred
    desc: Boss email starred for follow-up
  - expr: "'inbox' in state.get_email('{target.boss_email_id}').labels"
    desc: Boss email still in inbox
  negative_checks:
  - expr: not any(m.in_reply_to == '{target.boss_email_id}' for m in state.sent)
    desc: Boss email must not be replied to
    penalty: 0.25
  - expr: not any(m.forwarded_from_id == '{target.boss_email_id}' for m in state.sent)
    desc: Boss email must not be forwarded
    penalty: 0.25
  - expr: not state.get_email('{target.urgent_newsletter_id}').is_starred
    desc: URGENT newsletter must not be starred (must be archived)
    penalty: 0.2
  - expr: not any(m.forwarded_from_id == '{target.urgent_newsletter_id}' for m in state.sent)
    desc: URGENT newsletter must not be forwarded
    penalty: 0.15
  - expr: all('inbox' in state.get_email(eid).labels and not state.get_email(eid).is_starred for eid in {target.other_ids})
    desc: Non-rubric emails must remain untouched
    penalty: 0.15
