task_id: gmail_star_email
env_id: gmail
title: Star a Specific Email
instruction_template: Find the email from Alice Chen with subject "Project Update
  — Q1 Milestones" and star it.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
- grounding
start_path: /inbox
seed:
  distractors: 10
  steps:
  - use: star_email
    params: {}
    outputs:
    - target_email_id
  targets:
    target_email_id: '{output.target_email_id}'
eval:
  source: server_state
  checks:
  - expr: state.get_email('{target.target_email_id}').is_starred
    desc: Target email is starred
  negative_checks:
  - expr: sum(1 for e in state.emails if e.is_starred) <= 2
    desc: Did not star too many emails
    penalty: 0.2
