task_id: gmail_reply_simple
env_id: gmail
title: Reply to an Email
instruction_template: 'Find the email from Bob Martinez with subject "Meeting Tomorrow
  at 2pm" and reply with exactly: "I''ll be there. Thanks!"'
difficulty: easy
time_limit_seconds: 120
expected_steps: 8
primary_primitives:
- backtracking
start_path: /inbox
seed:
  distractors: 10
  steps:
  - use: reply_simple
    params: {}
    outputs:
    - target_email_id
    - target_thread_id
  targets:
    target_email_id: '{output.target_email_id}'
    target_thread_id: '{output.target_thread_id}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email was sent
  - expr: any(m.in_reply_to == '{target.target_email_id}' and m.thread_id == '{target.target_thread_id}'
      for m in state.sent)
    desc: The outbound email is a reply in Bob's original thread (correct in_reply_to
      and thread_id)
  - expr: any(m.in_reply_to == '{target.target_email_id}' and m.body.strip() == "I'll
      be there. Thanks!" for m in state.sent)
    desc: Reply body is exactly the required text
  - expr: not any(m.forwarded_from_id is not None for m in state.sent)
    desc: No forwards were sent (reply expected, not forward)
  negative_checks:
  - expr: len(state.sent) == 1
    desc: Must send exactly one email (zero or extras are penalised)
    penalty: 0.2
  - expr: all(len(m.body) <= 200 for m in state.sent if m.in_reply_to == '{target.target_email_id}')
    desc: Reply body must stay under 200 chars for a one-line confirmation (stuffing
      guard)
    penalty: 0.15
secondary_primitives: []
