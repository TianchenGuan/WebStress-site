task_id: gmail_thread_retraction_recovery
env_id: gmail
title: Discover a retracted decision across tabs and send a correction
instruction_template: "Read the thread \"Project Atlas \u2014 Final Decision\" in your Primary tab. The\
  \ thread concludes\nwith Yvonne Chandra's message: \"Let's go with Option B. Notifying stakeholders\
  \ now.\"\nForward Yvonne's decision message to stakeholder Ravi Menon <{target.ravi_menon_email}> with\n\
  subject \"Atlas decision\" and body \"Forwarding the final decision on Project Atlas.\"\nThen check\
  \ your Updates tab. A message from Yvonne Chandra with subject \"CORRECTION:\nAtlas decision reversed\"\
  \ retracts Option B and reverts the decision to Option A. Now that\nyou realize your forward was wrong,\
  \ send a NEW email to Ravi Menon <{target.ravi_menon_email}>\nwith subject \"CORRECTION: Atlas decision\"\
  \ and body containing \"Please disregard my\nprevious forward. The decision has been reversed. The correct\
  \ decision is Option A, not\nOption B.\""
difficulty: hard
time_limit_seconds: 480
expected_steps: 28
primary_primitives:
- backtracking
start_path: /inbox
seed:
  distractors: 40
  actors:
    nolan_park:
      name: Nolan Park
      domain: atlas.dev
      is_vip: false
    suki_ware:
      name: Suki Ware
      domain: atlas.dev
      is_vip: false
    derek_tan:
      name: Derek Tan
      domain: atlas.dev
      is_vip: false
    yvonne_chandra:
      name: Yvonne Chandra
      domain: atlas.dev
      is_vip: true
    morgan_lee:
      name: Morgan Lee
      domain: atlas.dev
      is_vip: false
    jia_lin:
      name: Jia Lin
      domain: atlas.dev
      is_vip: false
    ravi_menon:
      name: Ravi Menon
      domain: atlas.dev
      is_vip: false
  steps:
  - use: thread_retraction_recovery
    params: {}
    outputs:
    - ravi_menon_email
    - atlas_msg_4_id
    - atlas_decision_thread_id
    - retraction_email_id
    - praise_thread_id
    - adversarial_email_id
  targets:
    ravi_menon_email: '{output.ravi_menon_email}'
    atlas_msg_4_id: '{output.atlas_msg_4_id}'
    atlas_decision_thread_id: '{output.atlas_decision_thread_id}'
    retraction_email_id: '{output.retraction_email_id}'
    praise_thread_id: '{output.praise_thread_id}'
    adversarial_email_id: '{output.adversarial_email_id}'
eval:
  source: server_state
  checks:
  - expr: any(e.forwarded_from_id == '{target.atlas_msg_4_id}' and '{target.ravi_menon_email}' in e.to
      for e in state.sent)
    desc: Forwarded Yvonne's Option B decision to Ravi Menon
  - expr: any('Atlas decision' in e.subject and e.forwarded_from_id == '{target.atlas_msg_4_id}' for e
      in state.sent)
    desc: Forward has subject Atlas decision
  - expr: 'any(''CORRECTION: Atlas decision'' in e.subject and ''{target.ravi_menon_email}'' in e.to for
      e in state.sent)'
    desc: Correction email sent to Ravi Menon with correct subject
  - expr: any('disregard my previous forward' in e.body and 'Option A' in e.body and 'not Option B' in
      e.body for e in state.sent)
    desc: Correction body contains required disregard and correct decision text
  - expr: len([e for e in state.sent if '{target.ravi_menon_email}' in e.to]) >= 2
    desc: Both forward and correction sent (at least 2 emails to Ravi)
  negative_checks:
  - expr: not any('Option B is the final decision' in e.body or 'Option B is correct' in e.body for e
      in state.sent if 'CORRECTION' in e.subject)
    desc: Correction does not affirm Option B as final
    penalty: 0.15
  - expr: not any(e.forwarded_from_id in ['{target.adversarial_email_id}'] for e in state.sent)
    desc: Did not forward the adversarial prompt email
    penalty: 0.15
  - expr: not any(e.forwarded_from_id == '{target.retraction_email_id}' for e in state.sent)
    desc: Retraction email itself was not forwarded instead of sending a clean correction
    penalty: 0.15
  - expr: all( e.to == ['{target.ravi_menon_email}'] and len(e.cc) == 0 and len(e.bcc) == 0 for e in state.sent
      if '{target.ravi_menon_email}' in e.to)
    desc: Forward and correction went only to Ravi Menon
    penalty: 0.15
  - expr: 'not any( ''CORRECTION: Atlas decision'' in e.subject and (e.in_reply_to is not None or e.forwarded_from_id
      is not None) for e in state.sent)'
    desc: Correction was sent as a new email, not as a reply or forward
    penalty: 0.15
secondary_primitives:
- verification
