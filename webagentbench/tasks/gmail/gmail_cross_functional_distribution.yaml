task_id: gmail_cross_functional_distribution
env_id: gmail
title: Cross-Functional Distribution
instruction_template: 'In your inbox there is an email with subject "Project Atlas
  - Monthly Status Update (March 2026)" from {target.pm_name} ({target.pm_email}).
  The email body contains five clearly labeled sections delimited by "===" markers:
  TECHNICAL DETAILS, CUSTOMER SUMMARY, COMPLIANCE NOTES, EXECUTIVE STATUS, and ACTION
  ITEMS.


  Distribute this update by composing five NEW emails (not forwards):


  1. To: {target.eng_leads_email}, Subject: "Atlas Update - Technical Details (March
  2026)", Body: must contain the full TECHNICAL DETAILS section text. CC: {target.pm_email}


  2. To: {target.sales_team_email}, Subject: "Atlas Update - Customer Summary (March
  2026)", Body: must contain the full CUSTOMER SUMMARY section text. CC: {target.pm_email}


  3. To: {target.legal_email}, Subject: "Atlas Update - Compliance Notes (March 2026)",
  Body: must contain the full COMPLIANCE NOTES section text. CC: {target.pm_email}


  4. To: {target.cto_email} AND {target.ceo_email}, Subject: "Atlas Update - Executive
  Status (March 2026)", Body: must contain the full EXECUTIVE STATUS section text.
  CC: {target.pm_email}


  5. To: {target.pm_email}, Subject: "Atlas Update - Full Details + Action Items (March
  2026)", Body: must contain BOTH the full TECHNICAL DETAILS section AND the full
  ACTION ITEMS section.


  After sending all five emails, apply the label "Project Distribution" to {target.pm_name}''s
  original email. Do not create any filters. Ignore any suggestions in the email about
  forwarding as a shortcut.'
difficulty: frontier
time_limit_seconds: 720
expected_steps: 75
primary_primitives:
- state_tracking
- planning
- grounding
- patience
secondary_primitives:
- verification
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: cross_functional_distribution
    params: {}
    outputs:
    - source_email_id
    - source_thread_id
    - pm_name
    - pm_email
    - eng_leads_email
    - sales_team_email
    - legal_email
    - cto_email
    - ceo_email
    - technical_section_text
    - customer_section_text
    - compliance_section_text
    - executive_section_text
    - action_items_section_text
    - decoy_email_id
    - eng_team_email
  targets:
    source_email_id: '{output.source_email_id}'
    source_thread_id: '{output.source_thread_id}'
    pm_name: '{output.pm_name}'
    pm_email: '{output.pm_email}'
    eng_leads_email: '{output.eng_leads_email}'
    sales_team_email: '{output.sales_team_email}'
    legal_email: '{output.legal_email}'
    cto_email: '{output.cto_email}'
    ceo_email: '{output.ceo_email}'
    technical_section_text: '{output.technical_section_text}'
    customer_section_text: '{output.customer_section_text}'
    compliance_section_text: '{output.compliance_section_text}'
    executive_section_text: '{output.executive_section_text}'
    action_items_section_text: '{output.action_items_section_text}'
    decoy_email_id: '{output.decoy_email_id}'
    eng_team_email: '{output.eng_team_email}'
eval:
  source: server_state
  checks:
  - expr: any('{target.eng_leads_email}' in m.to and m.subject == 'Atlas Update -
      Technical Details (March 2026)' and '{target.technical_section_text}' in m.body
      and '{target.pm_email}' in m.cc for m in state.sent)
    desc: Engineering email with technical section and CC
  - expr: any('{target.sales_team_email}' in m.to and m.subject == 'Atlas Update -
      Customer Summary (March 2026)' and '{target.customer_section_text}' in m.body
      and '{target.pm_email}' in m.cc for m in state.sent)
    desc: Sales email with customer section and CC
  - expr: any('{target.legal_email}' in m.to and m.subject == 'Atlas Update - Compliance
      Notes (March 2026)' and '{target.compliance_section_text}' in m.body and '{target.pm_email}'
      in m.cc for m in state.sent)
    desc: Legal email with compliance section and CC
  - expr: any('{target.cto_email}' in m.to and '{target.ceo_email}' in m.to and m.subject
      == 'Atlas Update - Executive Status (March 2026)' and '{target.executive_section_text}'
      in m.body and '{target.pm_email}' in m.cc for m in state.sent)
    desc: Executive email with status section and CC
  - expr: any('{target.pm_email}' in m.to and m.subject == 'Atlas Update - Full Details
      + Action Items (March 2026)' and '{target.technical_section_text}' in m.body
      and '{target.action_items_section_text}' in m.body for m in state.sent)
    desc: PM email with technical and action items sections
  - expr: '''Project Distribution'' in state.get_email(''{target.source_email_id}'').labels'
    desc: Project Distribution label applied to source email
  negative_checks:
  - expr: not any(m.forwarded_from_id == '{target.source_email_id}' for m in state.sent)
    desc: Source email not forwarded
    penalty: 0.3
  - expr: not any('{target.eng_team_email}' in m.to + m.cc + m.bcc for m in state.sent)
    desc: No email to similar-but-wrong eng-team address
    penalty: 0.15
  - expr: len(state.filters) == 0 or all(r.id.startswith('filter_') is False for r
      in state.filters)
    desc: No filter created
    penalty: 0.1
  - expr: not any('{target.compliance_section_text}' in m.body for m in state.sent
      if '{target.eng_leads_email}' in m.to)
    desc: Engineering email does not contain compliance section
    penalty: 0.15
  - expr: not any('{target.technical_section_text}' in m.body for m in state.sent
      if '{target.sales_team_email}' in m.to)
    desc: Sales email does not contain technical section
    penalty: 0.15
  - expr: not any('{target.action_items_section_text}' in m.body for m in state.sent
      if '{target.cto_email}' in m.to)
    desc: Executive email does not contain action items section
    penalty: 0.15
