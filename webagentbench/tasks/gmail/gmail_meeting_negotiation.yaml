task_id: gmail_meeting_negotiation
env_id: gmail
title: Meeting Negotiation
instruction_template: Five people have sent you their availability for the {target.meeting_name} meeting. Find all five emails
  and note each person's available times. Then check the venue confirmation email (it may not be in your Primary tab) to see
  which room is available and when. Compose a new email to {target.organizer_email} confirming the one time slot that works
  for all five attendees AND the venue. CC all five attendees. Your email body must mention the confirmed time and the room
  name.
difficulty: hard
time_limit_seconds: 420
expected_steps: 50
primary_primitives:
- state_tracking
- grounding
- planning
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: meeting_negotiation
    params: {}
    outputs:
    - meeting_name
    - organizer_email
    - attendee_emails
    - correct_time
    - room_name
  targets:
    meeting_name: '{output.meeting_name}'
    organizer_email: '{output.organizer_email}'
    attendee_emails: '{output.attendee_emails}'
    correct_time: '{output.correct_time}'
    room_name: '{output.room_name}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email sent
  - expr: 'any(m.to == [''{target.organizer_email}''] and all(addr in m.cc for addr in {target.attendee_emails}) and ''{target.correct_time}''
      in m.body and ''{target.room_name}'' in m.body and m.in_reply_to is None for m in state.sent)

      '
    desc: Single confirmation email sent to organizer with all attendees CC'd, correct time, and room name
  negative_checks:
  - expr: not any(m.in_reply_to is not None for m in state.sent)
    desc: Must compose new, not reply
    penalty: 0.2
  - expr: len(state.sent) <= 2
    desc: No excessive replies sent
    penalty: 0.15
