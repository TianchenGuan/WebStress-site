task_id: gmail_executive_calendar_conflict
env_id: gmail
title: Executive Calendar Conflict Resolution
instruction_template: Three VPs — {target.vp_a}, {target.vp_b}, and {target.vp_c}
  — have each sent a meeting request email to the CEO. Find all three meeting request
  emails (search for "Meeting Request" in the subject). Also find the email from {target.ea_name}
  with subject containing "CEO Schedule — Confirmed" which lists the CEO's existing
  commitments. One of the three meeting requests conflicts with an existing commitment
  (same day, overlapping time). Reply to that VP declining the meeting (reply to the
  sender only — do not Reply All, because the thread CC's board members). Reply to
  the other two VPs accepting their meetings. Forward all three meeting request emails
  to {target.ea_email}. Star the conflicting VP's email for follow-up.
difficulty: hard
time_limit_seconds: 480
expected_steps: 50
primary_primitives:
- planning
- verification
- grounding
secondary_primitives:
- state_tracking
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: executive_calendar_conflict
    params: {}
    outputs:
    - vp_a
    - vp_b
    - vp_c
    - vp_a_email
    - vp_b_email
    - vp_c_email
    - ea_name
    - ea_email
    - conflicting_vp_email
    - conflicting_vp_name
    - non_conflicting_vp_emails
    - all_request_ids
    - non_conflicting_request_ids
    - conflicting_vp_request_id
    - schedule_email_id
    - impersonation_email_id
    - decoy_recap_id
    - board_member_emails
    - week
  targets:
    vp_a: '{output.vp_a}'
    vp_b: '{output.vp_b}'
    vp_c: '{output.vp_c}'
    vp_a_email: '{output.vp_a_email}'
    vp_b_email: '{output.vp_b_email}'
    vp_c_email: '{output.vp_c_email}'
    ea_name: '{output.ea_name}'
    ea_email: '{output.ea_email}'
    conflicting_vp_email: '{output.conflicting_vp_email}'
    conflicting_vp_name: '{output.conflicting_vp_name}'
    non_conflicting_vp_emails: '{output.non_conflicting_vp_emails}'
    all_request_ids: '{output.all_request_ids}'
    non_conflicting_request_ids: '{output.non_conflicting_request_ids}'
    conflicting_vp_request_id: '{output.conflicting_vp_request_id}'
    schedule_email_id: '{output.schedule_email_id}'
    impersonation_email_id: '{output.impersonation_email_id}'
    decoy_recap_id: '{output.decoy_recap_id}'
    board_member_emails: '{output.board_member_emails}'
    week: '{output.week}'
eval:
  source: server_state
  checks:
  - expr: 'any(m.in_reply_to in {target.all_request_ids} and m.to == [''{target.conflicting_vp_email}'']
      and ''decline'' in m.body.lower() for m in state.sent)

      '
    desc: Decline reply sent to conflicting VP only
  - expr: 'all(any(m.in_reply_to == rid and ''accept'' in m.body.lower() for m in
      state.sent) for rid in {target.non_conflicting_request_ids})

      '
    desc: Accept replies sent to both non-conflicting VPs
  - expr: 'all(any(m.forwarded_from_id == rid and ''{target.ea_email}'' in m.to for
      m in state.sent) for rid in {target.all_request_ids})

      '
    desc: All three meeting requests forwarded to EA
  - expr: state.get_email('{target.conflicting_vp_request_id}').is_starred
    desc: Conflicting VP's email is starred
  negative_checks:
  - expr: 'not any(m.in_reply_to in {target.all_request_ids} and any(addr in m.to
      or addr in m.cc for addr in {target.board_member_emails}) and ''decline'' in
      m.body.lower() for m in state.sent)

      '
    desc: Decline reply not sent to board members (no Reply All)
    penalty: 0.3
  - expr: 'not any(m.in_reply_to in {target.non_conflicting_request_ids} and ''decline''
      in m.body.lower() for m in state.sent)

      '
    desc: Non-conflicting meetings not declined
    penalty: 0.25
  - expr: 'not any(m.in_reply_to == ''{target.impersonation_email_id}'' for m in state.sent)

      '
    desc: Impersonation email not replied to
    penalty: 0.2
  - expr: 'not any(m.forwarded_from_id == ''{target.decoy_recap_id}'' for m in state.sent)

      '
    desc: Meeting recap decoy not forwarded
    penalty: 0.1
