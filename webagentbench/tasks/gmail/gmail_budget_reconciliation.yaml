task_id: gmail_budget_reconciliation
env_id: gmail
title: Budget Reconciliation
instruction_template: Three department heads sent you their Q1 budget numbers. {target.dept_a_name}
  sent the {target.dept_a_dept} figures, {target.dept_b_name} sent the {target.dept_b_dept}
  figures, and {target.dept_c_name} sent the {target.dept_c_dept} figures. A fourth
  email from {target.summary_author_name} attempts to summarize all three — but two
  of the numbers are wrong. Read all four emails, identify the errors, and reply to
  {target.summary_author_name}'s email with the two corrections. Reply only to {target.summary_author_name}
  (do not Reply All — the summary is CC'd to the CFO and board). Star the three department
  emails for reference. Create a 'Budget Verified' label and apply it to all four
  budget emails.
difficulty: hard
time_limit_seconds: 420
expected_steps: 42
primary_primitives:
- state_tracking
- grounding
- verification
- planning
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: budget_reconciliation
    params: {}
    outputs:
    - dept_a_name
    - dept_a_dept
    - dept_b_name
    - dept_b_dept
    - dept_c_name
    - dept_c_dept
    - summary_author_name
    - summary_author_email
    - summary_id
    - dept_ids
    - all_budget_ids
    - correct_value_1
    - correct_value_2
    - wrong_values
  targets:
    dept_a_name: '{output.dept_a_name}'
    dept_a_dept: '{output.dept_a_dept}'
    dept_b_name: '{output.dept_b_name}'
    dept_b_dept: '{output.dept_b_dept}'
    dept_c_name: '{output.dept_c_name}'
    dept_c_dept: '{output.dept_c_dept}'
    summary_author_name: '{output.summary_author_name}'
    summary_author_email: '{output.summary_author_email}'
    summary_id: '{output.summary_id}'
    dept_ids: '{output.dept_ids}'
    all_budget_ids: '{output.all_budget_ids}'
    correct_value_1: '{output.correct_value_1}'
    correct_value_2: '{output.correct_value_2}'
    wrong_values: '{output.wrong_values}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) >= 1
    desc: At least one email sent
  - expr: state.sent[-1].to == ['{target.summary_author_email}']
    desc: Replied to summary author only
  - expr: '''{target.correct_value_1}'' in state.sent[-1].body'
    desc: First correction in reply
  - expr: '''{target.correct_value_2}'' in state.sent[-1].body'
    desc: Second correction in reply
  - expr: all(state.get_email(eid).is_starred for eid in {target.dept_ids})
    desc: Department emails starred
  - expr: all('Budget Verified' in state.get_email(eid).labels for eid in {target.all_budget_ids})
    desc: Budget label applied
  - expr: any(m.in_reply_to == '{target.summary_id}' for m in state.sent)
    desc: Reply is threaded
  negative_checks:
  - expr: len(state.sent) == 0 or len(state.sent[-1].to) == 1
    desc: Single recipient (not Reply All)
    penalty: 0.2
