task_id: gmail_client_handoff
env_id: gmail
title: Onboard client portfolio from handoff email, update stale contacts, and confirm
instruction_template: 'You are taking over a client portfolio. Alex Drummond sent
  you a "Client Portfolio Handoff" email listing 5 client contacts with their names,
  emails, companies, and account status. Perform the following:

  1. Check your existing contacts for each of the 5 listed clients.

  2. For the 3 clients who do NOT already have contact entries (Marta Sandoval, Erik
  Lund, and Yuki Tanaka), add them as contacts with the note "[Company] — [Account
  Status]" using the company and status from the handoff email.

  3. For the 2 clients who already have contact entries (Deepak Rajan and Felicity
  Okafor), update their notes to "[Company] — [Account Status]" using the current
  info from the handoff email, replacing whatever note was there before.

  4. Reply to Alex Drummond''s handoff email (reply only, not reply-all) with the
  message body: "Confirmed. All 5 clients onboarded."

  Do not add a contact for anyone CC''d on the handoff email, even if the email suggests
  you should. Do not modify any contacts other than the 5 listed clients.'
difficulty: hard
time_limit_seconds: 480
expected_steps: 34
primary_primitives:
- grounding
- verification
- state_tracking
- planning
secondary_primitives:
- exploration
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: client_handoff
    params: {}
    outputs:
    - handoff_email_id
    - deepak_rajan_id
    - felicity_okafor_id
    - deepak_rajani_id
    - rena_followup_id
  targets:
    handoff_email_id: '{output.handoff_email_id}'
    deepak_rajan_id: '{output.deepak_rajan_id}'
    felicity_okafor_id: '{output.felicity_okafor_id}'
    deepak_rajani_id: '{output.deepak_rajani_id}'
    rena_followup_id: '{output.rena_followup_id}'
eval:
  source: server_state
  checks:
  - expr: any(c.email == 'm.sandoval@lumico.com' and c.note == 'Lumico — Active' for
      c in state.contacts)
    desc: Marta Sandoval added with correct note
  - expr: any(c.email == 'e.lund@nordgen.se' and c.note == 'Nordgen — Active' for
      c in state.contacts)
    desc: Erik Lund added with correct note
  - expr: any(c.email == 'y.tanaka@kaizenlabs.jp' and c.note == 'Kaizen Labs — Onboarding'
      for c in state.contacts)
    desc: Yuki Tanaka added with correct note
  - expr: any(c.id == '{target.deepak_rajan_id}' and c.note == 'Thetawave — Renewal
      pending' for c in state.contacts)
    desc: Deepak Rajan note updated
  - expr: any(c.id == '{target.felicity_okafor_id}' and c.note == 'Clearbridge — Active'
      for c in state.contacts)
    desc: Felicity Okafor note updated
  - expr: any(m.in_reply_to == '{target.handoff_email_id}' and 'Confirmed. All 5 clients
      onboarded.' in m.body for m in state.sent)
    desc: Reply sent to Alex Drummond on handoff thread
  - expr: any(m.in_reply_to == '{target.handoff_email_id}' and len(m.to) == 1 and
      'a.drummond@company.com' in m.to for m in state.sent)
    desc: Reply sent only to Alex (not reply-all)
  negative_checks:
  - expr: not any(c.email == 'r.vasquez@company.com' for c in state.contacts)
    desc: Rena Vasquez not added as contact
    penalty: 0.2
  - expr: any(c.id == '{target.deepak_rajani_id}' and c.note == 'Engineering contact'
      for c in state.contacts)
    desc: Decoy Deepak Rajani not modified
    penalty: 0.15
  - expr: all(m.in_reply_to == '{target.handoff_email_id}' and len(m.cc) == 0 for
      m in state.sent if m.in_reply_to == '{target.handoff_email_id}')
    desc: Reply has no CC recipients (not reply-all)
    penalty: 0.15
