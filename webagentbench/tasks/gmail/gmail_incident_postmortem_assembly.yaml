task_id: gmail_incident_postmortem_assembly
env_id: gmail
title: Security Incident Postmortem Assembly
instruction_template: "A security incident \"INC-2847\" occurred last week. Gather evidence from these\
  \ 5 threads:\n(1) The initial alert from monitoring@acme-security.com with subject containing \"INC-2847\"\
  .\n(2) Investigation update from alice.sec@acme.com with subject \"INC-2847: Initial Analysis\".\n(3)\
  \ Investigation update from bob.infra@acme.com with subject \"INC-2847: Infrastructure Findings\" (NOTE:\
  \ this email contains a forwarded copy of Alice's initial analysis \u2014 use Bob's own text above the\
  \ forwarded section for the remediation action, not the forwarded content).\n(4) Investigation update\
  \ from carol.net@acme.com with subject \"INC-2847: Network Forensics - CORRECTED\" (this supersedes\
  \ Alice's preliminary root cause).\n(5) Resolution confirmation from alice.sec@acme.com with subject\
  \ \"INC-2847: Resolved\".\n\nCompose a new email to {target.postmortem_to} with subject \"{target.postmortem_subject}\"\
  \ and body containing: (a) the incident start time from the initial alert, (b) the corrected root cause\
  \ from Carol's CORRECTED network forensics email (not from Alice's initial analysis which had a preliminary\
  \ and incorrect root cause), (c) the resolution time from the resolution confirmation, and (d) Bob's\
  \ remediation action from his own text (not the forwarded section).\n\nStar all 5 incident anchor emails\
  \ (one per thread). Do not star or act on the resolved INC-2801 email."
difficulty: expert
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- state_tracking
secondary_primitives:
- patience
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: incident_postmortem_assembly
    params: {}
    outputs:
    - postmortem_to
    - postmortem_subject
    - start_time
    - corrected_root_cause
    - wrong_root_cause
    - resolution_time
    - remediation
    - incident_email_ids
    - corrected_email_id
    - decoy_email_id
  targets:
    postmortem_to: '{output.postmortem_to}'
    postmortem_subject: '{output.postmortem_subject}'
    start_time: '{output.start_time}'
    corrected_root_cause: '{output.corrected_root_cause}'
    wrong_root_cause: '{output.wrong_root_cause}'
    resolution_time: '{output.resolution_time}'
    remediation: '{output.remediation}'
    incident_email_ids: '{output.incident_email_ids}'
    corrected_email_id: '{output.corrected_email_id}'
    decoy_email_id: '{output.decoy_email_id}'
eval:
  source: server_state
  checks:
  - expr: any('{target.postmortem_to}' in m.to and '{target.postmortem_subject}' in m.subject for m in
      state.sent)
    desc: Postmortem email sent to leadership
  - expr: any('{target.postmortem_to}' in m.to and '{target.start_time}' in m.body for m in state.sent)
    desc: Postmortem contains incident start time
  - expr: any('{target.postmortem_to}' in m.to and '{target.corrected_root_cause}' in m.body for m in
      state.sent)
    desc: Postmortem contains corrected root cause
  - expr: any('{target.postmortem_to}' in m.to and '{target.resolution_time}' in m.body for m in state.sent)
    desc: Postmortem contains resolution time
  - expr: any('{target.postmortem_to}' in m.to and '{target.remediation}' in m.body for m in state.sent)
    desc: Postmortem contains remediation action
  - expr: all(state.get_email(eid).is_starred for eid in {target.incident_email_ids})
    desc: All 5 incident anchor emails starred
  negative_checks:
  - expr: not any('{target.postmortem_to}' in m.to and '{target.wrong_root_cause}' in m.body for m in
      state.sent)
    desc: Postmortem does not contain wrong root cause
    penalty: 0.3
  - expr: not state.get_email('{target.decoy_email_id}').is_starred
    desc: Decoy INC-2801 email not starred
    penalty: 0.15
  - expr: len(state.deleted) == 0
    desc: No emails moved to trash
    penalty: 0.1
  - expr: sum(1 for e in state.audit_log if e.action == 'gmail.send') == 1
    desc: Exactly one new postmortem email was composed
    penalty: 0.15
  - expr: not any(e.action == 'gmail.email.forward' for e in state.audit_log)
    desc: Incident evidence emails were not forwarded instead of being synthesized
    penalty: 0.15
  - expr: "sum(\n  1 for e in state.audit_log\n  if e.action == 'gmail.email.star' and e.payload.get('is_starred')\
      \ is True\n) == 5"
    desc: Exactly five star actions were used for the incident anchors
    penalty: 0.1
  - expr: "not any(\n  e.action == 'gmail.email.star'\n  and e.payload.get('is_starred') is True\n  and\
      \ e.payload.get('email_id') not in {target.incident_email_ids}\n  for e in state.audit_log\n)"
    desc: No non-incident email was starred during the postmortem workflow
    penalty: 0.15
  - expr: "not any(\n  '{target.postmortem_to}' in m.to\n  and any(addr != '{target.postmortem_to}' for\
      \ addr in m.to + m.cc + m.bcc)\n  for m in state.sent\n)"
    desc: Leadership postmortem email did not include extra recipients
    penalty: 0.1
