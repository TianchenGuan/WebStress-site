task_id: gmail_verify_inbox_clean
env_id: gmail
title: Verify VIP Inbox is Clean (No-Op)
instruction_template: Check your inbox for any unread emails from {target.vip_name}
  ({target.vip_email}) that haven't been replied to. If you find any unreplied emails
  from this sender, reply acknowledging receipt. If all their emails have already
  been answered, no action is needed.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
- grounding
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 10
  actors: {}
  steps:
  - use: verify_inbox_clean
    params: {}
    outputs:
    - vip_name
    - vip_email
    - total_vip_count
    - vip_email_ids
    - decoy_email_ids
    - initial_sent_count
  targets:
    vip_name: '{output.vip_name}'
    vip_email: '{output.vip_email}'
    total_vip_count: '{output.total_vip_count}'
    vip_email_ids: '{output.vip_email_ids}'
    decoy_email_ids: '{output.decoy_email_ids}'
    initial_sent_count: '{output.initial_sent_count}'
canonical_diff:
  invariant:
    - collection: state.emails
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.labels
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  constraints:
    - desc: All target VIP inbox emails were already read
      severity: critical
      expr: >-
        all(
          next(e for e in state.emails if e.id == eid).is_read
          for eid in target['vip_email_ids']
        )
    - desc: All target VIP inbox emails already had replies before the task
      severity: critical
      expr: >-
        len(state.sent) == target['initial_sent_count']
        and all(
          any(sent.in_reply_to == eid for sent in state.sent)
          for eid in target['vip_email_ids']
        )
  named_invariants:
    - name: Agent did not send any new emails
      ref: invariant[2]
      severity: high
    - name: Agent did not delete any emails
      ref: invariant[3]
      severity: high
    - name: Agent did not modify inbox emails
      ref: invariant[0]
      severity: high
