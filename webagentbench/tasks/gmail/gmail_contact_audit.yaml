task_id: gmail_contact_audit
env_id: gmail
title: Contact Audit
instruction_template: |-
  Do a quarterly contact cleanup. Go to your Contacts and review each entry — delete any contacts that have not been in touch for more than 30 days (check the 'Last Contact' column). You may need to page through the list. Do not delete {target.keep_contact_name}. Then search your inbox for emails from {target.new_contact_a_name} and {target.new_contact_b_name}, and add them both as contacts using the information from their emails. Mark {target.new_contact_a_name} as a VIP.
difficulty: medium
time_limit_seconds: 360
expected_steps: 42
primary_primitives:
- exploration
- verification
- memory
- attention
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: contact_audit
    params: {}
    outputs:
    - stale_1_id
    - stale_2_id
    - stale_3_id
    - stale_4_id
    - near_id
    - near_b_id
    - keep_contact_name
    - keep_contact_id
    - new_contact_a_name
    - new_contact_b_name
    - new_a_email
    - new_b_email
  targets:
    stale_1_id: "{output.stale_1_id}"
    stale_2_id: "{output.stale_2_id}"
    stale_3_id: "{output.stale_3_id}"
    stale_4_id: "{output.stale_4_id}"
    near_id: "{output.near_id}"
    near_b_id: "{output.near_b_id}"
    keep_contact_name: "{output.keep_contact_name}"
    keep_contact_id: "{output.keep_contact_id}"
    new_contact_a_name: "{output.new_contact_a_name}"
    new_contact_b_name: "{output.new_contact_b_name}"
    new_a_email: "{output.new_a_email}"
    new_b_email: "{output.new_b_email}"
eval:
  source: server_state
  checks:
  - expr: all(c.id != '{target.stale_1_id}' for c in state.contacts)
    desc: First stale contact deleted
  - expr: all(c.id != '{target.stale_2_id}' for c in state.contacts)
    desc: Second stale contact deleted
  - expr: all(c.id != '{target.stale_3_id}' for c in state.contacts)
    desc: Third stale contact deleted
  - expr: all(c.id != '{target.stale_4_id}' for c in state.contacts)
    desc: Fourth stale contact deleted
  - expr: any(c.email == '{target.new_a_email}' and c.is_vip for c in state.contacts)
    desc: Contact A added as VIP
  - expr: any(c.email == '{target.new_b_email}' for c in state.contacts)
    desc: Contact B added
  negative_checks:
  - expr: any(c.id == '{target.near_id}' for c in state.contacts)
    desc: Near-threshold contact A preserved
    penalty: 0.15
  - expr: any(c.id == '{target.near_b_id}' for c in state.contacts)
    desc: Near-threshold contact B preserved
    penalty: 0.15
  - expr: any(c.id == '{target.keep_contact_id}' for c in state.contacts)
    desc: Named keep-contact preserved
    penalty: 0.2
