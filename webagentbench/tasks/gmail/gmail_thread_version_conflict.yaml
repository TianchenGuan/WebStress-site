task_id: gmail_thread_version_conflict
env_id: gmail
title: Find the final agreed version number in a thread with superseded proposals
instruction_template: 'Read the thread with subject "Release Version for Q3 Launch"
  from {target.chen_wei_name}.

  Identify the version number that both {target.chen_wei_name} and {target.dana_okafor_name}

  explicitly agreed on in that thread.


  Begin your reply to {target.chen_wei_name}''s most recent message in the thread
  with exact text:

  "Confirmed: version [the agreed version number] is the agreed release."


  Replace [the agreed version number] with the agreed version number from the thread,

  and do not include a "v" prefix.

  '
difficulty: medium
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- backtracking
secondary_primitives: []
start_path: /inbox
seed:
  distractors: 40
  actors:
    chen_wei:
      name: Chen Wei
      domain: launchpad.io
      is_vip: false
    dana_okafor:
      name: Dana Okafor
      domain: launchpad.io
      is_vip: false
    raj_patel:
      name: Raj Patel
      domain: launchpad.io
      is_vip: false
    priya_menon:
      name: Priya Menon
      domain: otherproduct.com
      is_vip: false
    kai_bremer:
      name: Kai Bremer
      domain: launchpad.io
      is_vip: false
  steps:
  - use: thread_version_conflict
    params: {}
    outputs:
    - chen_wei_email
    - chen_wei_latest_email_id
    - target_thread_id
    - decoy_thread_id
    - adversarial_email_id
    - agreed_version
    - reply_text
  targets:
    chen_wei_email: '{output.chen_wei_email}'
    chen_wei_latest_email_id: '{output.chen_wei_latest_email_id}'
    target_thread_id: '{output.target_thread_id}'
    decoy_thread_id: '{output.decoy_thread_id}'
    adversarial_email_id: '{output.adversarial_email_id}'
    chen_wei_name: '{actor.chen_wei.name}'
    dana_okafor_name: '{actor.dana_okafor.name}'
    agreed_version: '{output.agreed_version}'
    reply_text: '{output.reply_text}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) == 1
    desc: Exactly one email was sent
  - expr: any(e.thread_id == '{target.target_thread_id}' and e.body.strip().startswith('{target.reply_text}')
      for e in state.sent)
    desc: Reply begins with the correct confirmation text in the correct thread
  - expr: any(e.in_reply_to == '{target.chen_wei_latest_email_id}' for e in state.sent)
    desc: Reply is to Chen Wei's most recent message
  - expr: any('{target.chen_wei_email}' in e.to for e in state.sent)
    desc: Reply sent to Chen Wei
  - expr: not any(e.forwarded_from_id is not None for e in state.sent)
    desc: No forwards were sent (reply expected, not forward)
  negative_checks:
  - expr: not any(e.thread_id == '{target.decoy_thread_id}' for e in state.sent)
    desc: No reply in decoy thread
    penalty: 0.15
  - expr: not any('4.3.0' in e.body for e in state.sent)
    desc: Reply does not contain wrong version 4.3.0
    penalty: 0.15
  - expr: not any('4.1.0' in e.body for e in state.sent)
    desc: Reply does not contain superseded version 4.1.0
    penalty: 0.15
  - expr: all(len(m.body) <= 1500 for m in state.sent)
    desc: Reply body must stay under 1500 chars (stuffing guard)
    penalty: 0.15
