task_id: gmail_vendor_security_questionnaire
env_id: gmail
title: Vendor Security Questionnaire Response
instruction_template: 'CloudVault Inc. (vendor-security@cloudvault.io) sent a security
  questionnaire with 8 numbered questions in an email with subject "Security Questionnaire:
  Acme Corp Onboarding". Note: the vendor''s email has vendor-security@cloudvault.io
  in the CC field and procurement@cloudvault.io in the TO field — reply to this thread
  (which will go to the original sender), do not compose a new email to the CC or
  TO addresses.


  The answers are spread across 6 internal emails:

  - From engineering@acme.com ("Re: CloudVault Questionnaire - Engineering Answers"):
  Q1 (encryption standard), Q2 (key management), Q5 (API authentication — original).

  - From legal@acme.com ("CloudVault Security Responses - Legal"): Q3 (data residency),
  Q6 (breach notification SLA).

  - From compliance@acme.com ("CloudVault Audit Responses"): Q4 (compliance frameworks),
  Q7 (audit frequency).

  - From it-ops@acme.com ("Fwd: Re: CloudVault Questionnaire - IT Answers"): Q8 (backup
  frequency and retention). This email is a forward of a forward — use the outermost
  (most recent) text, not the inner forwarded answer.

  - From engineering@acme.com ("UPDATED: CloudVault Questionnaire - Engineering Answers"):
  updated Q5 answer. This supersedes the original Q5.

  - From compliance@acme.com ("CloudVault Audit Responses — Additional Context"):
  additional context for Q7 but does NOT change the answer.


  Reply to the vendor''s email thread with all 8 answers using the format "Q1: [answer]"
  through "Q8: [answer]". For Q5, use the UPDATED engineering answer, not the original.
  For Q8, use the outermost IT answer.


  CC the following people on the reply (look up their addresses in contacts): Dana
  Park, Frank Osei, Grace Liu.


  After composing the reply, star each of the 6 internal source emails. Then update
  the contact note for each CC''d person: Dana Park: "CloudVault questionnaire — responded
  Q1, Q2, Q5"; Frank Osei: "CloudVault questionnaire — responded Q3, Q6"; Grace Liu:
  "CloudVault questionnaire — responded Q4, Q7".


  Finally, forward the vendor''s original questionnaire email to {target.forward_to}
  with the added note "All 8 answers submitted. See reply thread."'
difficulty: frontier
time_limit_seconds: 720
expected_steps: 80
primary_primitives:
- state_tracking
- patience
- verification
- planning
- exploration
- grounding
secondary_primitives:
- backtracking
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: vendor_security_questionnaire
    params: {}
    outputs:
    - vendor_email_id
    - internal_email_ids
    - decoy_vendor_id
    - decoy_digest_id
    - q1_answer
    - q2_answer
    - q3_answer
    - q4_answer
    - q5_correct
    - q5_wrong
    - q6_answer
    - q7_answer
    - q8_correct
    - q8_wrong
    - cc_addresses
    - wrong_cc
    - forward_to
    - dana_park_email
    - frank_osei_email
    - grace_liu_email
    - dana_note
    - frank_note
    - grace_note
  targets:
    vendor_email_id: '{output.vendor_email_id}'
    internal_email_ids: '{output.internal_email_ids}'
    decoy_vendor_id: '{output.decoy_vendor_id}'
    decoy_digest_id: '{output.decoy_digest_id}'
    q1_answer: '{output.q1_answer}'
    q2_answer: '{output.q2_answer}'
    q3_answer: '{output.q3_answer}'
    q4_answer: '{output.q4_answer}'
    q5_correct: '{output.q5_correct}'
    q5_wrong: '{output.q5_wrong}'
    q6_answer: '{output.q6_answer}'
    q7_answer: '{output.q7_answer}'
    q8_correct: '{output.q8_correct}'
    q8_wrong: '{output.q8_wrong}'
    cc_addresses: '{output.cc_addresses}'
    wrong_cc: '{output.wrong_cc}'
    forward_to: '{output.forward_to}'
    dana_park_email: '{output.dana_park_email}'
    frank_osei_email: '{output.frank_osei_email}'
    grace_liu_email: '{output.grace_liu_email}'
    dana_note: '{output.dana_note}'
    frank_note: '{output.frank_note}'
    grace_note: '{output.grace_note}'
eval:
  source: server_state
  checks:
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' for m in state.sent)
    desc: Reply exists on vendor thread
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q1_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q1 answer (AES-256)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q2_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q2 answer (AWS KMS)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q3_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q3 answer (US-East and EU-West)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q4_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q4 answer (SOC 2 Type II and ISO 27001)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q5_correct}'
      in m.body for m in state.sent)
    desc: Reply contains updated Q5 answer (OAuth 2.0 + mTLS)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q6_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q6 answer (72 hours)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q7_answer}'
      in m.body for m in state.sent)
    desc: Reply contains Q7 answer (semi-annually)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q8_correct}'
      in m.body for m in state.sent)
    desc: Reply contains correct Q8 answer (daily incremental)
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.dana_park_email}'
      in m.cc for m in state.sent)
    desc: Reply CCs Dana Park
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.frank_osei_email}'
      in m.cc for m in state.sent)
    desc: Reply CCs Frank Osei
  - expr: any(m.in_reply_to == '{target.vendor_email_id}' and '{target.grace_liu_email}'
      in m.cc for m in state.sent)
    desc: Reply CCs Grace Liu
  - expr: all(state.get_email(eid).is_starred for eid in {target.internal_email_ids})
    desc: All 6 internal source emails starred
  - expr: any(c.email == '{target.dana_park_email}' and c.note == '{target.dana_note}'
      for c in state.contacts)
    desc: Dana Park contact note updated
  - expr: any(c.email == '{target.frank_osei_email}' and c.note == '{target.frank_note}'
      for c in state.contacts)
    desc: Frank Osei contact note updated
  - expr: any(c.email == '{target.grace_liu_email}' and c.note == '{target.grace_note}'
      for c in state.contacts)
    desc: Grace Liu contact note updated
  - expr: any(m.forwarded_from_id == '{target.vendor_email_id}' and '{target.forward_to}'
      in m.to for m in state.sent)
    desc: Vendor questionnaire forwarded to coordinator
  negative_checks:
  - expr: not any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q5_wrong}'
      in m.body for m in state.sent)
    desc: Reply does not contain outdated Q5 answer (API keys)
    penalty: 0.2
  - expr: not any(m.in_reply_to == '{target.vendor_email_id}' and '{target.q8_wrong}'
      in m.body for m in state.sent)
    desc: Reply does not contain outdated Q8 answer (30-day retention)
    penalty: 0.2
  - expr: not state.get_email('{target.decoy_vendor_id}').is_starred
    desc: Decoy vendor email not starred
    penalty: 0.1
  - expr: not state.get_email('{target.decoy_digest_id}').is_starred
    desc: Decoy compliance digest not starred
    penalty: 0.1
  - expr: not any(m.in_reply_to == '{target.vendor_email_id}' and '{target.wrong_cc}'
      in m.cc for m in state.sent)
    desc: Wrong Grace (Lin vs Liu) not CC'd
    penalty: 0.15
