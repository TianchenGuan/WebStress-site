task_id: gmail_priority_escalation
env_id: gmail
title: Priority Escalation
instruction_template: Find the oldest unread email from each of your VIP contacts (look for emails with the 'VIP' label).
  Mark each one as starred and reply with the exact phrase '{target.status_phrase}'. Then create a filter that automatically
  stars future mail from {target.future_vip_email}.
difficulty: hard
time_limit_seconds: 360
expected_steps: 35
primary_primitives:
- grounding
- planning
- verification
- exploration
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: priority_escalation
    params: {}
    outputs:
    - vip_count
    - vip_email_ids
    - status_phrase
    - future_vip_email
  targets:
    vip_count: '{output.vip_count}'
    vip_email_ids: '{output.vip_email_ids}'
    status_phrase: '{output.status_phrase}'
    future_vip_email: '{output.future_vip_email}'
eval:
  source: server_state
  checks:
  - expr: all(state.get_email(email_id) is not None and state.get_email(email_id).is_read and state.get_email(email_id).is_starred
      for email_id in {target.vip_email_ids})
    desc: All target VIP emails were read and starred
  - expr: len([message for message in state.sent if message.in_reply_to in {target.vip_email_ids} and '{target.status_phrase}'
      in message.body]) == {target.vip_count}
    desc: Each VIP email received the required reply
  - expr: any(rule.star and '{target.future_vip_email}' in rule.from_addresses for rule in state.filters)
    desc: Future VIP filter automatically stars matching messages
  - expr: >-
      len([m for m in state.sent
      if m.in_reply_to in {target.vip_email_ids}]) == {target.vip_count}
    desc: Reply count matches the number of VIP contacts (cardinality check)
  negative_checks:
  - expr: not any(message.in_reply_to not in {target.vip_email_ids} and '{target.status_phrase}' in message.body for message
      in state.sent)
    desc: Status phrase was not sent on unrelated replies
    penalty: 0.25
  - expr: len(state.sent) <= 4
    desc: No excessive emails sent
    penalty: 0.15
  - expr: len(state.deleted) == 0
    desc: No emails moved to trash
    penalty: 0.1
