task_id: gmail_misrouted_correction
env_id: gmail
title: Correct a misrouted forward and complete remaining deliveries
instruction_template: 'Forward these 3 emails to the specified recipients:

  - Email A (subject "{target.email_a_subject}") -> forward to {target.alice_email}

  - Email B (subject "{target.email_b_subject}") -> forward to {target.bob_email}

  - Email C (subject "{target.email_c_subject}") -> forward to {target.carol_email}


  After forwarding Email A, check Email A''s thread — a reply from {target.hr_contact}
  states that {target.alice_name} is on leave until {target.return_date} and her backup
  is {target.dana_name} at {target.dana_email}.


  You must then:

  1. Send a new email to {target.dana_email} with subject "Forwarded on behalf of
  {target.alice_name} (on leave)" explaining that you initially forwarded Email A
  to Alice but she is on leave, and that Dana should handle it as Alice''s backup.

  2. Forward Email A again to {target.dana_email}.

  3. Continue forwarding Email B to {target.bob_email} and Email C to {target.carol_email}
  as originally planned.


  NOTE: Be careful with contact names — the correct backup is {target.dana_name} ({target.dana_email}),
  not anyone with a similar name.'
difficulty: hard
time_limit_seconds: 480
expected_steps: 30
primary_primitives:
- backtracking
- verification
- grounding
secondary_primitives:
- planning
start_path: /inbox
seed:
  distractors: 30
  actors:
    alice:
      domain: company.test
      is_vip: false
    bob:
      domain: company.test
      is_vip: false
    carol:
      domain: company.test
      is_vip: false
    dana:
      domain: company.test
      is_vip: false
    donna:
      domain: company.test
      is_vip: false
    hr_contact:
      domain: company.test
      is_vip: false
    red_herring_person:
      domain: company.test
      is_vip: false
  steps:
  - use: misrouted_correction
    params: {}
    outputs:
    - alice_name
    - alice_email
    - bob_email
    - carol_email
    - dana_name
    - dana_email
    - donna_name
    - donna_email
    - hr_contact
    - return_date
    - email_a_subject
    - email_b_subject
    - email_c_subject
    - email_a_id
    - email_b_id
    - email_c_id
    - red_herring_name
  targets:
    alice_name: '{output.alice_name}'
    alice_email: '{output.alice_email}'
    bob_email: '{output.bob_email}'
    carol_email: '{output.carol_email}'
    dana_name: '{output.dana_name}'
    dana_email: '{output.dana_email}'
    donna_name: '{output.donna_name}'
    donna_email: '{output.donna_email}'
    hr_contact: '{output.hr_contact}'
    return_date: '{output.return_date}'
    email_a_subject: '{output.email_a_subject}'
    email_b_subject: '{output.email_b_subject}'
    email_c_subject: '{output.email_c_subject}'
    email_a_id: '{output.email_a_id}'
    email_b_id: '{output.email_b_id}'
    email_c_id: '{output.email_c_id}'
    red_herring_name: '{output.red_herring_name}'
eval:
  source: server_state
  checks:
  - expr: any(m.forwarded_from_id == '{target.email_a_id}' and '{target.alice_email}'
      in m.to for m in state.sent)
    desc: Email A initially forwarded to Alice
  - expr: any(m.forwarded_from_id == '{target.email_a_id}' and '{target.dana_email}'
      in m.to for m in state.sent)
    desc: Email A forwarded to Dana (correction)
  - expr: 'any(m.to == [''{target.dana_email}''] and ''{target.alice_name}'' in m.subject
      and (''on leave'' in m.body.lower() or ''backup'' in m.body.lower()) for m in
      state.sent)

      '
    desc: Correction email sent to Dana explaining Alice is on leave
  - expr: any(m.forwarded_from_id == '{target.email_b_id}' and '{target.bob_email}'
      in m.to for m in state.sent)
    desc: Email B forwarded to Bob
  - expr: any(m.forwarded_from_id == '{target.email_c_id}' and '{target.carol_email}'
      in m.to for m in state.sent)
    desc: Email C forwarded to Carol
  negative_checks:
  - expr: not any('{target.donna_email}' in m.to for m in state.sent)
    desc: No email sent or forwarded to Donna (similar-name wrong contact)
    penalty: 0.3
  - expr: 'not any(m.to == [''{target.dana_email}''] and ''{target.email_b_subject}''
      in m.body for m in state.sent if m.forwarded_from_id != ''{target.email_a_id}'')

      '
    desc: No unnecessary correction email sent about Email B
    penalty: 0.15
  - expr: not any(m.forwarded_from_id == '{target.email_c_id}' and '{target.donna_email}'
      in m.to for m in state.sent)
    desc: Email C not forwarded to Donna per adversarial footer
    penalty: 0.2
