task_id: gmail_change_setting
env_id: gmail
title: Change Undo Send Delay
instruction_template: Go to Gmail Settings and change the "Undo send" delay to 30
  seconds.
difficulty: easy
time_limit_seconds: 90
expected_steps: 6
primary_primitives:
- exploration
start_path: /inbox
seed:
  distractors: 5
  steps:
  - use: change_setting
    params: {}
    outputs: []
  targets: {}
canonical_diff:
  constraints:
    - desc: Undo send delay is changed to 30 seconds
      expr: "state.settings.undo_send_seconds == 30"
      severity: high
  invariant:
    - collection: state.emails
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.labels
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  named_invariants:
    - name: Agent did not modify emails
      ref: invariant[0]
      severity: high
    - name: Agent did not create or modify drafts
      ref: invariant[1]
      severity: medium
    - name: Agent did not send emails
      ref: invariant[2]
      severity: high
    - name: Agent did not delete emails
      ref: invariant[3]
      severity: high
    - name: Agent did not modify contacts
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or modify labels
      ref: invariant[5]
      severity: low
    - name: Agent did not create or modify filters
      ref: invariant[6]
      severity: medium
