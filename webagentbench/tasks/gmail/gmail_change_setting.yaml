task_id: gmail_change_setting
env_id: gmail
title: Change Undo Send Delay
instruction_template: Go to Gmail Settings and change the "Undo send" delay to 30
  seconds.
difficulty: easy
time_limit_seconds: 90
expected_steps: 6
primary_primitives:
- exploration
start_path: /inbox
seed:
  distractors: 5
  steps:
  - use: change_setting
    params: {}
    outputs: []
  targets: {}
canonical_diff:
  update:
  - entity: settings
    desc: Undo send delay changed to 30 seconds
    where:
      id: { any: true }
    changes:
      undo_send_seconds:
        eq: 30
  invariant:
  - collection: state.emails
    preserve: ALL
  - collection: state.drafts
    preserve: ALL
  - collection: state.sent
    preserve: ALL
  - collection: state.deleted
    preserve: ALL
  - collection: state.contacts
    preserve: ALL
  - collection: state.labels
    preserve: ALL
  - collection: state.filters
    preserve: ALL
  constraints:
  - desc: Agent did not change unrelated settings
    severity: critical
    expr: >-
      state.settings.signature == initial.settings.signature
      and state.settings.forwarding_address == initial.settings.forwarding_address
      and state.settings.display_density == initial.settings.display_density
      and state.settings.vacation_responder_enabled == initial.settings.vacation_responder_enabled
      and state.settings.vacation_responder_message == initial.settings.vacation_responder_message
      and state.settings.auto_advance == initial.settings.auto_advance
      and state.settings.language == initial.settings.language
      and state.settings.input_tools_enabled == initial.settings.input_tools_enabled
      and state.settings.right_to_left == initial.settings.right_to_left
      and state.settings.max_page_size == initial.settings.max_page_size
      and state.settings.default_reply_behavior == initial.settings.default_reply_behavior
      and state.settings.hover_actions_enabled == initial.settings.hover_actions_enabled
      and state.settings.send_and_archive == initial.settings.send_and_archive
      and state.settings.default_text_style == initial.settings.default_text_style
  named_invariants:
  - name: Agent did not modify emails
    ref: invariant[0]
    severity: high
  - name: Agent did not create or modify drafts
    ref: invariant[1]
    severity: medium
  - name: Agent did not send emails
    ref: invariant[2]
    severity: high
  - name: Agent did not delete emails
    ref: invariant[3]
    severity: high
  - name: Agent did not modify contacts
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or modify labels
    ref: invariant[5]
    severity: low
  - name: Agent did not create or modify filters
    ref: invariant[6]
    severity: medium
