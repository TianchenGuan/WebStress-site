task_id: gmail_change_setting
env_id: gmail
title: Change Undo Send Delay
instruction_template: Go to Gmail Settings and change the "Undo send" delay to 30 seconds.
difficulty: easy
time_limit_seconds: 90
expected_steps: 6
primary_primitives:
- exploration
- verification
start_path: /inbox
seed:
  distractors: 5
  steps:
  - use: change_setting
    params: {}
    outputs: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: state.settings.undo_send_seconds == 30
    desc: Undo send delay is 30 seconds
  negative_checks:
  - expr: len(state.sent) == 0
    desc: No emails sent when none required
    penalty: 0.15
  - expr: len(state.deleted) == 0
    desc: No emails moved to trash
    penalty: 0.15
