task_id: gmail_data_compilation
env_id: gmail
title: Data Compilation
instruction_template: The CFO asked you to compile Q1 numbers. Three department heads — {target.dept_a_name}, {target.dept_b_name},
  and {target.dept_c_name} — each sent an email with their department's quarterly figures. Find all three emails (they may
  be in different inbox tabs or require scrolling). Extract the budget number from each and compose a new email to {target.exec_email}
  with a subject line 'Q1 Budget Summary'. List all three numbers in the body, labeled by department. CC all three department
  heads.
difficulty: medium
time_limit_seconds: 360
expected_steps: 40
primary_primitives:
- state_tracking
- grounding
- exploration
- planning
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: data_compilation
    params: {}
    outputs:
    - exec_email
    - dept_emails
    - dept_a_name
    - dept_b_name
    - dept_c_name
    - dept_a_dept
    - dept_b_dept
    - dept_c_dept
    - number_a
    - number_b
    - number_c
    - wrong_numbers
  targets:
    exec_email: '{output.exec_email}'
    dept_emails: '{output.dept_emails}'
    dept_a_name: '{output.dept_a_name}'
    dept_b_name: '{output.dept_b_name}'
    dept_c_name: '{output.dept_c_name}'
    dept_a_dept: '{output.dept_a_dept}'
    dept_b_dept: '{output.dept_b_dept}'
    dept_c_dept: '{output.dept_c_dept}'
    number_a: '{output.number_a}'
    number_b: '{output.number_b}'
    number_c: '{output.number_c}'
    wrong_numbers: '{output.wrong_numbers}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) >= 1
    desc: At least one email sent
  - expr: 'any(''Q1 Budget Summary'' in m.subject and m.to == [''{target.exec_email}''] and all(addr in m.cc for addr in {target.dept_emails})
      and ''{target.number_a}'' in m.body and ''{target.number_b}'' in m.body and ''{target.number_c}'' in m.body and ''{target.dept_a_dept}''
      in m.body and ''{target.dept_b_dept}'' in m.body and ''{target.dept_c_dept}'' in m.body for m in state.sent)

      '
    desc: Single summary email sent to exec with all CCs, department names, and numbers
  negative_checks:
  - expr: 'not any(''Q1 Budget Summary'' in m.subject and m.to == [''{target.exec_email}''] and any(n in m.body for n in {target.wrong_numbers})
      for m in state.sent)

      '
    desc: Summary email does not include decoy numbers
    penalty: 0.2
  - expr: len(state.sent) <= 2
    desc: No excessive emails sent
    penalty: 0.15
