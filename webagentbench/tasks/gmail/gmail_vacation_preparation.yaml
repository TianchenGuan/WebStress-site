task_id: gmail_vacation_preparation
env_id: gmail
title: Vacation Preparation
instruction_template: 'Prepare for your vacation. First, go to Settings and: enable
  the vacation responder with the message ''{target.vacation_message}'', update your
  signature to include ''{target.ooo_note}'', and change undo send to 30 seconds.
  Then create a filter that forwards emails from {target.boss_email} to {target.backup_email}
  and stars them. Go back to your inbox and reply to three pending emails: reply to
  {target.pending_a_sender} about the vendor proposal, reply to {target.pending_b_sender}
  about the timeline (Reply only — the thread includes others), and reply to {target.pending_c_sender}
  confirming attendance. Star the two emails you need to follow up on when you return,
  and create a ''Return Attention'' label for them.'
difficulty: expert
time_limit_seconds: 480
expected_steps: 60
primary_primitives:
- planning
- state_tracking
- grounding
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: vacation_preparation
    params: {}
    outputs:
    - vacation_message
    - ooo_note
    - boss_email
    - backup_email
    - pending_a_sender
    - pending_a_id
    - pending_b_sender
    - pending_b_id
    - pending_c_sender
    - pending_c_id
    - return_ids
  targets:
    vacation_message: '{output.vacation_message}'
    ooo_note: '{output.ooo_note}'
    boss_email: '{output.boss_email}'
    backup_email: '{output.backup_email}'
    pending_a_sender: '{output.pending_a_sender}'
    pending_a_id: '{output.pending_a_id}'
    pending_b_sender: '{output.pending_b_sender}'
    pending_b_id: '{output.pending_b_id}'
    pending_c_sender: '{output.pending_c_sender}'
    pending_c_id: '{output.pending_c_id}'
    return_ids: '{output.return_ids}'
eval:
  source: server_state
  checks:
  - expr: state.settings.vacation_responder_enabled
    desc: Vacation responder enabled
  - expr: '''{target.vacation_message}'' in state.settings.vacation_responder_message'
    desc: Vacation message set correctly
  - expr: '''{target.ooo_note}'' in state.settings.signature'
    desc: Signature updated with OOO note
  - expr: state.settings.undo_send_seconds == 30
    desc: Undo send set to 30 seconds
  - expr: any(r.forward_to == '{target.backup_email}' and r.star and '{target.boss_email}'
      in r.from_addresses for r in state.filters)
    desc: Boss email filter created with forward and star
  - expr: any(m.in_reply_to == '{target.pending_a_id}' for m in state.sent)
    desc: Vendor proposal replied to
  - expr: any(m.in_reply_to == '{target.pending_b_id}' for m in state.sent)
    desc: Timeline email replied to
  - expr: any(m.in_reply_to == '{target.pending_c_id}' for m in state.sent)
    desc: Attendance confirmation replied to
  - expr: all(state.get_email(eid).is_starred for eid in {target.return_ids})
    desc: Return emails starred
  - expr: all('Return Attention' in state.get_email(eid).labels for eid in {target.return_ids})
    desc: Return Attention label applied to return emails
  negative_checks:
  - expr: all(len(m.cc) == 0 for m in state.sent if m.in_reply_to == '{target.pending_b_id}')
    desc: Timeline reply was not Reply All
    penalty: 0.15
