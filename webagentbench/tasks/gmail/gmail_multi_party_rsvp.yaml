task_id: gmail_multi_party_rsvp
env_id: gmail
title: Multi-Party RSVP
instruction_template: 'You are organizing a team lunch. Your original email (subject
  "Team Lunch — Date Poll") lists three proposed dates: April 4, April 11, April 18.
  It also names 5 required attendees: {target.marcus_name}, {target.sofia_name}, {target.theo_name},
  {target.elena_name}, and {target.nina_name}. Three others ({target.jordan_name},
  {target.miles_name}, {target.priya_name}) are optional. Responses arrived across
  4 threads. Read every response to find the one date where all 5 required attendees
  can attend. Note: {target.sofia_name} initially replied "April 11 works" but sent
  a correction later in the same thread saying "Sorry, April 11 conflict came up —
  only April 4 works for me now." Collect all dietary restrictions mentioned in any
  response. Compose a new email to team.lunch@ops.thornton.com with subject "Team Lunch Confirmed"
  containing the confirmed date as "Date: April 4" and a "Dietary notes:" section
  listing each person''s restriction as ''{name}: {restriction}'' on separate lines.
  After sending, star the most recent email in each of the 4 RSVP threads and archive
  the original poll email.'
difficulty: expert
time_limit_seconds: 600
expected_steps: 52
primary_primitives:
- patience
- state_tracking
- planning
- exploration
secondary_primitives:
- grounding
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: multi_party_rsvp
    params: {}
    outputs:
    - marcus_name
    - sofia_name
    - theo_name
    - elena_name
    - nina_name
    - jordan_name
    - miles_name
    - priya_name
    - date_poll_email_id
    - rsvp_thread_1_latest_email_id
    - rsvp_thread_2_latest_email_id
    - rsvp_thread_3_latest_email_id
    - rsvp_thread_4_latest_email_id
  targets:
    marcus_name: '{output.marcus_name}'
    sofia_name: '{output.sofia_name}'
    theo_name: '{output.theo_name}'
    elena_name: '{output.elena_name}'
    nina_name: '{output.nina_name}'
    jordan_name: '{output.jordan_name}'
    miles_name: '{output.miles_name}'
    priya_name: '{output.priya_name}'
    date_poll_email_id: '{output.date_poll_email_id}'
    rsvp_thread_1_latest_email_id: '{output.rsvp_thread_1_latest_email_id}'
    rsvp_thread_2_latest_email_id: '{output.rsvp_thread_2_latest_email_id}'
    rsvp_thread_3_latest_email_id: '{output.rsvp_thread_3_latest_email_id}'
    rsvp_thread_4_latest_email_id: '{output.rsvp_thread_4_latest_email_id}'
eval:
  source: server_state
  checks:
  - expr: len(state.sent) >= 1
    desc: At least one email sent
  - expr: any('team.lunch@ops.thornton.com' in m.to for m in state.sent)
    desc: Email sent to team lunch address
  - expr: any(m.subject == 'Team Lunch Confirmed' for m in state.sent)
    desc: Correct subject line
  - expr: 'any(''Date: April 4'' in m.body for m in state.sent)'
    desc: Confirmed date is April 4
  - expr: 'any(''{target.marcus_name}: vegetarian'' in m.body for m in state.sent)'
    desc: Marcus dietary noted
  - expr: 'any(''{target.elena_name}: gluten-free'' in m.body for m in state.sent)'
    desc: Elena dietary noted
  - expr: 'any(''{target.priya_name}: nut allergy'' in m.body for m in state.sent)'
    desc: Priya dietary noted
  - expr: state.get_email('{target.rsvp_thread_1_latest_email_id}').is_starred
    desc: RSVP thread 1 latest email starred
  - expr: state.get_email('{target.rsvp_thread_2_latest_email_id}').is_starred
    desc: RSVP thread 2 latest email starred
  - expr: state.get_email('{target.rsvp_thread_3_latest_email_id}').is_starred
    desc: RSVP thread 3 latest email starred
  - expr: state.get_email('{target.rsvp_thread_4_latest_email_id}').is_starred
    desc: RSVP thread 4 latest email starred
  - expr: state.get_email('{target.date_poll_email_id}').archived
    desc: Original poll email archived
  negative_checks:
  - expr: 'not any(''Date: April 11'' in m.body for m in state.sent)'
    desc: Did not confirm April 11
    penalty: 0.25
  - expr: 'not any(''Date: April 18'' in m.body for m in state.sent)'
    desc: Did not confirm April 18
    penalty: 0.25
