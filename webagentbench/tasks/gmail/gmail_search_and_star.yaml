task_id: gmail_search_and_star
env_id: gmail
title: Find Budget Email and Star It
instruction_template: Find the email about "Q4 Budget Summary" from the Finance Team in your inbox and star it.
difficulty: easy
time_limit_seconds: 120
expected_steps: 8
primary_primitives:
- exploration
- grounding
start_path: /inbox
seed:
  distractors: 10
  steps:
  - use: search_and_star
    params: {}
    outputs:
    - target_email_id
  targets:
    target_email_id: '{output.target_email_id}'
eval:
  source: server_state
  checks:
  - expr: state.get_email('{target.target_email_id}').is_starred
    desc: Budget email is starred
  - expr: >-
      'Q4 Budget Summary' in state.get_email('{target.target_email_id}').subject
    desc: Starred email has the correct subject (identity check)
  negative_checks:
  - expr: sum(1 for e in state.emails if e.is_starred) <= 2
    desc: No more than expected emails starred
    penalty: 0.2
  - expr: len(state.deleted) == 0
    desc: No emails moved to trash
    penalty: 0.15
