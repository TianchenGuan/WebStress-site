task_id: gmail_access_review_audit
env_id: gmail
title: Departed Employee Access Audit
instruction_template: 'IT sent an email from it-admin@acme.com with subject "Quarterly
  Access Review: Project Athena" listing 6 accounts with access to Project Athena.
  HR sent an email from hr-ops@acme.com with subject "Personnel Changes - Q3" listing
  departed employees and role changes. Cross-reference the IT list against the HR
  email to identify which of the 6 accounts belong to departed
  employees. Compose a new email to {target.compose_to} with subject "{target.compose_subject}"
  and body listing exactly the usernames of departed employees who still have Project
  Athena access. Do not request removal for employees who changed roles but did not
  depart. Star both the IT email and the HR email. Archive both emails after starring
  them.'
difficulty: hard
time_limit_seconds: 480
expected_steps: 40
primary_primitives:
- grounding
secondary_primitives:
- state_tracking
start_path: /inbox
seed:
  distractors: 40
  actors: {}
  steps:
  - use: access_review_audit
    params: {}
    outputs:
    - it_email_id
    - hr_email_id
    - gossip_email_id
    - departed_usernames
    - decoy_username
    - compose_to
    - compose_subject
  targets:
    it_email_id: '{output.it_email_id}'
    hr_email_id: '{output.hr_email_id}'
    gossip_email_id: '{output.gossip_email_id}'
    departed_usernames: '{output.departed_usernames}'
    decoy_username: '{output.decoy_username}'
    compose_to: '{output.compose_to}'
    compose_subject: '{output.compose_subject}'
canonical_diff:
  create:
    - entity: sent
      desc: Compose access removal email listing departed employee usernames
      count: 1
      properties:
        to:
          expr: "x == [target['compose_to']]"
        cc:
          eq: []
        bcc:
          eq: []
        subject:
          expr: "x == target['compose_subject']"
        body:
          expr: "all(u in x for u in target['departed_usernames']) and target['decoy_username'] not in x"
        in_reply_to:
          eq: null
        forwarded_from_id:
          eq: null
  update:
    - entity: emails
      desc: Star and archive the IT access review email
      where:
        id:
          expr: "x == target['it_email_id']"
      changes:
        is_starred:
          eq: true
        archived:
          eq: true
    - entity: emails
      desc: Star and archive the HR personnel changes email
      where:
        id:
          expr: "x == target['hr_email_id']"
      changes:
        is_starred:
          eq: true
        archived:
          eq: true
  invariant:
    - collection: state.emails
      filter: "a.id not in [target['it_email_id'], target['hr_email_id']]"
      preserve: ALL
    - collection: state.drafts
      preserve: ALL
    - collection: state.sent
      filter: "True"
      preserve: ALL
    - collection: state.deleted
      preserve: ALL
    - collection: state.contacts
      preserve: ALL
    - collection: state.labels
      preserve: ALL
    - collection: state.filters
      preserve: ALL
  named_invariants:
    - name: Agent sent the access removal email listing departed usernames
      ref: create[0]
      severity: high
    - name: Agent starred and archived the IT email
      ref: update[0]
      severity: high
    - name: Agent starred and archived the HR email
      ref: update[1]
      severity: high
    - name: Agent did not modify other emails
      ref: invariant[0]
      severity: high
