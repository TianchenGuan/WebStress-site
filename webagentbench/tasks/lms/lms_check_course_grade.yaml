task_id: lms_check_course_grade
env_id: lms
title: Check Overall Course Grade
instruction_template: >-
  Navigate to the grades page for {target.course_code}. If your weighted grade
  is below 80%, submit the next unsubmitted homework assignment with file
  'catch_up.pdf'. If your weighted grade is 80% or above, mark the course's
  latest announcement as read to confirm you have reviewed your standing.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
        missing_count: 1
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - grade_below_80
        - unsubmitted_hw_id
    - use: announcements_feed
      params:
        count: 3
        unread_count: 1
      outputs:
        - announcement_ids
        - latest_announcement_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    grade_below_80: '{output.grade_below_80}'
    unsubmitted_hw_id: '{output.unsubmitted_hw_id}'
    latest_announcement_id: '{output.latest_announcement_id}'

canonical_diff:
  oneof:
    - constraints:
        - desc: Weighted grade is below 80%
          expr: "target['grade_below_80'] == 'true'"
          severity: critical
      update:
        - entity: Assignment
          desc: Submit the next unsubmitted homework with catch_up.pdf
          where:
            id:
              expr: "x == target['unsubmitted_hw_id']"
          changes:
            submission_status:
              in:
                - submitted
                - late
            file_name:
              eq: catch_up.pdf
            attempt_count:
              eq: 1
            submitted_at:
              expr: "x >= session_start"
      invariant:
        - collection: state.assignments
          filter: "a.id != target['unsubmitted_hw_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.announcements
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
      named_invariants:
        - name: Agent submitted the catch-up homework
          ref: update[0]
          severity: high
        - name: Agent did not modify other assignments
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify modules
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[4]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[5]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[6]
          severity: medium
        - name: Agent did not modify announcements
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium
    - constraints:
        - desc: Weighted grade is 80% or above
          expr: "target['grade_below_80'] == 'false'"
          severity: critical
      update:
        - entity: Announcement
          desc: Mark the latest announcement as read after checking course standing
          where:
            id:
              expr: "x == target['latest_announcement_id']"
          changes:
            is_read:
              eq: true
      invariant:
        - collection: state.announcements
          filter: "a.id != target['latest_announcement_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.assignments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
      named_invariants:
        - name: Agent marked the latest announcement as read
          ref: update[0]
          severity: high
        - name: Agent did not modify other announcements
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify assignments
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify modules
          ref: invariant[4]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[5]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[6]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.grade_below_80}' == 'true'
         and state.get_assignment('{target.unsubmitted_hw_id}') is not None
         and state.get_assignment('{target.unsubmitted_hw_id}').submission_status in ('submitted', 'late')
         and state.get_assignment('{target.unsubmitted_hw_id}').file_name == 'catch_up.pdf')
        or ('{target.grade_below_80}' == 'false'
            and state.get_announcement('{target.latest_announcement_id}') is not None
            and state.get_announcement('{target.latest_announcement_id}').is_read == True))
      desc: >-
        Submit catch_up.pdf for next unsubmitted homework if grade < 80%,
        or mark latest announcement as read if grade >= 80%
  negative_checks:
    - expr: >-
        '{target.grade_below_80}' != 'false'
        or state.get_assignment('{target.unsubmitted_hw_id}') is None
        or state.get_assignment('{target.unsubmitted_hw_id}').file_name != 'catch_up.pdf'
      desc: Did not submit when grade was 80% or above (wrong branch)
      penalty: 0.3
    - expr: >-
        '{target.grade_below_80}' != 'true'
        or state.get_announcement('{target.latest_announcement_id}') is None
        or state.get_announcement('{target.latest_announcement_id}').is_read != True
      desc: Did not mark announcement read when grade was below 80% (wrong branch)
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        state.get_enrollment_for_course('{target.target_course_id}') is not None
        and state.get_enrollment_for_course('{target.target_course_id}').status == 'enrolled'
      desc: Target course (target_course_id) enrollment remains active
      penalty: 0.2
