task_id: lms_drop_course
env_id: lms
title: Drop a Course Before Deadline
instruction_template: >-
  Drop the course {target.course_code} before the drop deadline.
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
        - target_enrollment_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    target_enrollment_id: '{output.target_enrollment_id}'

canonical_diff:
  update:
    - entity: Enrollment
      desc: Drop the specified course enrollment
      where:
        id:
          expr: "x == target['target_enrollment_id']"
      changes:
        status: {eq: dropped}
  invariant:
    - collection: state.enrollments
      filter: "a.id != target['target_enrollment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not alter other enrollments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify assignments
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_enrollment_for_course('{target.target_course_id}') is not None and
        state.get_enrollment_for_course('{target.target_course_id}').status == 'dropped'
      desc: Target course enrollment status is dropped
    - expr: >-
        sum(1 for e in state.enrollments if e.status == 'dropped') >= 1
      desc: At least one course enrollment is in dropped status
  negative_checks:
    - expr: >-
        sum(1 for e in state.enrollments if e.status == 'dropped') <= 1
      desc: Only one course was dropped (not multiple)
      penalty: 0.3
