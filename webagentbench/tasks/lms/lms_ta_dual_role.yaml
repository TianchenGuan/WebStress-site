task_id: lms_ta_dual_role
env_id: lms
title: TA Dual Role Management
instruction_template: 'You are a TA for {target.ta_course_code} and a student in {target.student_course_code}.
  Complete the following without confusing your roles: (1) In your TA course, complete
  all pending peer reviews assigned to you with full rubric scores and comments of
  at least 30 characters each. (2) In your student course, submit the assignment "{target.student_assignment_title}"
  with file "ta_student_submission.pdf". Make sure you do not submit to the wrong
  course.'
difficulty: expert
time_limit_seconds: 360
expected_steps: 25
primary_primitives:
- exploration
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS201
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params:
      roles:
        course_1: ta
    outputs:
    - enrollment_ids
    - ta_course_id
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.4
      target_assignment_status: not_submitted
      exclude_course_id: '{output.ta_course_id}'
    outputs:
    - assignment_ids
    - target_assignment_id
    - target_assignment_title
    - target_course_id
    - target_course_code
    - decoy_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  - use: peer_review_assignments
    params:
      count: 3
      course_id: '{output.ta_course_id}'
      statuses:
      - assigned
      - assigned
      - in_progress
    outputs:
    - review_ids
    - pending_review_ids
  targets:
    ta_course_code: CS201
    student_course_code: '{output.target_course_code}'
    student_assignment_title: '{output.target_assignment_title}'
    target_assignment_id: '{output.target_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    ta_course_id: '{output.ta_course_id}'
    pending_review_ids: '{output.pending_review_ids}'
canonical_diff:
  update:
    - entity: PeerReview
      desc: Complete every pending TA peer review with all rubric scores and a 30+ character comment
      bijection:
        over: "[v.strip() for v in target['pending_review_ids'].split(',') if v.strip()]"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        rubric_scores:
          expr: >-
            len(x) == 3
            and set(x) == {'clarity', 'depth', 'originality'}
            and all(1 <= v <= 5 for v in x.values())
        comments:
          expr: "len(x.strip()) >= 30"
        status: {eq: submitted}
    - entity: Assignment
      desc: Submit the student-course assignment with the required file name
      where:
        id:
          expr: "x == target['target_assignment_id']"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: ta_student_submission.pdf
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x >= session_start"
  invariant:
    - collection: state.peer_reviews
      filter: "a.id not in [v.strip() for v in target['pending_review_ids'].split(',') if v.strip()]"
      preserve: ALL
    - collection: state.assignments
      filter: "a.id != target['target_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent completed every pending TA peer review
      ref: update[0]
      severity: high
    - name: Agent submitted the student-course assignment
      ref: update[1]
      severity: high
    - name: Agent did not modify other peer reviews
      ref: invariant[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[1]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[2]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[3]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "any(a.id == '{target.target_assignment_id}'\n    and a.submission_status\
      \ in ('submitted', 'late')\n    for a in state.assignments)"
    desc: Target student assignment was submitted
  - expr: state.get_assignment('{target.target_assignment_id}') is not None and state.get_assignment('{target.target_assignment_id}').file_name
      == 'ta_student_submission.pdf'
    desc: Correct file name used for student submission
  - expr: "sum(1 for pr in state.peer_reviews\n    if pr.reviewer_student_id == state.student.id\n\
      \    and pr.status == 'submitted') >= 2"
    desc: At least 2 peer reviews completed as TA
  - expr: "all(len(pr.comments) >= 30\n    for pr in state.peer_reviews\n    if pr.reviewer_student_id\
      \ == state.student.id\n    and pr.status == 'submitted')"
    desc: All submitted reviews have comments of 30+ characters
  - expr: "all(len(pr.rubric_scores) >= 3\n    for pr in state.peer_reviews\n    if\
      \ pr.reviewer_student_id == state.student.id\n    and pr.status == 'submitted')"
    desc: All submitted reviews have complete rubric scores
  negative_checks:
  - expr: state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status
      == 'not_submitted'
    desc: Decoy assignment in wrong course was not submitted
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
