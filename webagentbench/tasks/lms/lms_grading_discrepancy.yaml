task_id: lms_grading_discrepancy
env_id: lms
title: Resolve Grading Discrepancy
instruction_template: >-
  Review your grades in {target.course_code} and check whether the displayed
  weighted score matches what you calculate from the individual assignment
  scores, category weights, and drop-lowest policies. If there is a
  discrepancy, send a message to your instructor explaining the issue with
  the correct computed score.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - verification
  - state_tracking
  - exploration
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.7
        late_count: 2
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - dropped_grade_ids
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent a message to instructor about grades
    - expr: >-
        state.weighted_score_for_course('{target.target_course_id}') is not None
      desc: Course has graded assignments for verification
    - expr: >-
        (any(str(state.weighted_score_for_course('{target.target_course_id}')) in m.get('body', '')
            for m in state.sent_messages)
        or any('discrepancy' in m.get('body', '').lower()
               or 'correct' in m.get('body', '').lower()
               or 'matches' in m.get('body', '').lower()
               for m in state.sent_messages))
      desc: Message addresses the grade computation with a score or finding
    - expr: >-
        any('{target.course_code}' in m.get('body', '')
            for m in state.sent_messages)
      desc: Message references the correct course code
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during investigation
      penalty: 0.3
    - expr: >-
        not any(a.submission_status in ('submitted', 'late')
                and a.score is None
                for a in state.assignments
                if a.course_id == '{target.target_course_id}')
      desc: No ungraded submissions were created during investigation
      penalty: 0.2
