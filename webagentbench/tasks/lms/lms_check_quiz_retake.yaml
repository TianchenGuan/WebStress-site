task_id: lms_check_quiz_retake
env_id: lms
title: Check Assignment Retake Eligibility and Act
instruction_template: Check the homework "{target.assignment_title}" in {target.course_code}.
  If you have remaining attempts, retake it by resubmitting with file "retake.pdf".
  If no attempts remain, post in the course discussion forum asking about a retake
  opportunity.
difficulty: medium
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
- state_tracking
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      # The retake task requires a target with attempt_count >= 1 already
      # (so resubmitting bumps it to 2, matching the eval predicate at
      # line 80). `submitted` is the post-attempt status that sets
      # attempt_count=1 in the seed builder.
      target_assignment_status: submitted
    outputs:
    - assignment_ids
    - target_assignment_id
    - target_assignment_title
    - target_course_code
    - has_remaining_attempts
    - decoy_assignment_id
    - target_course_id
  - use: discussion_forums
    params:
      count: 2
      posts_per: 2
    outputs:
    - discussion_ids
    - target_discussion_id
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    has_remaining_attempts: '{output.has_remaining_attempts}'
    target_discussion_id: '{output.target_discussion_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    target_course_id: '{output.target_course_id}'
canonical_diff:
  oneof:
  # Branch discriminator baked into Update where-clause (was a critical constraint).
  - update:
    - entity: Assignment
      desc: Retake the target assignment by resubmitting retake.pdf (attempts available)
      where:
        id:
          expr: "x == target['target_assignment_id'] and target['has_remaining_attempts'] == 'true'"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: retake.pdf
        attempt_count:
          expr: "x >= 2"
        submitted_at:
          expr: "x is not None and x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['target_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent retook the target assignment
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: only matches when no attempts remain.
  - create:
    - entity: DiscussionPost
      desc: Ask about a retake in the course discussion forum (no attempts remain)
      properties:
        discussion_id:
          expr: "x == target['target_discussion_id'] and target['has_remaining_attempts'] != 'true'"
        author_id:
          expr: "x == state.student.id"
        author_name:
          expr: "x == state.student.name"
        body:
          expr: "len(x.strip()) > 10 and 'retake' in x.lower()"
        parent_post_id:
          eq: null
        timestamp:
          expr: "x is not None and x >= session_start"
        is_anonymous:
          eq: false
    invariant:
    - collection: state.assignments
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      filter: "p.discussion_id != target['target_discussion_id']"
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent asked about a retake in the course discussion forum
      ref: create[0]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify other discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.has_remaining_attempts}' == 'true'\n and state.get_assignment('{target.target_assignment_id}')\
      \ is not None\n and state.get_assignment('{target.target_assignment_id}').submission_status\
      \ in ('submitted', 'late')\n and state.get_assignment('{target.target_assignment_id}').file_name\
      \ == 'retake.pdf')\nor ('{target.has_remaining_attempts}' != 'true'\n \
      \   and any(p.discussion_id == '{target.target_discussion_id}'\n           \
      \ and p.author_id == state.student.id\n            and len(p.body.strip()) >\
      \ 10\n            for p in state.discussion_posts)))"
    desc: Assignment retaken IFF attempts remain, OR discussion post created IFF no
      attempts remain
  - expr: state.get_assignment('{target.target_assignment_id}') is not None
    desc: Target assignment exists (seed validation)
  - expr: state.get_assignment('{target.target_assignment_id}') is not None and state.get_assignment('{target.target_assignment_id}').course_id
      == '{target.target_course_id}'
    desc: Target assignment belongs to the correct course (seed validation)
  negative_checks:
  - expr: "(state.get_assignment('{target.decoy_assignment_id}') is None\n or state.get_assignment('{target.decoy_assignment_id}').submission_status\n\
      \    in ('not_submitted', 'graded', 'resubmit_requested'))"
    desc: Decoy assignment was not submitted or retaken
    penalty: 0.2
  - expr: "('{target.has_remaining_attempts}' == 'true'\n or not any(a.submission_status\
      \ in ('submitted', 'late')\n            and a.file_name == 'retake.pdf'\n\
      \            for a in state.assignments))"
    desc: No retake.pdf was submitted when no attempts remain
    penalty: 0.25
secondary_primitives: []
