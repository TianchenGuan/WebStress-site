task_id: lms_peer_review_redo
env_id: lms
title: Peer Review Quality Audit and Redo
instruction_template: Your previously submitted peer review for the assignment in
  {target.course_code} was returned because it was incomplete. Review the assignment
  rubric carefully, then redo the peer review by scoring all rubric criteria (clarity,
  depth, originality) and providing detailed comments of at least 50 characters. Your
  previous scores are visible for comparison but you must update all of them.
difficulty: expert
time_limit_seconds: 360
expected_steps: 22
primary_primitives:
- verification
start_path: /peer-reviews
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS201
    outputs:
    - course_ids
    - course_codes
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  - use: peer_review_assignments
    params:
      count: 3
      course_id: '{output.target_course_id}'
      statuses:
      - in_progress
      - assigned
      - submitted
      returned_review_count: 1
    outputs:
    - review_ids
    - pending_review_ids
    - completed_review_ids
    - returned_review_ids
  targets:
    course_code: '{output.course_code}'
    pending_review_ids: '{output.pending_review_ids}'
    completed_review_ids: '{output.completed_review_ids}'
    returned_review_ids: '{output.returned_review_ids}'
canonical_diff:
  update:
    - entity: PeerReview
      desc: Redo the returned peer review with all rubric scores and a detailed comment
      where:
        id:
          expr: "x == target['returned_review_ids'].split(',')[0]"
      changes:
        rubric_scores:
          expr: >-
            len(x) == 3
            and set(x) == {'clarity', 'depth', 'originality'}
            and all(1 <= v <= 5 for v in x.values())
        comments:
          expr: "len(x.strip()) >= 50"
        status: {eq: submitted}
  invariant:
    - collection: state.peer_reviews
      filter: "a.id != target['returned_review_ids'].split(',')[0]"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify other peer reviews
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n\
      \    and len(pr.rubric_scores) >= 3\n    for pr in state.peer_reviews)"
    desc: At least one review is submitted with all 3 rubric scores
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n\
      \    and len(pr.comments) >= 50\n    for pr in state.peer_reviews)"
    desc: Submitted review has comments of at least 50 characters
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n\
      \    and 'clarity' in pr.rubric_scores\n    for pr in state.peer_reviews)"
    desc: Clarity criterion was scored
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n\
      \    and 'depth' in pr.rubric_scores\n    for pr in state.peer_reviews)"
    desc: Depth criterion was scored
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n\
      \    and 'originality' in pr.rubric_scores\n    for pr in state.peer_reviews)"
    desc: Originality criterion was scored
  negative_checks:
  - expr: "all(pr.status != 'submitted' or len(pr.rubric_scores) >= 3\n    for pr\
      \ in state.peer_reviews\n    if pr.reviewer_student_id == state.student.id)"
    desc: No reviews were submitted with incomplete rubric scores
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
