task_id: lms_scholarship_maintenance
env_id: lms
title: Scholarship Maintenance Plan
instruction_template: >-
  Your scholarship requires maintaining a 3.5 GPA. Your current GPA is
  {target.gpa}. Review all 5 enrolled courses and determine the optimal
  grade distribution to maintain your scholarship. For each course:
  (1) Check your current weighted score. (2) Determine the minimum letter
  grade needed. (3) Compute required scores on remaining assignments.
  (4) Identify courses where achieving the needed grade is most/least
  feasible based on remaining assignment weight and current standing.
  Submit any easy unsubmitted assignments with file "scholarship_save.pdf"
  to secure points. Send a detailed maintenance plan to your advisor
  ({target.advisor_name}) with per-course targets, feasibility assessment,
  and overall scholarship risk level.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /dashboard

seed:
  distractors: 2
  steps:
    - use: student_profile
      params:
        gpa: "3.45"
      outputs:
        - student_id
        - advisor_name
        - gpa
    - use: course_catalog
      params:
        count: 5
        must_include: ["CS101", "MATH201", "ENG102", "PHYS201", "STAT301"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.5
        missing_count: 1
      outputs:
        - assignment_ids
        - missing_assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    missing_assignment_ids: '{output.missing_assignment_ids}'

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.file_name == 'scholarship_save.pdf'
            and a.submission_status in ('submitted', 'late')
            for a in state.assignments)
      desc: At least one scholarship-saving submission made
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent a maintenance plan
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message addressed to advisor
    - expr: >-
        any('3.5' in m.get('body', '') or 'scholarship' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message references 3.5 GPA threshold or scholarship
    - expr: >-
        any('CS101' in m.get('body', '') and 'MATH201' in m.get('body', '')
            for m in state.sent_messages)
      desc: Message covers multiple courses
    - expr: >-
        any('feasib' in m.get('body', '').lower() or 'risk' in m.get('body', '').lower()
            or 'achiev' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message includes feasibility assessment
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped (would lose credit hours)
      penalty: 0.3
    - expr: len(state.sent_messages) <= 4
      desc: Agent did not send excessive messages
      penalty: 0.15
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'scholarship_save.pdf']) <= 3
      desc: Agent did not submit excessively many files
      penalty: 0.1
