task_id: lms_find_project_assignments
env_id: lms
title: Find and Submit All Unsubmitted Project Assignments
instruction_template: Find all assignments categorized under "project" across your
  courses. For any unsubmitted project assignment, submit it with file "project_submission.pdf".
  Then mark all announcements as read to confirm you have reviewed your standing.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
- state_tracking
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.6
    outputs:
    - assignment_ids
    - unsubmitted_project_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: announcements_feed
    params:
      count: 4
      unread_count: 2
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    unsubmitted_project_ids: '{output.unsubmitted_project_ids}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit every unsubmitted project assignment with the project file
    bijection:
      over: "target['unsubmitted_project_ids'].split(',') if target['unsubmitted_project_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: project_submission.pdf
      attempt_count:
        expr: "x >= 1"
      submitted_at:
        expr: "x is not None"
  - entity: Announcement
    desc: Mark every unread announcement as read
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  invariant:
  - collection: state.assignments
    filter: "a.id not in (target['unsubmitted_project_ids'].split(',') if target['unsubmitted_project_ids'] else [])"
    preserve: ALL
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
  - name: Agent submitted all unsubmitted project assignments
    ref: update[0]
    severity: high
  - name: Agent marked unread announcements as read
    ref: update[1]
    severity: medium
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify unread announcements beyond marking them read
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify course records
    ref: invariant[2]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[3]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "all(\n    state.get_assignment(aid) is not None\n    and state.get_assignment(aid).submission_status\
      \ in ('submitted', 'late')\n    and state.get_assignment(aid).file_name == 'project_submission.pdf'\n\
      \    for aid in '{target.unsubmitted_project_ids}'.split(',')\n    if aid.strip()\n\
      )"
    desc: All unsubmitted project assignments were submitted with correct file
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'project_submission.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) >= 1"
    desc: At least one project submission was made
  - expr: all(a.is_read for a in state.announcements)
    desc: All announcements are marked as read
  negative_checks:
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.file_name\
      \ == 'project_submission.pdf'\n        and a.weight_category != 'project'\n\
      \        for a in state.assignments)"
    desc: No non-project assignments were submitted with the project file name
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during analysis
    penalty: 0.2
secondary_primitives: []
