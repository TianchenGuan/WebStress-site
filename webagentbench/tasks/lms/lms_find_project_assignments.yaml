task_id: lms_find_project_assignments
env_id: lms
title: Find All Project-Weighted Assignments and Check Grade Impact
instruction_template: >-
  Find all assignments categorized under "project" across your courses.
  For each one, note its score (if graded), points possible, and which
  course it belongs to. Calculate the project category's contribution to
  each course's overall grade and send a message to your advisor with a
  summary of your project performance.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
  - state_tracking
  - verification
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.6
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets: {}

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent a project performance summary
    - expr: >-
        any('project' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message mentions projects
    - expr: >-
        any('CS101' in m.get('body', '') or 'MATH201' in m.get('body', '')
            for m in state.sent_messages)
      desc: Message references at least one course code
    - expr: >-
        (any(any(str(g.score) in m.get('body', '')
                for g in state.grades
                if g.weight_category == 'project' and g.score is not None)
            for m in state.sent_messages
            if m.get('body'))
        or not any(g.weight_category == 'project' and g.score is not None
                   for g in state.grades))
      desc: Message contains project scores or no project grades exist
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
    - expr: >-
        not any(a.submission_status in ('submitted', 'late')
                and a.score is None
                and a.weight_category != 'project'
                for a in state.assignments)
      desc: No non-project assignments were submitted during analysis
      penalty: 0.2
