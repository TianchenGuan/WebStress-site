task_id: lms_academic_standing_optimization
env_id: lms
title: Academic Standing Optimization
instruction_template: >-
  You are enrolled in 4 courses with different grading policies. Your goal is to
  maximize your semester GPA. Identify the single missing (unsubmitted) assignment
  with the highest priority_weight; ties break by earliest due date. Submit that
  one assignment with file "optimization.pdf". Then send a brief strategy message
  to your advisor ({target.advisor_name}).
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- planning
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params:
      gpa: '3.05'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
      - PHYS201
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.5
      missing_count: 1
    outputs:
      - assignment_ids
      - missing_assignment_ids
      - priority_order_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
    priority_order_ids: '{output.priority_order_ids}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the highest-priority missing assignment with optimization.pdf
    where:
      id:
        expr: "x == next((aid.strip() for aid in target['priority_order_ids'].split(',') if aid.strip() in [m.strip() for m in target['missing_assignment_ids'].split(',')]), target['missing_assignment_ids'].split(',')[0].strip())"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: optimization.pdf
      attempt_count:
        eq: 1
      submitted_at:
        expr: "x is not None"
  invariant:
  - collection: state.assignments
    filter: "a.id != next((aid.strip() for aid in target['priority_order_ids'].split(',') if aid.strip() in [m.strip() for m in target['missing_assignment_ids'].split(',')]), target['missing_assignment_ids'].split(',')[0].strip())"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  named_invariants:
  - name: Agent submitted the optimization file for the selected assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
eval:
  source: server_state
  checks:
  - expr: "any(a.file_name == 'optimization.pdf'\n    and a.submission_status in ('submitted',\
      \ 'late')\n    for a in state.assignments)"
    desc: At least one optimization submission was made
  - expr: "any(a.file_name == 'optimization.pdf'\n    and a.submission_status in ('submitted', 'late')\n    and a.id == next((aid.strip() for aid in target['priority_order_ids'].split(',') if aid.strip() in [m.strip() for m in target['missing_assignment_ids'].split(',')]), target['missing_assignment_ids'].split(',')[0].strip())\n    for a in state.assignments)"
    desc: Optimization file was submitted for the highest-priority missing assignment
  - expr: "all(e.status == 'enrolled'\n    for e in state.enrollments)"
    desc: All enrollments remain active (none dropped)
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent a strategy message
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  - expr: sum(1 for e in state.enrollments if e.status == 'enrolled') >= 4
    desc: All 4 enrolled courses are still active (seed integrity)
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'optimization.pdf'])\
      \ <= 4"
    desc: Agent did not submit excessively many optimization files
    penalty: 0.1
secondary_primitives: []
