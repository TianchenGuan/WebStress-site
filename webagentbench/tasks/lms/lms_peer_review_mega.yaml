task_id: lms_peer_review_mega
env_id: lms
title: Peer Review Mega-Cycle
instruction_template: 'Complete a full peer review mega-cycle across your courses.
  You have multiple pending peer reviews to complete. For each one: (1) Read the reviewee''s
  submission and the assignment rubric. (2) Score all rubric criteria (clarity, depth,
  originality) carefully. (3) Write detailed comments of at least 50 characters explaining
  your scores. After completing all reviews, check if any of your own assignments
  have received feedback, and if so, resubmit those assignments with file "revised_after_review.pdf"
  incorporating the feedback.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- verification
start_path: /peer-reviews
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS201
      - ENG201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      resubmit_count: 1
    outputs:
    - assignment_ids
    - resubmit_assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  - use: peer_review_assignments
    params:
      count: 6
      statuses:
      - assigned
      - assigned
      - in_progress
      - assigned
      - assigned
      - in_progress
    outputs:
    - review_ids
    - pending_review_ids
    - completed_review_ids
    - peer_review_assignment_ids
  targets:
    course_codes: '{output.course_codes}'
    pending_review_ids: '{output.pending_review_ids}'
    resubmit_assignment_ids: '{output.resubmit_assignment_ids}'
    peer_review_assignment_ids: '{output.peer_review_assignment_ids}'

canonical_diff:
  update:
  - entity: PeerReview
    desc: Submit every pending peer review with complete rubric scores and detailed comments
    bijection:
      over: "target['pending_review_ids'].split(',') if target['pending_review_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v.strip()"
    changes:
      rubric_scores:
        expr: >-
          len(x) == 3
          and set(x) == {'clarity', 'depth', 'originality'}
          and all(1 <= score <= 5 for score in x.values())
      comments:
        expr: "len(x.strip()) >= 50"
      status:
        eq: submitted
  - entity: Assignment
    desc: Resubmit every feedback-bearing assignment with the revised file
    bijection:
      over: "target['resubmit_assignment_ids'].split(',') if target['resubmit_assignment_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v.strip()"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: revised_after_review.pdf
      attempt_count:
        expr: "x >= 2"
      submitted_at:
        expr: "x >= session_start"
  invariant:
  - collection: state.peer_reviews
    filter: "a.id not in [rid.strip() for rid in target['pending_review_ids'].split(',') if rid.strip()]"
    preserve: ALL
  - collection: state.assignments
    # Exclude both explicit resubmit targets and any assignment referenced by
    # a peer review — submitting a peer review can cascade onto the
    # underlying assignment record, so those assignments shouldn't be
    # treated as unrelated mutations.
    filter: "a.id not in [aid.strip() for aid in target['resubmit_assignment_ids'].split(',') if aid.strip()] and a.id not in [pid.strip() for pid in (target.get('peer_review_assignment_ids', '') or '').split(',') if pid.strip()]"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
  - name: Agent completed every pending peer review
    ref: update[0]
    severity: high
  - name: Agent resubmitted every feedback-bearing assignment
    ref: update[1]
    severity: high
  - name: Agent did not modify other peer reviews
    ref: invariant[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[1]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[2]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[3]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium

eval:
  source: server_state
  checks:
  - expr: "sum(1 for pr in state.peer_reviews\n    if pr.reviewer_student_id == state.student.id\n\
      \    and pr.status == 'submitted') >= 4"
    desc: At least 4 peer reviews completed
  - expr: "any(a.file_name == 'revised_after_review.pdf'\n    and a.submission_status\
      \ in ('submitted', 'late')\n    and a.id in [rid.strip() for rid in '{target.resubmit_assignment_ids}'.split(',')]\n\
      \    for a in state.assignments)"
    desc: At least one feedback-tagged assignment resubmitted with revised file
  - expr: "sum(1 for pr in state.peer_reviews\n    if pr.reviewer_student_id == state.student.id\n\
      \    and pr.status == 'submitted'\n    and len(pr.rubric_scores) >= 3) >= 4"
    desc: At least 4 complete reviews with all criteria scored
  negative_checks:
  - expr: "not any(pr.status == 'submitted'\n        and pr.reviewer_student_id ==\
      \ state.student.id\n        and len(pr.rubric_scores) < 3\n        for pr in\
      \ state.peer_reviews)"
    desc: No reviews were submitted with incomplete rubric scores
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: "not any(pr.status == 'submitted'\n        and pr.reviewer_student_id ==\
      \ state.student.id\n        and len(pr.comments) < 20\n        for pr in state.peer_reviews)"
    desc: No reviews were submitted with short/empty comments
    penalty: 0.2
secondary_primitives: []
