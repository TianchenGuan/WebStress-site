task_id: lms_peer_review_mega
env_id: lms
title: Peer Review Mega-Cycle
instruction_template: >-
  Complete a full peer review mega-cycle across your courses. You have
  multiple pending peer reviews to complete. For each one: (1) Read the
  reviewee's submission and the assignment rubric. (2) Score all rubric
  criteria (clarity, depth, originality) carefully. (3) Write detailed
  comments of at least 50 characters explaining your scores. After
  completing all reviews, check if any of your own assignments have
  received feedback, and if so, resubmit those assignments with file
  "revised_after_review.pdf" incorporating the feedback.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
  - patience
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS201", "ENG201"]
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
        resubmit_count: 1
      outputs:
        - assignment_ids
        - resubmit_assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
    - use: peer_review_assignments
      params:
        count: 6
        statuses: ["assigned", "assigned", "in_progress", "assigned", "assigned", "in_progress"]
      outputs:
        - review_ids
        - pending_review_ids
        - completed_review_ids
  targets:
    course_codes: '{output.course_codes}'
    pending_review_ids: '{output.pending_review_ids}'
    resubmit_assignment_ids: '{output.resubmit_assignment_ids}'

eval:
  source: server_state
  checks:
    - expr: >-
        sum(1 for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted') >= 4
      desc: At least 4 peer reviews completed
    - expr: >-
        all(len(pr.rubric_scores) >= 3
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted')
      desc: All submitted reviews have complete rubric scores
    - expr: >-
        all(len(pr.comments) >= 50
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted')
      desc: All submitted reviews have 50+ character comments
    - expr: >-
        all('clarity' in pr.rubric_scores and 'depth' in pr.rubric_scores
            and 'originality' in pr.rubric_scores
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted')
      desc: All reviews score all three rubric criteria
    - expr: >-
        any(a.file_name == 'revised_after_review.pdf'
            for a in state.assignments)
      desc: At least one assignment resubmitted with revised file
    - expr: >-
        sum(1 for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted'
            and len(pr.rubric_scores) >= 3) >= 4
      desc: At least 4 complete reviews with all criteria scored
  negative_checks:
    - expr: >-
        not any(pr.status == 'submitted'
                and pr.reviewer_student_id == state.student.id
                and len(pr.rubric_scores) < 3
                for pr in state.peer_reviews)
      desc: No reviews were submitted with incomplete rubric scores
      penalty: 0.25
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        not any(pr.status == 'submitted'
                and pr.reviewer_student_id == state.student.id
                and len(pr.comments) < 20
                for pr in state.peer_reviews)
      desc: No reviews were submitted with short/empty comments
      penalty: 0.2
