task_id: lms_complete_mixed_module
env_id: lms
title: Complete Module with Mixed Content Types
instruction_template: >-
  In {target.course_code}, complete the next available module which contains
  mixed content types (readings, videos, and linked assignments). Complete
  every content item in order, then mark the module as done.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - planning
  - state_tracking
  - patience
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 2
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.3
      outputs:
        - assignment_ids
    - use: module_sequence
      params:
        count: 4
        chain_type: mixed
        completed_count: 1
      outputs:
        - module_ids
        - next_available_module_id
        - first_locked_module_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    next_available_module_id: '{output.next_available_module_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_module('{target.next_available_module_id}') is not None
        and state.get_module('{target.next_available_module_id}').status == 'completed'
      desc: Target module is marked completed
    - expr: >-
        all(item.completed
            for item in state.get_module('{target.next_available_module_id}').content_items)
      desc: All content items in the module are completed
    - expr: >-
        len(state.get_module('{target.next_available_module_id}').content_items) >= 2
      desc: Module has multiple content items (seed validation)
    - expr: >-
        state.get_module('{target.first_locked_module_id}') is None
        or state.is_module_unlocked('{target.first_locked_module_id}')
      desc: Next module in chain is now unlocked
  negative_checks:
    - expr: >-
        not any(m.status == 'completed'
                and m.id != '{target.next_available_module_id}'
                and not all(item.completed for item in m.content_items)
                for m in state.modules
                if m.course_id == '{target.target_course_id}')
      desc: No modules were completed without finishing content items
      penalty: 0.25
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
