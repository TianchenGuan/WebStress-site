task_id: lms_academic_probation_recovery
env_id: lms
title: Academic Probation Recovery Plan
instruction_template: >-
  You are currently on academic probation with a GPA of {target.gpa}. You
  need to raise your GPA above 2.0 by end of semester. Review all your
  courses, determine the minimum letter grade needed in each to bring your
  cumulative GPA above 2.0, and identify which courses are most critical
  (highest credit weight). Submit your most critical missing assignment with
  file "recovery_priority.pdf". Then send a brief recovery plan message to
  your advisor ({target.advisor_name}).
difficulty: expert
time_limit_seconds: 420
expected_steps: 25
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /dashboard

seed:
  distractors: 1
  steps:
    - use: student_profile
      params:
        gpa: "1.85"
        enrollment_status: "probation"
      outputs:
        - student_id
        - advisor_name
        - gpa
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "ENG102"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.5
        late_count: 1
        missing_count: 1
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.file_name == 'recovery_priority.pdf'
            and a.submission_status in ('submitted', 'late')
            for a in state.assignments)
      desc: Agent submitted recovery_priority.pdf for a missing assignment
    - expr: >-
        any(a.file_name == 'recovery_priority.pdf'
            and a.submission_status in ('submitted', 'late')
            and a.points_possible is not None
            and a.points_possible > 0
            for a in state.assignments)
      desc: Submitted recovery file is for an assignment with grade weight
    - expr: >-
        all(e.status == 'enrolled'
            for e in state.enrollments)
      desc: All enrollments remain active (none dropped or withdrawn)
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent a recovery plan message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '')
            for m in state.sent_messages)
      desc: Message addressed to advisor
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped (would reduce credit hours)
      penalty: 0.3
    - expr: len(state.sent_messages) <= 3
      desc: Agent did not send excessive messages
      penalty: 0.15
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'recovery_priority.pdf']) <= 2
      desc: Agent did not submit excessively many recovery files
      penalty: 0.1
