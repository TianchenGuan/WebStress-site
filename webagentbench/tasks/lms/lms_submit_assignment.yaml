task_id: lms_submit_assignment
env_id: lms
title: Submit an Assignment for a Course
instruction_template: >-
  Submit the assignment "{target.assignment_title}" for {target.course_code}.
  Upload a file named "{target.file_name}".
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        target_assignment_status: "not_submitted"
      outputs:
        - assignment_ids
        - target_assignment_id
        - target_assignment_title
        - target_course_id
        - target_course_code
        - decoy_assignment_id
        - file_name
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    file_name: '{output.file_name}'

canonical_diff:
  update:
    - entity: Assignment
      desc: Submit the specified assignment with the required file name
      where:
        id:
          expr: "x == target['target_assignment_id']"
      changes:
        submission_status: {in: [submitted, late]}
        file_name:
          expr: "x == target['file_name']"
        attempt_count:
          expr: "x >= initial.get_assignment(target['target_assignment_id']).attempt_count + 1"
        submitted_at:
          expr: "x is not None"
  invariant:
    - collection: state.assignments
      filter: "a.id != target['target_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.id == '{target.target_assignment_id}' and a.submission_status in ('submitted', 'late')
            for a in state.assignments)
      desc: Target assignment is submitted
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').file_name == '{target.file_name}'
      desc: Correct file name attached
  negative_checks:
    - expr: >-
        state.get_assignment('{target.decoy_assignment_id}') is None or
        state.get_assignment('{target.decoy_assignment_id}').submission_status == 'not_submitted'
      desc: Decoy assignment was not submitted
      penalty: 0.3
