task_id: lms_submit_assignment
env_id: lms
title: Submit an Assignment for a Course
instruction_template: >-
  Submit the assignment "{target.assignment_title}" for {target.course_code}.
  Upload a file named "{target.file_name}".
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        target_assignment_status: "not_submitted"
      outputs:
        - assignment_ids
        - target_assignment_id
        - target_assignment_title
        - target_course_id
        - target_course_code
        - decoy_assignment_id
        - file_name
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    file_name: '{output.file_name}'

eval:
  source: server_state
  checks:
    - expr: >-
        any(a.id == '{target.target_assignment_id}' and a.submission_status in ('submitted', 'late')
            for a in state.assignments)
      desc: Target assignment is submitted
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').file_name == '{target.file_name}'
      desc: Correct file name attached
  negative_checks:
    - expr: >-
        state.get_assignment('{target.decoy_assignment_id}') is None or
        state.get_assignment('{target.decoy_assignment_id}').submission_status == 'not_submitted'
      desc: Decoy assignment was not submitted
      penalty: 0.3
