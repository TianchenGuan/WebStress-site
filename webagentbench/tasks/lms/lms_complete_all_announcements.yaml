task_id: lms_complete_all_announcements
env_id: lms
title: Find and Read All Unread Announcements
instruction_template: Find and read all unread announcements across all your courses.
  Mark each one as read. There should be {target.unread_count} unread announcements
  total.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: announcements_feed
    params:
      count: 8
      unread_count: 5
      urgent_count: 2
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    unread_count: '5'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  update:
  - entity: Announcement
    desc: Mark every unread announcement as read
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  invariant:
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent did not modify already-read announcements
    ref: invariant[0]
    severity: medium
  - name: Agent did not modify courses
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: len(state.unread_announcements()) == 0
    desc: All announcements are now marked as read
  - expr: all(a.is_read for a in state.announcements)
    desc: Every announcement entity has is_read == True
  - expr: len(state.announcements) >= 8
    desc: All announcements still exist (none deleted)
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped while marking announcements
    penalty: 0.2
secondary_primitives: []
