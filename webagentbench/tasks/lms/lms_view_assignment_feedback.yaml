task_id: lms_view_assignment_feedback
env_id: lms
title: View Feedback and Resubmit Assignment
instruction_template: >-
  Find any assignment in {target.course_code} that has instructor feedback.
  Read the feedback, then resubmit that assignment with an updated file
  "revised_after_feedback.pdf".
difficulty: medium
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
  - state_tracking
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.6
        target_assignment_status: "graded"
      outputs:
        - target_assignment_id
        - target_assignment_title
        - target_course_code
        - feedback_assignment_id
        - decoy_assignment_id
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
  targets:
    course_code: '{output.target_course_code}'
    feedback_assignment_id: '{output.feedback_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        (state.get_assignment('{target.feedback_assignment_id}') is not None
        and state.get_assignment('{target.feedback_assignment_id}').submission_status in ('submitted', 'late'))
      desc: The assignment with feedback was resubmitted
    - expr: >-
        (state.get_assignment('{target.feedback_assignment_id}') is not None
        and state.get_assignment('{target.feedback_assignment_id}').file_name == 'revised_after_feedback.pdf')
      desc: Correct file name used for resubmission
    - expr: >-
        state.get_assignment('{target.feedback_assignment_id}') is not None
        and state.get_assignment('{target.feedback_assignment_id}').feedback is not None
      desc: The resubmitted assignment is the one with feedback (seed validation)
  negative_checks:
    - expr: >-
        (state.get_assignment('{target.decoy_assignment_id}') is None
        or state.get_assignment('{target.decoy_assignment_id}').submission_status not in ('submitted', 'late')
        or state.get_assignment('{target.decoy_assignment_id}').file_name != 'revised_after_feedback.pdf')
      desc: Decoy assignment was not resubmitted with the feedback file
      penalty: 0.25
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'revised_after_feedback.pdf'
             and a.submission_status in ('submitted', 'late')]) <= 1
      desc: Only one assignment was resubmitted with the feedback revision file
      penalty: 0.2
