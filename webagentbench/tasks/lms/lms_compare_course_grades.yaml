task_id: lms_compare_course_grades
env_id: lms
title: Compare Grades Across Two Courses
instruction_template: Compare your weighted grades between {target.course_code_a}
  and {target.course_code_b}. Drop the course with the lower weighted grade.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.6
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - lower_grade_course_id
    - lower_grade_enrollment_id
  targets:
    course_code_a: CS101
    course_code_b: MATH201
    lower_grade_course_id: '{output.lower_grade_course_id}'
    lower_grade_enrollment_id: '{output.lower_grade_enrollment_id}'
canonical_diff:
  update:
    - entity: Enrollment
      desc: Drop the course with the lower weighted grade
      where:
        id:
          expr: "x == target['lower_grade_enrollment_id']"
      changes:
        status:
          eq: dropped
  invariant:
    - collection: state.enrollments
      filter: "a.id != target['lower_grade_enrollment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  named_invariants:
    - name: Agent dropped the lower-grade course enrollment
      ref: update[0]
      severity: high
    - name: Agent did not modify other enrollments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify courses
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify assignments
      ref: invariant[2]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not modify peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_enrollment_for_course('{target.lower_grade_course_id}') is not
      None and state.get_enrollment_for_course('{target.lower_grade_course_id}').status
      == 'dropped'
    desc: The course with the lower weighted grade was dropped
  negative_checks:
  - expr: sum(1 for e in state.enrollments if e.status == 'dropped') <= 1
    desc: Only one course was dropped (not both)
    penalty: 0.5
  - expr: "(state.get_course_by_code('CS101') is None\n or state.get_course_by_code('MATH201')\
      \ is None\n or (state.weighted_score_for_course(state.get_course_by_code('CS101').id)\n\
      \     < state.weighted_score_for_course(state.get_course_by_code('MATH201').id)\n\
      \     and state.get_enrollment_for_course(state.get_course_by_code('MATH201').id).status\
      \ != 'dropped')\n or (state.weighted_score_for_course(state.get_course_by_code('MATH201').id)\n\
      \     <= state.weighted_score_for_course(state.get_course_by_code('CS101').id)\n\
      \     and state.get_enrollment_for_course(state.get_course_by_code('CS101').id).status\
      \ != 'dropped'))"
    desc: The higher-grade course was not dropped (wrong course)
    penalty: 0.5
secondary_primitives: []
