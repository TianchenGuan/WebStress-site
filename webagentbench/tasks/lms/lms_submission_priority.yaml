task_id: lms_submission_priority
env_id: lms
title: Submit Assignments in Priority Order
instruction_template: 'You have multiple assignments due within the next 7 days across
  different courses. Submit them in priority order: highest-weight category first,
  then earliest deadline as tiebreaker. Submit each with file "priority_{n}.pdf" where
  n is the submission order (1, 2, 3, etc.). Submit at least the top 2 priority assignments.'
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- planning
start_path: /
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.3
      missing_count: 0
    outputs:
    - assignment_ids
    - priority_order_ids
  - use: calendar_events
    params:
      include_recurring: false
    outputs:
    - event_ids
  targets:
    priority_order_ids: '{output.priority_order_ids}'
canonical_diff:
  invariant:
    - collection: state.assignments
      filter: "a.id not in [pid.strip() for pid in target['priority_order_ids'].split(',') if pid.strip()]"
      preserve: ALL
      comprehensive: true
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Highest-priority assignment submitted with priority_1.pdf
    expr: "(state.get_assignment(target['priority_order_ids'].split(',')[0].strip()) is not None and state.get_assignment(target['priority_order_ids'].split(',')[0].strip()).submission_status in ('submitted', 'late') and state.get_assignment(target['priority_order_ids'].split(',')[0].strip()).file_name == 'priority_1.pdf' and state.get_assignment(target['priority_order_ids'].split(',')[0].strip()).attempt_count >= initial.get_assignment(target['priority_order_ids'].split(',')[0].strip()).attempt_count + 1 and state.get_assignment(target['priority_order_ids'].split(',')[0].strip()).submitted_at is not None)"
    severity: critical
  - desc: Second-priority assignment submitted with priority_2.pdf
    expr: "(state.get_assignment(target['priority_order_ids'].split(',')[1].strip()) is not None and state.get_assignment(target['priority_order_ids'].split(',')[1].strip()).submission_status in ('submitted', 'late') and state.get_assignment(target['priority_order_ids'].split(',')[1].strip()).file_name == 'priority_2.pdf' and state.get_assignment(target['priority_order_ids'].split(',')[1].strip()).attempt_count >= initial.get_assignment(target['priority_order_ids'].split(',')[1].strip()).attempt_count + 1 and state.get_assignment(target['priority_order_ids'].split(',')[1].strip()).submitted_at is not None)"
    severity: critical
  - desc: Any additional priority submissions use the matching priority order filename
    expr: "all((state.get_assignment(pid.strip()) is None or state.get_assignment(pid.strip()).submission_status not in ('submitted', 'late') or state.get_assignment(pid.strip()).file_name == 'priority_' + str([p.strip() for p in target['priority_order_ids'].split(',') if p.strip()].index(pid.strip()) + 1) + '.pdf') for pid in target['priority_order_ids'].split(',') if pid.strip())"
    severity: high
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: len('{target.priority_order_ids}'.split(',')) >= 2
    desc: At least 2 priority assignments exist (seed validation)
  - expr: "(state.get_assignment('{target.priority_order_ids}'.split(',')[0].strip())\
      \ is not None\n and state.get_assignment('{target.priority_order_ids}'.split(',')[0].strip()).submission_status\n\
      \     in ('submitted', 'late')\n and state.get_assignment('{target.priority_order_ids}'.split(',')[0].strip()).file_name\n\
      \     == 'priority_1.pdf')"
    desc: Highest-priority assignment submitted with priority_1.pdf
  - expr: "(state.get_assignment('{target.priority_order_ids}'.split(',')[1].strip())\
      \ is not None\n and state.get_assignment('{target.priority_order_ids}'.split(',')[1].strip()).submission_status\n\
      \     in ('submitted', 'late')\n and state.get_assignment('{target.priority_order_ids}'.split(',')[1].strip()).file_name\n\
      \     == 'priority_2.pdf')"
    desc: Second-priority assignment submitted with priority_2.pdf
  - expr: "len([a for a in state.assignments\n     if a.submission_status in ('submitted',\
      \ 'late')\n     and a.file_name is not None\n     and a.file_name.startswith('priority_')])\
      \ >= 2"
    desc: At least 2 priority submissions were made
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during planning
    penalty: 0.3
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.file_name\
      \ is not None\n        and a.file_name.startswith('priority_')\n        and\
      \ a.id not in [pid.strip()\n                         for pid in '{target.priority_order_ids}'.split(',')]\n\
      \        for a in state.assignments)"
    desc: No non-priority assignments were submitted with priority file names
    penalty: 0.2
secondary_primitives: []
