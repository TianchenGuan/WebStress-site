task_id: lms_compare_late_policies
env_id: lms
title: Compare Syllabus Late Policies Across Courses
instruction_template: >-
  Compare the late submission policies across all your courses. For each
  course, note the penalty per day, maximum late days, and grace period.
  Send a message to your advisor identifying which course is strictest,
  which is most lenient, and recommending a strategy for late submissions.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
  - state_tracking
  - verification
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
        - strictest_late_policy_course_id
        - most_lenient_late_policy_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
  targets:
    strictest_course_id: '{output.strictest_late_policy_course_id}'
    most_lenient_course_id: '{output.most_lenient_late_policy_course_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent a policy comparison message
    - expr: >-
        any('penalty' in m.get('body', '').lower()
            or 'late' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses late penalties
    - expr: >-
        any('strict' in m.get('body', '').lower()
            or 'lenient' in m.get('body', '').lower()
            or 'highest' in m.get('body', '').lower()
            or 'lowest' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message identifies strictest or most lenient policy
    - expr: >-
        (state.get_course('{target.strictest_course_id}') is not None
         and any(state.get_course('{target.strictest_course_id}').course_code in m.get('body', '')
                 for m in state.sent_messages))
        or (state.get_course('{target.most_lenient_course_id}') is not None
            and any(state.get_course('{target.most_lenient_course_id}').course_code in m.get('body', '')
                    for m in state.sent_messages))
      desc: Message references the strictest or most lenient course by code
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during comparison
      penalty: 0.3
    - expr: len(state.sent_messages) <= 3
      desc: Student did not send excessive messages
      penalty: 0.1
