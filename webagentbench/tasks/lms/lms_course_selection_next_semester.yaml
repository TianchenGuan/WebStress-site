task_id: lms_course_selection_next_semester
env_id: lms
title: Course Selection — Enroll If Eligible
instruction_template: Plan course selection for next semester. Check whether your
  GPA ({target.gpa}) meets the 2.5 minimum for advanced courses, and verify you have
  completed at least 3 modules in your current courses (prerequisite progress). If
  your GPA is 2.5 or above AND you have 3+ completed modules, submit "course_plan.pdf"
  for your next unsubmitted assignment. If either condition is not met, mark all announcements
  as read to confirm you have reviewed the requirements.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- exploration
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params:
      gpa: '2.75'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS201
      - MATH201
      - ENG102
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
    outputs:
    - assignment_ids
    - course_plan_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: module_sequence
    params:
      count: 4
      chain_type: linear
      completed_count: 3
    outputs:
    - module_ids
  - use: calendar_events
    params:
      include_recurring: false
    outputs:
    - event_ids
  - use: announcements_feed
    params:
      count: 4
      unread_count: 2
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    gpa: '{output.gpa}'
    course_plan_assignment_id: '{output.course_plan_assignment_id}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  oneof:
  # Branch discriminator baked into the Update where-clause (was a critical constraint).
  # The bijection still produces a slot; the where-clause rejects unless GPA + module progress qualify.
  - update:
    - entity: Assignment
      desc: Submit course_plan.pdf for the next unsubmitted assignment (GPA and progress qualify)
      bijection:
        over: "[target['course_plan_assignment_id']] if target['course_plan_assignment_id'] else []"
        variable: v
      where:
        id:
          expr: "x == v and float(target['gpa']) >= 2.5 and sum(1 for m in state.modules if m.status == 'completed') >= 3"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: course_plan.pdf
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['course_plan_assignment_id']"
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent submitted course_plan.pdf to the next unsubmitted assignment
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify announcements
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[2]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[3]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: only matches when GPA is too low or progress incomplete.
  - update:
    - entity: Announcement
      desc: Mark all unread announcements as read (cannot enroll in advanced course yet)
      bijection:
        over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
        variable: v
      where:
        id:
          expr: "x == v and (float(target['gpa']) < 2.5 or sum(1 for m in state.modules if m.status == 'completed') < 3)"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.assignments
      preserve: ALL
    - collection: state.announcements
      filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    named_invariants:
    - name: Agent marked unread announcements as read
      ref: update[0]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify other announcements
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[2]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[3]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(float('{target.gpa}') >= 2.5 and sum(1 for m in state.modules if m.status\
      \ == 'completed') >= 3 and state.get_assignment('{target.course_plan_assignment_id}')\
      \ is not None and state.get_assignment('{target.course_plan_assignment_id}').submission_status\
      \ in ('submitted', 'late') and state.get_assignment('{target.course_plan_assignment_id}').file_name\
      \ == 'course_plan.pdf') or ( (float('{target.gpa}') < 2.5\n or sum(1 for m in\
      \ state.modules if m.status == 'completed') < 3)\nand all(a.is_read for a in\
      \ state.announcements))"
    desc: Submitted course_plan.pdf IFF eligible, OR all announcements read IFF not
      eligible
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: "(len([a for a in state.assignments\n     if a.file_name == 'course_plan.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) <= 1)"
    desc: At most one course_plan.pdf was submitted
    penalty: 0.15
  - expr: "(len([a for a in state.assignments\n     if a.submission_status in ('submitted',\
      \ 'late')\n     and a.file_name is not None\n     and a.file_name not in ('course_plan.pdf',\
      \ 'submission.pdf')]) == 0)"
    desc: No extraneous non-default files were submitted
    penalty: 0.1
secondary_primitives: []
