task_id: lms_submit_peer_review
env_id: lms
title: Submit Peer Review Following Rubric
instruction_template: You have a pending peer review to complete. Navigate to your
  peer reviews, find the one that is assigned, read the submission, then fill out
  rubric scores for each criterion and add a constructive comment before submitting.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
- state_tracking
start_path: /peer-reviews
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.4
    outputs:
    - assignment_ids
  - use: peer_review_assignments
    params:
      count: 3
      statuses:
      - assigned
      - in_progress
      - submitted
    outputs:
    - review_ids
    - pending_review_ids
    - completed_review_ids
  targets:
    target_review_id: '{output.pending_review_ids[0]}'
canonical_diff:
  update:
    - entity: PeerReview
      desc: Submit the assigned peer review with rubric scores and a constructive comment
      where:
        id:
          expr: "x == target['target_review_id']"
      changes:
        rubric_scores:
          expr: >-
            len(x) == 3
            and set(x) == {'clarity', 'depth', 'originality'}
            and all(1 <= v <= 5 for v in x.values())
        comments:
          expr: "len(x.strip()) > 10"
        status: {eq: submitted}
  invariant:
    - collection: state.peer_reviews
      filter: "a.id != target['target_review_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify other peer reviews
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_peer_review('{target.target_review_id}') is not None and state.get_peer_review('{target.target_review_id}').status
      == 'submitted'
    desc: Target peer review was submitted
  - expr: state.get_peer_review('{target.target_review_id}') is not None and len(state.get_peer_review('{target.target_review_id}').rubric_scores)
      >= 1
    desc: Rubric scores were filled in
  - expr: state.get_peer_review('{target.target_review_id}') is not None and len(state.get_peer_review('{target.target_review_id}').comments.strip())
      > 10
    desc: Review includes a meaningful comment
  negative_checks:
  - expr: "not any(pr.status == 'submitted'\n        and pr.reviewer_student_id ==\
      \ state.student.id\n        and len(pr.rubric_scores) < 1\n        for pr in\
      \ state.peer_reviews)"
    desc: No reviews submitted without rubric scores
    penalty: 0.15
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.2
secondary_primitives: []
