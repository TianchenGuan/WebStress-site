task_id: lms_resubmit_flagged
env_id: lms
title: Submit Work for a Resubmit-Requested Assignment
instruction_template: Find all assignments across your courses that have been flagged
  for resubmission (status "resubmit_requested"). Read the feedback on each, then
  resubmit with updated files. Use the naming convention "revision_v{attempt}.pdf"
  for each resubmission.
difficulty: hard
time_limit_seconds: 240
expected_steps: 14
primary_primitives:
- backtracking
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      resubmit_count: 2
    outputs:
    - assignment_ids
    - resubmit_assignment_ids
    - decoy_assignment_id
  targets:
    resubmit_assignment_ids: '{output.resubmit_assignment_ids}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
canonical_diff:
  update:
    - entity: Assignment
      desc: Resubmit every flagged assignment with revision_v2.pdf
      bijection:
        over: "target['resubmit_assignment_ids'].split(',') if target['resubmit_assignment_ids'] else []"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: revision_v2.pdf
        attempt_count:
          expr: "x >= 2"
        submitted_at:
          expr: "x >= session_start"
  invariant:
    - collection: state.assignments
      filter: "a.id not in (target['resubmit_assignment_ids'].split(',') if target['resubmit_assignment_ids'] else [])"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent resubmitted every flagged assignment
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(all(state.get_assignment(aid) is not None\n    and state.get_assignment(aid).submission_status\
      \ in ('submitted', 'late')\n    for aid in [a.id for a in state.assignments\n\
      \                if a.submission_status == 'resubmit_requested'])\nor not any(a.submission_status\
      \ == 'resubmit_requested' for a in state.assignments))"
    desc: All resubmit-requested assignments were resubmitted
  - expr: "len([a for a in state.assignments\n     if a.submission_status == 'resubmit_requested'])\
      \ == 0"
    desc: No assignments remain in resubmit_requested status
  negative_checks:
  - expr: state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status
      != 'submitted'
    desc: Decoy assignment was not submitted
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
