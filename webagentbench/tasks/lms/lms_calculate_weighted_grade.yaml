task_id: lms_calculate_weighted_grade
env_id: lms
title: Calculate Current Weighted Grade
instruction_template: Navigate to the grades page for {target.course_code}. Verify
  the overall weighted grade displayed matches what you compute from the syllabus
  weights and individual assignment scores. If you find a discrepancy of more than
  1 point from the displayed score, resubmit the most recently graded assignment with
  file 'grade_dispute.pdf'. If the grade is correct (within 1 point), mark the course's
  latest announcement as read to confirm you've reviewed your standing.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.6
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - dropped_grade_ids
    - has_discrepancy
    - most_recent_graded_id
  - use: announcements_feed
    params:
      count: 2
      unread_count: 2
    outputs:
    - announcement_ids
    - latest_announcement_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    has_discrepancy: '{output.has_discrepancy}'
    most_recent_graded_id: '{output.most_recent_graded_id}'
    latest_announcement_id: '{output.latest_announcement_id}'
canonical_diff:
  oneof:
    # Branch discriminator baked into the Update where-clause (was previously
    # a critical-severity constraint). Branch 1 only matches when target has a
    # weighted-grade discrepancy.
    - update:
        - entity: Assignment
          desc: Resubmit the most recently graded assignment with grade_dispute.pdf (target has discrepancy)
          where:
            id:
              expr: "x == target['most_recent_graded_id'] and target['has_discrepancy'] == 'true'"
          changes:
            submission_status:
              in:
                - submitted
                - late
            file_name:
              eq: grade_dispute.pdf
            attempt_count:
              expr: "x >= 2"
            submitted_at:
              expr: "x >= session_start"
      invariant:
        - collection: state.assignments
          filter: "a.id != target['most_recent_graded_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.announcements
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
        - collection: state.student
          preserve: ALL
      named_invariants:
        - name: Agent resubmitted the most recent graded assignment
          ref: update[0]
          severity: high
        - name: Agent did not modify other assignments
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify modules
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[4]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[5]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[6]
          severity: medium
        - name: Agent did not modify announcements
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium
    # Branch 2: only matches when there is no discrepancy.
    - update:
        - entity: Announcement
          desc: Mark the latest announcement as read after reviewing the grade (no discrepancy)
          where:
            id:
              expr: "x == target['latest_announcement_id'] and target['has_discrepancy'] == 'false'"
          changes:
            is_read:
              eq: true
      invariant:
        - collection: state.announcements
          filter: "a.id != target['latest_announcement_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.assignments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
        - collection: state.student
          preserve: ALL
      named_invariants:
        - name: Agent marked the latest announcement as read
          ref: update[0]
          severity: high
        - name: Agent did not modify other announcements
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify assignments
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify modules
          ref: invariant[4]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[5]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[6]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.has_discrepancy}' == 'true'\n and any(a.course_id == '{target.target_course_id}'\n\
      \         and a.submission_status in ('submitted', 'late')\n         and a.file_name\
      \ == 'grade_dispute.pdf'\n         for a in state.assignments))\nor ('{target.has_discrepancy}'\
      \ == 'false'\n    and state.get_announcement('{target.latest_announcement_id}')\
      \ is not None\n    and state.get_announcement('{target.latest_announcement_id}').is_read\
      \ == True))"
    desc: 'Correct conditional action taken: submit grade_dispute.pdf in target course
      if discrepancy exists, or mark latest announcement as read if no discrepancy'
  negative_checks:
  - expr: '''{target.has_discrepancy}'' != ''true'' or state.get_announcement(''{target.latest_announcement_id}'')
      is None or state.get_announcement(''{target.latest_announcement_id}'').is_read
      != True'
    desc: Did not mark announcement as read when discrepancy exists (wrong branch)
    penalty: 0.3
  - expr: "'{target.has_discrepancy}' != 'false' or not any(a.course_id == '{target.target_course_id}'\n\
      \           and a.file_name == 'grade_dispute.pdf'\n           for a in state.assignments)"
    desc: Did not submit grade_dispute.pdf when no discrepancy exists (wrong branch)
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during verification
    penalty: 0.3
secondary_primitives: []
