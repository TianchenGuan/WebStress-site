task_id: lms_semester_recovery_plan
env_id: lms
title: Full Semester Recovery Plan
instruction_template: 'You''re behind in multiple courses and need a full recovery
  plan. For each of your courses: (1) Submit any recoverable late/missing assignments
  with file "recovery.pdf" (skip those past max late days). (2) Compute the minimum
  scores needed on remaining assignments to pass each course with a C (70%). (3) If
  a course is mathematically impossible to pass, drop it if the drop deadline hasn''t
  passed. Then send a brief recovery plan message to your advisor ({target.advisor_name}).'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 45
primary_primitives:
- backtracking
start_path: /dashboard
seed:
  distractors: 3
  steps:
  - use: student_profile
    params:
      gpa: '2.10'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 5
      must_include:
      - CS101
      - MATH201
      - ENG102
      - PHYS201
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.4
      late_count: 2
      missing_count: 2
    outputs:
    - assignment_ids
    - missing_assignment_ids
    - late_assignment_ids
    - recoverable_assignment_ids
    - recoverable_missing_assignment_ids
    - recoverable_late_assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
    late_assignment_ids: '{output.late_assignment_ids}'
    recoverable_assignment_ids: '{output.recoverable_assignment_ids}'
    recoverable_missing_assignment_ids: '{output.recoverable_missing_assignment_ids}'
    recoverable_late_assignment_ids: '{output.recoverable_late_assignment_ids}'
    current_weighted_scores: '{output.current_weighted_scores}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit each recoverable missing assignment with recovery.pdf
    bijection:
      over: "target['recoverable_missing_assignment_ids'].split(',') if target['recoverable_missing_assignment_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: recovery.pdf
      submitted_at:
        expr: "x >= session_start"
      attempt_count:
        expr: "x >= initial.get_assignment(v).attempt_count + 1"
  - entity: Assignment
    desc: Resubmit each recoverable late assignment with recovery.pdf
    bijection:
      over: "target['recoverable_late_assignment_ids'].split(',') if target['recoverable_late_assignment_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      file_name:
        eq: recovery.pdf
      submitted_at:
        expr: "x >= session_start"
      attempt_count:
        expr: "x >= initial.get_assignment(v).attempt_count + 1"
  invariant:
  - collection: state.assignments
    filter: "a.id not in ((target['recoverable_missing_assignment_ids'].split(',') if target['recoverable_missing_assignment_ids'] else []) + (target['recoverable_late_assignment_ids'].split(',') if target['recoverable_late_assignment_ids'] else []))"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.student
    preserve: ALL
  constraints:
  - desc: Agent sent a recovery plan message to the advisor
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and (m.get('subject', '') or '').strip() and (m.get('body', '') or '').strip() for m in state.sent_messages)"
    severity: critical
  - desc: Advisor message came from the student account
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and m.get('from') == state.student.email for m in state.sent_messages)"
    severity: high
  - desc: Agent did not send excessive messages
    expr: "len(state.sent_messages) <= 4"
    severity: medium
  named_invariants:
  - name: Agent submitted every recoverable missing assignment
    ref: update[0]
    severity: high
  - name: Agent resubmitted every recoverable late assignment
    ref: update[1]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
eval:
  source: server_state
  checks:
  - expr: "any(a.file_name == 'recovery.pdf'\n    and a.submission_status in ('submitted',\
      \ 'late')\n    for a in state.assignments)"
    desc: At least one recovery submission was made
  - expr: "any(a.file_name == 'recovery.pdf'\n    and a.submission_status in ('submitted',\
      \ 'late')\n    and a.id in [mid.strip() for mid in '{target.missing_assignment_ids}'.split(',')]\n\
      \    for a in state.assignments)"
    desc: Recovery file submitted for an identified missing assignment
  - expr: "len([e for e in state.enrollments\n     if e.status == 'enrolled']) >=\
      \ 3"
    desc: At least 3 courses remain enrolled (did not over-drop)
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent a recovery plan message
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'recovery.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) >= 2"
    desc: At least 2 recovery submissions were made (multiple missing/late assignments
      exist)
  negative_checks:
  - expr: sum(1 for e in state.enrollments if e.status == 'dropped') <= 2
    desc: No more than 2 courses were dropped
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "all(a.file_name != 'recovery.pdf' or a.submission_status in ('submitted',\
      \ 'late')\n    for a in state.assignments)"
    desc: No recovery files were attached to non-submitted assignments
    penalty: 0.1
secondary_primitives: []
