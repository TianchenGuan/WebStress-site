task_id: lms_portfolio_assembly
env_id: lms
title: Full Portfolio Assembly
instruction_template: 'Assemble a comprehensive academic portfolio. For each of your
  courses: (1) Identify your highest-scored graded assignments (those scoring above
  80% of points possible). (2) Verify the grades are correct by checking against rubric
  criteria. (3) Note any assignments with positive instructor feedback. (4) Check
  your discussion posts for thoughtful contributions that could be included. Submit
  a portfolio compilation file named "portfolio.pdf" to any unsubmitted assignment.
  Then send a brief portfolio summary to your advisor ({target.advisor_name}).'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
- exploration
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.7
    outputs:
    - assignment_ids
    - course_plan_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: discussion_forums
    params:
      count: 2
      posts_per: 4
    outputs:
    - discussion_ids
  - use: peer_review_assignments
    params:
      count: 2
      statuses:
      - submitted
      - submitted
    outputs:
    - review_ids
  targets:
    advisor_name: '{output.advisor_name}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    portfolio_assignment_id: '{output.course_plan_assignment_id}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the portfolio file to a stable unsubmitted assignment
    where:
      id:
        expr: "x == target['portfolio_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: portfolio.pdf
      attempt_count:
        expr: "x >= 1"
      submitted_at:
        expr: "x >= session_start"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['portfolio_assignment_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  named_invariants:
  - name: Agent submitted the portfolio file to the chosen assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  constraints:
  - desc: Agent sent at least one portfolio summary message
    expr: len(state.sent_messages) >= 1
    severity: medium
  - desc: Portfolio summary message was addressed to the advisor
    expr: "any(target['advisor_name'] in m.get('to', '') for m in state.sent_messages)"
    severity: high
  - desc: Agent did not send excessive messages
    expr: len(state.sent_messages) <= 4
    severity: low
eval:
  source: server_state
  checks:
  - expr: "any(a.file_name == 'portfolio.pdf'\n    and a.submission_status in ('submitted',\
      \ 'late')\n    for a in state.assignments)"
    desc: Agent submitted portfolio.pdf file
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent a portfolio summary
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'portfolio.pdf'])\
      \ <= 2"
    desc: Agent did not submit excessively many portfolio files
    penalty: 0.1
secondary_primitives: []
