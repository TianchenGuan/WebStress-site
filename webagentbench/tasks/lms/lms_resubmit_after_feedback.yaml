task_id: lms_resubmit_after_feedback
env_id: lms
title: Resubmit Assignment After Reading Feedback
instruction_template: Find the assignment in {target.course_code} that has been flagged
  for resubmission. Read the instructor's feedback, then resubmit the assignment with
  an updated file named "{target.resubmit_file_name}".
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS201
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      resubmit_count: 1
    outputs:
    - assignment_ids
    - resubmit_assignment_ids
    - decoy_assignment_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    resubmit_assignment_id: '{output.resubmit_assignment_ids[0]}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    resubmit_file_name: revision_v2.pdf
canonical_diff:
  update:
  - entity: Assignment
    desc: Resubmit the flagged assignment after reviewing instructor feedback
    where:
      id:
        expr: "x == target['resubmit_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        expr: "x == target['resubmit_file_name']"
      attempt_count:
        expr: "x == 2"
      submitted_at:
        expr: "x >= session_start"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['resubmit_assignment_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent resubmitted the flagged assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_assignment('{target.resubmit_assignment_id}') is not None and
      state.get_assignment('{target.resubmit_assignment_id}').submission_status in
      ('submitted', 'late')
    desc: Resubmit-requested assignment was resubmitted
  - expr: state.get_assignment('{target.resubmit_assignment_id}') is not None and
      state.get_assignment('{target.resubmit_assignment_id}').file_name == '{target.resubmit_file_name}'
    desc: Resubmission has the correct updated file name
  - expr: state.get_assignment('{target.resubmit_assignment_id}') is not None and
      state.get_assignment('{target.resubmit_assignment_id}').attempt_count >= 2
    desc: Attempt count incremented (second attempt)
  negative_checks:
  - expr: state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status
      != 'submitted'
    desc: Decoy assignment was not resubmitted
    penalty: 0.25
secondary_primitives: []
