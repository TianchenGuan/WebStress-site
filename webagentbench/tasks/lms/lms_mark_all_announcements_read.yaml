task_id: lms_mark_all_announcements_read
env_id: lms
title: Mark All Announcements as Read
instruction_template: >-
  Mark all announcements as read.
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: announcements_feed
      params:
        count: 8
        unread_count: 5
        urgent_count: 1
      outputs:
        - announcement_ids
        - unread_announcement_ids
  targets:
    unread_announcement_ids: '{output.unread_announcement_ids}'

canonical_diff:
  update:
    - entity: Announcement
      desc: Mark every unread announcement as read
      bijection:
        over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        is_read: {eq: true}
  invariant:
    - collection: state.announcements
      filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify announcements that were already read
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium

eval:
  source: server_state
  checks:
    - expr: all(a.is_read for a in state.announcements)
      desc: All announcements are marked as read
    - expr: len(state.unread_announcements()) == 0
      desc: No unread announcements remain
  negative_checks:
    - expr: >-
        len([e for e in state.enrollments if e.status == 'dropped']) == 0
      desc: No courses were dropped
      penalty: 0.2
