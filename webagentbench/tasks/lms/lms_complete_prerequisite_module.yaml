task_id: lms_complete_prerequisite_module
env_id: lms
title: Complete Prerequisite Module to Unlock Next
instruction_template: In {target.course_code}, complete module "{target.module_title}"
  so that the next module in the sequence becomes unlocked. Make sure all content
  items in the module are completed before marking it done.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 0
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: module_sequence
    params:
      count: 4
      chain_type: linear
      completed_count: 1
    outputs:
    - module_ids
    - next_available_module_id
    - first_locked_module_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    next_available_module_id: '{output.next_available_module_id}'
    first_locked_module_id: '{output.first_locked_module_id}'
    module_title: Module 2

canonical_diff:
  update:
  - entity: Module
    desc: Complete the specified module after finishing all of its content items
    where:
      id:
        expr: "x == target['next_available_module_id']"
    changes:
      status: {eq: completed}
      content_items:
        expr: "all(item.get('completed') is True for item in x)"
  - entity: Module
    desc: Unlock the next module in the sequence
    where:
      id:
        expr: "x == target['first_locked_module_id']"
    changes:
      status: {eq: available}
  invariant:
    - collection: state.modules
      filter: "a.id not in [target['next_available_module_id'], target['first_locked_module_id']]"
      preserve: ALL
      comprehensive: true
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
  - name: Agent did not modify other modules
    ref: invariant[0]
    severity: high
  - name: Agent unlocked the next module
    ref: update[1]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_module('{target.next_available_module_id}') is not None and state.get_module('{target.next_available_module_id}').status
      == 'completed'
    desc: Target module is marked completed
  - expr: "all(item.completed\n    for item in state.get_module('{target.next_available_module_id}').content_items)"
    desc: All content items in the module are completed
  - expr: state.get_module('{target.first_locked_module_id}') is not None and state.is_module_unlocked('{target.first_locked_module_id}')
    desc: The next module in the chain is now unlocked
  negative_checks:
  - expr: "not any(m.status == 'completed'\n        and m.id not in ['{target.next_available_module_id}']\n\
      \        and m.position > 0\n        for m in state.modules\n        if m.course_id\
      \ == '{target.target_course_id}'\n        and m.id != '{target.next_available_module_id}')"
    desc: No other locked modules were force-completed
    penalty: 0.25
secondary_primitives: []
