task_id: lms_complex_what_if
env_id: lms
title: Complex What-If Grade Scenarios
instruction_template: >-
  Run three what-if scenarios for {target.course_code} and compare the results.
  Scenario A: you score 100% on the final exam but 0% on the remaining project.
  Scenario B: you score 85% on both the final exam and the remaining project.
  Scenario C: you score 70% on the final exam and 100% on the remaining project.
  After computing all three, submit the highest-impact ungraded assignment
  (the one in the grading category with the highest syllabus weight) with
  file 'priority_submission.pdf'.
difficulty: expert
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.5
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - highest_weight_ungraded_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    highest_weight_ungraded_id: '{output.highest_weight_ungraded_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_assignment('{target.highest_weight_ungraded_id}') is not None
        and state.get_assignment('{target.highest_weight_ungraded_id}').submission_status == 'submitted'
        and state.get_assignment('{target.highest_weight_ungraded_id}').file_name == 'priority_submission.pdf'
      desc: Highest-weight ungraded assignment submitted with priority_submission.pdf
  negative_checks:
    - expr: >-
        not any(
          a.submission_status == 'submitted'
          and a.file_name == 'priority_submission.pdf'
          and a.id != '{target.highest_weight_ungraded_id}'
          for a in state.assignments
        )
      desc: No other assignment was submitted with priority_submission.pdf
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
