task_id: lms_complex_what_if
env_id: lms
title: Complex What-If Grade Scenarios
instruction_template: 'Run three what-if scenarios for {target.course_code} and compare
  the results. Scenario A: you score 100% on the final exam but 0% on the remaining
  project. Scenario B: you score 85% on both the final exam and the remaining project.
  Scenario C: you score 70% on the final exam and 100% on the remaining project. After
  computing all three, submit the highest-impact ungraded assignment (the one in the
  grading category with the highest syllabus weight) with file ''priority_submission.pdf''.'
difficulty: expert
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_codes
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - highest_weight_ungraded_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    highest_weight_ungraded_id: '{output.highest_weight_ungraded_id}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the highest-weight ungraded assignment with priority_submission.pdf
    where:
      id:
        expr: "x == target['highest_weight_ungraded_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: priority_submission.pdf
      attempt_count:
        eq: 1
      submitted_at:
        expr: "x is not None and x >= session_start"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['highest_weight_ungraded_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent submitted the highest-weight ungraded assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_assignment('{target.highest_weight_ungraded_id}') is not None
      and state.get_assignment('{target.highest_weight_ungraded_id}').submission_status
      in ('submitted', 'late') and state.get_assignment('{target.highest_weight_ungraded_id}').file_name
      == 'priority_submission.pdf'
    desc: Highest-weight ungraded assignment submitted with priority_submission.pdf
  negative_checks:
  - expr: "not any(\n  a.submission_status in ('submitted', 'late')\n  and a.file_name\
      \ == 'priority_submission.pdf'\n  and a.id != '{target.highest_weight_ungraded_id}'\n\
      \  for a in state.assignments\n)"
    desc: No other assignment was submitted with priority_submission.pdf
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
