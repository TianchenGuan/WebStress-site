task_id: lms_complex_what_if
env_id: lms
title: Complex What-If Grade Scenarios
instruction_template: >-
  Run three what-if scenarios for {target.course_code} and compare the results.
  Scenario A: you score 100% on the final exam but 0% on the remaining project.
  Scenario B: you score 85% on both the final exam and the remaining project.
  Scenario C: you score 70% on the final exam and 100% on the remaining project.
  For each scenario, compute the resulting weighted course grade and
  corresponding letter grade. Send a message to your advisor ({target.advisor_name})
  summarizing all three scenarios with the final grades and recommending
  which outcome is most realistic.
difficulty: expert
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.5
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    advisor_name: '{output.advisor_name}'
    current_weighted_scores: '{output.current_weighted_scores}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent at least one message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message addressed to advisor
    - expr: >-
        any('scenario' in m.get('body', '').lower() or 'Scenario' in m.get('body', '')
            for m in state.sent_messages)
      desc: Message references scenarios
    - expr: >-
        any('100' in m.get('body', '') for m in state.sent_messages)
      desc: Message includes 100% score reference
    - expr: >-
        any('recommend' in m.get('body', '').lower() or 'realistic' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message includes a recommendation
    - expr: >-
        any('{target.course_code}' in m.get('body', '') for m in state.sent_messages)
      desc: Message references the target course
  negative_checks:
    - expr: len(state.sent_messages) <= 3
      desc: Agent did not send excessive messages
      penalty: 0.15
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
