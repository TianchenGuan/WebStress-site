task_id: lms_module_quiz_unlock
env_id: lms
title: Complete Module Content to Unlock Next Project
instruction_template: In {target.course_code}, Module 3 is locked until Module 2 is
  completed. Complete every Module 2 content item and mark Module 2 done, which should
  unlock Module 3. Then verify Module 3 is accessible.
difficulty: hard
time_limit_seconds: 300
expected_steps: 16
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.4
    outputs:
    - assignment_ids
  - use: module_sequence
    params:
      count: 4
      chain_type: mixed
      completed_count: 1
    outputs:
    - module_ids
    - next_available_module_id
    - first_locked_module_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    next_available_module_id: '{output.next_available_module_id}'
    first_locked_module_id: '{output.first_locked_module_id}'
canonical_diff:
  update:
    - entity: Module
      desc: Complete Module 2 only after every content item is finished
      where:
        id:
          expr: "x == target['next_available_module_id']"
      changes:
        status: {eq: completed}
        content_items:
          expr: "all(item.get('completed') is True for item in x)"
      weight: 1.0
  invariant:
    - collection: state.modules
      filter: "a.id != target['next_available_module_id']"
      preserve: ALL
      weight: 1.0
    - collection: state.courses
      preserve: ALL
      weight: 1.0
    - collection: state.enrollments
      preserve: ALL
      weight: 1.0
    - collection: state.assignments
      preserve: ALL
      weight: 1.0
    - collection: state.discussions
      preserve: ALL
      weight: 1.0
    - collection: state.discussion_posts
      preserve: ALL
      weight: 1.0
    - collection: state.peer_reviews
      preserve: ALL
      weight: 1.0
    - collection: state.announcements
      preserve: ALL
      weight: 1.0
    - collection: state.grades
      preserve: ALL
      weight: 1.0
  named_invariants:
    - name: Agent did not modify other modules
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
  constraints:
    - desc: Completing Module 2 unlocks Module 3 in the chain
      expr: >-
        state.get_module(target['first_locked_module_id']) is not None
        and state.is_module_unlocked(target['first_locked_module_id'])
      severity: high
eval:
  source: server_state
  checks:
  - expr: state.get_module('{target.next_available_module_id}') is not None and state.get_module('{target.next_available_module_id}').status
      == 'completed'
    desc: Module 2 is completed
  - expr: "all(item.completed\n    for item in state.get_module('{target.next_available_module_id}').content_items)"
    desc: All content items in Module 2 are completed
  - expr: state.get_module('{target.first_locked_module_id}') is None or state.is_module_unlocked('{target.first_locked_module_id}')
    desc: Module 3 is now unlocked
  - expr: "all(e.status == 'enrolled'\n    for e in state.enrollments)"
    desc: All enrollments remain active
  negative_checks:
  - expr: "not any(m.status == 'completed'\n        and m.id not in ['{target.next_available_module_id}']\n\
      \        and not all(item.completed for item in m.content_items)\n        for\
      \ m in state.modules\n        if m.course_id == '{target.target_course_id}')"
    desc: No modules were force-completed without finishing content
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
