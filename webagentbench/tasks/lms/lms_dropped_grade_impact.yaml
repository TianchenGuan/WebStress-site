task_id: lms_dropped_grade_impact
env_id: lms
title: Calculate Impact of Dropped Grade on Standing
instruction_template: In {target.course_code}, calculate the difference between your
  weighted grade with and without the drop-lowest policy. If the drop makes more than
  a 3-point difference, resubmit the dropped assignment (the lowest homework) with
  file 'improvement.pdf' to try to improve it further. If the drop makes a 3-point
  difference or less, mark the course's latest announcement as read.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.7
    outputs:
    - assignment_ids
    - lowest_homework_id
  - use: announcements_feed
    params:
      count: 3
      unread_count: 1
    outputs:
    - announcement_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - dropped_grade_ids
    - drop_impact_above_3
    - latest_announcement_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    lowest_hw_id: '{output.lowest_homework_id}'
    drop_impact_above_3: '{output.drop_impact_above_3}'
    latest_announcement_id: '{output.latest_announcement_id}'
canonical_diff:
  oneof:
  # Branch discriminator baked into Update where-clause (was a critical constraint).
  - update:
    - entity: Assignment
      desc: Resubmit the lowest homework with improvement.pdf (drop changes weighted grade > 3 pts)
      where:
        id:
          expr: "x == target['lowest_hw_id'] and target['drop_impact_above_3'] == 'true'"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: improvement.pdf
        attempt_count:
          expr: "x >= 2"
        submitted_at:
          expr: "x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['lowest_hw_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent resubmitted the lowest homework
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: only matches when drop changes grade by 3 pts or less.
  - update:
    - entity: Announcement
      desc: Mark the latest announcement as read (drop impact within 3 pts)
      where:
        id:
          expr: "x == target['latest_announcement_id'] and target['drop_impact_above_3'] == 'false'"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.announcements
      filter: "a.id != target['latest_announcement_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent marked the latest announcement as read
      ref: update[0]
      severity: high
    - name: Agent did not modify other announcements
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.drop_impact_above_3}' == 'true'\n and state.get_assignment('{target.lowest_hw_id}')\
      \ is not None\n and state.get_assignment('{target.lowest_hw_id}').submission_status\
      \ in ('submitted', 'late')\n and state.get_assignment('{target.lowest_hw_id}').file_name\
      \ == 'improvement.pdf')\nor ('{target.drop_impact_above_3}' == 'false'\n   \
      \ and state.get_announcement('{target.latest_announcement_id}') is not None\n\
      \    and state.get_announcement('{target.latest_announcement_id}').is_read ==\
      \ True))"
    desc: Resubmit lowest homework with improvement.pdf if drop impact > 3 points,
      or mark latest announcement as read if impact <= 3 points
  negative_checks:
  - expr: '''{target.drop_impact_above_3}'' != ''true'' or state.get_announcement(''{target.latest_announcement_id}'')
      is None or state.get_announcement(''{target.latest_announcement_id}'').is_read
      != True'
    desc: Did not mark announcement as read when drop impact > 3 (wrong branch)
    penalty: 0.3
  - expr: '''{target.drop_impact_above_3}'' != ''false'' or state.get_assignment(''{target.lowest_hw_id}'')
      is None or state.get_assignment(''{target.lowest_hw_id}'').file_name != ''improvement.pdf'''
    desc: Did not resubmit when drop impact <= 3 (wrong branch)
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
