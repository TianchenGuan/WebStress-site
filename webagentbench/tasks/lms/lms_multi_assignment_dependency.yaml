task_id: lms_multi_assignment_dependency
env_id: lms
title: Multi-Assignment Dependency Chain
instruction_template: 'Complete a sequential dependency chain in {target.course_code}:
  (1) First, complete the next available module''s content items (reading and video).
  (2) Then submit the module''s linked quiz assignment ({target.target_quiz_assignment_id})
  with file "quiz_answers.pdf".
  (3) After the quiz, complete the peer review for a classmate''s essay (score all
  rubric criteria with at least 30 characters of comments). (4) Finally, submit your
  own project assignment with file "project_final.pdf". You must complete these in
  order -- the quiz must be submitted before the peer review, and the peer review
  before the project.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 45
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS201
      grading_template_indices:
      - 0
      - 3
      - 0
    outputs:
    - course_ids
    - course_codes
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.4
      missing_count: 2
      target_assignment_status: not_submitted
    outputs:
    - assignment_ids
    - target_quiz_assignment_id
    - target_project_assignment_id
    - target_essay_assignment_id
    - decoy_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  - use: module_sequence
    params:
      count: 4
      chain_type: linear
      completed_count: 2
      linked_assignment_id: '{output.target_quiz_assignment_id}'
    outputs:
    - module_ids
    - next_available_module_id
  - use: peer_review_assignments
    params:
      count: 2
      assignment_id: '{output.target_essay_assignment_id}'
      statuses:
      - assigned
      - assigned
    outputs:
    - review_ids
    - pending_review_ids
    - target_review_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    target_quiz_assignment_id: '{output.target_quiz_assignment_id}'
    target_project_assignment_id: '{output.target_project_assignment_id}'
    target_essay_assignment_id: '{output.target_essay_assignment_id}'
    target_review_id: '{output.target_review_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    next_available_module_id: '{output.next_available_module_id}'
    pending_review_ids: '{output.pending_review_ids}'
    module_ids: '{output.module_ids}'
canonical_diff:
  update:
  - entity: Module
    desc: Complete the next available module after finishing every content item
    where:
      id:
        expr: "x == target['next_available_module_id']"
    changes:
      status:
        eq: completed
      content_items:
        expr: "all(item.get('completed') is True for item in x)"
  - entity: Assignment
    desc: Submit the linked quiz assignment with quiz_answers.pdf
    where:
      id:
        expr: "x == target['target_quiz_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: quiz_answers.pdf
  - entity: PeerReview
    desc: Complete the pending peer review with full rubric scores and detailed comments
    where:
      id:
        expr: "x == target['target_review_id']"
    changes:
      rubric_scores:
        expr: >-
          len(x) == 3
          and set(x) == {'clarity', 'depth', 'originality'}
          and all(1 <= v <= 5 for v in x.values())
      comments:
        expr: "len(x.strip()) >= 30"
      status:
        eq: submitted
  - entity: Assignment
    desc: Submit the project assignment with project_final.pdf
    where:
      id:
        expr: "x == target['target_project_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: project_final.pdf
  invariant:
  # Allow the backend's prerequisite-unlock cascade: completing the next
  # available module flips later locked modules in the same course to
  # status='available'. A manually-completed extra module ends in
  # status='completed' and is still flagged.
  - collection: state.modules
    filter: "a.id != target['next_available_module_id'] and a.status != 'available'"
    preserve: ALL
  - collection: state.assignments
    filter: "a.id not in [target['target_quiz_assignment_id'], target['target_project_assignment_id']]"
    preserve: ALL
  - collection: state.assignments
    filter: "a.id == target['decoy_assignment_id']"
    preserve: ALL
  - collection: state.peer_reviews
    filter: "a.id != target['target_review_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent completed the next available module
    ref: update[0]
    severity: high
  - name: Agent submitted the linked quiz assignment
    ref: update[1]
    severity: high
  - name: Agent completed the pending peer review
    ref: update[2]
    severity: high
  - name: Agent submitted the project assignment
    ref: update[3]
    severity: high
  - name: Agent did not modify other modules
    ref: invariant[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[1]
    severity: high
  - name: Agent did not touch the decoy assignment
    ref: invariant[2]
    severity: critical
  - name: Agent did not modify other peer reviews
    ref: invariant[3]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[4]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[5]
    severity: high
  - name: Agent did not modify discussions
    ref: invariant[6]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[8]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[9]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[10]
    severity: low
  - name: Agent did not send messages
    ref: invariant[11]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "any(m.id == '{target.next_available_module_id}' and m.status == 'completed'\n    for m in state.modules)"
    desc: Module was completed
  - expr: "any(a.file_name == 'quiz_answers.pdf'\n    and a.submission_status in ('submitted', 'late')\n    and a.course_id == '{target.target_course_id}'\n    for a in state.assignments)"
    desc: Quiz submitted with correct file in target course
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n    and len(pr.rubric_scores) >= 3\n    for pr in state.peer_reviews)"
    desc: Peer review completed with full rubric
  - expr: "any(pr.status == 'submitted'\n    and pr.reviewer_student_id == state.student.id\n    and len(pr.comments) >= 30\n    for pr in state.peer_reviews)"
    desc: Peer review has 30+ character comments
  - expr: "any(a.file_name == 'project_final.pdf'\n    and a.submission_status in ('submitted', 'late')\n    and a.course_id == '{target.target_course_id}'\n    for a in state.assignments)"
    desc: Project submitted with correct file in target course
  - expr: "any(m.id == '{target.next_available_module_id}'\n    and all(ci.completed for ci in m.content_items)\n    for m in state.modules)"
    desc: All module content items completed
  negative_checks:
  - expr: state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status == 'not_submitted'
    desc: Decoy assignment was not submitted
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: "not any(pr.status == 'submitted'\n        and pr.reviewer_student_id == state.student.id\n        and len(pr.rubric_scores) < 3\n        for pr in state.peer_reviews)"
    desc: No incomplete peer reviews were submitted
    penalty: 0.2
secondary_primitives: []
