task_id: lms_waitlist_strategy
env_id: lms
title: Waitlist Strategy Management
instruction_template: 'You are waitlisted for a preferred section of a course. Evaluate
  your options: (1) Check your waitlist position by reviewing your enrollment status
  for all courses. (2) Identify which course you are waitlisted for. (3) Check if
  there is a backup course you could take instead (review available courses and prerequisites).
  (4) Assess your current course load and GPA ({target.gpa}) to determine if adding
  another course is feasible. (5) Check the calendar for schedule conflicts with both
  the waitlisted and backup courses. Then send a brief decision message to your advisor
  ({target.advisor_name}).'
difficulty: frontier
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
- exploration
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params:
      gpa: '3.10'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params:
      include_waitlisted: true
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: calendar_events
    params:
      include_recurring: false
    outputs:
    - event_ids
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
canonical_diff:
  invariant:
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.student
    preserve: ALL
  constraints:
  - desc: Agent sent a decision message to the advisor
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and (m.get('subject', '') or '').strip() and (m.get('body', '') or '').strip() for m in state.sent_messages)"
    severity: critical
  - desc: Advisor message came from the student account
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and m.get('from') == state.student.email for m in state.sent_messages)"
    severity: high
  - desc: Agent did not send excessive messages
    expr: "len(state.sent_messages) <= 4"
    severity: medium
  named_invariants:
  - name: Agent did not modify courses
    ref: invariant[0]
    severity: medium
  - name: Agent did not modify enrollments
    ref: invariant[1]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
eval:
  source: server_state
  checks:
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent a decision message
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  negative_checks:
  - expr: sum(1 for e in state.enrollments if e.status == 'dropped') <= 1
    desc: At most one course was dropped
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.score\
      \ is None\n        for a in state.assignments)"
    desc: Agent did not submit assignments unnecessarily
    penalty: 0.1
secondary_primitives: []
