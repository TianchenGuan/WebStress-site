task_id: lms_meet_discussion_minimums
env_id: lms
title: Meet Discussion Post and Reply Minimums
instruction_template: In the discussion "{target.discussion_title}" for {target.course_code},
  meet the minimum participation requirements. Check the requirements first, then
  post and reply until the minimums are met.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
- patience
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: discussion_forums
    params:
      count: 3
      posts_per: 4
    outputs:
    - discussion_ids
    - target_discussion_id
    - target_discussion_title
    - target_course_code
  targets:
    discussion_title: '{output.target_discussion_title}'
    course_code: '{output.target_course_code}'
    target_discussion_id: '{output.target_discussion_id}'
canonical_diff:
  create:
    - entity: DiscussionPost
      desc: Create one top-level post in the target discussion
      count: 1
      properties:
        discussion_id:
          expr: "x == target['target_discussion_id']"
        author_id:
          expr: "x == state.student.id"
        author_name:
          expr: "x == state.student.name"
        body:
          any: true
        parent_post_id:
          eq: null
        timestamp:
          expr: "x >= datetime.fromisoformat(target['session_start'])"
        updated_at:
          eq: null
        is_anonymous:
          eq: false
    - entity: DiscussionPost
      desc: Create one reply in the target discussion
      count: 1
      properties:
        discussion_id:
          expr: "x == target['target_discussion_id']"
        author_id:
          expr: "x == state.student.id"
        author_name:
          expr: "x == state.student.name"
        body:
          any: true
        parent_post_id:
          expr: "x is not None"
        timestamp:
          expr: "x >= datetime.fromisoformat(target['session_start'])"
        updated_at:
          eq: null
        is_anonymous:
          eq: false
  invariant:
    - collection: state.discussion_posts
      filter: "a.discussion_id != target['target_discussion_id']"
      preserve: ALL
      comprehensive: true
      weight: 1.0
    - collection: state.discussions
      preserve: ALL
      weight: 1.0
    - collection: state.courses
      preserve: ALL
      weight: 1.0
    - collection: state.enrollments
      preserve: ALL
      weight: 1.0
    - collection: state.assignments
      preserve: ALL
      weight: 1.0
    - collection: state.modules
      preserve: ALL
      weight: 1.0
    - collection: state.peer_reviews
      preserve: ALL
      weight: 1.0
    - collection: state.announcements
      preserve: ALL
      weight: 1.0
    - collection: state.grades
      preserve: ALL
      weight: 1.0
    - collection: state.calendar_events
      preserve: ALL
      weight: 1.0
    - collection: state.sent_messages
      preserve: ALL
      weight: 1.0
  named_invariants:
    - name: Agent did not post in non-target discussions
      ref: invariant[0]
      severity: high
    - name: Agent did not modify discussions
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[2]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[3]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  constraints:
    - desc: Target discussion minimum participation requirements are met
      expr: "state.meets_discussion_requirements(target['target_discussion_id'])"
      severity: high
eval:
  source: server_state
  checks:
  - expr: state.meets_discussion_requirements('{target.target_discussion_id}')
    desc: Student meets the discussion minimum requirements
  - expr: state.get_discussion('{target.target_discussion_id}') is not None and state.student_post_count('{target.target_discussion_id}')
      >= state.get_discussion('{target.target_discussion_id}').min_posts
    desc: Student meets the minimum post count
  - expr: state.get_discussion('{target.target_discussion_id}') is not None and state.student_reply_count('{target.target_discussion_id}')
      >= state.get_discussion('{target.target_discussion_id}').min_replies
    desc: Student meets the minimum reply count
  negative_checks:
  - expr: "not any(p.author_id == state.student.id\n        and p.discussion_id !=\
      \ '{target.target_discussion_id}'\n        for p in state.discussion_posts)"
    desc: Student did not post in non-target discussions
    penalty: 0.2
secondary_primitives: []
