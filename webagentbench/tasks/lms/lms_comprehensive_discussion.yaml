task_id: lms_comprehensive_discussion
env_id: lms
title: Comprehensive Discussion Engagement
instruction_template: >-
  You need to catch up on discussion board participation across all your
  courses. For each course with open discussions: (1) Check the discussion
  requirements (minimum posts and minimum replies). (2) Read existing
  classmate posts to understand the conversation. (3) Post substantive
  original responses (at least 30 characters each) to meet the minimum
  post requirement. (4) Reply to at least the required number of classmate
  posts with substantive replies (at least 20 characters each). Complete
  all open discussions across all courses.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 50
primary_primitives:
  - patience
  - state_tracking
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "ENG102"]
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: discussion_forums
      params:
        count: 3
        posts_per: 4
      outputs:
        - discussion_ids
        - target_discussion_id
        - target_discussion_title
  targets:
    course_codes: '{output.course_codes}'
    discussion_ids: '{output.discussion_ids}'
    target_discussion_id: '{output.target_discussion_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        sum(1 for p in state.discussion_posts
            if p.author_id == state.student.id
            and p.parent_post_id is None) >= 3
      desc: Student made at least 3 original posts
    - expr: >-
        sum(1 for p in state.discussion_posts
            if p.author_id == state.student.id
            and p.parent_post_id is not None) >= 3
      desc: Student made at least 3 replies
    - expr: >-
        len(set(p.discussion_id for p in state.discussion_posts
                if p.author_id == state.student.id)) >= 3
      desc: Student participated in at least 3 different discussions
    - expr: >-
        all(len(p.body.strip()) >= 20
            for p in state.discussion_posts
            if p.author_id == state.student.id
            and p.parent_post_id is None)
      desc: All original posts are substantive (20+ chars)
    - expr: >-
        all(len(p.body.strip()) >= 20
            for p in state.discussion_posts
            if p.author_id == state.student.id
            and p.parent_post_id is not None)
      desc: All replies are substantive (20+ chars)
    - expr: >-
        any(p.discussion_id == '{target.target_discussion_id}'
            and p.author_id == state.student.id
            for p in state.discussion_posts)
      desc: Student posted in the primary target discussion
  negative_checks:
    - expr: >-
        all(len(p.body.strip()) >= 10
            for p in state.discussion_posts
            if p.author_id == state.student.id)
      desc: No empty or near-empty posts were made
      penalty: 0.2
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        sum(1 for p in state.discussion_posts
            if p.author_id == state.student.id) <= 20
      desc: Agent did not spam excessive posts
      penalty: 0.15
