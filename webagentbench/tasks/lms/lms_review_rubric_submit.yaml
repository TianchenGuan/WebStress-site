task_id: lms_review_rubric_submit
env_id: lms
title: Review Assignment Rubric Before Submitting
instruction_template: >-
  Before submitting "{target.assignment_title}" for {target.course_code},
  review the rubric criteria for the assignment. Then submit your work with
  the file "{target.file_name}".
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
  - planning
  - state_tracking
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 2
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.3
        target_assignment_status: "not_submitted"
      outputs:
        - assignment_ids
        - target_assignment_id
        - target_assignment_title
        - target_course_code
        - decoy_assignment_id
        - file_name
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    file_name: '{output.file_name}'

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').submission_status in ('submitted', 'late')
      desc: Target assignment was submitted
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').file_name == '{target.file_name}'
      desc: Correct file name attached
    - expr: >-
        all(e.status == 'enrolled'
            for e in state.enrollments)
      desc: All enrollments remain active
  negative_checks:
    - expr: >-
        state.get_assignment('{target.decoy_assignment_id}') is None
        or state.get_assignment('{target.decoy_assignment_id}').submission_status == 'not_submitted'
      desc: Decoy assignment was not submitted
      penalty: 0.25
