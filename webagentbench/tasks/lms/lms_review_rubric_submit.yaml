task_id: lms_review_rubric_submit
env_id: lms
title: Review Assignment Rubric Before Submitting
instruction_template: Before submitting "{target.assignment_title}" for {target.course_code},
  review the rubric criteria for the assignment. Then submit your work with the file
  "{target.file_name}".
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.3
      target_assignment_status: not_submitted
    outputs:
    - assignment_ids
    - target_assignment_id
    - target_assignment_title
    - target_course_code
    - decoy_assignment_id
    - file_name
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    file_name: '{output.file_name}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the assignment after reviewing the rubric
    where:
      id:
        expr: "x == target['target_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        expr: "x == target['file_name']"
      attempt_count:
        expr: "x >= 1"
      submitted_at:
        expr: "x >= session_start"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['target_assignment_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
  - name: Agent submitted the target assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: state.get_assignment('{target.target_assignment_id}') is not None and state.get_assignment('{target.target_assignment_id}').submission_status
      in ('submitted', 'late')
    desc: Target assignment was submitted
  - expr: state.get_assignment('{target.target_assignment_id}') is not None and state.get_assignment('{target.target_assignment_id}').file_name
      == '{target.file_name}'
    desc: Correct file name attached
  - expr: "all(e.status == 'enrolled'\n    for e in state.enrollments)"
    desc: All enrollments remain active
  negative_checks:
  - expr: state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status
      not in ('submitted', 'late') or state.get_assignment('{target.decoy_assignment_id}').file_name
      != '{target.file_name}'
    desc: Decoy assignment was not submitted by the agent
    penalty: 0.25
secondary_primitives: []
