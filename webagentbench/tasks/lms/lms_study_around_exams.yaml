task_id: lms_study_around_exams
env_id: lms
title: Mark Announcements Read for Courses With Upcoming Exams
instruction_template: Check the calendar for all upcoming exam dates. Mark all course
  announcements as read for courses that have an exam in the next 14 days, so you
  do not miss any last-minute exam updates. Do NOT mark announcements as read for
  courses without an upcoming exam in the next 14 days.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- state_tracking
start_path: /calendar
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: calendar_events
    params:
      include_recurring: false
      near_exam_courses: 2
    outputs:
    - event_ids
    - courses_with_upcoming_exams
    - courses_without_upcoming_exams
  - use: announcements_feed
    params:
      count: 3
      unread_count: 2
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    courses_with_upcoming_exams: '{output.courses_with_upcoming_exams}'
    courses_without_upcoming_exams: '{output.courses_without_upcoming_exams}'
    unread_announcement_ids: '{output.unread_announcement_ids}'

canonical_diff:
  update:
  - entity: Announcement
    desc: Mark unread announcements for courses with upcoming exams as read
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  invariant:
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
  - name: Agent marked the unread target announcements as read
    ref: update[0]
    severity: high
  - name: Agent did not modify already-read announcements
    ref: invariant[0]
    severity: medium
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "all(a.is_read for a in state.announcements if a.course_id in '{target.courses_with_upcoming_exams}'.split(',') and a.course_id.strip())"
    desc: All announcements for courses with upcoming exams are marked as read
  negative_checks:
  - expr: all(a.is_read for a in state.announcements if a.course_id in '{target.courses_without_upcoming_exams}'.split(',') and a.course_id.strip())
    desc: Announcements in courses without upcoming exams remain in the seeded read state
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.2
secondary_primitives: []
