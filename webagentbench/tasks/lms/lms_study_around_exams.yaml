task_id: lms_study_around_exams
env_id: lms
title: Mark Announcements Read for Courses With Upcoming Exams
instruction_template: >-
  Check the calendar for all upcoming exam dates. Mark all course
  announcements as read for courses that have an exam in the next 14 days,
  so you do not miss any last-minute exam updates. Do NOT mark announcements
  as read for courses without an upcoming exam in the next 14 days.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
  - state_tracking
  - planning
start_path: /calendar

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
    - use: calendar_events
      params:
        include_recurring: false
        near_exam_courses: 2
      outputs:
        - event_ids
        - courses_with_upcoming_exams
        - courses_without_upcoming_exams
    - use: announcements_feed
      params:
        count: 6
        unread_count: 4
      outputs:
        - announcement_ids
        - unread_announcement_ids
  targets:
    courses_with_upcoming_exams: '{output.courses_with_upcoming_exams}'
    courses_without_upcoming_exams: '{output.courses_without_upcoming_exams}'

eval:
  source: server_state
  checks:
    - expr: >-
        all(
            all(a.is_read for a in state.announcements
                if a.course_id == cid)
            for cid in '{target.courses_with_upcoming_exams}'.split(',')
            if cid.strip()
        )
      desc: All announcements for courses with upcoming exams are marked as read
  negative_checks:
    - expr: >-
        (len([cid for cid in '{target.courses_without_upcoming_exams}'.split(',') if cid.strip()]) == 0
        or not all(
            all(a.is_read for a in state.announcements if a.course_id == cid)
            for cid in '{target.courses_without_upcoming_exams}'.split(',')
            if cid.strip()
        ))
      desc: Not all announcements in non-exam courses were marked read (should be left unread)
      penalty: 0.25
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.2
