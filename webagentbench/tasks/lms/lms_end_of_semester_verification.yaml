task_id: lms_end_of_semester_verification
env_id: lms
title: End-of-Semester Grade Verification with Resubmission
instruction_template: >-
  For each course, independently compute your expected final weighted grade.
  Compare against the displayed score. For any course with a discrepancy of
  more than 1 point, resubmit the most recently graded assignment in that
  course with file "grade_audit.pdf". Mark all announcements as read across
  all courses to confirm your review.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
  - verification
  - state_tracking
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "ENG102", "PHYS201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.7
        late_count: 1
      outputs:
        - assignment_ids
        - discrepant_course_ids
        - discrepant_resubmit_assignment_ids
        - non_discrepant_course_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - dropped_grade_ids
        - current_weighted_scores
    - use: announcements_feed
      params:
        count: 6
        unread_count: 3
      outputs:
        - announcement_ids
        - unread_announcement_ids
  targets:
    discrepant_course_ids: '{output.discrepant_course_ids}'
    discrepant_resubmit_assignment_ids: '{output.discrepant_resubmit_assignment_ids}'
    non_discrepant_course_ids: '{output.non_discrepant_course_ids}'
    course_codes: '{output.course_codes}'

eval:
  source: server_state
  checks:
    - expr: >-
        all(
            state.get_assignment(aid) is not None
            and state.get_assignment(aid).submission_status in ('submitted', 'late')
            and state.get_assignment(aid).file_name == 'grade_audit.pdf'
            for aid in '{target.discrepant_resubmit_assignment_ids}'.split(',')
            if aid.strip()
        )
      desc: Most recently graded assignments in discrepant courses were resubmitted
    - expr: all(a.is_read for a in state.announcements)
      desc: All announcements are marked as read
    - expr: len(state.unread_announcements()) == 0
      desc: No unread announcements remain
  negative_checks:
    - expr: >-
        not any(a.submission_status in ('submitted', 'late')
                and a.file_name == 'grade_audit.pdf'
                and a.course_id in
                    [cid.strip() for cid in '{target.non_discrepant_course_ids}'.split(',')]
                for a in state.assignments)
      desc: No grade_audit.pdf was submitted for non-discrepant courses
      penalty: 0.25
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during verification
      penalty: 0.3
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'grade_audit.pdf'
             and a.submission_status in ('submitted', 'late')]) <= len('{target.discrepant_resubmit_assignment_ids}'.split(','))
      desc: No more grade_audit.pdf submissions than discrepant courses
      penalty: 0.15
