task_id: lms_end_of_semester_verification
env_id: lms
title: End-of-Semester Grade Verification
instruction_template: >-
  It's the end of the semester. For each of your courses, independently
  compute your expected final weighted grade using the syllabus grading
  policy (accounting for category weights, drop-lowest policies, and any
  late penalties). Compare your computed grade against the weighted score
  displayed on the grades page. If there's a discrepancy of more than 1
  point in any course, send a message to that course's instructor noting
  the mismatch with your computed value. Finally, send a summary to your
  advisor ({target.advisor_name}) with each course code, your computed
  grade, and whether it matched.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
  - verification
  - state_tracking
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "ENG102", "PHYS201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.7
        late_count: 1
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - dropped_grade_ids
        - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    dropped_grade_ids: '{output.dropped_grade_ids}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent at least one message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Summary message addressed to advisor
    - expr: >-
        any('CS101' in m.get('body', '') for m in state.sent_messages)
      desc: Summary covers CS101
    - expr: >-
        any('MATH201' in m.get('body', '') for m in state.sent_messages)
      desc: Summary covers MATH201
    - expr: >-
        any('ENG102' in m.get('body', '') for m in state.sent_messages)
      desc: Summary covers ENG102
    - expr: >-
        any('verif' in m.get('body', '').lower() or 'match' in m.get('body', '').lower()
            or 'discrep' in m.get('body', '').lower() or 'comput' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses verification or computation
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during verification
      penalty: 0.3
    - expr: len(state.sent_messages) <= 6
      desc: Agent did not send excessive messages
      penalty: 0.15
    - expr: >-
        not any(a.submission_status != a.submission_status
                for a in state.assignments)
      desc: No assignment statuses were inadvertently changed
      penalty: 0.1
