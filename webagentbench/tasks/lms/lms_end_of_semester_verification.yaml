task_id: lms_end_of_semester_verification
env_id: lms
title: End-of-Semester Grade Verification with Resubmission
instruction_template: >-
  For each course, independently compute your expected final weighted grade
  using the exact same LMS logic as the dashboard grade tab: average each
  category after applying drop-lowest by category and late-penalty
  adjustments, then re-normalize across weighted categories. Compare
  against the displayed score. For any course with a discrepancy of more
  than 1 point, resubmit the most recently graded assignment in that
  course with file "grade_audit.pdf". Mark all announcements as read
  across all courses to confirm your review.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
      - PHYS201
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.7
      late_count: 1
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - dropped_grade_ids
    - current_weighted_scores
    - discrepant_course_ids
    - discrepant_resubmit_assignment_ids
    - non_discrepant_course_ids
  - use: announcements_feed
    params:
      count: 6
      unread_count: 3
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    discrepant_course_ids: '{output.discrepant_course_ids}'
    discrepant_resubmit_assignment_ids: '{output.discrepant_resubmit_assignment_ids}'
    non_discrepant_course_ids: '{output.non_discrepant_course_ids}'
    course_codes: '{output.course_codes}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Resubmit the most recently graded assignment in each discrepant course
    bijection:
      over: "target['discrepant_resubmit_assignment_ids'].split(',') if target['discrepant_resubmit_assignment_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      file_name:
        eq: grade_audit.pdf
      attempt_count:
        eq: 2
      submitted_at:
        expr: "x >= session_start"
  - entity: Announcement
    desc: Mark every unread announcement as read after the review
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  invariant:
  - collection: state.assignments
    filter: "a.id not in (target['discrepant_resubmit_assignment_ids'].split(',') if target['discrepant_resubmit_assignment_ids'] else [])"
    preserve: ALL
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent resubmitted each discrepant course's latest graded assignment
    ref: update[0]
    severity: high
  - name: Agent marked all unread announcements as read
    ref: update[1]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify announcements outside the unread set
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify course records
    ref: invariant[2]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[3]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "all(\n    state.get_assignment(aid) is not None\n    and state.get_assignment(aid).submission_status\
      \ in ('submitted', 'late')\n    and state.get_assignment(aid).file_name == 'grade_audit.pdf'\n\
      \    for aid in '{target.discrepant_resubmit_assignment_ids}'.split(',')\n \
      \   if aid.strip()\n)"
    desc: Most recently graded assignments in discrepant courses were resubmitted
  - expr: all(a.is_read for a in state.announcements)
    desc: All announcements are marked as read
  - expr: len(state.unread_announcements()) == 0
    desc: No unread announcements remain
  negative_checks:
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.file_name\
      \ == 'grade_audit.pdf'\n        and a.course_id in\n            [cid.strip()\
      \ for cid in '{target.non_discrepant_course_ids}'.split(',')]\n        for a\
      \ in state.assignments)"
    desc: No grade_audit.pdf was submitted for non-discrepant courses
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during verification
    penalty: 0.3
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'grade_audit.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) <= len([aid.strip()\
      \ for aid in '{target.discrepant_resubmit_assignment_ids}'.split(',') if aid.strip()])"
    desc: No more grade_audit.pdf submissions than discrepant courses
    penalty: 0.15
secondary_primitives: []
