task_id: lms_course_load_analysis
env_id: lms
title: Course Load Analysis for Adding a Fifth Course
instruction_template: 'You''re considering adding a 5th course. Use the precomputed
  branch flag {target.can_add_course} from the seed output: if it is ''true'', the
  new course keeps your GPA at or above 3.0 and you should mark all unread
  announcements as read. If it is ''false'', assume adding the course would drop GPA
  below 3.0 and do NOT mark announcements — instead drop your lowest-performing
  current course.'
difficulty: expert
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
- planning
start_path: /dashboard
seed:
  distractors: 1
  steps:
  - use: student_profile
    params:
      gpa: '3.20'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - can_add_course
    - lowest_performing_course_id
    - lower_grade_enrollment_id
  - use: calendar_events
    params:
      include_recurring: false
    outputs:
    - event_ids
  - use: announcements_feed
    params: {}
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    gpa: '{output.gpa}'
    num_courses: '4'
    can_add_course: '{output.can_add_course}'
    lowest_performing_course_id: '{output.lowest_performing_course_id}'
    lower_grade_enrollment_id: '{output.lower_grade_enrollment_id}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  oneof:
  - constraints:
    - desc: GPA stays above 3.0 when adding a fifth course
      expr: "target['can_add_course'] == 'true'"
      severity: critical
    update:
    - entity: Announcement
      desc: Mark all unread announcements as read after confirming the GPA is safe
      bijection:
        over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.announcements
      filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent marked all unread announcements as read
      ref: update[0]
      severity: high
    - name: Agent did not modify announcements
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  - constraints:
    - desc: GPA would drop below 3.0 with a fifth course
      expr: "target['can_add_course'] == 'false'"
      severity: critical
    update:
    - entity: Enrollment
      desc: Drop the lowest-performing current course
      where:
        course_id:
          expr: "x == target['lowest_performing_course_id']"
      changes:
        status:
          eq: dropped
    invariant:
    - collection: state.announcements
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      filter: "a.course_id != target['lowest_performing_course_id']"
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent dropped the lowest-performing course enrollment
      ref: update[0]
      severity: high
    - name: Agent did not modify announcements
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify enrollments other than the target course
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.can_add_course}' == 'true'\n and all(a.is_read == True for a\
      \ in state.announcements))\nor ('{target.can_add_course}' == 'false'\n    and\
      \ state.get_enrollment_for_course('{target.lowest_performing_course_id}') is\
      \ not None\n    and state.get_enrollment_for_course('{target.lowest_performing_course_id}').status\
      \ == 'dropped'))"
    desc: Mark all announcements read if GPA stays above 3.0, or drop lowest course
      if GPA would drop below 3.0
  negative_checks:
  - expr: '''{target.can_add_course}'' != ''true'' or all(e.status != ''dropped''
      for e in state.enrollments)'
    desc: Did not drop a course when GPA would stay above 3.0 (wrong branch)
    penalty: 0.5
  - expr: '''{target.can_add_course}'' != ''false'' or all(a.id not in [x.strip() for x in ''{target.unread_announcement_ids}''.split('','') if x.strip()] or not a.is_read for a in state.announcements)'
    desc: Did not mark unread announcements when GPA would drop below 3.0 (wrong
      branch)
    penalty: 0.3
  - expr: '''{target.can_add_course}'' != ''false'' or sum(1 for e in state.enrollments
      if e.status == ''dropped'') <= 1'
    desc: Only one course was dropped (not multiple)
    penalty: 0.3
secondary_primitives: []
