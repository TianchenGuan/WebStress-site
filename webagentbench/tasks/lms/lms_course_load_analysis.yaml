task_id: lms_course_load_analysis
env_id: lms
title: Course Load Analysis for Adding a Fifth Course
instruction_template: >-
  You're considering adding a 5th course to your schedule. Analyze your
  current course load: for each of your {target.num_courses} enrolled courses,
  check your current weighted score, count remaining ungraded assignments,
  and note upcoming deadlines. Then determine if your current GPA of
  {target.gpa} would be at risk (drop below 3.0) if you added another
  3-credit course and performed average (C/70%) in it. Send your analysis
  and recommendation to your advisor ({target.advisor_name}).
difficulty: expert
time_limit_seconds: 360
expected_steps: 20
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /dashboard

seed:
  distractors: 1
  steps:
    - use: student_profile
      params:
        gpa: "3.20"
      outputs:
        - student_id
        - advisor_name
        - gpa
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
    - use: calendar_events
      params:
        include_recurring: false
      outputs:
        - event_ids
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    num_courses: "4"
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent at least one message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message addressed to advisor
    - expr: >-
        any('GPA' in m.get('body', '').upper() or 'gpa' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses GPA impact
    - expr: >-
        any('3.0' in m.get('body', '') or 'three' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message references the 3.0 GPA threshold
    - expr: >-
        any('recommend' in m.get('body', '').lower() or 'advise' in m.get('body', '').lower()
            or 'should' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message includes a recommendation
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
    - expr: len(state.sent_messages) <= 3
      desc: Agent did not send excessive messages
      penalty: 0.15
