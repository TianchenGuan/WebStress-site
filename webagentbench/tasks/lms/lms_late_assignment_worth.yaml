task_id: lms_late_assignment_worth
env_id: lms
title: Identify Late Assignments Still Worth Submitting
instruction_template: >-
  Review all your missing assignments across all courses. For each one,
  calculate whether submitting it late would still yield a positive score
  after the late penalty. Send a message to your advisor listing which
  assignments are still worth submitting and which are not.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
        - strictest_late_policy_course_id
        - most_lenient_late_policy_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.4
        missing_count: 3
      outputs:
        - assignment_ids
        - missing_assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
  targets:
    missing_assignment_ids: '{output.missing_assignment_ids}'
    strictest_course_id: '{output.strictest_late_policy_course_id}'
    most_lenient_course_id: '{output.most_lenient_late_policy_course_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent a triage message to advisor
    - expr: >-
        len(state.missing_assignments()) >= 1
      desc: Missing assignments exist for analysis
    - expr: >-
        any('worth' in m.get('body', '').lower()
            or 'submit' in m.get('body', '').lower()
            or 'penalty' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses submission worthiness or penalties
    - expr: >-
        any(any(state.get_assignment(a.id).title in m.get('body', '')
                for a in state.missing_assignments()
                if state.get_assignment(a.id) is not None)
            for m in state.sent_messages
            if m.get('body'))
      desc: Message mentions at least one missing assignment by title
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
    - expr: >-
        not any(a.submission_status == 'submitted'
                and a.id not in [mid for mid in state.missing_assignments()]
                for a in state.assignments
                if a.submission_status == 'not_submitted')
      desc: No irrelevant assignments were submitted
      penalty: 0.2
