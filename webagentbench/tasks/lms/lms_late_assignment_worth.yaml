task_id: lms_late_assignment_worth
env_id: lms
title: Submit Only Worth-It Late Assignments
instruction_template: Review all missing assignments across all courses. For each
  one, check the course's late policy using the current LMS session date. Submit all
  missing assignments that are still within the course's maximum late-days window
  and would therefore receive a positive score with file "late_submit.pdf". Do NOT
  submit assignments that are past the maximum late days allowed.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- planning
start_path: /
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.4
      missing_count: 3
      unrecoverable_missing_count: 1
    outputs:
    - assignment_ids
    - missing_assignment_ids
    - worth_submitting_ids
    - not_worth_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  targets:
    worth_submitting_ids: '{output.worth_submitting_ids}'
    not_worth_ids: '{output.not_worth_ids}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
canonical_diff:
  update:
    - entity: Assignment
      desc: Submit every worth-submitting late assignment with the required file
      bijection:
        over: "[aid.strip() for aid in target['worth_submitting_ids'].split(',') if aid.strip()]"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: late_submit.pdf
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x is not None and x >= session_start"
  invariant:
    - collection: state.assignments
      filter: "a.id not in [aid.strip() for aid in target['worth_submitting_ids'].split(',') if aid.strip()]"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent submitted every worth-submitting assignment
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(len([aid.strip() for aid in '{target.worth_submitting_ids}'.split(',')\
      \ if aid.strip()]) >= 1\nand all(\n  state.get_assignment(aid.strip()) is not\
      \ None\n  and state.get_assignment(aid.strip()).submission_status in ('submitted',\
      \ 'late')\n  and state.get_assignment(aid.strip()).file_name == 'late_submit.pdf'\n\
      \  for aid in '{target.worth_submitting_ids}'.split(',')\n  if aid.strip()))"
    desc: All worth-submitting assignments were submitted with correct file
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'late_submit.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) >= 1"
    desc: At least one late submission was made
  negative_checks:
  - expr: "not any(\n    state.get_assignment(aid) is not None\n    and state.get_assignment(aid).submission_status\
      \ in ('submitted', 'late')\n    for aid in '{target.not_worth_ids}'.split(',')\n\
      \    if aid.strip()\n)"
    desc: No past-max-late-days assignments were submitted
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during analysis
    penalty: 0.2
secondary_primitives: []
