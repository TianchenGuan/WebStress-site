task_id: lms_late_assignment_worth
env_id: lms
title: Submit Only Worth-It Late Assignments
instruction_template: >-
  Review all missing assignments across all courses. For each one, check the
  course's late policy. Submit all assignments where the late penalty would
  still leave a positive score (not past max late days) with file
  "late_submit.pdf". Do NOT submit assignments that are past the maximum late
  days allowed.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.4
        missing_count: 3
      outputs:
        - assignment_ids
        - missing_assignment_ids
        - worth_submitting_ids
        - not_worth_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
  targets:
    worth_submitting_ids: '{output.worth_submitting_ids}'
    not_worth_ids: '{output.not_worth_ids}'
    missing_assignment_ids: '{output.missing_assignment_ids}'

eval:
  source: server_state
  checks:
    - expr: >-
        len('{target.worth_submitting_ids}'.split(',')) >= 1
      desc: Worth-submitting assignments exist (seed validation)
    - expr: >-
        all(
            state.get_assignment(aid) is not None
            and state.get_assignment(aid).submission_status in ('submitted', 'late')
            and state.get_assignment(aid).file_name == 'late_submit.pdf'
            for aid in '{target.worth_submitting_ids}'.split(',')
            if aid.strip()
        )
      desc: All worth-submitting assignments were submitted with correct file
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'late_submit.pdf'
             and a.submission_status in ('submitted', 'late')]) >= 1
      desc: At least one late submission was made
    - expr: >-
        sum(1 for e in state.enrollments if e.status == 'enrolled') >= 3
      desc: All enrollments remain active during analysis
  negative_checks:
    - expr: >-
        not any(
            state.get_assignment(aid) is not None
            and state.get_assignment(aid).submission_status in ('submitted', 'late')
            for aid in '{target.not_worth_ids}'.split(',')
            if aid.strip()
        )
      desc: No past-max-late-days assignments were submitted
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.2
