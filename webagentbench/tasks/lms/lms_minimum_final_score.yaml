task_id: lms_minimum_final_score
env_id: lms
title: Calculate Minimum Final Exam Score for a B
instruction_template: Calculate the minimum score you need on the final exam in {target.course_code}
  to achieve an overall grade of B (80% or above). Account for syllabus weights and
  any dropped homework scores. If the required score is above 100 (impossible to achieve
  a B), drop the course. If the required score is achievable (100 or below), submit
  'study_plan.pdf' for the final exam assignment.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
      - MATH201
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.6
      late_count: 1
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - dropped_grade_ids
    - minimum_final_score_for_b
    - min_score_achievable
    - final_exam_assignment_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    final_exam_assignment_id: '{output.final_exam_assignment_id}'
    min_score_achievable: '{output.min_score_achievable}'
canonical_diff:
  oneof:
  - constraints:
    - desc: The minimum final score for a B is achievable
      expr: "target['min_score_achievable'] == 'true'"
      severity: critical
    update:
    - entity: Assignment
      desc: Submit study_plan.pdf for the final exam assignment
      where:
        id:
          expr: "x == target['final_exam_assignment_id']"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: study_plan.pdf
        attempt_count:
          expr: "x == 1"
        submitted_at:
          expr: "x is not None and x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['final_exam_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent submitted the final exam study plan
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  - constraints:
    - desc: The minimum final score for a B is not achievable
      expr: "target['min_score_achievable'] == 'false'"
      severity: critical
    update:
    - entity: Enrollment
      desc: Drop the target course
      where:
        id:
          expr: "x == next(e.id for e in initial.enrollments if e.course_id == target['target_course_id'])"
      changes:
        status:
          eq: dropped
    invariant:
    - collection: state.assignments
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      filter: "a.course_id != target['target_course_id']"
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent dropped the target course enrollment
      ref: update[0]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not modify other enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.min_score_achievable}' == 'true'\n and state.get_assignment('{target.final_exam_assignment_id}')\
      \ is not None\n and state.get_assignment('{target.final_exam_assignment_id}').submission_status\
      \ in ('submitted', 'late')\n and state.get_assignment('{target.final_exam_assignment_id}').file_name\
      \ == 'study_plan.pdf')\nor ('{target.min_score_achievable}' == 'false'\n   \
      \ and state.get_enrollment_for_course('{target.target_course_id}') is not None\n\
      \    and state.get_enrollment_for_course('{target.target_course_id}').status\
      \ == 'dropped'))"
    desc: Submit study_plan.pdf for final exam if B is achievable, or drop the course
      if required score exceeds 100
  negative_checks:
  - expr: '''{target.min_score_achievable}'' != ''true'' or state.get_enrollment_for_course(''{target.target_course_id}'')
      is None or state.get_enrollment_for_course(''{target.target_course_id}'').status
      != ''dropped'''
    desc: Did not drop course when B is achievable (wrong branch)
    penalty: 0.5
  - expr: '''{target.min_score_achievable}'' != ''false'' or state.get_assignment(''{target.final_exam_assignment_id}'')
      is None or state.get_assignment(''{target.final_exam_assignment_id}'').file_name
      != ''study_plan.pdf'''
    desc: Did not submit study plan when B is impossible (wrong branch)
    penalty: 0.3
secondary_primitives: []
