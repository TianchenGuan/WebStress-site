task_id: lms_minimum_final_score
env_id: lms
title: Calculate Minimum Final Exam Score for a B
instruction_template: >-
  Calculate the minimum score you need on the final exam in {target.course_code}
  to achieve an overall grade of B (80% or above). Account for the syllabus
  grading weights and any dropped homework scores. Send a message to your
  advisor with the required minimum score.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101", "MATH201"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.6
        late_count: 1
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - dropped_grade_ids
        - minimum_final_score_for_b
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    minimum_final_score_for_b: '{output.minimum_final_score_for_b}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent a message to advisor
    - expr: >-
        state.weighted_score_for_course('{target.target_course_id}') is not None
      desc: Course has graded assignments for computation
    - expr: >-
        len(state.dropped_grades_for_category('{target.target_course_id}', 'homework')) >= 0
      desc: Drop-lowest policy is accounted for (seed validation)
    - expr: >-
        any('{target.minimum_final_score_for_b}' in m.get('body', '')
            or (abs(float(m.get('body', '0').split()[-1]) -
                    float('{target.minimum_final_score_for_b}')) < 2.0
                if m.get('body', '').split()[-1].replace('.','').isdigit()
                else False)
            for m in state.sent_messages)
        or '{target.minimum_final_score_for_b}' == ''
      desc: Message contains the correct minimum score (within tolerance)
  negative_checks:
    - expr: >-
        not any(a.submission_status != a.submission_status
                for a in state.assignments)
      desc: No assignment statuses were modified
      penalty: 0.2
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
