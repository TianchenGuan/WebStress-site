task_id: lms_grade_with_curve
env_id: lms
title: Grade Calculation with Instructor Curve
instruction_template: Your instructor for {target.course_code} announced a 5-point
  curve on the midterm. Find your midterm score, add the 5-point curve, and determine
  if the curved score changes your overall letter grade for the course (A >= 90, B
  >= 80, C >= 70, D >= 60, F < 60). If the curve raises your letter grade, mark all
  announcements for that course as read to acknowledge. If it does NOT change your
  letter grade, submit 'curve_appeal.pdf' for the midterm assignment to request a
  larger curve.
difficulty: expert
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_codes
    - course_code
    - instructor_name
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.6
    outputs:
    - assignment_ids
    - exam_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - curve_changes_letter
  - use: announcements_feed
    params: {}
    outputs:
    - announcement_ids
    - unread_announcement_ids
    - course_announcement_ids
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    instructor_name: '{output.instructor_name}'
    exam_assignment_id: '{output.exam_assignment_id}'
    curve_changes_letter: '{output.curve_changes_letter}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  oneof:
  # Branch discriminator baked into the Update where-clause (was a critical constraint).
  - update:
    - entity: Announcement
      desc: Mark the unread target-course announcement as read (curve changes letter grade)
      bijection:
        over: "target['unread_announcement_ids'].split(',')[:1] if target['unread_announcement_ids'] else []"
        variable: v
      where:
        id:
          expr: "x == v and target['curve_changes_letter'] == 'true'"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.announcements
      filter: "a.course_id != target['target_course_id'] or a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent marked every target-course announcement as read
      ref: update[0]
      severity: high
    - name: Agent did not modify announcements from other courses or already-read target announcements
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: only matches when curve does not change letter grade.
  - update:
    - entity: Assignment
      desc: Submit the midterm appeal file for the exam assignment (curve does not change letter)
      where:
        id:
          expr: "x == target['exam_assignment_id'] and target['curve_changes_letter'] == 'false'"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: curve_appeal.pdf
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['exam_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    named_invariants:
    - name: Agent submitted the exam appeal file
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.curve_changes_letter}' == 'true'\n and all(\n   a.is_read ==\
      \ True\n   for a in state.announcements\n   if a.course_id == '{target.target_course_id}'\n\
      \ ))\nor ('{target.curve_changes_letter}' == 'false'\n    and state.get_assignment('{target.exam_assignment_id}')\
      \ is not None\n    and state.get_assignment('{target.exam_assignment_id}').submission_status\
      \ in ('submitted', 'late')\n    and state.get_assignment('{target.exam_assignment_id}').file_name\
      \ == 'curve_appeal.pdf'))"
    desc: Mark course announcements read if curve raises letter grade, or submit curve_appeal.pdf
      for midterm if curve does not change letter grade
  negative_checks:
  - expr: '''{target.curve_changes_letter}'' != ''true'' or state.get_assignment(''{target.exam_assignment_id}'')
      is None or state.get_assignment(''{target.exam_assignment_id}'').file_name !=
      ''curve_appeal.pdf'''
    desc: Did not submit curve appeal when curve already raises letter grade (wrong
      branch)
    penalty: 0.3
  - expr: "'{target.curve_changes_letter}' != 'false' or not all(\n  a.is_read ==\
      \ True\n  for a in state.announcements\n  if a.course_id == '{target.target_course_id}'\n\
      )"
    desc: Did not mark announcements read when curve does not change letter grade
      (wrong branch)
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
