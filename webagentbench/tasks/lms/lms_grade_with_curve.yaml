task_id: lms_grade_with_curve
env_id: lms
title: Grade Calculation with Instructor Curve
instruction_template: >-
  Your instructor for {target.course_code} announced a 5-point curve on the
  midterm. Find your midterm score, add the 5-point curve, and determine if
  the curved score changes your overall letter grade for the course (A >= 90,
  B >= 80, C >= 70, D >= 60, F < 60). If the curve raises your letter grade,
  mark all announcements for that course as read to acknowledge. If it does
  NOT change your letter grade, submit 'curve_appeal.pdf' for the midterm
  assignment to request a larger curve.
difficulty: expert
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
  - state_tracking
  - verification
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - instructor_name
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.6
      outputs:
        - assignment_ids
        - exam_assignment_id
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - curve_changes_letter
    - use: announcements_feed
      params: {}
      outputs:
        - announcement_ids
        - course_announcement_ids
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    instructor_name: '{output.instructor_name}'
    exam_assignment_id: '{output.exam_assignment_id}'
    curve_changes_letter: '{output.curve_changes_letter}'

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.curve_changes_letter}' == 'true'
         and all(
           a.is_read == True
           for a in state.announcements
           if a.course_id == '{target.target_course_id}'
         ))
        or ('{target.curve_changes_letter}' == 'false'
            and state.get_assignment('{target.exam_assignment_id}') is not None
            and state.get_assignment('{target.exam_assignment_id}').submission_status in ('submitted', 'late')
            and state.get_assignment('{target.exam_assignment_id}').file_name == 'curve_appeal.pdf'))
      desc: >-
        Mark course announcements read if curve raises letter grade, or submit
        curve_appeal.pdf for midterm if curve does not change letter grade
  negative_checks:
    - expr: >-
        '{target.curve_changes_letter}' != 'true'
        or state.get_assignment('{target.exam_assignment_id}') is None
        or state.get_assignment('{target.exam_assignment_id}').file_name != 'curve_appeal.pdf'
      desc: Did not submit curve appeal when curve already raises letter grade (wrong branch)
      penalty: 0.3
    - expr: >-
        '{target.curve_changes_letter}' != 'false'
        or not all(
          a.is_read == True
          for a in state.announcements
          if a.course_id == '{target.target_course_id}'
        )
      desc: Did not mark announcements read when curve does not change letter grade (wrong branch)
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
