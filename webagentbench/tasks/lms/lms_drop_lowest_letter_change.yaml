task_id: lms_drop_lowest_letter_change
env_id: lms
title: Determine If Dropping Lowest Quiz Changes Letter Grade
instruction_template: >-
  In {target.course_code}, determine whether applying the drop-lowest policy
  changes your letter grade (A >= 90, B >= 80, C >= 70, D >= 60, F < 60).
  Compute your weighted grade both with and without the drop. If dropping
  the lowest changes your letter grade to a higher one, submit
  'letter_grade_report.pdf' for the lowest-scoring homework (the one that
  would be dropped). If dropping the lowest does NOT change your letter
  grade, no action is needed.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
  - state_tracking
  - verification
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.7
      outputs:
        - assignment_ids
        - lowest_hw_id
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
        - dropped_grade_ids
        - drop_changes_letter
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    drop_changes_letter: '{output.drop_changes_letter}'
    lowest_hw_id: '{output.lowest_hw_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.drop_changes_letter}' == 'true'
         and state.get_assignment('{target.lowest_hw_id}') is not None
         and state.get_assignment('{target.lowest_hw_id}').submission_status in ('submitted', 'late')
         and state.get_assignment('{target.lowest_hw_id}').file_name == 'letter_grade_report.pdf')
        or ('{target.drop_changes_letter}' == 'false'
            and (state.get_assignment('{target.lowest_hw_id}') is None
                 or state.get_assignment('{target.lowest_hw_id}').file_name != 'letter_grade_report.pdf')))
      desc: >-
        Submit letter_grade_report.pdf for lowest homework if drop changes
        letter grade, or no submission if it does not
    - expr: >-
        state.weighted_score_for_course('{target.target_course_id}') is not None
      desc: Weighted score is computable (seed validation)
    - expr: >-
        state.get_assignment('{target.lowest_hw_id}') is not None
      desc: Lowest homework assignment exists (seed validation)
    - expr: >-
        sum(1 for e in state.enrollments if e.status == 'enrolled') >= 3
      desc: All enrollments remain active during analysis
  negative_checks:
    - expr: >-
        '{target.drop_changes_letter}' != 'false'
        or state.get_assignment('{target.lowest_hw_id}') is None
        or state.get_assignment('{target.lowest_hw_id}').file_name != 'letter_grade_report.pdf'
      desc: Did not submit when drop does not change letter grade (wrong branch)
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
