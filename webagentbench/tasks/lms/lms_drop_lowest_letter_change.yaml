task_id: lms_drop_lowest_letter_change
env_id: lms
title: Determine If Dropping Lowest Quiz Changes Letter Grade
instruction_template: In {target.course_code}, determine whether applying the drop-lowest
  policy changes your letter grade (A >= 90, B >= 80, C >= 70, D >= 60, F < 60). Compute
  your weighted grade both with and without the drop. If dropping the lowest changes
  your letter grade to a higher one, submit 'letter_grade_report.pdf' for the lowest-scoring
  homework (the one that would be dropped). If dropping the lowest does NOT change
  your letter grade, mark the course's latest announcement as read to confirm you
  have reviewed the drop policy.
difficulty: hard
time_limit_seconds: 240
expected_steps: 12
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.7
    outputs:
    - assignment_ids
    - lowest_hw_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - dropped_grade_ids
    - drop_changes_letter
  - use: announcements_feed
    params:
      count: 3
      unread_count: 1
    outputs:
    - announcement_ids
    - latest_announcement_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    drop_changes_letter: '{output.drop_changes_letter}'
    lowest_hw_id: '{output.lowest_hw_id}'
    latest_announcement_id: '{output.latest_announcement_id}'
canonical_diff:
  oneof:
  # Branch discriminator baked into Update where-clause (was a critical constraint).
  - update:
    - entity: Assignment
      desc: Submit the lowest-scoring homework with letter_grade_report.pdf (drop changes letter grade)
      where:
        id:
          expr: "x == target['lowest_hw_id'] and target['drop_changes_letter'] == 'true'"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: letter_grade_report.pdf
        attempt_count:
          expr: "x >= 2"
        submitted_at:
          expr: "x is not None and x >= session_start"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['lowest_hw_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    named_invariants:
    - name: Agent submitted the lowest homework with the report file
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: only matches when dropping does not change the letter grade.
  - update:
    - entity: Announcement
      desc: Mark the latest announcement as read (drop does not change letter grade)
      where:
        id:
          expr: "x == target['latest_announcement_id'] and target['drop_changes_letter'] == 'false'"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.announcements
      filter: "a.id != target['latest_announcement_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    named_invariants:
    - name: Agent marked the latest announcement as read
      ref: update[0]
      severity: high
    - name: Agent did not modify non-target announcements
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "(('{target.drop_changes_letter}' == 'true'\n and state.get_assignment('{target.lowest_hw_id}')\
      \ is not None\n and state.get_assignment('{target.lowest_hw_id}').submission_status\
      \ in ('submitted', 'late')\n and state.get_assignment('{target.lowest_hw_id}').file_name\
      \ == 'letter_grade_report.pdf')\nor ('{target.drop_changes_letter}' == 'false'\n\
      \    and state.get_announcement('{target.latest_announcement_id}') is not None\n\
      \    and state.get_announcement('{target.latest_announcement_id}').is_read ==\
      \ True))"
    desc: Submit letter_grade_report.pdf for lowest homework if drop changes letter
      grade, or mark latest announcement as read if it does not
  negative_checks:
  - expr: '''{target.drop_changes_letter}'' != ''false'' or state.get_announcement(''{target.latest_announcement_id}'')
      is None or state.get_announcement(''{target.latest_announcement_id}'').is_read
      == True'
    desc: Did not mark announcement as read when drop does not change letter grade
      (wrong branch)
    penalty: 0.3
  - expr: '''{target.drop_changes_letter}'' != ''true'' or state.get_assignment(''{target.lowest_hw_id}'')
      is None or state.get_assignment(''{target.lowest_hw_id}'').file_name != ''letter_grade_report.pdf'''
    desc: Did not submit when drop changes letter grade (wrong branch)
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during analysis
    penalty: 0.3
secondary_primitives: []
