task_id: lms_gpa_impact_analysis
env_id: lms
title: GPA Impact Analysis — Submit or Acknowledge
instruction_template: >-
  Analyze how your final grades would affect your cumulative GPA. For each
  course, determine your projected letter grade from the current weighted
  score. If any course's projected grade would lower your cumulative GPA
  below {target.gpa}, submit "improvement_plan.pdf" for the highest-impact
  unsubmitted assignment in that course. If all courses maintain or improve
  GPA, mark all announcements as read to confirm your review.
difficulty: expert
time_limit_seconds: 420
expected_steps: 25
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /dashboard

seed:
  distractors: 2
  steps:
    - use: student_profile
      params:
        gpa: "3.15"
      outputs:
        - student_id
        - student_name
        - gpa
        - advisor_name
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "ENG102"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.6
        late_count: 1
      outputs:
        - assignment_ids
        - gpa_risk_course_ids
        - improvement_assignment_ids
        - no_risk_flag
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
    - use: announcements_feed
      params:
        count: 4
        unread_count: 2
      outputs:
        - announcement_ids
        - unread_announcement_ids
  targets:
    gpa: '{output.gpa}'
    gpa_risk_course_ids: '{output.gpa_risk_course_ids}'
    improvement_assignment_ids: '{output.improvement_assignment_ids}'
    no_risk_flag: '{output.no_risk_flag}'

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.no_risk_flag}' == 'true'
         and all(a.is_read for a in state.announcements))
        or ('{target.no_risk_flag}' != 'true'
            and all(
                state.get_assignment(aid) is not None
                and state.get_assignment(aid).submission_status in ('submitted', 'late')
                and state.get_assignment(aid).file_name == 'improvement_plan.pdf'
                for aid in '{target.improvement_assignment_ids}'.split(',')
                if aid.strip()
            )))
      desc: >-
        Either all announcements read (no risk) or improvement assignments
        submitted (risk detected)
    - expr: >-
        (('{target.no_risk_flag}' == 'true'
         and len(state.unread_announcements()) == 0)
        or ('{target.no_risk_flag}' != 'true'
            and len([a for a in state.assignments
                     if a.file_name == 'improvement_plan.pdf'
                     and a.submission_status in ('submitted', 'late')]) >= 1))
      desc: Correct action taken based on GPA risk analysis
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped during analysis
      penalty: 0.3
    - expr: >-
        not any(a.submission_status in ('submitted', 'late')
                and a.file_name == 'improvement_plan.pdf'
                and a.course_id not in
                    [cid.strip() for cid in '{target.gpa_risk_course_ids}'.split(',')]
                for a in state.assignments)
      desc: No improvement submissions in non-risk courses
      penalty: 0.25
