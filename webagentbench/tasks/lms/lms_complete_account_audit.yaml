task_id: lms_complete_account_audit
env_id: lms
title: Complete Account Audit
instruction_template: "Perform a practical account audit: mark all unread announcements
  as read, then send a brief audit summary to your advisor ({target.advisor_name}).
  This task verifies announcement hygiene and reporting; all other audit details are
  optional context notes."
difficulty: frontier
time_limit_seconds: 600
expected_steps: 45
primary_primitives:
- patience
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
    - advisor_name
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      late_count: 1
      resubmit_count: 1
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
  - use: module_sequence
    params:
      count: 4
      completed_count: 2
    outputs:
    - module_ids
  - use: discussion_forums
    params:
      count: 2
      posts_per: 3
    outputs:
    - discussion_ids
  - use: peer_review_assignments
    params:
      count: 3
      statuses:
      - submitted
      - in_progress
      - assigned
    outputs:
    - review_ids
    - pending_review_ids
    - completed_review_ids
  - use: announcements_feed
    params:
      count: 4
      unread_count: 1
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    advisor_name: '{output.advisor_name}'
    course_codes: '{output.course_codes}'
    course_ids: '{output.course_ids}'
    pending_review_ids: '{output.pending_review_ids}'
    completed_review_ids: '{output.completed_review_ids}'
    module_ids: '{output.module_ids}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  update:
  - entity: Announcement
    desc: Mark all unread announcements as read
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  invariant:
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  named_invariants:
  - name: Agent marked all unread announcements as read
    ref: update[0]
    severity: high
  - name: Agent did not modify already-read announcements
    ref: invariant[0]
    severity: medium
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  constraints:
  - desc: Agent sent a brief audit summary to the advisor
    expr: "len(state.sent_messages) >= 1 and any(target['advisor_name'] in m.get('to', '') for m in state.sent_messages)"
    severity: high
  - desc: Agent did not send excessive messages
    expr: len(state.sent_messages) <= 4
    severity: low
eval:
  source: server_state
  checks:
  - expr: all(a.is_read for a in state.announcements)
    desc: All announcements marked as read
  - expr: len([a for a in state.announcements if a.is_read]) == len(state.announcements)
    desc: Every single announcement has been read
  - expr: "all(e.status == 'enrolled'\n    for e in state.enrollments)"
    desc: All enrollments remain active (none dropped during audit)
  - expr: "len([pr for pr in state.peer_reviews\n     if pr.reviewer_student_id ==\
      \ state.student.id]) >= 1"
    desc: Student has peer review records present (seed validation)
  - expr: len(state.modules) >= 1
    desc: Module records exist (seed validation)
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent an audit report
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during audit
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.file_name\
      \ is not None\n        and 'audit' in (a.file_name or '').lower()\n        for\
      \ a in state.assignments)"
    desc: Agent did not submit files as part of audit
    penalty: 0.1
secondary_primitives: []
