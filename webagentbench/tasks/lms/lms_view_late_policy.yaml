task_id: lms_view_late_policy
env_id: lms
title: Check Late Policy and Conditionally Submit
instruction_template: Check the syllabus late policy for {target.course_code}. If
  the policy allows more than 3 late days, submit your overdue assignment "{target.overdue_assignment_title}"
  with file "late_submit.pdf". If 3 or fewer late days are allowed, mark the course's
  latest announcement as read to confirm you have reviewed the late policy.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
- grounding
start_path: /courses
seed:
  distractors: 0
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      vary_late_policies: true
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 4
      missing_count: 1
    outputs:
    - assignment_ids
    - overdue_assignment_id
    - overdue_assignment_title
    - allows_late_submit
  - use: announcements_feed
    params:
      count: 3
      unread_count: 2
    outputs:
    - announcement_ids
    - latest_announcement_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    overdue_assignment_id: '{output.overdue_assignment_id}'
    overdue_assignment_title: '{output.overdue_assignment_title}'
    allows_late_submit: '{output.allows_late_submit}'
    latest_announcement_id: '{output.latest_announcement_id}'
canonical_diff:
  oneof:
  # Branch discriminator baked into the Update where-clause: the predicate
  # only matches when target['allows_late_submit'] == 'true'. If the
  # target does NOT allow late submit, the where-clause never holds, this
  # branch's positive entry fails, and the oneof selector picks branch 2.
  - update:
    - entity: Assignment
      desc: Submit the overdue assignment with late_submit.pdf (target allows late submit)
      where:
        id:
          expr: "x == target['overdue_assignment_id'] and target['allows_late_submit'] == 'true'"
      changes:
        submission_status:
          in:
          - submitted
          - late
        file_name:
          eq: late_submit.pdf
        # Relax attempt_count from `eq: 1` to `>= 1`. The task only cares
        # that the agent submitted the file; exploratory retries during
        # form-fill should not fail the match.
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x is not None and initial.get_assignment(target['overdue_assignment_id']) is not None and x >= initial.get_assignment(target['overdue_assignment_id']).due_at"
    invariant:
    - collection: state.assignments
      filter: "a.id != target['overdue_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent submitted the overdue assignment
      ref: update[0]
      severity: high
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
  # Branch 2: target does NOT allow late submit. Discriminator baked
  # into the Update where-clause as in branch 1.
  - update:
    - entity: Announcement
      desc: Mark the latest announcement as read (target does not allow late submit)
      where:
        id:
          expr: "x == target['latest_announcement_id'] and target['allows_late_submit'] != 'true'"
      changes:
        is_read:
          eq: true
    invariant:
    - collection: state.announcements
      filter: "a.id != target['latest_announcement_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
    - collection: state.student
      preserve: ALL
    constraints:
    - desc: Agent did not send messages
      expr: "len(state.sent_messages) == 0"
      severity: medium
    named_invariants:
    - name: Agent marked the latest announcement as read
      ref: update[0]
      severity: high
    - name: Agent did not modify other announcements
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: ('{target.allows_late_submit}' == 'true' and state.get_assignment('{target.overdue_assignment_id}')
      is not None and state.get_assignment('{target.overdue_assignment_id}').submission_status
      in ('submitted', 'late') and state.get_assignment('{target.overdue_assignment_id}').file_name
      == 'late_submit.pdf') or ('{target.allows_late_submit}' != 'true' and len([a
      for a in state.announcements if a.is_read]) > len([aid for aid, snap in state._initial_snapshot.get('announcements',
      {}).items() if snap.get('is_read')]))
    desc: Submit late_submit.pdf if max_late_days > 3, or mark at least one announcement
      as read if 3 or fewer late days
  negative_checks:
  - expr: "'{target.allows_late_submit}' != 'true' or len([a for a in state.assignments\n\
      \        if a.file_name == 'late_submit.pdf'\n        and a.submission_status\
      \ in ('submitted', 'late')]) <= 1"
    desc: At most one assignment was submitted with late_submit.pdf
    penalty: 0.2
  - expr: '''{target.allows_late_submit}'' == ''true'' or state.get_assignment(''{target.overdue_assignment_id}'')
      is None or state.get_assignment(''{target.overdue_assignment_id}'').submission_status
      == ''not_submitted'''
    desc: Did not submit assignment when late policy does not allow it
    penalty: 0.3
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.2
secondary_primitives: []
