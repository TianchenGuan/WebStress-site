task_id: lms_exam_conflict
env_id: lms
title: Resolve Exam Scheduling Conflict by Dropping Lower-Grade Course
instruction_template: Check the calendar for upcoming exam dates. Identify any cluster
  of exam events that share a date. If multiple courses conflict on the same day,
  evaluate all of them as candidates and drop the single course with the lower
  weighted grade among the conflicting set.
difficulty: expert
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- exploration
start_path: /calendar
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - PHYS201
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
      graded_fraction: 0.5
    outputs:
    - assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: calendar_events
    params:
      include_recurring: false
      force_exam_conflict: true
    outputs:
    - event_ids
    - conflicting_course_ids
    - lower_grade_conflict_course_id
    - higher_grade_conflict_course_id
    - lower_grade_conflict_enrollment_id
  - use: announcements_feed
    params:
      count: 4
      unread_count: 1
    outputs:
    - announcement_ids
  targets:
    lower_grade_conflict_course_id: '{output.lower_grade_conflict_course_id}'
    higher_grade_conflict_course_id: '{output.higher_grade_conflict_course_id}'
    conflicting_course_ids: '{output.conflicting_course_ids}'
    lower_grade_conflict_enrollment_id: '{output.lower_grade_conflict_enrollment_id}'
canonical_diff:
  update:
  - entity: Enrollment
    desc: Drop the lower-grade conflicting course enrollment
    where:
      id:
        expr: "x == target['lower_grade_conflict_enrollment_id']"
    changes:
      status:
        eq: dropped
  invariant:
  - collection: state.enrollments
    filter: "a.course_id != target['lower_grade_conflict_course_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent dropped the lower-grade conflicting course enrollment
    ref: update[0]
    severity: high
  - name: Agent did not modify other enrollments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify assignments
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: (state.get_enrollment_for_course('{target.lower_grade_conflict_course_id}')
      is not None and state.get_enrollment_for_course('{target.lower_grade_conflict_course_id}').status
      == 'dropped')
    desc: The lower-grade conflicting course was dropped
  negative_checks:
  - expr: sum(1 for e in state.enrollments if e.status == 'dropped') <= 1
    desc: Only one course was dropped (not multiple)
    penalty: 0.3
  - expr: "not any(e.status == 'dropped'\n        and e.course_id not in\n       \
      \     [cid.strip() for cid in '{target.conflicting_course_ids}'.split(',')]\n\
      \        for e in state.enrollments)"
    desc: No non-conflicting course was dropped
    penalty: 0.3
secondary_primitives: []
