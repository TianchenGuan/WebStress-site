task_id: lms_weighted_category_optimization
env_id: lms
title: Submit Assignment in Worst High-Weight Category
instruction_template: In {target.course_code}, identify the grading category with
  the lowest average score among categories that carry at least 10% of the course
  weight. Submit an unsubmitted assignment in that category with file "category_boost.pdf".
difficulty: expert
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- verification
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_codes
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 8
      graded_fraction: 0.6
      missing_count: 1
    outputs:
    - assignment_ids
    - decoy_assignment_id
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
    - worst_category_assignment_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    worst_category_assignment_id: '{output.worst_category_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the next assignment in the worst high-weight category with the required file
    where:
      id:
        expr: "x == target['worst_category_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: category_boost.pdf
  invariant:
  - collection: state.assignments
    filter: "a.id != target['worst_category_assignment_id']"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent submitted the worst-category assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: (state.get_assignment('{target.worst_category_assignment_id}') is not None
      and state.get_assignment('{target.worst_category_assignment_id}').submission_status
      in ('submitted', 'late'))
    desc: Correct assignment in worst high-weight category was submitted
  - expr: (state.get_assignment('{target.worst_category_assignment_id}') is not None
      and state.get_assignment('{target.worst_category_assignment_id}').file_name
      == 'category_boost.pdf')
    desc: Correct file name used for category boost submission
  - expr: state.get_assignment('{target.worst_category_assignment_id}') is not None
    desc: Target worst-category assignment exists (seed validation)
  - expr: state.weighted_score_for_course('{target.target_course_id}') is not None
    desc: Course has graded assignments for analysis (seed validation)
  - expr: sum(1 for e in state.enrollments if e.status == 'enrolled') >= 3
    desc: All enrollments remain active during analysis
  negative_checks:
  - expr: (state.get_assignment('{target.decoy_assignment_id}') is None or state.get_assignment('{target.decoy_assignment_id}').submission_status
      != 'submitted')
    desc: Decoy assignment was not submitted
    penalty: 0.25
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: "len([a for a in state.assignments\n     if a.file_name == 'category_boost.pdf'\n\
      \     and a.submission_status in ('submitted', 'late')]) <= 1"
    desc: Only one assignment was submitted with category_boost.pdf
    penalty: 0.15
secondary_primitives: []
