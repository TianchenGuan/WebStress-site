task_id: lms_weighted_category_optimization
env_id: lms
title: Weighted Category Optimization with Drop-Lowest
instruction_template: >-
  In {target.course_code}, the homework category is worth 30% with a
  drop-lowest-2 policy. You have completed multiple homeworks already.
  There is one more homework you could submit late. Determine whether
  submitting it late (with the applicable late penalty) would help or hurt
  your homework category average after the drop recalculation. Check the
  late policy, compute your current homework average (after drops), then
  compute what the average would be with the late submission included and
  drops recalculated. Send a message to your advisor ({target.advisor_name})
  with your analysis and decision.
difficulty: expert
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.6
        missing_count: 1
      outputs:
        - assignment_ids
        - lowest_homework_id
        - missing_assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - dropped_grade_ids
        - current_weighted_scores
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    advisor_name: '{output.advisor_name}'
    lowest_homework_id: '{output.lowest_homework_id}'
    dropped_grade_ids: '{output.dropped_grade_ids}'
    current_weighted_scores: '{output.current_weighted_scores}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent at least one message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message addressed to advisor
    - expr: >-
        any('drop' in m.get('body', '').lower() or 'lowest' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses drop-lowest policy
    - expr: >-
        any('homework' in m.get('body', '').lower() or 'category' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message references the homework category
    - expr: >-
        any('late' in m.get('body', '').lower() or 'penalty' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message discusses late penalty impact
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: len(state.sent_messages) <= 3
      desc: Agent did not send excessive messages
      penalty: 0.15
