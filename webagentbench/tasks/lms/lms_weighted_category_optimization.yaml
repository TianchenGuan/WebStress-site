task_id: lms_weighted_category_optimization
env_id: lms
title: Submit Assignment in Worst High-Weight Category
instruction_template: >-
  Across your courses, find the grading category where you are performing
  worst relative to its weight (lowest category score in the highest-weight
  category). Submit the next unsubmitted assignment in that category with
  file "category_boost.pdf".
difficulty: expert
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
  - state_tracking
  - verification
  - planning
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_codes
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 8
        graded_fraction: 0.6
        missing_count: 1
      outputs:
        - assignment_ids
        - worst_category_assignment_id
        - decoy_assignment_id
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    worst_category_assignment_id: '{output.worst_category_assignment_id}'
    decoy_assignment_id: '{output.decoy_assignment_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        (state.get_assignment('{target.worst_category_assignment_id}') is not None
        and state.get_assignment('{target.worst_category_assignment_id}').submission_status in ('submitted', 'late'))
      desc: Correct assignment in worst high-weight category was submitted
    - expr: >-
        (state.get_assignment('{target.worst_category_assignment_id}') is not None
        and state.get_assignment('{target.worst_category_assignment_id}').file_name == 'category_boost.pdf')
      desc: Correct file name used for category boost submission
    - expr: >-
        state.get_assignment('{target.worst_category_assignment_id}') is not None
      desc: Target worst-category assignment exists (seed validation)
    - expr: >-
        state.weighted_score_for_course('{target.target_course_id}') is not None
      desc: Course has graded assignments for analysis (seed validation)
    - expr: >-
        sum(1 for e in state.enrollments if e.status == 'enrolled') >= 3
      desc: All enrollments remain active during analysis
  negative_checks:
    - expr: >-
        (state.get_assignment('{target.decoy_assignment_id}') is None
        or state.get_assignment('{target.decoy_assignment_id}').submission_status != 'submitted')
      desc: Decoy assignment was not submitted
      penalty: 0.25
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'category_boost.pdf'
             and a.submission_status in ('submitted', 'late')]) <= 1
      desc: Only one assignment was submitted with category_boost.pdf
      penalty: 0.15
