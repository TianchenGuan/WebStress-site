task_id: lms_complex_grading_dispute
env_id: lms
title: Resolve Complex Grading Dispute
instruction_template: >-
  You believe two assignments were graded incorrectly in {target.course_code}.
  The assignment "{target.disputed_title_1}" should have received full marks
  based on the rubric, and "{target.disputed_title_2}" had a late penalty
  applied incorrectly (you submitted within the grace period). Resubmit both
  assignments: "{target.disputed_title_1}" with file 'rubric_evidence.pdf'
  and "{target.disputed_title_2}" with file 'grace_period_proof.pdf'.
difficulty: expert
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
  - verification
  - state_tracking
  - exploration
  - planning
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
        must_include: ["CS201"]
      outputs:
        - course_ids
        - course_codes
        - instructor_name
        - target_course_id
        - course_code
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.6
        late_count: 1
      outputs:
        - assignment_ids
        - late_assignment_ids
        - disputed_assignment_id_1
        - disputed_assignment_id_2
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    instructor_name: '{output.instructor_name}'
    disputed_title_1: "Problem Set 1"
    disputed_title_2: "Weekly Quiz 1"
    disputed_assignment_id_1: '{output.disputed_assignment_id_1}'
    disputed_assignment_id_2: '{output.disputed_assignment_id_2}'

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_assignment('{target.disputed_assignment_id_1}') is not None
        and state.get_assignment('{target.disputed_assignment_id_1}').submission_status in ('submitted', 'late')
        and state.get_assignment('{target.disputed_assignment_id_1}').file_name == 'rubric_evidence.pdf'
      desc: First disputed assignment resubmitted with rubric_evidence.pdf
    - expr: >-
        state.get_assignment('{target.disputed_assignment_id_2}') is not None
        and state.get_assignment('{target.disputed_assignment_id_2}').submission_status in ('submitted', 'late')
        and state.get_assignment('{target.disputed_assignment_id_2}').file_name == 'grace_period_proof.pdf'
      desc: Second disputed assignment resubmitted with grace_period_proof.pdf
    - expr: >-
        state.get_assignment('{target.disputed_assignment_id_1}') is not None
        and state.get_assignment('{target.disputed_assignment_id_1}').attempt_count >= 2
      desc: First disputed assignment attempt count incremented
    - expr: >-
        state.get_assignment('{target.disputed_assignment_id_2}') is not None
        and state.get_assignment('{target.disputed_assignment_id_2}').attempt_count >= 2
      desc: Second disputed assignment attempt count incremented
    - expr: >-
        state.get_assignment('{target.disputed_assignment_id_1}').course_id == '{target.target_course_id}'
      desc: First disputed assignment belongs to the target course (seed validation)
  negative_checks:
    - expr: >-
        not any(
          a.submission_status in ('submitted', 'late')
          and a.file_name in ('rubric_evidence.pdf', 'grace_period_proof.pdf')
          and a.id not in ('{target.disputed_assignment_id_1}', '{target.disputed_assignment_id_2}')
          for a in state.assignments
        )
      desc: No other assignments were resubmitted with dispute files
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
