task_id: lms_check_assignment_grade
env_id: lms
title: Check Assignment Grade
instruction_template: >-
  Navigate to the assignment "{target.assignment_title}" in {target.course_code}
  and check its score. If the score is below 70% of the total points possible,
  resubmit the assignment with file 'revision_v2.pdf'. If the score is 70% or
  above, no action is needed.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.6
        target_assignment_status: "graded"
      outputs:
        - target_assignment_id
        - target_assignment_title
        - target_course_code
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - score_below_70
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    score_below_70: '{output.score_below_70}'

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.score_below_70}' == 'true'
         and state.get_assignment('{target.target_assignment_id}') is not None
         and state.get_assignment('{target.target_assignment_id}').submission_status in ('submitted', 'late')
         and state.get_assignment('{target.target_assignment_id}').file_name == 'revision_v2.pdf')
        or ('{target.score_below_70}' == 'false'
            and (state.get_assignment('{target.target_assignment_id}') is None
                 or state.get_assignment('{target.target_assignment_id}').file_name != 'revision_v2.pdf')))
      desc: >-
        Resubmit with revision_v2.pdf if score < 70%, or no resubmission if >= 70%
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').score is not None
      desc: Assignment exists and is graded (seed validation)
  negative_checks:
    - expr: >-
        '{target.score_below_70}' != 'false'
        or state.get_assignment('{target.target_assignment_id}') is None
        or state.get_assignment('{target.target_assignment_id}').file_name != 'revision_v2.pdf'
      desc: Did not resubmit when score was 70% or above (wrong branch)
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
