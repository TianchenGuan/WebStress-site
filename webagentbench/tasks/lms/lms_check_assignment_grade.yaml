task_id: lms_check_assignment_grade
env_id: lms
title: Check Assignment Grade
instruction_template: >-
  Navigate to the assignment "{target.assignment_title}" in {target.course_code}
  and check its score. If the score is below 70% of the total points possible,
  submit the next unsubmitted assignment in the same course with file
  'improvement.pdf' to start catching up. If the score is 70% or above, mark
  the course's latest announcement as read to confirm you have reviewed your
  standing.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.6
        target_assignment_status: "graded"
      outputs:
        - target_assignment_id
        - target_assignment_title
        - target_course_code
        - unsubmitted_hw_id
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - score_below_70
    - use: announcements_feed
      params:
        count: 3
        unread_count: 1
      outputs:
        - announcement_ids
        - latest_announcement_id
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'
    unsubmitted_hw_id: '{output.unsubmitted_hw_id}'
    score_below_70: '{output.score_below_70}'
    latest_announcement_id: '{output.latest_announcement_id}'

canonical_diff:
  oneof:
    - constraints:
        - desc: Score is below 70%, so the recovery submission branch applies
          expr: "target['score_below_70'] == 'true'"
          severity: critical
      update:
        - entity: Assignment
          desc: Submit the next unsubmitted assignment with improvement.pdf
          where:
            id:
              expr: "x == target['unsubmitted_hw_id']"
          changes:
            submission_status: {in: [submitted, late]}
            file_name: {eq: improvement.pdf}
      invariant:
        - collection: state.assignments
          filter: "a.id != target['unsubmitted_hw_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.announcements
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
      named_invariants:
        - name: Agent did not modify other assignments
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify modules
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[4]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[5]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[6]
          severity: medium
        - name: Agent did not modify announcements
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium
    - constraints:
        - desc: Score is at least 70%, so the acknowledgement branch applies
          expr: "target['score_below_70'] == 'false'"
          severity: critical
      update:
        - entity: Announcement
          desc: Mark the latest announcement as read
          where:
            id:
              expr: "x == target['latest_announcement_id']"
          changes:
            is_read: {eq: true}
      invariant:
        - collection: state.announcements
          filter: "a.id != target['latest_announcement_id']"
          preserve: ALL
        - collection: state.courses
          preserve: ALL
        - collection: state.enrollments
          preserve: ALL
        - collection: state.assignments
          preserve: ALL
        - collection: state.modules
          preserve: ALL
        - collection: state.discussions
          preserve: ALL
        - collection: state.discussion_posts
          preserve: ALL
        - collection: state.peer_reviews
          preserve: ALL
        - collection: state.grades
          preserve: ALL
        - collection: state.calendar_events
          preserve: ALL
        - collection: state.sent_messages
          preserve: ALL
      named_invariants:
        - name: Agent did not modify non-target announcements
          ref: invariant[0]
          severity: high
        - name: Agent did not modify course records
          ref: invariant[1]
          severity: medium
        - name: Agent did not drop or alter enrollments
          ref: invariant[2]
          severity: high
        - name: Agent did not modify assignments
          ref: invariant[3]
          severity: medium
        - name: Agent did not modify modules
          ref: invariant[4]
          severity: medium
        - name: Agent did not modify discussions
          ref: invariant[5]
          severity: medium
        - name: Agent did not create or edit discussion posts
          ref: invariant[6]
          severity: medium
        - name: Agent did not alter peer reviews
          ref: invariant[7]
          severity: medium
        - name: Agent did not modify grades
          ref: invariant[8]
          severity: high
        - name: Agent did not modify calendar events
          ref: invariant[9]
          severity: low
        - name: Agent did not send messages
          ref: invariant[10]
          severity: medium

eval:
  source: server_state
  checks:
    - expr: >-
        (('{target.score_below_70}' == 'true'
         and state.get_assignment('{target.unsubmitted_hw_id}') is not None
         and state.get_assignment('{target.unsubmitted_hw_id}').submission_status in ('submitted', 'late')
         and state.get_assignment('{target.unsubmitted_hw_id}').file_name == 'improvement.pdf')
        or ('{target.score_below_70}' == 'false'
            and state.get_announcement('{target.latest_announcement_id}') is not None
            and state.get_announcement('{target.latest_announcement_id}').is_read == True))
      desc: >-
        Submit improvement.pdf if score < 70%, or mark latest
        announcement as read if >= 70%
  negative_checks:
    - expr: >-
        '{target.score_below_70}' != 'false'
        or (state.get_announcement('{target.latest_announcement_id}') is not None
            and state.get_announcement('{target.latest_announcement_id}').is_read == True)
      desc: Did not mark announcement as read when score was 70% or above (wrong branch)
      penalty: 0.3
    - expr: >-
        '{target.score_below_70}' != 'true'
        or (state.get_assignment('{target.unsubmitted_hw_id}') is not None
            and state.get_assignment('{target.unsubmitted_hw_id}').file_name == 'improvement.pdf'
            and state.get_assignment('{target.unsubmitted_hw_id}').submission_status in ('submitted', 'late'))
      desc: Did not submit improvement.pdf when score was below 70% (wrong branch)
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        state.get_assignment('{target.target_assignment_id}') is not None
        and state.get_assignment('{target.target_assignment_id}').submission_status
        == state._initial_snapshot['assignments']['{target.target_assignment_id}']['submission_status']
      desc: Target assignment (target_assignment_id) itself was not modified while the grade was checked
      penalty: 0.2
