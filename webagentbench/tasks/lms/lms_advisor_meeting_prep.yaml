task_id: lms_advisor_meeting_prep
env_id: lms
title: Academic Advisor Meeting Preparation
instruction_template: Prepare for an upcoming meeting with your academic advisor ({target.advisor_name}).
  First, mark all unread announcements as read and complete the next available module
  content items in any course that has available modules. Then send a brief meeting
  prep message to your advisor ({target.advisor_name}).
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- verification
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params:
      gpa: '2.95'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 4
      must_include:
      - CS101
      - MATH201
      - ENG102
      - PHYS201
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.5
      late_count: 1
      missing_count: 1
    outputs:
    - assignment_ids
    - missing_assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  - use: module_sequence
    params:
      count: 4
      chain_type: linear
      completed_count: 2
    outputs:
    - module_ids
    - next_available_module_id
    - first_locked_module_id
  - use: discussion_forums
    params:
      count: 2
      posts_per: 3
    outputs:
    - discussion_ids
  - use: peer_review_assignments
    params:
      count: 2
      statuses:
      - assigned
      - submitted
    outputs:
    - review_ids
    - pending_review_ids
  - use: announcements_feed
    params:
      count: 4
      unread_count: 2
    outputs:
    - announcement_ids
    - unread_announcement_ids
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
    pending_review_ids: '{output.pending_review_ids}'
    module_ids: '{output.module_ids}'
    next_available_module_id: '{output.next_available_module_id}'
    first_locked_module_id: '{output.first_locked_module_id}'
    unread_announcement_ids: '{output.unread_announcement_ids}'
canonical_diff:
  update:
  - entity: Announcement
    desc: Mark all unread announcements as read
    bijection:
      over: "target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else []"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      is_read:
        eq: true
  - entity: Module
    desc: Complete the next available module after finishing all of its content items
    where:
      id:
        expr: "x == target['next_available_module_id']"
    changes:
      status:
        eq: completed
      content_items:
        expr: "all(item.get('completed') is True for item in x)"
  invariant:
  - collection: state.announcements
    filter: "a.id not in (target['unread_announcement_ids'].split(',') if target['unread_announcement_ids'] else [])"
    preserve: ALL
  # Allow the backend's prerequisite-unlock cascade: completing
  # next_available_module flips later locked modules in the same course to
  # 'available'. Cascade-affected modules end up with status=='available'
  # and no other field changes, so we exempt those.
  - collection: state.modules
    filter: "a.id not in [target['next_available_module_id'], target['first_locked_module_id']] and a.status != 'available'"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.assignments
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    filter: "m.get('to','') != target['advisor_name']"
    preserve: ALL
  - collection: state.student
    preserve: ALL
  named_invariants:
  - name: Agent marked all unread announcements as read
    ref: update[0]
    severity: high
  - name: Agent completed the next available module
    ref: update[1]
    severity: high
  - name: Agent did not modify already read announcements
    ref: invariant[0]
    severity: medium
  - name: Agent did not modify other modules
    ref: invariant[1]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[2]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[3]
    severity: high
  - name: Agent did not modify assignments
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: all(a.is_read for a in state.announcements)
    desc: All announcements marked as read
  - expr: sum(1 for m in state.modules if m.status == 'completed') >= 3
    desc: At least 3 modules completed (2 initial + 1 new)
  - expr: "any(m.status == 'completed'\n    and all(ci.completed for ci in m.content_items)\n\
      \    for m in state.modules)"
    desc: At least one module fully completed with all content items
  - expr: "all(e.status == 'enrolled'\n    for e in state.enrollments)"
    desc: All enrollments remain active (none dropped)
  - expr: len(state.sent_messages) >= 1
    desc: Agent sent a briefing message
  - expr: "any('{target.advisor_name}' in m.get('to', '')\n    for m in state.sent_messages)"
    desc: Message addressed to advisor
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped during prep
    penalty: 0.3
  - expr: len(state.sent_messages) <= 4
    desc: Agent did not send excessive messages
    penalty: 0.15
  - expr: "not any(a.submission_status in ('submitted', 'late')\n        and a.file_name\
      \ is not None\n        and 'meeting' in (a.file_name or '').lower()\n      \
      \  for a in state.assignments)"
    desc: Agent did not submit assignment files for meeting prep
    penalty: 0.1
secondary_primitives: []
