task_id: lms_find_next_deadline
env_id: lms
title: Find Next Deadline and Submit Early Draft
instruction_template: 'Find the chronologically earliest unsubmitted assignment deadline
  across all your courses and submit a draft for that assignment with file
  "early_draft.pdf". If no future unsubmitted deadline exists, use the earliest
  unsubmitted deadline by date (even if already in the past).'
difficulty: easy
time_limit_seconds: 120
expected_steps: 10
primary_primitives:
- grounding
start_path: /courses
seed:
  distractors: 0
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 3
    outputs:
    - course_ids
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 5
    outputs:
    - assignment_ids
    - next_deadline_assignment_id
  - use: calendar_events
    params:
      include_recurring: false
    outputs:
    - event_ids
  targets:
    next_deadline_assignment_id: '{output.next_deadline_assignment_id}'

canonical_diff:
  update:
    - entity: Assignment
      desc: Submit the next-deadline assignment with the early draft file
      where:
        id:
          expr: "x == target['next_deadline_assignment_id']"
      changes:
        submission_status: {in: [submitted, late]}
        file_name: {eq: early_draft.pdf}
        attempt_count:
          expr: "x >= 1"
        submitted_at:
          expr: "x is not None"
  invariant:
    - collection: state.assignments
      filter: "a.id != target['next_deadline_assignment_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  constraints:
  - desc: Agent did not send messages
    expr: "len(state.sent_messages) == 0"
    severity: medium
  named_invariants:
    - name: Agent did not modify other assignments
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify modules
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: (state.get_assignment('{target.next_deadline_assignment_id}') is not None
      and state.get_assignment('{target.next_deadline_assignment_id}').submission_status
      in ('submitted', 'late'))
    desc: The next-deadline assignment was submitted
  - expr: (state.get_assignment('{target.next_deadline_assignment_id}') is not None
      and state.get_assignment('{target.next_deadline_assignment_id}').file_name ==
      'early_draft.pdf')
    desc: Correct file name used for the early draft
  negative_checks:
  - expr: "len([a for a in state.assignments\n     if a.submission_status in ('submitted',\
      \ 'late')\n     and a.file_name == 'early_draft.pdf']) <= 1"
    desc: Only one assignment was submitted with the early draft file
    penalty: 0.2
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.2
secondary_primitives: []
