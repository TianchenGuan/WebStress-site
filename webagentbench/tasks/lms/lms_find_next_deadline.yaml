task_id: lms_find_next_deadline
env_id: lms
title: Find Next Deadline and Submit Early Draft
instruction_template: >-
  Find the chronologically next upcoming assignment deadline across all your
  courses. Submit a draft for that assignment with file "early_draft.pdf".
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
  - state_tracking
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
      outputs:
        - assignment_ids
        - next_deadline_assignment_id
    - use: calendar_events
      params:
        include_recurring: false
      outputs:
        - event_ids
  targets:
    next_deadline_assignment_id: '{output.next_deadline_assignment_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        (state.get_assignment('{target.next_deadline_assignment_id}') is not None
        and state.get_assignment('{target.next_deadline_assignment_id}').submission_status in ('submitted', 'late'))
      desc: The next-deadline assignment was submitted
    - expr: >-
        (state.get_assignment('{target.next_deadline_assignment_id}') is not None
        and state.get_assignment('{target.next_deadline_assignment_id}').file_name == 'early_draft.pdf')
      desc: Correct file name used for the early draft
  negative_checks:
    - expr: >-
        len([a for a in state.assignments
             if a.submission_status in ('submitted', 'late')
             and a.file_name == 'early_draft.pdf']) <= 1
      desc: Only one assignment was submitted with the early draft file
      penalty: 0.2
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.2
