task_id: lms_three_module_chain
env_id: lms
title: Unlock and Complete a 3-Module Chain
instruction_template: In {target.course_code}, complete the next three modules in
  sequence. Each module must have all content items completed before marking it done.
  The modules form a prerequisite chain, so you must complete them in order.
difficulty: hard
time_limit_seconds: 300
expected_steps: 20
primary_primitives:
- planning
start_path: /courses
seed:
  distractors: 1
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: module_sequence
    params:
      count: 5
      chain_type: linear
      completed_count: 1
    outputs:
    - module_ids
    - next_available_module_id
    - first_locked_module_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    module_ids: '{output.module_ids}'
    next_available_module_id: '{output.next_available_module_id}'
canonical_diff:
  update:
    - entity: Module
      desc: Complete the next three modules in the prerequisite chain after finishing all content items
      bijection:
        over: "target['module_ids'].split(',')[1:4]"
        variable: v
      where:
        id:
          expr: "x == v"
      changes:
        status:
          eq: completed
        content_items:
          expr: "all(item.get('completed') is True for item in x)"
  invariant:
    - collection: state.modules
      # Range [1:5] covers the 3 intended target modules (indexes 1,2,3 = module_2/3/4)
      # plus module_5, which the server auto-unlocks as a side-effect of completing
      # module_4. Penalizing an agent for this cascade is a false positive — the
      # status change from 'locked' to 'available' is unavoidable.
      filter: "a.id not in target['module_ids'].split(',')[1:5]"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.announcements
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  named_invariants:
    - name: Agent completed the next three modules
      ref: update[0]
      severity: high
    - name: Agent did not modify other modules
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[4]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[5]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[6]
      severity: medium
    - name: Agent did not modify announcements
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "len([m for m in state.modules_for_course('{target.target_course_id}')\n\
      \     if m.status == 'completed']) >= 4"
    desc: At least 4 modules are completed (1 pre-existing + 3 new)
  - expr: state.get_module('{target.next_available_module_id}') is not None and state.get_module('{target.next_available_module_id}').status
      == 'completed'
    desc: The first available module was completed
  - expr: "all(all(item.completed for item in m.content_items)\n    for m in state.modules_for_course('{target.target_course_id}')\n\
      \    if m.status == 'completed')"
    desc: All completed modules have all content items done
  - expr: "sum(1 for m in state.modules_for_course('{target.target_course_id}')\n\
      \    if m.status == 'completed'\n    and all(ci.completed for ci in m.content_items))\
      \ >= 4"
    desc: At least 4 modules completed with all content items done
  negative_checks:
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
  - expr: "not any(m.status == 'completed'\n        and not all(item.completed for\
      \ item in m.content_items)\n        for m in state.modules)"
    desc: No modules were completed without finishing all content items
    penalty: 0.25
secondary_primitives: []
