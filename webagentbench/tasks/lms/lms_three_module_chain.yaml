task_id: lms_three_module_chain
env_id: lms
title: Unlock and Complete a 3-Module Chain
instruction_template: >-
  In {target.course_code}, complete the next three modules in sequence. Each
  module must have all content items completed before marking it done. The
  modules form a prerequisite chain, so you must complete them in order.
difficulty: hard
time_limit_seconds: 300
expected_steps: 20
primary_primitives:
  - planning
  - state_tracking
start_path: /courses

seed:
  distractors: 1
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 2
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: module_sequence
      params:
        count: 5
        chain_type: linear
        completed_count: 1
      outputs:
        - module_ids
        - next_available_module_id
        - first_locked_module_id
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    module_ids: '{output.module_ids}'
    next_available_module_id: '{output.next_available_module_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        len([m for m in state.modules_for_course('{target.target_course_id}')
             if m.status == 'completed']) >= 4
      desc: At least 4 modules are completed (1 pre-existing + 3 new)
    - expr: >-
        state.get_module('{target.next_available_module_id}') is not None
        and state.get_module('{target.next_available_module_id}').status == 'completed'
      desc: The first available module was completed
    - expr: >-
        all(all(item.completed for item in m.content_items)
            for m in state.modules_for_course('{target.target_course_id}')
            if m.status == 'completed')
      desc: All completed modules have all content items done
    - expr: >-
        sum(1 for m in state.modules_for_course('{target.target_course_id}')
            if m.status == 'completed'
            and all(ci.completed for ci in m.content_items)) >= 4
      desc: At least 4 modules completed with all content items done
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        not any(m.status == 'completed'
                and not all(item.completed for item in m.content_items)
                for m in state.modules)
      desc: No modules were completed without finishing all content items
      penalty: 0.25
