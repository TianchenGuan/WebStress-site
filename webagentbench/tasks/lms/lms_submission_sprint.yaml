task_id: lms_submission_sprint
env_id: lms
title: Semester-End Submission Sprint
instruction_template: >-
  It's the end of the semester and you have multiple unsubmitted assignments
  across your courses. Review all not-submitted assignments, prioritize them
  by grade impact (considering points possible, category weight, and any late
  penalties), and submit the top 3 highest-impact assignments first with file
  "sprint_submission.pdf". After submitting, send a message to your advisor
  ({target.advisor_name}) explaining which assignments you prioritized and why.
difficulty: expert
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
  - planning
  - state_tracking
  - verification
start_path: /dashboard

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 4
        must_include: ["CS101", "MATH201", "PHYS201"]
        vary_late_policies: true
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 7
        graded_fraction: 0.4
        missing_count: 2
        late_count: 1
      outputs:
        - assignment_ids
        - missing_assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
    course_codes: '{output.course_codes}'

eval:
  source: server_state
  checks:
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'sprint_submission.pdf']) >= 3
      desc: At least 3 assignments submitted with sprint filename
    - expr: >-
        any(a.file_name == 'sprint_submission.pdf'
            and a.submission_status in ('submitted', 'late')
            for a in state.assignments)
      desc: At least one sprint submission has valid status
    - expr: len(state.sent_messages) >= 1
      desc: Agent sent a summary message
    - expr: >-
        any('{target.advisor_name}' in m.get('to', '') or
            '{target.advisor_name}'.lower() in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message addressed to advisor
    - expr: >-
        any('priorit' in m.get('body', '').lower() or 'impact' in m.get('body', '').lower()
            for m in state.sent_messages)
      desc: Message explains prioritization rationale
  negative_checks:
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
    - expr: >-
        len([a for a in state.assignments
             if a.file_name == 'sprint_submission.pdf']) <= 5
      desc: Agent did not submit excessively beyond top 3
      penalty: 0.15
