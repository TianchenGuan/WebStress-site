task_id: lms_peer_review_with_feedback
env_id: lms
title: Complete Peer Review and Verify Own Submission Uses Feedback
instruction_template: >-
  Complete all pending peer reviews by filling in rubric scores and adding
  constructive comments for each. Then check if any of your own assignments
  have received peer feedback. If feedback exists, review it and resubmit
  the assignment with an updated file named "revised_with_feedback.pdf"
  incorporating the suggestions.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
  - planning
  - state_tracking
  - verification
start_path: /courses

seed:
  distractors: 2
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 2
        must_include: ["CS101"]
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
        resubmit_count: 1
      outputs:
        - assignment_ids
        - resubmit_assignment_ids
    - use: peer_review_assignments
      params:
        count: 3
        statuses: ["assigned", "in_progress", "submitted"]
      outputs:
        - review_ids
        - pending_review_ids
        - completed_review_ids
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    pending_review_ids: '{output.pending_review_ids}'
    resubmit_assignment_ids: '{output.resubmit_assignment_ids}'

eval:
  source: server_state
  checks:
    - expr: >-
        all(pr.status == 'submitted'
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id)
      desc: All peer reviews assigned to student are submitted
    - expr: >-
        all(len(pr.rubric_scores) >= 1
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted')
      desc: Each submitted review has rubric scores
    - expr: >-
        all(len(pr.comments.strip()) > 10
            for pr in state.peer_reviews
            if pr.reviewer_student_id == state.student.id
            and pr.status == 'submitted')
      desc: Each submitted review has substantive comments
    - expr: >-
        (not any(a.submission_status == 'resubmit_requested' for a in state.assignments))
        or any(a.file_name == 'revised_with_feedback.pdf'
               and a.submission_status in ('submitted', 'late')
               for a in state.assignments)
      desc: Resubmit-requested assignment was resubmitted with feedback file
  negative_checks:
    - expr: >-
        not any(pr.reviewer_student_id != state.student.id
                and pr.status == 'submitted'
                for pr in state.peer_reviews)
      desc: Reviews assigned to other students were not modified
      penalty: 0.3
    - expr: >-
        all(e.status != 'dropped' for e in state.enrollments)
      desc: No courses were dropped
      penalty: 0.3
