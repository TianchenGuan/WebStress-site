task_id: lms_peer_review_with_feedback
env_id: lms
title: Complete Peer Review and Verify Own Submission Uses Feedback
instruction_template: Complete all pending peer reviews by filling in rubric scores
  and adding constructive comments for each. Then check if any of your own assignments
  have feedback or a revision request. If feedback exists, review it and resubmit
  the assignment with an updated file named "revised_with_feedback.pdf" incorporating
  the suggestions.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- planning
start_path: /peer-reviews
seed:
  distractors: 2
  steps:
  - use: student_profile
    params: {}
    outputs:
    - student_id
  - use: course_catalog
    params:
      count: 2
      must_include:
      - CS101
    outputs:
    - course_ids
    - course_code
    - target_course_id
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 6
      graded_fraction: 0.5
      resubmit_count: 1
    outputs:
    - assignment_ids
    - resubmit_assignment_ids
    - decoy_assignment_id
  - use: peer_review_assignments
    params:
      count: 3
      statuses:
      - assigned
      - in_progress
      - submitted
    outputs:
    - review_ids
    - pending_review_ids
    - completed_review_ids
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'
    pending_review_ids: '{output.pending_review_ids}'
    resubmit_assignment_id: '{output.resubmit_assignment_ids[0]}'
    decoy_assignment_id: '{output.decoy_assignment_id}'
    resubmit_file_name: revised_with_feedback.pdf
canonical_diff:
  update:
  - entity: PeerReview
    desc: Submit every pending peer review with rubric scores and constructive comments
    bijection:
      over: "target['pending_review_ids'].split(',') if target['pending_review_ids'] else []"
      variable: review_id
    where:
      id:
        expr: "x == v.strip()"
    changes:
      rubric_scores:
        expr: >-
          len(x) == 3
          and set(x) == {'clarity', 'depth', 'originality'}
          and all(1 <= v <= 5 for v in x.values())
      comments:
        expr: "len(x.strip()) > 20"
      status: {eq: submitted}
  - entity: Assignment
    desc: Resubmit the assignment that received feedback with the revised file
    where:
      id:
        expr: "x == target['resubmit_assignment_id']"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        expr: "x == target['resubmit_file_name']"
      attempt_count:
        expr: "x == 2"
      submitted_at:
        expr: "x >= session_start"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['resubmit_assignment_id']"
    preserve: ALL
  - collection: state.peer_reviews
    filter: "a.id not in [rid.strip() for rid in target['pending_review_ids'].split(',') if rid.strip()]"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.sent_messages
    preserve: ALL
  named_invariants:
  - name: Agent submitted all pending peer reviews
    ref: update[0]
    severity: high
  - name: Agent resubmitted the feedback-bearing assignment
    ref: update[1]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify other peer reviews
    ref: invariant[1]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[2]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[3]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[5]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
  - name: Agent did not send messages
    ref: invariant[10]
    severity: medium
eval:
  source: server_state
  checks:
  - expr: "all(pr.status == 'submitted'\n    for pr in state.peer_reviews\n    if\
      \ pr.reviewer_student_id == state.student.id)"
    desc: All peer reviews assigned to student are submitted
  - expr: "(not any(a.submission_status == 'resubmit_requested' for a in state.assignments))\
      \ or any(a.file_name == 'revised_with_feedback.pdf'\n       and a.submission_status\
      \ in ('submitted', 'late')\n       for a in state.assignments)"
    desc: Resubmit-requested assignment was resubmitted with feedback file
  negative_checks:
  - expr: "not any(pr.status == 'submitted'\n        and pr.reviewer_student_id ==\
      \ state.student.id\n        and len(pr.rubric_scores) < 1\n        for pr in\
      \ state.peer_reviews)"
    desc: No reviews submitted without rubric scores
    penalty: 0.2
  - expr: all(e.status != 'dropped' for e in state.enrollments)
    desc: No courses were dropped
    penalty: 0.3
secondary_primitives: []
