task_id: lms_read_urgent_announcement
env_id: lms
title: Read Urgent Announcement
instruction_template: >-
  Find and mark the urgent announcement as read.
difficulty: easy
time_limit_seconds: 120
expected_steps: 4
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: announcements_feed
      params:
        count: 6
        unread_count: 3
        urgent_count: 1
      outputs:
        - announcement_ids
        - unread_announcement_ids
        - urgent_announcement_id
  targets:
    urgent_announcement_id: '{output.urgent_announcement_id}'
    unread_announcement_ids: '{output.unread_announcement_ids}'

canonical_diff:
  update:
    - entity: Announcement
      desc: Mark the urgent announcement as read
      where:
        id:
          expr: "x == target['urgent_announcement_id']"
      changes:
        is_read: {eq: true}
  invariant:
    - collection: state.announcements
      filter: "a.id != target['urgent_announcement_id']"
      preserve: ALL
    - collection: state.courses
      preserve: ALL
    - collection: state.enrollments
      preserve: ALL
    - collection: state.assignments
      preserve: ALL
    - collection: state.modules
      preserve: ALL
    - collection: state.discussions
      preserve: ALL
    - collection: state.discussion_posts
      preserve: ALL
    - collection: state.peer_reviews
      preserve: ALL
    - collection: state.grades
      preserve: ALL
    - collection: state.calendar_events
      preserve: ALL
    - collection: state.sent_messages
      preserve: ALL
  named_invariants:
    - name: Agent did not modify non-target announcements
      ref: invariant[0]
      severity: high
    - name: Agent did not modify course records
      ref: invariant[1]
      severity: medium
    - name: Agent did not drop or alter enrollments
      ref: invariant[2]
      severity: high
    - name: Agent did not modify assignments
      ref: invariant[3]
      severity: medium
    - name: Agent did not modify modules
      ref: invariant[4]
      severity: medium
    - name: Agent did not modify discussions
      ref: invariant[5]
      severity: medium
    - name: Agent did not create or edit discussion posts
      ref: invariant[6]
      severity: medium
    - name: Agent did not alter peer reviews
      ref: invariant[7]
      severity: medium
    - name: Agent did not modify grades
      ref: invariant[8]
      severity: high
    - name: Agent did not modify calendar events
      ref: invariant[9]
      severity: low
    - name: Agent did not send messages
      ref: invariant[10]
      severity: medium

eval:
  source: server_state
  checks:
    - expr: >-
        state.get_announcement('{target.urgent_announcement_id}') is not None
        and state.get_announcement('{target.urgent_announcement_id}').is_read == True
      desc: Urgent announcement is marked as read
  negative_checks:
    - expr: >-
        (sum(1 for a in state.announcements
             if a.is_read and a.priority != 'urgent')
         <= (len(state.announcements) - len(state.unread_announcements()) -
             sum(1 for a in state.announcements
                 if a.is_read and a.priority == 'urgent')) + 1)
      desc: At most 1 non-urgent announcement was newly marked as read
      penalty: 0.15
