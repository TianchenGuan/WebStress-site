task_id: amazon_reorder_past_item
env_id: amazon
title: Reorder a Product from Past Orders
instruction_template: 'Go to your order history, find the order containing "{target.product_name}",
  and reorder the same product. Complete the purchase using the shipping address for
  Jordan Parker at 742 Evergreen Terrace and the Visa card ending in 4242.

  '
difficulty: medium
time_limit_seconds: 260
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Organic Green Tea 100-Pack
      brand: Bigelow
      category: Home & Kitchen
      price: 22.49
      rating: 4.6
      features:
      - USDA Organic certified
      - 100 individually wrapped bags
      - Antioxidant rich
      - Gluten free
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: delivered
      days_ago: 30
    outputs:
    - order_id
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 8
      price_range:
      - 5.0
      - 50.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    past_order_id: '{output.order_id}'
eval:
  source: server_state
  checks:
  - expr: 'sum(1 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {})
      and any(item.product_id == ''{target.product_id}'' for item in o.items)) >=
      1

      '
    desc: A new order was placed containing the target product
  - expr: 'any(o.id != ''{target.past_order_id}'' and o.id not in state._initial_snapshot.get(''orders'', {})
      and any(item.product_id == ''{target.product_id}'' for item in o.items) for
      o in state.orders)

      '
    desc: The new order is distinct from the original past order
  negative_checks:
  - expr: 'sum(1 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {})
      and o.id != ''{target.past_order_id}'') <= 1

      '
    desc: Only one new order placed
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
    penalty: 0.1
  - expr: 'not any(r.id not in state._initial_snapshot.get(''returns'', {}) for r in state.returns)'
    desc: No returns filed when none required
    penalty: 0.15
secondary_primitives: []
