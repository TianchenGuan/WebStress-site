task_id: amazon_complete_shopping_journey
env_id: amazon
title: Compare Speakers, Buy Best, Wishlist Cheapest, Review Past Order, Update Address
instruction_template: 'Complete this multi-part shopping session: 1. Search for and
  compare these three speakers: ''{target.best_name}'', ''{target.cheap_name}'', and
  ''{target.mid_name}''. Purchase the one with the highest rating. 2. Add the cheapest
  speaker to your wishlist for later. 3. Go to your order history, find your delivered
  order for ''{target.past_name}'', and write a 4-star review titled ''{target.review_title}''.
  4. Add a new shipping address: {target.addr_name}, {target.addr_street}, {target.addr_city},
  IL {target.addr_zip}, and set it as your default.

  '
difficulty: frontier
time_limit_seconds: 540
expected_steps: 48
primary_primitives:
- planning
- grounding
- state_tracking
- verification
- exploration
secondary_primitives:
- patience
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Premium Bluetooth Speaker
      brand: SoundCore
      category: Electronics
      price: 59.99
      rating: 4.9
      features:
      - 360-degree sound
      - 24-hour battery
      - IPX7 waterproof
      - Multi-room pairing
      variants: []
      in_stock: true
    outputs:
    - product_id_best
    - product_name_best
    - product_price_best
  - use: featured_product
    params:
      name: Compact Travel Speaker
      brand: Lumivox
      category: Electronics
      price: 22.99
      rating: 4.2
      features:
      - Ultra-portable
      - 8-hour battery
      - Clip-on design
      - Bluetooth 5.0
      variants: []
      in_stock: true
    outputs:
    - product_id_cheap
    - product_name_cheap
    - product_price_cheap
  - use: featured_product
    params:
      name: Waterproof Speaker Cube
      brand: NexGen Audio
      category: Electronics
      price: 44.99
      rating: 4.5
      features:
      - IP68 waterproof
      - 15-hour battery
      - Built-in microphone
      - Shock resistant
      variants: []
      in_stock: true
    outputs:
    - product_id_mid
    - product_name_mid
    - product_price_mid
  - use: featured_product
    params:
      name: Desk Organizer Premium
      brand: ErgoNest
      category: Office Supplies
      price: 29.99
      rating: 4.4
      features:
      - Walnut wood finish
      - 6-compartment design
      - Cable management slot
      - Non-scratch base
      variants: []
      in_stock: true
    outputs:
    - product_id_past
    - product_name_past
    - product_price_past
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_past}'
      status: delivered
      days_ago: 10
    outputs:
    - order_id_past
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  targets:
    best_name: '{output.product_name_best}'
    best_pid: '{output.product_id_best}'
    cheap_name: '{output.product_name_cheap}'
    cheap_pid: '{output.product_id_cheap}'
    mid_name: '{output.product_name_mid}'
    mid_pid: '{output.product_id_mid}'
    past_name: '{output.product_name_past}'
    past_pid: '{output.product_id_past}'
    review_title: Well-Built Office Essential
    addr_name: Casey Jordan
    addr_street: 456 Elm Street
    addr_city: Chicago
    addr_state: IL
    addr_zip: '60601'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.best_pid}'' for item in o.items) for
      o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Highest-rated speaker purchased
  - expr: '''{target.cheap_pid}'' in state.wishlist'
    desc: Cheapest speaker added to wishlist
  - expr: 'any(r.product_id == ''{target.past_pid}'' and r.rating == 4 and r.title
      == ''{target.review_title}'' for r in state.reviews)

      '
    desc: 4-star review for past purchase
  - expr: 'any(a.full_name == ''Casey Jordan'' and a.city == ''Chicago'' and a.state
      == ''IL'' for a in state.addresses)

      '
    desc: New address added
  - expr: any(a.full_name == 'Casey Jordan' and a.is_default for a in state.addresses)
    desc: New address set as default
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: 'any(o.status == ''confirmed'' for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Order confirmed
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.mid_pid}'' for item in o.items)
      for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Mid-rated speaker not purchased
    penalty: 0.15
  - expr: 'not any(any(item.product_id == ''{target.cheap_pid}'' for item in o.items)
      for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Cheapest speaker not purchased (only wishlisted)
    penalty: 0.15
  - expr: '''{target.best_pid}'' not in state.wishlist'
    desc: Best speaker not in wishlist (it was purchased)
    penalty: 0.1
  - expr: sum(1 for o in state.orders if not o.id.startswith('order_initial_')) <=
      1
    desc: Only one order placed
    penalty: 0.1
