task_id: amazon_recover_cancelled_order
env_id: amazon
title: Reorder After Accidental Cancellation
instruction_template: 'Your order for "{target.product_name}" was accidentally cancelled.
  Find the same product again and reorder it. Use the same shipping address ({target.address_line})
  and the default Visa payment method.

  '
difficulty: hard
time_limit_seconds: 360
expected_steps: 25
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 12
  actors: {}
  steps:
  - use: checkout_ready
    params:
      items:
      - name: Placeholder Item
        price: 9.99
        quantity: 1
    outputs:
    - cart_item_ids
    - address_id
    - payment_id
    - expected_total
  - use: featured_product
    params:
      name: Mechanical Keyboard with Cherry MX Switches
      brand: Keychron
      category: Electronics
      price: 189.99
      rating: 4.8
      features:
      - Hot-swappable switches
      - RGB backlight
      - Wireless Bluetooth 5.1
      - Mac and Windows compatible
      - Aluminum frame
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: cancelled
      days_ago: 2
    outputs:
    - cancelled_order_id
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 50.0
      - 300.0
    outputs:
    - catalog_product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    cancelled_order_id: '{output.cancelled_order_id}'
    address_id: '{output.address_id}'
    payment_id: '{output.payment_id}'
    address_line: 742 Evergreen Terrace
canonical_diff:
  create:
  - entity: Order
    desc: New confirmed order for the target product, using the correct address and payment
    properties:
      items:
        expr: "any(it['product_id'] == target['product_id'] for it in x)"
      status: {eq: confirmed}
      shipping_address_id: {expr: "x == target['address_id']"}
      payment_method_id: {expr: "x == target['payment_id']"}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  delete:
  - entity: CartItem
    desc: Pre-loaded cart items cleared as a side effect of checkout (weight 0)
    weight: 0.0
    where:
      id: {any: true}
  invariant:
  - collection: state.orders
    filter: "a.id == target['cancelled_order_id'] or not any(it.get('product_id') == target['product_id'] for it in (a.items or []))"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  - collection: state.wishlist
    preserve: ALL
  - collection: state.settings
    preserve: ALL
  named_invariants:
  - name: Agent did not modify the cancelled order or other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not leave items in cart after checkout
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[4]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[5]
    severity: medium
  - name: Agent did not create return requests
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
  - name: Agent did not modify wishlist
    ref: invariant[11]
    severity: medium
  - name: Agent did not modify account settings
    ref: invariant[12]
    severity: medium
