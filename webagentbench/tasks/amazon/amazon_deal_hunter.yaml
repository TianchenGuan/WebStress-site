task_id: amazon_deal_hunter
env_id: amazon
title: Find and Buy the Best Deal
instruction_template: 'Browse products and find items that are on sale (where the
  list price is higher than the current price). Among all products on sale, find the
  one with the biggest discount percentage and buy it. Add it to your cart and complete
  checkout using the shipping address for {target.shipping_name} at {target.shipping_street}
  and the {target.payment_type} card ending in {target.payment_last_four}.

  '
difficulty: hard
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 18
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Resistance Bands Set Pro
      brand: Fit Simplify
      category: Sports & Outdoors
      price: 12.99
      list_price: 29.99
      rating: 4.3
      review_count: 2400
      features:
      - 5 resistance levels
      - Carrying bag included
      - Natural latex construction
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
    - product_list_price
  targets:
    deal_product: Resistance Bands Set Pro
    deal_product_id: '{output.product_id}'
    list_price: '{output.product_list_price}'
    sale_price: '{output.product_price}'
    shipping_name: Jordan Parker
    shipping_street: 742 Evergreen Terrace
    payment_type: Visa
    payment_last_four: '4242'
eval:
  source: server_state
  checks:
  - expr: "sum(\n  1 for order in state.orders\n  if order.id not in state._initial_snapshot.get('orders', {})\n\
      \  and order.status == 'confirmed'\n  and len(order.items) == 1\n  and order.items[0].product_id\
      \ == '{target.deal_product_id}'\n  and order.items[0].quantity == 1\n) == 1\n"
    desc: Exactly one confirmed order was placed for the best-discount item
  - expr: "any(\n  order.id not in state._initial_snapshot.get('orders', {})\n  and order.status ==\
      \ 'confirmed'\n  and len(order.items) == 1\n  and abs(order.items[0].unit_price\
      \ - {target.sale_price}) < 0.01\n  for order in state.orders\n)\n"
    desc: Order used the discounted sale price, not the list price
  - expr: "any(\n  order.id not in state._initial_snapshot.get('orders', {})\n  and order.status ==\
      \ 'confirmed'\n  and any(\n    addr.id == order.shipping_address_id\n    and\
      \ addr.full_name == '{target.shipping_name}'\n    and addr.street_address ==\
      \ '{target.shipping_street}'\n    for addr in state.addresses\n  )\n  for order\
      \ in state.orders\n)\n"
    desc: Order uses the required shipping address
  - expr: "any(\n  order.id not in state._initial_snapshot.get('orders', {})\n  and order.status ==\
      \ 'confirmed'\n  and any(\n    pm.id == order.payment_method_id\n    and pm.card_type\
      \ == '{target.payment_type}'\n    and pm.last_four == '{target.payment_last_four}'\n\
      \    for pm in state.payment_methods\n  )\n  for order in state.orders\n)\n"
    desc: Order uses the required Visa card ending in 4242
  negative_checks:
  - expr: 'sum(1 for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))
      == 1

      '
    desc: Only one new order was created
    penalty: 0.2
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
  - expr: "all(\n  len(order.items) == 1\n  and order.items[0].product_id == '{target.deal_product_id}'\n\
      \  and order.items[0].quantity == 1\n  for order in state.orders\n  if order.id not in state._initial_snapshot.get('orders', {})\n\
      )\n"
    desc: Only the target deal product was purchased, with no extras
    penalty: 0.3
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.checkout') == 1
    desc: Deal-hunter workflow used a single checkout flow
    penalty: 0.1
  - expr: "not any(\n  e.action in [\n    'amazon.address.add',\n    'amazon.address.update',\n\
      \    'amazon.address.remove',\n    'amazon.payment.add',\n    'amazon.payment.remove'\n\
      \  ]\n  for e in state.audit_log)"
    desc: Deal-hunter workflow reused existing address and payment details
    penalty: 0.1
  - expr: "not any(\n  e.action in ['amazon.return.create', 'amazon.review.add']\n\
      \  for e in state.audit_log)"
    desc: Deal-hunter workflow did not create unrelated returns or reviews
    penalty: 0.1
secondary_primitives: []
