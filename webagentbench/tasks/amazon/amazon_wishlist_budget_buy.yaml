task_id: amazon_wishlist_budget_buy
env_id: amazon
title: Buy Wishlist Items Under Budget
instruction_template: 'Go to your wishlist, move all items to your cart, then remove
  any items that cost over $100 each. Complete the checkout for the remaining items
  using the shipping address for Jordan Parker at 742 Evergreen Terrace and the Visa
  card ending in 4242.

  '
difficulty: medium
time_limit_seconds: 280
expected_steps: 20
primary_primitives:
- backtracking
start_path: /wishlist
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Mechanical Keyboard
      brand: Keychron
      category: Electronics
      price: 149.99
      rating: 4.6
      features:
      - Hot-swappable switches
      - RGB backlight
      - Wireless Bluetooth
      - Aluminum frame
      variants: []
      in_stock: true
    outputs:
    - product_id_expensive
    - product_name_expensive
    - product_price_expensive
  - use: featured_product
    params:
      name: Desk Cable Organizer
      brand: JOTO
      category: Office Supplies
      price: 14.99
      rating: 4.3
      features:
      - Neoprene sleeve
      - Holds up to 8 cables
      - Zipper closure
      variants: []
      in_stock: true
    outputs:
    - product_id_cheap1
    - product_name_cheap1
    - product_price_cheap1
  - use: featured_product
    params:
      name: LED Desk Lamp
      brand: TaoTronics
      category: Office Supplies
      price: 45.99
      rating: 4.5
      features:
      - 5 color modes
      - USB charging port
      - Memory function
      - Touch control
      variants: []
      in_stock: true
    outputs:
    - product_id_cheap2
    - product_name_cheap2
    - product_price_cheap2
  - use: featured_product
    params:
      name: Premium Webcam 1080p
      brand: Logitech
      category: Electronics
      price: 129.99
      rating: 4.7
      features:
      - Full HD 1080p
      - Built-in microphone
      - Auto light correction
      - Privacy cover
      variants: []
      in_stock: true
    outputs:
    - product_id_expensive2
    - product_name_expensive2
    - product_price_expensive2
  - use: wishlist_items
    params:
      product_ids:
      - '{output.product_id_expensive}'
      - '{output.product_id_cheap1}'
      - '{output.product_id_cheap2}'
      - '{output.product_id_expensive2}'
    outputs: []
  targets:
    expensive_id_1: '{output.product_id_expensive}'
    expensive_id_2: '{output.product_id_expensive2}'
    cheap_id_1: '{output.product_id_cheap1}'
    cheap_id_2: '{output.product_id_cheap2}'
canonical_diff:
  create:
  - entity: Order
    desc: New order placed containing only the two cheap wishlist items
    properties:
      items:
        expr: "any(it['product_id'] == target['cheap_id_1'] for it in x) and any(it['product_id'] == target['cheap_id_2'] for it in x)"
      status: {any: true}
      shipping_address_id: {any: true}
      payment_method_id: {any: true}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  invariant:
  - collection: state.orders
    filter: "not (any(it.get('product_id') == target['cheap_id_1'] for it in (a.items or [])) and any(it.get('product_id') == target['cheap_id_2'] for it in (a.items or [])))"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  constraints:
  - desc: Expensive item 1 (Mechanical Keyboard) was not purchased
    expr: "not any(any(it.product_id == target['expensive_id_1'] for it in o.items) for o in state.orders if o.id not in {x.id for x in initial.orders})"
    severity: high
  - desc: Expensive item 2 (Premium Webcam) was not purchased
    expr: "not any(any(it.product_id == target['expensive_id_2'] for it in o.items) for o in state.orders if o.id not in {x.id for x in initial.orders})"
    severity: high
  - desc: Cart is empty after checkout
    expr: "len(state.cart_items) == 0"
    severity: medium
  named_invariants:
  - name: Agent did not modify other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not modify saved addresses
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[3]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[4]
    severity: medium
  - name: Agent did not create return requests
    ref: invariant[5]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[6]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[7]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[8]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[9]
    severity: low
