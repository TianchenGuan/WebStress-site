task_id: amazon_return_item
env_id: amazon
title: Request a Return for a Defective Item
instruction_template: 'Go to your orders, find the delivered order containing "{target.product_name}",
  and request a return for it. Select "defective" as the reason for the return.

  '
difficulty: medium
time_limit_seconds: 240
expected_steps: 16
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 8
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Smart Fitness Tracker
      brand: Fitbit
      category: Electronics
      price: 129.99
      rating: 4.3
      features:
      - Heart rate monitor
      - Sleep tracking
      - 7-day battery life
      - Water resistant
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: delivered
      days_ago: 5
    outputs:
    - order_id
  targets:
    product_name: '{output.product_name}'
    order_id: '{output.order_id}'
    product_id: '{output.product_id}'
canonical_diff:
  create:
  - entity: ReturnRequest
    desc: Return request filed for the target order and product with reason defective
    properties:
      order_id: {expr: "x == target['order_id']"}
      product_id: {expr: "x == target['product_id']"}
      reason: {eq: defective}
      status:
        eq: pending
      refund_amount: {any: true}
      order_item_index: {any: true}
      product_name: {any: true}
      created_at: {any: true}
      resolution_note: {any: true}
  invariant:
  - collection: state.orders
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    filter: "a.order_id != target['order_id']"
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  - collection: state.wishlist
    preserve: ALL
  - collection: state.settings
    preserve: ALL
  named_invariants:
  - name: Agent did not place new orders or modify existing orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not add items to cart
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[4]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[5]
    severity: medium
  - name: Agent did not modify other return requests
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
  - name: Agent did not modify wishlist
    ref: invariant[11]
    severity: medium
  - name: Agent did not modify account settings
    ref: invariant[12]
    severity: medium
