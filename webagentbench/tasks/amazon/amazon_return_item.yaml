task_id: amazon_return_item
env_id: amazon
title: Request a Return for a Defective Item
instruction_template: 'Go to your orders, find the delivered order containing "{target.product_name}",
  and request a return for it. Select "defective" as the reason for the return.

  '
difficulty: medium
time_limit_seconds: 240
expected_steps: 16
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 8
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Smart Fitness Tracker
      brand: Fitbit
      category: Electronics
      price: 129.99
      rating: 4.3
      features:
      - Heart rate monitor
      - Sleep tracking
      - 7-day battery life
      - Water resistant
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: delivered
      days_ago: 5
    outputs:
    - order_id
  targets:
    product_name: '{output.product_name}'
    order_id: '{output.order_id}'
    product_id: '{output.product_id}'
eval:
  source: server_state
  checks:
  - expr: 'any(r.order_id == ''{target.order_id}'' and ''defective'' in r.reason.lower()
      for r in state.returns)

      '
    desc: A return with reason "defective" was filed for the correct order
  - expr: any(state.get_order(r.order_id) is not None and state.get_order(r.order_id).status
      in ('delivered', 'returned') for r in state.returns if r.order_id == '{target.order_id}')
    desc: Return was filed against a delivered order
  negative_checks:
  - expr: 'sum(1 for r in state.returns if r.order_id == ''{target.order_id}'') <=
      1

      '
    desc: Only one return was filed for the target order
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
    penalty: 0.1
  - expr: "not any(o.id not in state._initial_snapshot.get('orders', {}) for o in\
      \ state.orders)"
    desc: No new orders placed (return task should not add orders)
    penalty: 0.15
secondary_primitives: []
