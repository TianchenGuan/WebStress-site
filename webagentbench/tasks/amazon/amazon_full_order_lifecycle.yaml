task_id: amazon_full_order_lifecycle
env_id: amazon
title: Complete Order Lifecycle with Cancel, Return, and Review
instruction_template: 'Complete this multi-step shopping workflow: 1. Search for ''{target.cancel_name}''
  and purchase it. 2. Immediately cancel that order. 3. Search for ''{target.keep_name}''
  and ''{target.return_name}'', add both to your cart, and purchase them together
  in one order. 4. Return ''{target.return_name}'' from that order with reason ''not_as_described''.
  5. Write a 5-star review for ''{target.keep_name}'' with the title ''{target.review_title}''.

  '
difficulty: frontier
time_limit_seconds: 540
expected_steps: 52
primary_primitives:
- backtracking
secondary_primitives: []
start_path: /
seed:
  distractors: 18
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Smart Bluetooth Tracker 4-Pack
      brand: TechNova
      category: Electronics
      price: 34.99
      rating: 4.5
      features:
      - Bluetooth 5.0
      - 300ft range
      - Replaceable battery
      - Water resistant
      variants: []
      in_stock: true
    outputs:
    - product_id_cancel
    - product_name_cancel
    - product_price_cancel
  - use: featured_product
    params:
      name: Ceramic Pour-Over Coffee Set
      brand: Hearthway
      category: Home & Kitchen
      price: 42.99
      rating: 4.6
      features:
      - Hand-crafted ceramic
      - Stainless steel filter
      - 4-cup capacity
      - Gift box included
      variants: []
      in_stock: true
    outputs:
    - product_id_keep
    - product_name_keep
    - product_price_keep
  - use: featured_product
    params:
      name: Silk Pillowcase Set of 2
      brand: NestWell
      category: Home & Kitchen
      price: 28.99
      rating: 4.3
      features:
      - 100% mulberry silk
      - Envelope closure
      - Hypoallergenic
      - Standard size
      variants: []
      in_stock: true
    outputs:
    - product_id_return
    - product_name_return
    - product_price_return
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 15.0
      - 80.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 8
      price_range:
      - 15.0
      - 60.0
    outputs:
    - catalog_home
  targets:
    cancel_name: '{output.product_name_cancel}'
    cancel_pid: '{output.product_id_cancel}'
    keep_name: '{output.product_name_keep}'
    keep_pid: '{output.product_id_keep}'
    return_name: '{output.product_name_return}'
    return_pid: '{output.product_id_return}'
    review_title: Outstanding Coffee Experience
eval:
  source: server_state
  checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) >=
      2
    desc: At least 2 orders placed
  - expr: 'any(o.status == ''cancelled'' and any(item.product_id == ''{target.cancel_pid}''
      for item in o.items) for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: First order was cancelled
  - expr: 'any(any(item.product_id == ''{target.keep_pid}'' for item in o.items) and
      any(item.product_id == ''{target.return_pid}'' for item in o.items) for o in
      state.orders if o.id not in state._initial_snapshot.get(''orders'', {}) and o.status != ''cancelled'')

      '
    desc: Second order contains both keep and return products
  - expr: 'any(r.product_id == ''{target.return_pid}'' and r.reason == ''not_as_described''
      for r in state.returns)

      '
    desc: Return filed with correct reason
  - expr: 'any(r.product_id == ''{target.keep_pid}'' and r.rating == 5 and r.title
      == ''{target.review_title}'' for r in state.reviews)

      '
    desc: 5-star review for kept product
  - expr: len(state.cart_items) == 0
    desc: Cart empty after all transactions
  - expr: 'any(o.status == ''confirmed'' for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: At least one order is confirmed (not cancelled)
  - expr: any(r.product_id == '{target.return_pid}' for r in state.returns)
    desc: A return was filed
  negative_checks:
  - expr: not any(r.product_id == '{target.keep_pid}' for r in state.returns)
    desc: Kept product was not returned
    penalty: 0.2
  - expr: not any(r.product_id == '{target.cancel_pid}' for r in state.returns)
    desc: Cancelled product was not returned (it was cancelled, not returned)
    penalty: 0.15
  - expr: 'not any(r.product_id == ''{target.cancel_pid}'' and r.rating == 5 for r
      in state.reviews)

      '
    desc: No review for cancelled product
    penalty: 0.1
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      3
    desc: No more than 3 orders placed
    penalty: 0.1
