task_id: amazon_return_and_upgrade_cycle
env_id: amazon
title: Return Disappointing Items and Purchase Upgrades with Review
instruction_template: 'You received a disappointing order. Handle returns and buy
  upgrades: 1. Return ''{target.ret_name_1}'' from your delivered order with reason
  ''defective''. 2. Return ''{target.ret_name_2}'' from the same order with reason
  ''not_as_described''. 3. Search for ''{target.up_name_1}'' as a replacement for
  the earphones and add it to cart. 4. Search for ''{target.up_name_2}'' as a replacement
  for the desk lamp and add it to cart. 5. Purchase both upgrades in a single order.
  6. Write a 5-star review for ''{target.up_name_1}'' with the title ''{target.review_title}''.

  '
difficulty: frontier
time_limit_seconds: 540
expected_steps: 50
primary_primitives:
- backtracking
secondary_primitives: []
start_path: /orders
seed:
  distractors: 18
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Basic Wired Earphones
      brand: SoundCore
      category: Electronics
      price: 14.99
      rating: 3.5
      features:
      - 3.5mm jack
      - In-ear design
      - Inline microphone
      variants: []
      in_stock: true
    outputs:
    - product_id_ret1
    - product_name_ret1
    - product_price_ret1
  - use: featured_product
    params:
      name: Standard Desk Lamp
      brand: LuminDesk
      category: Office Supplies
      price: 19.99
      rating: 3.4
      features:
      - LED bulb
      - Adjustable neck
      - On/off switch
      variants: []
      in_stock: true
    outputs:
    - product_id_ret2
    - product_name_ret2
    - product_price_ret2
  - use: featured_product
    params:
      name: Premium Wireless Earbuds ANC
      brand: Wavefront
      category: Electronics
      price: 59.99
      rating: 4.8
      features:
      - Active noise cancellation
      - 8-hour battery life
      - Wireless charging case
      - IPX5 waterproof
      variants: []
      in_stock: true
    outputs:
    - product_id_up1
    - product_name_up1
    - product_price_up1
  - use: featured_product
    params:
      name: Smart LED Desk Lamp Touch
      brand: LuminDesk
      category: Office Supplies
      price: 44.99
      rating: 4.7
      features:
      - Touch controls
      - 5 brightness levels
      - USB charging port
      - Color temperature adjustment
      variants: []
      in_stock: true
    outputs:
    - product_id_up2
    - product_name_up2
    - product_price_up2
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_ret1}'
      - '{output.product_id_ret2}'
      status: delivered
      days_ago: 5
    outputs:
    - order_id_ret
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Office Supplies
      count: 6
      price_range:
      - 10.0
      - 50.0
    outputs:
    - catalog_office
  targets:
    ret_name_1: '{output.product_name_ret1}'
    ret_pid_1: '{output.product_id_ret1}'
    ret_name_2: '{output.product_name_ret2}'
    ret_pid_2: '{output.product_id_ret2}'
    up_name_1: '{output.product_name_up1}'
    up_pid_1: '{output.product_id_up1}'
    up_name_2: '{output.product_name_up2}'
    up_pid_2: '{output.product_id_up2}'
    order_id: '{output.order_id_ret}'
    review_title: Major Upgrade Worth Every Penny
eval:
  source: server_state
  checks:
  - expr: 'any(r.product_id == ''{target.ret_pid_1}'' and r.reason == ''defective''
      for r in state.returns)

      '
    desc: Return 1 filed with reason defective
  - expr: 'any(r.product_id == ''{target.ret_pid_2}'' and r.reason == ''not_as_described''
      for r in state.returns)

      '
    desc: Return 2 filed with reason not_as_described
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order placed
  - expr: 'any(any(item.product_id == ''{target.up_pid_1}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Upgrade 1 purchased
  - expr: 'any(any(item.product_id == ''{target.up_pid_2}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Upgrade 2 purchased
  - expr: 'any(any(item.product_id == ''{target.up_pid_1}'' for item in o.items) and
      any(item.product_id == ''{target.up_pid_2}'' for item in o.items) for o in state.orders
      if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Both upgrades in same order
  - expr: 'any(r.product_id == ''{target.up_pid_1}'' and r.rating == 5 and r.title
      == ''{target.review_title}'' for r in state.reviews)

      '
    desc: 5-star review for upgrade 1
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: 'len([r for r in state.returns if r.order_id == ''{target.order_id}''])
      >= 2

      '
    desc: Both returns filed against the correct order
  negative_checks:
  - expr: not any(r.product_id == '{target.up_pid_2}' for r in state.reviews)
    desc: No review for upgrade 2 (only upgrade 1 should be reviewed)
    penalty: 0.1
  - expr: 'not any(r.product_id == ''{target.ret_pid_1}'' or r.product_id == ''{target.ret_pid_2}''
      for r in state.reviews)

      '
    desc: No reviews for returned products
    penalty: 0.1
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.1
  - expr: 'not any(r.reason != ''defective'' for r in state.returns if r.product_id
      == ''{target.ret_pid_1}'')

      '
    desc: Return 1 reason is exactly defective
    penalty: 0.15
