task_id: amazon_update_shipping
env_id: amazon
title: Update Shipping Address and Place an Order
instruction_template: 'Add a new shipping address with name "{target.recipient_name}",
  street "{target.street}", city "{target.city}", state "{target.state_code}", ZIP
  "{target.zip}". Set it as your default address. Then search for "{target.product_name}",
  add it to cart, and complete the purchase using this new default address.

  '
difficulty: medium
time_limit_seconds: 300
expected_steps: 22
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 8
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Bamboo Cutting Board Set
      brand: Royal Craft Wood
      category: Home & Kitchen
      price: 39.99
      rating: 4.5
      features:
      - Set of 3 sizes
      - Organic bamboo
      - Juice grooves
      - Easy grip handles
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 6
      price_range:
      - 10.0
      - 80.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    recipient_name: Jordan Lee
    street: 55 Elm Street
    city: Denver
    state_code: CO
    zip: '80202'
eval:
  source: server_state
  checks:
  - expr: 'any(addr.full_name == ''Jordan Lee'' and ''55 Elm'' in addr.street_address
      for addr in state.addresses)

      '
    desc: New address was added with correct details
  - expr: any(addr.full_name == 'Jordan Lee' and addr.state == 'CO' for addr in state.addresses)
    desc: Address has correct state (CO)
  - expr: any(addr.full_name == 'Jordan Lee' and addr.zip_code == '80202' for addr
      in state.addresses)
    desc: Address has correct ZIP code
  - expr: 'state.settings.default_address_id is not None and any(addr.id == state.settings.default_address_id
      and addr.full_name == ''Jordan Lee'' for addr in state.addresses)

      '
    desc: New address is set as default
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(any(item.product_id == ''{target.product_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order contains the target product
  - expr: "any(\n  order.shipping_address_id not in state._initial_snapshot.get('addresses',\
      \ {})\n  for order in state.orders if order.id not in state._initial_snapshot.get('orders',\
      \ {}))\n"
    desc: New order uses the new address (not one of the pre-seeded addresses)
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
secondary_primitives: []
