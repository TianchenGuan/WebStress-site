task_id: amazon_category_exploration
env_id: amazon
title: Browse Categories and Build a Multi-Category Cart
instruction_template: 'Browse three different categories - "{target.cat_1}", "{target.cat_2}",
  and "{target.cat_3}". Add one item from each category to your cart, then complete
  the checkout using the shipping address for Jordan Parker at 742 Evergreen Terrace
  and the Visa card ending in 4242.

  '
difficulty: medium
time_limit_seconds: 300
expected_steps: 24
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 15
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Resistance Bands Set
      brand: Fit Simplify
      category: Sports & Outdoors
      price: 19.99
      rating: 4.5
      features:
      - 5 resistance levels
      - Latex free
      - Carrying bag included
      - Exercise guide
      variants: []
      in_stock: true
    outputs:
    - product_id_1
    - product_name_1
    - product_price_1
  - use: featured_product
    params:
      name: Bestselling Novel Collection
      brand: Penguin Books
      category: Books
      price: 32.99
      rating: 4.6
      features:
      - Hardcover edition
      - 3-book box set
      - Award-winning authors
      variants: []
      in_stock: true
    outputs:
    - product_id_2
    - product_name_2
    - product_price_2
  - use: featured_product
    params:
      name: Aromatherapy Candle Set
      brand: Yankee Candle
      category: Home & Kitchen
      price: 28.99
      rating: 4.4
      features:
      - Set of 4 scents
      - Soy wax blend
      - 30-hour burn time each
      - Gift box packaging
      variants: []
      in_stock: true
    outputs:
    - product_id_3
    - product_name_3
    - product_price_3
  - use: product_catalog
    params:
      category: Sports & Outdoors
      count: 5
      price_range:
      - 10.0
      - 100.0
    outputs:
    - catalog_ids_1
  - use: product_catalog
    params:
      category: Books
      count: 5
      price_range:
      - 8.0
      - 60.0
    outputs:
    - catalog_ids_2
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 5
      price_range:
      - 10.0
      - 80.0
    outputs:
    - catalog_ids_3
  targets:
    cat_1: Sports & Outdoors
    cat_2: Books
    cat_3: Home & Kitchen
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(len(order.items) >= 3 for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: New order contains at least 3 items
  - expr: 'any(any(item.product_id in [p.id for p in state.products if ''Sports''
      in p.category or ''Outdoors'' in p.category] for item in order.items) for order
      in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: At least one item from Sports and Outdoors category
  - expr: 'any(any(item.product_id in [p.id for p in state.products if ''Books'' in
      p.category] for item in order.items) for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: At least one item from Books category
  - expr: 'any(any(item.product_id in [p.id for p in state.products if ''Home'' in
      p.category or ''Kitchen'' in p.category] for item in order.items) for order
      in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: At least one item from Home and Kitchen category
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
secondary_primitives: []
