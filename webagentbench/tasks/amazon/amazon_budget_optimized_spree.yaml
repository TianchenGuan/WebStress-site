task_id: amazon_budget_optimized_spree
env_id: amazon
title: Buy Highest-Rated Product Under $60 from 5 Categories
instruction_template: 'Shop across five categories: Electronics, Books, Home & Kitchen,
  Clothing, and Sports & Outdoors. In each category, find the highest-rated product
  that costs less than $60.00. Add all five winners to your cart and complete checkout
  in a single order. Your total must stay under $250.00.

  '
difficulty: frontier
time_limit_seconds: 540
expected_steps: 50
primary_primitives:
- grounding
secondary_primitives: []
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Pro Wireless Charger Stand
      brand: ChargeMax
      category: Electronics
      price: 39.99
      rating: 4.9
      features:
      - 15W fast charge
      - Qi certified
      - LED indicator
      - Anti-slip base
      variants: []
      in_stock: true
    outputs:
    - product_id_cat1
    - product_name_cat1
    - product_price_cat1
  - use: featured_product
    params:
      name: Mindful Leadership Handbook
      brand: Clearview Books
      category: Books
      price: 24.99
      rating: 4.8
      features:
      - Hardcover edition
      - 320 pages
      - Foreword by industry leader
      variants: []
      in_stock: true
    outputs:
    - product_id_cat2
    - product_name_cat2
    - product_price_cat2
  - use: featured_product
    params:
      name: Ceramic Knife Set 5-Piece
      brand: Stonemill Kitchen
      category: Home & Kitchen
      price: 49.99
      rating: 4.7
      features:
      - Ultra-sharp ceramic blades
      - Ergonomic handles
      - Knife block included
      - Dishwasher safe
      variants: []
      in_stock: true
    outputs:
    - product_id_cat3
    - product_name_cat3
    - product_price_cat3
  - use: featured_product
    params:
      name: Performance Running Shorts
      brand: FitEdge
      category: Clothing
      price: 32.99
      rating: 4.8
      features:
      - Moisture-wicking fabric
      - Built-in liner
      - Zippered pocket
      - Reflective trim
      variants: []
      in_stock: true
    outputs:
    - product_id_cat4
    - product_name_cat4
    - product_price_cat4
  - use: featured_product
    params:
      name: Foam Roller Recovery Pro
      brand: Endurafit
      category: Sports & Outdoors
      price: 28.99
      rating: 4.7
      features:
      - High-density EVA foam
      - Textured surface
      - 18-inch length
      - Carry bag included
      variants: []
      in_stock: true
    outputs:
    - product_id_cat5
    - product_name_cat5
    - product_price_cat5
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 20.0
      - 90.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Books
      count: 8
      price_range:
      - 10.0
      - 40.0
    outputs:
    - catalog_books
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 8
      price_range:
      - 15.0
      - 70.0
    outputs:
    - catalog_home
  - use: product_catalog
    params:
      category: Clothing
      count: 8
      price_range:
      - 15.0
      - 60.0
    outputs:
    - catalog_clothing
  - use: product_catalog
    params:
      category: Sports & Outdoors
      count: 8
      price_range:
      - 10.0
      - 50.0
    outputs:
    - catalog_sports
  targets:
    product_id_cat1: '{output.product_id_cat1}'
    product_id_cat2: '{output.product_id_cat2}'
    product_id_cat3: '{output.product_id_cat3}'
    product_id_cat4: '{output.product_id_cat4}'
    product_id_cat5: '{output.product_id_cat5}'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.product_id_cat1}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Electronics winner purchased
  - expr: 'any(any(item.product_id == ''{target.product_id_cat2}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Books winner purchased
  - expr: 'any(any(item.product_id == ''{target.product_id_cat3}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Home & Kitchen winner purchased
  - expr: 'any(any(item.product_id == ''{target.product_id_cat4}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Clothing winner purchased
  - expr: 'any(any(item.product_id == ''{target.product_id_cat5}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Sports winner purchased
  - expr: 'any(len(o.items) >= 5 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order has at least 5 items
  - expr: 'all(o.total < 250 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order total under $250
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one order placed
    penalty: 0.15
  - expr: 'all(all(item.unit_price < 60 for item in o.items) for o in state.orders
      if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: All items under $60
    penalty: 0.15
  - expr: 'not any(len(o.items) > 6 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: No extra items beyond the 5 winners
    penalty: 0.1
  - expr: 'not any(len(o.items) < 5 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: At least 5 items in the order
    penalty: 0.1
