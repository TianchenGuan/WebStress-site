task_id: amazon_complete_gift_setup
env_id: amazon
title: Set Up Gift Purchase with New Address and Payment
instruction_template: 'Set up a gift purchase for {target.recipient_name}. First,
  add a new shipping address: name "{target.recipient_name}", street "{target.street}",
  city "{target.city}", state "{target.state_code}", ZIP "{target.zip}". Then add
  a new payment method (credit card). Finally, purchase the product "{target.gift_product}"
  and ship it to {target.recipient_name}''s address using the new payment method.

  '
difficulty: hard
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 17
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Kindle Paperwhite Signature Edition
      brand: Amazon
      category: Electronics
      price: 189.99
      rating: 4.8
      features:
      - 6.8-inch display
      - Wireless charging
      - 32GB storage
      - Adjustable warm light
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 50.0
      - 300.0
    outputs:
    - catalog_ids
  - use: product_catalog
    params:
      category: Books
      count: 6
      price_range:
      - 10.0
      - 40.0
    outputs:
    - catalog_books
  targets:
    gift_product: Kindle Paperwhite Signature Edition
    gift_product_id: '{output.product_id}'
    recipient_name: Maria Chen
    street: 500 Oak Ave
    city: Portland
    state_code: OR
    zip: '97201'
eval:
  source: server_state
  checks:
  - expr: 'any(addr.full_name == ''Maria Chen'' and addr.street_address == ''500 Oak
      Ave'' and addr.city == ''Portland'' and addr.state == ''OR'' and addr.zip_code
      == ''97201'' for addr in state.addresses)

      '
    desc: New address added with correct details for Maria Chen
  - expr: 'len(state.payment_methods) >= 4

      '
    desc: A new payment method was added (3 pre-loaded + at least 1 new)
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(any(item.product_id == ''{target.gift_product_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Gift product was purchased
  - expr: 'any(any(addr.full_name == ''Maria Chen'' for addr in state.addresses if
      addr.id == order.shipping_address_id) for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order shipped to Maria Chen's address
  - expr: "any(\n  order.payment_method_id not in state._initial_snapshot.get('payment_methods',\
      \ {})\n  for order in state.orders\n  if order.id not in state._initial_snapshot.get('orders',\
      \ {})\n  and any(item.product_id == '{target.gift_product_id}' for item in order.items))\n"
    desc: Order uses the new payment method, not any pre-loaded one
  negative_checks:
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
  - expr: 'not any(r.id not in state._initial_snapshot.get(''returns'', {}) for r in state.returns)'
    desc: No returns filed when none required
    penalty: 0.15
  - expr: 'all( len(order.items) == 1 and order.items[0].product_id == ''{target.gift_product_id}''
      and order.items[0].quantity == 1 for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Gift checkout purchased only the intended gift product
    penalty: 0.2
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.address.add') == 1
    desc: Exactly one new recipient address was added for the gift flow
    penalty: 0.1
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.payment.add') == 1
    desc: Exactly one new payment method was added for the gift flow
    penalty: 0.1
secondary_primitives: []
