task_id: amazon_buy_highest_rated
env_id: amazon
title: Buy the Highest-Rated Product in a Category
instruction_template: 'Search for products in the "{target.category}" category, find
  the one with the highest customer rating (at least 4.5 stars), and purchase it.
  Use the shipping address for Jordan Parker at 742 Evergreen Terrace and the Visa
  card ending in 4242.

  '
difficulty: medium
time_limit_seconds: 280
expected_steps: 22
primary_primitives:
- verification
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Premium Yoga Mat
      brand: Manduka
      category: Sports & Outdoors
      price: 89.99
      rating: 4.95
      review_count: 3200
      features:
      - Extra thick cushioning
      - Non-slip surface
      - Eco-friendly material
      - Carrying strap included
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  targets:
    category: Sports & Outdoors
    best_product_id: '{output.product_id}'
    best_product_name: '{output.product_name}'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(any(item.product_id == ''{target.best_product_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order contains the highest-rated product
  - expr: any(order.status == 'confirmed' and any(item.product_id == '{target.best_product_id}'
      for item in order.items) for order in state.orders if order.id not in state._initial_snapshot.get('orders', {}))
    desc: Order containing the target product is confirmed
  - expr: 'any(any(next((p.rating for p in state.products if p.id == item.product_id),
      0) >= 4.5 for item in order.items) for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Purchased product has a rating of at least 4.5 stars
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.15
  - expr: 'all(any(item.product_id == ''{target.best_product_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Purchased product matches the target highest-rated product
    penalty: 0.3
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
secondary_primitives: []
