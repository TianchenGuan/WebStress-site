task_id: amazon_order_management_suite
env_id: amazon
title: Full Order Lifecycle Management
instruction_template: 'Complete a full order management workflow. First, place an
  order for "{target.first_order_product}" using the shipping address for Jordan Parker
  at 742 Evergreen Terrace and the Visa card ending in 4242. After the order is placed,
  check the order details to confirm it. Then cancel that order. Next, place a new
  order containing "{target.second_item1}" and "{target.second_item2}" using the same
  address and payment method. Verify that the first order shows as cancelled and the
  second order is confirmed.

  '
difficulty: hard
time_limit_seconds: 480
expected_steps: 45
primary_primitives:
- planning
start_path: /
seed:
  distractors: 18
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Portable SSD 1TB
      brand: Samsung
      category: Electronics
      price: 109.99
      rating: 4.7
      features:
      - USB 3.2 Gen 2
      - 1050 MB/s read speed
      - Shock resistant
      - Compact design
      variants: []
      in_stock: true
    outputs:
    - product_id_first
    - product_name_first
    - product_price_first
  - use: featured_product
    params:
      name: Mechanical Pencil Set Premium
      brand: Pentel
      category: Office Supplies
      price: 14.99
      rating: 4.5
      features:
      - 3 pencil set
      - 0.5mm and 0.7mm
      - Eraser refills included
      variants: []
      in_stock: true
    outputs:
    - product_id_second1
    - product_name_second1
    - product_price_second1
  - use: featured_product
    params:
      name: Notebook 5-Pack Lined
      brand: Moleskine
      category: Office Supplies
      price: 24.99
      rating: 4.6
      features:
      - A5 size
      - 80 pages each
      - Lay-flat binding
      - Acid-free paper
      variants: []
      in_stock: true
    outputs:
    - product_id_second2
    - product_name_second2
    - product_price_second2
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 30.0
      - 250.0
    outputs:
    - catalog_elec
  - use: product_catalog
    params:
      category: Office Supplies
      count: 8
      price_range:
      - 5.0
      - 60.0
    outputs:
    - catalog_office
  targets:
    first_order_product: Portable SSD 1TB
    first_product_id: '{output.product_id_first}'
    second_item1: Mechanical Pencil Set Premium
    second_item1_id: '{output.product_id_second1}'
    second_item2: Notebook 5-Pack Lined
    second_item2_id: '{output.product_id_second2}'
eval:
  source: server_state
  checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) >=
      2
    desc: At least two new orders were placed
  - expr: 'any(any(item.product_id == ''{target.first_product_id}'' for item in order.items)
      and order.status == ''cancelled'' for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: First order with Portable SSD is cancelled
  - expr: 'any(any(item.product_id == ''{target.second_item1_id}'' for item in order.items)
      and order.status != ''cancelled'' for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Second order containing Mechanical Pencil Set is active
  - expr: 'any(any(item.product_id == ''{target.second_item2_id}'' for item in order.items)
      and order.status != ''cancelled'' for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Second order containing Notebook 5-Pack is active
  - expr: 'any(any(item.product_id == ''{target.second_item1_id}'' for item in order.items)
      and any(item.product_id == ''{target.second_item2_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Both second-order items are in the same order
  - expr: "all( any(\n  addr.id == order.shipping_address_id\n  and addr.full_name\
      \ == 'Jordan Parker'\n  and addr.street_address == '742 Evergreen Terrace'\n\
      \  for addr in state.addresses\n) for order in state.orders if order.id not in state._initial_snapshot.get('orders', {}))\n"
    desc: All new orders use Jordan Parker's shipping address
  - expr: "all( any(\n  pm.id == order.payment_method_id\n  and pm.card_type == 'Visa'\n\
      \  and pm.last_four == '4242'\n  for pm in state.payment_methods\n) for order\
      \ in state.orders if order.id not in state._initial_snapshot.get('orders', {}))\n"
    desc: All new orders use the required Visa card ending in 4242
  negative_checks:
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after all operations
    penalty: 0.1
  - expr: 'sum(1 for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {})
      and order.status == ''cancelled'') <= 1

      '
    desc: Only one new order was cancelled
    penalty: 0.15
  - expr: 'not any( any(item.product_id not in [''{target.first_product_id}'', ''{target.second_item1_id}'',
      ''{target.second_item2_id}''] for item in order.items) for order in state.orders
      if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: No unrelated products were purchased during the order-management workflow
    penalty: 0.15
  - expr: 'not any( order.status == ''cancelled'' and (any(item.product_id == ''{target.second_item1_id}''
      for item in order.items) or any(item.product_id == ''{target.second_item2_id}''
      for item in order.items)) for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Replacement office-supplies order was not cancelled by mistake
    penalty: 0.2
  - expr: "not any( e.action in [\n  'amazon.address.add',\n  'amazon.address.update',\n\
      \  'amazon.address.remove',\n  'amazon.payment.add',\n  'amazon.payment.remove',\n\
      \  'amazon.return.create'\n] for e in state.audit_log)"
    desc: Workflow did not mutate account details or create returns outside the required
      lifecycle
    penalty: 0.1
secondary_primitives: []
