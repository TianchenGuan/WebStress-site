task_id: amazon_return_and_rebuy
env_id: amazon
title: Return an Item and Buy a Replacement
instruction_template: 'You have a past order containing "{target.return_product}".
  Initiate a return for that item with the reason "wrong_item". Then find and purchase
  a replacement product "{target.replacement_name}" from the same category ({target.category}).
  Complete checkout for the replacement using the shipping address for {target.shipping_name}
  at {target.shipping_street} and the {target.payment_type} card ending in {target.payment_last_four}.

  '
difficulty: hard
time_limit_seconds: 420
expected_steps: 30
primary_primitives:
- verification
start_path: /
seed:
  distractors: 16
  actors: {}
  steps:
  - use: featured_product
    params:
      name: USB-C Docking Station
      brand: CalDigit
      category: Electronics
      price: 89.99
      rating: 4.2
      features:
      - 10 ports
      - 4K HDMI output
      - 100W power delivery
      variants: []
      in_stock: true
    outputs:
    - product_id_ordered
    - product_name_ordered
    - product_price_ordered
  - use: featured_product
    params:
      name: Thunderbolt 4 Hub Pro
      brand: Anker
      category: Electronics
      price: 109.99
      rating: 4.7
      features:
      - 12 ports
      - Dual 4K display
      - 120W power delivery
      - Thunderbolt 4 compatible
      variants: []
      in_stock: true
    outputs:
    - product_id_replacement
    - product_name_replacement
    - product_price_replacement
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_ordered}'
      status: delivered
      days_ago: 5
    outputs:
    - order_id
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 30.0
      - 200.0
    outputs:
    - catalog_ids
  targets:
    return_product: USB-C Docking Station
    return_product_id: '{output.product_id_ordered}'
    replacement_name: Thunderbolt 4 Hub Pro
    replacement_id: '{output.product_id_replacement}'
    original_order_id: '{output.order_id}'
    category: Electronics
    shipping_name: Jordan Parker
    shipping_street: 742 Evergreen Terrace
    payment_type: Visa
    payment_last_four: '4242'
canonical_diff:
  create:
  - entity: ReturnRequest
    desc: Return request filed for the target order with reason wrong_item
    properties:
      order_id: {expr: "x == target['original_order_id']"}
      product_id: {expr: "x == target['return_product_id']"}
      reason: {eq: wrong_item}
      status: {any: true}
      refund_amount: {any: true}
      order_item_index: {any: true}
      product_name: {any: true}
      created_at: {any: true}
      resolution_note: {any: true}
  - entity: Order
    desc: New one-item order for the replacement product using the required address and payment
    properties:
      items:
        expr: "len(x) == 1 and x[0]['product_id'] == target['replacement_id']"
      shipping_address_id:
        expr: "any(a.full_name == target['shipping_name'] and a.street_address == target['shipping_street'] for a in state.addresses if a.id == x)"
      payment_method_id:
        expr: "any(p.card_type == target['payment_type'] and p.last_four == target['payment_last_four'] for p in state.payment_methods if p.id == x)"
      status: {any: true}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  invariant:
  - collection: state.orders
    filter: "not any(it.get('product_id') == target['replacement_id'] for it in (a.items or []))"
    preserve: ALL
  - collection: state.returns
    filter: "a.order_id != target['original_order_id']"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  named_invariants:
  - name: Agent did not modify other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify other return requests
    ref: invariant[1]
    severity: medium
  - name: Agent did not modify product catalog
    ref: invariant[2]
    severity: critical
  - name: Agent did not leave items in cart after checkout
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[4]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[5]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
