task_id: amazon_diagnose_cart
env_id: amazon
title: Diagnose and Fix Cart Problems
instruction_template: "Your shopping cart seems to have issues \u2014 some items may be out of stock or\
  \ have incorrect quantities. Review your cart, remove any out-of-stock items, and correct the quantity\
  \ of \"{target.product_name}\" to {target.correct_qty}. The current quantity is wrong.\n"
difficulty: hard
time_limit_seconds: 300
expected_steps: 22
primary_primitives:
- state_tracking
start_path: /cart
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Portable Bluetooth Speaker
      brand: JBL
      category: Electronics
      price: 69.99
      rating: 4.6
      features:
      - Waterproof IP67
      - 12-hour playtime
      - Wireless stereo pairing
      - Built-in powerbank
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
    - product_list_price
  - use: featured_product
    params:
      name: USB-C Charging Cable 3-Pack
      brand: Anker
      category: Electronics
      price: 15.99
      rating: 4.8
      features:
      - 6ft braided nylon
      - Fast charging support
      - 10000+ bend lifespan
      variants: []
      in_stock: false
    outputs:
    - oos_product_id
    - oos_product_name
    - oos_product_price
    - oos_product_list_price
  - use: featured_product
    params:
      name: Wireless Charging Pad
      brand: Samsung
      category: Electronics
      price: 29.99
      rating: 4.3
      features:
      - 15W fast charging
      - Qi compatible
      - LED indicator
      - Non-slip surface
      variants: []
      in_stock: true
    outputs:
    - extra_product_id
    - extra_product_name
    - extra_product_price
    - extra_product_list_price
  - use: pre_filled_cart
    params:
      product_ids:
      - '{output.product_id}'
      - '{output.oos_product_id}'
      - '{output.extra_product_id}'
      quantities:
      - 5
      - 2
      - 1
    outputs:
    - cart_item_ids
    - cart_total
  targets:
    product_name: Portable Bluetooth Speaker
    product_id: '{output.product_id}'
    correct_qty: 2
    oos_product_name: USB-C Charging Cable 3-Pack
    oos_product_id: '{output.oos_product_id}'
    extra_product_name: Wireless Charging Pad
    extra_product_id: '{output.extra_product_id}'
    extra_product_qty: 1
eval:
  source: server_state
  checks:
  - expr: 'not any(item.product_id == ''{target.oos_product_id}'' for item in state.cart_items)

      '
    desc: Out-of-stock item (USB-C Charging Cable) removed from cart
  - expr: 'any(item.product_id == ''{target.product_id}'' and item.quantity == {target.correct_qty} for
      item in state.cart_items)

      '
    desc: Target product quantity corrected to the specified amount
  - expr: 'any(item.product_id == ''{target.extra_product_id}'' and item.quantity == {target.extra_product_qty}
      for item in state.cart_items)

      '
    desc: In-stock comparison item remains in the cart at its original quantity
  negative_checks:
  - expr: 'sum(1 for item in state.cart_items if item.product_id == ''{target.product_id}'') == 1

      '
    desc: Target cart item was corrected in place instead of duplicated or removed
    penalty: 0.3
  - expr: 'not any(not order.id.startswith(''order_initial_'') for order in state.orders)

      '
    desc: No checkout was started while fixing the cart
    penalty: 0.15
  - expr: 'not any(not return_request.id.startswith(''return_initial_'') for return_request in state.returns)

      '
    desc: No return request was filed while fixing the cart
    penalty: 0.15
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.cart.add') == 0
    desc: Cart diagnosis did not add any new products
    penalty: 0.15
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.cart.remove') == 1
    desc: Cart diagnosis removed only the out-of-stock item
    penalty: 0.15
  - expr: "not any(\n  e.action in [\n    'amazon.address.add',\n    'amazon.address.update',\n    'amazon.address.remove',\n\
      \    'amazon.payment.add',\n    'amazon.payment.remove'\n  ]\n  for e in state.audit_log)"
    desc: Cart diagnosis did not mutate address or payment settings
    penalty: 0.1
secondary_primitives:
- verification
