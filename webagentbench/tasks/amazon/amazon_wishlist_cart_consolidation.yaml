task_id: amazon_wishlist_cart_consolidation
env_id: amazon
title: Consolidate Wishlist and Cart Then Checkout
instruction_template: 'Your cart has 2 items and your wishlist has 4 items. Move the
  2 cheapest wishlist items to your cart. Remove the 2 most expensive wishlist items
  from your wishlist. Then complete checkout for everything in your cart.

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 36
primary_primitives:
- state_tracking
secondary_primitives: []
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Phone Screen Protector
      brand: Pixelon
      category: Electronics
      price: 9.99
      rating: 4.3
      features:
      - Tempered glass
      - Scratch resistant
      - Easy installation
      variants: []
      in_stock: true
    outputs:
    - product_id_cart1
    - product_name_cart1
    - product_price_cart1
  - use: featured_product
    params:
      name: Microfiber Cleaning Cloth Set
      brand: BrightHearth
      category: Home & Kitchen
      price: 11.99
      rating: 4.2
      features:
      - 12-pack
      - Ultra soft
      - Machine washable
      variants: []
      in_stock: true
    outputs:
    - product_id_cart2
    - product_name_cart2
    - product_price_cart2
  - use: featured_product
    params:
      name: Travel Neck Pillow
      brand: ComfortFit
      category: Clothing
      price: 16.99
      rating: 4.4
      features:
      - Memory foam
      - Machine washable cover
      - Compact travel bag
      variants: []
      in_stock: true
    outputs:
    - product_id_wl_cheap1
    - product_name_wl_cheap1
    - product_price_wl_cheap1
  - use: featured_product
    params:
      name: Reusable Water Bottle
      brand: HydroLife
      category: Sports & Outdoors
      price: 19.99
      rating: 4.5
      features:
      - 32oz capacity
      - Double-wall insulated
      - BPA-free
      variants: []
      in_stock: true
    outputs:
    - product_id_wl_cheap2
    - product_name_wl_cheap2
    - product_price_wl_cheap2
  - use: featured_product
    params:
      name: Smart Home Hub
      brand: TechNova
      category: Electronics
      price: 69.99
      rating: 4.6
      features:
      - Voice control
      - Wi-Fi 6 support
      - Compatible with 100+ devices
      variants: []
      in_stock: true
    outputs:
    - product_id_wl_exp1
    - product_name_wl_exp1
    - product_price_wl_exp1
  - use: featured_product
    params:
      name: Espresso Machine Deluxe
      brand: Hearthway
      category: Home & Kitchen
      price: 79.99
      rating: 4.7
      features:
      - 15-bar pressure
      - Built-in grinder
      - Milk frother
      variants: []
      in_stock: true
    outputs:
    - product_id_wl_exp2
    - product_name_wl_exp2
    - product_price_wl_exp2
  - use: pre_filled_cart
    params:
      product_ids:
      - '{output.product_id_cart1}'
      - '{output.product_id_cart2}'
      quantities:
      - 1
      - 1
    outputs:
    - cart_item_ids
    - cart_total
  - use: wishlist_items
    params:
      product_ids:
      - '{output.product_id_wl_cheap1}'
      - '{output.product_id_wl_cheap2}'
      - '{output.product_id_wl_exp1}'
      - '{output.product_id_wl_exp2}'
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 15.0
      - 80.0
    outputs:
    - catalog_electronics
  targets:
    cheap1: '{output.product_id_wl_cheap1}'
    cheap2: '{output.product_id_wl_cheap2}'
    exp1: '{output.product_id_wl_exp1}'
    exp2: '{output.product_id_wl_exp2}'
    cart1: '{output.product_id_cart1}'
    cart2: '{output.product_id_cart2}'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.cart1}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Original cart item 1 in order
  - expr: 'any(any(item.product_id == ''{target.cart2}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Original cart item 2 in order
  - expr: 'any(any(item.product_id == ''{target.cheap1}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Cheap wishlist item 1 in order
  - expr: 'any(any(item.product_id == ''{target.cheap2}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Cheap wishlist item 2 in order
  - expr: '''{target.exp1}'' not in state.wishlist'
    desc: Expensive item 1 removed from wishlist
  - expr: '''{target.exp2}'' not in state.wishlist'
    desc: Expensive item 2 removed from wishlist
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.exp1}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Expensive item 1 not purchased
    penalty: 0.15
  - expr: 'not any(any(item.product_id == ''{target.exp2}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Expensive item 2 not purchased
    penalty: 0.15
  - expr: 'sum(1 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))
      <= 1

      '
    desc: Only one order placed
    penalty: 0.1
  - expr: not any(e.action.startswith('amazon.return.') for e in state.audit_log)
    desc: No off-task returns were opened or updated
    penalty: 0.1
  - expr: not any(e.action == 'amazon.review.add' for e in state.audit_log)
    desc: No off-task reviews were submitted
    penalty: 0.1
