task_id: amazon_cross_category_value_hunt
env_id: amazon
title: Find and Buy Highest-Rated Under-$40 Items Across Categories
instruction_template: 'Search for products in three categories: {target.cat_1}, {target.cat_2}, and {target.cat_3}.
  In each category, find the highest-rated product that costs less than $40.00. Then compare the three
  winners by rating and purchase the top two (the two with the highest ratings) in a single order.

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 38
primary_primitives:
- planning
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Ultra-Slim Wireless Mouse
      brand: TechNova
      category: Electronics
      price: 29.99
      rating: 4.8
      features:
      - 2.4GHz wireless
      - Silent click
      - USB-C rechargeable
      variants: []
      in_stock: true
    outputs:
    - product_id_e
    - product_name_e
    - product_price_e
  - use: featured_product
    params:
      name: Organic Green Tea Sampler
      brand: PureGlow
      category: Health & Beauty
      price: 18.99
      rating: 4.7
      features:
      - 20 tea bags
      - USDA Organic certified
      - 5 flavor varieties
      variants: []
      in_stock: true
    outputs:
    - product_id_h
    - product_name_h
    - product_price_h
  - use: featured_product
    params:
      name: Kids STEM Building Kit
      brand: MindSpark
      category: Toys & Games
      price: 34.99
      rating: 4.6
      features:
      - 250 pieces
      - Ages 8-14
      - STEM certified
      variants: []
      in_stock: true
    outputs:
    - product_id_t
    - product_name_t
    - product_price_t
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 15.0
      - 80.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Health & Beauty
      count: 8
      price_range:
      - 10.0
      - 60.0
    outputs:
    - catalog_health
  - use: product_catalog
    params:
      category: Toys & Games
      count: 8
      price_range:
      - 15.0
      - 70.0
    outputs:
    - catalog_toys
  targets:
    cat_1: Electronics
    cat_2: Health & Beauty
    cat_3: Toys & Games
    best_id_1: '{output.product_id_e}'
    best_id_2: '{output.product_id_h}'
    third_id: '{output.product_id_t}'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.best_id_1}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Top-rated product 1 purchased
  - expr: 'any(any(item.product_id == ''{target.best_id_2}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Top-rated product 2 purchased
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: 'any(o.status == ''confirmed'' for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Order is confirmed
  - expr: 'any(len(o.items) == 2 for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Order contains exactly two items
  - expr: 'any(any(item.product_id == ''{target.best_id_1}'' for item in o.items) and any(item.product_id
      == ''{target.best_id_2}'' for item in o.items) for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Both top-rated products are in the same order
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.third_id}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Third-ranked product was not purchased
    penalty: 0.2
  - expr: sum(1 for o in state.orders if not o.id.startswith('order_initial_')) <= 1
    desc: Only one order placed
    penalty: 0.1
  - expr: 'all(all(item.unit_price < 40 for item in o.items) for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: All purchased items are under $40
    penalty: 0.15
  - expr: not any(e.action.startswith('amazon.return.') for e in state.audit_log)
    desc: No off-task returns were opened or updated
    penalty: 0.1
  - expr: not any(e.action.startswith('amazon.wishlist.') for e in state.audit_log)
    desc: No off-task wishlist mutations were made
    penalty: 0.1
secondary_primitives:
- grounding
