task_id: amazon_multi_destination_orders
env_id: amazon
title: Add Address and Place Two Orders to Different Destinations
instruction_template: 'First, add a new shipping address: {target.new_name}, {target.new_street}, {target.new_city},
  OR {target.new_zip}. Then search for ''{target.product_1}'' and purchase it, shipping to the new {target.new_city}
  address. After that order is placed, search for ''{target.product_2}'' and purchase it using an existing
  address on file (not the {target.new_city} address).

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 40
primary_primitives:
- planning
secondary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Wireless Noise-Cancelling Headphones
      brand: AudioMax
      category: Electronics
      price: 79.99
      rating: 4.6
      features:
      - Active noise cancellation
      - 30-hour battery
      - Bluetooth 5.0
      variants: []
      in_stock: true
    outputs:
    - product_id_dest1
    - product_name_dest1
    - product_price_dest1
  - use: featured_product
    params:
      name: Cast Iron Dutch Oven
      brand: Ironstone Home
      category: Home & Kitchen
      price: 54.99
      rating: 4.5
      features:
      - 6-quart capacity
      - Pre-seasoned
      - Oven safe to 500F
      variants: []
      in_stock: true
    outputs:
    - product_id_dest2
    - product_name_dest2
    - product_price_dest2
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 20.0
      - 100.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 6
      price_range:
      - 15.0
      - 80.0
    outputs:
    - catalog_home
  targets:
    product_1: '{output.product_name_dest1}'
    product_id_dest1: '{output.product_id_dest1}'
    product_2: '{output.product_name_dest2}'
    product_id_dest2: '{output.product_id_dest2}'
    new_name: Sam Rivera
    new_street: 742 Maple Avenue
    new_city: Portland
    new_state: OR
    new_zip: '97201'
eval:
  source: server_state
  checks:
  - expr: 'any(a.full_name == ''Sam Rivera'' and ''742 Maple'' in a.street_address and a.city == ''Portland''
      and a.state == ''OR'' and a.zip_code == ''97201'' for a in state.addresses)

      '
    desc: New address was added correctly
  - expr: 'sum(1 for o in state.orders if not o.id.startswith(''order_initial_'')) >= 2

      '
    desc: At least 2 new orders placed
  - expr: 'any(any(item.product_id == ''{target.product_id_dest1}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Product 1 was ordered
  - expr: 'any(any(item.product_id == ''{target.product_id_dest2}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Product 2 was ordered
  - expr: 'any(o.shipping_address_id == next(a.id for a in state.addresses if a.city == ''Portland'' and
      a.full_name == ''Sam Rivera'') for o in state.orders if not o.id.startswith(''order_initial_'')
      and any(item.product_id == ''{target.product_id_dest1}'' for item in o.items))

      '
    desc: Product 1 shipped to Portland address
  - expr: 'any(o.shipping_address_id != next((a.id for a in state.addresses if a.city == ''Portland''
      and a.full_name == ''Sam Rivera''), '''') for o in state.orders if not o.id.startswith(''order_initial_'')
      and any(item.product_id == ''{target.product_id_dest2}'' for item in o.items))

      '
    desc: Product 2 shipped to a different address
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.product_id_dest1}'' for item in o.items) and any(item.product_id
      == ''{target.product_id_dest2}'' for item in o.items) for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Products are in separate orders, not combined
    penalty: 0.2
  - expr: 'sum(1 for o in state.orders if not o.id.startswith(''order_initial_'')) <= 2

      '
    desc: No more than 2 new orders placed
    penalty: 0.1
  - expr: 'not any(a.full_name == ''Sam Rivera'' and a.city != ''Portland'' for a in state.addresses)

      '
    desc: New address city is correctly Portland
    penalty: 0.1
  - expr: not any(e.action.startswith('amazon.return.') for e in state.audit_log)
    desc: No off-task returns were opened or updated
    penalty: 0.1
  - expr: not any(e.action == 'amazon.review.add' for e in state.audit_log)
    desc: No off-task reviews were submitted
    penalty: 0.1
