task_id: amazon_competitor_switchover
env_id: amazon
title: Compare Products and Buy the Superior Competitor
instruction_template: 'Search for ''{target.ref_name}'' and examine its details (price
  and rating). Then browse for similar products in the same category and subcategory.
  If you find a product with a higher rating AND a lower price than ''{target.ref_name}'',
  buy that superior product instead. If no product beats it on both criteria, buy
  ''{target.ref_name}''.

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 35
primary_primitives:
- grounding
secondary_primitives: []
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Pro Wireless Mouse
      brand: Wavefront
      category: Electronics
      price: 45.99
      rating: 4.2
      features:
      - Ergonomic design
      - 2.4GHz wireless
      - 6 programmable buttons
      variants: []
      in_stock: true
    outputs:
    - product_id_ref
    - product_name_ref
    - product_price_ref
  - use: featured_product
    params:
      name: Elite Wireless Mouse
      brand: TechNova
      category: Electronics
      subcategory: Mice
      price: 38.99
      rating: 4.8
      features:
      - Ultra-precise sensor
      - Silent click buttons
      - USB-C rechargeable
      - RGB lighting
      variants: []
      in_stock: true
    outputs:
    - product_id_best
    - product_name_best
    - product_price_best
  - use: competitor_products
    params:
      reference_product_id: '{output.product_id_ref}'
      count: 3
      price_variance: 0.15
    outputs:
    - competitor_ids
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  targets:
    ref_name: '{output.product_name_ref}'
    ref_pid: '{output.product_id_ref}'
    best_name: '{output.product_name_best}'
    best_pid: '{output.product_id_best}'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.best_pid}'' for item in o.items) for
      o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: The superior competitor was purchased
  - expr: 'any(o.status == ''confirmed'' for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order confirmed
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: '''{target.ref_pid}'' in [p for p in state.recently_viewed] or len(state.search_history)
      > 0

      '
    desc: Agent searched or viewed the reference product
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.ref_pid}'' for item in o.items)
      for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Reference product was NOT purchased (competitor is better)
    penalty: 0.25
  - expr: 'sum(1 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))
      <= 1

      '
    desc: Only one order placed
    penalty: 0.1
  - expr: 'all( len(o.items) == 1 and o.items[0].product_id == ''{target.best_pid}''
      and o.items[0].quantity == 1 for o in state.orders if o.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: No extra items or non-target products were purchased with the competitor
      order
    penalty: 0.2
  - expr: sum(1 for e in state.audit_log if e.action == 'amazon.checkout') == 1
    desc: Competitor-switchover workflow used a single checkout flow
    penalty: 0.1
  - expr: "not any(\n  e.action in [\n    'amazon.address.add',\n    'amazon.address.update',\n\
      \    'amazon.address.remove',\n    'amazon.payment.add',\n    'amazon.payment.remove'\n\
      \  ]\n  for e in state.audit_log)"
    desc: Competitor-switchover reused existing account checkout details
    penalty: 0.1
  - expr: "not any(\n  e.action in ['amazon.return.create', 'amazon.review.add']\n\
      \  for e in state.audit_log)"
    desc: Competitor-switchover did not create unrelated returns or reviews
    penalty: 0.1
