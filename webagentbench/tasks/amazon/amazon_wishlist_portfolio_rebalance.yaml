task_id: amazon_wishlist_portfolio_rebalance
env_id: amazon
title: Curate Wishlist by Category and Purchase Budget Items
instruction_template: 'Build and curate a wishlist, then purchase the best value items: 1. Search for
  and add these 6 products to your wishlist: ''{target.name_e_cheap}'', ''{target.name_e_exp}'', ''{target.name_h_cheap}'',
  ''{target.name_h_exp}'', ''{target.name_s_cheap}'', ''{target.name_s_exp}''. 2. Review your wishlist.
  Within each category (Electronics, Home & Kitchen, Sports & Outdoors), identify the more expensive product
  and remove it from the wishlist. 3. Move the remaining 3 wishlist items to your cart and complete checkout.

  '
difficulty: frontier
time_limit_seconds: 540
expected_steps: 50
primary_primitives:
- state_tracking
secondary_primitives:
- planning
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: USB Desk Fan Quiet
      brand: TechNova
      category: Electronics
      price: 19.99
      rating: 4.5
      features:
      - Ultra-quiet motor
      - 3 speed settings
      - USB powered
      - 360 degree rotation
      variants: []
      in_stock: true
    outputs:
    - product_id_e_cheap
    - product_name_e_cheap
    - product_price_e_cheap
  - use: featured_product
    params:
      name: 4K Ultra Monitor 32-inch
      brand: Pixelon
      category: Electronics
      price: 89.99
      rating: 4.7
      features:
      - 4K UHD resolution
      - IPS panel
      - HDMI and DisplayPort
      - VESA mount compatible
      variants: []
      in_stock: true
    outputs:
    - product_id_e_exp
    - product_name_e_exp
    - product_price_e_exp
  - use: featured_product
    params:
      name: Bamboo Salad Bowl Set
      brand: CedarCraft
      category: Home & Kitchen
      price: 22.99
      rating: 4.4
      features:
      - Sustainable bamboo
      - 4-piece set
      - Hand-wash only
      - Serving utensils included
      variants: []
      in_stock: true
    outputs:
    - product_id_h_cheap
    - product_name_h_cheap
    - product_price_h_cheap
  - use: featured_product
    params:
      name: Professional Stand Mixer
      brand: Ironstone Home
      category: Home & Kitchen
      price: 79.99
      rating: 4.6
      features:
      - 500W motor
      - 10 speed settings
      - 5-quart bowl
      - 3 attachments included
      variants: []
      in_stock: true
    outputs:
    - product_id_h_exp
    - product_name_h_exp
    - product_price_h_exp
  - use: featured_product
    params:
      name: Resistance Bands Set Pro
      brand: IronPeak
      category: Sports & Outdoors
      price: 17.99
      rating: 4.3
      features:
      - 5 resistance levels
      - Latex-free TPE
      - Door anchor included
      - Carry bag
      variants: []
      in_stock: true
    outputs:
    - product_id_s_cheap
    - product_name_s_cheap
    - product_price_s_cheap
  - use: featured_product
    params:
      name: Adjustable Weight Bench
      brand: BaseEdge
      category: Sports & Outdoors
      price: 94.99
      rating: 4.8
      features:
      - 7 position adjustment
      - 600 lb capacity
      - Foldable design
      - Non-slip feet
      variants: []
      in_stock: true
    outputs:
    - product_id_s_exp
    - product_name_s_exp
    - product_price_s_exp
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 6
      price_range:
      - 15.0
      - 60.0
    outputs:
    - catalog_home
  - use: product_catalog
    params:
      category: Sports & Outdoors
      count: 6
      price_range:
      - 10.0
      - 50.0
    outputs:
    - catalog_sports
  targets:
    e_cheap: '{output.product_id_e_cheap}'
    e_exp: '{output.product_id_e_exp}'
    h_cheap: '{output.product_id_h_cheap}'
    h_exp: '{output.product_id_h_exp}'
    s_cheap: '{output.product_id_s_cheap}'
    s_exp: '{output.product_id_s_exp}'
    name_e_cheap: '{output.product_name_e_cheap}'
    name_e_exp: '{output.product_name_e_exp}'
    name_h_cheap: '{output.product_name_h_cheap}'
    name_h_exp: '{output.product_name_h_exp}'
    name_s_cheap: '{output.product_name_s_cheap}'
    name_s_exp: '{output.product_name_s_exp}'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: An order was placed
  - expr: 'any(any(item.product_id == ''{target.e_cheap}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Cheap Electronics item purchased
  - expr: 'any(any(item.product_id == ''{target.h_cheap}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Cheap Home & Kitchen item purchased
  - expr: 'any(any(item.product_id == ''{target.s_cheap}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Cheap Sports item purchased
  - expr: '''{target.e_exp}'' not in state.wishlist'
    desc: Expensive Electronics removed from wishlist
  - expr: '''{target.h_exp}'' not in state.wishlist'
    desc: Expensive Home item removed from wishlist
  - expr: '''{target.s_exp}'' not in state.wishlist'
    desc: Expensive Sports item removed from wishlist
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: 'any(o.status == ''confirmed'' for o in state.orders if not o.id.startswith(''order_initial_''))

      '
    desc: Order confirmed
  negative_checks:
  - expr: 'not any(any(item.product_id == ''{target.e_exp}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Expensive Electronics not purchased
    penalty: 0.15
  - expr: 'not any(any(item.product_id == ''{target.h_exp}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Expensive Home not purchased
    penalty: 0.15
  - expr: 'not any(any(item.product_id == ''{target.s_exp}'' for item in o.items) for o in state.orders
      if not o.id.startswith(''order_initial_''))

      '
    desc: Expensive Sports not purchased
    penalty: 0.15
  - expr: sum(1 for o in state.orders if not o.id.startswith('order_initial_')) <= 1
    desc: Only one order placed
    penalty: 0.1
