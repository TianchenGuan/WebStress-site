task_id: amazon_selective_reorder
env_id: amazon
title: Reorder Specific Products from Past Orders
instruction_template: 'Check your order history. Find the delivered order for ''{target.name_1}''
  and the delivered order for ''{target.name_3}''. Reorder both products in a single
  new order.

  '
difficulty: expert
time_limit_seconds: 400
expected_steps: 35
primary_primitives:
- patience
secondary_primitives: []
start_path: /orders
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Aromatherapy Essential Oil Set
      brand: NaturVive
      category: Health & Beauty
      price: 27.99
      rating: 4.5
      features:
      - 8 essential oils
      - Therapeutic grade
      - Gift box included
      variants: []
      in_stock: true
    outputs:
    - product_id_sel1
    - product_name_sel1
    - product_price_sel1
  - use: featured_product
    params:
      name: Mechanical Pencil Set
      brand: GridLine
      category: Office Supplies
      price: 15.99
      rating: 4.3
      features:
      - 0.5mm and 0.7mm
      - Metal barrel
      - Eraser refills included
      variants: []
      in_stock: true
    outputs:
    - product_id_sel2
    - product_name_sel2
    - product_price_sel2
  - use: featured_product
    params:
      name: Wireless Earbuds Sport
      brand: SoundCore
      category: Electronics
      price: 39.99
      rating: 4.7
      features:
      - IPX7 waterproof
      - 8-hour battery
      - Secure ear hooks
      variants: []
      in_stock: true
    outputs:
    - product_id_sel3
    - product_name_sel3
    - product_price_sel3
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_sel1}'
      status: delivered
      days_ago: 21
    outputs:
    - order_id_sel1
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_sel2}'
      status: delivered
      days_ago: 14
    outputs:
    - order_id_sel2
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id_sel3}'
      status: delivered
      days_ago: 7
    outputs:
    - order_id_sel3
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 15.0
      - 80.0
    outputs:
    - catalog_electronics
  targets:
    name_1: '{output.product_name_sel1}'
    product_id_sel1: '{output.product_id_sel1}'
    name_3: '{output.product_name_sel3}'
    product_id_sel3: '{output.product_id_sel3}'
    product_id_sel2: '{output.product_id_sel2}'
    order_id_sel1: '{output.order_id_sel1}'
    order_id_sel3: '{output.order_id_sel3}'
canonical_diff:
  create:
  - entity: Order
    desc: New order placed containing both reorder products together
    properties:
      items:
        expr: "any(it['product_id'] == target['product_id_sel1'] for it in x) and any(it['product_id'] == target['product_id_sel3'] for it in x) and not any(it['product_id'] == target['product_id_sel2'] for it in x)"
      status: {any: true}
      shipping_address_id: {any: true}
      payment_method_id: {any: true}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  constraints:
  - desc: Agent viewed at least one of the target orders
    expr: "target['order_id_sel1'] in state.viewed_order_ids or target['order_id_sel3'] in state.viewed_order_ids"
    severity: medium
  invariant:
  - collection: state.orders
    filter: "not (any(it.get('product_id') == target['product_id_sel1'] for it in (a.items or [])) and any(it.get('product_id') == target['product_id_sel3'] for it in (a.items or [])))"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  named_invariants:
  - name: Agent did not modify other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not leave items in cart after checkout
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[4]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[5]
    severity: medium
  - name: Agent did not create return requests
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
