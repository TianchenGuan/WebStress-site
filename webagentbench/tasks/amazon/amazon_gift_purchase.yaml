task_id: amazon_gift_purchase
env_id: amazon
title: Buy a Gift and Ship to a New Address
instruction_template: 'Search for "{target.product_name}" and purchase it as a gift.
  Ship it to a new address with recipient name "{target.recipient_name}", street "{target.street}",
  city "{target.city}", state "{target.state_code}", ZIP "{target.zip}". Use the Visa
  card ending in 4242 for payment.

  '
difficulty: medium
time_limit_seconds: 300
expected_steps: 24
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Kindle Paperwhite E-Reader
      brand: Amazon
      category: Electronics
      price: 139.99
      rating: 4.7
      features:
      - 6.8-inch glare-free display
      - Adjustable warm light
      - Waterproof design
      - 8GB storage
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: product_catalog
    params:
      category: Electronics
      count: 6
      price_range:
      - 50.0
      - 300.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    recipient_name: Maria Garcia
    street: 250 Oak Avenue
    city: Portland
    state_code: OR
    zip: '97201'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(any(item.product_id == ''{target.product_id}'' for item in order.items)
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order contains the target product
  - expr: 'any(addr.full_name == ''Maria Garcia'' and ''250 Oak'' in addr.street_address
      for addr in state.addresses)

      '
    desc: New gift address was added with correct details
  - expr: "any(\n  order.shipping_address_id not in state._initial_snapshot.get('addresses',\
      \ {})\n  for order in state.orders if order.id not in state._initial_snapshot.get('orders',\
      \ {}))\n"
    desc: New order uses the new gift address (not one of the pre-seeded addresses)
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
secondary_primitives: []
