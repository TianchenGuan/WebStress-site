task_id: amazon_write_detailed_review
env_id: amazon
title: Write a Product Review
instruction_template: 'Find your delivered order for "{target.product_name}" and write
  a review: give it {target.rating} stars, title "{target.review_title}", and mention
  that {target.review_point} in the body.

  '
difficulty: medium
time_limit_seconds: 180
expected_steps: 15
primary_primitives:
- verification
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Ergonomic Office Chair
      brand: Steelcase
      category: Home & Kitchen
      price: 399.99
      rating: 4.5
      features:
      - Adjustable lumbar support
      - Breathable mesh back
      - 12-year warranty
      - 4D adjustable armrests
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: delivered
      days_ago: 14
    outputs:
    - order_id
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 6
      price_range:
      - 50.0
      - 500.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    order_id: '{output.order_id}'
    rating: '4'
    review_title: Great chair but takes time to adjust
    review_point: the lumbar support made a noticeable difference after the first
      week
canonical_diff:
  create:
  - entity: Review
    desc: Detailed review with correct rating, title, and a body mentioning the key point
    properties:
      product_id: {expr: "x == target['product_id']"}
      rating: {expr: "x == int(target['rating'])"}
      title: {expr: "x == target['review_title']"}
      body: {substring: "lumbar"}
      author_name: {any: true}
      helpful_count: {any: true}
      verified_purchase: {any: true}
      created_at: {any: true}
  update:
  - entity: Product
    desc: Product review_count incremented for the review (weight 0)
    weight: 0.0
    where:
      id: {expr: "x == target['product_id']"}
    changes:
      review_count: {any: true}
  invariant:
  - collection: state.products
    filter: "a.id != target['product_id']"
    preserve: ALL
  - collection: state.reviews
    filter: "a.product_id != target['product_id']"
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.orders
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  named_invariants:
  - name: Agent did not modify product catalog (beyond review_count)
    ref: invariant[0]
    severity: critical
  - name: Agent did not write reviews for other products
    ref: invariant[1]
    severity: high
  - name: Agent did not add items to cart
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[4]
    severity: medium
  - name: Agent did not place orders
    ref: invariant[5]
    severity: high
  - name: Agent did not create return requests
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
