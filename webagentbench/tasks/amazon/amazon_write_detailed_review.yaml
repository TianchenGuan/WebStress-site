task_id: amazon_write_detailed_review
env_id: amazon
title: Write a Product Review
instruction_template: >
  Find your delivered order for "{target.product_name}" and write a review: give it
  {target.rating} stars, title "{target.review_title}", and mention that {target.review_point}
  in the body.
difficulty: medium
time_limit_seconds: 180
expected_steps: 15
primary_primitives:
- grounding
- planning
- exploration
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Ergonomic Office Chair
      brand: Steelcase
      category: Home & Kitchen
      price: 399.99
      rating: 4.5
      features:
      - Adjustable lumbar support
      - Breathable mesh back
      - 12-year warranty
      - 4D adjustable armrests
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: existing_order
    params:
      product_ids:
      - '{output.product_id}'
      status: delivered
      days_ago: 14
    outputs:
    - order_id
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 6
      price_range:
      - 50.0
      - 500.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
    order_id: '{output.order_id}'
    rating: '4'
    review_title: Great chair but takes time to adjust
    review_point: the lumbar support made a noticeable difference after the first week
eval:
  source: server_state
  checks:
  - expr: >
      any(r.product_id == '{target.product_id}' and r.rating == {target.rating}
      for r in state.reviews if not r.id.startswith('review_initial_'))
    desc: Review with correct star rating exists for the target product
  - expr: >
      any(r.product_id == '{target.product_id}'
      and '{target.review_title}' in r.title
      for r in state.reviews if not r.id.startswith('review_initial_'))
    desc: Review title matches the requested title
  - expr: >
      any(r.product_id == '{target.product_id}'
      and 'lumbar' in r.body.lower()
      for r in state.reviews if not r.id.startswith('review_initial_'))
    desc: Review body mentions the key review point about lumbar support
  negative_checks:
  - expr: >
      not any(r.product_id != '{target.product_id}'
      for r in state.reviews if not r.id.startswith('review_initial_')
      and r.author_name == state.owner_name)
    desc: No review written on the wrong product
    penalty: 0.3
  - expr: >
      not any(r.product_id == '{target.product_id}'
      and r.rating != {target.rating}
      for r in state.reviews if not r.id.startswith('review_initial_')
      and r.author_name == state.owner_name)
    desc: No review with incorrect star rating
    penalty: 0.25
  - expr: >
      sum(1 for r in state.reviews if r.product_id == '{target.product_id}'
      and r.author_name == state.owner_name) <= 1
    desc: Only one review written by the user for this product
    penalty: 0.2
