task_id: amazon_cart_budget_limit
env_id: amazon
title: Build a Cart Under a Budget Limit
instruction_template: 'Add at least 3 items from the "{target.category}" category
  to your cart with a total under ${target.budget}, then complete checkout using the
  shipping address for Jordan Parker at 742 Evergreen Terrace and the Visa card ending
  in 4242.

  '
difficulty: medium
time_limit_seconds: 280
expected_steps: 20
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 12
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Stainless Steel Cookware Set
      brand: T-fal
      category: Home & Kitchen
      price: 79.99
      rating: 4.5
      features:
      - 5-piece set
      - Dishwasher safe
      - Even heat distribution
      variants: []
      in_stock: true
    outputs:
    - product_id_1
    - product_name_1
    - product_price_1
  - use: featured_product
    params:
      name: Silicone Spatula Set
      brand: OXO
      category: Home & Kitchen
      price: 18.99
      rating: 4.7
      features:
      - Heat resistant to 600F
      - Set of 4
      - Ergonomic handles
      variants: []
      in_stock: true
    outputs:
    - product_id_2
    - product_name_2
    - product_price_2
  - use: featured_product
    params:
      name: Glass Food Storage Containers
      brand: Pyrex
      category: Home & Kitchen
      price: 34.99
      rating: 4.6
      features:
      - 10-piece set
      - Microwave safe
      - Leak-proof lids
      - BPA free
      variants: []
      in_stock: true
    outputs:
    - product_id_3
    - product_name_3
    - product_price_3
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 12
      price_range:
      - 10.0
      - 120.0
    outputs:
    - product_ids
  targets:
    category: Home & Kitchen
    budget: '200'
eval:
  source: server_state
  checks:
  - expr: any(o.id not in state._initial_snapshot.get('orders', {}) for o in state.orders)
    desc: A new order was placed
  - expr: 'any(len(order.items) >= 3 for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order contains at least 3 different items
  - expr: 'any(sum(item.unit_price * item.quantity for item in order.items) < {target.budget}
      for order in state.orders if order.id not in state._initial_snapshot.get(''orders'', {}))

      '
    desc: Order total is under ${target.budget}
  negative_checks:
  - expr: sum(1 for o in state.orders if o.id not in state._initial_snapshot.get('orders', {})) <=
      1
    desc: Only one new order placed
    penalty: 0.15
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
secondary_primitives: []
