task_id: amazon_deal_discovery_checkout
env_id: amazon
title: Browse Deals and Buy All High-Rated Sale Items
instruction_template: 'Browse the Today''s Deals page to find products currently on
  sale. A product is on sale when its list price is higher than its current price.
  From the items shown on the deals page, add every product that has a rating of 4.0
  or higher to your cart. Do not add any deals-page items rated below 4.0. Complete
  checkout.

  '
difficulty: expert
time_limit_seconds: 420
expected_steps: 35
primary_primitives:
- grounding
secondary_primitives: []
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Premium Yoga Mat
      brand: Endurafit
      category: Sports & Outdoors
      price: 29.99
      list_price: 49.99
      rating: 4.5
      features:
      - Extra thick 6mm
      - Non-slip grip
      - Eco-friendly TPE
      variants: []
      in_stock: true
    outputs:
    - product_id_d1
    - product_name_d1
    - product_price_d1
  - use: featured_product
    params:
      name: LED Desk Lamp Pro
      brand: LuminDesk
      category: Office Supplies
      price: 24.99
      list_price: 44.99
      rating: 4.3
      features:
      - Adjustable brightness
      - USB charging port
      - Touch controls
      variants: []
      in_stock: true
    outputs:
    - product_id_d2
    - product_name_d2
    - product_price_d2
  - use: featured_product
    params:
      name: Insulated Lunch Bag
      brand: PureVessel
      category: Home & Kitchen
      price: 15.99
      list_price: 28.99
      rating: 4.6
      features:
      - Leak-proof lining
      - Fits 12 cans
      - Adjustable strap
      variants: []
      in_stock: true
    outputs:
    - product_id_d3
    - product_name_d3
    - product_price_d3
  - use: featured_product
    params:
      name: Basic Phone Case
      brand: Pixelon
      category: Electronics
      price: 8.99
      list_price: 14.99
      rating: 3.2
      features:
      - Clear design
      - Drop protection
      variants: []
      in_stock: true
    outputs:
    - product_id_bad1
    - product_name_bad1
    - product_price_bad1
  - use: featured_product
    params:
      name: Plastic Storage Bins
      brand: MapleLine
      category: Home & Kitchen
      price: 12.99
      list_price: 19.99
      rating: 3.5
      features:
      - Set of 4
      - Stackable
      variants: []
      in_stock: true
    outputs:
    - product_id_bad2
    - product_name_bad2
    - product_price_bad2
  - use: product_catalog
    params:
      category: Electronics
      count: 8
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  - use: product_catalog
    params:
      category: Sports & Outdoors
      count: 6
      price_range:
      - 15.0
      - 60.0
    outputs:
    - catalog_sports
  targets:
    deal_1: '{output.product_id_d1}'
    deal_2: '{output.product_id_d2}'
    deal_3: '{output.product_id_d3}'
    bad_1: '{output.product_id_bad1}'
    bad_2: '{output.product_id_bad2}'
canonical_diff:
  create:
  - entity: Order
    desc: Order contains exactly the three high-rated deal products (no low-rated bad deals, no other items)
    properties:
      items:
        expr: "len(x) == 3 and {it['product_id'] for it in x} == {target['deal_1'], target['deal_2'], target['deal_3']}"
      status: {eq: confirmed}
      shipping_address_id: {any: true}
      payment_method_id: {any: true}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  invariant:
  - collection: state.orders
    filter: "a.id.startswith('order_initial_')"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  - collection: state.wishlist
    preserve: ALL
  - collection: state.settings
    preserve: ALL
  named_invariants:
  - name: Agent did not modify other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not leave items in cart after checkout
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify saved addresses
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[4]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[5]
    severity: medium
  - name: Agent did not create return requests
    ref: invariant[6]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[7]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[8]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[9]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[10]
    severity: low
  - name: Agent did not modify wishlist
    ref: invariant[11]
    severity: medium
  - name: Agent did not modify account settings
    ref: invariant[12]
    severity: medium
