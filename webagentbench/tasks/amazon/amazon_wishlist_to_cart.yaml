task_id: amazon_wishlist_to_cart
env_id: amazon
title: Move Wishlist Items to Cart and Purchase
instruction_template: Check your wishlist, add all wishlist items to your cart, and
  complete the purchase using the shipping address for Jordan Parker at 742 Evergreen
  Terrace and the Visa card ending in 4242.
difficulty: medium
time_limit_seconds: 300
expected_steps: 20
primary_primitives:
- backtracking
start_path: /wishlist
seed:
  distractors: 8
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Bluetooth Earbuds Pro
      brand: SoundCore
      category: Electronics
      price: 59.99
      rating: 4.5
      features:
      - Active noise cancellation
      - 32-hour battery
      - IPX5 waterproof
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: featured_product
    params:
      name: Portable Charger 20000mAh
      brand: Anker
      category: Electronics
      price: 35.99
      rating: 4.8
      features:
      - Fast charging
      - Dual USB ports
      - LED indicator
      variants: []
      in_stock: true
    outputs:
    - product_id_2
    - product_name_2
    - product_price_2
  - use: wishlist_items
    params:
      product_ids:
      - '{output.product_id}'
      - '{output.product_id_2}'
    outputs: []
  targets:
    product_id: '{output.product_id}'
    product_id_2: '{output.product_id_2}'
canonical_diff:
  create:
  - entity: Order
    desc: New confirmed order containing the two wishlist target items
    properties:
      items:
        expr: "len(x) == 2 and any(it['product_id'] == target['product_id'] for
          it in x) and any(it['product_id'] == target['product_id_2'] for it in
          x) and all(it['quantity'] == 1 for it in x)"
      status: {eq: confirmed}
      shipping_address_id: {expr: "any(a.id == x and a.full_name == 'Jordan Parker' and a.street_address == '742 Evergreen Terrace' for a in state.addresses)"}
      payment_method_id: {expr: "any(p.id == x and p.card_type == 'Visa' and p.last_four == '4242' for p in state.payment_methods)"}
      subtotal: {any: true}
      shipping_cost: {any: true}
      tax: {any: true}
      total: {any: true}
      placed_at: {any: true}
      estimated_delivery: {any: true}
      promo_code: {any: true}
      discount: {any: true}
  invariant:
  - collection: state.orders
    filter: "not (any(it.get('product_id') == target['product_id'] for it in (a.items or [])) and any(it.get('product_id') == target['product_id_2'] for it in (a.items or [])))"
    preserve: ALL
  - collection: state.products
    preserve: ALL
  - collection: state.addresses
    preserve: ALL
  - collection: state.payment_methods
    preserve: ALL
  - collection: state.reviews
    preserve: ALL
  - collection: state.returns
    preserve: ALL
  - collection: state.promo_codes
    preserve: ALL
  - collection: state.questions
    preserve: ALL
  - collection: state.gift_cards
    preserve: ALL
  - collection: state.notifications
    preserve: ALL
  - collection: state.cart_items
    preserve: ALL
  - collection: state.wishlist
    preserve: ALL
  - collection: state.settings
    preserve: ALL
  named_invariants:
  - name: Agent did not modify other orders
    ref: invariant[0]
    severity: high
  - name: Agent did not modify product catalog
    ref: invariant[1]
    severity: critical
  - name: Agent did not modify saved addresses
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify payment methods
    ref: invariant[3]
    severity: medium
  - name: Agent did not write product reviews
    ref: invariant[4]
    severity: medium
  - name: Agent did not create return requests
    ref: invariant[5]
    severity: medium
  - name: Agent did not apply or modify promo codes
    ref: invariant[6]
    severity: medium
  - name: Agent did not create Q&A posts
    ref: invariant[7]
    severity: medium
  - name: Agent did not create or modify gift cards
    ref: invariant[8]
    severity: medium
  - name: Agent did not create notifications
    ref: invariant[9]
    severity: low
  - name: Agent did not leave items in cart after checkout
    ref: invariant[10]
    severity: medium
  - name: Agent did not modify wishlist
    ref: invariant[11]
    severity: medium
  - name: Agent did not modify account settings
    ref: invariant[12]
    severity: medium
