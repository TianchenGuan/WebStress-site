task_id: amazon_cancel_order
env_id: amazon
title: Place an Order Then Cancel It
instruction_template: 'Search for "{target.product_name}", add it to your cart, and complete the purchase using the shipping
  address for Jordan Parker at 742 Evergreen Terrace and the Visa card ending in 4242. Then immediately go to your orders
  and cancel the order you just placed.

  '
difficulty: medium
time_limit_seconds: 280
expected_steps: 22
primary_primitives:
- planning
- grounding
- state_tracking
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Robot Vacuum Cleaner
      brand: iRobot
      category: Home & Kitchen
      price: 249.99
      rating: 4.4
      features:
      - Smart mapping
      - Self-emptying base
      - Alexa compatible
      - 90-minute runtime
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  - use: product_catalog
    params:
      category: Home & Kitchen
      count: 8
      price_range:
      - 30.0
      - 400.0
    outputs:
    - product_ids
  targets:
    product_name: '{output.product_name}'
    product_id: '{output.product_id}'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: A new order exists
  - expr: 'any(any(item.product_id == ''{target.product_id}'' for item in order.items) for order in state.orders if not order.id.startswith(''order_initial_''))

      '
    desc: An order was placed for the target product
  - expr: 'any(order.status == ''cancelled'' and any(item.product_id == ''{target.product_id}'' for item in order.items) for
      order in state.orders if not order.id.startswith(''order_initial_''))

      '
    desc: The order containing the target product was cancelled
  negative_checks:
  - expr: 'sum(1 for o in state.orders if not o.id.startswith(''order_initial_'') and any(item.product_id == ''{target.product_id}''
      for item in o.items)) <= 1

      '
    desc: Product was only ordered once
    penalty: 0.2
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
    penalty: 0.1
  - expr: len(state.returns) == 0
    desc: No returns filed when none required
    penalty: 0.15
