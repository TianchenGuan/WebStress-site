task_id: amazon_spec_comparison
env_id: amazon
title: Compare Two Monitors Without Buying
instruction_template: 'Compare the specifications of "{target.monitor_a_name}" and
  "{target.monitor_b_name}". View each product page to read its features and specs.
  Do NOT add either monitor to your cart or wishlist, and do NOT place an order —
  this is a research-only comparison task.

  '
difficulty: easy
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- grounding
secondary_primitives:
- verification
start_path: /
seed:
  distractors: 8
  actors: {}
  steps:
  - use: featured_product
    params:
      name: LG UltraWide Monitor 34-inch
      brand: LG
      category: Electronics
      price: 449.99
      rating: 4.6
      features:
      - 3440x1440 resolution
      - USB-C connectivity
      - HDR10 support
      - 160Hz refresh rate
      variants: []
      in_stock: true
    outputs:
    - product_id_monitor_a
    - product_name_monitor_a
    - product_price_monitor_a
  - use: featured_product
    params:
      name: Samsung Curved Monitor 34-inch
      brand: Samsung
      category: Electronics
      price: 429.99
      rating: 4.5
      features:
      - 3440x1440 resolution
      - 100Hz refresh rate
      - Picture-by-picture mode
      - Tilt and height adjustable stand
      variants: []
      in_stock: true
    outputs:
    - product_id_monitor_b
    - product_name_monitor_b
    - product_price_monitor_b
  - use: product_catalog
    params:
      category: Electronics
      count: 6
      price_range:
      - 150.0
      - 700.0
    outputs:
    - catalog_ids
  targets:
    monitor_a_name: '{output.product_name_monitor_a}'
    monitor_a_id: '{output.product_id_monitor_a}'
    monitor_b_name: '{output.product_name_monitor_b}'
    monitor_b_id: '{output.product_id_monitor_b}'
eval:
  source: server_state
  checks:
  - expr: '''{target.monitor_a_id}'' in state.recently_viewed'
    desc: Monitor A product page was viewed
  - expr: '''{target.monitor_b_id}'' in state.recently_viewed'
    desc: Monitor B product page was viewed
  negative_checks:
  - expr: len(state.cart_items) == 0
    desc: Cart is empty (no purchase)
    penalty: 0.4
  - expr: 'all(o.id in state._initial_snapshot.get(''orders'', {}) for o in state.orders)

      '
    desc: No new orders placed
    penalty: 0.4
  - expr: "'{target.monitor_a_id}' not in state.wishlist and '{target.monitor_b_id}'\
      \ not in state.wishlist"
    desc: Neither monitor was added to the wishlist
    penalty: 0.2
  - expr: sorted(state.wishlist) == state._initial_snapshot.get('wishlist', [])
    desc: Wishlist was not modified at all
    penalty: 0.1
