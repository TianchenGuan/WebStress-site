task_id: rh_live_alert_and_buy
env_id: robinhood
title: Alert-Triggered Market Buy
instruction_template: Set a price alert for AAPL when it drops below $182. When the
  alert triggers, buy 5 shares at market price.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- verification
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 18
          - 179.0
        - - 30
          - 184.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: AAPL below-$182 price alert created
    expr: "any(a.symbol == 'AAPL' and a.condition == 'below' and a.target_price <= Decimal('182') and not a.id.startswith('alert_decoy_') for a in state.price_alerts)"
    severity: critical
  - desc: Market buy of 5 AAPL shares placed
    expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'market' and o.quantity == 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, grounding by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
