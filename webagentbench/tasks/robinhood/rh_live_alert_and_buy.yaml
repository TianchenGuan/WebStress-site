task_id: rh_live_alert_and_buy
env_id: robinhood
title: Alert-Triggered Market Buy
instruction_template: Set a price alert for AAPL when it drops below $182. When
  the alert triggers, buy 5 shares at market price.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- verification
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 18
          - 179.0
        - - 30
          - 184.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: price_alerts
    desc: AAPL below-$182 price alert created
    properties:
      symbol: {eq: AAPL}
      condition: {eq: below}
      target_price: {expr: "Decimal(str(x)) <= Decimal('182')"}
      status: {any: true}
      created_at: {any: true}
  - entity: orders
    desc: Market buy of 5 AAPL shares placed after alert triggered
    properties:
      symbol: {eq: AAPL}
      side: {eq: buy}
      order_type: {eq: market}
      quantity: {eq: 5}
      status: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: positions
    desc: AAPL position created or increased
    properties:
      symbol: {eq: AAPL}
      quantity: {any: true}
  - entity: transactions
    desc: Buy transaction recorded for AAPL
    properties:
      type: {eq: buy}
      symbol: {eq: AAPL}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications fired by the AAPL buy
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  update:
  - entity: positions
    desc: Existing AAPL position increased by buy (if held before)
    bijection:
      over: "[p for p in initial.positions if p.symbol == 'AAPL']"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      quantity: {any: true}
  invariant:
  - collection: state.positions
    filter: "a.symbol != 'AAPL'"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    filter: "a.symbol != 'AAPL'"
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol != 'AAPL'"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: AAPL below-$182 alert triggered
    expr: any(a.symbol == 'AAPL' and a.condition == 'below' and
      Decimal(str(a.target_price)) <= Decimal('182') and a.status == 'triggered'
      for a in state.price_alerts)
    severity: critical
  - desc: AAPL market buy filled for 5 shares
    expr: any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type ==
      'market' and o.quantity == Decimal('5') and o.status == 'filled' and
      o.filled_quantity == o.quantity for o in state.orders)
    severity: critical
  - desc: AAPL buy order was created after the alert triggered
    expr: any(a.symbol == 'AAPL' and a.condition == 'below' and a.triggered_at
      is not None and any(o.symbol == 'AAPL' and o.side == 'buy' and
      o.created_at > a.triggered_at for o in state.orders) for a in
      state.price_alerts)
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, grounding by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor
  account state.
