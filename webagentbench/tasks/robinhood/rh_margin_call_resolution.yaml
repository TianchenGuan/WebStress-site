task_id: rh_margin_call_resolution
env_id: robinhood
title: Resolve Margin Maintenance Warning
instruction_template: Your account has a margin maintenance warning. Calculate how much you need to either
  deposit or sell to meet the maintenance requirement. Sell the position with the smallest impact on total
  returns to cover the shortfall, then deposit $500 as additional buffer.
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - TSLA
      - MSFT
      - AMZN
      - INTC
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 5
    outputs: []
  - use: margin_account
    params:
      near_maintenance: true
    outputs:
    - smallest_impact_symbol
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    smallest_impact_symbol: '{output.smallest_impact_symbol}'
eval:
  source: server_state
  checks:
  - expr: any(o.side == 'sell' and o.status in ('filled', 'pending') and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: A sell order exists to cover margin shortfall
  - expr: any(t.direction == 'deposit' and t.amount == 500 and t.status in ('completed', 'pending') for
      t in state.transfers)
    desc: A $500 deposit transfer exists
  - expr: any(o.symbol == '{target.smallest_impact_symbol}' and o.side == 'sell' and o.status in ('filled',
      'pending') and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: The position sold is the one with the smallest impact on total returns
  - expr: len([o for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_')]) >=
      1
    desc: At least one non-decoy sell order was placed
  - expr: len([t for t in state.transfers if t.direction == 'deposit']) == 1
    desc: Exactly one deposit was made as the additional buffer
  negative_checks:
  - expr: not any(o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No buy orders were placed during margin resolution
    penalty: 0.15
  - expr: not any( e.action == 'robinhood.transfer.initiate' and e.payload.get('direction') == 'withdrawal'
      for e in state.audit_log)
    desc: No withdrawals were made during margin resolution
    penalty: 0.25
  - expr: not any(o.side == 'sell' and o.symbol != '{target.smallest_impact_symbol}' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: Margin resolution did not sell a different position than the smallest-impact choice
    penalty: 0.2
  - expr: sum(1 for e in state.audit_log if e.action == 'robinhood.transfer.initiate') == 1
    desc: Margin resolution initiated exactly one transfer for the required deposit buffer
    penalty: 0.1
  - expr: not any( e.action == 'robinhood.options.order.place' or e.action.startswith('robinhood.watchlist.')
      or e.action.startswith('robinhood.recurring.') or e.action == 'robinhood.alert.create' or e.action
      == 'robinhood.alert.delete' for e in state.audit_log)
    desc: Margin resolution did not mutate unrelated options, watchlist, recurring, or alert surfaces
    penalty: 0.1
secondary_primitives:
- planning
