task_id: rh_margin_call_resolution
env_id: robinhood
title: Resolve Margin Maintenance Warning
instruction_template: Your account has a margin maintenance warning. Check the margin
  maintenance value shown in your portfolio overview to find the specific shortfall
  amount. Calculate how much you need to either deposit or sell to meet the maintenance
  requirement. Sell the position with the smallest absolute dollar total return loss
  to cover the shortfall, then deposit $500 as additional buffer.
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- planning
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - TSLA
      - MSFT
      - AMZN
      - INTC
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 5
    outputs: []
  - use: margin_account
    params:
      near_maintenance: true
    outputs:
    - smallest_impact_symbol
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    smallest_impact_symbol: '{output.smallest_impact_symbol}'
canonical_diff:
  constraints:
  - desc: Sell order for the smallest-impact position
    expr: "any(o.symbol == target['smallest_impact_symbol'] and o.side == 'sell' and o.status in ('filled', 'pending') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: $500 deposit transfer initiated
    expr: "any(t.direction == 'deposit' and float(t.amount) == 500.0 and t.status in ('completed', 'pending') for t in state.transfers)"
    severity: critical
  - desc: Exactly one deposit initiated
    expr: "len([t for t in state.transfers if t.direction == 'deposit']) == 1"
    severity: high
  - desc: No buy orders placed
    expr: "not any(o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Only the smallest-impact symbol was sold
    expr: "not any(o.side == 'sell' and o.symbol != target['smallest_impact_symbol'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No withdrawals initiated
    expr: "not any(t.direction == 'withdrawal' for t in state.transfers)"
    severity: high
secondary_primitives: []
