---
task_id: rh_check_buying_power
env_id: robinhood
title: Invest Half of Buying Power in AAPL
instruction_template: Check your current buying power. Invest exactly half of it in
  AAPL shares using a market buy order.
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- grounding
start_path: "/"
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 15
      must_include:
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      quantities:
      - '10'
      - '5'
      cost_bases:
      - '175.00'
      - '380.00'
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'market' and
      o.status in ('filled', 'pending') for o in state.orders)
    desc: A market buy order was placed for AAPL
  - expr: any(o.symbol == 'AAPL' and o.side == 'buy' and o.quantity * state.get_stock('AAPL').price
      / (state.buying_power + o.quantity * state.get_stock('AAPL').price) >= Decimal('0.40')
      and o.quantity * state.get_stock('AAPL').price / (state.buying_power + o.quantity
      * state.get_stock('AAPL').price) <= Decimal('0.60') for o in state.orders)
    desc: The order amount is approximately half of the original buying power
  negative_checks:
  - expr: len(state.transfers) == 0
    desc: No deposit or withdrawal actions were taken
  - expr: not any(o.symbol != 'AAPL' and not o.id.startswith('ord_decoy_') for o in
      state.orders)
    desc: No orders were placed on stocks other than AAPL
secondary_primitives: []
primitive_thesis: Measures grounding by requiring the agent to look up buying power
  and translate it into a correctly sized order.
