task_id: rh_verify_no_action_needed
env_id: robinhood
title: Verify Recurring Investments Need No Adjustment
instruction_template: Review your recurring investments. If any are investing in stocks
  that have dropped more than 30% from their purchase price, pause those recurring
  investments. Otherwise, confirm everything looks fine and take no action.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
- verification
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - MSFT
      - VOO
      - SCHD
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - VOO
      - SCHD
      quantities:
      - '25'
      - '15'
      - '40'
      - '30'
      cost_bases:
      - '175.00'
      - '390.00'
      - '430.00'
      - '74.00'
    outputs: []
  - use: recurring_investments
    params:
      count: 4
      symbols:
      - AAPL
      - MSFT
      - VOO
      - SCHD
      frequencies:
      - weekly
      - monthly
      overpaying_count: 0
    outputs:
    - total_active_before
  targets:
    total_active_before: '{output.total_active_before}'
canonical_diff:
  constraints:
  - desc: All recurring investments remain active (no stocks dropped 30%+, so no change needed)
    expr: "all(r.status == 'active' for r in state.recurring_investments if not r.id.startswith('ri_decoy_'))"
    severity: critical
secondary_primitives: []
