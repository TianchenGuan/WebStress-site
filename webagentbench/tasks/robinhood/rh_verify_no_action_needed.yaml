task_id: rh_verify_no_action_needed
env_id: robinhood
title: Verify Recurring Investments Need No Adjustment
instruction_template: >-
  Review your recurring investments. If any are investing in stocks that have
  dropped more than 30% from their purchase price, pause those recurring
  investments. Otherwise, confirm everything looks fine and take no action.
difficulty: medium
time_limit_seconds: 180
expected_steps: 12
primary_primitives:
  - verification
  - state_tracking
  - planning
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 20
        must_include: ["AAPL", "MSFT", "VOO", "SCHD"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT", "VOO", "SCHD"]
        quantities: ["25", "15", "40", "30"]
        cost_bases: ["175.00", "390.00", "430.00", "74.00"]
      outputs: []
    - use: recurring_investments
      params:
        count: 4
        symbols: ["AAPL", "MSFT", "VOO", "SCHD"]
        frequencies: ["weekly", "monthly"]
        overpaying_count: 0
      outputs: [total_active_before]
  targets:
    total_active_before: "{output.total_active_before}"

eval:
  source: server_state
  checks:
    - expr: >-
        len([r for r in state.recurring_investments if r.status == 'active'])
        == {target.total_active_before}
      desc: All recurring investments remain active (no change needed since none dropped 30%+)
    - expr: >-
        all(r.status == 'active' for r in state.recurring_investments)
      desc: Every recurring investment still has active status
  negative_checks:
    - expr: >-
        not any(r.status == 'paused' for r in state.recurring_investments)
      desc: No recurring investments were incorrectly paused
      penalty: 0.5
    - expr: >-
        not any(r.status == 'cancelled' for r in state.recurring_investments)
      desc: No recurring investments were cancelled
      penalty: 0.5
    - expr: >-
        not any(o.side in ('buy', 'sell')
        and not o.id.startswith('ord_decoy_')
        for o in state.orders)
      desc: No equity orders were placed during this review task
      penalty: 0.2
    - expr: len(state.transfers) == 0
      desc: No transfers were initiated
      penalty: 0.15
secondary_primitives: []
