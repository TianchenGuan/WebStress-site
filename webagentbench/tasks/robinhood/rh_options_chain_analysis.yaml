---
task_id: rh_options_chain_analysis
env_id: robinhood
title: Buy the Highest Open Interest TSLA Put
instruction_template: For TSLA, find the put option with the highest open interest
  expiring within 2 weeks and buy 1 contract of it.
difficulty: hard
time_limit_seconds: 220
expected_steps: 8
primary_primitives:
- exploration
- state_tracking
- grounding
start_path: "/"
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - TSLA
      - AAPL
      - NVDA
    outputs: []
  - use: options_chain
    params:
      symbol: TSLA
      expirations_count: 6
      strikes_per_expiration: 12
    outputs: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: state.highest_open_interest_contract('TSLA', option_type='put', max_days=14)
      is not None and any(any(leg.underlying_symbol == 'TSLA' and leg.option_type
      == 'put' and leg.side == 'buy' and leg.strike == state.highest_open_interest_contract('TSLA',
      option_type='put', max_days=14).strike and leg.expiration == state.highest_open_interest_contract('TSLA',
      option_type='put', max_days=14).expiration for leg in oo.legs) for oo in state.options_orders)
    desc: A buy order was placed for the exact contract with highest open interest
  negative_checks:
  - expr: all(o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No equity trades were placed during the options task
  - expr: not any(any(leg.underlying_symbol != 'TSLA' for leg in oo.legs) for oo in
      state.options_orders)
    desc: No options orders were placed on a different underlying
secondary_primitives: []
primitive_thesis: Measures exploration, state_tracking, grounding by requiring the
  agent to navigate the options chain, identify the correct contract, and execute the
  purchase.
