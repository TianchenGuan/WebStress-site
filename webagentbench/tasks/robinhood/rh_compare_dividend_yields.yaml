task_id: rh_compare_dividend_yields
env_id: robinhood
title: Compare Dividend Yields and Add to Watchlist
instruction_template: Compare the dividend yields of KO, PEP, and PG. Add the one
  with the highest yield to your "Dividend Kings" watchlist.
difficulty: medium
time_limit_seconds: 180
expected_steps: 7
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - KO
      - PEP
      - PG
      - AAPL
      - MSFT
    outputs: []
  - use: watchlist
    params:
      name: Dividend Kings
      symbols: []
    outputs: []
  targets: {}
canonical_diff:
  update:
  - entity: watchlists
    desc: KO added to the Dividend Kings watchlist
    where:
      name: {eq: Dividend Kings}
    changes:
      symbols: {any: true}
  constraints:
  - desc: KO is in the Dividend Kings watchlist
    expr: "'KO' in state.watchlist_symbols('Dividend Kings')"
    severity: critical
  - desc: Exactly one symbol in Dividend Kings
    expr: "len(state.watchlist_symbols('Dividend Kings')) == 1"
    severity: high
  - desc: PEP and PG not added to Dividend Kings
    expr: "not any(s in state.watchlist_symbols('Dividend Kings') for s in ['PEP', 'PG'])"
    severity: high
  invariant:
  - collection: state.watchlists
    filter: "a.name != 'Dividend Kings'"
    preserve: ALL
  - collection: state.positions
    preserve: ALL
  - collection: state.orders
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
secondary_primitives: []
