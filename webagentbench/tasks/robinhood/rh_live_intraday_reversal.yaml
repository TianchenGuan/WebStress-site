---
task_id: rh_live_intraday_reversal
env_id: robinhood
title: Intraday Reversal Buy
instruction_template: Watch NVDA's price. It will experience a decline followed by
  a recovery. Buy 10 shares once you believe the reversal has begun — after the price
  starts going back up.
difficulty: expert
time_limit_seconds: 350
expected_steps: 22
primary_primitives:
- patience
- state_tracking
- grounding
- verification
start_path: "/"
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - NVDA
      - AAPL
      - MSFT
      - TSLA
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 15
          - 838.0
        - - 30
          - 870.0
        - - 45
          - 885.0
        noise_pct: 0.3
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == 'NVDA' and o.side == 'buy' and o.order_type == 'market'
      and o.status == 'filled' and o.quantity == 10 for o in state.orders)
    desc: A filled market buy order for 10 shares of NVDA exists
  - expr: len(state.orders) == 1
    desc: Only the intended reversal buy order was placed
  - expr: "all(o.filled_tick is not None and o.filled_tick >= 12 for o in state.orders\
      \ if o.symbol == 'NVDA' and o.side == 'buy' and o.status == 'filled')"
    desc: NVDA was purchased after the decline phase (not too early)
  - expr: "all(o.filled_price is not None and o.filled_price < 870 for o in state.orders\
      \ if o.symbol == 'NVDA' and o.side == 'buy' and o.status == 'filled')"
    desc: NVDA was bought near the trough, not at the starting price
  negative_checks:
  - expr: not any(o.order_type == 'limit' and o.symbol == 'NVDA' for o in state.orders)
    desc: No limit orders were placed for NVDA (must watch and buy manually)
    penalty: 0.5
secondary_primitives: []
primitive_thesis: Measures patience, state_tracking, grounding, verification by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
