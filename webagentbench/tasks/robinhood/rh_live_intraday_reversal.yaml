task_id: rh_live_intraday_reversal
env_id: robinhood
title: Intraday Reversal Buy
instruction_template: Watch NVDA's price. It will decline from around $875 toward
  the low $840s then recover. Once the price has dropped below $845 and starts rising
  again, buy 5 shares at market price. Do not buy while the price is still falling.
difficulty: expert
time_limit_seconds: 350
expected_steps: 22
primary_primitives:
- patience
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - NVDA
      - AAPL
      - MSFT
      - TSLA
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 15
          - 838.0
        - - 30
          - 870.0
        - - 45
          - 885.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: Market buy of 5 NVDA shares placed at the reversal
    expr: "any(o.symbol == 'NVDA' and o.side == 'buy' and o.order_type == 'market' and o.quantity == 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, state_tracking, grounding, verification by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
