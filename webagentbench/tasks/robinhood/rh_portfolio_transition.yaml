task_id: rh_portfolio_transition
env_id: robinhood
title: Growth to Income Portfolio Transition
instruction_template: 'Switch your portfolio from a growth strategy to an income strategy.
  Sell all positions with a dividend yield below 1% using limit orders at the current
  bid price. With the total proceeds, allocate: 50% equally among the top 3 highest-yielding
  stocks from your "{target.watchlist_name}" watchlist, 30% to BND, and 20% to SCHD.
  Place all buy orders.'
difficulty: frontier
time_limit_seconds: 550
expected_steps: 35
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - TSLA
      - AMZN
      - GOOGL
      - META
      - NVDA
      - BND
      - SCHD
      - T
      - VZ
      - MO
      - PM
      - XOM
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 6
      growth_focused: true
    outputs: []
  - use: watchlist
    params:
      name: Income Ideas
      symbols:
      - T
      - VZ
      - MO
      - PM
      - XOM
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    watchlist_name: Income Ideas
canonical_diff:
  constraints:
  - desc: All low-yield positions sold at limit price
    expr: "all(any(o.side == 'sell' and o.symbol == sym and o.order_type == 'limit' and not o.id.startswith('ord_decoy_') for o in state.orders) for sym in state.positions_below_dividend_yield(Decimal('1')))"
    severity: critical
  - desc: Top 3 highest-yield watchlist stocks received buy orders
    expr: "all(any(o.side == 'buy' and o.symbol == sym and not o.id.startswith('ord_decoy_') for o in state.orders) for sym in state.top_yield_symbols_from_watchlist(target['watchlist_name'], 3))"
    severity: critical
  - desc: BND and SCHD received buy orders
    expr: "any(o.side == 'buy' and o.symbol == 'BND' and not o.id.startswith('ord_decoy_') for o in state.orders) and any(o.side == 'buy' and o.symbol == 'SCHD' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: Only low-yield positions were sold
    expr: "not any(o.side == 'sell' and o.symbol not in state.positions_below_dividend_yield(Decimal('1')) and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No transfers initiated
    expr: "len(state.transfers) == 0"
    severity: high
secondary_primitives: []
primitive_thesis: Measures planning, state_tracking, exploration, grounding, verification
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
