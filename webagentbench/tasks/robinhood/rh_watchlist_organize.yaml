task_id: rh_watchlist_organize
env_id: robinhood
title: Create and Populate Multiple Watchlists
instruction_template: >-
  Create a new watchlist called "Tech Leaders" and add AAPL, MSFT, GOOGL, NVDA,
  and META to it. Then create another watchlist called "Dividend Kings" and add
  KO, JNJ, PG, XOM, and HD to it.
difficulty: medium
time_limit_seconds: 240
expected_steps: 18
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 30
        must_include: ["AAPL", "MSFT", "GOOGL", "NVDA", "META", "KO", "JNJ", "PG", "XOM", "HD"]
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: >-
        any(w.name == 'Tech Leaders'
        and all(s in w.symbols for s in ['AAPL', 'MSFT', 'GOOGL', 'NVDA', 'META'])
        for w in state.watchlists)
      desc: A watchlist named Tech Leaders exists with AAPL, MSFT, GOOGL, NVDA, and META
    - expr: >-
        len([w for w in state.watchlists if w.name == 'Tech Leaders']) == 1
      desc: Exactly one Tech Leaders watchlist exists (no duplicates)
    - expr: >-
        any(w.name == 'Dividend Kings'
        and all(s in w.symbols for s in ['KO', 'JNJ', 'PG', 'XOM', 'HD'])
        for w in state.watchlists)
      desc: A watchlist named Dividend Kings exists with KO, JNJ, PG, XOM, and HD
    - expr: >-
        len([w for w in state.watchlists if w.name == 'Dividend Kings']) == 1
      desc: Exactly one Dividend Kings watchlist exists (no duplicates)
  negative_checks:
    - expr: >-
        not any(o.side in ('buy', 'sell')
        and not o.id.startswith('ord_decoy_')
        for o in state.orders)
      desc: No equity orders were placed during the watchlist task
      penalty: 0.2
    - expr: >-
        len(state.price_alerts) == len([a for a in state.price_alerts
        if a.id.startswith('alert_decoy_') or a.id.startswith('alert_0')])
      desc: No price alerts were created during the watchlist task
      penalty: 0.1
secondary_primitives: []
