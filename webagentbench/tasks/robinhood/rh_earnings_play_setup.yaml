task_id: rh_earnings_play_setup
env_id: robinhood
title: Earnings Protection Setup for AAPL
instruction_template: "AAPL reports earnings tomorrow after market close. Set up protection: place a stop-loss order at 8% below current price, set a price alert at 5% above current price, then check if you have enough buying power to double your position. Report your current AAPL exposure and protection plan."
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
  - planning
  - state_tracking
  - exploration
  - grounding
start_path: /

seed:
  distractors: 20
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["AAPL", "MSFT", "GOOGL", "TSLA"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT", "GOOGL"]
        quantities: ["50", "20", "15"]
        cost_bases: ["165.00", "380.00", "140.00"]
      outputs: []
    - use: earnings_calendar
      params:
        include_symbols: ["AAPL"]
        days_ahead: 1
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets:
    symbol: "AAPL"

eval:
  source: server_state
  checks:
    - expr: "any(o.symbol == 'AAPL' and o.order_type == 'stop' and o.side == 'sell' and o.status in ('filled', 'pending') for o in state.orders)"
      desc: A stop-loss sell order for AAPL exists
    - expr: "any(a.symbol == 'AAPL' and a.condition == 'above' for a in state.price_alerts)"
      desc: A price alert for AAPL above current price exists
  negative_checks: []
