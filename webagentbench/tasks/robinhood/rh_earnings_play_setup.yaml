---
task_id: rh_earnings_play_setup
env_id: robinhood
title: Earnings Protection Setup for {target.symbol}
instruction_template: '{target.symbol} reports earnings tomorrow after market close.
  Set up protection: place a stop-loss order at 8% below current price and set a price
  alert at 5% above current price.'
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- planning
- state_tracking
- exploration
- grounding
start_path: "/"
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - TSLA
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - GOOGL
      quantities:
      - '50'
      - '20'
      - '15'
      cost_bases:
      - '165.00'
      - '380.00'
      - '140.00'
    outputs: []
  - use: earnings_calendar
    params:
      include_symbols:
      - AAPL
      days_ahead: 1
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    symbol: AAPL
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == '{target.symbol}' and o.order_type == 'stop' and o.side
      == 'sell' and o.status in ('filled', 'pending') and o.stop_price <= state.get_stock('{target.symbol}').price
      * Decimal('0.921') and o.stop_price >= state.get_stock('{target.symbol}').price
      * Decimal('0.919')
      for o in state.orders)
    desc: The target stock has a stop-loss sell order close to 8% below the current price
  - expr: any(a.symbol == '{target.symbol}' and a.condition == 'above' and a.target_price
      <= state.get_stock('{target.symbol}').price * Decimal('1.051') and a.target_price
      >= state.get_stock('{target.symbol}').price
      * Decimal('1.049') for a in state.price_alerts)
    desc: The target stock has a price alert close to 5% above the current price
  negative_checks:
  - expr: not any(o.symbol == '{target.symbol}' and o.side == 'buy' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: The task did not prematurely double the target position
secondary_primitives: []
primitive_thesis: Measures planning, state_tracking, exploration, grounding by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
