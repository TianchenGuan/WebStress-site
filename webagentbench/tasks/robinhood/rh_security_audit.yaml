task_id: rh_security_audit
env_id: robinhood
title: Audit Security Log and Enable 2FA
instruction_template: Check your security log for any logins from outside the United
  States. If you find any, enable two-factor authentication via authenticator app.
difficulty: medium
time_limit_seconds: 180
expected_steps: 7
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: security_log
    params:
      count: 8
      include_suspicious: true
    outputs: []
  targets: {}
canonical_diff:
  constraints:
  - desc: Two-factor authentication enabled via authenticator app
    expr: "state.settings.two_factor_method == 'authenticator'"
    severity: critical
secondary_primitives: []
