task_id: rh_sector_concentration
env_id: robinhood
title: Reduce Technology Sector Concentration
instruction_template: Calculate what percentage of your portfolio is in the Technology
  sector. If it exceeds 50%, sell enough of your most overweight tech stock to bring
  Technology to at or below 50% of the portfolio, then buy {target.buy_symbol} with
  the proceeds.
difficulty: hard
time_limit_seconds: 280
expected_steps: 12
primary_primitives:
- planning
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - NVDA
      - SCHD
      - JNJ
      - KO
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - GOOGL
      - NVDA
      - JNJ
      - KO
      quantities:
      - '50'
      - '60'
      - '25'
      - '10'
      - '15'
      - '20'
      cost_bases:
      - '170.00'
      - '380.00'
      - '155.00'
      - '800.00'
      - '155.00'
      - '55.00'
    outputs:
    - largest_tech_symbol
  targets:
    largest_tech_symbol: '{output.largest_tech_symbol}'
    buy_symbol: SCHD
canonical_diff:
  constraints:
  - desc: Sell order placed for most overweight tech stock
    expr: "any(o.symbol == target['largest_tech_symbol'] and o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: Buy order placed for SCHD
    expr: "any(o.symbol == 'SCHD' and o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: Only the most overweight tech stock sold
    expr: "not any(o.side == 'sell' and o.symbol != target['largest_tech_symbol'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No unrelated buy orders placed
    expr: "not any(o.side == 'buy' and o.symbol != 'SCHD' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, grounding by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
