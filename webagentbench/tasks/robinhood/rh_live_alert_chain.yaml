task_id: rh_live_alert_chain
env_id: robinhood
title: Alert-Triggered Portfolio Rebalance
instruction_template: Set a price alert for NVDA above $900. When the alert
  triggers, check your portfolio's Technology sector concentration (count NVDA,
  AAPL, and MSFT as Technology stocks). If Technology exceeds 60% of your total
  portfolio value, sell enough NVDA to bring it to 50%. Otherwise, buy 5 more
  shares of NVDA.
difficulty: expert
time_limit_seconds: 350
expected_steps: 20
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - NVDA
      - AAPL
      - MSFT
      - JNJ
      - XOM
    outputs: []
  - use: portfolio_diverse
    params:
      tech_heavy: true
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 20
          - 905.0
        - - 35
          - 910.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: price_alerts
    desc: NVDA above-$900 price alert created
    properties:
      symbol: {eq: NVDA}
      condition: {eq: above}
      target_price: {expr: "Decimal('895') <= Decimal(str(x)) <= Decimal('905')"}
      status: {any: true}
      created_at: {any: true}
  - entity: orders
    desc: 5 NVDA shares bought after alert triggered (tech ≤ 60% branch)
    properties:
      symbol: {eq: NVDA}
      side: {eq: buy}
      quantity: {eq: 5}
      status: {any: true}
      order_type: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Buy transaction recorded for NVDA
    properties:
      type: {eq: buy}
      symbol: {eq: NVDA}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications fired by the NVDA buy
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  update:
  - entity: positions
    desc: Existing NVDA position increased by buy (if held before)
    bijection:
      over: "[p for p in initial.positions if p.symbol == 'NVDA']"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      quantity: {any: true}
  - entity: positions
    desc: Non-NVDA holdings only receive backend mark-to-market refreshes
    bijection:
      over: "[p for p in initial.positions if p.symbol != 'NVDA' and state.get_position(p.symbol) is not None and state.get_position(p.symbol).total_return != p.total_return]"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      total_return: {any: true}
  invariant:
  - collection: state.positions
    filter: "a.symbol != 'NVDA'"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    filter: "a.symbol != 'NVDA'"
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol != 'NVDA'"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: NVDA above-$900 alert triggered
    expr: any(a.symbol == 'NVDA' and a.condition == 'above' and Decimal('895')
      <= Decimal(str(a.target_price)) <= Decimal('905') and a.status ==
      'triggered' for a in state.price_alerts)
    severity: critical
  - desc: NVDA response buy filled for 5 shares
    expr: any(o.symbol == 'NVDA' and o.side == 'buy' and o.quantity ==
      Decimal('5') and o.status == 'filled' and o.filled_quantity == o.quantity
      for o in state.orders)
    severity: critical
  - desc: NVDA buy branch is valid for the seed and waits for the alert trigger
    expr: initial.sector_pct('Technology') <= Decimal('60') and any(a.symbol ==
      'NVDA' and a.condition == 'above' and a.triggered_at is not None and
      any(o.symbol == 'NVDA' and o.side == 'buy' and o.created_at >
      a.triggered_at for o in state.orders) for a in state.price_alerts)
    severity: critical
  - desc: Non-NVDA positions keep identity and holdings unchanged
    expr: all((state.get_position(p.symbol) is None) or
      (state.get_position(p.symbol).id == p.id and
      state.get_position(p.symbol).quantity == p.quantity and
      state.get_position(p.symbol).avg_cost_basis == p.avg_cost_basis and
      state.get_position(p.symbol).current_price == p.current_price and
      state.get_position(p.symbol).day_change_pct == p.day_change_pct and
      state.get_position(p.symbol).asset_type == p.asset_type and
      state.get_position(p.symbol).name == p.name and
      state.get_position(p.symbol).lots == p.lots) for p in initial.positions if
      p.symbol != 'NVDA')
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, state_tracking, grounding,
  verification by requiring exact completion of the requested Robinhood workflow
  while ignoring distractor account state.
