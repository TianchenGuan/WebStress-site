task_id: rh_live_alert_chain
env_id: robinhood
title: Alert-Triggered Portfolio Rebalance
instruction_template: Set a price alert for NVDA above $900. When the alert triggers,
  check your portfolio's Technology sector concentration. If Technology exceeds 60%
  of your portfolio, sell enough NVDA to bring it to 50%. Otherwise, buy 5 more shares.
difficulty: expert
time_limit_seconds: 350
expected_steps: 20
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - NVDA
      - AAPL
      - MSFT
      - JNJ
      - XOM
    outputs: []
  - use: portfolio_diverse
    params:
      tech_heavy: true
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 20
          - 905.0
        - - 35
          - 910.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: NVDA above-$900 price alert created
    expr: "any(a.symbol == 'NVDA' and a.condition == 'above' and a.target_price >= Decimal('895') and a.target_price <= Decimal('905') and not a.id.startswith('alert_decoy_') for a in state.price_alerts)"
    severity: critical
  - desc: 5 NVDA shares bought after alert triggered
    expr: "any(o.symbol == 'NVDA' and o.side == 'buy' and o.quantity == 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, state_tracking, grounding, verification
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
