task_id: rh_live_watch_spread
env_id: robinhood
title: Watch for Price Reversal and Buy
instruction_template: Watch TSLA's price. When it stabilizes after falling — meaning
  the price starts going back up after a decline — place a market buy for 5 shares
  at the reversal point.
difficulty: hard
time_limit_seconds: 280
expected_steps: 18
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - TSLA
      - AAPL
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      TSLA:
        keyframes:
        - - 0
          - 260.0
        - - 10
          - 245.0
        - - 15
          - 243.0
        - - 25
          - 255.0
        noise_pct: 0.2
canonical_diff:
  constraints:
  - desc: Market buy of 5 TSLA shares placed at the spread reversal
    expr: "any(o.symbol == 'TSLA' and o.side == 'buy' and o.order_type == 'market' and o.quantity == 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
