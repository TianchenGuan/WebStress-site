---
task_id: rh_live_watch_spread
env_id: robinhood
title: Watch for Price Reversal and Buy
instruction_template: Watch TSLA's price. When it stabilizes after falling — meaning
  the price starts going back up after a decline — place a market buy for 5 shares
  at the reversal point.
difficulty: hard
time_limit_seconds: 280
expected_steps: 18
primary_primitives:
- patience
- grounding
- state_tracking
start_path: "/"
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - TSLA
      - AAPL
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      TSLA:
        keyframes:
        - - 0
          - 260.0
        - - 10
          - 245.0
        - - 15
          - 243.0
        - - 25
          - 255.0
        noise_pct: 0.2
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == 'TSLA' and o.side == 'buy' and o.order_type == 'market'
      and o.status == 'filled' and o.quantity == 5 for o in state.orders)
    desc: A filled market buy order for 5 shares of TSLA exists
  - expr: len(state.orders) == 1
    desc: Only the intended reversal buy order was placed
  - expr: "all(o.filled_price is not None and o.filled_price < 255 for o in state.orders\
      \ if o.symbol == 'TSLA' and o.side == 'buy' and o.status == 'filled')"
    desc: TSLA was bought during or after the dip, not at the starting price
  negative_checks:
  - expr: not any(o.order_type == 'limit' and o.symbol == 'TSLA' for o in state.orders)
    desc: No limit orders were placed for TSLA (must watch and buy manually)
    penalty: 0.5
secondary_primitives: []
primitive_thesis: Measures patience, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
