task_id: rh_year_end_tax_planning
env_id: robinhood
title: Year-End Tax-Loss Harvesting and Re-Entry Plan
instruction_template: It is year-end. Calculate your total realized gains from the
  1099 preview (both short-term and long-term). Find unrealized losses you can harvest
  without triggering wash sales. Execute the harvesting sells. Set up monthly $100
  recurring investments to re-enter those positions after 31 days.
difficulty: frontier
time_limit_seconds: 550
expected_steps: 35
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - TSLA
      - INTC
      - BA
      - NFLX
      - META
      - AMZN
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 7
      include_losers: true
      loser_count: 3
    outputs:
    - loss_symbols
  - use: tax_documents
    params:
      include_gains: true
      short_term_gains: 2500
      long_term_gains: 1500
      gains_count: 2
    outputs: []
  - use: transaction_ledger
    params:
      months: 6
      include_recent_buys: true
      recent_buy_symbols: '{output.loss_symbols}'
      recent_buy_count: 1
    outputs:
    - recent_buy_symbols
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    loss_symbols: '{output.loss_symbols}'
    recent_buy_symbols: '{output.recent_buy_symbols}'
canonical_diff:
  constraints:
  - desc: At least one loss position sold for year-end harvesting
    expr: "any(o.side == 'sell' and o.symbol in target['loss_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: No wash sale violations (no sells of recent buys)
    expr: "not any(o.symbol in target['recent_buy_symbols'] for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_'))"
    severity: critical
  - desc: Recurring re-entry investments created for all harvested symbols
    expr: "any(o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders) and all(any(ri.symbol == o.symbol and ri.status == 'active' and not ri.id.startswith('ri_decoy_') for ri in state.recurring_investments) for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_'))"
    severity: critical
  - desc: All sells target seeded loss positions
    expr: "all(o.symbol in target['loss_symbols'] for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_'))"
    severity: high
  - desc: Harvested losses sufficient to offset realized gains
    expr: "state.estimated_harvested_loss() >= state.total_realized_gains(gains_only=True)"
    severity: high
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, backtracking, verification, patience
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
