task_id: rh_year_end_tax_planning
env_id: robinhood
title: Year-End Tax-Loss Harvesting and Re-Entry Plan
instruction_template: It is year-end. Calculate your total realized gains from the
  1099 preview (both short-term and long-term). Find unrealized losses you can harvest
  without triggering wash sales. Execute the harvesting sells. Set up monthly $100
  recurring investments to re-enter those positions after 31 days.
difficulty: frontier
time_limit_seconds: 550
expected_steps: 35
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - TSLA
      - INTC
      - BA
      - NFLX
      - META
      - AMZN
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 7
      include_losers: true
      loser_count: 3
    outputs:
    - loss_symbols
  - use: tax_documents
    params:
      include_gains: true
      short_term_gains: 2500
      long_term_gains: 1500
      gains_count: 2
    outputs: []
  - use: transaction_ledger
    params:
      months: 6
      include_recent_buys: true
      recent_buy_symbols: '{output.loss_symbols}'
      recent_buy_count: 1
    outputs:
    - recent_buy_symbols
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    loss_symbols: '{output.loss_symbols}'
    recent_buy_symbols: '{output.recent_buy_symbols}'
canonical_diff:
  create:
  - entity: orders
    desc: Sell order placed for each eligible loss position (year-end harvest)
    bijection:
      over: "[s for s in target['loss_symbols'] if s not in target['recent_buy_symbols']]"
      variable: v
    properties:
      symbol: {expr: "x == v"}
      side: {eq: sell}
      status: {in: [filled, pending]}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: recurring_investments
    desc: Monthly $100 recurring re-entry investment for each harvested symbol
    bijection:
      over: "[s for s in target['loss_symbols'] if s not in target['recent_buy_symbols']]"
      variable: v
    properties:
      symbol: {expr: "x == v"}
      frequency: {eq: monthly}
      amount: {eq: 100}
      status: {eq: active}
  - entity: transactions
    desc: Sell transaction recorded for each eligible loss position
    bijection:
      over: "[s for s in target['loss_symbols'] if s not in target['recent_buy_symbols']]"
      variable: v
    properties:
      type: {eq: sell}
      symbol: {expr: "x == v"}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order-fill notification emitted for each harvest sell
    bijection:
      over: "[s for s in target['loss_symbols'] if s not in target['recent_buy_symbols']]"
      variable: v
    properties:
      type: {eq: order_fill}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  delete:
  - entity: positions
    desc: Fully-sold loss positions removed from portfolio
    bijection:
      over: "[p for p in initial.positions if p.symbol in target['loss_symbols'] and p.symbol not in target['recent_buy_symbols']]"
      variable: v
    where:
      id: {expr: "x == v.id"}
  invariant:
  - collection: state.orders
    filter: "a.side == 'sell' and (a.symbol not in target['loss_symbols'] or a.symbol in target['recent_buy_symbols'])"
    preserve: ALL
  - collection: state.positions
    filter: "a.symbol not in target['loss_symbols']"
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol is not None and a.symbol not in target['loss_symbols']"
    preserve: ALL
  - collection: state.notifications
    filter: "a.type != 'order_fill'"
    preserve: ALL
  - collection: state.recurring_investments
    filter: "a.symbol is not None and a.symbol not in target['loss_symbols']"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, backtracking, verification, patience
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
