task_id: rh_year_end_tax_planning
env_id: robinhood
title: Year-End Tax-Loss Harvesting and Re-Entry Plan
instruction_template: "It is year-end. Calculate your total realized gains from the 1099 preview (both short-term and long-term). Find unrealized losses you can harvest without triggering wash sales. Execute the harvesting sells. Set up recurring investments to re-enter those positions after 31 days. Report total estimated tax savings assuming a 24% short-term and 15% long-term tax bracket."
difficulty: frontier
time_limit_seconds: 550
expected_steps: 35
primary_primitives:
  - state_tracking
  - planning
  - backtracking
  - verification
  - patience
start_path: /

seed:
  distractors: 20
  steps:
    - use: stock_universe
      params:
        count: 30
        must_include: ["AAPL", "TSLA", "INTC", "BA", "NFLX", "META", "AMZN"]
      outputs: []
    - use: portfolio_diverse
      params:
        position_count: 7
        include_losers: true
        loser_count: 3
      outputs: []
    - use: tax_documents
      params:
        include_gains: true
        short_term_gains: 8000
        long_term_gains: 5000
      outputs: []
    - use: transaction_ledger
      params:
        months: 6
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(o.side == 'sell' and o.status in ('filled', 'pending') for o in state.orders)"
      desc: Sell orders exist for tax-loss harvesting
    - expr: "any(r.status == 'active' for r in state.recurring_investments)"
      desc: Recurring investments set up for re-entry after wash sale window
  negative_checks: []
