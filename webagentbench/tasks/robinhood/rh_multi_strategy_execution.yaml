task_id: rh_multi_strategy_execution
env_id: robinhood
title: Execute Three Simultaneous Strategies
instruction_template: 'Execute three strategies simultaneously: (a) Tax-loss harvest
  any position with more than $500 in unrealized losses, checking for wash sale conflicts;
  (b) Set up a protective collar on your largest position by buying a put and selling
  a call; (c) Start a weekly $100 recurring investment into each of the 3 stocks on
  your "{target.watchlist_name}" watchlist. Important: do not sell a stock in strategy
  (a) that you are protecting in strategy (b).'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 38
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - TSLA
      - INTC
      - BA
      - MSFT
      - NVDA
      - AMZN
      - SQ
      - PLTR
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 7
      include_losers: true
      loser_count: 3
      large_position_stock: AAPL
    outputs: []
  - use: options_chain
    params:
      symbol: AAPL
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: watchlist
    params:
      name: Growth Picks
      symbols:
      - SQ
      - PLTR
      - NVDA
    outputs: []
  - use: transaction_ledger
    params:
      months: 3
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    watchlist_name: Growth Picks
canonical_diff:
  constraints:
  - desc: Sell orders placed for tax-loss harvesting
    expr: "any(o.side == 'sell' and o.status in ('filled', 'pending') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: Protective put purchased for AAPL collar
    expr: "any(o.status in ('filled', 'pending') and any(leg.side == 'buy' and leg.option_type == 'put' and leg.underlying_symbol == 'AAPL' for leg in o.legs) for o in state.options_orders)"
    severity: critical
  - desc: Covered call sold for AAPL collar
    expr: "any(o.status in ('filled', 'pending') and any(leg.side == 'sell' and leg.option_type == 'call' and leg.underlying_symbol == 'AAPL' for leg in o.legs) for o in state.options_orders)"
    severity: critical
  - desc: Three weekly $100 recurring investments created for watchlist stocks
    expr: "sum(1 for r in state.recurring_investments if r.frequency == 'weekly' and float(r.amount) == 100.0 and r.status == 'active' and not r.id.startswith('ri_decoy_')) >= 3"
    severity: critical
  - desc: Recurring investments target watchlist symbols
    expr: "all(r.symbol in ['SQ', 'PLTR', 'NVDA'] for r in state.recurring_investments if r.frequency == 'weekly' and float(r.amount) == 100.0 and r.status == 'active' and not r.id.startswith('ri_decoy_'))"
    severity: high
  - desc: AAPL (protected stock) not sold in tax-loss harvesting
    expr: "not any(o.side == 'sell' and o.symbol == 'AAPL' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No transfers initiated
    expr: "len(state.transfers) == 0"
    severity: high
secondary_primitives: []
