task_id: rh_dividend_income_report
env_id: robinhood
title: Optimize Dividend Income by Swapping Positions
instruction_template: Review the dividend income across all your positions. Find
  the stock contributing the least dividend income and sell all of it. Then buy shares
  of the highest-yielding stock from your "Income Ideas" watchlist with the proceeds.
difficulty: hard
time_limit_seconds: 280
expected_steps: 12
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - KO
      - PEP
      - PG
      - JNJ
      - SCHD
      - VTI
    outputs: []
  - use: portfolio_diverse
    params:
      count: 6
    outputs:
    - lowest_dividend_income_symbol
    - gain_symbols
  - use: watchlist
    params:
      name: Income Ideas
      symbols:
      - SCHD
      - VTI
      - KO
    outputs: []
  - use: dividend_schedule
    params:
      include_history: true
    outputs: []
  targets:
    worst_yield_symbol: '{output.lowest_dividend_income_symbol}'
    watchlist_symbols:
    - SCHD
    - VTI
    - KO
canonical_diff:
  create:
  - entity: orders
    desc: Sell order for the lowest dividend income symbol
    properties:
      symbol: {expr: "x == target['worst_yield_symbol']"}
      side: {eq: sell}
      status: {in: [filled, pending]}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: orders
    desc: Buy order for a stock from the Income Ideas watchlist
    properties:
      symbol: {expr: "x in target['watchlist_symbols']"}
      side: {eq: buy}
      status: {in: [filled, pending]}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Sell transaction recorded for the worst-yield symbol
    properties:
      type: {eq: sell}
      symbol: {expr: "x == target['worst_yield_symbol']"}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: transactions
    desc: Buy transaction recorded for the watchlist pick
    properties:
      type: {eq: buy}
      symbol: {expr: "x in target['watchlist_symbols']"}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications generated by the swap
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  - entity: positions
    desc: New position for the watchlist pick (created or updated)
    properties:
      symbol: {expr: "x in target['watchlist_symbols']"}
      quantity: {any: true}
  delete:
  - entity: positions
    desc: Worst-yield-symbol position fully liquidated
    where:
      symbol: {expr: "x == target['worst_yield_symbol']"}
  invariant:
  - collection: state.orders
    filter: "(a.side == 'sell' and a.symbol != target['worst_yield_symbol']) or (a.side == 'buy' and a.symbol not in target['watchlist_symbols'])"
    preserve: ALL
  - collection: state.positions
    filter: "a.symbol != target['worst_yield_symbol'] and a.symbol not in target['watchlist_symbols']"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol != target['worst_yield_symbol'] and a.symbol not in target['watchlist_symbols']"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
secondary_primitives: []
