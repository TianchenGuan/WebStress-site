task_id: rh_dividend_income_report
env_id: robinhood
title: Optimize Dividend Income by Swapping Positions
instruction_template: Calculate your total expected annual dividend income across
  all positions. Find the stock contributing the least dividend income and sell all
  of it. Then buy shares of the highest-yielding stock from your "Income Ideas" watchlist
  with the proceeds.
difficulty: hard
time_limit_seconds: 280
expected_steps: 12
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - KO
      - PEP
      - PG
      - JNJ
      - SCHD
      - VTI
    outputs: []
  - use: portfolio_diverse
    params:
      count: 6
    outputs:
    - lowest_dividend_income_symbol
    - gain_symbols
  - use: watchlist
    params:
      name: Income Ideas
      symbols:
      - SCHD
      - VTI
      - KO
    outputs: []
  - use: dividend_schedule
    params:
      include_history: true
    outputs: []
  targets:
    worst_yield_symbol: '{output.lowest_dividend_income_symbol}'
    watchlist_symbols:
    - SCHD
    - VTI
    - KO
canonical_diff:
  constraints:
  - desc: Only the worst yield symbol was sold
    expr: "not any(o.side == 'sell' and o.symbol != target['worst_yield_symbol'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Buy only from Income Ideas watchlist symbols
    expr: "not any(o.side == 'buy' and o.symbol not in target['watchlist_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Exactly one sell order placed
    expr: "len([o for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_')]) == 1"
    severity: high
  - desc: Exactly one buy order placed
    expr: "len([o for o in state.orders if o.side == 'buy' and not o.id.startswith('ord_decoy_')]) == 1"
    severity: high
  invariant:
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
secondary_primitives: []
