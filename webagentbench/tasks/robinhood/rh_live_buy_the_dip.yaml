task_id: rh_live_buy_the_dip
env_id: robinhood
title: Buy the Dip with Limit Order
instruction_template: AAPL is currently around $190. Place a limit buy order for 10
  shares at $180 or below, good-till-cancelled. Wait for it to fill and confirm.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- patience
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 15
          - 178.5
        - - 30
          - 185.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: AAPL GTC limit buy order at approximately 5% below current price
    expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'limit' and o.time_in_force == 'gtc' and o.limit_price is not None and o.limit_price <= initial.get_stock('AAPL').price * Decimal('0.96') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: Buy 10 AAPL shares
    expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and o.quantity == 10 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, verification by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
