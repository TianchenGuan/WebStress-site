task_id: rh_recurring_optimization
env_id: robinhood
title: Optimize Recurring Investments
instruction_template: Analyze all active recurring investments. Pause any where the average purchase price
  from history is more than 5% above the current stock price. Also pause any that are for stocks with
  earnings in the next 3 days. Report what you changed.
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
    outputs: []
  - use: recurring_investments
    params:
      count: 5
      include_history: true
      overpaying_count: 2
    outputs:
    - overpaying_symbols
    - total_active_before
  - use: earnings_calendar
    params:
      days_ahead: 7
      include_symbols:
      - AAPL
      - GOOGL
    outputs:
    - earnings_symbols
    - should_pause_symbols
  targets:
    overpaying_symbols: '{output.overpaying_symbols}'
    earnings_symbols: '{output.earnings_symbols}'
    should_pause_symbols: '{output.should_pause_symbols}'
    total_active_before: '{output.total_active_before}'
eval:
  source: server_state
  checks:
  - expr: any(r.status == 'paused' for r in state.recurring_investments)
    desc: At least one recurring investment was paused
  - expr: all(any(r.symbol == sym and r.status == 'paused' for r in state.recurring_investments) for sym
      in {target.overpaying_symbols})
    desc: All overpaying recurring investments (avg price >5% above current) were paused
  - expr: all(any(r.symbol == sym and r.status == 'paused' for r in state.recurring_investments) for sym
      in {target.earnings_symbols} if any(r.symbol == sym for r in state.recurring_investments))
    desc: All recurring investments for stocks with earnings in 3 days were paused
  - expr: len([r for r in state.recurring_investments if r.status == 'paused']) >= len({target.should_pause_symbols})
    desc: The correct number of recurring investments were paused
  - expr: not any(r.status == 'paused' and r.symbol not in {target.should_pause_symbols} for r in state.recurring_investments)
    desc: No recurring investments were paused that should have remained active
  negative_checks:
  - expr: not any(o.side in ('buy', 'sell') and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No trades were placed during this analysis task
    penalty: 0.15
  - expr: not any(e.action == 'robinhood.transfer.initiate' for e in state.audit_log)
    desc: No transfers were initiated
    penalty: 0.15
  - expr: not any(e.action == 'robinhood.recurring.create' for e in state.audit_log)
    desc: Optimization paused existing recurring plans without creating new ones
    penalty: 0.15
  - expr: not any( e.action.startswith('robinhood.watchlist.') or e.action == 'robinhood.alert.create'
      or e.action == 'robinhood.alert.delete' for e in state.audit_log)
    desc: Optimization did not mutate watchlists or price alerts
    penalty: 0.1
secondary_primitives:
- planning
