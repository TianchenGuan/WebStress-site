task_id: rh_cost_basis_reconciliation
env_id: robinhood
title: Trim AAPL Position and Set Rebuy Alert
instruction_template: Your {target.symbol} position is oversized. Sell half of your {target.symbol} shares
  (round down to a whole number) using a limit order at the current ask price. Then set a price alert
  on {target.symbol} at 10% below the current price in case you want to rebuy later.
difficulty: hard
time_limit_seconds: 250
expected_steps: 8
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      quantities:
      - '75'
      - '30'
      cost_bases:
      - '172.50'
      - '385.00'
    outputs: []
  targets:
    symbol: AAPL
    sell_quantity: 37
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == '{target.symbol}' and o.side == 'sell' and o.order_type == 'limit' and o.status
      in ('filled', 'pending') and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: A limit sell order was placed for AAPL
  - expr: any(o.symbol == '{target.symbol}' and o.side == 'sell' and o.quantity == Decimal('{target.sell_quantity}')
      and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: The sell quantity is half the seeded AAPL position rounded down
  - expr: any(o.symbol == '{target.symbol}' and o.side == 'sell' and o.limit_price == state.get_stock('{target.symbol}').ask
      and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: The limit price is set at the current ask price
  - expr: any(a.symbol == '{target.symbol}' and a.condition == 'below' and a.target_price >= state.get_stock('{target.symbol}').price
      * Decimal('0.89') and a.target_price <= state.get_stock('{target.symbol}').price * Decimal('0.91')
      and not a.id.startswith('alert_decoy_') for a in state.price_alerts)
    desc: A price alert was set at approximately 10% below current price
  negative_checks:
  - expr: not any(o.symbol != '{target.symbol}' and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No orders were placed on stocks other than AAPL
  - expr: not any(e.action == 'robinhood.transfer.initiate' for e in state.audit_log)
    desc: No transfers were initiated
  - expr: not any(o.symbol == '{target.symbol}' and o.side == 'buy' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: Reconciliation did not add a buy order on the oversized position
    penalty: 0.15
  - expr: sum(1 for e in state.audit_log if e.action == 'robinhood.alert.create') == 1
    desc: Exactly one follow-up price alert was created
    penalty: 0.15
  - expr: not any( e.action.startswith('robinhood.watchlist.') or e.action.startswith('robinhood.recurring.')
      for e in state.audit_log)
    desc: Reconciliation did not mutate watchlists or recurring investments
    penalty: 0.1
secondary_primitives:
- verification
primitive_thesis: Measures state_tracking, verification, grounding by requiring the agent to calculate
  half of a position, place a correctly priced limit order, and set a price alert.
