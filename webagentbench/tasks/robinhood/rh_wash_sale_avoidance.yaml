task_id: rh_wash_sale_avoidance
env_id: robinhood
title: Tax-Loss Harvest While Avoiding Wash Sales
instruction_template: 'Perform tax-loss harvesting: sell all positions that have unrealized
  losses. However, skip any position where you purchased the same stock within the
  last 30 days, as this would trigger a wash sale.'
difficulty: hard
time_limit_seconds: 280
expected_steps: 12
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
    outputs: []
  - use: portfolio_diverse
    params:
      count: 6
      include_losers: true
    outputs:
    - loss_symbols
    - gain_symbols
  - use: transaction_ledger
    params:
      months: 2
      symbols:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
      include_recent_buys: true
      recent_buy_count: 2
    outputs:
    - recent_buy_symbols
  targets:
    loss_symbols: '{output.loss_symbols}'
    recent_buy_symbols: '{output.recent_buy_symbols}'
    gain_symbols: '{output.gain_symbols}'
canonical_diff:
  constraints:
  - desc: At least one loss position sold for tax-loss harvesting
    expr: "any(o.side == 'sell' and o.symbol in target['loss_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: No wash sale violations (no sells of recent buys)
    expr: "not any(o.side == 'sell' and o.symbol in target['recent_buy_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: All sell orders target loss positions only
    expr: "all(o.symbol in target['loss_symbols'] for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_'))"
    severity: high
  - desc: No gain positions were sold
    expr: "not any(o.side == 'sell' and o.symbol in target['gain_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
secondary_primitives: []
