task_id: rh_multi_leg_options
env_id: robinhood
title: Execute an Iron Condor on {target.symbol}
instruction_template: 'Execute an iron condor on {target.symbol}: sell a call and
  a put at strikes 5% above and below current price, and buy protective legs 2% further
  out, all expiring in approximately 45 days.'
difficulty: expert
time_limit_seconds: 400
expected_steps: 22
primary_primitives:
- planning
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - SPY
      - QQQ
      - AAPL
      - MSFT
    outputs: []
  - use: options_chain
    params:
      symbol: SPY
      expirations_count: 4
      strikes_per_expiration: 20
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - QQQ
      - AAPL
      quantities:
      - '50'
      - '20'
      cost_bases:
      - '380.00'
      - '175.00'
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    symbol: SPY
canonical_diff:
  create:
  - entity: options_orders
    desc: Iron condor with 4 legs on target underlying
    properties:
      strategy: {eq: iron_condor}
      status: {in: [pending, filled]}
      legs: {any: true}
  constraints:
  - desc: 4-leg iron condor with 2 short and 2 long legs
    expr: "state.latest_options_order(symbol=target['symbol']) is not None and len(state.latest_options_order(symbol=target['symbol']).legs) == 4 and len([leg for leg in state.latest_options_order(symbol=target['symbol']).legs if leg.side == 'sell']) == 2 and len([leg for leg in state.latest_options_order(symbol=target['symbol']).legs if leg.side == 'buy']) == 2"
    severity: critical
  - desc: Correct call and put structure with protective wings outside short strikes
    expr: "state.latest_options_order(symbol=target['symbol']) is not None and len([leg for leg in state.latest_options_order(symbol=target['symbol']).legs if leg.option_type == 'call' and leg.side == 'buy']) == 1 and len([leg for leg in state.latest_options_order(symbol=target['symbol']).legs if leg.option_type == 'put' and leg.side == 'buy']) == 1"
    severity: critical
  - desc: Short legs struck near 5% from current price
    expr: "state.latest_options_order(symbol=target['symbol']) is not None and all(leg.strike >= state.get_stock(target['symbol']).price * Decimal('0.90') and leg.strike <= state.get_stock(target['symbol']).price * Decimal('1.10') for leg in state.latest_options_order(symbol=target['symbol']).legs if leg.side == 'sell')"
    severity: critical
  - desc: All legs expire approximately 45 days out (35-55 days)
    expr: "state.latest_options_order(symbol=target['symbol']) is not None and all(state.days_until(leg.expiration) >= 35 and state.days_until(leg.expiration) <= 55 for leg in state.latest_options_order(symbol=target['symbol']).legs)"
    severity: critical
  - desc: No equity orders placed
    expr: "not any(o.side in ('buy', 'sell') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  invariant:
  - collection: state.positions
    preserve: ALL
  - collection: state.orders
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures planning, state_tracking, exploration, grounding by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
