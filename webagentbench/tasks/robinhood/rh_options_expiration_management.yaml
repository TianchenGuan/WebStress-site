task_id: rh_options_expiration_management
env_id: robinhood
title: Manage 8 Expiring Options Positions
instruction_template: 'You have 8 options positions expiring this Friday. For each position: if it is
  a profitable long option with more than 20% gain, sell to close it; if it is a losing long option, let
  it expire; if it is a short option that is in-the-money, buy to close to avoid assignment; if it is
  a short option that is out-of-the-money, let it expire. Execute all necessary closing actions.'
difficulty: frontier
time_limit_seconds: 500
expected_steps: 32
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
      - NVDA
      - SPY
    outputs: []
  - use: complex_options_book
    params:
      positions_count: 8
      days_to_expiry: 3
    outputs:
    - options_order_ids
    - profitable_long_symbols
    - short_itm_symbols
    - no_action_symbols
  - use: options_chain
    params:
      symbol: AAPL
      expirations_count: 2
      strikes_per_expiration: 10
    outputs: []
  - use: options_chain
    params:
      symbol: MSFT
      expirations_count: 2
      strikes_per_expiration: 10
    outputs: []
  - use: options_chain
    params:
      symbol: GOOGL
      expirations_count: 2
      strikes_per_expiration: 10
    outputs: []
  - use: options_chain
    params:
      symbol: TSLA
      expirations_count: 2
      strikes_per_expiration: 10
    outputs: []
  - use: options_chain
    params:
      symbol: SPY
      expirations_count: 2
      strikes_per_expiration: 10
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - GOOGL
      quantities:
      - '100'
      - '100'
      - '50'
      cost_bases:
      - '170.00'
      - '380.00'
      - '140.00'
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    seeded_option_order_ids: '{output.options_order_ids}'
    profitable_long_symbols: '{output.profitable_long_symbols}'
    short_itm_symbols: '{output.short_itm_symbols}'
    no_action_symbols: '{output.no_action_symbols}'
eval:
  source: server_state
  checks:
  - expr: len({target.profitable_long_symbols}) >= 1 and all(any(any(leg.underlying_symbol == sym and
      leg.side == 'sell' for leg in oo.legs) for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids})
      for sym in {target.profitable_long_symbols})
    desc: Every profitable long option that required action was sold to close
  - expr: len({target.short_itm_symbols}) >= 1 and all(any(any(leg.underlying_symbol == sym and leg.side
      == 'buy' for leg in oo.legs) for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids})
      for sym in {target.short_itm_symbols})
    desc: Every short in-the-money option that required action was bought to close
  - expr: not any(any(leg.underlying_symbol in {target.no_action_symbols} for leg in oo.legs) for oo in
      state.options_orders if oo.id not in {target.seeded_option_order_ids})
    desc: Positions that should have been left to expire were not touched
  - expr: sum(1 for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids} and any(leg.side
      == 'sell' for leg in oo.legs)) >= len({target.profitable_long_symbols})
    desc: The correct number of sell-to-close orders was placed for profitable longs
  - expr: sum(1 for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids} and any(leg.side
      == 'buy' for leg in oo.legs)) >= len({target.short_itm_symbols})
    desc: The correct number of buy-to-close orders was placed for short ITM positions
  - expr: len([oo for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids}]) >=
      1
    desc: At least one new options order was placed to manage expiring positions
  negative_checks:
  - expr: not any(any(leg.underlying_symbol not in set({target.profitable_long_symbols}) | set({target.short_itm_symbols})
      for leg in oo.legs) for oo in state.options_orders if oo.id not in {target.seeded_option_order_ids})
    desc: New close-out orders were not placed on unrelated option positions
    penalty: 0.25
  - expr: not any(o.side in ('buy', 'sell') and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No equity orders were placed (task is options management only)
    penalty: 0.15
  - expr: len(state.transfers) == 0
    desc: No transfers were initiated during expiration management
    penalty: 0.15
  - expr: not any(e.action == 'robinhood.order.cancel' for e in state.audit_log)
    desc: No order cancellations were used in the expiration-management workflow
    penalty: 0.1
  - expr: "not any(\n  e.action == 'robinhood.alert.create'\n  or e.action == 'robinhood.alert.delete'\n\
      \  or e.action.startswith('robinhood.watchlist.')\n  or e.action.startswith('robinhood.recurring.')\n\
      \  for e in state.audit_log\n)"
    desc: No alerts, watchlists, or recurring plans were modified during options management
    penalty: 0.1
secondary_primitives:
- planning
primitive_thesis: Measures state_tracking, planning, grounding, verification, backtracking by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account state.
