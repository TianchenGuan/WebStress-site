task_id: rh_sell_loser_buy_winner
env_id: robinhood
title: Sell Worst Performer and Buy Best Performer
instruction_template: Find the worst-performing stock in your portfolio by total return
  %. Sell all of it, then buy more of your best-performing stock with the proceeds.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
    outputs: []
  - use: portfolio_diverse
    params:
      count: 5
      include_losers: true
    outputs:
    - worst_symbol
    - best_symbol
  targets:
    worst_symbol: '{output.worst_symbol}'
    best_symbol: '{output.best_symbol}'
canonical_diff:
  create:
  - entity: orders
    desc: Filled market sell order for worst-performing stock (all shares)
    properties:
      symbol: {expr: "x == target['worst_symbol']"}
      side: {eq: sell}
      order_type: {eq: market}
      status: {eq: filled}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: orders
    desc: Filled market buy order for best-performing stock
    properties:
      symbol: {expr: "x == target['best_symbol']"}
      side: {eq: buy}
      order_type: {eq: market}
      status: {eq: filled}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Sell transaction for worst symbol
    properties:
      type: {eq: sell}
      symbol: {expr: "x == target['worst_symbol']"}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: transactions
    desc: Buy transaction for best symbol
    properties:
      type: {eq: buy}
      symbol: {expr: "x == target['best_symbol']"}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Sell order fill notification
    properties:
      type: {eq: order_fill}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  - entity: notifications
    desc: Buy order fill notification
    properties:
      type: {eq: order_fill}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  delete:
  - entity: positions
    desc: Worst-performing stock position fully sold
    where:
      symbol: {expr: "x == target['worst_symbol']"}
  update:
  - entity: positions
    desc: Best-performing stock position increased
    where:
      symbol: {expr: "x == target['best_symbol']"}
    changes:
      quantity: {any: true}
      avg_cost_basis: {any: true}
  constraints:
  - desc: Agent did not sell best performer or buy worst performer
    expr: "not any(o.symbol == target['best_symbol'] and o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders) and not any(o.symbol == target['worst_symbol'] and o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  invariant:
  - collection: state.positions
    filter: "a.symbol != target['worst_symbol'] and a.symbol != target['best_symbol']"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
secondary_primitives: []
