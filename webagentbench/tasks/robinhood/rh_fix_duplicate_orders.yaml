task_id: rh_fix_duplicate_orders
env_id: robinhood
title: Cancel Duplicate Pending Orders
instruction_template: Due to a glitch, duplicate buy orders were placed for several
  stocks. Review your pending orders, identify any duplicates (same symbol, same side),
  and cancel the duplicates -- keep the earliest order for each and cancel the rest.
difficulty: hard
time_limit_seconds: 300
expected_steps: 20
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      - TSLA
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - GOOGL
      quantities:
      - '50'
      - '30'
      - '20'
      cost_bases:
      - '175.00'
      - '380.00'
      - '165.00'
    outputs: []
  - use: pending_orders
    params:
      count: 10
      order_types:
      - limit
      force_side: buy
      symbols:
      - AAPL
      - AAPL
      - AAPL
      - MSFT
      - MSFT
      - GOOGL
      - GOOGL
      - AMZN
      - NVDA
      - TSLA
    outputs:
    - order_ids
  targets:
    order_ids: '{output.order_ids}'
canonical_diff:
  constraints:
  - desc: At most one pending order per symbol (duplicates cancelled)
    expr: "all(len([o for o in state.orders if o.symbol == sym and o.status == 'pending' and not o.id.startswith('ord_decoy_')]) <= 1 for sym in ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'NVDA', 'TSLA'])"
    severity: critical
  - desc: At least 4 duplicate orders were cancelled
    expr: "len([o for o in state.orders if o.status == 'cancelled' and not o.id.startswith('ord_decoy_')]) >= 4"
    severity: critical
  - desc: Non-duplicate orders for single-order symbols were not cancelled
    expr: "not any(o.symbol in ('AMZN', 'NVDA', 'TSLA') and o.status == 'cancelled' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: At least one pending order retained for each duplicated symbol
    expr: "all(len([o for o in state.orders if o.symbol == sym and o.status == 'pending' and not o.id.startswith('ord_decoy_')]) >= 1 for sym in ['AAPL', 'MSFT', 'GOOGL'])"
    severity: high
  - desc: No new orders were placed during the recovery task
    expr: "not any(o.side == 'buy' and o.status == 'pending' and not o.id.startswith('ord_decoy_') and o.id not in target['order_ids'] for o in state.orders)"
    severity: high
secondary_primitives: []
