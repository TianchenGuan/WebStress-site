task_id: rh_live_watch_portfolio
env_id: robinhood
title: Watch Portfolio Value and Sell Winner
instruction_template: Monitor your total portfolio value. When it crosses above $14,700,
  sell your most profitable position by total return percentage to lock in gains.
difficulty: hard
time_limit_seconds: 280
expected_steps: 18
primary_primitives:
- patience
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
      - GOOGL
    outputs: []
  - use: portfolio_diverse
    params:
      total_value_target: 14600
    outputs:
    - best_symbol
    - portfolio_value
  targets:
    best_symbol: '{output.best_symbol}'
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 189.0
        - - 18
          - 225.0
        - - 30
          - 222.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: Sell order placed for the most profitable position
    expr: "any(o.symbol == target['best_symbol'] and o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, state_tracking, planning by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
