task_id: rh_live_stop_loss_execution
env_id: robinhood
title: Stop-Loss Order Execution
instruction_template: You own 5 shares of NVDA. Set a stop-loss order at 8% below
  the current price to protect against a downturn.
difficulty: hard
time_limit_seconds: 250
expected_steps: 10
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - NVDA
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - NVDA
      quantities:
      - '5'
      cost_bases:
      - '850.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 25
          - 800.0
        - - 40
          - 815.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: NVDA stop-loss sell order for 5 shares at ~8% below starting price (near $800)
    expr: "any(o.symbol == 'NVDA' and o.side == 'sell' and o.order_type == 'stop' and o.quantity == 5 and o.stop_price is not None and o.stop_price >= initial.get_stock('NVDA').price * Decimal('0.86') and o.stop_price <= initial.get_stock('NVDA').price * Decimal('0.94') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
