---
task_id: rh_live_stop_loss_execution
env_id: robinhood
title: Stop-Loss Order Execution
instruction_template: You own 5 shares of NVDA. Set a stop-loss order at 8% below
  the current price to protect against a downturn.
difficulty: hard
time_limit_seconds: 250
expected_steps: 10
primary_primitives:
- planning
- grounding
- state_tracking
start_path: "/"
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - NVDA
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - NVDA
      quantities:
      - '5'
      cost_bases:
      - '850.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 25
          - 800.0
        - - 40
          - 815.0
        noise_pct: 0.3
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == 'NVDA' and o.side == 'sell' and o.order_type == 'stop' and
      o.status in ('pending', 'filled') and o.quantity == 5 for o in state.orders)
    desc: A stop-loss order exists for the full NVDA position
  - expr: any(o.symbol == 'NVDA' and o.side == 'sell' and o.order_type == 'stop' for
      o in state.orders)
    desc: A stop-loss sell order was placed on NVDA
  - expr: any(o.symbol == 'NVDA' and o.side == 'sell' and o.order_type == 'stop' and
      o.stop_price >= Decimal('798') and o.stop_price <= Decimal('812') for o in state.orders)
    desc: The stop price is approximately 8 percent below the starting price
  negative_checks:
  - expr: not any(o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: Setting protection did not add buy orders
  - expr: not any(o.side == 'sell' and o.symbol != 'NVDA' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: The stop-loss workflow did not place sell orders on another symbol
secondary_primitives: []
primitive_thesis: Measures planning, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
