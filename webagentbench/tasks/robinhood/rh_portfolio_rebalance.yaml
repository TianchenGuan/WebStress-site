task_id: rh_portfolio_rebalance
env_id: robinhood
title: Rebalance Portfolio to Target Allocation
instruction_template: 'Rebalance your portfolio to the following target allocation:
  AAPL 40%, MSFT 30%, GOOGL 20%, AMZN 10%. Calculate the trades needed and execute
  them.'
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- planning
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      quantities:
      - '20'
      - '30'
      - '8'
      - '25'
      cost_bases:
      - '170.00'
      - '380.00'
      - '155.00'
      - '165.00'
    outputs: []
  targets:
    target_allocation:
      AAPL: 40
      MSFT: 30
      GOOGL: 20
      AMZN: 10
canonical_diff:
  constraints:
  - desc: At least one sell order placed to reduce overweight positions
    expr: "len([o for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_')]) >= 1"
    severity: critical
  - desc: At least one buy order placed to increase underweight positions
    expr: "len([o for o in state.orders if o.side == 'buy' and not o.id.startswith('ord_decoy_')]) >= 1"
    severity: critical
  - desc: Portfolio moved closer to target allocation
    expr: "state.allocation_error_vs_targets(target['target_allocation']) < state.allocation_error_vs_targets_initial(target['target_allocation'])"
    severity: critical
  - desc: Allocation within 15% total error band of target
    expr: "state.allocation_error_vs_targets(target['target_allocation']) <= Decimal('15')"
    severity: high
  - desc: All target symbols retain non-zero positions
    expr: "all(state.get_position(sym) is not None and state.get_position(sym).quantity > Decimal('0') for sym in target['target_allocation'])"
    severity: high
  - desc: Did not trade symbols outside target allocation set
    expr: "not any(o.symbol not in ['AAPL', 'MSFT', 'GOOGL', 'AMZN'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Did not buy and sell the same symbol
    expr: "(set(o.symbol for o in state.orders if o.side == 'buy' and not o.id.startswith('ord_decoy_')) & set(o.symbol for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_'))) == set()"
    severity: medium
  invariant:
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, grounding by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
