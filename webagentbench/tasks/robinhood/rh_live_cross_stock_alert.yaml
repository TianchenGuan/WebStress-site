task_id: rh_live_cross_stock_alert
env_id: robinhood
title: Cross-Stock Pairs Trade via Alerts
instruction_template: 'Execute a pairs trade: set alerts for XOM above $120 and CVX
  below $145. When both have triggered, sell your XOM position and buy CVX with the
  proceeds.'
difficulty: frontier
time_limit_seconds: 500
expected_steps: 28
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - XOM
      - CVX
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - XOM
      quantities:
      - '20'
      cost_bases:
      - '110.00'
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      XOM:
        keyframes:
        - - 0
          - 115.0
        - - 12
          - 122.0
        - - 30
          - 124.0
        noise_pct: 0.3
      CVX:
        keyframes:
        - - 0
          - 150.0
        - - 18
          - 143.0
        - - 30
          - 144.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: price_alerts
    desc: XOM above-$120 price alert created
    properties:
      symbol: {eq: XOM}
      condition: {eq: above}
      target_price: {any: true}
      status: {any: true}
      created_at: {any: true}
  - entity: price_alerts
    desc: CVX below-$145 price alert created
    properties:
      symbol: {eq: CVX}
      condition: {eq: below}
      target_price: {any: true}
      status: {any: true}
      created_at: {any: true}
  - entity: orders
    desc: XOM sell order placed after both alerts triggered
    properties:
      symbol: {eq: XOM}
      side: {eq: sell}
      status: {any: true}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: orders
    desc: CVX buy order placed after both alerts triggered
    properties:
      symbol: {eq: CVX}
      side: {eq: buy}
      status: {any: true}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Sell transaction recorded for XOM
    properties:
      type: {eq: sell}
      symbol: {eq: XOM}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: transactions
    desc: Buy transaction recorded for CVX
    properties:
      type: {eq: buy}
      symbol: {eq: CVX}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications from the pairs trade
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  - entity: positions
    desc: New CVX position created from the buy (or quantity increased)
    bijection:
      over: "[p for p in state.positions if p.symbol == 'CVX' and p.id not in [ip.id
        for ip in initial.positions]]"
      variable: v
    properties:
      symbol: {eq: CVX}
      quantity: {any: true}
  delete:
  - entity: positions
    desc: XOM position fully liquidated
    where:
      symbol: {eq: XOM}
  invariant:
  - collection: state.positions
    filter: "a.symbol not in ('XOM', 'CVX')"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    filter: "a.symbol not in ('XOM', 'CVX')"
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol not in ('XOM', 'CVX')"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: XOM and CVX alerts both triggered before pairs trade
    expr: any(a.symbol == 'XOM' and a.condition == 'above' and a.status ==
      'triggered' for a in state.price_alerts) and any(a.symbol == 'CVX' and
      a.condition == 'below' and a.status == 'triggered' for a in
      state.price_alerts)
    severity: critical
  - desc: Pairs-trade stock orders filled
    expr: all(o.status == 'filled' and o.filled_quantity == o.quantity for o in
      state.orders if o.symbol in ('XOM', 'CVX') and o.id not in [io.id for io
      in initial.orders]) and len([o for o in state.orders if o.symbol in
      ('XOM', 'CVX') and o.id not in [io.id for io in initial.orders]]) >= 2
    severity: critical
  - desc: Pairs-trade orders were created after both alerts triggered
    expr: len([a for a in state.price_alerts if a.symbol in ('XOM', 'CVX') and
      a.status == 'triggered' and a.triggered_at is not None]) >= 2 and
      all(o.created_at > max(a.triggered_at for a in state.price_alerts if
      a.symbol in ('XOM', 'CVX') and a.triggered_at is not None) for o in
      state.orders if o.symbol in ('XOM', 'CVX') and o.id not in [io.id for io
      in initial.orders])
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, state_tracking, verification,
  exploration by requiring exact completion of the requested Robinhood workflow
  while ignoring distractor account state.
