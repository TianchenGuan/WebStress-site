task_id: rh_watchlist_screening
env_id: robinhood
title: Screen and Act on Watchlist Stocks
instruction_template: 'Screen your "{target.watchlist_name}" watchlist. For each stock,
  check if it meets ALL of these criteria: P/E ratio under 25, dividend yield above
  2%, and current price within 10% of the 52-week high. Remove stocks that fail all
  three criteria. For stocks that pass all three, place a limit buy order for $500
  worth at 3% below current price.'
difficulty: expert
time_limit_seconds: 400
expected_steps: 24
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - KO
      - JNJ
      - PG
      - XOM
      - CVX
      - T
      - VZ
      - MO
    outputs: []
  - use: watchlist
    params:
      name: Potential Buys
      symbols:
      - KO
      - JNJ
      - PG
      - XOM
      - CVX
      - T
      - VZ
      - MO
    outputs:
    - passing_symbols
    - failing_all_symbols
    - initial_watchlist_count
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    watchlist_name: Potential Buys
    passing_symbols: '{output.passing_symbols}'
    failing_all_symbols: '{output.failing_all_symbols}'
    initial_watchlist_count: '{output.initial_watchlist_count}'
canonical_diff:
  create:
  - entity: orders
    desc: Limit buy order at 3% below price for each passing symbol
    bijection:
      over: "target['passing_symbols']"
      variable: v
    properties:
      symbol: {expr: "x == v"}
      side: {eq: buy}
      order_type: {eq: limit}
      status: {in: [pending, filled]}
      limit_price: {expr: "abs(float(x) - float(state.get_stock(v).price) * 0.97) <= 1.0"}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  constraints:
  - desc: Failing symbols were removed from the watchlist
    expr: "len(target['failing_all_symbols']) == 0 or all(sym not in state.watchlist_symbols(target['watchlist_name']) for sym in target['failing_all_symbols'])"
    severity: critical
  - desc: Buy orders placed only for passing symbols
    expr: "not any(o.side == 'buy' and o.symbol not in target['passing_symbols'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No sell orders placed
    expr: "not any(o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  invariant:
  - collection: state.watchlists
    filter: "a.name != target['watchlist_name']"
    preserve: ALL
  - collection: state.positions
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
secondary_primitives: []
