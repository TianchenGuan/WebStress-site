---
task_id: rh_cross_reference_1099
env_id: robinhood
title: Set Breakeven Alerts from 1099-B Tax Document
instruction_template: Open your 1099-B tax document for this year. Cross-reference
  each sale listed against your transaction history. For any stock where the reported
  cost basis on the 1099 differs from your transaction records and you still hold the
  stock, set a price alert at the 1099 reported cost basis to track your breakeven point.
  Use the 'above' condition if the current price is below the cost basis, or the 'below'
  condition if the current price is above the cost basis.
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- state_tracking
- verification
- grounding
- exploration
start_path: "/"
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - TSLA
      - MSFT
      - AMZN
      - NFLX
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - TSLA
      - MSFT
      quantities:
      - '50'
      - '30'
      - '20'
      cost_bases:
      - '170.00'
      - '250.00'
      - '380.00'
    outputs: []
  - use: tax_documents
    params:
      include_1099b: true
      discrepancy_count: 2
      symbols:
      - AAPL
      - TSLA
      - MSFT
    outputs:
    - discrepancy_symbols
    - reported_cost_bases
  - use: transaction_ledger
    params:
      months: 12
    outputs: []
  targets:
    discrepancy_symbols: "{output.discrepancy_symbols}"
    reported_cost_bases: "{output.reported_cost_bases}"
eval:
  source: server_state
  checks:
  - expr: any(sym in state.owned_symbols() for sym in {target.discrepancy_symbols})
      and all(any(a.symbol == sym for a in state.price_alerts) for sym in {target.discrepancy_symbols}
      if sym in state.owned_symbols())
    desc: Every discrepancy symbol still held in the portfolio has a price alert
  - expr: any(sym in state.owned_symbols() for sym in {target.discrepancy_symbols})
      and all(any(a.symbol == sym and a.target_price == Decimal({target.reported_cost_bases}[sym])
      for a in state.price_alerts) for sym in {target.discrepancy_symbols} if sym in
      state.owned_symbols())
    desc: Each alert is set at the 1099 reported cost basis
  negative_checks:
  - expr: all(o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No trades were placed during this task
  - expr: len(state.transfers) == 0
    desc: No transfers were initiated
secondary_primitives: []
primitive_thesis: Measures state_tracking, verification, grounding, exploration by
  requiring the agent to cross-reference tax documents with current holdings and set
  appropriate alerts for discrepancies.
