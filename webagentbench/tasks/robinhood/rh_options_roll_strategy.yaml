task_id: rh_options_roll_strategy
env_id: robinhood
title: Roll a Covered Call on MSFT
instruction_template: "You have a covered call on MSFT that expires this week and is in-the-money. Roll the position: buy back the current call, then sell a new call at the next monthly expiration with a strike 5% above current price. Report the net credit or debit of the roll."
difficulty: expert
time_limit_seconds: 400
expected_steps: 20
primary_primitives:
  - state_tracking
  - planning
  - grounding
  - exploration
start_path: /

seed:
  distractors: 20
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["MSFT", "AAPL", "GOOGL", "AMZN"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["MSFT", "AAPL"]
        quantities: ["100", "50"]
        cost_bases: ["350.00", "170.00"]
      outputs: []
    - use: options_positions
      params:
        count: 1
        symbol: "MSFT"
        position_type: "covered_call"
        near_expiry_days: 3
        in_the_money: true
      outputs: []
    - use: options_chain
      params:
        symbol: "MSFT"
        expirations_count: 3
        strikes_per_expiration: 15
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets:
    symbol: "MSFT"

eval:
  source: server_state
  checks:
    - expr: "any(o.symbol == 'MSFT' and o.asset_type == 'option' and o.side == 'buy' and o.option_type == 'call' and o.status in ('filled', 'pending') for o in state.orders)"
      desc: A buy-to-close order for the existing MSFT call exists
    - expr: "any(o.symbol == 'MSFT' and o.asset_type == 'option' and o.side == 'sell' and o.option_type == 'call' and o.status in ('filled', 'pending') for o in state.orders)"
      desc: A sell-to-open order for a new MSFT call exists
  negative_checks: []
