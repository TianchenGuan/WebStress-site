task_id: rh_live_bracket_order
env_id: robinhood
title: Bracket Order Strategy
instruction_template: 'Execute a bracket strategy on MSFT: place a limit buy of 1
  share at $400 or below. Once it fills, immediately set a stop-loss at $380 and a
  take-profit limit sell at $430.'
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - MSFT
      - AAPL
      - TSLA
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      MSFT:
        keyframes:
        - - 0
          - 412.0
        - - 10
          - 398.0
        - - 25
          - 420.0
        - - 40
          - 435.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: MSFT limit buy order placed at or below $400
    expr: "any(o.symbol == 'MSFT' and o.side == 'buy' and o.order_type == 'limit' and o.limit_price is not None and o.limit_price <= Decimal('400') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: MSFT stop-loss sell order placed near $380
    expr: "any(o.symbol == 'MSFT' and o.side == 'sell' and o.order_type == 'stop' and o.stop_price is not None and abs(o.stop_price - Decimal('380')) < 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: MSFT take-profit limit sell order placed near $430
    expr: "any(o.symbol == 'MSFT' and o.side == 'sell' and o.order_type == 'limit' and o.limit_price is not None and abs(o.limit_price - Decimal('430')) < 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, state_tracking, patience, verification by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
