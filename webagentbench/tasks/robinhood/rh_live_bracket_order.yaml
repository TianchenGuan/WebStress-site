---
task_id: rh_live_bracket_order
env_id: robinhood
title: Bracket Order Strategy
instruction_template: 'Execute a bracket strategy on MSFT: place a limit buy at $400
  or below. Once it fills, immediately set a stop-loss at $380 and a take-profit limit
  sell at $430.'
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
- planning
- state_tracking
- patience
- verification
start_path: "/"
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - MSFT
      - AAPL
      - TSLA
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      MSFT:
        keyframes:
        - - 0
          - 412.0
        - - 10
          - 398.0
        - - 25
          - 420.0
        - - 40
          - 435.0
        noise_pct: 0.3
eval:
  source: server_state
  checks:
  - expr: any(o.symbol == 'MSFT' and o.side == 'buy' and o.order_type == 'limit' and
      o.status == 'filled' for o in state.orders)
    desc: A filled limit buy order for MSFT exists
  - expr: any(o.symbol == 'MSFT' and o.side == 'sell' and o.order_type == 'stop' and
      o.stop_price is not None and abs(o.stop_price - Decimal('380')) < 5 for o in
      state.orders)
    desc: A stop-loss order near $380 was placed after the entry filled
  - expr: any(o.symbol == 'MSFT' and o.side == 'sell' and o.order_type == 'limit'
      and o.limit_price is not None and abs(o.limit_price - Decimal('430')) < 5 for
      o in state.orders)
    desc: A take-profit limit sell near $430 was placed after the entry filled
  negative_checks:
  - expr: not any(o.symbol != 'MSFT' for o in state.orders)
    desc: The bracket workflow did not place unrelated orders in other symbols
secondary_primitives: []
primitive_thesis: Measures planning, state_tracking, patience, verification by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
