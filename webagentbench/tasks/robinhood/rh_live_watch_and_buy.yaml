task_id: rh_live_watch_and_buy
env_id: robinhood
title: Watch Price and Market Buy on Dip
instruction_template: Watch AAPL's price on the stock detail page. When it drops below
  $182, immediately buy 10 shares at market price. Do not use limit orders.
difficulty: medium
time_limit_seconds: 200
expected_steps: 15
primary_primitives:
- patience
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 12
          - 179.0
        - - 25
          - 184.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: Market buy of 10 AAPL shares placed after dip below $182
    expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'market' and o.quantity == 10 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
