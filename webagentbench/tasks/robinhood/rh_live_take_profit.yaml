task_id: rh_live_take_profit
env_id: robinhood
title: Take Profit with Limit Sell
instruction_template: You own 10 shares of TSLA bought at an average of $220. Set
  a limit sell for your entire TSLA position at $260 or above to lock in profits.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- patience
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - TSLA
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - TSLA
      quantities:
      - '10'
      cost_bases:
      - '220.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      TSLA:
        keyframes:
        - - 0
          - 248.0
        - - 20
          - 265.0
        - - 35
          - 260.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: TSLA limit sell order for 10 shares at ≥$260
    expr: "any(o.symbol == 'TSLA' and o.side == 'sell' and o.order_type == 'limit' and o.quantity == 10 and o.limit_price is not None and o.limit_price >= Decimal('260') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, grounding by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
