task_id: rh_tax_loss_harvest
env_id: robinhood
title: Tax-Loss Harvest with Wash Sale Avoidance and Reinvestment
instruction_template: Review your realized and unrealized gains/losses for the year.
  Sell positions with unrealized losses to offset your realized gains, but avoid wash
  sales by NOT selling anything you purchased within the last 30 days. After selling,
  reinvest the total proceeds into {target.replacement_etf} to maintain market exposure.
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
      - AMD
      - INTC
      - VOO
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 8
      multi_lot: true
      include_losers: true
      loser_count: 3
      gain_forced_symbols:
      - VOO
    outputs:
    - loss_symbols
    - gain_symbols
  - use: transaction_ledger
    params:
      months: 2
      include_recent_buys: true
      recent_buy_count: 2
    outputs:
    - recent_buy_symbols
  - use: tax_documents
    params:
      include_gains: true
    outputs: []
  - use: filled_orders
    params:
      count: 5
      symbols:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      order_types:
      - limit
      - market
    outputs: []
  targets:
    loss_symbols: '{output.loss_symbols}'
    gain_symbols: '{output.gain_symbols}'
    recent_buy_symbols: '{output.recent_buy_symbols}'
    replacement_etf: VOO
canonical_diff:
  constraints:
  - desc: At least one loss position sold for tax-loss harvesting
    expr: "any(o.side == 'sell' and o.symbol in target['loss_symbols'] and not o.id.startswith('ord_decoy_') and not any(io.id == o.id for io in initial.orders) for o in state.orders)"
    severity: critical
  - desc: No wash sale violations (no sells of recent buys)
    expr: "not any(o.side == 'sell' and o.symbol in target['recent_buy_symbols'] and not o.id.startswith('ord_decoy_') and not any(io.id == o.id for io in initial.orders) for o in state.orders)"
    severity: critical
  - desc: Replacement ETF buy order placed
    expr: "any(o.side == 'buy' and o.symbol == target['replacement_etf'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: All newly placed sell orders target loss positions only
    expr: "all(o.symbol in target['loss_symbols'] for o in state.orders if o.side == 'sell' and not o.id.startswith('ord_decoy_') and not any(io.id == o.id for io in initial.orders))"
    severity: high
  - desc: Exactly one new replacement ETF buy order placed
    expr: "len([o for o in state.orders if o.side == 'buy' and o.symbol == target['replacement_etf'] and not o.id.startswith('ord_decoy_') and not any(io.id == o.id for io in initial.orders)]) == 1"
    severity: high
secondary_primitives: []
