task_id: rh_portfolio_risk_assessment
env_id: robinhood
title: Portfolio Risk Assessment
instruction_template: "Analyze your portfolio risk: calculate what percentage is in each sector, identify any single stock that represents more than 25% of your total portfolio value, check if you have any options positions expiring within 5 days, and verify your margin utilization is under 50%. Report all risk flags found."
difficulty: expert
time_limit_seconds: 350
expected_steps: 18
primary_primitives:
  - state_tracking
  - exploration
  - verification
  - planning
start_path: /

seed:
  distractors: 20
  steps:
    - use: stock_universe
      params:
        count: 30
        must_include: ["AAPL", "TSLA", "MSFT", "AMZN", "GOOGL"]
      outputs: []
    - use: portfolio_diverse
      params:
        position_count: 6
        concentrated_stock: "AAPL"
        concentrated_pct: 30
      outputs: []
    - use: options_positions
      params:
        count: 3
        near_expiry_count: 1
        near_expiry_days: 3
      outputs: []
    - use: margin_account
      params:
        utilization_pct: 55
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "len(state.orders) == 0"
      desc: This is a reporting task; no trades should be placed
  negative_checks: []
