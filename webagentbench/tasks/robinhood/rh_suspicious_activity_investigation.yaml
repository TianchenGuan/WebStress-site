task_id: rh_suspicious_activity_investigation
env_id: robinhood
title: Investigate Suspicious Account Activity
instruction_template: 'You received a security alert about an unrecognized login.
  Investigate: check the security log for the flagged entry, check if any orders were
  placed during that suspicious session''s time window. If you find unauthorized orders,
  cancel them and enable authenticator-based two-factor authentication.'
difficulty: frontier
time_limit_seconds: 500
expected_steps: 30
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - TSLA
      - MSFT
      - GME
      - AMC
    outputs: []
  - use: security_log
    params:
      include_suspicious: true
    outputs:
    - suspicious_timestamp
    - suspicious_location
  - use: pending_orders
    params:
      count: 4
      include_suspicious_window: true
      suspicious_timestamp: '{output.suspicious_timestamp}'
      suspicious_order_count: 2
    outputs:
    - suspicious_order_ids
  - use: notifications
    params:
      include_security_alert: true
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      quantities:
      - '25'
      - '30'
      cost_bases:
      - '170.00'
      - '380.00'
    outputs: []
  targets:
    suspicious_order_ids: '{output.suspicious_order_ids}'
    suspicious_location: '{output.suspicious_location}'
canonical_diff:
  constraints:
  - desc: All suspicious orders cancelled
    expr: "all(any(o.id == order_id and o.status == 'cancelled' for o in state.orders) for order_id in target['suspicious_order_ids'])"
    severity: critical
  - desc: Two-factor authentication set to authenticator app
    expr: "state.settings.two_factor_method == 'authenticator'"
    severity: critical
  - desc: No non-suspicious orders were cancelled
    expr: "not any(o.status == 'cancelled' and o.id not in target['suspicious_order_ids'] and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
secondary_primitives: []
primitive_thesis: Measures exploration, state_tracking, verification, planning, backtracking
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
