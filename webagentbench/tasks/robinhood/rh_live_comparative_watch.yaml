task_id: rh_live_comparative_watch
env_id: robinhood
title: Comparative Price Watch and Trade
instruction_template: Watch AAPL and MSFT prices simultaneously. In this
  scenario, AAPL will outperform. When AAPL's daily change percentage exceeds
  MSFT's by more than 2 percentage points, sell all your MSFT shares and buy
  AAPL with the proceeds.
difficulty: frontier
time_limit_seconds: 500
expected_steps: 30
primary_primitives:
- patience
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - TSLA
      - GOOGL
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      quantities:
      - '10'
      - '5'
      cost_bases:
      - '185.00'
      - '400.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 189.0
        - - 22
          - 198.0
        - - 35
          - 197.0
        noise_pct: 0.3
      MSFT:
        keyframes:
        - - 0
          - 412.0
        - - 22
          - 414.0
        - - 35
          - 413.0
        noise_pct: 0.2
canonical_diff:
  create:
  - entity: orders
    desc: MSFT sell order placed for full 5-share position (underperformer)
    properties:
      symbol: {eq: MSFT}
      side: {eq: sell}
      quantity: {eq: 5}
      status: {any: true}
      order_type: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: orders
    desc: AAPL buy order placed (rotate into outperformer)
    properties:
      symbol: {eq: AAPL}
      side: {eq: buy}
      status: {any: true}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Sell transaction recorded for MSFT
    properties:
      type: {eq: sell}
      symbol: {eq: MSFT}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: transactions
    desc: Buy transaction recorded for AAPL
    properties:
      type: {eq: buy}
      symbol: {eq: AAPL}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications generated by the rotation
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  update:
  - entity: positions
    desc: Existing AAPL position increased by buy (if held before)
    bijection:
      over: "[p for p in initial.positions if p.symbol == 'AAPL']"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      quantity: {any: true}
  delete:
  - entity: positions
    desc: MSFT position fully sold (entire 5-share position)
    where:
      symbol: {eq: MSFT}
  invariant:
  - collection: state.positions
    filter: "a.symbol not in ('MSFT', 'AAPL')"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol not in ('MSFT', 'AAPL')"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: MSFT sell and AAPL buy both filled
    expr: any(o.symbol == 'MSFT' and o.side == 'sell' and o.status == 'filled'
      and o.filled_quantity == o.quantity and o.quantity == Decimal('5') for o
      in state.orders) and any(o.symbol == 'AAPL' and o.side == 'buy' and
      o.status == 'filled' and o.filled_quantity == o.quantity for o in
      state.orders)
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, state_tracking, grounding, planning,
  verification by requiring exact completion of the requested Robinhood workflow
  while ignoring distractor account state.
