task_id: rh_live_comparative_watch
env_id: robinhood
title: Comparative Price Watch and Trade
instruction_template: Watch AAPL and MSFT prices simultaneously. In this scenario,
  AAPL will outperform. When AAPL's daily change percentage exceeds MSFT's by more
  than 2 percentage points, sell all your MSFT shares and buy AAPL with the proceeds.
difficulty: frontier
time_limit_seconds: 500
expected_steps: 30
primary_primitives:
- patience
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - TSLA
      - GOOGL
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      quantities:
      - '10'
      - '5'
      cost_bases:
      - '185.00'
      - '400.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 189.0
        - - 22
          - 198.0
        - - 35
          - 197.0
        noise_pct: 0.3
      MSFT:
        keyframes:
        - - 0
          - 412.0
        - - 22
          - 414.0
        - - 35
          - 413.0
        noise_pct: 0.2
canonical_diff:
  constraints:
  - desc: MSFT sell order placed (sell the underperformer)
    expr: "any(o.symbol == 'MSFT' and o.side == 'sell' and o.quantity == 5 and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
  - desc: AAPL buy order placed (rotate into outperformer)
    expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures patience, state_tracking, grounding, planning, verification
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
