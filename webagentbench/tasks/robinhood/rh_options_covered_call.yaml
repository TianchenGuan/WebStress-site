task_id: rh_options_covered_call
env_id: robinhood
title: Sell a Covered Call on an Existing Position
instruction_template: 'You own 100+ shares of {target.underlying}. Sell a covered call: pick the nearest
  monthly expiration, choose a strike price at least 10% above the current price ({target.current_price}),
  and sell 1 contract.'
difficulty: expert
time_limit_seconds: 420
expected_steps: 28
primary_primitives:
- exploration
start_path: /
seed:
  distractors: 15
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - TSLA
      - AMZN
    outputs:
    - stock_price_AAPL
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - TSLA
      quantities:
      - '150'
      - '50'
      - '30'
      cost_bases:
      - '165.00'
      - '370.00'
      - '220.00'
    outputs: []
  - use: options_chain
    params:
      symbol: AAPL
      expirations_count: 6
      strikes_per_expiration: 12
    outputs: []
  targets:
    underlying: AAPL
    current_price: '{output.stock_price_AAPL}'
eval:
  source: server_state
  checks:
  - expr: state.latest_options_order(symbol='AAPL') is not None and len(state.latest_options_order(symbol='AAPL').legs)
      == 1 and state.latest_options_order(symbol='AAPL').legs[0].underlying_symbol == 'AAPL' and state.latest_options_order(symbol='AAPL').legs[0].side
      == 'sell' and state.latest_options_order(symbol='AAPL').legs[0].option_type == 'call'
    desc: A single-leg sell call order was placed on AAPL
  - expr: state.latest_options_order(symbol='AAPL') is not None and state.latest_options_order(symbol='AAPL').legs[0].quantity
      == 1
    desc: Exactly 1 contract was sold
  - expr: state.latest_options_order(symbol='AAPL') is not None and state.latest_options_order(symbol='AAPL').legs[0].strike
      >= state.get_stock('AAPL').price * Decimal('1.10')
    desc: Strike price is at least 10% above current price
  - expr: state.latest_options_order(symbol='AAPL') is not None and state.days_until(state.latest_options_order(symbol='AAPL').legs[0].expiration)
      >= 14 and state.days_until(state.latest_options_order(symbol='AAPL').legs[0].expiration) <= 60
    desc: Expiration is within a reasonable monthly range (14-60 days out)
  - expr: state.get_position('AAPL') is not None and state.get_position('AAPL').quantity >= 100
    desc: The agent still owns at least 100 shares of AAPL (covered requirement)
  negative_checks:
  - expr: not any(o.side == 'sell' and o.symbol == 'AAPL' and not o.id.startswith('ord_decoy_') for o
      in state.orders)
    desc: No equity sell orders were placed on AAPL shares
    penalty: 0.3
  - expr: state.latest_options_order(symbol='AAPL') is None or not any(leg.option_type == 'put' for leg
      in state.latest_options_order(symbol='AAPL').legs)
    desc: No unnecessary put leg was included in the order
    penalty: 0.2
  - expr: not any(o.symbol in ('MSFT', 'TSLA') and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: No orders were placed on other portfolio stocks
    penalty: 0.15
  - expr: sum(1 for e in state.audit_log if e.action == 'robinhood.options.order.place') == 1
    desc: Covered-call workflow placed exactly one options order
    penalty: 0.1
  - expr: "not any(\n  e.action == 'robinhood.transfer.initiate'\n  or e.action.startswith('robinhood.watchlist.')\n\
      \  or e.action.startswith('robinhood.recurring.')\n  or e.action == 'robinhood.alert.create'\n \
      \ or e.action == 'robinhood.alert.delete'\n  for e in state.audit_log)"
    desc: Covered-call workflow did not mutate unrelated account surfaces
    penalty: 0.1
secondary_primitives:
- state_tracking
