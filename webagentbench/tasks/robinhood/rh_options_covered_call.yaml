task_id: rh_options_covered_call
env_id: robinhood
title: Sell a Covered Call on an Existing Position
instruction_template: 'You own 100+ shares of {target.underlying}. Sell a covered
  call: pick the nearest monthly expiration, choose a strike price at least 10% above
  the current price ({target.current_price}), and sell 1 contract.'
difficulty: expert
time_limit_seconds: 420
expected_steps: 28
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 15
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - TSLA
      - AMZN
    outputs:
    - stock_price_AAPL
  - use: portfolio_basic
    params:
      stocks:
      - AAPL
      - MSFT
      - TSLA
      quantities:
      - '150'
      - '50'
      - '30'
      cost_bases:
      - '165.00'
      - '370.00'
      - '220.00'
    outputs: []
  - use: options_chain
    params:
      symbol: AAPL
      expirations_count: 6
      strikes_per_expiration: 12
    outputs: []
  targets:
    underlying: AAPL
    current_price: '{output.stock_price_AAPL}'
canonical_diff:
  create:
  - entity: options_orders
    desc: Single-leg covered call sell on AAPL
    properties:
      status: {in: [pending, filled]}
      legs: {any: true}
  constraints:
  - desc: Single sell-call leg on AAPL placed
    expr: "state.latest_options_order(symbol='AAPL') is not None and any(leg.underlying_symbol == 'AAPL' and leg.side == 'sell' and leg.option_type == 'call' for leg in state.latest_options_order(symbol='AAPL').legs)"
    severity: critical
  - desc: Exactly 1 contract sold
    expr: "state.latest_options_order(symbol='AAPL') is not None and any(leg.quantity == 1 for leg in state.latest_options_order(symbol='AAPL').legs if leg.option_type == 'call' and leg.side == 'sell')"
    severity: critical
  - desc: Strike at least 10% above current price
    expr: "state.latest_options_order(symbol='AAPL') is not None and all(leg.strike >= state.get_stock('AAPL').price * Decimal('1.10') for leg in state.latest_options_order(symbol='AAPL').legs if leg.option_type == 'call' and leg.side == 'sell')"
    severity: critical
  - desc: Expiration within 14-60 day range
    expr: "state.latest_options_order(symbol='AAPL') is not None and all(state.days_until(leg.expiration) >= 14 and state.days_until(leg.expiration) <= 60 for leg in state.latest_options_order(symbol='AAPL').legs)"
    severity: critical
  - desc: AAPL shares not sold
    expr: "not any(o.side == 'sell' and o.symbol == 'AAPL' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No put legs in the order
    expr: "state.latest_options_order(symbol='AAPL') is None or not any(leg.option_type == 'put' for leg in state.latest_options_order(symbol='AAPL').legs)"
    severity: high
  invariant:
  - collection: state.positions
    preserve: ALL
  - collection: state.orders
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
secondary_primitives: []
