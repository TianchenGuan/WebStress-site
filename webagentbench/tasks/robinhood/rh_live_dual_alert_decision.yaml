task_id: rh_live_dual_alert_decision
env_id: robinhood
title: Dual Alert Decision Making
instruction_template: 'Set two price alerts for META: one above $520 and one below
  $480. In this scenario, META''s price will fall — when the below-$480 alert triggers,
  sell your META position.'
difficulty: hard
time_limit_seconds: 280
expected_steps: 14
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - META
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - META
      quantities:
      - '5'
      cost_bases:
      - '490.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      META:
        keyframes:
        - - 0
          - 505.0
        - - 15
          - 475.0
        - - 30
          - 485.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: price_alerts
    desc: META above-$520 price alert created
    properties:
      symbol: {eq: META}
      condition: {eq: above}
      target_price: {expr: "Decimal(str(x)) == Decimal('520')"}
      status: {any: true}
      created_at: {any: true}
  - entity: price_alerts
    desc: META below-$480 price alert created
    properties:
      symbol: {eq: META}
      condition: {eq: below}
      target_price: {expr: "Decimal(str(x)) == Decimal('480')"}
      status: {any: true}
      created_at: {any: true}
  - entity: orders
    desc: META sell order placed (bearish response when below-$480 alert
      triggers)
    properties:
      symbol: {eq: META}
      side: {eq: sell}
      status: {any: true}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: Sell transaction recorded for META
    properties:
      type: {eq: sell}
      symbol: {eq: META}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: Order fill notifications fired by the META sell
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  delete:
  - entity: positions
    desc: META position fully liquidated (entire position sold)
    where:
      symbol: {eq: META}
  invariant:
  - collection: state.positions
    filter: "a.symbol != 'META'"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    filter: "a.symbol != 'META'"
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol != 'META'"
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: META below-$480 alert triggered
    expr: any(a.symbol == 'META' and a.condition == 'below' and
      Decimal(str(a.target_price)) == Decimal('480') and a.status == 'triggered'
      for a in state.price_alerts)
    severity: critical
  - desc: META sell order filled after bearish alert
    expr: any(o.symbol == 'META' and o.side == 'sell' and o.quantity ==
      Decimal('5') and o.status == 'filled' and o.filled_quantity == o.quantity
      for o in state.orders)
    severity: critical
  - desc: META sell order was created after the below-$480 alert triggered
    expr: any(a.symbol == 'META' and a.condition == 'below' and a.triggered_at
      is not None and any(o.symbol == 'META' and o.side == 'sell' and
      o.created_at > a.triggered_at for o in state.orders) for a in
      state.price_alerts)
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, state_tracking, grounding by
  requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
