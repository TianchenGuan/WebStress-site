task_id: rh_live_dual_alert_decision
env_id: robinhood
title: Dual Alert Decision Making
instruction_template: 'Set two price alerts for META: one for above $520 and one for
  below $480. When one triggers, buy more if it went up (bullish), sell your position
  if it went down (bearish).'
difficulty: hard
time_limit_seconds: 280
expected_steps: 14
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - META
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - META
      quantities:
      - '5'
      cost_bases:
      - '490.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      META:
        keyframes:
        - - 0
          - 505.0
        - - 15
          - 475.0
        - - 30
          - 485.0
        noise_pct: 0.3
canonical_diff:
  constraints:
  - desc: META above-$520 price alert created
    expr: "any(a.symbol == 'META' and a.condition == 'above' and a.target_price == Decimal('520') and not a.id.startswith('alert_decoy_') for a in state.price_alerts)"
    severity: critical
  - desc: META below-$480 price alert created
    expr: "any(a.symbol == 'META' and a.condition == 'below' and a.target_price == Decimal('480') and not a.id.startswith('alert_decoy_') for a in state.price_alerts)"
    severity: critical
  - desc: META sell order placed (bearish response when below-$480 alert triggers)
    expr: "any(o.symbol == 'META' and o.side == 'sell' and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: critical
secondary_primitives: []
primitive_thesis: Measures planning, patience, state_tracking, grounding by requiring
  exact completion of the requested Robinhood workflow while ignoring distractor account
  state.
