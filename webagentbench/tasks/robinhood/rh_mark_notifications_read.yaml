task_id: rh_mark_notifications_read
env_id: robinhood
title: Mark All Notifications as Read
instruction_template: Mark all unread notifications as read.
difficulty: easy
time_limit_seconds: 90
expected_steps: 5
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 10
    outputs: []
  - use: notifications
    params:
      count: 8
      unread_ratio: 0.6
    outputs: []
  targets: {}
canonical_diff:
  update:
  - entity: notifications
    desc: All previously-unread notifications are marked read
    bijection:
      over: "[n for n in initial.notifications if not n.is_read]"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      is_read: {eq: true}
  constraints:
  - desc: All notifications are now marked as read
    expr: "len(state.notifications) >= 1 and all(n.is_read for n in state.notifications)"
    severity: critical
  - desc: All 8 seed notifications still exist (none deleted)
    expr: "len(state.notifications) >= 8"
    severity: high
  - desc: Agent did not place any orders
    expr: "len([o for o in state.orders if not o.id.startswith('ord_decoy_')]) == 0"
    severity: high
  invariant:
  - collection: state.notifications
    filter: "a.is_read"
    preserve: ALL
  - collection: state.positions
    preserve: ALL
  - collection: state.orders
    preserve: ALL
secondary_primitives: []
