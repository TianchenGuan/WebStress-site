task_id: rh_enable_extended_hours
env_id: robinhood
title: Enable Extended Hours Trading
instruction_template: Enable extended hours trading in your account settings.
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- verification
start_path: /
seed:
  distractors: 5
  steps: []
  targets: {}
canonical_diff:
  constraints:
  - desc: Extended hours trading is enabled in account settings
    expr: "state.settings.extended_hours_enabled == True"
    severity: critical
  - desc: Agent did not place any orders
    expr: "len(state.orders) == 0 or all(o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  invariant:
  - collection: state.positions
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
secondary_primitives: []
