task_id: rh_quarterly_performance_review
env_id: robinhood
title: Quarterly Portfolio Cleanup
instruction_template: 'Perform a quarterly portfolio cleanup: (1) sell your worst-performing
  position entirely using a market order, (2) set price alerts on your best-performing
  position at 10% above and 10% below the current price, (3) mark all unread notifications
  as read, and (4) add any stock with an upcoming corporate action to a new watchlist
  called "Corporate Actions Watch".'
difficulty: frontier
time_limit_seconds: 500
expected_steps: 30
primary_primitives:
- patience
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - SPY
      - AAPL
      - TSLA
      - MSFT
      - AMZN
      - GOOGL
      - XOM
      - JNJ
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 8
    outputs:
    - worst_symbol
    - best_symbol
  - use: notifications
    params:
      count: 10
      unread_ratio: 0.6
      include_corporate_actions: true
    outputs: []
  - use: dividend_schedule
    params:
      quarters: 2
    outputs: []
  targets:
    worst_symbol: '{output.worst_symbol}'
    best_symbol: '{output.best_symbol}'
canonical_diff:
  constraints:
  - desc: Worst-performing position sold via market order
    expr: "any(o.symbol == target['worst_symbol'] and o.side == 'sell' and o.order_type == 'market' and o.status in ('filled', 'pending') for o in state.orders)"
    severity: critical
  - desc: Price alert ~10% above best position
    expr: "any(a.symbol == target['best_symbol'] and a.condition == 'above' and a.target_price >= state.get_stock(target['best_symbol']).price * Decimal('1.09') and a.target_price <= state.get_stock(target['best_symbol']).price * Decimal('1.11') for a in state.price_alerts)"
    severity: critical
  - desc: Price alert ~10% below best position
    expr: "any(a.symbol == target['best_symbol'] and a.condition == 'below' and a.target_price >= state.get_stock(target['best_symbol']).price * Decimal('0.89') and a.target_price <= state.get_stock(target['best_symbol']).price * Decimal('0.91') for a in state.price_alerts)"
    severity: critical
  - desc: All notifications marked as read
    expr: "all(n.is_read for n in state.notifications)"
    severity: critical
  - desc: Corporate Actions Watch watchlist created
    expr: "state.watchlist_named('Corporate Actions Watch') is not None"
    severity: critical
  - desc: Corporate action symbols added to watchlist
    expr: "state.watchlist_named('Corporate Actions Watch') is not None and all(sym in state.watchlist_symbols('Corporate Actions Watch') for sym in state.corporate_action_symbols() if sym in state.owned_symbols())"
    severity: high
secondary_primitives: []
primitive_thesis: Measures state_tracking, exploration, grounding, verification, patience
  by requiring the agent to identify best/worst performers, manage notifications,
  and organize corporate action monitoring.
