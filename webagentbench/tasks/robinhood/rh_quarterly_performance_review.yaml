task_id: rh_quarterly_performance_review
env_id: robinhood
title: Quarterly Portfolio Cleanup
instruction_template: 'Perform a quarterly portfolio cleanup: (1) sell your worst-performing
  position entirely using a market order, (2) set price alerts on your best-performing
  position at 10% above and 10% below the current price, (3) mark all unread notifications
  as read, and (4) add any stock with an upcoming corporate action (upcoming earnings
  announcements count as corporate actions; check your notifications panel for these)
  to a new watchlist called "Corporate Actions Watch".'
difficulty: frontier
time_limit_seconds: 500
expected_steps: 30
primary_primitives:
- patience
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - SPY
      - AAPL
      - TSLA
      - MSFT
      - AMZN
      - GOOGL
      - XOM
      - JNJ
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 8
    outputs:
    - worst_symbol
    - best_symbol
  - use: notifications
    params:
      count: 10
      unread_ratio: 0.6
      include_corporate_actions: true
    outputs: []
  - use: dividend_schedule
    params:
      quarters: 2
    outputs: []
  targets:
    worst_symbol: '{output.worst_symbol}'
    best_symbol: '{output.best_symbol}'
canonical_diff:
  create:
  - entity: orders
    desc: Market sell order for worst-performing position
    properties:
      symbol: {expr: "x == target['worst_symbol']"}
      side: {eq: sell}
      order_type: {eq: market}
      status: {in: [filled, pending]}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: price_alerts
    desc: Above-10% price alert on best position
    properties:
      symbol: {expr: "x == target['best_symbol']"}
      condition: {eq: above}
      target_price: {expr: "Decimal(str(x)) >= state.get_stock(target['best_symbol']).price * Decimal('1.09') and Decimal(str(x)) <= state.get_stock(target['best_symbol']).price * Decimal('1.11')"}
      status: {any: true}
      created_at: {any: true}
  - entity: price_alerts
    desc: Below-10% price alert on best position
    properties:
      symbol: {expr: "x == target['best_symbol']"}
      condition: {eq: below}
      target_price: {expr: "Decimal(str(x)) >= state.get_stock(target['best_symbol']).price * Decimal('0.89') and Decimal(str(x)) <= state.get_stock(target['best_symbol']).price * Decimal('0.91')"}
      status: {any: true}
      created_at: {any: true}
  - entity: watchlists
    desc: Corporate Actions Watch watchlist created with corporate-action symbols
    properties:
      name: {eq: Corporate Actions Watch}
      symbols: {expr: "all(sym in x for sym in initial.corporate_action_symbols() if sym in initial.owned_symbols())"}
  - entity: transactions
    desc: Sell transaction(s) for worst position
    bijection:
      over: "[t for t in state.transactions if t.type == 'sell' and t.id not in [it.id for it in initial.transactions]]"
      variable: v
    properties:
      id: {expr: "x == v.id"}
  - entity: notifications
    desc: Order-fill notifications emitted by worst-position sell
    bijection:
      over: "[n for n in state.notifications if n.type == 'order_fill' and n.id not in [ix.id for ix in initial.notifications]]"
      variable: v
    properties:
      id: {expr: "x == v.id"}
  update:
  - entity: notifications
    desc: All previously-unread notifications marked as read
    bijection:
      over: "[n for n in initial.notifications if not n.is_read]"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      is_read: {eq: true}
  delete:
  - entity: positions
    desc: Worst-performing position fully liquidated
    bijection:
      over: "[p for p in initial.positions if p.symbol == target['worst_symbol'] and p.symbol not in [q.symbol for q in state.positions]]"
      variable: v
    where:
      id: {expr: "x == v.id"}
  invariant:
  - collection: state.positions
    filter: "a.symbol != target['worst_symbol']"
    preserve: ALL
  - collection: state.orders
    filter: "a.symbol != target['worst_symbol']"
    preserve: ALL
  - collection: state.price_alerts
    filter: "a.symbol != target['best_symbol']"
    preserve: ALL
  - collection: state.transactions
    filter: "a.symbol is not None and a.symbol != target['worst_symbol']"
    preserve: ALL
  - collection: state.notifications
    filter: "a.type != 'order_fill'"
    preserve: ALL
  - collection: state.watchlists
    filter: "a.name != 'Corporate Actions Watch'"
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures state_tracking, exploration, grounding, verification, patience
  by requiring the agent to identify best/worst performers, manage notifications,
  and organize corporate action monitoring.
