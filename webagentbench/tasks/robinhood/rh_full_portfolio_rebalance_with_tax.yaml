task_id: rh_full_portfolio_rebalance_with_tax
env_id: robinhood
title: Tax-Aware Portfolio Rebalance
instruction_template: 'Rebalance your portfolio to: VTI 40%, VXUS 20%, BND 25%, GLD
  15%. Move your portfolio toward that core allocation while minimizing tax impact
  by selling lots with losses first, avoiding wash sales from recent purchases, and
  preferring to sell lots held over 1 year when you must realize gains. Execute all
  trades.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 35
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - VTI
      - VXUS
      - BND
      - GLD
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 8
      multi_lot: true
    outputs: []
  - use: transaction_ledger
    params:
      months: 6
      include_recent_buys: true
    outputs: []
  - use: tax_documents
    params:
      include_gains: true
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    target_allocation:
      VTI: 40
      VXUS: 20
      BND: 25
      GLD: 15
canonical_diff:
  create:
  - entity: orders
    desc: All sell + buy orders placed during the rebalance (bijection over
      actual orders)
    bijection:
      over: "[o for o in state.orders if not o.id.startswith('ord_decoy_') and o.id
        not in [io.id for io in initial.orders]]"
      variable: o
    properties:
      symbol: {any: true}
      side: {any: true}
      status: {any: true}
      order_type: {any: true}
      quantity: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      limit_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  - entity: transactions
    desc: All transactions generated by rebalance orders (bijection over
      actuals)
    bijection:
      over: "[t for t in state.transactions if t.id not in [it.id for it in initial.transactions]]"
      variable: t
    properties:
      type: {any: true}
      symbol: {any: true}
      quantity: {any: true}
      amount: {any: true}
      description: {any: true}
      timestamp: {any: true}
  - entity: notifications
    desc: All notifications fired by rebalance orders (bijection over actuals)
    bijection:
      over: "[n for n in state.notifications if n.id not in [ix.id for ix in initial.notifications]]"
      variable: n
    properties:
      type: {any: true}
      title: {any: true}
      message: {any: true}
      timestamp: {any: true}
      is_read: {any: true}
      action_url: {any: true}
  - entity: positions
    desc: Newly created positions in the target allocation symbols
    bijection:
      over: "[p for p in state.positions if p.symbol in ('VTI', 'VXUS', 'BND', 'GLD')
        and p.id not in [ip.id for ip in initial.positions]]"
      variable: p
    properties:
      symbol: {any: true}
      quantity: {any: true}
  update:
  - entity: positions
    desc: Existing target allocation positions increased by buys
    bijection:
      over: "[p for p in initial.positions if p.symbol in ('VTI', 'VXUS', 'BND', 'GLD')]"
      variable: v
    where:
      id: {expr: "x == v.id"}
    changes:
      quantity: {any: true}
  delete:
  - entity: positions
    desc: Positions fully sold during the rebalance (any non-target symbol
      position deleted)
    bijection:
      over: "[p for p in initial.positions if p.symbol not in ('VTI', 'VXUS', 'BND',
        'GLD') and p.id not in [ap.id for ap in state.positions]]"
      variable: v
    where:
      symbol: {expr: "x == v.symbol"}
  invariant:
  - collection: state.orders
    filter: "(a.side == 'buy' and a.symbol not in ('VTI', 'VXUS', 'BND', 'GLD')) or
      (a.side == 'sell' and a.symbol in ('VTI', 'VXUS', 'BND', 'GLD')) or (a.side
      == 'sell' and a.symbol in state.wash_sale_risk_symbols(30))"
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.notifications
    filter: "False"
    preserve: ALL
  constraints:
  - desc: Rebalance moves the portfolio closer to the VTI/VXUS/BND/GLD target allocation
    expr: "state.allocation_error_vs_targets(target['target_allocation']) < initial.allocation_error_vs_targets(target['target_allocation'])"
    severity: critical
  - desc: All rebalance stock orders filled
    expr: all(o.status == 'filled' and o.filled_quantity == o.quantity for o in
      state.orders if o.id not in [io.id for io in initial.orders]) and any(o.id
      not in [io.id for io in initial.orders] for o in state.orders)
    severity: critical
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, backtracking, verification,
  grounding by requiring exact completion of the requested Robinhood workflow
  while ignoring distractor account state.
