task_id: rh_full_portfolio_rebalance_with_tax
env_id: robinhood
title: Tax-Aware Portfolio Rebalance
instruction_template: 'Rebalance your portfolio to: VTI 40%, VXUS 20%, BND 25%, GLD
  15%. Move your portfolio toward that core allocation while minimizing tax impact
  by selling lots with losses first, avoiding wash sales from recent purchases, and
  preferring to sell lots held over 1 year when you must realize gains. Execute all
  trades.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 35
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - VTI
      - VXUS
      - BND
      - GLD
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 8
      multi_lot: true
    outputs: []
  - use: transaction_ledger
    params:
      months: 6
      include_recent_buys: true
    outputs: []
  - use: tax_documents
    params:
      include_gains: true
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets:
    target_allocation:
      VTI: 40
      VXUS: 20
      BND: 25
      GLD: 15
canonical_diff:
  constraints:
  - desc: Sell orders placed as part of rebalancing
    expr: "any(o.side == 'sell' and o.status in ('filled', 'pending') for o in state.orders)"
    severity: critical
  - desc: Buy orders target the requested allocation funds
    expr: "len(set(o.symbol for o in state.orders if o.side == 'buy' and o.status in ('filled', 'pending'))) >= 3 and all(o.symbol in ('VTI', 'VXUS', 'BND', 'GLD') for o in state.orders if o.side == 'buy')"
    severity: critical
  - desc: All target allocation funds have non-zero projected exposure
    expr: "all(state.projected_quantity_after_orders(symbol) > Decimal('0') for symbol in target['target_allocation'])"
    severity: critical
  - desc: No wash-sale risk symbols sold
    expr: "not any(o.side == 'sell' and o.symbol in state.wash_sale_risk_symbols(30) and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Portfolio moved closer to target allocation
    expr: "state.allocation_error_vs_targets(target['target_allocation']) < state.allocation_error_vs_targets_initial(target['target_allocation'])"
    severity: high
  - desc: Buys only in target allocation symbols
    expr: "not any(o.side == 'buy' and o.symbol not in ('VTI', 'VXUS', 'BND', 'GLD') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: Target allocation symbols were not sold
    expr: "not any(o.side == 'sell' and o.symbol in ('VTI', 'VXUS', 'BND', 'GLD') and not o.id.startswith('ord_decoy_') for o in state.orders)"
    severity: high
  - desc: No transfers initiated
    expr: "len(state.transfers) == 0"
    severity: high
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, backtracking, verification, grounding
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
