variant_id: rh_mark_notifications_read__grounding_v1
base_task_id: rh_mark_notifications_read
target_primitive: grounding
description: >
  Decoy notifications with urgent-sounding subjects and distractor
  notifications about account actions tempt the agent to interact with
  individual notifications rather than simply marking all as read.
injections:
- layer: seed
  params:
    action: add_decoy_notifications
    messages:
    - "URGENT: Unusual login detected on your account"
    - "Action required: Verify your bank connection"
    - "Your AAPL position is down 15% — review now"
    - "Tax document ready for download"
    - "Limited time: Free stock promotion expiring"
- layer: server
  params:
    action: inject_distractor_notifications
    messages:
    - "Deposit confirmed: $2,500 from Chase"
    - "Order filled: 10 shares of MSFT at $412"
