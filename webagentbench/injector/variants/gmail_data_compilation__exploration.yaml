variant_id: gmail_data_compilation__exploration_v1
base_task_id: gmail_data_compilation
target_primitive: exploration
description: >
  First 2 search attempts return stale/incomplete results. Agent must explore
  beyond search, try email list filtering, read thread contents to find all
  data points needed for compilation.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: "**/api/env/gmail/search**"
    methods: ["GET"]
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 1
      query: ""
      message: No results found
    stale_count: 2
    behavior:
      mode: once
