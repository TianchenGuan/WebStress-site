- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/patient_portal/appointments/create'
    methods:
    - POST
    fail_count: 1
    response_body:
      id: apt_d4f1c823a9
      provider_id: prov_a82c441f
      datetime: '2026-06-15T10:00:00+00:00'
      duration_minutes: 30
      type: in-person
      status: scheduled
      reason: Post-accident follow-up
      notes: ''
      linked_referral_id: null
      pre_auth_status: not_required
      booked_at: '2026-04-26T08:00:00+00:00'
      location: Main Campus
    behavior:
      mode: once
