variant_id: pp_post_accident_coordination__slot_search_stale_v1
base_task_id: pp_post_accident_coordination
target_primitive: verification
description: "The first appointment creation returns a fake successful response without actually persisting. The agent must\
  \ verify the appointment exists in the real appointment list before declaring the task done \u2014 a stale 'success' response\
  \ is otherwise indistinguishable from real success."
