variant_id: rh_buy_market_order__grounding_v1
base_task_id: rh_buy_market_order
target_primitive: grounding
description: >
  Seed data adds confusing positions with tickers visually similar to AAPL
  (APLE, AAON) and decoy notifications about AAPL-related corporate actions.
  ARIA scrambling makes the buy button harder to locate by its label.
injections:
- layer: seed
  params:
    action: add_confusing_positions
    positions:
      - symbol: APLE
        name: "Apple Hospitality REIT"
        price: 15.82
        quantity: 25
        cost_basis: 14.50
      - symbol: AAON
        name: "AAON Inc"
        price: 78.44
        quantity: 10
        cost_basis: 72.00
- layer: seed
  params:
    action: add_decoy_notifications
    decoys:
      - type: corporate_action
        title: "AAPL Stock Split Announced"
        message: "Apple Inc has announced a 4-for-1 stock split effective next month. Your position will be adjusted automatically."
      - type: earnings
        title: "AAPL Earnings Beat"
        message: "Apple Inc reported EPS of $2.18, beating estimates by $0.12."
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label]'
    behavior:
      mode: persistent
