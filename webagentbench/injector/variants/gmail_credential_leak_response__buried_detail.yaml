variant_id: gmail_credential_leak_response__buried_detail
base_task_id: gmail_credential_leak_response
target_primitive: exploration
description: A long security digest mentions the same service family as the real alert, but the important
  forwarding instruction is buried and the digest itself is not the actionable source.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    multiplier: 2
    decoys:
    - from_name: Security Operations Center
      from: soc@acme-security.com
      subject: "Weekly Security Digest \u2014 Credential Monitoring Summary"
