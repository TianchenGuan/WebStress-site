variant_id: gmail_triage_with_interrupts__patience
base_task_id: gmail_triage_with_interrupts
target_primitive: patience
description: Progressive delays and transient errors stress retry behavior during
  high-priority interrupt handling
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/emails'
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1000
        after_call: 2
      - delay_ms: 3000
        after_call: 4
      - delay_ms: 2000
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/*/star'
    error_status: 503
    error_count: 2
    behavior:
      mode: once
      message: Star action temporarily failed
- layer: seed
  params:
    action: increase_distractors
    count: 15
    topical_count: 10
    topical_subjects:
    - 'URGENT: Immediate response needed'
    - 'Re: High priority update'
    - 'Fwd: Critical issue alert'
    - 'Thread: Action required ASAP'
    - 'Re: Priority change notification'
    - 'Fwd: Escalation required'
    - 'URGENT: Timeline moved up'
    - 'Re: Emergency request'
    - 'Fwd: Hot issue - needs attention'
    - 'Thread: Blocking issue reported'
