variant_id: lms_exam_conflict__calendar_clutter_v1
base_task_id: lms_exam_conflict
target_primitive: exploration
description: Extra calendar noise expands the LMS search surface. The agent must keep
  exploring until it finds the real target.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: calendar_event
      course_id: '{target.higher_grade_conflict_course_id}'
      title: Course event review session
      event_type: lecture
      location: Library 204
    - type: calendar_event
      course_id: '{target.higher_grade_conflict_course_id}'
      title: Course event deadline reminder
      event_type: deadline
      location: LMS
