variant_id: gmail_workspace_standardization__verification_v2
base_task_id: gmail_workspace_standardization
target_primitive: verification
description: 30% of settings PUT requests silently fail throughout. Agent must verify
  each change, not just the first.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/settings'
    response_body:
      success: true
      message: Settings updated
    methods:
    - PUT
    behavior:
      mode: intermittent
      probability: 0.3
      seed: 42
