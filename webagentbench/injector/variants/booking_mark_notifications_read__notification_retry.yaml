variant_id: booking_mark_notifications_read__notification_retry
base_task_id: booking_mark_notifications_read
target_primitive: verification
description: The first mark-all-read request fails transiently. The agent must verify unread notifications
  are gone and retry if they remain.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/notifications/read-all'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary booking API failure. Retry the action.
    behavior:
      mode: once
