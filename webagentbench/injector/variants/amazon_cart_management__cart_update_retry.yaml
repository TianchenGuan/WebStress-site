variant_id: amazon_cart_management__cart_update_retry
base_task_id: amazon_cart_management
target_primitive: verification
description: The first cart edit fails transiently. The agent must verify the quantity or removal actually
  stuck before moving on.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/cart/**'
    methods:
    - PUT
    - DELETE
    error_count: 1
    error_status: 503
    error_message: Temporary write failure. Retry the action.
    behavior:
      mode: once
