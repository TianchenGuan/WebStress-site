variant_id: amazon_cart_management__cart_update_retry
base_task_id: amazon_cart_management
target_primitive: verification
description: First write returns a fake successful response without persisting. The agent must verify the change actually
  took effect on the real backend (e.g., re-fetch the entity and check the field) before declaring done.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/cart/**'
    methods:
    - PUT
    - DELETE
    fail_count: 1
    response_body:
      cart_item:
        id: cart_fake_retry
        product_id: prod_fake_retry
        product_name: Pending cart update
        quantity: 1
        unit_price: 0.0
        variant_selections: {}
        added_at: '2026-04-26T08:00:00+00:00'
    behavior:
      mode: once
