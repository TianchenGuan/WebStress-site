variant_id: gmail_delete_spam__grounding_v1
base_task_id: gmail_delete_spam
target_primitive: grounding
description: Prize-themed decoys and ARIA scrambling make the exact spam target harder
  to distinguish from lookalikes.
injections:
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label]'
    behavior:
      mode: persistent
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - from_name: Rewards Center
      from: winner@spamfarm.co
      subject: YOU WON $1,000,000!! Click NOW!!
      body: Lookalike prize email from the wrong sender domain.
      labels:
      - inbox
    - from_name: Prize Desk
      from: winner@spamfarm.test
      subject: YOU WON $100,000!!! Click NOW!!!
      body: Same sender family but different subject and amount.
      labels:
      - inbox
