variant_id: amazon_write_review__review_retry
base_task_id: amazon_write_review
target_primitive: verification
description: The first review submission fails transiently. The agent must verify the review exists and
  retry rather than trusting the initial click.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/products/*/reviews'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary write failure. Retry the action.
    behavior:
      mode: once
