variant_id: gmail_thread_detective__exploration
base_task_id: gmail_thread_detective
target_primitive: exploration
description: Hidden prerequisite email and confusing decoys require thorough investigation
  to find evidence chain
injections:
- layer: seed
  params:
    action: hide_in_non_obvious_location
    email_id: '{target.calendar_email_id}'
    move_to_label: updates
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - The answer is in the Q3 report attachment
    - Check the previous email for clarification
    - Refer to the meeting notes I sent last week
    - The details are in the shared document
    - See the original thread for context
    - Review the forwarded message from John
- layer: seed
  params:
    action: increase_distractors
    count: 8
    topical_count: 5
    topical_subjects:
    - 'Re: Investigation update'
    - 'Fwd: Evidence review'
    - 'Thread: Case details'
    - 'Re: Findings summary'
    - 'Fwd: Discovery notes'
