variant_id: rh_consolidate_recurring__verification_v1
base_task_id: rh_consolidate_recurring
target_primitive: verification
description: >
  Silent fail on the first recurring investment creation (the consolidated
  replacement). The server returns a fake active recurring investment for AAPL,
  but it is never created. Agent must verify the recurring list and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/recurring"
    methods: ["POST"]
    response_body:
      recurring:
        id: "rec_fake_001"
        symbol: "AAPL"
        amount: "50.00"
        frequency: "monthly"
        status: "active"
        next_execution_date: "2026-05-01"
    fail_count: 1
    behavior:
      mode: once
