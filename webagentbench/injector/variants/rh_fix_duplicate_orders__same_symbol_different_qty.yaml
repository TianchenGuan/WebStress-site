variant_id: rh_fix_duplicate_orders__same_symbol_different_qty
base_task_id: rh_fix_duplicate_orders
target_primitive: state_tracking
description: Pending orders include same-symbol orders that are not true duplicates because the quantity
  or side differs. The agent must cancel only the real duplicates and keep the distinct orders.
injections:
- layer: seed
  params:
    action: add_noise_orders
    multiplier: 2
    orders:
    - symbol: AAPL
      side: buy
      order_type: limit
      quantity: 7
      status: pending
    - symbol: AAPL
      side: sell
      order_type: limit
      quantity: 1
      status: pending
    - symbol: MSFT
      side: buy
      order_type: limit
      quantity: 9
      status: pending
- layer: network
  params:
    action: misleading_success
    url_pattern: '**/api/env/robinhood/orders/*/cancel'
    methods:
    - POST
    - DELETE
    fail_count: 1
    success_body:
      success: true
      status: cancelled
      message: Order cancelled.
    behavior:
      mode: once
