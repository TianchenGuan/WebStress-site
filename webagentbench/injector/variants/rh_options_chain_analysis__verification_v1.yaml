variant_id: rh_options_chain_analysis__verification_v1
base_task_id: rh_options_chain_analysis
target_primitive: verification
description: >
  Silent fail on the first options order for the TSLA put — server returns
  a fake filled confirmation but the order is not persisted. Agent must
  verify the order was actually placed and resubmit.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/options/orders"
    methods: ["POST"]
    response_body: {"id": "fake_put_001", "strategy": "single", "status": "filled", "legs": [{"option_type": "put", "side": "buy", "symbol": "TSLA"}]}
    fail_count: 1
    behavior:
      mode: once
