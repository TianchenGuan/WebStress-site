variant_id: booking_frontier_social_reviewer__review_retry_v2
base_task_id: booking_frontier_social_reviewer
target_primitive: verification
description: The first review submission fails transiently. The agent must verify the review exists and
  retry if it does not.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/reviews'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
