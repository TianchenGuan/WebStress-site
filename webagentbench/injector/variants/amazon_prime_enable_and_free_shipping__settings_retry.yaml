variant_id: amazon_prime_enable_and_free_shipping__settings_retry
base_task_id: amazon_prime_enable_and_free_shipping
target_primitive: backtracking
description: >
  The first two account PUTs return a fake 200 with a realistic account body
  but never persist Prime membership. The agent must verify Prime is actually
  enabled via re-read (not by trusting the success toast) before checking out
  so the order does not incur shipping.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/account'
    methods:
    - PUT
    fail_count: 2
    response_body:
      account:
        prime_member: true
        email_subscriptions: []
    behavior:
      mode: once
