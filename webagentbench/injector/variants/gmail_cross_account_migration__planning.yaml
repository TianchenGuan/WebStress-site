variant_id: gmail_cross_account_migration__planning_v1
base_task_id: gmail_cross_account_migration
target_primitive: planning
description: >
  Stale data on first contacts list fetch shows outdated contacts. Error on
  first filter creation attempt. Agent must replan sequence: refresh contacts,
  retry filter creation, then proceed with migration steps in correct order.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: "**/api/env/gmail/contacts"
    methods: ["GET"]
    stale_body: {"items": [{"email": "old1@test.com"}, {"email": "old2@test.com"}]}
    stale_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/filters"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
