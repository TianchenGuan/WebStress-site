variant_id: booking_search_and_book__grounding_v1
base_task_id: booking_search_and_book
target_primitive: grounding
description: Multiple similarly-named hotels in search results make the correct property
  harder to identify without checking star rating and review score.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: "Grand Parisian Hotel"
      city: Paris
      star_rating: 3
      review_score: 7.2
      price: 145.00
    - type: property
      name: "Le Grand Paris Hotel"
      city: Paris
      star_rating: 4
      review_score: 8.1
      price: 285.00
    - type: property
      name: "Hotel Grand de Paris"
      city: Paris
      star_rating: 5
      review_score: 9.0
      price: 550.00
