variant_id: gmail_star_email__patience_v1
base_task_id: gmail_star_email
target_primitive: patience
description: >
  First 2 star API calls and first email-list call return 503.
  Agent must retry patiently — guaranteed to hit errors, not probabilistic.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/emails/*/star"
    error_status: 503
    error_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/emails"
    methods: [POST, PUT, PATCH]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
