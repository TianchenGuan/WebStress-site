variant_id: amazon_negative_review_return_cascade__return_retry
base_task_id: amazon_negative_review_return_cascade
target_primitive: backtracking
description: "The first return POST returns 503. With three returns to file in a row, the agent must notice the failure, back\
  \ out, and retry the first return before moving on to the next \u2014 skipping over a failed call would leave one of the\
  \ three required returns missing.\n"
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/returns'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Service temporarily unavailable. (HTTP 503)
    behavior:
      mode: once
