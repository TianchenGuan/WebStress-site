variant_id: rh_options_income_portfolio__exploration_v1
base_task_id: rh_options_income_portfolio
target_primitive: exploration
description: >
  Confusing existing sold options on the same portfolio symbols at nearby
  deltas and expirations force the agent to explore each chain thoroughly
  to find the correct 0.30-delta strike rather than reusing existing positions.
