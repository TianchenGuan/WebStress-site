variant_id: amazon_high_value_return_with_upgrade__upgrade_checkout_retry
base_task_id: amazon_high_value_return_with_upgrade
target_primitive: backtracking
description: >
  The first checkout POST fails with 503 after the return has been
  filed. The agent must detect that the upgrade order did not land,
  re-submit checkout, and not close out the task on the first failed
  call — otherwise only half of the cascade (return without upgrade)
  ships and the second positive check fails.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/checkout'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Checkout temporarily unavailable. Retry the order.
    behavior:
      mode: once
