variant_id: amazon_compare_and_buy_cheapest__checkout_retry_v2
base_task_id: amazon_compare_and_buy_cheapest
target_primitive: backtracking
description: The first checkout attempt fails transiently. The agent must confirm the order was created
  and retry if not.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/checkout'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
