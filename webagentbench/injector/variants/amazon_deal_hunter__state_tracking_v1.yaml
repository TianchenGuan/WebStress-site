variant_id: amazon_deal_hunter__state_tracking_v1
base_task_id: amazon_deal_hunter
target_primitive: state_tracking
description: 'The deals endpoint returns stale empty data on first load and the cart add silently fails once. The agent must
  track that the initial deals page was stale and retry, then verify cart additions.

  '
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/amazon/deals**'
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 0
    stale_count: 1
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/cart/add'
    methods:
    - POST
    fail_count: 1
    response_body:
      cart_item:
        id: item_3c8f1a4d
        product_id: prod_a8c4d219
        quantity: 1
    behavior:
      mode: once
