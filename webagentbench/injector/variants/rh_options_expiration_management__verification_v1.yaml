variant_id: rh_options_expiration_management__verification_v1
base_task_id: rh_options_expiration_management
target_primitive: verification
description: >
  Silent fail on the first two options close orders — server returns fake
  filled confirmations but neither is recorded. With 8 positions requiring
  different actions, the agent must verify each closing order actually
  persisted before moving to the next.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/options/orders"
    methods: ["POST"]
    response_body: {"id": "fake_close_001", "status": "filled", "strategy": "single"}
    fail_count: 2
    behavior:
      mode: once
