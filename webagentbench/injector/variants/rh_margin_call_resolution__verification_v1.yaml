variant_id: rh_margin_call_resolution__verification_v1
base_task_id: rh_margin_call_resolution
target_primitive: verification
description: >
  The sell order submission silently fails — the server returns a fake
  success response but the order is not actually placed. The agent must
  verify the order book to confirm the sell went through before moving
  on to the $500 deposit, and retry the sell if it did not persist.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_sell", "symbol": "INTC", "side": "sell", "status": "filled", "quantity": 10}}
    fail_count: 1
    behavior:
      mode: once
