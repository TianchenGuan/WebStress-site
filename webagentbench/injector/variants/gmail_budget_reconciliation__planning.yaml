variant_id: gmail_budget_reconciliation__planning_v1
base_task_id: gmail_budget_reconciliation
target_primitive: planning
description: "Remove prerequisite label and inject conflicting budget data to stress planning"
injections:
  - layer: server
    params:
      action: hide_prerequisite
      label_name: "Budget Verified"
  - layer: seed
    params:
      action: add_contradictory_update
      email_id: conflicting_budget_update
      thread_id: conflicting_budget_thread
      from_name: "Finance Department"
      from: "finance-corrections@thornton.com"
      to: ["me@thornton.com"]
      subject: "CORRECTION: Q1 Budget Numbers - Updated Figures"
      body: "Please disregard the previous budget emails. After our internal audit, the correct Q1 figures are: Engineering $485,000 (was $450,000), Marketing $312,000 (was $280,000), Operations $198,000 (was $210,000). These supersede all prior communications. — Finance Team"
      labels: ["inbox"]
      timestamp: "2026-01-15T14:00:00Z"
