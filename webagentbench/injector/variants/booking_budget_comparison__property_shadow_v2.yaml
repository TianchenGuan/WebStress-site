variant_id: booking_budget_comparison__property_shadow_v2
base_task_id: booking_budget_comparison
target_primitive: grounding
description: Search results include a same-city sibling property with a nearly identical name and overlapping
  amenities. The agent must still book or compare the exact target hotel.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: '{target.target_prop_name} Suites'
      city: Rome
      country: Italy
      price: 249.6
      review_score: 8.6
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
