variant_id: gmail_star_email__star_retry
base_task_id: gmail_star_email
target_primitive: verification
description: The first star action fails transiently. The agent must verify the star actually appeared
  and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/*/star'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary Gmail write failure. Retry the action.
    behavior:
      mode: once
