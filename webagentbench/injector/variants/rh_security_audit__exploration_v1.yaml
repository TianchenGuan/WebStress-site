variant_id: rh_security_audit__exploration_v1
base_task_id: rh_security_audit
target_primitive: exploration
description: >
  Distractor notifications about routine account activity are injected,
  burying the suspicious foreign login entries and forcing the agent to
  explore the full security log rather than skimming the top entries.
injections:
- layer: server
  params:
    action: inject_distractor_notifications
    count: 12
    types:
    - dividend_received
    - price_movement
    - order_filled
    - account_statement
