variant_id: rh_transfer_and_withdraw__verification_v1
base_task_id: rh_transfer_and_withdraw
target_primitive: verification
description: >
  The first withdrawal call returns a fake success with a plausible
  transfer confirmation, but the transfer is never initiated. Agent
  must verify the transfer appears in transfer history and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/transfers"
    methods: ["POST"]
    response_body: {"success": true, "transfer": {"id": "fake_txn_001", "direction": "withdrawal", "amount": 2500, "status": "pending", "destination": "Wells Fargo Savings ****7793"}}
    fail_count: 1
    behavior:
      mode: once
