variant_id: amazon_review_aggregation_read_only__patience_v1
base_task_id: amazon_review_aggregation_read_only
target_primitive: exploration
description: >
  Product-detail GETs are progressively delayed as the agent browses
  each coffee maker. The agent must wait for the slow renders rather
  than concluding the page failed and abandoning the task early.
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/amazon/products/*'
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 500
      - after_call: 2
        delay_ms: 1500
      - after_call: 4
        delay_ms: 3000
