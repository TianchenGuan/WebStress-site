variant_id: gmail_contact_enrichment__exploration_v3
base_task_id: gmail_contact_enrichment
target_primitive: exploration
description: Key data hidden in archived label + contacts section persistently requires
  double-click. Re-applies after every navigation.
injections:
- layer: seed
  params:
    action: hide_in_non_obvious_location
    email_id: enrichment_thread_1
    move_to_label: old-correspondence
- layer: client
  params:
    action: hide_affordance
    selector: '[aria-label*=''Contacts'']'
    trigger: dblclick
    behavior:
      mode: persistent
