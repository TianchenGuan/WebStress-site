variant_id: rh_sell_shares__grounding_v1
base_task_id: rh_sell_shares
target_primitive: grounding
description: >
  ARIA labels on the sell-flow buttons are scrambled, requiring the agent to
  ground on visual context and element structure rather than relying on
  accessibility labels to find the correct sell action.
injections:
- layer: client
  params:
    action: scramble_aria
    selector: "[data-testid='order-panel'] button"
    behavior:
      mode: persistent
