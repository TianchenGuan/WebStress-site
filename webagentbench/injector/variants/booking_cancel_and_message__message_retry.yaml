variant_id: booking_cancel_and_message__message_retry
base_task_id: booking_cancel_and_message
target_primitive: backtracking
description: The first message send fails transiently. The agent must retry the message rather than assuming
  the property received it.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/messages'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary booking API failure. Retry the action.
    behavior:
      mode: once
