variant_id: gmail_misrouted_correction__backtracking_v1
base_task_id: gmail_misrouted_correction
target_primitive: backtracking
description: A misleading out-of-office note and a transient forward error force the
  agent to re-check the true backup recipient.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/*/forward'
    error_status: 503
    error_count: 1
    behavior:
      mode: once
- layer: seed
  params:
    action: plant_wrong_answer
    from_name: Operations
    from: ops-followup@company.test
    subject: OOO coverage for Alice
    body: Alice is out. Danica Roe at danica.roe@company.test is the temporary backup
      for every request this week.
    labels:
    - inbox
    timestamp: '2026-01-15T14:15:00Z'
    starred: true
