variant_id: amazon_order_management_suite__order_shadow_v2
base_task_id: amazon_order_management_suite
target_primitive: state_tracking
description: Order history contains a near-identical sibling product with a similar fulfillment state.
  The agent must act on the exact target order or replacement item, not the shadow order.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: product
      name: Portable SSD 1TB Travel Edition
      brand: Samsung
      category: Electronics
      price: 102.29
      rating: 4.5
      description: Similar model in a different form factor that should not be returned, reordered, or
        purchased here.
    - type: order
      product_name: Portable SSD 1TB Travel Edition
      quantity: 1
      unit_price: 102.29
      status: delivered
      placed_hours_ago: 72
