variant_id: gmail_label_workflow_setup__exploration_v1
base_task_id: gmail_label_workflow_setup
target_primitive: exploration
description: Requirements email has stale data and workflow prerequisites are hidden
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/gmail/emails'
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 1
    stale_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/labels'
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - after_call: 1
        delay_ms: 2000
- layer: seed
  params:
    action: hide_in_non_obvious_location
    email_id: '{target.wrong_review_id}'
    move_to_label: updates
