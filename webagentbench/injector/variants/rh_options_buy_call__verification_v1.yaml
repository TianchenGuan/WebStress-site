variant_id: rh_options_buy_call__verification_v1
base_task_id: rh_options_buy_call
target_primitive: verification
description: >
  Silent fail on the first options order submission — server returns a
  fake call purchase confirmation but the order is not recorded. Agent
  must check order status or positions and resubmit the call buy.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/options/orders"
    methods: ["POST"]
    response_body: {"id": "fake_call_001", "strategy": "single", "status": "filled", "legs": [{"option_type": "call", "side": "buy", "symbol": "AAPL"}]}
    fail_count: 1
    behavior:
      mode: once
