variant_id: gmail_delete_spam__exploration_v1
base_task_id: gmail_delete_spam
target_primitive: exploration
description: >
  First 2 delete API calls silently fail (return 200 but don't actually
  delete). 5 distractor emails injected to increase inbox noise. Agent must
  explore and verify: check trash folder, re-attempt delete, or find
  alternative deletion methods.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/emails/*/delete"
    methods: ["POST"]
    response_body: {"email": {"id": "fake", "subject": "deleted"}}
    fail_count: 2
    behavior:
      mode: once
- layer: server
  params:
    action: inject_distractor_emails
    count: 5
    subject_prefix: "URGENT: "
