variant_id: rh_options_income_portfolio__verification_v1
base_task_id: rh_options_income_portfolio
target_primitive: verification
description: >
  Silent fail on the first two options order submissions — server returns
  fake sell confirmations but neither order is recorded. With multiple
  covered calls and cash-secured puts to place, the agent must verify
  each order persisted before proceeding.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/options/orders"
    methods: ["POST"]
    response_body: {"id": "fake_income_001", "status": "filled", "strategy": "single", "legs": [{"side": "sell"}]}
    fail_count: 2
    behavior:
      mode: once
