variant_id: rh_wash_sale_avoidance__verification_v1
base_task_id: rh_wash_sale_avoidance
target_primitive: verification
description: >
  The first two sell order submissions return fake successes with
  plausible filled-order objects, but no orders are placed. Agent must
  verify sell orders appear in order history and retry the missing ones.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_order_002", "side": "sell", "status": "filled", "symbol": "GOOGL", "quantity": 30}}
    fail_count: 2
    behavior:
      mode: once
