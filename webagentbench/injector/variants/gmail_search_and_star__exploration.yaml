variant_id: gmail_search_and_star__exploration_v1
base_task_id: gmail_search_and_star
target_primitive: exploration
description: The search affordance is hidden and the first search returns empty results,
  forcing exploration and a retry.
injections:
- layer: client
  params:
    action: hide_affordance
    selector: input[aria-label="Search mail"]
    trigger: contextmenu
    behavior:
      mode: persistent
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/gmail/search**'
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 1
      query: ''
    stale_count: 1
    behavior:
      mode: once
