variant_id: rh_watchlist_screening__verification_v1
base_task_id: rh_watchlist_screening
target_primitive: verification
description: >
  The first limit buy order placement returns a fake success with a
  plausible pending order, but the order is never created. Agent must
  verify the order exists in its order list and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_order_003", "side": "buy", "order_type": "limit", "status": "pending", "symbol": "KO", "quantity": 3}}
    fail_count: 1
    behavior:
      mode: once
