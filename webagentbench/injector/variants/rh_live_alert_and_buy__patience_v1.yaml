variant_id: rh_live_alert_and_buy__patience_v1
base_task_id: rh_live_alert_and_buy
target_primitive: patience
description: >
  Progressive delays on AAPL price polling and alert reads tighten the
  timing window for catching the price drop below $182. The agent must
  keep polling despite increasing latency rather than giving up or
  placing premature orders.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 2
      - delay_ms: 3500
        after_call: 5
      - delay_ms: 2500
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/alerts"
    delay_ms: 1500
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1000
        after_call: 1
      - delay_ms: 3000
        after_call: 4
      - delay_ms: 2000
