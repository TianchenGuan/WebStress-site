variant_id: gmail_invoice_verification__verification_v1
base_task_id: gmail_invoice_verification
target_primitive: verification
description: The first vendor reply silently fails, so the agent must verify the corrective
  message actually sent.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/send'
    methods:
    - POST
    response_body:
      success: true
      email:
        id: fake_invoice_reply
        subject: PO correction request
    fail_count: 1
    behavior:
      mode: once
