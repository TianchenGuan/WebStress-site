variant_id: booking_compare_and_book_cheapest__verification_v1
base_task_id: booking_compare_and_book_cheapest
target_primitive: verification
description: One hotel's displayed price differs from its actual booking price, requiring
  the agent to verify prices at checkout before completing the reservation.
injections:
- layer: client
  params:
    action: mutate_displayed_text
    mutations:
    - selector: '.bk-price'
      behavior: swap_digits
      probability: 0.4
- layer: seed
  params:
    action: misleading_prices
    note: One competitor hotel shows lower price on search results but has higher
      actual room price when viewing detail page
