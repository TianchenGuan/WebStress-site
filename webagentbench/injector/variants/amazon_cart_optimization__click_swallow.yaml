variant_id: amazon_cart_optimization__click_swallow
base_task_id: amazon_cart_optimization
target_primitive: verification
description: >
  First click on any Add-to-Cart / Checkout button is a no-op. Agent
  must verify and retry.
injections:
  - layer: client
    params:
      action: click_swallow
      # The Amazon SPA uses semantic aria-labels for the critical submit
      # buttons: "Add to Cart" on ProductDetail, "Place your simulated
      # order" on Checkout. Match those plus the dedicated CSS classes
      # on the place-order / cart-checkout buttons so the injection
      # covers both the product-detail and checkout flows.
      selector: >-
        [aria-label="Add to Cart"],
        [aria-label="Place your simulated order"],
        .checkout-summary-box__place-order,
        .cart-summary-box__checkout
      swallow_count: 1
      behavior: { mode: persistent }
