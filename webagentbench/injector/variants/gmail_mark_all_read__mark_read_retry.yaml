variant_id: gmail_mark_all_read__mark_read_retry
base_task_id: gmail_mark_all_read
target_primitive: verification
description: The first mark-all-read request fails transiently. The agent must confirm the inbox state
  changed and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/mark-all-read'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary Gmail write failure. Retry the action.
    behavior:
      mode: once
