variant_id: rh_dividend_income_report__verification_v1
base_task_id: rh_dividend_income_report
target_primitive: verification
description: >
  Silent fail on the first sell order -- server returns a fake success
  showing the lowest-dividend stock was sold, but the order is not persisted.
  Agent must verify the sell actually executed before proceeding to buy the
  highest-yielding watchlist stock.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body:
      success: true
      order:
        id: "ord_fake_sell"
        symbol: "AAPL"
        side: "sell"
        order_type: "market"
        status: "filled"
        filled_quantity: "25"
    fail_count: 1
    behavior:
      mode: once
