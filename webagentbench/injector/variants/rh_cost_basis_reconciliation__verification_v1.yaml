variant_id: rh_cost_basis_reconciliation__verification_v1
base_task_id: rh_cost_basis_reconciliation
target_primitive: verification
description: >
  Silent fail on the first limit sell order for AAPL. The server returns a
  realistic pending limit sell for 37 shares at the ask price, but the order
  is never placed. Agent must check the orders page and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body:
      success: true
      order:
        id: "ord_fake_sell01"
        symbol: "AAPL"
        side: "sell"
        order_type: "limit"
        quantity: 37
        filled_quantity: 0
        limit_price: "192.10"
        status: "pending"
        time_in_force: "gfd"
    fail_count: 1
    behavior:
      mode: once
