variant_id: rh_buy_market_order__verification_v1
base_task_id: rh_buy_market_order
target_primitive: verification
description: >
  Silent fail on the first market buy order for AAPL. The server returns a
  realistic filled-order response with 3 shares at $189.42, but the order is
  never actually recorded. Agent must check order history and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body:
      success: true
      order:
        id: "ord_fake_001"
        symbol: "AAPL"
        side: "buy"
        order_type: "market"
        quantity: 3
        filled_quantity: 3
        filled_price: "189.42"
        status: "filled"
        time_in_force: "gfd"
    fail_count: 1
    behavior:
      mode: once
