variant_id: rh_live_comparative_watch__patience_v1
base_task_id: rh_live_comparative_watch
target_primitive: patience
description: >
  Progressive delays on both AAPL and MSFT price polling slow down the
  comparative monitoring loop. The agent must keep watching both stocks
  to detect the 2-point performance gap despite sluggish price updates.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 3000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 2000
        after_call: 3
      - delay_ms: 4500
        after_call: 8
      - delay_ms: 3000
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/positions"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 1
      - delay_ms: 3000
        after_call: 4
      - delay_ms: 2000
