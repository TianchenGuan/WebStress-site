variant_id: gmail_change_setting__settings_retry
base_task_id: gmail_change_setting
target_primitive: verification
description: The first settings update fails transiently. The agent must confirm the new setting actually
  stuck.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/settings'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary Gmail write failure. Retry the action.
    behavior:
      mode: once
