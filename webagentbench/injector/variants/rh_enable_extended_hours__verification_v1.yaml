variant_id: rh_enable_extended_hours__verification_v1
base_task_id: rh_enable_extended_hours
target_primitive: verification
description: >
  Silent fail on the first settings update -- server returns a fake success
  showing extended_hours_enabled as true, but the setting is not actually
  changed. Agent must verify the setting persisted and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/settings"
    methods: ["PUT", "PATCH"]
    response_body:
      display_theme: "light"
      default_order_type: "market"
      reinvest_dividends: true
      extended_hours_enabled: true
      biometric_login: false
      two_factor_method: "none"
      notification_prefs: {}
    fail_count: 1
    behavior:
      mode: once
