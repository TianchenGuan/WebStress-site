variant_id: gmail_contact_audit__contacts_retry
base_task_id: gmail_contact_audit
target_primitive: verification
description: The first contact mutation fails transiently. The agent must confirm the contact cleanup
  or note update actually persisted.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/contacts**'
    methods:
    - POST
    - PUT
    - DELETE
    error_count: 1
    error_status: 503
    error_message: Temporary Gmail write failure. Retry the action.
    behavior:
      mode: once
