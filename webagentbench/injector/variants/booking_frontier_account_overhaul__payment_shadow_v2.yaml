variant_id: booking_frontier_account_overhaul__payment_shadow_v2
base_task_id: booking_frontier_account_overhaul
target_primitive: grounding
description: Account surfaces include a near-match card and a same-city property decoy. The agent must
  update or use the exact requested account configuration rather than the shadow record.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: payment_method
      card_type: Visa
      last_four: '4243'
      expiry: 11/29
      holder_name: Jordan Parker
