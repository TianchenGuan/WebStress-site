variant_id: rh_review_and_cancel_orders__grounding_v1
base_task_id: rh_review_and_cancel_orders
target_primitive: grounding
description: >
  Additional pending limit buy orders at prices close to but not exceeding
  the 10%-below threshold are injected, requiring the agent to precisely
  compare each limit price against market price rather than cancelling all
  limit orders indiscriminately.
injections:
- layer: seed
  params:
    action: add_noise_orders
    orders:
    - symbol: AAPL
      side: buy
      quantity: 5
      price: "171.00"
      order_type: limit
      status: pending
    - symbol: NVDA
      side: buy
      quantity: 2
      price: "112.00"
      order_type: limit
      status: pending
