variant_id: booking_budget_comparison__planning_v1
base_task_id: booking_budget_comparison
target_primitive: planning
description: Search pagination returns only 5 results per page instead of 20, requiring
  the agent to check multiple pages to find all candidates within the budget range.
injections:
- layer: server
  params:
    action: modify_response
    endpoints:
    - path_pattern: "properties/search"
      method: POST
      modifications:
        page_size_override: 5
        note: Forces 5 results per page instead of default 20
