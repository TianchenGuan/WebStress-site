variant_id: booking_change_bed_preference__preferences_retry
base_task_id: booking_change_bed_preference
target_primitive: verification
description: The first travel-preferences update fails transiently. The agent must verify the new bed
  preference actually stuck before moving on.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/preferences'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary booking API failure. Retry the action.
    behavior:
      mode: once
