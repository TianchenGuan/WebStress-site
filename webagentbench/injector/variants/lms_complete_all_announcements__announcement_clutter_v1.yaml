variant_id: lms_complete_all_announcements__announcement_clutter_v1
base_task_id: lms_complete_all_announcements
target_primitive: exploration
description: Extra announcement noise expands the LMS search surface. The agent must
  keep exploring until it finds the real target.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    # is_read: true so the canonical_diff's "preserve already-read announcements"
    # invariant doesn't fire when the agent legitimately marks all real
    # unread announcements as read.
    - type: announcement
      title: Course update follow-up
      body: Archived clarification that does not replace the active announcement.
      priority: normal
      is_read: true
    - type: announcement
      title: Course update correction
      body: Earlier logistics note for a prior announcement batch.
      priority: urgent
      is_read: true
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/announcements**'
    stale_body:
      items:
      - id: ann_stale_1
        course_id: course_stale
        title: 'Archived: prior-semester welcome note'
        body: 'This announcement is from a prior term and does not reflect the current course state.'
        posted_at: '2000-01-05T12:00:00+00:00'
        is_read: true
        priority: normal
      - id: ann_stale_2
        course_id: course_stale
        title: 'Archived: legacy syllabus reminder'
        body: 'Carry-over note from an earlier announcement batch; safe to ignore.'
        posted_at: '2000-01-03T10:00:00+00:00'
        is_read: true
        priority: normal
    stale_count: 1
    behavior:
      mode: once
