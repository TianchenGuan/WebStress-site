variant_id: gmail_team_roster_sync__exploration_v1
base_task_id: gmail_team_roster_sync
target_primitive: exploration
description: Contacts API returns stale data initially. Agent must explore alternative
  sources or retry to find current roster.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/gmail/contacts'
    stale_body:
      items:
      - id: contact_001
        name: John Smith
        email: john.smith@company.com
        team: Engineering
        status: active
      - id: contact_002
        name: Sarah Johnson
        email: sarah.johnson@company.com
        team: Engineering
        status: active
      - id: contact_003
        name: Mike Davis
        email: mike.davis@company.com
        team: Engineering
        status: active
    stale_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/search**'
    delay_ms: 1500
    behavior:
      mode: progressive
      stages:
      - after_call: 1
        delay_ms: 800
      - after_call: 2
        delay_ms: 1500
