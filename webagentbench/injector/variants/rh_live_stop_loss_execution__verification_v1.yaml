variant_id: rh_live_stop_loss_execution__verification_v1
base_task_id: rh_live_stop_loss_execution
target_primitive: verification
description: >
  The first stop-loss order submission silently fails — the server returns
  a fake success response but the order is not actually placed. The agent
  must verify the order book to confirm the stop-loss exists and retry
  if it does not.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_stop", "symbol": "NVDA", "side": "sell", "order_type": "stop", "status": "pending"}}
    fail_count: 1
    behavior:
      mode: once
