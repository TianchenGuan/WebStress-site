variant_id: amazon_reorder_past_item__order_twin
base_task_id: amazon_reorder_past_item
target_primitive: state_tracking
description: "Three near-duplicate decoy orders for the target Organic Green Tea 100-Pack product name sit in order history with near-identical timestamps; sort or scan-by-name cannot uniquely target the canonical past order. The first two cancel POST calls silently no-op so any reflex cancel against a decoy order would not actually cancel state — the agent must verify before continuing."
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: order
      product_name: Organic Green Tea 100-Pack
      quantity: 1
      unit_price: 22.49
      status: delivered
      placed_hours_ago: 720
      estimated_delivery: Delivered 30 days ago
    - type: order
      product_name: Organic Green Tea 100-Pack
      quantity: 1
      unit_price: 22.49
      status: delivered
      placed_hours_ago: 721
      estimated_delivery: Delivered 30 days ago
    - type: order
      product_name: Organic Green Tea 100-Pack
      quantity: 1
      unit_price: 22.49
      status: delivered
      placed_hours_ago: 722
      estimated_delivery: Delivered 30 days ago
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/orders/*/cancel'
    methods: [POST]
    fail_count: 2
    response_body:
      order:
        id: order_fake_retry
        items: []
        shipping_address_id: ''
        payment_method_id: ''
        subtotal: 0.0
        shipping_cost: 0.0
        tax: 0.0
        total: 0.0
        status: cancelled
        placed_at: '2026-04-26T08:00:00+00:00'
        estimated_delivery: ''
        promo_code: null
        discount: 0.0
    behavior: { mode: once }
