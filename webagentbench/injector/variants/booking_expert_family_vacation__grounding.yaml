variant_id: booking_expert_family_vacation__grounding_v1
base_task_id: booking_expert_family_vacation
target_primitive: grounding
description: >
  Two near-miss decoy family hotels in Barcelona share the target's name prefix
  and amenities so the agent must compare exact names/locations to pick the
  correct property. ARIA labels are also scrambled and CSS shuffled to remove
  weak structural cues. The combination forces grounding via visible facts
  (name, address, review counts) rather than aria-label heuristics.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: Hotel del Mar Barcelona Beachfront
      city: Barcelona
      country: Spain
      property_type: Hotel
      star_rating: 4
      review_score: 8.5
      review_count: 3120
      price: 218.0
      description: Nearly identical property name with slightly different review profile and price.
    - type: property
      name: Hotel del Mar Barceloneta Suites
      city: Barcelona
      country: Spain
      property_type: Hotel
      star_rating: 4
      review_score: 8.6
      review_count: 4180
      price: 205.0
      description: Same name prefix and neighborhood; tempts a name-only match.
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label], [role=button]'
    behavior:
      mode: persistent
- layer: client
  params:
    action: inject_visual_noise
    mutations:
    - selector: '.bk-card-body'
      behavior: shuffle_child_order
      probability: 0.3
