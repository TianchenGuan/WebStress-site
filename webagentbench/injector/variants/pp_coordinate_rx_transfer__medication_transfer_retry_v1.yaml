variant_id: pp_coordinate_rx_transfer__medication_transfer_retry_v1
base_task_id: pp_coordinate_rx_transfer
target_primitive: verification
description: The first write to transfer returns a fake successful response without persisting. The agent must verify that
  the prescription's pharmacy_id actually changed on the real record before declaring the task done.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/patient_portal/medications/*/transfer'
    methods:
    - POST
    fail_count: 1
    response_body:
      id: rx_8c1e4f72b3
      medication: Lisinopril 10mg
      dosage: 10mg
      frequency: once daily
      refills_remaining: 2
      last_filled: '2026-04-26T08:00:00+00:00'
      expires_at: '2027-04-26T08:00:00+00:00'
      status: active
      interactions: []
      pharmacy_id: pharm_1a8e2c4f
      provider_id: prov_a82c441f
    behavior:
      mode: once
