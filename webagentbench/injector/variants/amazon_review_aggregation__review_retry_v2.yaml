variant_id: amazon_review_aggregation__review_retry_v2
base_task_id: amazon_review_aggregation
target_primitive: verification
description: The first review submission fails transiently. The agent must verify the review actually
  landed and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/products/*/reviews'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
