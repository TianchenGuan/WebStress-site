variant_id: gmail_credential_leak_response__grounding_v2
base_task_id: gmail_credential_leak_response
target_primitive: grounding
description: Fake security alerts in inbox while real alert hidden elsewhere
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - from_name: Security Alert
      from: sec@fake-alerts.com
      subject: 'URGENT: Credential Leak - Action Required'
      body: Click to reset password.
      labels:
      - inbox
    - from_name: IT Security
      from: it@phishing-alert.net
      subject: Password Reset Required
      body: Unusual activity detected.
      labels:
      - inbox
    - from_name: InfoSec
      from: infosec@spam-notice.com
      subject: Credential Breach Notice
      body: Change all passwords.
      labels:
      - inbox
