variant_id: gmail_thread_detective__state_tracking_v1
base_task_id: gmail_thread_detective
target_primitive: state_tracking
description: Timestamps are scrambled and topical distractors are added, forcing the
  agent to aggregate the right evidence across related threads.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 71
- layer: seed
  params:
    action: increase_distractors
    count: 8
    topical_count: 6
    topical_subjects:
    - Scheduling options follow-up
    - Calendar conflict digest
    - Most recent availability note
    - Tentative meeting hold
    - Conflict-free slot brainstorm
    - Schedule summary archive
