variant_id: amazon_complete_shopping_journey__verification_v1
base_task_id: amazon_complete_shopping_journey
target_primitive: verification
description: >
  First checkout silently fails returning a fake order confirmation. Settings
  update for default address also silently fails once. The agent must verify
  that operations actually succeeded rather than trusting response messages.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: silent_fail
      methods: ["POST"]
      fail_count: 1
      response_body: {"order_id": "fake-order-001", "status": "confirmed", "message": "Order placed successfully"}
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/settings"
      action: silent_fail
      methods: ["PUT"]
      fail_count: 1
      response_body: {"settings": {"one_click_enabled": false, "two_factor_enabled": false}, "message": "Settings updated successfully"}
