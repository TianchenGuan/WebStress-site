variant_id: rh_cancel_pending_order__verification_v1
base_task_id: rh_cancel_pending_order
target_primitive: verification
description: >
  Silent fail on the first cancellation request for the MSFT limit order. The
  server returns a fake success with status "cancelled", but the order remains
  pending. Agent must verify the order status and retry the cancellation.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders/*/cancel"
    methods: ["POST"]
    response_body:
      order:
        id: "{target.order_ids[0]}"
        symbol: "MSFT"
        side: "buy"
        order_type: "limit"
        status: "cancelled"
        cancelled_at: "2026-04-02T14:30:00Z"
    fail_count: 1
    behavior:
      mode: once
