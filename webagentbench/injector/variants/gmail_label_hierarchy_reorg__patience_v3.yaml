variant_id: gmail_label_hierarchy_reorg__patience_v3
base_task_id: gmail_label_hierarchy_reorg
target_primitive: patience
description: 'Progressive delays on label ops: 1s→3s→5s as task progresses. Agent
  must maintain patience as system slows.'
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/labels**'
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 1000
      - after_call: 3
        delay_ms: 3000
      - after_call: 8
        delay_ms: 5000
