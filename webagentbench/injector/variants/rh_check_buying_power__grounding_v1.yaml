variant_id: rh_check_buying_power__grounding_v1
base_task_id: rh_check_buying_power
target_primitive: grounding
description: >
  Confusing positions with similar-looking tickers to AAPL are added to the
  portfolio, and decoy notifications about buying power changes distract the
  agent. ARIA scrambling makes the order form harder to locate.
injections:
- layer: seed
  params:
    action: add_confusing_positions
    positions:
      - symbol: APLE
        name: "Apple Hospitality REIT"
        price: 15.82
        quantity: 50
        cost_basis: 14.10
      - symbol: AAPL
        name: "Apple Inc (ADR)"
        price: 191.55
        quantity: 0
        cost_basis: 0
- layer: seed
  params:
    action: add_decoy_notifications
    decoys:
      - type: transfer_complete
        title: "Deposit Complete"
        message: "Your $500.00 deposit has been credited. Updated buying power: $5,823.47."
      - type: margin_call
        title: "Buying Power Adjustment"
        message: "Your buying power has been temporarily adjusted due to recent volatility."
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label]'
    behavior:
      mode: persistent
