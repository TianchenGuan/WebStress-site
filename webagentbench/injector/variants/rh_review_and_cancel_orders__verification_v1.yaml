variant_id: rh_review_and_cancel_orders__verification_v1
base_task_id: rh_review_and_cancel_orders
target_primitive: verification
description: >
  The first order-cancellation request returns fake success but the order
  remains pending. The agent must verify the order status changed to cancelled
  and retry if it is still pending.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders/*/cancel"
    methods: ["POST"]
    response_body: {"order": {"id": "fake_cancel", "status": "cancelled"}}
    fail_count: 1
    behavior:
      mode: once
