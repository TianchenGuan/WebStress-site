variant_id: rh_live_buy_the_dip__grounding_v1
base_task_id: rh_live_buy_the_dip
target_primitive: grounding
description: >
  Noise orders for AAPL at various price points and a misleading alert
  suggesting a market buy distract from the specific limit-buy-at-$180
  GTC strategy. The agent must place the correct order type and price.
injections:
- layer: seed
  params:
    action: add_noise_orders
    orders:
    - symbol: AAPL
      side: buy
      order_type: market
      quantity: 5
      status: filled
    - symbol: AAPL
      side: buy
      order_type: limit
      quantity: 3
      limit_price: "185.00"
      time_in_force: day
      status: pending
    - symbol: TSLA
      side: buy
      order_type: limit
      quantity: 2
      limit_price: "240.00"
      time_in_force: gtc
      status: pending
- layer: seed
  params:
    action: add_misleading_alert
    alerts:
    - symbol: AAPL
      condition: below
      target_price: 185.00
      message: "AAPL near dip territory — your existing limit at $185 is close to filling"
