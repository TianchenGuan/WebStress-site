variant_id: rh_live_watch_and_buy__quote_delay
base_task_id: rh_live_watch_and_buy
target_primitive: patience
description: Quote refreshes lag behind for several polls. The agent must wait for the live move instead
  of acting on the initial stale-looking quote.
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/robinhood/prices**'
    delay_ms: 3300
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 1650
      - after_call: 3
        delay_ms: 3300
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/robinhood/stocks/*/chart**'
    delay_ms: 3300
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 1650
      - after_call: 3
        delay_ms: 3300
