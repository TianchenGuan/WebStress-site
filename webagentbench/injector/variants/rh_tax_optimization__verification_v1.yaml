variant_id: rh_tax_optimization__verification_v1
base_task_id: rh_tax_optimization
target_primitive: verification
description: >
  The first sell order for tax-loss harvesting returns a fake success
  with a plausible filled order, but the order is never placed. Agent
  must verify the order appears in its order history and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_order_001", "side": "sell", "status": "filled", "symbol": "INTC", "quantity": 50}}
    fail_count: 1
    behavior:
      mode: once
