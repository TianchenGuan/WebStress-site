variant_id: rh_create_watchlist__planning_v1
base_task_id: rh_create_watchlist
target_primitive: planning
description: >
  Decoy notifications about watchlist updates and limits add confusion.
  The agent must plan to create the correct new watchlist despite
  misleading notifications suggesting existing watchlists or limits.
injections:
- layer: seed
  params:
    action: add_decoy_notifications
    count: 3
    notifications:
      - title: "Watchlist 'Dividend Aristocrats' updated"
        body: "KO was added to your Dividend Aristocrats watchlist."
        category: watchlist
      - title: "Dividend Kings ETF alert"
        body: "NOBL (Dividend Kings ETF) is up 2.3% today."
        category: market
      - title: "Watchlist limit reached reminder"
        body: "You have 4 of 5 watchlists. Consider consolidating."
        category: account
