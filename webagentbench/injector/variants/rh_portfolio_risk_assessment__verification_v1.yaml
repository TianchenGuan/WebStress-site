variant_id: rh_portfolio_risk_assessment__verification_v1
base_task_id: rh_portfolio_risk_assessment
target_primitive: verification
description: >
  The first sell order submission returns fake success but the order is not
  actually placed. The agent must verify the order book and retry to ensure
  the concentration-reduction sell was truly executed.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    response_body: {"success": true, "order": {"id": "fake_001", "status": "filled", "side": "sell"}}
    fail_count: 1
    behavior:
      mode: once
