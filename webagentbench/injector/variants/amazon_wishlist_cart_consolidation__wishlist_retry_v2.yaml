variant_id: amazon_wishlist_cart_consolidation__wishlist_retry_v2
base_task_id: amazon_wishlist_cart_consolidation
target_primitive: backtracking
description: The first wishlist mutation fails transiently. The agent must verify the wishlist state and
  retry instead of moving on.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/wishlist/**'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
