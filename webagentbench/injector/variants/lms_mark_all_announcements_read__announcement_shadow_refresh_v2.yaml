variant_id: lms_mark_all_announcements_read__announcement_shadow_refresh_v2
base_task_id: lms_mark_all_announcements_read
target_primitive: grounding
description: Shadow announcement records plus a later correction compete for attention,
  so the agent must ground on the exact LMS target before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    # is_read: true so the canonical_diff's "preserve already-read
    # announcements" invariant doesn't fire when the agent legitimately
    # marks all real unread announcements as read.
    - type: announcement
      title: Course update follow-up
      body: Archived clarification that does not replace the active announcement.
      priority: normal
      is_read: true
    - type: announcement
      title: Course update correction
      body: Earlier logistics note for a prior announcement batch.
      priority: urgent
      is_read: true
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    type: announcement
    is_read: true
