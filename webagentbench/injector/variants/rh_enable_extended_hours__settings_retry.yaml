variant_id: rh_enable_extended_hours__settings_retry
base_task_id: rh_enable_extended_hours
target_primitive: verification
description: First write returns a fake successful response without persisting. The agent must verify the change actually
  took effect on the real backend (e.g., re-fetch the entity and check the field) before declaring done.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/robinhood/settings'
    methods:
    - PUT
    fail_count: 1
    response_body:
      id: settings_1
      display_theme: light
      default_order_type: market
      reinvest_dividends: true
      extended_hours_enabled: true
      biometric_login: false
      two_factor_method: none
      notification_prefs: {}
    behavior:
      mode: once
