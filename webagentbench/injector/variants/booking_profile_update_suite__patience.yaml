variant_id: booking_profile_update_suite__patience_v1
base_task_id: booking_profile_update_suite
target_primitive: patience
description: Each profile field update triggers a slow save with a 3-second spinner,
  and the page reloads between updates, testing the agent's patience across multiple
  sequential edits.
injections:
- layer: server
  params:
    action: slow_responses
    endpoints:
    - path_pattern: "account$"
      method: PUT
      delay_ms: 3000
    - path_pattern: "account$"
      method: GET
      delay_ms: 2000
