variant_id: booking_settings_overhaul__exploration_v1
base_task_id: booking_settings_overhaul
target_primitive: exploration
description: Settings are reorganized into unfamiliar tab groupings, requiring the
  agent to explore multiple sections to find each setting.
injections:
- layer: client
  params:
    action: reorganize_sections
    behavior:
      shuffle_setting_groups: true
      rename_tabs: true
      hide_section_headers: true
