variant_id: rh_transfer_and_withdraw__planning_v1
base_task_id: rh_transfer_and_withdraw
target_primitive: planning
description: >
  Scrambled order timestamps and distractor notifications about
  account balances create a confusing timeline. Agent must plan its
  approach: check the actual cash balance, identify the correct linked
  bank, and compute the withdrawal amount without relying on
  misleading notification content.
injections:
- layer: server
  params:
    action: scramble_order_timestamps
    seed: 42
- layer: server
  params:
    action: inject_distractor_notifications
    count: 3
    theme: "balance_update"
