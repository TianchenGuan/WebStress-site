variant_id: gmail_label_workflow_setup__verification_v1
base_task_id: gmail_label_workflow_setup
target_primitive: verification
description: Label and filter creation silently fails, requiring verification before
  proceeding
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/labels'
    methods:
    - POST
    response_body:
      label:
        id: fake_label
        name: created
    fail_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/filters'
    methods:
    - POST
    response_body:
      filter:
        id: fake_filter
        name: Fake filter
        query: from:fake@example.test
        from_addresses:
        - fake@example.test
        subject_keywords: []
        label_requirements: []
        has_attachment: null
        add_labels: []
        archive: false
        mark_read: false
        forward_to: null
        star: false
        never_spam: false
    fail_count: 1
    behavior:
      mode: once
