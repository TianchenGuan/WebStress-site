variant_id: gmail_new_hire_setup__planning_v1
base_task_id: gmail_new_hire_setup
target_primitive: planning
description: Progressive delays force planning around which operations to batch vs
  sequence.
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/labels'
    delay_ms: 3000
    behavior:
      mode: progressive
      stages:
      - after_call: 1
        delay_ms: 1000
      - after_call: 2
        delay_ms: 2000
      - after_call: 3
        delay_ms: 3000
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/filters'
    delay_ms: 3000
    behavior:
      mode: progressive
      stages:
      - after_call: 1
        delay_ms: 1500
      - after_call: 2
        delay_ms: 2500
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/contacts'
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - after_call: 1
        delay_ms: 1000
      - after_call: 2
        delay_ms: 2000
