variant_id: rh_sell_loser_buy_winner__trade_retry
base_task_id: rh_sell_loser_buy_winner
target_primitive: backtracking
description: The first order submission fails transiently. The agent must verify the order exists and
  retry if it does not.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/robinhood/orders'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary Robinhood write failure. Retry the action.
    behavior:
      mode: once
