variant_id: amazon_strategic_cart_overhaul__state_tracking_v1
base_task_id: amazon_strategic_cart_overhaul
target_primitive: state_tracking
description: 'Cart GET returns stale data showing an empty cart after items are removed, and the first cart add silently fails.
  The agent must carefully verify actual cart contents and retry failed additions.

  '
injections:
- layer: network
  params:
    url_pattern: '**/api/env/amazon/cart'
    action: stale_data
    methods:
    - GET
    stale_count: 2
    stale_body:
      items: []
      totals:
        subtotal: 0
        shipping: 0
        tax: 0
        discount: 0
        gift_card_applied: 0
        total: 0
- layer: network
  params:
    url_pattern: '**/api/env/amazon/cart/add'
    action: silent_fail
    methods:
    - POST
    fail_count: 1
    response_body:
      cart_item:
        id: item_3c8f1a4d
        product_id: prod_a8c4d219
        product_name: Pending cart add
        quantity: 1
        unit_price: 0.0
        variant_selections: {}
        added_at: '2026-04-26T08:00:00+00:00'
