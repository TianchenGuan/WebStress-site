variant_id: booking_frontier_family_planner__property_shadow_v2
base_task_id: booking_frontier_family_planner
target_primitive: grounding
description: Search results include a same-city sibling property with a nearly identical name and overlapping
  amenities. The agent must still book or compare the exact target hotel.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: '{target.bcn_winner_name} Suites'
      city: Barcelona
      country: Spain
      price: 260.0
      review_score: 8.4
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
