variant_id: booking_expert_settings_and_security__settings_retry_v2
base_task_id: booking_expert_settings_and_security
target_primitive: verification
description: The first settings update fails transiently. The agent must confirm the account settings
  changed and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/settings'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
