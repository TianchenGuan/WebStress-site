variant_id: rh_setup_recurring_investment__verification_v1
base_task_id: rh_setup_recurring_investment
target_primitive: verification
description: >
  The first recurring investment creation call returns a fake success
  with a plausible recurring investment object, but nothing is actually
  scheduled. Agent must check the recurring investments list to confirm
  setup and retry when the entry is missing.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/recurring"
    methods: ["POST"]
    response_body: {"recurring": {"id": "fake_ri_001", "symbol": "VOO", "amount": 200, "frequency": "monthly", "status": "active"}}
    fail_count: 1
    behavior:
      mode: once
