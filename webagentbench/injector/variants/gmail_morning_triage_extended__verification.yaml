variant_id: gmail_morning_triage_extended__verification_v1
base_task_id: gmail_morning_triage_extended
target_primitive: verification
description: Multiple action types silently fail requiring verification at each step
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/emails/*/star'
    methods:
    - POST
    response_body:
      email:
        id: fake
        is_starred: true
    fail_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/send'
    methods:
    - POST
    response_body:
      email:
        id: fake_sent
        subject: sent
        from: me@thornton.com
        to: []
        cc: []
        bcc: []
        body: ''
        labels:
        - sent
        is_read: true
        is_starred: false
        thread_id: fake_thread
        timestamp: '2026-03-30T00:00:00Z'
    fail_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/labels'
    methods:
    - POST
    response_body:
      label:
        id: fake_label
        name: created
    fail_count: 1
    behavior:
      mode: once
