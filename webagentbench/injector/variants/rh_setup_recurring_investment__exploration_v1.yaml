variant_id: rh_setup_recurring_investment__exploration_v1
base_task_id: rh_setup_recurring_investment
target_primitive: exploration
description: >
  Distractor notifications advertise competing investment products and
  suggest alternative strategies. Agent must explore the recurring
  investment setup flow without getting sidetracked by the noise.
injections:
- layer: seed
  params:
    action: add_decoy_notifications
    count: 4
    theme: "investment_recommendation"
    symbols: ["SPY", "QQQ", "VTI"]
- layer: server
  params:
    action: inject_distractor_notifications
    count: 3
    theme: "recurring_setup_promo"
