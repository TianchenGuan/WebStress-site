variant_id: rh_notification_triage__verification_v1
base_task_id: rh_notification_triage
target_primitive: verification
description: >
  Silent fail on the first mark-as-read call and the first price alert
  creation. Server returns fake success for both but neither persists.
  Agent must verify notification read status and alert existence, then retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/notifications/*/read"
    methods: ["POST"]
    response_body:
      notification:
        id: "fake_notification_001"
        type: "system"
        title: "Notification"
        message: "Marked read"
        timestamp: "2026-04-02T14:30:00Z"
        is_read: true
        action_url: null
    fail_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/alerts"
    methods: ["POST"]
    response_body:
      alert:
        id: "fake_alert_001"
        symbol: "AAPL"
        condition: "above"
        target_price: "205.00"
        status: "active"
        created_at: "2026-04-02T14:30:00Z"
        triggered_at: null
    fail_count: 1
    behavior:
      mode: once
