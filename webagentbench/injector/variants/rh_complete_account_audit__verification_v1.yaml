variant_id: rh_complete_account_audit__verification_v1
base_task_id: rh_complete_account_audit
target_primitive: verification
description: >
  Silent fail on the first mark-all-as-read request. The server returns a fake
  success claiming all 8 notifications are now read, but they remain unread.
  Agent must verify notification status and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/notifications/read-all"
    methods: ["POST"]
    response_body:
      success: true
      notifications_marked: 8
    fail_count: 1
    behavior:
      mode: once
