variant_id: booking_settings_overhaul__settings_retry
base_task_id: booking_settings_overhaul
target_primitive: verification
description: The first settings update fails transiently. The agent must confirm the new currency, language,
  and notification settings actually stuck.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/settings'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary booking API failure. Retry the action.
    behavior:
      mode: once
