variant_id: booking_expert_message_concierge__message_retry_v2
base_task_id: booking_expert_message_concierge
target_primitive: backtracking
description: The first hotel-message send fails transiently. The agent must verify the message landed
  and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/messages'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
