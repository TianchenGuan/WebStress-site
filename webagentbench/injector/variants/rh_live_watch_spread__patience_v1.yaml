variant_id: rh_live_watch_spread__patience_v1
base_task_id: rh_live_watch_spread
target_primitive: patience
description: >
  Progressive delays on the positions endpoint slow TSLA price refreshes,
  and the first market buy attempt returns a 503. The agent must patiently
  wait through sluggish updates to observe the decline-then-recovery
  pattern and retry the buy at the reversal point.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/positions"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 2
      - delay_ms: 3000
        after_call: 5
      - delay_ms: 2000
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
