variant_id: lms_study_around_exams__calendar_update_shadow_v2
base_task_id: lms_study_around_exams
target_primitive: state_tracking
description: Relevant LMS state is updated after the first clue, so the agent must
  keep tracking the current object and not anchor on the initial snapshot.
injections:
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    type: announcement
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/calendar**'
    stale_body:
      items:
      - id: evt_stale_1
        course_id: course_stale
        title: 'Midterm Exam (archived section)'
        event_type: exam
        start_datetime: '2000-01-15T09:00:00+00:00'
        end_datetime: '2000-01-15T11:00:00+00:00'
        location: 'Room 000 (archived)'
        recurrence: none
        recurrence_end_date: null
      - id: evt_stale_2
        course_id: course_stale
        title: 'Office Hours (legacy)'
        event_type: office_hours
        start_datetime: '2000-01-10T14:00:00+00:00'
        end_datetime: '2000-01-10T15:00:00+00:00'
        location: 'TBD'
        recurrence: none
        recurrence_end_date: null
    stale_count: 1
    behavior:
      mode: once
