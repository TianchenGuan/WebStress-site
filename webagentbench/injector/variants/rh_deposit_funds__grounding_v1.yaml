variant_id: rh_deposit_funds__grounding_v1
base_task_id: rh_deposit_funds
target_primitive: grounding
description: >
  Transfer-related labels are swapped in the UI ("Deposit" reads "Withdraw"
  and vice versa), and decoy notifications about recent withdrawals create
  confusion. Agent must ground its actions on the actual UI behavior rather
  than misleading labels.
injections:
- layer: client
  params:
    action: swap_labels
    selector_a: "button.rh-order-form__tab:nth-of-type(1)"
    selector_b: "button.rh-order-form__tab:nth-of-type(2)"
- layer: seed
  params:
    action: add_decoy_notifications
    count: 3
    notifications:
      - title: "Withdrawal completed"
        body: "$500.00 was withdrawn to Chase Checking (****4521)."
        category: transfer
      - title: "Deposit reversed"
        body: "Your recent $500 deposit was returned by your bank."
        category: transfer
      - title: "Bank connection updated"
        body: "Chase Checking (****4521) routing number was re-verified."
        category: account
