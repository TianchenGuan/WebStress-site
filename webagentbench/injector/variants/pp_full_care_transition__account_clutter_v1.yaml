variant_id: pp_full_care_transition__account_clutter_v1
base_task_id: pp_full_care_transition
target_primitive: exploration
description: The portal is cluttered with older lookalike records across messages, claims, medications, pharmacies, and screenings.
  The agent must explore the full account state without confusing archival noise for the seeded task signals. Decoys include
  boundary-case lookalikes (matching entity type, similar timestamps, and near-threshold values) that force the agent to apply
  strict filters rather than match by category.
