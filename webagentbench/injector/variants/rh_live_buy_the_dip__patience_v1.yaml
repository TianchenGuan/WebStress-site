variant_id: rh_live_buy_the_dip__patience_v1
base_task_id: rh_live_buy_the_dip
target_primitive: patience
description: >
  Progressive delays on AAPL price polling and order status checks slow
  the dip-detection loop. The agent must keep checking for the fill
  despite increasing latency, not cancel the order prematurely.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 2
      - delay_ms: 3500
        after_call: 5
      - delay_ms: 2500
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/orders"
    methods: [GET]
    delay_ms: 1500
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1000
        after_call: 1
      - delay_ms: 3000
        after_call: 4
      - delay_ms: 2000
