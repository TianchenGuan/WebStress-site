variant_id: gmail_action_item_extraction__session_expiry
base_task_id: gmail_action_item_extraction
target_primitive: verification
description: >
  The first send attempt returns a transient 401 authorization challenge without
  persisting the message. Agent must verify the email was not sent and retry.
injections:
  - layer: network
    params:
      action: error_then_success
      url_pattern: "**/api/env/gmail/send"
      methods: ["POST"]
      error_count: 1
      error_status: 401
      error_body:
        error: "Session expired. Please retry after re-authentication."
        status: 401
        retryable: true
      behavior:
        mode: once
