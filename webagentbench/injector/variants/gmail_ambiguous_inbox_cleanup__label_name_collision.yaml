variant_id: gmail_ambiguous_inbox_cleanup__label_name_collision
base_task_id: gmail_ambiguous_inbox_cleanup
target_primitive: grounding
description: The mailbox already contains near-match project labels and a promotional email that reuses
  the project name. The agent must create and apply the exact project label rather than relying on the
  wrong lookalike.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: label
      name: Project/Nightingale-Archive
    - type: label
      name: Projects/Nightingale
    - from_name: Thornton Digest
      from: digest@newsletter.thornton.com
      subject: Nightingale partner roundup and sponsor offers
      body: Promotional partner roundup for anyone following Nightingale. This is not an internal project
        thread.
      labels:
      - inbox
      - promotions
