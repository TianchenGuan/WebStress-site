variant_id: rh_recurring_optimization__verification_v1
base_task_id: rh_recurring_optimization
target_primitive: verification
description: >
  The first recurring-investment pause request returns fake success but the
  investment remains active. The agent must verify the status actually changed
  and retry if the recurring investment is still running.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/recurring/*"
    methods: ["PUT", "PATCH"]
    response_body: {"recurring": {"id": "fake_rec", "status": "paused"}}
    fail_count: 1
    behavior:
      mode: once
