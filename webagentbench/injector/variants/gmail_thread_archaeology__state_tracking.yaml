variant_id: gmail_thread_archaeology__state_tracking_v1
base_task_id: gmail_thread_archaeology
target_primitive: state_tracking
description: Timestamps are scrambled and topical distractors are added, forcing the
  agent to aggregate the right evidence across related threads.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 71
- layer: seed
  params:
    action: increase_distractors
    count: 8
    topical_count: 6
    topical_subjects:
    - Older action-item recap
    - Thread notes from last week
    - Historical deadline reminder
    - Delegation follow-up draft
    - Archived action summary
    - Reminder about pending owner
