variant_id: booking_expert_account_migration__account_retry_v2
base_task_id: booking_expert_account_migration
target_primitive: verification
description: The first account-profile write fails transiently. The agent must verify the profile change
  actually persisted.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/account'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
