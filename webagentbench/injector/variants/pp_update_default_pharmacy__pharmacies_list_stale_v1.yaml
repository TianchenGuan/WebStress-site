variant_id: pp_update_default_pharmacy__pharmacies_list_stale_v1
base_task_id: pp_update_default_pharmacy
target_primitive: grounding
description: The first pharmacy list response is stale and omits the relevant pharmacy. The agent must refresh the pharmacy list before selecting the transfer or default target.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/pharmacies**'
    stale_body:
      items:
      - id: pharm_stale_1
        name: 'Legacy Corner Drug (archived)'
        address: '1 Old Mill Road, Archived City, AA 00000'
        phone: (555) 000-0001
        is_default: false
        is_mail_order: false
        dispensing_fee: '0.00'
        cost_per_90day_supply: null
    stale_count: 1
    behavior:
      mode: once
