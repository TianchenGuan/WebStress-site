variant_id: amazon_multi_order_workflow__patience_v1
base_task_id: amazon_multi_order_workflow
target_primitive: state_tracking
description: >
  The checkout endpoint has a 4-second delay on every request. The agent
  must wait patiently through multiple slow checkouts without abandoning
  the workflow.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: delay
      delay_ms: 4000
