variant_id: amazon_wishlist_stock_audit__cart_shadow_v2
base_task_id: amazon_wishlist_stock_audit
target_primitive: state_tracking
description: "Three near-duplicate cart rows for the in-stock wishlist target share product_name and variant_selections, so the agent cannot disambiguate by name when reconciling cart with wishlist. The first two cart-update PUT calls silently no-op so the agent must verify the cart row actually changed before reporting done."
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: cart_item
      product_name: Wireless Charging Pad
      brand: ChargeMax
      category: Electronics
      quantity: 1
      unit_price: 29.99
      variant_selections: {}
    - type: cart_item
      product_name: Wireless Charging Pad
      brand: ChargeMax
      category: Electronics
      quantity: 1
      unit_price: 29.99
      variant_selections: {}
    - type: cart_item
      product_name: Wireless Charging Pad
      brand: ChargeMax
      category: Electronics
      quantity: 1
      unit_price: 29.99
      variant_selections: {}
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/cart/*'
    methods: [PUT]
    fail_count: 2
    response_body:
      cart_item:
        id: cart_fake_retry
        product_id: prod_fake_retry
        product_name: Pending cart update
        quantity: 1
        unit_price: 0.0
        variant_selections: {}
        added_at: '2026-04-26T08:00:00+00:00'
    behavior: { mode: once }
