variant_id: amazon_wishlist_stock_audit__cart_shadow_v2
base_task_id: amazon_wishlist_stock_audit
target_primitive: state_tracking
description: Color-variant siblings of in-stock wishlist items share brand,
  rating, and thumbnail AND land directly on the wishlist, so the agent has
  to distinguish the flagged-in-stock SKU from a near-identical neighbour
  already in the same wishlist view.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: product
      name: Wireless Charging Pad - Midnight Black
      brand: ChargeMax
      seller: ChargeMax
      category: Electronics
      price: 30.99
      rating: 4.5
      review_count: 310
      in_stock: true
      wishlist: true
      match_image_of: Wireless Charging Pad
      description: Color-variant sibling (Midnight Black) seeded onto the
        wishlist. Identical branding and thumbnail as the in-stock target pad,
        but a distinct SKU that must not be bought as a substitute.
    - type: product
      name: Yoga Resistance Band Set - Home Gym Edition
      brand: Endurafit
      seller: Endurafit
      category: Sports & Outdoors
      price: 19.49
      rating: 4.4
      review_count: 195
      in_stock: true
      wishlist: true
      match_image_of: Yoga Resistance Band Set
      description: The 'Home Gym Edition' sibling of the resistance-band set
        sitting directly on the wishlist; same brand and thumbnail, distinct SKU.
