variant_id: rh_live_dual_alert_decision__patience_v1
base_task_id: rh_live_dual_alert_decision
target_primitive: patience
description: >
  Progressive delays on META price polling and alert reads slow the
  dual-alert monitoring loop. The agent must patiently wait for one of
  the two alerts to trigger before deciding on the bull/bear action,
  not act prematurely on incomplete price data.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 2500
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 2
      - delay_ms: 4000
        after_call: 5
      - delay_ms: 2500
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/alerts"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1000
        after_call: 1
      - delay_ms: 3000
        after_call: 4
      - delay_ms: 2000
