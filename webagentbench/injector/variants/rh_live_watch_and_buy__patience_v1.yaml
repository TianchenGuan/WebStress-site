variant_id: rh_live_watch_and_buy__patience_v1
base_task_id: rh_live_watch_and_buy
target_primitive: patience
description: >
  Progressive delays on the positions endpoint slow down AAPL price
  refreshes, and the order endpoint returns a 503 on the first buy
  attempt. The agent must wait patiently for price updates and retry
  the market buy when the dip below $182 arrives.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/positions"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 3
      - delay_ms: 3000
        after_call: 6
      - delay_ms: 1500
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/robinhood/orders"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
