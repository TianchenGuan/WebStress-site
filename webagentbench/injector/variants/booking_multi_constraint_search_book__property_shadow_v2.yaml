variant_id: booking_multi_constraint_search_book__property_shadow_v2
base_task_id: booking_multi_constraint_search_book
target_primitive: grounding
description: Search results include a same-city sibling property with a nearly identical name and overlapping
  amenities. The agent must still book or compare the exact target hotel.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: '{target.property_name} Suites'
      city: London
      country: United Kingdom
      price: 254.8
      review_score: 8.9
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
