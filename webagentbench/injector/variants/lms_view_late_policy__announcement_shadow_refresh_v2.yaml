variant_id: lms_view_late_policy__announcement_shadow_refresh_v2
base_task_id: lms_view_late_policy
target_primitive: grounding
description: Shadow announcement records plus a later correction compete for attention,
  so the agent must ground on the exact LMS target before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    # Explicit historical posted_at keeps decoys strictly older than the
    # base seed's announcements (posted_at = ctx.now - 0..14 days). Without
    # this, the injector falls back to `base_time + N minutes`, which made
    # decoys look newer and broke "latest announcement" grounding.
    - type: announcement
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: Course update follow-up
      body: Archived clarification that does not replace the active announcement.
      priority: normal
      posted_at: '2025-10-01T10:00:00+00:00'
    - type: announcement
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: Course update correction
      body: Earlier logistics note for a prior announcement batch.
      priority: urgent
      posted_at: '2025-09-15T10:00:00+00:00'
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_id: '{target.target_course_id}'
    type: announcement
