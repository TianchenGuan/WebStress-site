variant_id: amazon_cart_budget_limit__checkout_retry
base_task_id: amazon_cart_budget_limit
target_primitive: planning
description: Checkout returns a transient 503 on the first attempt. The agent must preserve the chosen cart and retry the
  purchase.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/checkout'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Service temporarily unavailable. (HTTP 503)
    behavior:
      mode: once
