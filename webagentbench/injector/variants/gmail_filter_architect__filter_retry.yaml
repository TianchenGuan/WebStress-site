variant_id: gmail_filter_architect__filter_retry
base_task_id: gmail_filter_architect
target_primitive: backtracking
description: The first filter write fails transiently. The agent must confirm the filter exists and retry if needed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/filters**'
    methods:
    - POST
    - DELETE
    error_count: 1
    error_status: 503
    error_message: Service temporarily unavailable. (HTTP 503)
    behavior:
      mode: once
