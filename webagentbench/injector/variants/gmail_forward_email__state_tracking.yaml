variant_id: gmail_forward_email__state_tracking_v1
base_task_id: gmail_forward_email
target_primitive: state_tracking
description: >
  5 distractor emails injected with similar subjects to the target email.
  Agent must track which email is the correct one to forward and not
  confuse it with distractors.
injections:
- layer: server
  params:
    action: inject_distractor_emails
    count: 5
    subject_prefix: "Re: "
