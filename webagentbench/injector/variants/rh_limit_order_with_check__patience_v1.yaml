variant_id: rh_limit_order_with_check__patience_v1
base_task_id: rh_limit_order_with_check
target_primitive: patience
description: >
  Progressive delays on stock price lookups and order submission make the
  price-check-then-order workflow sluggish. The agent must wait patiently
  for each response rather than abandoning or re-submitting.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 1
      - delay_ms: 3000
        after_call: 3
      - delay_ms: 2000
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/robinhood/orders"
    methods: [POST]
    error_status: 503
    error_count: 2
    behavior:
      mode: once
      message: Order service temporarily unavailable
