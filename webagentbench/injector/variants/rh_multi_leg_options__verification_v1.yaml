variant_id: rh_multi_leg_options__verification_v1
base_task_id: rh_multi_leg_options
target_primitive: verification
description: >
  Silent fail on the first options order submission — server returns fake
  success with an iron condor confirmation, but the order is not recorded.
  Agent must verify the order status or positions and resubmit.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/options/orders"
    methods: ["POST"]
    response_body:
      order:
        id: "fake_ic_001"
        strategy: "iron_condor"
        status: "pending"
        created_at: "2026-04-02T14:30:00Z"
        filled_at: null
        legs:
          - side: "sell"
            option_type: "call"
            strike: "610.00"
            expiration: "2026-05-15"
            quantity: 1
            premium: "4.20"
          - side: "buy"
            option_type: "call"
            strike: "620.00"
            expiration: "2026-05-15"
            quantity: 1
            premium: "2.10"
          - side: "sell"
            option_type: "put"
            strike: "560.00"
            expiration: "2026-05-15"
            quantity: 1
            premium: "4.05"
          - side: "buy"
            option_type: "put"
            strike: "550.00"
            expiration: "2026-05-15"
            quantity: 1
            premium: "2.00"
    fail_count: 1
    behavior:
      mode: once
