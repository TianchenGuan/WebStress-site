variant_id: booking_expert_rebooking_workflow__property_shadow_v2
base_task_id: booking_expert_rebooking_workflow
target_primitive: grounding
description: Search results include a same-city sibling property with a nearly identical name and overlapping
  amenities. The agent must still book or compare the exact target hotel.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: Hotel Ibis Milan Centre Suites
      city: '{target.city}'
      country: Italy
      price: 124.8
      review_score: 7.8
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
