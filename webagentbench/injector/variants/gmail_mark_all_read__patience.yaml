variant_id: gmail_mark_all_read__patience_v1
base_task_id: gmail_mark_all_read
target_primitive: patience
description: Mark read endpoint returns transient errors requiring retry persistence
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/*/read'
    error_status: 503
    error_count: 3
    behavior:
      mode: once
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/emails'
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - after_call: 2
        delay_ms: 2000
      - after_call: 3
        delay_ms: 4000
