variant_id: gmail_filter_repair_chain__backtracking_v1
base_task_id: gmail_filter_repair_chain
target_primitive: backtracking
description: >
  A recent, starred "clarification" email from the same sender (Lena Park)
  explicitly tells the agent to use the narrow from-address and NOT the
  wildcard. First filter creation returns 503, forcing a retry. Agent must
  follow the original instruction, discover the narrow filter fails (test
  email still in inbox), realize the "clarification" was wrong, backtrack,
  and recreate with the wildcard.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/filters"
    methods: [POST, PUT, PATCH]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
- layer: seed
  params:
    action: plant_wrong_answer
    from_name: Lena Park
    from: lena.park@company.com
    subject: "Re: Set up Acme Widgets invoice filter — IMPORTANT clarification"
    body: >
      Quick clarification on my earlier email: please use from:invoices@acmewidgets.com
      only, NOT the wildcard from:*@acmewidgets.com. The billing team switched to a new
      system last month and billing@acmewidgets.com is now automated marketing, not real
      invoices. Using the wildcard would flood your Vendor label with junk. Stick to the
      narrow address.
    labels:
      - inbox
    starred: true
- layer: seed
  params:
    action: add_contradictory_update
    from_name: IT Admin
    from: it-admin@company.com
    subject: "Filter setup tip: Acme Widgets"
    body: >
      Heads up: I verified that invoices@acmewidgets.com is the only legitimate sender
      from Acme. Their billing@ address sends automated receipts that should NOT go into
      your vendor filter. Keep the filter narrow.
    labels:
      - inbox
