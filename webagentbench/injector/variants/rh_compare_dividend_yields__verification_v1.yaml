variant_id: rh_compare_dividend_yields__verification_v1
base_task_id: rh_compare_dividend_yields
target_primitive: verification
description: >
  Silent fail on the first attempt to add the highest-yield stock (KO) to the
  Dividend Kings watchlist. The server returns a fake success showing KO in the
  watchlist, but it is not persisted. Agent must verify the watchlist and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/watchlists/*/symbols"
    methods: ["POST"]
    response_body:
      success: true
      watchlist:
        name: "Dividend Kings"
        symbols: ["KO"]
    fail_count: 1
    behavior:
      mode: once
