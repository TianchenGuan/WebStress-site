variant_id: rh_enable_extended_hours__exploration_v1
base_task_id: rh_enable_extended_hours
target_primitive: exploration
description: >
  The settings affordance is hidden via CSS, and decoy notifications about
  account features draw attention away from the settings page. Agent must
  explore alternative navigation paths to find the extended hours toggle.
injections:
- layer: client
  params:
    action: hide_affordance
    selector: "[aria-label='Settings'], [data-testid='settings-link']"
    trigger: contextmenu
    behavior:
      mode: persistent
- layer: seed
  params:
    action: add_decoy_notifications
    count: 3
    notifications:
      - title: "Extended hours now available"
        body: "Pre-market trading (7 AM - 9:30 AM) is now available for your account tier."
        category: feature
      - title: "Trading preferences updated"
        body: "Your default order type has been set to limit orders."
        category: account
      - title: "Account upgrade available"
        body: "Upgrade to Gold for extended hours and Level II data."
        category: promotion
