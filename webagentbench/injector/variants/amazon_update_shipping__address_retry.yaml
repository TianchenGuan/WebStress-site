variant_id: amazon_update_shipping__address_retry
base_task_id: amazon_update_shipping
target_primitive: backtracking
description: The first address-save request fails with a transient 503. The agent must retry the save instead of assuming
  the new shipping address persisted.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/addresses**'
    methods:
    - POST
    - PUT
    error_count: 1
    error_status: 503
    error_message: Service temporarily unavailable. (HTTP 503)
    behavior:
      mode: once
