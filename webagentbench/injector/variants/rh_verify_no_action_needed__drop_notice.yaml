variant_id: rh_verify_no_action_needed__drop_notice
base_task_id: rh_verify_no_action_needed
target_primitive: verification
description: Notifications imply one recurring holding may be down more than 30%, but the recurring-investment
  page still shows no qualifying pause case. The agent must verify before acting.
injections:
- layer: seed
  params:
    action: add_decoy_notifications
    multiplier: 2
    decoys:
    - type: recurring_investment
      title: Recurring investment review suggested
      message: A portfolio rule flagged one scheduled buy for review after a large drawdown. Verify the
        actual recurring investments before pausing anything.
      is_read: false
    - type: price_alert
      title: SCHD drop watch
      message: A dividend ETF moved sharply today. This does not necessarily mean the recurring plan needs
        adjustment.
      is_read: false
- layer: server
  params:
    action: inject_distractor_notifications
    count: 5
    types: ['margin_call', 'price_alert']
