variant_id: rh_tax_optimization__state_tracking_v1
base_task_id: rh_tax_optimization
target_primitive: state_tracking
description: >
  Noise orders and misleading alerts inject extra transaction history
  that could confuse the wash sale analysis. Agent must track which
  positions truly have unrealized losses and which recent purchases
  create wash sale risk, ignoring the injected noise.
injections:
- layer: seed
  params:
    action: add_noise_orders
    count: 4
    side: "buy"
    symbols: ["INTC", "BA", "NFLX", "META"]
- layer: seed
  params:
    action: add_misleading_alert
    alerts:
      - symbol: "INTC"
        condition: "below"
        target_price: 20.00
      - symbol: "BA"
        condition: "below"
        target_price: 150.00
