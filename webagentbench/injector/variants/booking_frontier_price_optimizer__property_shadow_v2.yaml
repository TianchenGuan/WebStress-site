variant_id: booking_frontier_price_optimizer__property_shadow_v2
base_task_id: booking_frontier_price_optimizer
target_primitive: grounding
description: Search results include a same-city sibling property with a nearly identical name and overlapping
  amenities. The agent must still book or compare the exact target hotel.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: property
      name: '{target.winner_name} Suites'
      city: London
      country: United Kingdom
      price: 832.0
      review_score: 9.3
      amenities:
      - Free WiFi
      - Restaurant
      - Air conditioning
