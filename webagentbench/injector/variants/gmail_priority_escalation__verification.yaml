variant_id: gmail_priority_escalation__verification_v1
base_task_id: gmail_priority_escalation
target_primitive: verification
description: Send/forward operations silently fail. Agent must verify escalation emails
  were actually sent.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/send'
    methods:
    - POST
    response_body:
      email:
        id: fake_sent
        subject: sent
        from: me@thornton.com
        to: []
        cc: []
        bcc: []
        body: ''
        labels:
        - sent
        is_read: true
        is_starred: false
        thread_id: fake_thread
        timestamp: '2026-03-30T00:00:00Z'
    fail_count: 3
    behavior:
      mode: once
