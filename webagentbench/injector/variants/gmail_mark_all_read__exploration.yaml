variant_id: gmail_mark_all_read__exploration_v1
base_task_id: gmail_mark_all_read
target_primitive: exploration
description: Email list returns stale data requiring multiple fetches to see all unread
  emails
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/gmail/emails'
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 1
    stale_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/emails'
    delay_ms: 3000
    behavior:
      mode: progressive
      stages:
      - requests: 1
        delay_ms: 3000
      - requests: 2
        delay_ms: 5000
