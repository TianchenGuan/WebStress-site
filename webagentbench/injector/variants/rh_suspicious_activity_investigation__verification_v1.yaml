variant_id: rh_suspicious_activity_investigation__verification_v1
base_task_id: rh_suspicious_activity_investigation
target_primitive: verification
description: >
  The first 2FA enablement call returns a fake success claiming
  authenticator is now active, but the setting is not actually changed.
  Agent must verify security settings reflect the update and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/security/2fa"
    methods: ["POST", "PUT", "PATCH"]
    response_body:
      display_theme: "light"
      default_order_type: "market"
      reinvest_dividends: true
      extended_hours_enabled: false
      biometric_login: false
      two_factor_method: "authenticator"
      notification_prefs: {}
    fail_count: 1
    behavior:
      mode: once
