variant_id: booking_search_and_book__state_tracking_v1
base_task_id: booking_search_and_book
target_primitive: state_tracking
description: Intermittent API failures during the search and booking flow force the
  agent to re-verify state after each step.
injections:
- layer: server
  params:
    action: intermittent_failures
    endpoints:
    - path_pattern: "properties/search"
      failure_rate: 0.3
      failure_type: timeout
      delay_ms: 5000
    - path_pattern: "reservations$"
      method: POST
      failure_rate: 0.2
      failure_type: 500
