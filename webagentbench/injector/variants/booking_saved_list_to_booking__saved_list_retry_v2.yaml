variant_id: booking_saved_list_to_booking__saved_list_retry_v2
base_task_id: booking_saved_list_to_booking
target_primitive: backtracking
description: The first saved-list write fails transiently. The agent must verify the list or property association exists and
  retry if it does not.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/booking/saved-lists**'
    methods:
    - POST
    - DELETE
    error_count: 1
    error_status: 503
    error_message: Service temporarily unavailable. (HTTP 503)
    behavior:
      mode: once
