variant_id: pp_mark_all_read__mark_all_read_verification_v1
base_task_id: pp_mark_all_read
target_primitive: verification
description: "The first attempt to mark a message as read returns a fake success without persisting. The agent must verify\
  \ all messages actually have is_read=True in the messages list \u2014 trusting the optimistic UI alone leaves messages unread."
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/patient_portal/messages/*/read'
    methods:
    - POST
    fail_count: 1
    response_body:
      id: msg_4f9b1a2c8e
      from_type: patient
      provider_id: prov_a82c441f
      subject: Acknowledgement
      body: Marked as read.
      thread_id: thread_d2a8f3c1
      timestamp: '2026-04-26T08:00:00+00:00'
      is_read: true
      category: clinical
      linked_entity_id: null
      linked_entity_type: null
    behavior:
      mode: once
