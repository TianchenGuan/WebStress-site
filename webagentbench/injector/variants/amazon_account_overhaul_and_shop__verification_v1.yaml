variant_id: amazon_account_overhaul_and_shop__verification_v1
base_task_id: amazon_account_overhaul_and_shop
target_primitive: verification
description: >
  The settings update returns 200 but silently fails without persisting
  the changes, and the first checkout silently fails with a fake success
  response. The agent must verify that settings and orders actually
  persisted and retry if necessary.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/settings"
      action: silent_fail
      methods: ["PUT"]
      fail_count: 1
      response_body: {"settings": {"one_click_enabled": false, "two_factor_enabled": false}, "message": "Settings updated successfully"}
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: silent_fail
      methods: ["POST"]
      fail_count: 1
      response_body: {"order_id": "fake-order-001", "status": "confirmed", "message": "Order placed successfully"}
