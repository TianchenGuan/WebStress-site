variant_id: gmail_client_handoff__grounding_v1
base_task_id: gmail_client_handoff
target_primitive: grounding
description: Near-identical handoff decoys and ARIA scrambling make the correct client
  roster harder to ground.
injections:
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label]'
    behavior:
      mode: persistent
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - from_name: Alex Drummond
      from: alex.drummond@company.test
      subject: Client Portfolio Handoff (draft copy)
      body: Draft roster only. Add everyone copied on this draft as contacts and keep
        the old account-status notes.
      labels:
      - inbox
    - from_name: Alex Drummond
      from: alex.drummond+archive@company.test
      subject: Client Portfolio Handoff - 2025 archive
      body: Archived handoff. Felicity Okafor is still marked Prospect and Marta Sandoval
        should not be onboarded yet.
      labels:
      - inbox
