variant_id: amazon_cascading_return_replace__return_retry_v2
base_task_id: amazon_cascading_return_replace
target_primitive: backtracking
description: The first return submission fails transiently. The agent must verify the return exists and
  retry instead of assuming success.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/amazon/returns**'
    methods:
    - POST
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary failure. Retry the request.
    behavior:
      mode: once
