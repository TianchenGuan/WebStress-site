variant_id: rh_live_watch_and_buy__grounding_v1
base_task_id: rh_live_watch_and_buy
target_primitive: grounding
description: >
  Misleading alerts suggest buying AAPL immediately at market price
  and distractor notifications reference different buy targets. The
  agent must ground its decision on watching for the sub-$182 dip and
  using a market order — not a limit order — as the task instructs.
injections:
- layer: seed
  params:
    action: add_misleading_alert
    alert:
      symbol: AAPL
      condition: above
      target_price: "190"
- layer: server
  params:
    action: inject_distractor_notifications
    messages:
    - "AAPL buy signal triggered at $188"
    - "Limit order reminder: AAPL at $183"
