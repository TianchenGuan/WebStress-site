variant_id: booking_frontier_loyalty_maximizer__verification_v1
base_task_id: booking_frontier_loyalty_maximizer
target_primitive: verification
description: Displayed prices and review scores are occasionally mutated on the client,
  requiring the agent to cross-check details before acting.
injections:
- layer: client
  params:
    action: mutate_displayed_text
    mutations:
    - selector: .bk-price, .bk-score-badge
      behavior: swap_digits
      probability: 0.3
