variant_id: gmail_reply_simple__grounding_v1
base_task_id: gmail_reply_simple
target_primitive: grounding
description: A near-match Bob Martinez thread and ARIA scrambling make the correct
  reply target easier to confuse.
injections:
- layer: client
  params:
    action: scramble_aria
    selector: '[aria-label]'
    behavior:
      mode: persistent
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - from_name: Bob Martinez
      from: bob.martinez@company.test
      subject: Meeting Tomorrow at 2 PM?
      body: Same sender, slightly different punctuation and a question about moving
        the meeting.
      labels:
      - inbox
    - from_name: Rob Martinez
      from: rob.martinez@company.test
      subject: Meeting Tomorrow at 2pm
      body: Different sender with almost the same name.
      labels:
      - inbox
