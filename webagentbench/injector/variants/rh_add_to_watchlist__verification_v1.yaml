variant_id: rh_add_to_watchlist__verification_v1
base_task_id: rh_add_to_watchlist
target_primitive: verification
description: >
  Silent fail on the first attempt to add NVDA to the watchlist. The server
  returns a fake success response showing NVDA in the Tech Stocks watchlist,
  but the symbol is not actually persisted. Agent must verify the watchlist
  contents and retry.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/robinhood/watchlists/*/symbols"
    methods: ["POST"]
    response_body:
      success: true
      watchlist:
        id: "{target.watchlist_id}"
        name: "Tech Stocks"
        symbols: ["AAPL", "MSFT", "NVDA"]
    fail_count: 1
    behavior:
      mode: once
