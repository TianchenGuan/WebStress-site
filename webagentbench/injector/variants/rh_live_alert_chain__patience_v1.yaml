variant_id: rh_live_alert_chain__patience_v1
base_task_id: rh_live_alert_chain
target_primitive: patience
description: >
  Progressive delays on NVDA price polling, portfolio reads, and position
  queries slow the multi-step alert-check-rebalance chain. The agent must
  patiently wait through each stage without skipping the portfolio
  concentration check or acting on stale data.
injections:
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/stocks/*"
    delay_ms: 2500
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 2
      - delay_ms: 3500
        after_call: 5
      - delay_ms: 2500
- layer: network
  params:
    action: delay
    url_pattern: "**/api/env/robinhood/account/portfolio"
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - delay_ms: 1500
        after_call: 1
      - delay_ms: 3000
        after_call: 3
      - delay_ms: 2000
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/robinhood/positions"
    error_status: 504
    error_count: 1
    behavior:
      mode: once
      message: Portfolio positions temporarily unavailable
