version: webagentbench_human_assignment_v1
based_on_panel: webagentbench_human_panel_v2_140.yaml
seed_for_human_runs: 42
assignment_unit: task_condition
attempts_per_assigned_task_condition: [cold, warm]

# ---------------------------------------------------------------------------
# Annotator summary
# ---------------------------------------------------------------------------
annotators:
  Weili:    {role: full_load_primary_annotator,     num_task_conditions: 70, num_attempts: 140, designer_exclusions: [gmail, robinhood], portfolio: [amazon, reddit, lms, booking]}
  Michael:  {role: full_load_primary_annotator,     num_task_conditions: 70, num_attempts: 140, designer_exclusions: [lms, patient_portal], portfolio: [gmail, robinhood, reddit, booking]}
  Xunjian:  {role: full_load_primary_annotator,     num_task_conditions: 70, num_attempts: 140, designer_exclusions: [amazon, reddit], portfolio: [gmail, robinhood, patient_portal, booking]}
  Tianchen: {role: full_load_primary_annotator,     num_task_conditions: 70, num_attempts: 140, designer_exclusions: [booking], portfolio: [gmail, amazon, patient_portal, lms]}
  Keagan:   {role: limited_load_duplicate_annotator, num_task_conditions: 9,  num_attempts: 18}
  Kyle:     {role: limited_load_duplicate_annotator, num_task_conditions: 9,  num_attempts: 18}
  Royce:    {role: limited_load_duplicate_annotator, num_task_conditions: 9,  num_attempts: 18}
  Daisy:    {role: limited_load_duplicate_annotator, num_task_conditions: 8,  num_attempts: 16}

# ---------------------------------------------------------------------------
# Condition assignments (280 primary)
# Each entry is one (base_task, condition) pair assigned to one annotator.
# Per entry:
#   aid       : unique assignment id
#   role      : primary | duplicate
#   annotator : annotator name
#   base      : base_task_id
#   env       : environment id
#   diff      : difficulty (easy|medium|hard|expert|frontier)
#   title     : human-visible task title
#   cond      : clean | intervention
#   yaml      : path to base task YAML
#   prim      : primary_primitive (analysis only; NOT shown to annotator)
#   steps     : expected_steps (analysis only; NOT shown to annotator)
#   variant   : {id, yaml} present only when cond == intervention
# ---------------------------------------------------------------------------
condition_assignments:
