selection_objective:
  description: After satisfying env×difficulty quotas, choose a subset whose primary primitive counts match the full benchmark
    distribution. Among ties, prefer tasks whose expected_steps are closest to the median of their env×difficulty cell, so
    the panel is not biased toward cell outliers.
