    tasks'
why_no_coverage_vs_diagnostic_label: v2 removes the earlier coverage/diagnostic split. All 140 tasks belong to one balanced
  human panel. Diagnostic conclusions come from analyzing factors (primitive, condition, difficulty, environment), not from
  labeling some tasks diagnostic in advance.
