analysis_estimator:
  overall_human_or_agent_mean: 'Use weighted cell means: sum_{env,difficulty} N_env,difficulty * mean(sampled tasks in cell)
    / 502. Each selected task carries analysis_weight_env_difficulty = N_env,difficulty / 4.'
  condition_effect: Within selected base tasks, compare intervention vs clean with the same seed and base_task_id. Estimate
    human intervention tax and agent intervention drop as paired differences.
  primitive_effect: Use the primary_primitive field for base-task ability analysis and official_intervention_variant.target_primitive
    for intervention-specific analysis.
duplicate_subset_design:
  rule: one duplicated task-condition in every environment × difficulty cell; exactly 35 task-conditions
  condition_balance:
    intervention: 18
    clean: 17
  primary_primitive_counts:
    grounding: 11
    backtracking: 6
    verification: 5
    exploration: 3
    patience: 2
    planning: 3
    state_tracking: 5
  interpretation: This duplicate subset estimates aggregate human-reference stability and env/difficulty stability. It is
    not large enough to make strong primitive-level human-variance claims.
  disagreement_policy:
    both_warm_succeed_and_steps_within_1_5x: keep both traces; reference = shorter valid warm trace
    both_warm_succeed_but_steps_above_1_5x: adjudicate for alternate valid strategy or hidden shortcut; keep all valid paths
    one_warm_fails: third-person adjudication; inspect task ambiguity/evaluator/intervention
    both_warm_fail: fix or remove task, then re-record
