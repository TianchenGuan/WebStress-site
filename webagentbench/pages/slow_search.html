<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Search — Springfield Area</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-size: 20px;
      font-weight: 700;
      color: #1d1d1f;
    }
    .header-logo span { color: #0071e3; }
    .header-nav {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #6e6e73;
    }
    .header-nav a {
      text-decoration: none;
      color: inherit;
    }
    .header-nav a:hover { color: #0071e3; }

    /* ── Search Bar ─────────────────────────────────────────────────── */
    .search-section {
      max-width: 960px;
      margin: 32px auto 0;
      padding: 0 24px;
    }
    .search-bar {
      display: flex;
      gap: 12px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #1d1d1f;
      background: transparent;
    }
    .search-bar button {
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-bar button:hover { background: #005bb5; }

    .result-count {
      margin-top: 16px;
      font-size: 14px;
      color: #6e6e73;
    }

    /* ── Results Container ──────────────────────────────────────────── */
    .results {
      max-width: 960px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Skeleton Loader ───────────────────────────────────────────── */
    .skeleton-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .skeleton-img {
      width: 120px;
      height: 90px;
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      border-radius: 8px;
      animation: shimmer 1.5s infinite;
      flex-shrink: 0;
    }
    .skeleton-body { flex: 1; }
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      margin-bottom: 10px;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-line.long { width: 100%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Property Card ─────────────────────────────────────────────── */
    .property-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      transition: box-shadow .15s;
    }
    .property-card:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .property-main {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .property-img {
      width: 120px;
      height: 90px;
      background: #e8f0fe;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .property-info { flex: 1; }
    .property-address {
      font-size: 18px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 4px;
    }
    .property-price {
      font-size: 20px;
      font-weight: 700;
      color: #0071e3;
      margin-bottom: 6px;
    }
    .property-specs {
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: #6e6e73;
    }
    .property-specs span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Accordion ─────────────────────────────────────────────────── */
    .details-toggle {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #0071e3;
      background: #f0f7ff;
      border: 1px solid #cce0ff;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      font-family: inherit;
      transition: background .15s;
    }
    .details-toggle:hover {
      background: #dfeeff;
    }
    .details-panel {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: #fafafa;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
    }
    .details-panel.open { display: block; }
    .details-panel table {
      width: 100%;
      border-collapse: collapse;
    }
    .details-panel th,
    .details-panel td {
      text-align: left;
      padding: 8px 12px;
      font-size: 14px;
      border-bottom: 1px solid #e8e8ed;
    }
    .details-panel th {
      color: #6e6e73;
      font-weight: 500;
      width: 40%;
    }
    .details-panel td {
      color: #1d1d1f;
      font-weight: 600;
    }

    /* ── Load More ─────────────────────────────────────────────────── */
    .load-more-wrapper {
      text-align: center;
      padding: 24px 0 48px;
    }
    .btn-load-more {
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      color: #0071e3;
      background: #fff;
      border: 2px solid #0071e3;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-load-more:hover {
      background: #0071e3;
      color: #fff;
    }
    .btn-load-more:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      margin: 16px auto;
      width: 32px;
      height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .spinner.visible { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Answer Section ────────────────────────────────────────────── */
    .answer-section {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px 48px;
    }
    .answer-card {
      background: #fff;
      border: 2px solid #0071e3;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,113,227,.1);
    }
    .answer-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1d1d1f;
    }
    .answer-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .answer-row label {
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
      white-space: nowrap;
    }
    .answer-row input {
      flex: 1;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      outline: none;
      max-width: 200px;
    }
    .answer-row input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,.15);
    }
    .btn-submit-answer {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0071e3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-submit-answer:hover { background: #005bb5; }
    #answer-display {
      margin-top: 12px;
      font-size: 14px;
      color: #1d1d1f;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">Springfield<span>Realty</span></div>
  <div class="header-nav">
    <a href="#">Buy</a>
    <a href="#">Rent</a>
    <a href="#">Sell</a>
    <a href="#">Agents</a>
  </div>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-bar">
    <input type="text" id="search-input" value="Springfield area properties" placeholder="Search by address, city, or ZIP...">
    <button type="button" id="search-btn">Search</button>
  </div>
  <p class="result-count" id="result-count">Loading results...</p>
</div>

<!-- Results -->
<div class="results" id="results-container">
  <!-- Skeleton loaders (initial) -->
  <div class="skeleton-card" id="skeleton-1">
    <div class="skeleton-img"></div>
    <div class="skeleton-body">
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
      <div class="skeleton-line long"></div>
    </div>
  </div>
  <div class="skeleton-card" id="skeleton-2">
    <div class="skeleton-img"></div>
    <div class="skeleton-body">
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
      <div class="skeleton-line long"></div>
    </div>
  </div>
  <div class="skeleton-card" id="skeleton-3">
    <div class="skeleton-img"></div>
    <div class="skeleton-body">
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
      <div class="skeleton-line long"></div>
    </div>
  </div>
</div>

<!-- Load More -->
<div class="load-more-wrapper" id="load-more-wrapper" style="display:none;">
  <button class="btn-load-more" id="btn-load-more">Load More Results</button>
  <div class="spinner" id="load-spinner"></div>
</div>

<!-- Answer Section -->
<div class="answer-section">
  <div class="answer-card">
    <h3>Effective price per sqft for 742 Evergreen Terrace (after HOA reserve credit):</h3>
    <div class="answer-row">
      <label for="answer-input">$</label>
      <input type="number" id="answer-input" placeholder="e.g. 281">
      <button class="btn-submit-answer" id="btn-submit-answer">Submit</button>
    </div>
    <div id="answer-display"></div>
  </div>
</div>

<!-- Benchmark harness (must load first) -->
<script src="/static/benchmark.js"></script>

<script>
(function () {
  "use strict";

  // ── Page ID ──────────────────────────────────────────────────────
  window.__benchmarkState.pageId = "slow_search";

  // ── Property Data ────────────────────────────────────────────────
  var BATCH_1 = [
    { address: "123 Oak Street",      price: 425000, sqft: 1800, beds: 3, baths: 2, yearBuilt: 1985, lotSize: "0.25 acres", hoaCredit: 6000, icon: "🏠" },
    { address: "456 Maple Avenue",    price: 550000, sqft: 2200, beds: 4, baths: 3, yearBuilt: 1998, lotSize: "0.35 acres", hoaCredit: 9000, icon: "🏡" },
    { address: "789 Pine Road",       price: 380000, sqft: 1500, beds: 2, baths: 1, yearBuilt: 1972, lotSize: "0.18 acres", hoaCredit: 4000, icon: "🏠" }
  ];

  var BATCH_2 = [
    { address: "742 Evergreen Avenue",  price: 489000, sqft: 1700, beds: 3, baths: 2, yearBuilt: 1988, lotSize: "0.28 acres", hoaCredit: 18000, icon: "🏠" },
    { address: "321 Birch Lane",        price: 495000, sqft: 1900, beds: 3, baths: 2, yearBuilt: 2005, lotSize: "0.22 acres", hoaCredit: 7000, icon: "🏠" },
    { address: "555 Cedar Court",       price: 620000, sqft: 2400, beds: 4, baths: 3, yearBuilt: 2012, lotSize: "0.40 acres", hoaCredit: 15000, icon: "🏡" }
  ];

  var BATCH_3 = [
    { address: "742 Evergreen Terrace", price: 574000, sqft: 2000, beds: 3, baths: 2, yearBuilt: 1990, lotSize: "0.30 acres", hoaCredit: 12000, icon: "🏡" },
    { address: "888 Willow Drive",      price: 445000, sqft: 1650, beds: 2, baths: 2, yearBuilt: 2001, lotSize: "0.20 acres", hoaCredit: 6500, icon: "🏠" },
    { address: "101 Elm Boulevard",     price: 710000, sqft: 2800, beds: 5, baths: 3, yearBuilt: 2018, lotSize: "0.45 acres", hoaCredit: 11000, icon: "🏡" }
  ];

  var batchesLoaded = 0;

  // ── Element Refs ─────────────────────────────────────────────────
  var resultsContainer = document.getElementById("results-container");
  var loadMoreWrapper  = document.getElementById("load-more-wrapper");
  var btnLoadMore      = document.getElementById("btn-load-more");
  var loadSpinner      = document.getElementById("load-spinner");
  var resultCount      = document.getElementById("result-count");
  var answerInput      = document.getElementById("answer-input");
  var btnSubmitAnswer  = document.getElementById("btn-submit-answer");
  var answerDisplay    = document.getElementById("answer-display");

  // ── Helpers ──────────────────────────────────────────────────────
  function formatPrice(n) {
    return "$" + n.toLocaleString("en-US");
  }

  function slugifyAddress(address) {
    return address.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
  }

  function createPropertyCard(prop) {
    var card = document.createElement("div");
    card.className = "property-card";
    var detailsId = "details-" + slugifyAddress(prop.address);
    card.innerHTML =
      '<div class="property-main">' +
        '<div class="property-img">' + prop.icon + '</div>' +
        '<div class="property-info">' +
          '<h4 class="property-address">' + prop.address + '</h4>' +
          '<div class="property-price">' + formatPrice(prop.price) + '</div>' +
          '<div class="property-specs">' +
            '<span>' + prop.sqft.toLocaleString() + ' sqft</span>' +
            '<span>' + prop.beds + ' bed / ' + prop.baths + ' bath</span>' +
          '</div>' +
          '<button type="button" class="details-toggle" data-expanded="false" aria-expanded="false" aria-controls="' + detailsId + '" aria-label="View details for ' + prop.address + '">View Details &#x25BC;</button>' +
          '<div class="details-panel" id="' + detailsId + '" role="region" aria-label="Details for ' + prop.address + '">' +
            '<table>' +
              '<tr><th>Listing Price</th><td>' + formatPrice(prop.price) + '</td></tr>' +
              '<tr><th>Total Area</th><td>' + prop.sqft.toLocaleString() + ' sqft</td></tr>' +
              '<tr><th>Year Built</th><td>' + prop.yearBuilt + '</td></tr>' +
              '<tr><th>Lot Size</th><td>' + prop.lotSize + '</td></tr>' +
              '<tr><th>Bedrooms</th><td>' + prop.beds + '</td></tr>' +
              '<tr><th>Bathrooms</th><td>' + prop.baths + '</td></tr>' +
              '<tr><th>HOA Reserve Credit</th><td>' + formatPrice(prop.hoaCredit) + '</td></tr>' +
            '</table>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Accordion toggle
    var toggle = card.querySelector(".details-toggle");
    var panel  = card.querySelector(".details-panel");
    toggle.addEventListener("click", function () {
      var expanded = toggle.getAttribute("data-expanded") === "true";
      if (expanded) {
        panel.classList.remove("open");
        toggle.setAttribute("data-expanded", "false");
        toggle.setAttribute("aria-expanded", "false");
        toggle.setAttribute("aria-label", "View details for " + prop.address);
        toggle.innerHTML = "View Details &#x25BC;";
        window.__benchmarkLog("details_collapsed", { address: prop.address });
      } else {
        panel.classList.add("open");
        toggle.setAttribute("data-expanded", "true");
        toggle.setAttribute("aria-expanded", "true");
        toggle.setAttribute("aria-label", "Hide details for " + prop.address);
        toggle.innerHTML = "Hide Details &#x25B2;";
        window.__benchmarkLog("details_expanded", { address: prop.address });
      }
    });

    return card;
  }

  function renderBatch(batch) {
    for (var i = 0; i < batch.length; i++) {
      resultsContainer.appendChild(createPropertyCard(batch[i]));
    }
  }

  function removeSkeletons() {
    var skeletons = resultsContainer.querySelectorAll(".skeleton-card");
    for (var i = 0; i < skeletons.length; i++) {
      skeletons[i].remove();
    }
  }

  // ── Initial Load (1500ms delay) ──────────────────────────────────
  setTimeout(function () {
    removeSkeletons();
    renderBatch(BATCH_1);
    batchesLoaded = 1;
    resultCount.textContent = "Showing 3 of 9 results for \"Springfield area properties\"";
    loadMoreWrapper.style.display = "";
    window.__benchmarkUpdate({ batches_loaded: batchesLoaded });
    window.__benchmarkLog("batch_1_loaded");
  }, 1500);

  // ── Load More ────────────────────────────────────────────────────
  btnLoadMore.addEventListener("click", function () {
    if (batchesLoaded >= 3) return;
    btnLoadMore.disabled = true;
    loadSpinner.classList.add("visible");
    window.__benchmarkLog("load_more_clicked");

    if (batchesLoaded === 1) {
      setTimeout(function () {
        loadSpinner.classList.remove("visible");
        renderBatch(BATCH_2);
        batchesLoaded = 2;
        resultCount.textContent = "Showing 6 of 9 results for \"Springfield area properties\"";
        btnLoadMore.textContent = "Load More Results";
        btnLoadMore.disabled = false;
        window.__benchmarkUpdate({ batches_loaded: batchesLoaded });
        window.__benchmarkLog("batch_2_loaded");
      }, 2500);
    } else if (batchesLoaded === 2) {
      setTimeout(function () {
        loadSpinner.classList.remove("visible");
        renderBatch(BATCH_3);
        batchesLoaded = 3;
        resultCount.textContent = "Showing 9 of 9 results for \"Springfield area properties\"";
        btnLoadMore.textContent = "All Results Loaded";
        btnLoadMore.disabled = true;
        window.__benchmarkUpdate({ batches_loaded: batchesLoaded });
        window.__benchmarkLog("batch_3_loaded");
      }, 3500);
    }
  });

  // ── Answer Submission ────────────────────────────────────────────
  btnSubmitAnswer.addEventListener("click", function () {
    var value = answerInput.value.trim();
    if (!value) {
      answerDisplay.textContent = "Please enter a value.";
      answerDisplay.style.color = "#d32f2f";
      return;
    }
    var numVal = parseInt(value, 10);
    var isCorrect = numVal === 281;
    answerDisplay.textContent = "Submitted: $" + numVal + " per sqft";
    answerDisplay.style.color = "#1d1d1f";

    window.__benchmarkLog("answer_submitted", { value: numVal, correct: isCorrect });
    window.__benchmarkComplete(isCorrect, {
      answer_submitted: true,
      reported_price_per_sqft: numVal,
      batches_loaded: batchesLoaded
    });
  });

})();
</script>

</body>
</html>
