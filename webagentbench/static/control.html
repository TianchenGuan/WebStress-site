<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebStress Control Panel</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f8fa;
    color: #1f2328;
    min-height: 100vh;
  }
  .topbar {
    background: #24292f;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topbar h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .topbar a { color: #adbac7; text-decoration: none; font-size: 13px; }
  .topbar a:hover { color: #fff; }
  .container { max-width: 820px; margin: 0 auto; padding: 24px; }
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 12px 0;
    color: #656d76;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .task-title { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; }
  .task-meta { color: #656d76; font-size: 13px; margin-bottom: 0; }
  .instruction {
    background: #f6f8fa;
    border-left: 3px solid #0969da;
    padding: 14px 16px;
    border-radius: 0 6px 6px 0;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .btn {
    border: 1px solid #d0d7de;
    background: #f6f8fa;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: #1f2328;
  }
  .btn:hover { background: #eaeef2; }
  .btn-primary { background: #1f883d; color: #fff; border-color: #1a7f37; }
  .btn-primary:hover { background: #1a7f37; }
  .btn-danger { background: #cf222e; color: #fff; border-color: #b62324; }
  .btn-danger:hover { background: #b62324; }
  .btn-large { padding: 16px 32px; font-size: 18px; font-weight: 600; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .record-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .record-stats { font-size: 14px; color: #656d76; }
  .record-stats strong { color: #1f2328; font-size: 16px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #656d76; margin-right: 6px; }
  .dot.live { background: #cf222e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #656d76; margin-bottom: 8px; }
  .eval-result { margin-top: 14px; padding: 14px; border-radius: 6px; font-size: 14px; }
  .eval-result.pass { background: #dafbe1; border: 1px solid #1a7f37; color: #0a4f1b; }
  .eval-result.fail { background: #ffebe9; border: 1px solid #cf222e; color: #82071e; }
  .eval-score { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .eval-checks { list-style: none; padding: 0; margin: 0; }
  .eval-checks li { padding: 4px 0; font-size: 13px; }
  .eval-checks li.pass::before { content: "✓ "; color: #1a7f37; font-weight: 700; }
  .eval-checks li.fail::before { content: "✗ "; color: #cf222e; font-weight: 700; }
  .eval-checks li.graph-only::before { content: ""; }
  .eval-checks li.neg { color: #9a6700; }
  .eval-check-group { margin-bottom: 10px; }
  .eval-graph {
    margin: 6px 0 10px 0;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    overflow: hidden;
    background: #fff;
    color: #1f2328;
  }
  .eval-graph-head {
    padding: 8px 10px;
    background: #f6f8fa;
    border-bottom: 1px solid #d0d7de;
    font-size: 13px;
    font-weight: 600;
  }
  .eval-graph-meta { font-weight: 500; color: #656d76; margin-top: 3px; }
  .eval-graph-labels {
    display: grid;
    grid-template-columns: 240px 96px 240px;
    justify-content: center;
    gap: 0;
    padding: 6px 0;
    background: #f6f8fa;
    border-bottom: 1px solid #d0d7de;
    color: #656d76;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
  }
  .eval-graph-scroll { overflow-x: auto; background: #fff; }
  .eval-graph-canvas {
    position: relative;
    width: 576px;
    margin: 0 auto;
  }
  .eval-graph-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }
  .eval-node {
    position: absolute;
    width: 240px;
    height: 46px;
    padding: 5px 8px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    background: #fff;
    overflow: hidden;
    font-size: 12px;
    line-height: 1.2;
  }
  .eval-node-label {
    color: #1f2328;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .eval-node.ok { background: #dafbe1; border-color: #4ac26b; }
  .eval-node.fail { background: #ffebe9; border-color: #ff8182; }
  .eval-node.warn { background: #fff8c5; border-color: #d4a72c; }
  .eval-node.neutral { background: #f6f8fa; border-color: #d0d7de; }
  .eval-node.ghost { background: #f6f8fa; border-style: dashed; color: #656d76; }
  .pill {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 999px;
    border: 1px solid #d0d7de;
    font-size: 11px;
    font-weight: 600;
  }
  .pill.ok { color: #116329; background: #dafbe1; border-color: #4ac26b; }
  .pill.fail { color: #a40e26; background: #ffebe9; border-color: #ff8182; }
  .pill.warn { color: #9a6700; background: #fff8c5; border-color: #d4a72c; }
  .pill.neutral { color: #57606a; background: #f6f8fa; }
  .eval-reasoning {
    margin-top: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    white-space: pre-wrap;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.45;
    max-height: 180px;
    overflow: auto;
  }
  .session-id { font-family: monospace; font-size: 11px; color: #656d76; }
</style>
</head>
<body>

<div class="topbar">
  <h1>WebStress — Control Panel</h1>
  <a href="/launch">← Back to Launcher</a>
</div>

<div class="container">

  <div class="card">
    <h2>Task</h2>
    <div id="task-title" class="task-title">Loading…</div>
    <div id="task-meta" class="task-meta"></div>
  </div>

  <div class="card">
    <h2>Instruction</h2>
    <div id="instruction" class="instruction">Loading…</div>
  </div>

  <div class="card">
    <h2>Benchmark Tab</h2>
    <div class="status-row">
      <div><span class="dot" id="bench-dot"></span><span id="bench-status">Checking…</span></div>
      <div>
        <button class="btn" id="btn-open-bench" title="Re-open the benchmark tab if you closed it">Re-open benchmark tab</button>
      </div>
    </div>
    <div class="session-id" id="session-id"></div>
    <div style="font-size:12px;color:#656d76;margin-top:6px">
      The benchmark tab should already be open in a separate window. This page stays in sync with it.
    </div>
  </div>

  <div class="card">
    <h2>Recording</h2>
    <div class="record-row">
      <button class="btn btn-danger btn-large" id="btn-record">● Start Recording</button>
      <div class="record-stats">
        Steps: <strong id="stat-steps">0</strong> &nbsp; &nbsp;
        Elapsed: <strong id="stat-elapsed">0:00</strong>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Evaluation</h2>
    <div class="record-row">
      <button class="btn btn-primary btn-large" id="btn-evaluate">Evaluate Task</button>
      <button class="btn" id="btn-reset">Reset Session</button>
    </div>
    <div id="eval-result-container"></div>
  </div>

</div>

<script>
(function() {
  "use strict";

  // Parse session_id and env_id from path: /control/{env_id}/{session_id}
  var parts = window.location.pathname.split("/").filter(Boolean);
  if (parts.length < 3) {
    document.body.innerHTML = "<p style='padding:24px'>Invalid URL. Expected /control/{env_id}/{session_id}</p>";
    return;
  }
  var ENV_ID = parts[1];
  var SESSION_ID = parts[2];
  var BENCH_BASE = null; // discovered from env manifest
  var START_PATH = "/"; // task start path, loaded from session
  var recording = false;
  var recordStartMs = 0;

  document.getElementById("session-id").textContent = "Session: " + SESSION_ID;

  // --- Load env manifest to find benchmark URL ---
  function loadManifest() {
    return fetch("/manifest").then(function(r) { return r.json(); }).then(function(m) {
      var envs = m.environments || [];
      for (var i = 0; i < envs.length; i++) {
        if (envs[i].env_id === ENV_ID) {
          BENCH_BASE = envs[i].base_url || ("/env/" + ENV_ID);
          return;
        }
      }
      BENCH_BASE = "/env/" + ENV_ID;
    });
  }

  // --- Load task info (instruction, title) via session endpoint ---
  function loadSession() {
    return fetch("/api/env/" + ENV_ID + "/session/" + SESSION_ID)
      .then(function(r) {
        if (r.status === 404) throw new Error("This session no longer exists. Go back to the launcher and start a new task.");
        if (!r.ok) throw new Error("Session " + SESSION_ID + " lookup failed (HTTP " + r.status + ")");
        return r.json();
      })
      .then(function(data) {
        START_PATH = data.start_path || "/";
        document.getElementById("task-title").textContent = data.title || SESSION_ID;
        document.getElementById("task-meta").textContent =
          "Environment: " + ENV_ID + " · " + (data.degradation_active ? "Degradation active" : "No intervention");
        document.getElementById("instruction").textContent = data.instruction || "(no instruction)";
      });
  }

  // --- Benchmark URL helpers ---
  function benchUrl() {
    return BENCH_BASE.replace(/\/+$/, "") + START_PATH + "?session=" + encodeURIComponent(SESSION_ID) + "&control=on";
  }

  // --- Recording controls ---
  function startRecording() {
    fetch("/api/control/" + SESSION_ID + "/record/start", { method: "POST" })
      .then(function(r) { return r.json(); })
      .then(function(state) {
        recording = true;
        recordStartMs = state.started_at_ms;
        renderRecordButton();
      })
      .catch(function(e) { alert("Failed to start recording: " + e.message); });
  }

  function stopRecording() {
    fetch("/api/control/" + SESSION_ID + "/record/stop", { method: "POST" })
      .then(function(r) { return r.json(); })
      .then(function(state) {
        recording = false;
        renderRecordButton();
      });
  }

  function renderRecordButton() {
    var btn = document.getElementById("btn-record");
    if (recording) {
      btn.textContent = "■ Stop Recording";
      btn.classList.remove("btn-danger");
      btn.classList.add("btn-primary");
    } else {
      btn.textContent = "● Start Recording";
      btn.classList.remove("btn-primary");
      btn.classList.add("btn-danger");
    }
  }

  function pollRecordState() {
    fetch("/api/control/" + SESSION_ID + "/record-state")
      .then(function(r) { return r.json(); })
      .then(function(state) {
        recording = state.recording;
        recordStartMs = state.started_at_ms || 0;
        document.getElementById("stat-steps").textContent = state.event_count || 0;
        if (recording && recordStartMs) {
          var elapsed = Math.floor((Date.now() - recordStartMs) / 1000);
          var mm = Math.floor(elapsed / 60);
          var ss = elapsed % 60;
          document.getElementById("stat-elapsed").textContent = mm + ":" + (ss < 10 ? "0" + ss : ss);
        } else {
          document.getElementById("stat-elapsed").textContent = "0:00";
        }
        // Connection status: heartbeat within last 5s == connected
        var dot = document.getElementById("bench-dot");
        var text = document.getElementById("bench-status");
        var age = state.last_heartbeat_ms ? (Date.now() - state.last_heartbeat_ms) : Infinity;
        if (age < 5000) {
          dot.classList.add("live");
          dot.style.background = "#1f883d";
          text.textContent = "Connected (benchmark tab is open)";
        } else {
          dot.classList.remove("live");
          dot.style.background = "#656d76";
          text.textContent = state.last_heartbeat_ms
            ? "Disconnected (benchmark tab may be closed)"
            : "Waiting for benchmark tab to connect…";
        }
        renderRecordButton();
      })
      .catch(function() { /* ignore */ });
  }

  // --- Evaluate ---
  function doEvaluate() {
    var btn = document.getElementById("btn-evaluate");
    btn.disabled = true;
    btn.textContent = "Evaluating…";
    fetch("/api/env/" + ENV_ID + "/evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: SESSION_ID, task_id: null, benchmark_state: {}, trajectory: [] }),
    })
      .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
      .then(function(res) {
        btn.disabled = false;
        btn.textContent = "Evaluate Task";
        renderEvalResult(res.data, res.ok);
      })
      .catch(function(e) {
        btn.disabled = false;
        btn.textContent = "Evaluate Task";
        renderEvalResult({ reasoning: "Error: " + e.message }, false);
      });
  }

  function renderEvalResult(data, ok) {
    var container = document.getElementById("eval-result-container");
    var success = ok && data.success;
    var rawScore = typeof data.final_score === "number" ? data.final_score : data.score;
    var score = typeof rawScore === "number" ? rawScore.toFixed(2) : "?";
    var checks = data.checks || [];
    var negativeChecks = data.negative_checks || [];
    var graphs = data.bijection_graphs || [];
    var checkGraphIndexes = checks.map(function(check, index) {
      var out = [];
      graphs.forEach(function(graph, graphIndex) {
        var graphCheckIndex = typeof graph.check_index === "number" ? graph.check_index : null;
        var desc = check.desc || check.expr || "";
        var belongs =
          graphCheckIndex === index ||
          (graphCheckIndex === null && graph.check_desc === desc) ||
          (graphCheckIndex === null && desc && graph.desc && desc.indexOf(graph.desc) === 0);
        if (belongs) out.push(graphIndex);
      });
      return out;
    });
    var assigned = {};
    checkGraphIndexes.forEach(function(indexes) {
      indexes.forEach(function(i) { assigned[i] = true; });
    });
    var html = "<div class='eval-result " + (success ? "pass" : "fail") + "'>";
    html += "<div class='eval-score'>" + score + " " + (success ? "PASSED" : "FAILED") + "</div>";
    if (checks.length) {
      html += "<div style='font-weight:600;margin-top:8px'>Checks</div><ul class='eval-checks'>";
      checks.forEach(function(c, index) {
        var graphIndexes = checkGraphIndexes[index];
        html += "<li class='" + (graphIndexes.length ? "graph-only" : (c.passed ? "pass" : "fail")) + "'>";
        html += "<div class='eval-check-group'>";
        if (!graphIndexes.length) {
          html += escapeHtml(c.desc || c.expr || "");
        }
        graphIndexes.forEach(function(graphIndex) {
          html += renderBijectionGraph(graphs[graphIndex]);
        });
        html += "</div></li>";
      });
      html += "</ul>";
    }
    var unassigned = graphs.filter(function(_, index) { return !assigned[index]; });
    if (unassigned.length) {
      html += "<div style='font-weight:600;margin-top:8px'>Match Details</div>";
      unassigned.forEach(function(graph) { html += renderBijectionGraph(graph); });
    }
    function negativeKind(n) {
      return n.kind || n._kind || "";
    }
    function renderNegativeSection(title, items) {
      if (!items.length) return "";
      var section = "<div style='font-weight:600;margin-top:8px'>" + escapeHtml(title) + "</div><ul class='eval-checks'>";
      items.forEach(function(n) {
        var prefix = n.passed ? "" : "(-" + (n.penalty || 0).toFixed(2) + ") ";
        section += "<li class='" + (n.passed ? "pass" : "fail neg") + "'>" + prefix + escapeHtml(n.desc || n.expr || "") + "</li>";
      });
      section += "</ul>";
      return section;
    }
    if (negativeChecks.length) {
      var constraints = negativeChecks.filter(function(n) { return negativeKind(n) === "constraint"; });
      var protectedState = negativeChecks.filter(function(n) { return negativeKind(n) === "invariant" || n.source === "protected_state"; });
      var collateral = negativeChecks.filter(function(n) { return n.source === "collateral" || negativeKind(n).indexOf("collateral_") === 0; });
      var excess = negativeChecks.filter(function(n) { return negativeKind(n) === "excess"; });
      var other = negativeChecks.filter(function(n) {
        var kind = negativeKind(n);
        return kind !== "constraint" &&
          kind !== "invariant" &&
          kind !== "excess" &&
          n.source !== "protected_state" &&
          n.source !== "collateral" &&
          kind.indexOf("collateral_") !== 0;
      });
      html += renderNegativeSection("Constraints", constraints);
      html += renderNegativeSection("Protected State", protectedState);
      html += renderNegativeSection("Collateral Changes", collateral);
      html += renderNegativeSection("Excess Outputs", excess);
      html += renderNegativeSection("Negative Checks", other);
    }
    if (data.reasoning && !checks.length && !negativeChecks.length && !graphs.length) {
      html += "<pre class='eval-reasoning'>" + escapeHtml(data.reasoning) + "</pre>";
    }
    html += "</div>";
    container.innerHTML = html;
  }

  function renderBijectionGraph(graph) {
    if (!graph) return "";
    var slots = graph.slots || [];
    var candidates = graph.candidates || [];
    var matched = slots.filter(function(s) { return s.matched_candidate_index !== null && s.matched_candidate_index !== undefined; }).length;
    var excess = candidates.filter(function(c) { return c.is_excess; }).length;
    var invalid = candidates.filter(function(c) { return (c.matched_slot_index === null || c.matched_slot_index === undefined) && !c.is_excess; }).length;
    var order = candidateOrder(graph);
    var rowCount = Math.max(slots.length, order.length, 1);
    var dims = graphDims(rowCount);
    var html = "<div class='eval-graph'>";
    html += "<div class='eval-graph-head'>" + escapeHtml(graph.desc || "Match details");
    html += "<div class='eval-graph-meta'>" + matched + "/" + slots.length + " matched";
    if (excess) html += " · " + excess + " excess";
    if (invalid) html += " · " + invalid + " invalid";
    html += "</div></div>";
    html += "<div class='eval-graph-labels'><div>Required</div><div>Match</div><div>Agent Produced</div></div>";
    html += "<div class='eval-graph-scroll'><div class='eval-graph-canvas' style='height:" + dims.height + "px'>";
    html += renderGraphSvg(graph, order, dims);
    slots.forEach(function(slot, i) { html += renderSlotNode(slot, i, dims); });
    order.forEach(function(candidateIndex, rowIndex) {
      html += renderCandidateNode(candidates[candidateIndex], candidateIndex, rowIndex, dims);
    });
    slots.forEach(function(slot, i) {
      if (slot.matched_candidate_index !== null && slot.matched_candidate_index !== undefined) return;
      if (i < order.length) return;
      html += renderGhostNode(i, dims);
    });
    html += "</div></div></div>";
    return html;
  }

  function graphDims(rowCount) {
    var rowH = 46;
    var rowGap = 8;
    var topPad = 12;
    var sideW = 240;
    var edgeW = 96;
    var width = sideW * 2 + edgeW;
    var height = topPad * 2 + rowCount * rowH + Math.max(0, rowCount - 1) * rowGap;
    return { rowH: rowH, rowGap: rowGap, topPad: topPad, sideW: sideW, edgeW: edgeW, width: width, height: height };
  }

  function rowTop(row, dims) {
    return dims.topPad + row * (dims.rowH + dims.rowGap);
  }

  function rowMid(row, dims) {
    return rowTop(row, dims) + dims.rowH / 2;
  }

  function renderGraphSvg(graph, order, dims) {
    var slots = graph.slots || [];
    var candidates = graph.candidates || [];
    var candidateRow = {};
    order.forEach(function(candidateIndex, rowIndex) { candidateRow[candidateIndex] = rowIndex; });
    var leftX = dims.sideW;
    var rightX = dims.sideW + dims.edgeW;
    var midX = (leftX + rightX) / 2;
    var html = "<svg class='eval-graph-svg' width='" + dims.width + "' height='" + dims.height + "'>";
    (graph.edges_possible || []).forEach(function(edge, index) {
      var slotIndex = edge[0];
      var candidateIndex = edge[1];
      var matching = slots[slotIndex] && slots[slotIndex].matched_candidate_index === candidateIndex;
      if (matching || candidateRow[candidateIndex] === undefined) return;
      html += "<path d='M " + leftX + " " + rowMid(slotIndex, dims) + " C " + midX + " " + rowMid(slotIndex, dims) + ", " + midX + " " + rowMid(candidateRow[candidateIndex], dims) + ", " + rightX + " " + rowMid(candidateRow[candidateIndex], dims) + "' stroke='#c8d1dc' stroke-width='1' stroke-dasharray='3 3' fill='none'/>";
    });
    slots.forEach(function(slot, slotIndex) {
      var candidateIndex = slot.matched_candidate_index;
      if (candidateIndex === null || candidateIndex === undefined || candidateRow[candidateIndex] === undefined) return;
      html += "<path d='M " + leftX + " " + rowMid(slotIndex, dims) + " C " + midX + " " + rowMid(slotIndex, dims) + ", " + midX + " " + rowMid(candidateRow[candidateIndex], dims) + ", " + rightX + " " + rowMid(candidateRow[candidateIndex], dims) + "' stroke='#1a7f37' stroke-width='2' fill='none'/>";
      var y = rowMid(candidateRow[candidateIndex], dims);
      html += "<polygon points='" + (rightX - 7) + "," + (y - 4) + " " + rightX + "," + y + " " + (rightX - 7) + "," + (y + 4) + "' fill='#1a7f37'/>";
    });
    slots.forEach(function(slot, slotIndex) {
      var fill = slot.matched_candidate_index === null || slot.matched_candidate_index === undefined ? "#cf222e" : "#1a7f37";
      html += "<circle cx='" + leftX + "' cy='" + rowMid(slotIndex, dims) + "' r='5' fill='" + fill + "' stroke='#fff' stroke-width='1.5'/>";
    });
    order.forEach(function(candidateIndex, rowIndex) {
      var candidate = candidates[candidateIndex] || {};
      var matched = candidate.matched_slot_index !== null && candidate.matched_slot_index !== undefined;
      var fill = matched ? "#1a7f37" : (candidate.is_excess ? "#bf8700" : "#8c959f");
      html += "<circle cx='" + rightX + "' cy='" + rowMid(rowIndex, dims) + "' r='5' fill='" + fill + "' stroke='#fff' stroke-width='1.5'/>";
    });
    html += "</svg>";
    return html;
  }

  function candidateOrder(graph) {
    var slots = graph.slots || [];
    var candidates = graph.candidates || [];
    var placed = new Array(Math.max(slots.length, candidates.length)).fill(null);
    var used = {};
    slots.forEach(function(slot, i) {
      var candidateIndex = slot.matched_candidate_index;
      if (candidateIndex !== null && candidateIndex !== undefined) {
        placed[i] = candidateIndex;
        used[candidateIndex] = true;
      }
    });
    var tail = slots.length;
    candidates.forEach(function(_, index) {
      if (used[index]) return;
      while (tail < placed.length && placed[tail] !== null) tail++;
      if (tail >= placed.length) placed.push(index);
      else placed[tail] = index;
      tail++;
    });
    return placed.filter(function(x) { return x !== null; });
  }

  function renderSlotNode(slot, row, dims) {
    var matched = slot && slot.matched_candidate_index !== null && slot.matched_candidate_index !== undefined;
    var cls = matched ? "ok" : "fail";
    return "<div class='eval-node " + cls + "' title='" + escapeHtml(slot ? slot.label || "" : "") + "' style='left:0;top:" + rowTop(row, dims) + "px'>" +
      "<div class='eval-node-label'>" + escapeHtml(slot ? slot.label || "" : "") + "</div>" +
      "<span class='pill " + cls + "'>" + (matched ? "matched" : "missing") + "</span>" +
      "</div>";
  }

  function renderCandidateNode(candidate, candidateIndex, row, dims) {
    if (!candidate) return "";
    var matched = candidate.matched_slot_index !== null && candidate.matched_slot_index !== undefined;
    var cls = matched ? "ok" : (candidate.is_excess ? "warn" : "neutral");
    var label = matched ? "matched" : (candidate.is_excess ? "excess" : "invalid");
    var left = dims.sideW + dims.edgeW;
    return "<div class='eval-node " + cls + "' title='" + escapeHtml(candidate.label || candidate.id || "") + "' style='left:" + left + "px;top:" + rowTop(row, dims) + "px'>" +
      "<div class='eval-node-label'>" + escapeHtml(candidate.label || candidate.id || "") + "</div>" +
      "<span class='pill " + cls + "'>" + label + "</span>" +
      "</div>";
  }

  function renderGhostNode(row, dims) {
    var left = dims.sideW + dims.edgeW;
    return "<div class='eval-node ghost' style='left:" + left + "px;top:" + rowTop(row, dims) + "px'>" +
      "<div class='eval-node-label'>— nothing —</div>" +
      "<span class='pill fail'>missing</span>" +
      "</div>";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // --- Reset ---
  // The backend's reset endpoint DELETES the current session and returns
  // a new session_id. So we need to navigate both tabs to the new session.
  function doReset() {
    if (!confirm("Reset the session? All progress in the benchmark tab will be lost.")) return;
    fetch("/api/env/" + ENV_ID + "/session/" + SESSION_ID + "/reset", { method: "POST" })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var newSid = data.session_id;
        if (!newSid) {
          alert("Reset failed: no new session returned.");
          return;
        }
        // Clean up old record state (fire-and-forget)
        fetch("/api/control/" + SESSION_ID + "/record/reset", { method: "POST" });
        // Reopen benchmark tab on the new session. Using the env-scoped
        // window name causes the existing benchmark tab to be navigated to
        // the new URL instead of a new tab being spawned.
        var newBenchUrl = BENCH_BASE.replace(/\/+$/, "") +
          (data.start_path || START_PATH) + "?session=" + encodeURIComponent(newSid) + "&control=on";
        window.open(newBenchUrl, BENCH_WINDOW_NAME);
        // Navigate the control tab itself to the new session's control URL.
        window.location.href = "/control/" + ENV_ID + "/" + encodeURIComponent(newSid);
      })
      .catch(function(e) { alert("Reset failed: " + e.message); });
  }

  // --- Open benchmark tab ---
  // Use an env-scoped window name (NOT session-scoped) so that resetting
  // the session navigates the existing tab to the new URL instead of
  // orphaning it and opening a fresh one.
  var BENCH_WINDOW_NAME = "wab-bench-" + ENV_ID;
  function openBench() {
    window.open(benchUrl(), BENCH_WINDOW_NAME);
  }

  // --- Wire up ---
  document.getElementById("btn-record").addEventListener("click", function() {
    if (recording) stopRecording(); else startRecording();
  });
  document.getElementById("btn-evaluate").addEventListener("click", doEvaluate);
  document.getElementById("btn-reset").addEventListener("click", doReset);
  document.getElementById("btn-open-bench").addEventListener("click", openBench);

  // Check benchmark tab status (via heartbeat in record state)
  setInterval(pollRecordState, 500);

  // --- Init ---
  loadManifest().then(loadSession).catch(function(e) {
    document.getElementById("task-title").textContent = "Error loading session";
    document.getElementById("instruction").textContent = e.message;
  });
})();
</script>

</body>
</html>
