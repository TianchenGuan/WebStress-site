variant_id: rh_options_roll_strategy__state_tracking_v1
base_task_id: rh_options_roll_strategy
target_primitive: state_tracking
description: >
  Confusing existing MSFT call positions at nearby strikes and expirations
  make it harder for the agent to identify the specific expiring covered
  call that needs to be rolled versus other open positions.
injections:
- layer: seed
  params:
    action: add_confusing_positions
    multiplier: 2
    positions:
    # Decoy short call at a strike near the real expiring call, but different
    # expiration — easy to mistakenly close.
    - symbol: MSFT
      option_type: call
      side: sell
      strike: "365.00"
      expiration_days: 10
      quantity: 1
      average_cost: "7.20"
    # Decoy short call at the next monthly — could be mistaken for the
    # already-opened "new" leg.
    - symbol: MSFT
      option_type: call
      side: sell
      strike: "370.00"
      expiration_days: 45
      quantity: 1
      average_cost: "5.40"
    # Decoy long call (buy side) with same near-term expiry as the real one —
    # tests whether the agent reads position_side / side correctly.
    - symbol: MSFT
      option_type: call
      side: buy
      strike: "355.00"
      expiration_days: 3
      quantity: 2
      average_cost: "8.90"
