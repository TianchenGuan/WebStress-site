variant_id: gmail_team_roster_sync__state_tracking_v1
base_task_id: gmail_team_roster_sync
target_primitive: state_tracking
description: >
  Four "correction/reversal" decoy emails arrive after the authoritative HR
  roster and attempt to override every roster decision: skip a new hire, swap
  the promotion target, retain a departure, and postpone the named promotion.
  The agent must treat the original HR roster as the canonical state and
  ignore the conflicting follow-ups. Timestamps are also scrambled so the
  agent cannot rely on chronology to identify the authoritative source.

  Previously this variant added only generic topical-subject distractors with
  boilerplate bodies — an annotator flagged "didn't feel any intervention" because
  the noise carried no specific names that could trip the contact ops.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 71
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    # --- Reversal 1: skip Anika Pham. Trips create[1] if followed. ---
    - from_name: HR Department
      from: hr@company.com
      subject: "Re: Q1 2026 Engineering Team Roster - correction"
      body: >-
        Quick correction on the Q1 roster I sent earlier: Anika Pham's start
        date has been pushed to Q2 due to visa processing delays. Please hold
        off on adding her as a contact for now — we'll re-circulate when she
        formally joins. Apologies for the back-and-forth.
      labels:
      - inbox
    # --- Reversal 2: wrong promotion target. Trips invariant on Wei contact if followed. ---
    - from_name: Diana Holtz
      from: d.holtz@engteam.co
      subject: "Congrats Wei!"
      body: >-
        Just heard Wei Chen is being promoted to Senior Engineer this quarter
        as well — amazing news for the team. Two promotions in one quarter is
        a great signal of growth momentum.
      labels:
      - inbox
    # --- Reversal 3: retain a departed employee. Trips delete[0] if followed. ---
    - from_name: HR Department
      from: hr@company.com
      subject: "Update: Tom Reeves - retained"
      body: >-
        Following up on the departures list: after the exit interview Tom
        Reeves has decided to stay on with the team in a part-time capacity.
        Please disregard the earlier departure note for Tom and retain his
        contact entry.
      labels:
      - inbox
    # --- Reversal 4: postpone Marcus promotion. Trips update[0] if followed. ---
    - from_name: Diana Holtz
      from: d.holtz@engteam.co
      subject: "Re: Congrats Marcus! - update"
      body: >-
        Heads up — Marcus's Senior Engineer promotion has actually been moved
        to next quarter pending a final compensation review. The Q1 paperwork
        is on hold, so please don't update his title or note yet.
      labels:
      - inbox
    # --- 2 ambient HR-shaped decoys to add background noise without triggering checks. ---
    - from_name: HR Department
      from: hr@company.com
      subject: "Q1 2026 Engineering - benefits enrollment window"
      body: >-
        Reminder that the Q1 benefits enrollment window closes at the end of
        the month. Please confirm your selections through the HR portal.
      labels:
      - inbox
    - from_name: Engineering Ops
      from: eng-ops@company.com
      subject: "Engineering team headcount review - Q1"
      body: >-
        Finance has finalized the Q1 headcount allocation for engineering.
        See the attached summary for budget breakdown and open requisitions
        by team.
      labels:
      - inbox
