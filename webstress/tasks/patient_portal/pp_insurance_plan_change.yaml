task_id: pp_insurance_plan_change
env_id: patient_portal
title: Insurance Plan Change with Rx Audit
instruction_template: 'Your insurance has changed to a new plan. Complete the transition
  by: 1) Updating your insurance plan details to plan name "Aetna PPO Silver", member
  ID "AET-5529103", and group number "GRP-88914", 2) Setting the mail-order pharmacy
  already in your pharmacy list as the default pharmacy for the new plan, 3) Transferring
  every active prescription to the new mail-order pharmacy so refills route through the
  new plan. Do not send any messages, do not cancel appointments, and do not discontinue
  any medications.'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 55
primary_primitives:
- backtracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - High Cholesterol
      insurance_tier: basic
    outputs:
    - pcp_id
    - pcp_name
    - insurance_plan_name
    - member_id
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      must_include:
      - pcp
      - billing
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 3
      include_mail_order: true
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
    - mail_order_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 5
      expired_count: 1
      # Force every active rx to the default (retail) pharmacy so the
      # mail-order transfer required by the task instruction is a real
      # state change for every prescription (not a no-op for rxs already at
      # the mail-order pharmacy).
      active_at_default_only: true
    outputs:
    - active_rx_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  targets:
    active_rx_ids: '{output.active_rx_ids}'
    pharmacy_ids: '{output.pharmacy_ids}'
    default_pharmacy_id: '{output.default_pharmacy_id}'
    mail_order_pharmacy_id: '{output.mail_order_pharmacy_id}'
    upcoming_ids: '{output.upcoming_ids}'
canonical_diff:
  update:
  - entity: Pharmacy
    desc: Set the mail-order pharmacy as the new default
    where:
      id:
        expr: x == target['mail_order_pharmacy_id']
    changes:
      is_default:
        eq: true
  - entity: Pharmacy
    desc: Remove default flag from the previous default pharmacy
    where:
      id:
        expr: x == target['default_pharmacy_id']
    changes:
      is_default:
        eq: false
  - entity: patient
    desc: Insurance plan details updated to the new values
    where:
      id: { any: true }
    changes:
      insurance_plan:
        fields:
          plan_name: { eq: "Aetna PPO Silver" }
          member_id: { eq: "AET-5529103" }
          group_number: { eq: "GRP-88914" }
      phone:
        expr: "x == initial.patient.phone"
      email:
        expr: "x == initial.patient.email"
      name:
        expr: "x == initial.patient.name"
  - entity: Prescription
    desc: Every active prescription transferred to the new mail-order pharmacy
    bijection:
      over: "target['active_rx_ids']"
      variable: v
    where:
      id:
        expr: "x == v"
    changes:
      pharmacy_id:
        expr: "x == target['mail_order_pharmacy_id']"
  invariant:
  - collection: state.pharmacies
    filter: a.id != target['default_pharmacy_id'] and a.id != target['mail_order_pharmacy_id']
    preserve: ALL
  - collection: state.appointments
    filter: a.id in target['upcoming_ids']
    preserve: ALL
  - collection: state.prescriptions
    filter: a.id in target['active_rx_ids']
    preserve: ALL
  - collection: state.messages
    filter: a.id in {x.id for x in initial.messages}
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.patient
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  named_invariants:
  - name: Agent did not change default flag on unrelated pharmacies
    ref: invariant[0]
    severity: high
  - name: Agent did not cancel or modify existing upcoming appointments
    ref: invariant[1]
    severity: high
  - name: Agent did not discontinue or modify active prescriptions
    ref: invariant[2]
    severity: critical
  - name: Agent did not send unsolicited messages or alter existing ones
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify immunization records
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or modify lab results
    ref: invariant[5]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[6]
    severity: critical
  - name: Agent did not create or modify referrals
    ref: invariant[7]
    severity: high
  - name: Agent updated insurance plan to the new values
    ref: update[2]
    severity: critical
secondary_primitives: []
